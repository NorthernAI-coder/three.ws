<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<title>verify modes</title>
		<style>
			body { margin: 0; display: flex; gap: 8px; background: #222; }
			.cell { width: 360px; height: 600px; }
		</style>
	</head>
	<body>
		<!-- 1: default → BARE -->
		<agent-3d id="a" class="cell" body="/avatars/cz.glb" eager></agent-3d>
		<!-- 2: chat attr → CHAT -->
		<agent-3d id="b" class="cell" chat body="/avatars/cz.glb" instructions="hi" eager></agent-3d>
		<!-- 3: kiosk → BARE (force) -->
		<agent-3d id="c" class="cell" kiosk body="/avatars/cz.glb" eager></agent-3d>

		<script type="module" src="../src/element.js"></script>
	</body>
</html>
