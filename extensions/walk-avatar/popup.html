<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<title>three.ws Walk Avatar</title>
	<style>
		*, *::before, *::after { box-sizing: border-box; }
		:root {
			--bg: #0a0a0a;
			--surface: #141414;
			--border: rgba(255,255,255,0.08);
			--text: #fafafa;
			--text-2: #a1a1aa;
			--accent: #7dd3fc;
			--danger: #f87171;
			--success: #34d399;
		}
		html, body {
			margin: 0; padding: 0;
			width: 360px;
			min-height: 480px;
			background: var(--bg);
			color: var(--text);
			font-family: 'Inter', system-ui, -apple-system, sans-serif;
			font-size: 13px;
			-webkit-font-smoothing: antialiased;
		}
		.header {
			display: flex;
			align-items: center;
			justify-content: space-between;
			padding: 12px 16px;
			border-bottom: 1px solid var(--border);
		}
		.header-logo {
			font-size: 14px;
			font-weight: 600;
			color: var(--text);
		}
		.header-logo span { color: var(--accent); }
		.auth-pill {
			display: flex;
			align-items: center;
			gap: 6px;
			font-size: 11px;
			color: var(--text-2);
		}
		.auth-pill .dot {
			width: 6px; height: 6px;
			border-radius: 50%;
			background: var(--text-2);
		}
		.auth-pill.signed-in .dot { background: var(--success); }
		.sign-in-btn {
			background: transparent;
			border: 1px solid var(--border);
			color: var(--accent);
			font-size: 11px;
			padding: 3px 8px;
			border-radius: 6px;
			cursor: pointer;
		}
		.sign-in-btn:hover { background: rgba(125,211,252,0.08); }

		.tabs {
			display: flex;
			border-bottom: 1px solid var(--border);
		}
		.tab-btn {
			flex: 1;
			padding: 8px;
			background: transparent;
			border: 0;
			border-bottom: 2px solid transparent;
			color: var(--text-2);
			font-size: 12px;
			cursor: pointer;
			transition: color 0.15s, border-color 0.15s;
		}
		.tab-btn.active { color: var(--text); border-bottom-color: var(--accent); }

		.tab-panel { display: none; }
		.tab-panel.active { display: block; }

		.avatar-grid {
			display: grid;
			grid-template-columns: repeat(3, 1fr);
			gap: 8px;
			padding: 12px;
		}
		.avatar-thumb {
			aspect-ratio: 1;
			border-radius: 10px;
			overflow: hidden;
			cursor: pointer;
			border: 2px solid transparent;
			transition: border-color 0.15s;
			background: var(--surface);
		}
		.avatar-thumb.selected { border-color: var(--accent); }
		.avatar-thumb img {
			width: 100%; height: 100%;
			object-fit: cover;
			display: block;
		}
		.skeleton {
			background: linear-gradient(90deg, var(--surface) 25%, rgba(255,255,255,0.05) 50%, var(--surface) 75%);
			background-size: 200% 100%;
			animation: shimmer 1.4s infinite;
		}
		@keyframes shimmer {
			0% { background-position: -200% 0; }
			100% { background-position: 200% 0; }
		}
		.empty-state {
			padding: 32px 16px;
			text-align: center;
			color: var(--text-2);
		}
		.empty-state a {
			color: var(--accent);
			text-decoration: none;
		}

		.footer {
			padding: 12px 16px;
			border-top: 1px solid var(--border);
			display: flex;
			align-items: center;
			justify-content: space-between;
			gap: 12px;
		}
		.toggle-label {
			font-size: 12px;
			font-weight: 500;
			color: var(--text);
		}
		.toggle-sub {
			font-size: 11px;
			color: var(--text-2);
		}
		.toggle-switch {
			position: relative;
			width: 44px; height: 24px;
			flex-shrink: 0;
		}
		.toggle-switch input {
			opacity: 0; width: 0; height: 0;
		}
		.toggle-track {
			position: absolute;
			inset: 0;
			border-radius: 24px;
			background: var(--border);
			cursor: pointer;
			transition: background 0.2s;
		}
		.toggle-switch input:checked + .toggle-track { background: var(--accent); }
		.toggle-track::after {
			content: '';
			position: absolute;
			top: 3px; left: 3px;
			width: 18px; height: 18px;
			border-radius: 50%;
			background: white;
			transition: transform 0.2s;
		}
		.toggle-switch input:checked + .toggle-track::after {
			transform: translateX(20px);
		}

		.speed-row {
			padding: 8px 16px 0;
			display: flex;
			align-items: center;
			gap: 8px;
			font-size: 11px;
			color: var(--text-2);
		}
		.speed-row input[type=range] { flex: 1; accent-color: var(--accent); }

		.error-msg {
			padding: 8px 16px;
			font-size: 11px;
			color: var(--danger);
		}
	</style>
</head>
<body>
	<div class="header">
		<div class="header-logo">three<span>.ws</span> walk</div>
		<div class="auth-pill" id="auth-pill">
			<div class="dot"></div>
			<span id="auth-label">not signed in</span>
			<button class="sign-in-btn" id="sign-in-btn">Sign in</button>
		</div>
	</div>

	<div class="tabs">
		<button class="tab-btn active" data-tab="mine">My Avatars</button>
		<button class="tab-btn" data-tab="featured">Featured</button>
	</div>

	<div class="tab-panel active" id="tab-mine">
		<div class="avatar-grid" id="grid-mine">
			<div class="avatar-thumb skeleton"></div>
			<div class="avatar-thumb skeleton"></div>
			<div class="avatar-thumb skeleton"></div>
		</div>
		<div class="error-msg" id="error-mine" style="display:none"></div>
	</div>

	<div class="tab-panel" id="tab-featured">
		<div class="avatar-grid" id="grid-featured">
			<div class="avatar-thumb skeleton"></div>
			<div class="avatar-thumb skeleton"></div>
			<div class="avatar-thumb skeleton"></div>
		</div>
		<div class="error-msg" id="error-featured" style="display:none"></div>
	</div>

	<div class="speed-row">
		<span>Speed</span>
		<input type="range" id="speed-slider" min="0.5" max="2" step="0.1" value="1" />
		<span id="speed-val">1.0×</span>
	</div>

	<div class="footer">
		<div>
			<div class="toggle-label">Enable on this site</div>
			<div class="toggle-sub" id="current-site">–</div>
		</div>
		<label class="toggle-switch">
			<input type="checkbox" id="enable-toggle" />
			<div class="toggle-track"></div>
		</label>
	</div>

	<script src="popup.js"></script>
</body>
</html>
