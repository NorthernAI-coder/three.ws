# Cloud Build pipeline: build the avatar-reconstruction Docker image and deploy
# it to Cloud Run (GPU) in us-central1.
#
# Substitution variables (override via --substitutions flag or trigger config):
#   _REGION         — Cloud Run region            (default: us-central1)
#   _SERVICE        — Cloud Run service name      (default: avatar-reconstruction)
#   _REPO           — Artifact Registry repo name  (default: avatar-reconstruction)
#   _GCS_BUCKET     — Cloud Storage bucket for output GLBs
#   _MIN_INSTANCES  — minimum warm instances       (default: 1)
#   _MAX_INSTANCES  — maximum instances            (default: 3)
#
# Required secrets in Secret Manager (must exist before first deploy):
#   avatar-reconstruction-key — the API_KEY bearer secret

substitutions:
  _REGION: us-central1
  _SERVICE: avatar-reconstruction
  _REPO: avatar-reconstruction
  _GCS_BUCKET: three-ws-avatar-reconstructions
  _MIN_INSTANCES: "1"   # keep one warm — face pipeline cold-start is ~15 s
  _MAX_INSTANCES: "5"   # scale out for burst selfie creation

steps:
  # ── Build ──────────────────────────────────────────────────────────────────
  - id: build
    name: gcr.io/cloud-builders/docker
    dir: workers/avatar-reconstruction
    args:
      - build
      - --tag
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/server:$SHORT_SHA
      - --tag
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/server:latest
      - --cache-from
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/server:latest
      - .

  # ── Push ───────────────────────────────────────────────────────────────────
  - id: push
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/server

  # ── Deploy to Cloud Run ────────────────────────────────────────────────────
  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/server:$SHORT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --port=8080
      # GPU: NVIDIA L4 (24 GB VRAM) — sufficient for InstantMesh-large
      - --gpu=1
      - --gpu-type=nvidia-l4
      - --cpu=4
      - --memory=8Gi
      - --min-instances=${_MIN_INSTANCES}
      - --max-instances=${_MAX_INSTANCES}
      # Face texture pipeline completes in ~30 s; 120 s is generous headroom.
      - --timeout=120
      # Cloud Run IAM handles external auth; the service itself checks API_KEY.
      - --allow-unauthenticated
      - --set-env-vars=GCS_BUCKET=${_GCS_BUCKET},FIRESTORE_PROJECT=$PROJECT_ID,DEVICE=cuda
      - --set-secrets=API_KEY=avatar-reconstruction-key:latest

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/server:$SHORT_SHA
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/server:latest

options:
  # Use a beefier builder machine to speed up the large Docker build.
  machineType: E2_HIGHCPU_32
  logging: CLOUD_LOGGING_ONLY
