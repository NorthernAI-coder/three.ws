<!doctype html>
<html>
<head><meta charset="utf-8"><style>
  html,body{margin:0;background:#0e0f12;}
  /* mimic the gallery card backdrop */
  .row{display:flex;gap:24px;padding:24px;}
  .card{width:320px;height:380px;background:#15171c;border:1px solid #23262d;border-radius:12px;overflow:hidden;position:relative;}
  .lbl{position:absolute;top:8px;left:10px;z-index:5;font:600 12px system-ui;color:#cdd2da;}
  #old,#new{width:100%;height:100%;}
</style></head>
<body>
  <div class="row">
    <div class="card"><span class="lbl">BEFORE (old lighting)</span><div id="old"></div></div>
    <div class="card"><span class="lbl">AFTER (studio rig)</span><div id="new"></div></div>
  </div>
  <script type="module">
    import { Viewer } from '/src/viewer.js';
    import { LinearToneMapping } from 'three';

    const MODEL = '/avatars/realistic-female.glb';

    async function make(elId, degrade) {
      const v = new Viewer(document.getElementById(elId), { kiosk: true });
      v.renderer?.setClearAlpha(0);
      if (v.scene) v.scene.background = null;
      await v.load(MODEL, '', new Map());
      if (degrade) {
        // Reconstruct the pre-change look: flat single-key, Linear tonemap,
        // no IBL lift, no fill/rim.
        v.state.toneMapping = LinearToneMapping;
        v.state.ambientIntensity = 0.3;
        v.state.environmentIntensity = 1.0;
        v.state.fillRatio = 0;
        v.state.rimRatio = 0;
        v.updateLights();
      }
      return v;
    }

    await make('old', true);
    await make('new', false);
    // give a couple frames + env/anim settle
    await new Promise(r => setTimeout(r, 1200));
    window.__ready = true;
  </script>
</body>
</html>
