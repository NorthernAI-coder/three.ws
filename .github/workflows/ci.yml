# CI — unit tests + e2e smoke on every push and pull request.
#
# Two jobs run in parallel:
#   unit:  vitest run — fast, no browser, no server. Catches logic regressions
#          in API handlers, SDK libs, and front-end utilities.
#   e2e:   playwright test — boots the Vite dev server and drives real Chromium
#          through the critical /club and avatar-editor flows.
#
# Both jobs must pass for a PR to merge.

name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Unit tests (vitest) ───────────────────────────────────────────────────
  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest
        run: npx vitest run

  # ── E2E smoke (playwright) ────────────────────────────────────────────────
  e2e:
    name: E2E smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npx playwright test

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
