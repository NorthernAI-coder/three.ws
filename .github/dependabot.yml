# Dependabot config — auto-PR weekly for npm + GitHub Actions updates.
#
# Strategy:
#   - npm: weekly batched PRs (per-package PR storms are unmanageable for a
#     repo this size). Patch + minor go in one combined PR; majors get their
#     own PR so we can review the changelog before merging.
#   - actions: pinned via SHA elsewhere, but Dependabot still helps with
#     version-tag bumps in workflows we author.
#
# Security alerts always open immediately regardless of schedule.

version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "10:00"
      timezone: America/Los_Angeles
    open-pull-requests-limit: 5
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
    ignore:
      # Three.js majors break a lot at once — pin until we manually upgrade.
      - dependency-name: three
        update-types: [version-update:semver-major]
      # ethers v6 → v7 will need a code sweep when the time comes.
      - dependency-name: ethers
        update-types: [version-update:semver-major]
      # Colyseus is 0.x, so a "minor" bump is breaking: 0.16 → 0.17 requires
      # @colyseus/schema v4 (new wire format + API), but we pin schema at 3.0.76
      # because multiplayer/src/schemas.js uses the v3 defineTypes/positional-
      # field encoding. Allow only 0.16.x patches until we migrate to schema v4
      # deliberately. (Grouping a core@0.17 bump with a pinned schema@3 yields an
      # unsatisfiable peer dep — schema@^4.0.7 — and breaks `npm install`.)
      - dependency-name: "@colyseus/*"
        update-types:
          - version-update:semver-minor
          - version-update:semver-major
    labels:
      - dependencies
      - automerge-eligible

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - github-actions
