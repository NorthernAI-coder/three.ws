<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Club · T.Pain</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}

body{
  font-family:system-ui,sans-serif;
  display:flex;align-items:center;justify-content:center;
  height:100vh;
  background:#06060f;
  transition:background 1.6s ease;
}
body.inside{background:#160328}

/* ── neon glow overlay, only inside ── */
.bg-glow{
  position:fixed;inset:0;pointer-events:none;
  opacity:0;transition:opacity 1.6s ease;
  background:
    radial-gradient(ellipse 70% 50% at 50% 110%,rgba(185,0,255,.35),transparent),
    radial-gradient(ellipse 50% 70% at 15% 60%,rgba(0,200,255,.1),transparent),
    radial-gradient(ellipse 50% 70% at 85% 60%,rgba(255,0,150,.1),transparent);
}
body.inside .bg-glow{opacity:1}

/* brick-wall texture: only outside */
.wall{
  position:fixed;inset:0;pointer-events:none;
  background:
    repeating-linear-gradient(0deg,transparent,transparent 28px,rgba(255,255,255,.015) 28px,rgba(255,255,255,.015) 29px),
    repeating-linear-gradient(90deg,transparent,transparent 58px,rgba(255,255,255,.01) 58px,rgba(255,255,255,.01) 59px);
  transition:opacity 1.6s;
}
body.inside .wall{opacity:0}

/* floating particles: only inside */
.particles{position:fixed;inset:0;pointer-events:none;overflow:hidden}
.p{position:absolute;width:3px;height:3px;border-radius:50%;opacity:0;transition:opacity 1.6s;animation:pfloat 5s ease-in-out infinite}
body.inside .p{opacity:.7}
.p:nth-child(1){left:12%;top:18%;background:#ff3cac;animation-delay:0s}
.p:nth-child(2){left:88%;top:30%;background:#00d4ff;animation-delay:.8s}
.p:nth-child(3){left:48%;top:12%;background:#ff6600;animation-delay:1.5s}
.p:nth-child(4){left:72%;top:65%;background:#ff3cac;animation-delay:2.2s}
.p:nth-child(5){left:22%;top:72%;background:#00d4ff;animation-delay:3s}
.p:nth-child(6){left:60%;top:85%;background:#b84fff;animation-delay:1.1s}
@keyframes pfloat{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-22px) scale(1.6)}}

/* ── center column ── */
.ui{
  position:relative;z-index:10;
  display:flex;flex-direction:column;align-items:center;gap:0;
  padding:32px 24px;
}

/* sign */
.sign{
  font-size:10px;letter-spacing:.35em;text-transform:uppercase;
  color:#ff3cac;
  text-shadow:0 0 0 transparent;
  transition:opacity 1.6s,text-shadow 1.6s;
  opacity:.15;margin-bottom:4px;
}
body.inside .sign{
  opacity:1;
  text-shadow:0 0 14px #ff3cac,0 0 40px #ff3cac60;
}

/* location label */
.where{
  font-size:24px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  transition:color 1.6s,text-shadow 1.6s;
  color:#222233;margin-bottom:20px;
}
body.inside .where{
  color:#fff;
  text-shadow:0 0 24px rgba(185,0,255,.7);
}

/* ── visualizer ── */
canvas{
  width:320px;height:68px;
  border-radius:4px;display:block;
  margin-bottom:20px;
}

/* ── play button ── */
.play-btn{
  width:60px;height:60px;border-radius:50%;border:none;cursor:pointer;
  font-size:22px;line-height:1;
  display:flex;align-items:center;justify-content:center;
  transition:background 1.6s,box-shadow .2s,transform .1s;
  background:#111122;color:#333355;
  box-shadow:0 0 0 2px #1e1e33;
  margin-bottom:18px;
}
body.inside .play-btn{
  background:linear-gradient(135deg,#b84fff,#7c3aed);
  color:#fff;
  box-shadow:0 0 24px rgba(184,79,255,.5);
}
.play-btn:hover{transform:scale(1.06)}
.play-btn.playing{animation:pulse 1.8s ease infinite}
@keyframes pulse{
  0%,100%{box-shadow:0 0 24px rgba(184,79,255,.4)}
  50%{box-shadow:0 0 44px rgba(184,79,255,.75)}
}

/* ── DOOR ── */
.door-wrap{
  position:relative;
  perspective:900px;
  margin-bottom:6px;
}

.door-frame{
  width:130px;height:195px;
  border:3px solid #1c1c2c;
  position:relative;overflow:hidden;
  transition:border-color 1.6s,box-shadow 1.6s;
  box-shadow:
    0 0 0 5px #08080f,
    inset 0 0 30px rgba(0,0,0,.9),
    /* light seeping around the door from inside */
    0 0 6px 2px rgba(185,0,255,.25),
    0 0 1px 0 rgba(185,0,255,.4);
}
body.inside .door-frame{
  border-color:#3a1a5a;
  box-shadow:
    0 0 0 5px #160328,
    inset 0 0 20px rgba(0,0,0,.5),
    0 0 30px rgba(185,0,255,.45);
}

/* club interior glimpsed through open door */
.door-inside{
  position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 90%,#3a0060 0%,#1a002e 55%,#080012 100%);
  overflow:hidden;
}
.lasers{position:absolute;inset:0}
.laser{
  position:absolute;bottom:0;
  width:2px;height:75%;
  opacity:.55;
}
.laser:nth-child(1){left:28%;background:linear-gradient(to top,#ff00cc,transparent);animation:la 3.2s ease-in-out infinite}
.laser:nth-child(2){left:50%;background:linear-gradient(to top,#00ccff,transparent);animation:lb 3.8s ease-in-out infinite .5s}
.laser:nth-child(3){left:72%;background:linear-gradient(to top,#ff6600,transparent);animation:lc 4.1s ease-in-out infinite 1s}
@keyframes la{0%,100%{transform:rotate(-18deg)}50%{transform:rotate(-4deg)}}
@keyframes lb{0%,100%{transform:rotate(0deg)}50%{transform:rotate(16deg)}}
@keyframes lc{0%,100%{transform:rotate(18deg)}50%{transform:rotate(4deg)}}
.floor{
  position:absolute;bottom:0;width:100%;height:38%;
  background:
    linear-gradient(to top,rgba(0,0,0,.85),transparent),
    repeating-linear-gradient(90deg,rgba(255,255,255,.04) 0,rgba(255,255,255,.04) 1px,transparent 1px,transparent 18px),
    repeating-linear-gradient(0deg,rgba(255,255,255,.04) 0,rgba(255,255,255,.04) 1px,transparent 1px,transparent 18px);
}

/* the door panel swings on its left hinge */
.door-panel{
  position:absolute;inset:0;
  background:linear-gradient(160deg,#1e1e30 0%,#121220 70%,#0d0d1a 100%);
  transform-origin:left center;
  transform:perspective(900px) rotateY(0deg);
  transition:transform 1s cubic-bezier(.25,.46,.45,.94);
  will-change:transform;
}
.door-panel.open{transform:perspective(900px) rotateY(-76deg)}

/* door panels (decorative insets) */
.door-panel::before,.door-panel::after{
  content:'';position:absolute;
  left:10px;right:10px;
  border:1px solid #1a1a28;
}
.door-panel::before{top:10px;height:44%}
.door-panel::after{bottom:10px;height:38%}

/* handle */
.handle{
  position:absolute;right:14px;top:50%;transform:translateY(-50%);
  width:8px;height:28px;
  background:linear-gradient(to bottom,#4a4a6a,#2a2a40,#4a4a6a);
  border-radius:4px;
  box-shadow:0 1px 4px rgba(0,0,0,.8);
}

/* door label */
.door-label{
  position:absolute;bottom:-30px;left:50%;transform:translateX(-50%);
  font-size:11px;letter-spacing:.1em;text-transform:uppercase;
  color:#333355;white-space:nowrap;
  cursor:pointer;
  transition:color .2s;
  user-select:none;
}
.door-label:hover{color:#b84fff}

/* status */
.status{
  font-size:10px;letter-spacing:.1em;text-transform:uppercase;
  transition:color 1.6s;color:#1a1a2a;
  margin-top:36px;
}
body.inside .status{color:#7744aa}

/* mobile */
@media(max-width:440px){
  .door-frame{width:104px;height:156px}
  canvas{width:260px}
  .where{font-size:20px}
}
</style>
</head>
<body>

<div class="bg-glow"></div>
<div class="wall"></div>
<div class="particles">
  <div class="p"></div><div class="p"></div><div class="p"></div>
  <div class="p"></div><div class="p"></div><div class="p"></div>
</div>

<div class="ui">
  <div class="sign">Club Three</div>
  <div class="where" id="where">Outside</div>

  <canvas id="viz"></canvas>
  <button class="play-btn" id="playBtn" aria-label="Play">▶</button>

  <div class="door-wrap">
    <div class="door-frame" id="doorFrame">
      <div class="door-inside">
        <div class="lasers">
          <div class="laser"></div>
          <div class="laser"></div>
          <div class="laser"></div>
        </div>
        <div class="floor"></div>
      </div>
      <div class="door-panel" id="doorPanel">
        <div class="handle"></div>
      </div>
    </div>
    <div class="door-label" id="doorLabel" role="button" tabindex="0">Enter the club →</div>
  </div>

  <div class="status" id="status">tap play to start</div>
</div>

<script>
(function () {
  'use strict';

  // ── audio state ────────────────────────────────────────────────────────────
  var ctx, sourceNode, bassFilter, lowPassFilter;
  var dryGain, outdoorConv, indoorConv, outdoorWet, indoorWet, masterGain, analyser;
  var animId, playing = false, audioBuffer = null, startTime = 0, pauseOffset = 0;
  var isInside = false;

  // outside: heavy bass (wall frequencies), brutal lowpass, huge wet outdoor reverb, quieter
  // inside:  full spectrum, tight room reverb, full volume
  var P = {
    out: { lowpass: 420, lowpassQ: 1.2, bass: 22, dry: 0.22, oWet: 0.88, iWet: 0.0,  master: 0.72 },
    in:  { lowpass: 17000, lowpassQ: 0.5, bass:  9, dry: 0.60, oWet: 0.0,  iWet: 0.30, master: 1.0  }
  };

  // Synthetic impulse response.
  // outdoor: long (5s), sparse echoes bouncing off building — sounds like outdoor reverb
  // indoor:  short (1.5s), dense — tight club room
  function buildIR(audioCtx, duration, decay, density) {
    var rate = audioCtx.sampleRate;
    var len  = Math.floor(rate * duration);
    var buf  = audioCtx.createBuffer(2, len, rate);
    for (var c = 0; c < 2; c++) {
      var ch = buf.getChannelData(c);
      for (var i = 0; i < len; i++) {
        var r = (density >= 1) ? (Math.random() * 2 - 1)
                               : (Math.random() < density ? (Math.random() * 2 - 1) : 0);
        ch[i] = r * Math.pow(1 - i / len, decay);
      }
    }
    return buf;
  }

  function initAudio() {
    if (ctx) return Promise.resolve();
    ctx = new (window.AudioContext || window.webkitAudioContext)();

    bassFilter = ctx.createBiquadFilter();
    bassFilter.type = 'lowshelf';
    bassFilter.frequency.value = 90;
    bassFilter.gain.value = P.out.bass;

    lowPassFilter = ctx.createBiquadFilter();
    lowPassFilter.type = 'lowpass';
    lowPassFilter.frequency.value = P.out.lowpass;
    lowPassFilter.Q.value = P.out.lowpassQ;

    dryGain = ctx.createGain();
    dryGain.gain.value = P.out.dry;

    outdoorConv = ctx.createConvolver();
    outdoorConv.buffer = buildIR(ctx, 5.0, 1.0, 0.32); // sparse, slow decay
    outdoorWet = ctx.createGain();
    outdoorWet.gain.value = P.out.oWet;

    indoorConv = ctx.createConvolver();
    indoorConv.buffer = buildIR(ctx, 1.5, 2.8, 1.0);  // dense, fast decay
    indoorWet = ctx.createGain();
    indoorWet.gain.value = P.out.iWet;

    masterGain = ctx.createGain();
    masterGain.gain.value = P.out.master;

    analyser = ctx.createAnalyser();
    analyser.fftSize = 256;

    // graph: source → bass → lowpass → dry ──────────────────┐
    //                               → outdoorConv → outdoorWet ┼→ master → analyser → dest
    //                               → indoorConv  → indoorWet ─┘
    dryGain.connect(masterGain);
    outdoorConv.connect(outdoorWet); outdoorWet.connect(masterGain);
    indoorConv.connect(indoorWet);   indoorWet.connect(masterGain);
    masterGain.connect(analyser);
    analyser.connect(ctx.destination);

    setStatus('loading…');
    return fetch('im-in-love-wit-a-stripper-fast.mp3')
      .then(function (r) { if (!r.ok) throw new Error(r.status); return r.arrayBuffer(); })
      .then(function (ab) { return ctx.decodeAudioData(ab); })
      .then(function (buf) { audioBuffer = buf; setStatus('tap play to start'); })
      .catch(function (e) { setStatus('load error: ' + e.message); });
  }

  function startPlayback() {
    if (sourceNode) { try { sourceNode.disconnect(); } catch (_) {} }
    sourceNode = ctx.createBufferSource();
    sourceNode.buffer = audioBuffer;
    sourceNode.connect(bassFilter);
    bassFilter.connect(lowPassFilter);
    lowPassFilter.connect(dryGain);
    lowPassFilter.connect(outdoorConv);
    lowPassFilter.connect(indoorConv);
    sourceNode.start(0, pauseOffset);
    startTime = ctx.currentTime - pauseOffset;
    sourceNode.onended = function () {
      if (!playing) return;
      playing = false; pauseOffset = 0;
      playBtn.textContent = '▶';
      playBtn.classList.remove('playing');
      setStatus('finished');
      cancelAnimationFrame(animId);
    };
  }

  // smooth all parameters over ~tc seconds
  function transitionAudio(inside) {
    if (!ctx) return;
    var p = inside ? P.in : P.out;
    var t = ctx.currentTime, tc = 0.9;
    bassFilter.gain.setTargetAtTime(p.bass, t, tc);
    lowPassFilter.frequency.setTargetAtTime(p.lowpass, t, tc);
    lowPassFilter.Q.setTargetAtTime(p.lowpassQ, t, tc);
    dryGain.gain.setTargetAtTime(p.dry, t, tc);
    outdoorWet.gain.setTargetAtTime(p.oWet, t, tc);
    indoorWet.gain.setTargetAtTime(p.iWet, t, tc);
    masterGain.gain.setTargetAtTime(p.master, t, tc);
  }

  // ── visualizer ────────────────────────────────────────────────────────────
  var canvas  = document.getElementById('viz');
  var canCtx  = canvas.getContext('2d');
  var vizMode = 0; // 0=outside 1=inside, interpolates

  function drawViz() {
    animId = requestAnimationFrame(drawViz);
    // smoothly interpolate vizMode toward target
    var target = isInside ? 1 : 0;
    vizMode += (target - vizMode) * 0.03;

    var W = canvas.width  = canvas.offsetWidth;
    var H = canvas.height = canvas.offsetHeight;
    var data = new Uint8Array(analyser.frequencyBinCount);
    analyser.getByteFrequencyData(data);
    canCtx.clearRect(0, 0, W, H);

    // outside: only low ~25% of bins; inside: all bins — lerp the count
    var maxBins   = data.length;
    var binCount  = Math.round(maxBins * (0.22 + vizMode * 0.78));
    var barW      = (W / binCount) - 1;

    for (var i = 0; i < binCount; i++) {
      var v  = data[i] / 255;
      var h  = v * H;
      if (h < 1) continue;
      var t  = i / binCount;
      // outside: desaturated cool blue-grey; inside: vivid purple→pink
      var sat  = Math.round(20  + vizMode * 65);
      var hue  = Math.round(220 + vizMode * (t * 80));
      var lgt  = Math.round(30  + v * 35);
      var alpha = 0.5 + v * 0.5;
      canCtx.fillStyle = 'hsla(' + hue + ',' + sat + '%,' + lgt + '%,' + alpha + ')';
      canCtx.fillRect(i * (barW + 1), H - h, barW, h);
    }
  }

  // ── scene toggle ──────────────────────────────────────────────────────────
  var playBtn   = document.getElementById('playBtn');
  var doorPanel = document.getElementById('doorPanel');
  var doorLabel = document.getElementById('doorLabel');
  var where     = document.getElementById('where');
  function setStatus(t) { document.getElementById('status').textContent = t; }

  function toggleScene() {
    isInside = !isInside;
    document.body.classList.toggle('inside', isInside);
    doorPanel.classList.toggle('open', isInside);
    where.textContent     = isInside ? 'Inside'            : 'Outside';
    doorLabel.textContent = isInside ? '← Step outside'   : 'Enter the club →';
    if (playing) setStatus(isInside ? 'inside the club' : 'outside the club');
    transitionAudio(isInside);
  }

  doorLabel.addEventListener('click', toggleScene);
  doorLabel.addEventListener('keydown', function (e) {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); toggleScene(); }
  });
  // clicking the door frame (anywhere on the door) also toggles
  document.getElementById('doorFrame').addEventListener('click', toggleScene);

  // ── play / pause ──────────────────────────────────────────────────────────
  playBtn.addEventListener('click', function () {
    initAudio().then(function () {
      if (!audioBuffer) return;
      if (ctx.state === 'suspended') ctx.resume();
      if (playing) {
        pauseOffset = ctx.currentTime - startTime;
        sourceNode.stop();
        playing = false;
        playBtn.textContent = '▶';
        playBtn.classList.remove('playing');
        setStatus('paused');
        cancelAnimationFrame(animId);
      } else {
        startPlayback();
        playing = true;
        playBtn.textContent = '⏸';
        playBtn.classList.add('playing');
        setStatus(isInside ? 'inside the club' : 'outside the club');
        drawViz();
      }
    });
  });
})();
</script>
</body>
</html>
