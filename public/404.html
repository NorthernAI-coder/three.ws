<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>three.ws — 404</title>
		<meta name="robots" content="noindex" />
		<link rel="stylesheet" href="/fonts/fonts.css" />
		<link rel="stylesheet" href="/nav.css" />
		<style>
			:root { color-scheme: dark; }
			*, *::before, *::after { box-sizing: border-box; }
			html, body { height: 100%; margin: 0; background: #08090f; color: #ccc; font: 15px/1.5 'Inter', -apple-system, system-ui, sans-serif; overflow: hidden; }

			#avatar-canvas {
				position: fixed; inset: 0;
				width: 100vw; height: 100vh;
				pointer-events: none; z-index: 999;
			}

			.stage {
				min-height: calc(100vh - 58px);
				display: flex; flex-direction: column; align-items: center; justify-content: center;
				gap: 28px; padding: 40px 24px 60px;
				text-align: center;
			}
			.eyebrow {
				display: inline-flex; align-items: center; gap: 9px;
				font-size: 11px; font-weight: 600;
				letter-spacing: 0.17em; text-transform: uppercase;
				color: #999;
				font-family: 'Space Grotesk', 'Inter', sans-serif;
			}
			.eyebrow-dot {
				width: 7px; height: 7px; border-radius: 50%;
				background: #888; box-shadow: 0 0 6px rgba(255,255,255,0.2);
				animation: blink 2.2s ease-in-out infinite;
			}
			@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.15} }

			.bignum {
				font-family: 'Space Grotesk', 'Inter', sans-serif;
				font-weight: 800; letter-spacing: -0.06em;
				font-size: clamp(140px, 28vw, 320px);
				line-height: 0.85;
				margin: 0;
				color: #fff;
				text-shadow: var(--agent-shadow, none);
				transition: text-shadow 90ms linear;
				user-select: none;
			}
			.bignum em { color: #666; font-style: normal; }

			.line {
				font-family: 'Space Grotesk', 'Inter', sans-serif;
				font-size: clamp(20px, 2.4vw, 28px); font-weight: 700;
				margin: 0; color: #ddd; letter-spacing: -0.015em;
			}
			.sub { color: #555; max-width: 44ch; margin: 0; font-size: 15px; }

			.actions { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; margin-top: 8px; }
			.btn {
				display: inline-flex; align-items: center; gap: 10px;
				padding: 14px 26px; border: none; border-radius: 12px;
				font: 700 14.5px/1 'Inter', inherit; cursor: pointer; text-decoration: none;
				user-select: none;
				transform-origin: bottom center;
				will-change: transform;
			}
			.btn-primary {
				background: #fff;
				color: #0a0b0f;
				box-shadow: 0 7px 0 0 #555, 0 9px 24px rgba(0,0,0,0.4);
			}
			.btn-primary:hover { background: #e8e8e8; }
			.btn-ghost {
				background: rgba(255,255,255,0.04); color: #888;
				border: 1.5px solid rgba(255,255,255,0.1);
				box-shadow: 0 4px 0 0 rgba(255,255,255,0.03);
			}
			.btn-ghost:hover { color: #ccc; border-color: rgba(255,255,255,0.25); }
		</style>
	</head>
	<body>
		<div id="nav-container"></div>
		<script src="/nav.js"></script>

		<div class="stage">
			<div class="eyebrow"><span class="eyebrow-dot"></span><span>Lost in 3D</span></div>
			<h1 class="bignum" id="bignum"><span id="four-a">4</span><em id="zero">0</em><span id="four-b">4</span></h1>
			<p class="line" id="lost-line">Your agent took a wrong turn.</p>
			<p class="sub">This page does not exist on three.ws — but she landed here, looked around, and seems pretty confused. Send her home.</p>
			<div class="actions">
				<a href="/" class="btn btn-primary" id="home-btn">
					<span>Take her home</span>
					<span>&rarr;</span>
				</a>
				<a href="/demos/" class="btn btn-ghost" id="lab-btn">
					<span>Back to lab</span>
				</a>
			</div>
		</div>

		<canvas id="avatar-canvas"></canvas>

		<script type="module">
			import { createAgentUI } from '@three-ws/agent-ui';

			const zero    = document.getElementById('zero');
			const homeBtn = document.getElementById('home-btn');
			const labBtn  = document.getElementById('lab-btn');

			const agent = await createAgentUI({
				canvas: document.getElementById('avatar-canvas'),
				clips: ['idle', 'walk', 'falling'],
			});

			agent.fx.proximityShadow(document.getElementById('bignum'));

			await agent.fallOnto(zero, {
				duration: 1.4,
				landingOffsetPx: 90,
				tumble: 0.25,
				onLand: () => {
					agent.fx.dust(zero);
					agent.fx.impactPulse(zero);
				},
			});

			agent.play('idle', { loop: true });
			const t0 = performance.now();
			(function lookAround() {
				if (agent._runningOff) return;
				const t = (performance.now() - t0) / 1000;
				agent.avatar.rotation.y = Math.sin(t * 1.25) * 0.35;
				requestAnimationFrame(lookAround);
			})();

			agent.interceptNavigation(homeBtn, { direction: 'right', delay: 1100 });
			agent.interceptNavigation(labBtn,  { direction: 'left',  delay: 1100 });
		</script>
		<script src="/brand.js" defer></script>
</body>
</html>
