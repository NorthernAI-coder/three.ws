<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>Brain · three.ws</title>
	<meta name="description" content="Chat with Claude, GPT, Qwen, and Llama side-by-side. Multi-turn conversations, streaming responses, real token metrics." />
	<link rel="canonical" href="https://three.ws/brain" />
	<meta property="og:title" content="Brain · three.ws" />
	<meta property="og:description" content="Chat with Claude, GPT, Qwen, and Llama. Multi-turn conversations, streaming, real token metrics." />
	<meta property="og:url" content="https://three.ws/brain" />
	<meta name="twitter:card" content="summary_large_image" />
	<link rel="icon" href="/favicon.ico" />
	<link rel="stylesheet" href="/style.css" />
	<link rel="stylesheet" href="/nav.css" />
	<script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
	<style>
		:root {
			color-scheme: dark;
			--bg: #05060a;
			--surface: #0c0d13;
			--surface2: #111219;
			--border: #1a1b26;
			--border2: #24253a;
			--text: #e8e9f0;
			--text2: #8b8d9e;
			--text3: #555768;
			--accent: #3dc1ff;
			--accent-dim: rgba(61,193,255,0.12);
			--ok: #22d17a;
			--warn: #f5a623;
			--err: #ff5a5a;
			--anthropic: #d4a87a;
			--openai: #74aa82;
			--groq: #a78bfa;
			--alibaba: #ff6a3d;
			--modelscope: #5b8def;
			--r: 12px;
			--r-sm: 8px;
		}
		*, *::before, *::after { box-sizing: border-box; }
		html, body {
			margin: 0; padding: 0;
			background: var(--bg); color: var(--text);
			font: 14px/1.55 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
			min-height: 100vh;
		}
		a { color: inherit; text-decoration: none; }
		button { font-family: inherit; cursor: pointer; border: 0; }

		.page {
			max-width: 1320px; margin: 0 auto;
			padding: 28px 20px 80px;
			display: flex; flex-direction: column; gap: 0;
		}
		.page-header {
			display: flex; align-items: center; justify-content: space-between;
			margin-bottom: 18px; flex-wrap: wrap; gap: 12px;
		}
		.breadcrumb { font-size: 13px; color: var(--text3); }
		.breadcrumb a { color: var(--text2); }
		.breadcrumb a:hover { color: var(--text); }
		.page-title { font-size: 22px; font-weight: 700; letter-spacing: -0.02em; margin: 0; }
		.mode-tabs {
			display: flex; background: var(--surface); border: 1px solid var(--border);
			border-radius: var(--r-sm); padding: 3px; gap: 2px;
		}
		.mode-tab {
			padding: 6px 18px; border-radius: 6px;
			font-size: 13px; font-weight: 500; color: var(--text2);
			background: transparent; transition: background 0.15s, color 0.15s;
		}
		.mode-tab.active { background: var(--surface2); color: var(--text); }
		.mode-tab:hover:not(.active) { color: var(--text); }

		/* Chat layout */
		#chat-view { display: flex; gap: 16px; height: calc(100vh - 190px); min-height: 500px; }
		#compare-view { display: none; }

		/* Model sidebar */
		.model-sidebar {
			width: 220px; flex-shrink: 0;
			display: flex; flex-direction: column; gap: 6px;
			overflow-y: auto;
		}
		.sidebar-label {
			font-size: 10px; font-weight: 600; letter-spacing: 0.14em;
			text-transform: uppercase; color: var(--text3);
			padding: 0 4px; margin-bottom: 2px;
		}
		.model-card {
			padding: 10px 12px; border-radius: var(--r-sm);
			border: 1.5px solid var(--border);
			background: var(--surface); cursor: pointer;
			transition: border-color 0.15s, background 0.15s;
		}
		.model-card:hover { border-color: var(--border2); background: var(--surface2); }
		.model-card.selected {
			border-color: var(--accent);
			background: rgba(61,193,255,0.06);
		}
		.model-card-name {
			font-size: 13px; font-weight: 600; margin-bottom: 2px;
			display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
		}
		.model-badge {
			font-size: 9px; font-weight: 700; letter-spacing: 0.08em;
			text-transform: uppercase; padding: 1px 5px; border-radius: 4px;
		}
		.badge-flagship  { background: rgba(212,168,122,0.15); color: var(--anthropic); }
		.badge-balanced  { background: rgba(61,193,255,0.12); color: var(--accent); }
		.badge-fast      { background: rgba(34,209,122,0.12); color: var(--ok); }
		.badge-reasoning { background: rgba(167,139,250,0.15); color: var(--groq); }
		.model-card.unavailable { opacity: 0.45; pointer-events: none; }
		.model-card.unavailable .model-badge::after { content: ' · unavailable'; }
		.model-net { font-size: 10.5px; color: var(--text3); margin-bottom: 4px; }
		.model-desc { font-size: 11.5px; color: var(--text2); line-height: 1.4; }
		.net-anthropic  { color: var(--anthropic); }
		.net-openai     { color: var(--openai); }
		.net-groq       { color: var(--groq); }
		.net-alibaba    { color: var(--alibaba); }
		.net-modelscope { color: var(--modelscope); }
		.net-deepseek   { color: #60b8ff; }

		/* Chat panel */
		.chat-panel {
			flex: 1; min-width: 0;
			display: flex; flex-direction: column;
			border: 1.5px solid var(--border); border-radius: var(--r);
			overflow: hidden; background: var(--surface);
		}
		.chat-topbar {
			display: flex; align-items: center; justify-content: space-between;
			padding: 10px 16px; border-bottom: 1px solid var(--border);
			background: var(--surface2); flex-shrink: 0;
		}
		.chat-model-label {
			font-size: 13px; font-weight: 600; color: var(--text);
			display: flex; align-items: center; gap: 8px;
		}
		.chat-model-dot {
			width: 7px; height: 7px; border-radius: 50%; background: var(--ok);
		}
		.chat-topbar-actions { display: flex; gap: 6px; }
		.icon-btn {
			background: transparent; color: var(--text2); padding: 5px 8px;
			border-radius: 6px; font-size: 12px; border: 1px solid transparent;
			transition: background 0.12s, color 0.12s, border-color 0.12s;
		}
		.icon-btn:hover { background: var(--surface); color: var(--text); border-color: var(--border); }

		/* Messages */
		.messages {
			flex: 1; overflow-y: auto; padding: 20px 20px 8px;
			display: flex; flex-direction: column; gap: 18px;
			scroll-behavior: smooth;
		}
		.messages::-webkit-scrollbar { width: 4px; }
		.messages::-webkit-scrollbar-track { background: transparent; }
		.messages::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }
		.msg { display: flex; flex-direction: column; gap: 4px; max-width: 100%; }
		.msg-role {
			font-size: 10.5px; font-weight: 700; letter-spacing: 0.12em;
			text-transform: uppercase; color: var(--text3);
		}
		.msg-role .model-tag { color: var(--accent); }
		.msg-bubble {
			padding: 12px 16px; border-radius: 10px;
			font-size: 14px; line-height: 1.6;
		}
		.msg.user .msg-bubble {
			background: var(--surface2); color: var(--text);
			border: 1px solid var(--border);
			align-self: flex-end; max-width: 82%;
		}
		.msg.assistant .msg-bubble {
			background: transparent; color: var(--text);
			border: 1px solid var(--border); max-width: 100%;
		}
		.msg.assistant .msg-bubble.streaming {
			border-color: var(--border2);
			background: rgba(61,193,255,0.03);
		}
		.msg-bubble p { margin: 0 0 10px; }
		.msg-bubble p:last-child { margin: 0; }
		.msg-bubble h1, .msg-bubble h2, .msg-bubble h3 {
			font-size: 15px; font-weight: 600; margin: 14px 0 6px; letter-spacing: -0.01em;
		}
		.msg-bubble h1:first-child, .msg-bubble h2:first-child, .msg-bubble h3:first-child { margin-top: 0; }
		.msg-bubble ul, .msg-bubble ol { margin: 6px 0; padding-left: 20px; }
		.msg-bubble li { margin: 3px 0; }
		.msg-bubble code {
			font-family: "SF Mono", ui-monospace, Menlo, Consolas, monospace;
			font-size: 12.5px; background: rgba(255,255,255,0.07);
			padding: 1px 5px; border-radius: 4px; color: var(--accent);
		}
		.msg-bubble pre {
			background: rgba(0,0,0,0.35); border: 1px solid var(--border2);
			border-radius: 8px; padding: 12px 14px; overflow-x: auto; margin: 10px 0;
		}
		.msg-bubble pre code { background: transparent; padding: 0; color: var(--text); }
		.msg-bubble blockquote {
			border-left: 3px solid var(--border2); margin: 8px 0;
			padding: 4px 12px; color: var(--text2);
		}
		.msg-bubble strong { color: var(--text); font-weight: 600; }
		.msg-bubble a { color: var(--accent); text-decoration: underline; text-underline-offset: 2px; }
		.msg-bubble table { border-collapse: collapse; width: 100%; font-size: 13px; margin: 10px 0; }
		.msg-bubble th, .msg-bubble td { border: 1px solid var(--border2); padding: 6px 10px; }
		.msg-bubble th { background: var(--surface2); font-weight: 600; }
		.msg-bubble hr { border: 0; border-top: 1px solid var(--border); margin: 12px 0; }
		.msg-footer {
			display: flex; align-items: center; gap: 10px; flex-wrap: wrap; padding: 0 2px;
		}
		.msg-metrics {
			font-size: 10.5px; color: var(--text3);
			font-family: "SF Mono", ui-monospace, monospace;
			display: flex; gap: 10px; flex-wrap: wrap;
		}
		.m-first { color: var(--ok) !important; }
		.m-val { color: var(--text2); }
		.copy-btn {
			font-size: 10.5px; padding: 3px 8px;
			background: transparent; color: var(--text3);
			border: 1px solid var(--border); border-radius: 5px;
			transition: background 0.12s, color 0.12s, border-color 0.12s;
			margin-left: auto;
		}
		.copy-btn:hover { background: var(--surface2); color: var(--text); border-color: var(--border2); }
		.copy-btn.copied { color: var(--ok); border-color: rgba(34,209,122,0.3); }
		.cursor {
			display: inline-block; width: 2px; height: 1em;
			background: var(--accent); border-radius: 1px;
			vertical-align: text-bottom; margin-left: 1px;
			animation: blink 0.9s step-end infinite;
		}
		@keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
		.empty-state {
			flex: 1; display: flex; flex-direction: column;
			align-items: center; justify-content: center;
			gap: 10px; text-align: center; color: var(--text3);
			padding: 40px 20px;
		}
		.empty-icon { font-size: 32px; opacity: 0.35; }
		.empty-state h3 { font-size: 15px; font-weight: 600; color: var(--text2); margin: 0; }
		.empty-state p { font-size: 13px; max-width: 340px; line-height: 1.5; margin: 0; }
		.suggestion-chips { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin-top: 8px; }
		.chip {
			background: var(--surface2); border: 1px solid var(--border);
			color: var(--text2); padding: 6px 12px; border-radius: 99px;
			font-size: 12.5px; cursor: pointer;
			transition: border-color 0.12s, color 0.12s;
		}
		.chip:hover { border-color: var(--border2); color: var(--text); }

		/* Input area */
		.input-area {
			flex-shrink: 0; padding: 12px 16px 16px;
			border-top: 1px solid var(--border);
		}
		.sys-row { margin-bottom: 8px; }
		.sys-toggle {
			background: transparent; color: var(--text3); font-size: 12px;
			padding: 3px 0; display: flex; align-items: center; gap: 4px;
		}
		.sys-toggle:hover { color: var(--text2); }
		.sys-panel { margin-top: 8px; }
		.sys-panel textarea {
			width: 100%; resize: vertical; min-height: 64px;
			background: var(--bg); border: 1px solid var(--border);
			border-radius: var(--r-sm); color: var(--text);
			font: inherit; font-size: 13px; padding: 9px 12px; line-height: 1.5;
		}
		.sys-panel textarea:focus { outline: none; border-color: var(--border2); }
		.chat-form {
			background: var(--surface2); border: 1.5px solid var(--border);
			border-radius: var(--r-sm); overflow: hidden;
			transition: border-color 0.15s;
		}
		.chat-form:focus-within { border-color: var(--border2); }
		#chat-input {
			width: 100%; background: transparent; border: 0; outline: none;
			color: var(--text); font: inherit; font-size: 14px;
			padding: 12px 14px 0; resize: none; min-height: 52px; max-height: 200px;
			line-height: 1.5; display: block;
		}
		#chat-input::placeholder { color: var(--text3); }
		.form-footer {
			display: flex; align-items: center; padding: 6px 10px 8px 14px; gap: 8px;
		}
		.form-hint { font-size: 11px; color: var(--text3); flex: 1; }
		.btn-clear {
			background: transparent; color: var(--text2);
			border: 1px solid var(--border); border-radius: 6px;
			font-size: 12px; padding: 5px 10px;
		}
		.btn-clear:hover { border-color: var(--border2); color: var(--text); }
		.btn-send {
			background: var(--accent); color: #04090f;
			border-radius: 6px; font-size: 13px; font-weight: 600;
			padding: 6px 16px; display: flex; align-items: center; gap: 6px;
		}
		.btn-send:hover { opacity: 0.9; }
		.btn-send:disabled { opacity: 0.4; cursor: not-allowed; }
		.btn-send .shortcut { font-size: 10px; opacity: 0.7; font-family: ui-monospace, monospace; }

		/* Compare view */
		.compare-layout { display: flex; flex-direction: column; gap: 16px; }
		.compare-composer {
			background: var(--surface); border: 1.5px solid var(--border);
			border-radius: var(--r); padding: 18px; display: flex; flex-direction: column; gap: 12px;
		}
		.compose-label {
			font-size: 10px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase;
			color: var(--text3); margin-bottom: 4px; display: block;
		}
		.compose-textarea {
			width: 100%; resize: vertical; background: var(--bg);
			border: 1px solid var(--border); border-radius: var(--r-sm);
			color: var(--text); font: inherit; font-size: 14px;
			padding: 10px 13px; line-height: 1.5;
		}
		.compose-textarea:focus { outline: none; border-color: var(--border2); }
		.provider-grid {
			display: grid; grid-template-columns: repeat(auto-fill, minmax(185px, 1fr)); gap: 8px;
		}
		.provider-pill {
			display: flex; align-items: center; gap: 9px;
			padding: 9px 12px; background: var(--bg);
			border: 1.5px solid var(--border); border-radius: var(--r-sm);
			cursor: pointer; user-select: none; transition: border-color 0.15s;
		}
		.provider-pill:has(input:checked) { border-color: var(--accent); background: rgba(61,193,255,0.06); }
		.provider-pill input { accent-color: var(--accent); }
		.provider-pill-name { font-size: 12.5px; font-weight: 600; }
		.provider-pill-net { font-size: 10.5px; color: var(--text3); }
		.compare-controls {
			display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
		}
		.compare-controls label { font-size: 12px; color: var(--text2); white-space: nowrap; }
		.compare-controls input[type="number"] {
			background: var(--bg); border: 1px solid var(--border);
			color: var(--text); padding: 6px 10px; border-radius: var(--r-sm);
			font: inherit; font-size: 13px; width: 90px;
		}
		.spacer { flex: 1; }
		.btn-secondary {
			background: transparent; color: var(--text2);
			border: 1px solid var(--border); border-radius: var(--r-sm);
			padding: 8px 14px; font-size: 13px;
		}
		.btn-secondary:hover { border-color: var(--border2); color: var(--text); }
		.btn-primary {
			background: var(--accent); color: #04090f;
			border-radius: var(--r-sm); font-size: 13px; font-weight: 600;
			padding: 8px 20px;
		}
		.btn-primary:hover { opacity: 0.9; }
		.btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
		.compare-grid {
			display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 14px;
		}
		.cmp-card {
			background: var(--surface); border: 1.5px solid var(--border);
			border-radius: var(--r); overflow: hidden; display: flex; flex-direction: column;
		}
		.cmp-card-head {
			padding: 11px 14px; background: var(--surface2);
			border-bottom: 1px solid var(--border);
			display: flex; align-items: center; justify-content: space-between;
		}
		.cmp-card-title {
			font-size: 13px; font-weight: 600;
			display: flex; align-items: center; gap: 7px;
		}
		.cmp-card-net { font-size: 10.5px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; }
		.cmp-dot {
			width: 6px; height: 6px; border-radius: 50%;
			background: var(--accent); animation: pulse-dot 1.2s ease-in-out infinite;
		}
		.cmp-dot.done { background: var(--ok); animation: none; }
		.cmp-dot.errored { background: var(--err); animation: none; }
		@keyframes pulse-dot { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
		.cmp-body {
			flex: 1; padding: 14px; font-size: 13.5px; line-height: 1.6;
			color: var(--text); min-height: 160px; max-height: 420px;
			overflow-y: auto;
		}
		.cmp-body.empty { color: var(--text3); font-style: italic; white-space: normal; }
		.cmp-body.errored { color: var(--err); white-space: pre-wrap; }
		.cmp-body p { margin: 0 0 8px; }
		.cmp-body p:last-child { margin: 0; }
		.cmp-body code {
			font-family: ui-monospace, monospace; font-size: 12px;
			background: rgba(255,255,255,0.06); padding: 1px 4px; border-radius: 3px;
		}
		.cmp-body pre {
			background: rgba(0,0,0,0.3); border: 1px solid var(--border2);
			border-radius: 6px; padding: 10px 12px; overflow-x: auto; margin: 8px 0;
		}
		.cmp-body pre code { background: transparent; padding: 0; }
		.cmp-body strong { font-weight: 600; }
		.cmp-body ul, .cmp-body ol { margin: 4px 0; padding-left: 18px; }
		.cmp-body li { margin: 2px 0; }
		.cmp-footer {
			padding: 8px 14px; border-top: 1px solid var(--border);
			display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
		}
		.cmp-metric {
			font-size: 10.5px; color: var(--text3);
			font-family: ui-monospace, monospace;
		}
		.cmp-metric strong { color: var(--accent); font-weight: 600; }
		.cmp-metric .first { color: var(--ok); }
		.notice {
			padding: 10px 14px; border-radius: var(--r-sm);
			background: rgba(245,166,35,0.08); border: 1px solid rgba(245,166,35,0.25);
			color: var(--warn); font-size: 13px; margin-top: 10px;
		}

		@media (max-width: 860px) {
			#chat-view { flex-direction: column; height: auto; min-height: auto; }
			.model-sidebar {
				width: 100%; flex-direction: row; overflow-x: auto;
				gap: 8px; padding-bottom: 4px; flex-wrap: nowrap;
			}
			.model-card { min-width: 160px; flex-shrink: 0; }
			.model-desc { display: none; }
			.chat-panel { height: 62vh; min-height: 400px; }
		}
		@media (max-width: 540px) {
			.page { padding: 16px 14px 60px; }
			.page-header { flex-direction: column; align-items: flex-start; }
		}
	</style>
</head>
<body>
<header><div id="nav-container"></div></header>

<main class="page">
	<div class="page-header">
		<div>
			<p class="breadcrumb"><a href="/">three.ws</a> · brain</p>
			<h1 class="page-title">Brain</h1>
		</div>
		<div class="mode-tabs">
			<button class="mode-tab active" data-mode="chat">Chat</button>
			<button class="mode-tab" data-mode="compare">Compare</button>
		</div>
	</div>

	<!-- CHAT VIEW -->
	<div id="chat-view">
		<aside class="model-sidebar" id="model-sidebar"></aside>

		<div class="chat-panel">
			<div class="chat-topbar">
				<div class="chat-model-label">
					<span class="chat-model-dot"></span>
					<span id="active-model-label">Claude Sonnet 4.6</span>
				</div>
				<div class="chat-topbar-actions">
					<button class="icon-btn" id="export-btn">&#8595; Export</button>
					<button class="icon-btn" id="new-chat-btn">New chat</button>
				</div>
			</div>

			<div class="messages" id="messages">
				<div class="empty-state" id="empty-state">
					<div class="empty-icon">&#9711;</div>
					<h3>Start a conversation</h3>
					<p>Multi-turn chat with real streaming, real token metrics, and persistent history.</p>
					<div class="suggestion-chips">
						<button class="chip" data-prompt="Explain HTTP 402 in two sentences.">Explain HTTP 402</button>
						<button class="chip" data-prompt="Write a Python function to parse JWT claims without a library.">Parse JWT in Python</button>
						<button class="chip" data-prompt="What's the difference between SSE and WebSockets?">SSE vs WebSockets</button>
						<button class="chip" data-prompt="Give me a one-paragraph pitch for an AI agent marketplace.">Agent marketplace pitch</button>
					</div>
				</div>
			</div>

</main>

<script src="/nav.js"></script>
<script type="module">
const MODELS = [
	{ key: 'claude-opus-4-7',    label: 'Claude Opus 4.7',    network: 'Anthropic',  netClass: 'net-anthropic',  tier: 'flagship',  desc: 'Most capable. Extended thinking, complex reasoning.',       compareDefault: false, chatDefault: false },
	{ key: 'claude-sonnet-4-6',  label: 'Claude Sonnet 4.6',  network: 'Anthropic',  netClass: 'net-anthropic',  tier: 'balanced',  desc: 'Balanced speed and intelligence. Best for most tasks.',      compareDefault: true,  chatDefault: true  },
	{ key: 'claude-haiku-4-5',   label: 'Claude Haiku 4.5',   network: 'Anthropic',  netClass: 'net-anthropic',  tier: 'fast',      desc: 'Fastest Claude. Low latency, high throughput.',              compareDefault: true,  chatDefault: false },
	{ key: 'gpt-4o',             label: 'GPT-4o',             network: 'OpenAI',     netClass: 'net-openai',     tier: 'flagship',  desc: 'OpenAI flagship. Strong multimodal reasoning.',              compareDefault: false, chatDefault: false },
	{ key: 'gpt-4o-mini',        label: 'GPT-4o-mini',        network: 'OpenAI',     netClass: 'net-openai',     tier: 'fast',      desc: 'Fast, affordable GPT. Great for simple tasks.',              compareDefault: true,  chatDefault: false },
	{ key: 'o3-mini',            label: 'o3-mini',            network: 'OpenAI',     netClass: 'net-openai',     tier: 'reasoning', desc: 'Reasoning-optimized. Fast chain-of-thought.',                compareDefault: false, chatDefault: false },
	{ key: 'groq-llama',         label: 'Llama 3.3 70B',      network: 'Groq',       netClass: 'net-groq',       tier: 'fast',      desc: 'Open-weight on Groq. Extremely fast inference.',             compareDefault: true,  chatDefault: false },
	{ key: 'deepseek-r1',        label: 'DeepSeek R1',        network: 'DeepSeek',   netClass: 'net-deepseek',   tier: 'reasoning', desc: 'Open reasoning model. Strong at math and code.',             compareDefault: false, chatDefault: false },
	{ key: 'qwen-plus',          label: 'Qwen Plus',          network: 'DashScope',  netClass: 'net-alibaba',    tier: 'balanced',  desc: 'Qwen Plus on DashScope. Strong multilingual.',               compareDefault: false, chatDefault: false },
	{ key: 'modelscope-qwen',    label: 'Qwen3-Coder 480B',   network: 'ModelScope', netClass: 'net-modelscope', tier: 'flagship',  desc: 'Largest Qwen coder. Exceptional at code generation.',        compareDefault: false, chatDefault: false },
];
const TIER_LABEL = { flagship: 'Flagship', balanced: 'Balanced', fast: 'Fast', reasoning: 'Reasoning' };
const STORAGE_KEY = 'brain_v2';
const MODEL_KEY = 'brain_chat_model_v2';

marked.setOptions({ breaks: true, gfm: true });

let activeModel = localStorage.getItem(MODEL_KEY) || 'claude-sonnet-4-6';
let conversation = [];
let isStreaming = false;

try {
	const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null');
	if (saved?.model && Array.isArray(saved.messages)) {
		activeModel = saved.model;
		conversation = saved.messages;
	}
} catch {}

// ── DOM ──────────────────────────────────────────────────────────
const modelSidebar = document.getElementById('model-sidebar');
const messagesEl   = document.getElementById('messages');
const emptyState   = document.getElementById('empty-state');
const chatInput    = document.getElementById('chat-input');
const systemPrompt = document.getElementById('system-prompt');
const sendBtn      = document.getElementById('send-btn');
const clearBtn     = document.getElementById('clear-chat');
const newChatBtn   = document.getElementById('new-chat-btn');
const exportBtn    = document.getElementById('export-btn');
const sysToggle    = document.getElementById('sys-toggle');
const sysPanel     = document.getElementById('sys-panel');
const modelLabel   = document.getElementById('active-model-label');
const chatView     = document.getElementById('chat-view');
const compareView  = document.getElementById('compare-view');

// ── Mode tabs ────────────────────────────────────────────────────
document.querySelectorAll('.mode-tab').forEach(tab => {
	tab.addEventListener('click', () => {
		document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
		tab.classList.add('active');
		const isCmp = tab.dataset.mode === 'compare';
		chatView.style.display    = isCmp ? 'none' : '';
		compareView.style.display = isCmp ? '' : 'none';
	});
});

// ── Model sidebar ────────────────────────────────────────────────
function buildSidebar() {
	modelSidebar.innerHTML = '<div class="sidebar-label">Model</div>';
	for (const m of MODELS) {
		const el = document.createElement('div');
		el.className = 'model-card' + (m.key === activeModel ? ' selected' : '');
		el.dataset.key = m.key;
		el.tabIndex = 0;
		el.innerHTML = `
			<div class="model-card-name">
				${m.label}
				<span class="model-badge badge-${m.tier}">${TIER_LABEL[m.tier]}</span>
			</div>
			<div class="model-net ${m.netClass}">${m.network}</div>
			<div class="model-desc">${m.desc}</div>`;
		el.addEventListener('click', () => selectModel(m.key));
		el.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') selectModel(m.key); });
		modelSidebar.appendChild(el);
	}
}

function selectModel(key) {
	activeModel = key;
	localStorage.setItem(MODEL_KEY, key);
	document.querySelectorAll('.model-card').forEach(c => c.classList.toggle('selected', c.dataset.key === key));
	const m = MODELS.find(x => x.key === key);
	if (m) modelLabel.textContent = m.label;
}

// ── Message rendering ────────────────────────────────────────────
function makeMetricsHtml(metrics) {
	if (!metrics) return '';
	const parts = [];
	if (metrics.firstTokenMs != null) parts.push(`first <span class="m-first">${metrics.firstTokenMs}ms</span>`);
	if (metrics.elapsedMs != null)    parts.push(`total <span class="m-val">${metrics.elapsedMs}ms</span>`);
	if (metrics.outputTokens != null) parts.push(`tokens <span class="m-val">${metrics.outputTokens}</span>`);
	if (metrics.outputTokens != null && metrics.elapsedMs > 0) {
		const tps = (metrics.outputTokens / (metrics.elapsedMs / 1000)).toFixed(1);
		parts.push(`<span class="m-val">${tps}</span> tok/s`);
	}
	return `<div class="msg-metrics">${parts.join(' &middot; ')}</div>`;
}

function appendMsg(role, content, metrics) {
	const m = MODELS.find(x => x.key === activeModel);
	const div = document.createElement('div');
	div.className = `msg ${role}`;

	const roleSpan = role === 'user'
		? 'You'
		: `<span class="model-tag">${m?.label || 'Assistant'}</span>`;

	const bubble = document.createElement('div');
	bubble.className = 'msg-bubble';
	if (role === 'assistant') {
		bubble.innerHTML = marked.parse(content || '');
	} else {
		bubble.textContent = content;
	}

	div.innerHTML = `<div class="msg-role">${roleSpan}</div>`;
	div.appendChild(bubble);

	if (role === 'assistant') {
		const footer = document.createElement('div');
		footer.className = 'msg-footer';
		footer.innerHTML = makeMetricsHtml(metrics);
		const copyBtn = document.createElement('button');
		copyBtn.className = 'copy-btn';
		copyBtn.textContent = 'Copy';
		copyBtn.addEventListener('click', async () => {
			await navigator.clipboard.writeText(content).catch(() => {});
			copyBtn.textContent = 'Copied!';
			copyBtn.classList.add('copied');
			setTimeout(() => { copyBtn.textContent = 'Copy'; copyBtn.classList.remove('copied'); }, 1800);
		});
		footer.appendChild(copyBtn);
		div.appendChild(footer);
	}

	messagesEl.appendChild(div);
	return div;
}

function renderHistory() {
	messagesEl.querySelectorAll('.msg').forEach(el => el.remove());
	for (const msg of conversation) {
		appendMsg(msg.role, msg.content, msg.metrics);
	}
	updateEmpty();
	scrollBottom();
}

function updateEmpty() {
	emptyState.style.display = conversation.length === 0 ? '' : 'none';
}

function scrollBottom() {
	requestAnimationFrame(() => { messagesEl.scrollTop = messagesEl.scrollHeight; });
}

function saveState() {
	try {
		localStorage.setItem(STORAGE_KEY, JSON.stringify({ model: activeModel, messages: conversation, ts: Date.now() }));
	} catch {}
}

// ── Streaming send ───────────────────────────────────────────────
async function sendMessage() {
	const text = chatInput.value.trim();
	if (!text || isStreaming) return;

	conversation.push({ role: 'user', content: text });
	appendMsg('user', text);
	chatInput.value = '';
	autoResize();
	scrollBottom();
	updateEmpty();
	saveState();

	isStreaming = true;
	sendBtn.disabled = true;

	// Placeholder assistant bubble
	const m = MODELS.find(x => x.key === activeModel);
	const assistantDiv = document.createElement('div');
	assistantDiv.className = 'msg assistant';
	assistantDiv.innerHTML = `<div class="msg-role"><span class="model-tag">${m?.label || 'Assistant'}</span></div>`;
	const bubble = document.createElement('div');
	bubble.className = 'msg-bubble streaming';
	const cursor = document.createElement('span');
	cursor.className = 'cursor';
	bubble.appendChild(cursor);
	assistantDiv.appendChild(bubble);
	messagesEl.appendChild(assistantDiv);
	scrollBottom();

	const body = {
		provider: activeModel,
		messages: conversation.map(x => ({ role: x.role, content: x.content })),
		system: systemPrompt.value.trim() || undefined,
		maxTokens: 1024,
	};

	let accumulated = '';
	const metrics = {};
	let lastRender = 0;

	try {
		const res = await fetch('/api/brain/chat', {
			method: 'POST',
			headers: { 'content-type': 'application/json' },
			body: JSON.stringify(body),
		});

		if (!res.ok || !res.body) {
			const txt = await res.text().catch(() => '');
			bubble.classList.remove('streaming');
			bubble.innerHTML = `<span style="color:var(--err)">Error ${res.status}: ${txt || res.statusText}</span>`;
			isStreaming = false;
			sendBtn.disabled = false;
			return;
		}

		const reader = res.body.getReader();
		const decoder = new TextDecoder();
		let buf = '';

		outer: for (;;) {
			const { done, value } = await reader.read();
			if (done) break;
			buf += decoder.decode(value, { stream: true });
			let idx;
			while ((idx = buf.indexOf('\n\n')) !== -1) {
				const raw = buf.slice(0, idx);
				buf = buf.slice(idx + 2);
				let evType = '', data = '';
				for (const line of raw.split('\n')) {
					if (line.startsWith('event:')) evType = line.slice(6).trim();
					else if (line.startsWith('data:')) data += line.slice(5).trim();
				}
				if (!evType) evType = 'message';

				if (evType === 'first') {
					try { metrics.firstTokenMs = JSON.parse(data).firstTokenMs; } catch {}
				} else if (evType === 'message') {
					if (data === '[DONE]') break outer;
					try {
						accumulated += JSON.parse(data);
						const now = Date.now();
						if (now - lastRender > 40) {
							bubble.innerHTML = marked.parse(accumulated);
							const c = document.createElement('span'); c.className = 'cursor';
							bubble.appendChild(c);
							scrollBottom();
							lastRender = now;
						}
					} catch {}
				} else if (evType === 'done') {
					try {
						const info = JSON.parse(data);
						metrics.elapsedMs = info.elapsedMs;
						if (info.firstTokenMs) metrics.firstTokenMs = info.firstTokenMs;
						if (info.usage) {
							metrics.outputTokens = info.usage.outputTokens;
							metrics.inputTokens  = info.usage.inputTokens;
						}
					} catch {}
				} else if (evType === 'error') {
					try {
						const info = JSON.parse(data);
						accumulated = accumulated ? accumulated + `\n\n[Error: ${info.message}]` : `Error: ${info.message}`;
						metrics.elapsedMs = info.elapsedMs;
					} catch {}
				}
			}
		}
	} catch (err) {
		accumulated = `Network error: ${err.message}`;
	}

	// Finalize
	bubble.classList.remove('streaming');
	bubble.innerHTML = marked.parse(accumulated || '(empty response)');

	const footer = document.createElement('div');
	footer.className = 'msg-footer';
	footer.innerHTML = makeMetricsHtml(metrics);
	const copyBtn = document.createElement('button');
	copyBtn.className = 'copy-btn';
	copyBtn.textContent = 'Copy';
	copyBtn.addEventListener('click', async () => {
		await navigator.clipboard.writeText(accumulated).catch(() => {});
		copyBtn.textContent = 'Copied!';
		copyBtn.classList.add('copied');
		setTimeout(() => { copyBtn.textContent = 'Copy'; copyBtn.classList.remove('copied'); }, 1800);
	});
	footer.appendChild(copyBtn);
	assistantDiv.appendChild(footer);

	conversation.push({ role: 'assistant', content: accumulated, metrics });
	saveState();
	scrollBottom();
	isStreaming = false;
	sendBtn.disabled = chatInput.value.trim() === '';
}

// ── Input ────────────────────────────────────────────────────────
function autoResize() {
	chatInput.style.height = 'auto';
	chatInput.style.height = Math.min(chatInput.scrollHeight, 200) + 'px';
}

chatInput.addEventListener('input', () => {
	autoResize();
	sendBtn.disabled = chatInput.value.trim() === '' || isStreaming;
});
chatInput.addEventListener('keydown', e => {
	if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) {
		e.preventDefault();
		if (!sendBtn.disabled) sendMessage();
	}
});
sendBtn.addEventListener('click', sendMessage);

clearBtn.addEventListener('click', () => {
	conversation = [];
	messagesEl.querySelectorAll('.msg').forEach(el => el.remove());
	updateEmpty();
	saveState();
});
newChatBtn.addEventListener('click', () => {
	conversation = [];
	messagesEl.querySelectorAll('.msg').forEach(el => el.remove());
	updateEmpty();
	saveState();
});

exportBtn.addEventListener('click', () => {
	if (!conversation.length) return;
	const m = MODELS.find(x => x.key === activeModel);
	const lines = [`# Brain — ${m?.label || activeModel}\n`];
	for (const msg of conversation) {
		lines.push(`## ${msg.role === 'user' ? 'You' : m?.label || 'Assistant'}\n\n${msg.content}\n`);
	}
	const blob = new Blob([lines.join('\n')], { type: 'text/markdown' });
	const a = Object.assign(document.createElement('a'), {
		href: URL.createObjectURL(blob),
		download: `brain-${Date.now()}.md`,
	});
	a.click();
	URL.revokeObjectURL(a.href);
});

sysToggle.addEventListener('click', () => {
	const open = !sysPanel.hidden;
	sysPanel.hidden = open;
	sysToggle.innerHTML = (open ? '&#9658;' : '&#9660;') + ' System prompt';
});

document.querySelectorAll('.suggestion-chips .chip').forEach(chip => {
	chip.addEventListener('click', () => {
		chatInput.value = chip.dataset.prompt;
		autoResize();
		sendBtn.disabled = false;
		chatInput.focus();
	});
});

// ── Compare ──────────────────────────────────────────────────────
const providerGrid  = document.getElementById('provider-grid');
const compareGrid   = document.getElementById('compare-grid');
const compareNotice = document.getElementById('compare-notice');
const cmpPrompt     = document.getElementById('cmp-prompt');
const cmpSystem     = document.getElementById('cmp-system');
const cmpMaxTokens  = document.getElementById('cmp-max-tokens');
const cmpRunBtn     = document.getElementById('cmp-run');
const cmpClearBtn   = document.getElementById('cmp-clear');

for (const m of MODELS) {
	const pill = document.createElement('label');
	pill.className = 'provider-pill';
	pill.innerHTML = `
		<input type="checkbox" data-key="${m.key}" ${m.compareDefault ? 'checked' : ''} />
		<div>
			<div class="provider-pill-name ${m.netClass}">${m.label}</div>
			<div class="provider-pill-net">${m.network} &middot; ${TIER_LABEL[m.tier]}</div>
		</div>`;
	providerGrid.appendChild(pill);
}

function selectedForCompare() {
	const keys = [...providerGrid.querySelectorAll('input:checked')].map(el => el.dataset.key);
	return MODELS.filter(m => keys.includes(m.key));
}

function buildCompareCards(selected) {
	compareGrid.innerHTML = '';
	for (const m of selected) {
		const card = document.createElement('div');
		card.className = 'cmp-card';
		card.dataset.key = m.key;
		card.innerHTML = `
			<div class="cmp-card-head">
				<div class="cmp-card-title">
					<span class="cmp-dot" data-dot></span>
					<span class="${m.netClass}">${m.label}</span>
				</div>
				<span class="cmp-card-net">${m.network}</span>
			</div>
			<div class="cmp-body empty" data-body>Waiting&#8230;</div>
			<div class="cmp-footer">
				<span class="cmp-metric">first <strong class="first" data-first>&#8212;</strong>ms</span>
				<span class="cmp-metric">total <strong data-elapsed>&#8212;</strong>ms</span>
				<span class="cmp-metric">tokens <strong data-tokens>&#8212;</strong></span>
				<span class="cmp-metric"><strong data-tps>&#8212;</strong> tok/s</span>
			</div>`;
		compareGrid.appendChild(card);
	}
}

async function streamCompare(m, body, card) {
	const bodyEl    = card.querySelector('[data-body]');
	const dotEl     = card.querySelector('[data-dot]');
	const firstEl   = card.querySelector('[data-first]');
	const elapsedEl = card.querySelector('[data-elapsed]');
	const tokensEl  = card.querySelector('[data-tokens]');
	const tpsEl     = card.querySelector('[data-tps]');

	bodyEl.textContent = '';
	bodyEl.classList.remove('empty', 'errored');

	const t0 = performance.now();
	let accumulated = '';
	let lastRender = 0;

	let res;
	try {
		res = await fetch('/api/brain/chat', {
			method: 'POST',
			headers: { 'content-type': 'application/json' },
			body: JSON.stringify({ ...body, provider: m.key }),
		});
	} catch (err) {
		bodyEl.classList.add('errored');
		bodyEl.textContent = `Network error: ${err.message}`;
		dotEl.classList.add('errored');
		return;
	}

	if (!res.ok || !res.body) {
		const txt = await res.text().catch(() => '');
		bodyEl.classList.add('errored');
		bodyEl.textContent = `HTTP ${res.status}: ${txt || res.statusText}`;
		dotEl.classList.add('errored');
		return;
	}

	const reader = res.body.getReader();
	const decoder = new TextDecoder();
	let buf = '';

	try {
		outer: for (;;) {
			const { done, value } = await reader.read();
			if (done) break;
			buf += decoder.decode(value, { stream: true });
			let idx;
			while ((idx = buf.indexOf('\n\n')) !== -1) {
				const raw = buf.slice(0, idx);
				buf = buf.slice(idx + 2);
				let evType = '', data = '';
				for (const line of raw.split('\n')) {
					if (line.startsWith('event:')) evType = line.slice(6).trim();
					else if (line.startsWith('data:')) data += line.slice(5).trim();
				}
				if (!evType) evType = 'message';

				if (evType === 'first') {
					try { firstEl.textContent = JSON.parse(data).firstTokenMs; } catch {}
				} else if (evType === 'message') {
					if (data === '[DONE]') break outer;
					try {
						accumulated += JSON.parse(data);
						const now = Date.now();
						if (now - lastRender > 60) {
							bodyEl.innerHTML = marked.parse(accumulated);
							lastRender = now;
						}
					} catch {}
				} else if (evType === 'done') {
					try {
						const info = JSON.parse(data);
						elapsedEl.textContent = info.elapsedMs;
						if (info.firstTokenMs) firstEl.textContent = info.firstTokenMs;
						if (info.usage?.outputTokens) {
							tokensEl.textContent = info.usage.outputTokens;
							const sec = info.elapsedMs / 1000;
							if (sec > 0) tpsEl.textContent = (info.usage.outputTokens / sec).toFixed(1);
						}
					} catch {}
				} else if (evType === 'error') {
					try {
						const info = JSON.parse(data);
						bodyEl.classList.add('errored');
						bodyEl.innerHTML = marked.parse(accumulated ? accumulated + `\n\n*Error: ${info.message}*` : `Error: ${info.message}`);
						elapsedEl.textContent = info.elapsedMs;
						dotEl.classList.add('errored');
					} catch {}
				}
			}
		}
	} finally {
		if (accumulated) bodyEl.innerHTML = marked.parse(accumulated);
		dotEl.classList.remove('cmp-dot');
		dotEl.classList.add('done');
		if (!elapsedEl.textContent || elapsedEl.textContent === '—') {
			elapsedEl.textContent = Math.round(performance.now() - t0);
		}
	}
}

async function runCompare() {
	const prompt = cmpPrompt.value.trim();
	if (!prompt) {
		compareNotice.hidden = false;
		compareNotice.textContent = 'Enter a prompt first.';
		return;
	}
	const selected = selectedForCompare();
	if (!selected.length) {
		compareNotice.hidden = false;
		compareNotice.textContent = 'Select at least one provider.';
		return;
	}
	compareNotice.hidden = true;
	buildCompareCards(selected);
	cmpRunBtn.disabled = true;

	const body = {
		messages: [{ role: 'user', content: prompt }],
		system: cmpSystem.value.trim() || undefined,
		maxTokens: Math.min(Math.max(Number(cmpMaxTokens.value) || 512, 32), 4096),
	};
	try {
		await Promise.all(selected.map(m => streamCompare(m, body, compareGrid.querySelector(`[data-key="${m.key}"]`))));
	} finally {
		cmpRunBtn.disabled = false;
	}
}

cmpRunBtn.addEventListener('click', runCompare);
cmpClearBtn.addEventListener('click', () => { compareGrid.innerHTML = ''; compareNotice.hidden = true; });
cmpPrompt.addEventListener('keydown', e => { if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) runCompare(); });

// ── Boot ─────────────────────────────────────────────────────────
buildSidebar();
selectModel(activeModel);
renderHistory();

// Fetch available providers and dim unavailable ones
fetch('/api/brain/chat')
	.then(r => r.json())
	.then(({ providers }) => {
		if (!Array.isArray(providers)) return;
		const unavailable = new Set(providers.filter(p => !p.available).map(p => p.key));
		document.querySelectorAll('.model-card').forEach(card => {
			if (unavailable.has(card.dataset.key)) {
				card.classList.add('unavailable');
				if (card.classList.contains('selected')) {
					const first = providers.find(p => p.available);
					if (first) selectModel(first.key);
				}
			}
		});
		document.querySelectorAll('.provider-pill input').forEach(input => {
			if (unavailable.has(input.dataset.key)) {
				input.disabled = true;
				input.checked = false;
				input.closest('.provider-pill').style.opacity = '0.4';
				input.closest('.provider-pill').title = 'Not configured on this deployment';
			}
		});
	})
	.catch(() => {});
</script>
</body>
</html>
