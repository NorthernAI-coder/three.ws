<style>
:root{color-scheme:dark;--bg:#05060a;--s0:#0a0b11;--s1:#0e0f17;--s2:#13141e;--b0:#1a1b28;--b1:#24253a;--b2:#2e3050;--t0:#e8e9f0;--t1:#a0a2b4;--t2:#6e7088;--t3:#484a60;--accent:#3dc1ff;--accent-dim:rgba(61,193,255,0.1);--ok:#22d17a;--ok-dim:rgba(34,209,122,0.12);--warn:#f5a623;--err:#ff5a5a;--r:12px;--rs:8px;--sidebar-w:260px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

.brain{display:flex;height:calc(100vh - 49px);position:relative;overflow:hidden}

.new-chat-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:10px 14px;background:var(--s2);border:1px solid var(--b0);color:var(--t0);font-size:13px;font-weight:600;border-radius:var(--rs);transition:background .12s,border-color .12s}
.new-chat-btn:hover{background:var(--b0);border-color:var(--b1)}
.sessions{flex:1;overflow-y:auto;padding:0 8px 14px;display:flex;flex-direction:column;gap:2px}
.sessions::-webkit-scrollbar{width:3px}.sessions::-webkit-scrollbar-thumb{background:var(--b1);border-radius:3px}
.session-group{font-size:10.5px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--t3);padding:12px 8px 4px}

.session-item:hover{background:var(--s2);color:var(--t0)}.session-item.active{background:var(--s2);color:var(--t0)}

.session-item:hover .session-del{opacity:1}.session-del:hover{color:var(--err)}
.main{flex:1;min-width:0;display:flex;flex-direction:column;background:var(--bg)}
.topbar{display:flex;align-items:center;gap:10px;padding:10px 16px;flex-shrink:0;border-bottom:1px solid var(--b0);background:var(--s0)}

.sidebar-btn:hover{color:var(--t0);background:var(--s2)}
.model-picker{position:relative}
.model-trigger{display:flex;align-items:center;gap:8px;padding:6px 12px;border-radius:var(--rs);border:1px solid var(--b0);background:var(--s1);color:var(--t0);font-size:13px;font-weight:500;transition:border-color .12s,background .12s}
.model-trigger:hover{border-color:var(--b1);background:var(--s2)}

.model-dropdown{position:absolute;top:calc(100% + 6px);left:0;width:320px;max-height:480px;overflow-y:auto;background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);box-shadow:0 12px 40px rgba(0,0,0,.5);z-index:100;display:none;padding:6px}
.model-dropdown.open{display:block}.model-dropdown::-webkit-scrollbar{width:4px}.model-dropdown::-webkit-scrollbar-thumb{background:var(--b1);border-radius:4px}
.md-group{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--t3);padding:10px 10px 4px}

.md-dot{width:8px;height:8px;border-radius:50%;margin-top:4px;flex-shrink:0}.md-info{flex:1;min-width:0}
.md-name{font-size:13px;font-weight:600;color:var(--t0);display:flex;align-items:center;gap:6px}
.md-badge{font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:1px 5px;border-radius:4px}
.badge-flagship{background:rgba(212,168,122,.15);color:#d4a87a}.badge-balanced{background:var(--accent-dim);color:var(--accent)}
.badge-fast{background:var(--ok-dim);color:var(--ok)}.badge-reasoning{background:rgba(167,139,250,.15);color:#a78bfa}
.md-desc{font-size:11.5px;color:var(--t2);margin-top:1px}
.mode-tabs{display:flex;background:var(--s1);border:1px solid var(--b0);border-radius:7px;padding:2px;gap:1px}

.topbar-spacer{flex:1}.topbar-actions{display:flex;gap:4px}

.topbar-btn:hover{color:var(--t0);background:var(--s2);border-color:var(--b0)}
.content{flex:1;min-height:0;position:relative}.chat-view{height:100%;display:flex;flex-direction:column}.compare-view{height:100%;display:flex;flex-direction:column;overflow-y:auto}
.messages{flex:1;overflow-y:auto;padding:0;scroll-behavior:smooth}.messages::-webkit-scrollbar{width:5px}.messages::-webkit-scrollbar-thumb{background:var(--b1);border-radius:4px}

.msg-inner{max-width:780px;margin:0 auto}.msg-head{display:flex;align-items:center;gap:8px;margin-bottom:8px}

.msg-avatar.user{background:var(--s2);color:var(--t1);border:1px solid var(--b0)}.msg-avatar.assistant{border:1px solid var(--b0)}
.msg-role{font-size:13px;font-weight:600;color:var(--t0)}.msg-model-tag{font-size:11px;color:var(--t2)}
.msg-body{font-size:14.5px;line-height:1.7;color:var(--t0);overflow-wrap:break-word}
.msg-body p{margin:0 0 12px}.msg-body p:last-child{margin:0}
.msg-body h1,.msg-body h2,.msg-body h3{font-size:15px;font-weight:650;margin:18px 0 6px;letter-spacing:-.01em}
.msg-body h1:first-child,.msg-body h2:first-child,.msg-body h3:first-child{margin-top:0}
.msg-body ul,.msg-body ol{margin:6px 0 12px;padding-left:22px}.msg-body li{margin:3px 0}.msg-body li>p{margin:0}
.msg-body code{font-family:"SF Mono",ui-monospace,Menlo,Consolas,monospace;font-size:12.5px;background:rgba(255,255,255,.07);padding:2px 6px;border-radius:4px;color:var(--accent)}
.msg-body pre{background:#0d1117;border:1px solid var(--b0);border-radius:var(--rs);padding:14px 16px;overflow-x:auto;margin:12px 0;position:relative}
.msg-body pre code{background:transparent;padding:0;color:inherit;font-size:12.5px;line-height:1.55}
.pre-copy{position:absolute;top:8px;right:8px;padding:3px 8px;border-radius:5px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:var(--t2);font-size:10.5px;font-family:inherit;opacity:0;transition:opacity .15s}
.msg-body pre:hover .pre-copy{opacity:1}.pre-copy:hover{background:rgba(255,255,255,.1);color:var(--t0)}.pre-copy.copied{color:var(--ok)}
.msg-body blockquote{border-left:3px solid var(--b1);margin:10px 0;padding:2px 14px;color:var(--t1)}
.msg-body strong{color:var(--t0);font-weight:650}.msg-body a{color:var(--accent);text-decoration:underline;text-underline-offset:2px}
.msg-body table{border-collapse:collapse;width:100%;font-size:13px;margin:10px 0}.msg-body th,.msg-body td{border:1px solid var(--b0);padding:7px 10px;text-align:left}
.msg-body th{background:var(--s1);font-weight:600}.msg-body hr{border:0;border-top:1px solid var(--b0);margin:16px 0}
.cursor-blink{display:inline-block;width:2px;height:1em;background:var(--accent);border-radius:1px;vertical-align:text-bottom;margin-left:2px;animation:curBlink .8s step-end infinite}
@keyframes curBlink{0%,100%{opacity:1}50%{opacity:0}}
.msg-footer{display:flex;align-items:center;gap:6px;margin-top:10px;flex-wrap:wrap}
.msg-metrics{font-size:10.5px;color:var(--t3);font-family:"SF Mono",ui-monospace,monospace;display:flex;gap:8px}
.msg-metrics .mv{color:var(--t2)}.msg-metrics .mf{color:var(--ok)}
.msg-actions{display:flex;gap:2px;margin-left:auto;opacity:0;transition:opacity .15s}.msg-wrap:hover .msg-actions{opacity:1}
.msg-act{padding:3px 8px;border-radius:5px;font-size:11px;color:var(--t2);transition:color .12s,background .12s}
.msg-act:hover{color:var(--t0);background:var(--s2)}.msg-act.copied{color:var(--ok)}
.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 24px}
.empty-orb{width:56px;height:56px;border-radius:50%;background:radial-gradient(circle at 35% 35%,var(--accent-dim),transparent 70%),radial-gradient(circle at 65% 65%,rgba(167,139,250,.08),transparent 70%),var(--s1);border:1px solid var(--b0);margin-bottom:18px;animation:orbPulse 4s ease-in-out infinite}
@keyframes orbPulse{0%,100%{box-shadow:0 0 0 0 var(--accent-dim)}50%{box-shadow:0 0 30px 4px var(--accent-dim)}}
.empty-title{font-size:18px;font-weight:700;letter-spacing:-.02em;margin-bottom:6px}
.empty-sub{font-size:13.5px;color:var(--t2);max-width:400px;line-height:1.6;margin-bottom:20px}
.prompt-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;max-width:480px;width:100%}
.prompt-card{text-align:left;padding:12px 14px;background:var(--s1);border:1px solid var(--b0);border-radius:var(--rs);cursor:pointer;transition:border-color .12s,background .12s}
.prompt-card:hover{border-color:var(--b1);background:var(--s2)}
.prompt-card-title{font-size:12.5px;font-weight:600;color:var(--t0);margin-bottom:2px}.prompt-card-sub{font-size:11.5px;color:var(--t2)}
.agent-banner{display:none;align-items:center;gap:10px;padding:8px 14px;margin:12px 24px 0;background:var(--accent-dim);border:1px solid rgba(61,193,255,.15);border-radius:var(--rs);font-size:12.5px;color:var(--accent);max-width:780px;margin-left:auto;margin-right:auto}
.agent-banner.visible{display:flex}.agent-banner-name{font-weight:600}
.agent-banner-dismiss{margin-left:auto;padding:2px 6px;border-radius:4px;color:var(--t2);font-size:11px}.agent-banner-dismiss:hover{color:var(--t0)}
.input-area{flex-shrink:0;padding:12px 24px 18px;display:flex;flex-direction:column;align-items:center}
.input-inner{width:100%;max-width:780px}.sys-row{margin-bottom:8px}
.sys-toggle{background:transparent;color:var(--t3);font-size:12px;display:flex;align-items:center;gap:4px;padding:2px 0}.sys-toggle:hover{color:var(--t1)}
.sys-panel{margin-top:6px}
.sys-ta{width:100%;resize:vertical;min-height:56px;background:var(--s1);border:1px solid var(--b0);border-radius:var(--rs);color:var(--t0);font:inherit;font-size:13px;padding:9px 12px;line-height:1.5;outline:none;transition:border-color .12s}.sys-ta:focus{border-color:var(--b1)}
.input-box{background:var(--s1);border:1.5px solid var(--b0);border-radius:var(--r);overflow:hidden;transition:border-color .15s}.input-box:focus-within{border-color:var(--b1)}
.input-ta{width:100%;background:transparent;border:0;outline:none;color:var(--t0);font:inherit;font-size:14px;padding:14px 16px 0;resize:none;min-height:54px;max-height:200px;display:block;line-height:1.5}.input-ta::placeholder{color:var(--t3)}
.input-footer{display:flex;align-items:center;padding:6px 12px 10px 16px;gap:8px}.input-hint{font-size:11px;color:var(--t3);flex:1}
.btn-stop{display:none;align-items:center;gap:5px;background:var(--err);color:#fff;border-radius:7px;font-size:12.5px;font-weight:600;padding:6px 14px}.btn-stop.visible{display:flex}
.btn-send{background:var(--accent);color:#04090f;border-radius:7px;font-size:13px;font-weight:600;padding:6px 16px;display:flex;align-items:center;gap:6px;transition:opacity .12s}
.btn-send:hover{opacity:.9}.btn-send:disabled{opacity:.35;cursor:not-allowed}.btn-send .sc{font-size:10px;opacity:.6;font-family:ui-monospace,monospace}
.input-sub{text-align:center;padding-top:6px;font-size:11px;color:var(--t3)}.input-sub a{color:var(--t2);text-decoration:underline;text-underline-offset:2px}
.cmp-top{padding:16px 24px;display:flex;flex-direction:column;gap:12px;border-bottom:1px solid var(--b0);flex-shrink:0}
.cmp-providers{display:flex;flex-wrap:wrap;gap:6px}
.cmp-pill{display:flex;align-items:center;gap:7px;padding:7px 12px;background:var(--s1);border:1.5px solid var(--b0);border-radius:var(--rs);cursor:pointer;user-select:none;transition:border-color .12s;font-size:12.5px}
.cmp-pill:has(input:checked){border-color:var(--accent);background:var(--accent-dim)}.cmp-pill.unavailable{opacity:.35;pointer-events:none}
.cmp-pill input{accent-color:var(--accent);width:13px;height:13px}.cmp-pill-name{font-weight:600}.cmp-pill-net{color:var(--t2);font-size:11px}
.cmp-inputs{display:flex;gap:10px}
.cmp-textarea{flex:1;resize:vertical;background:var(--s1);border:1px solid var(--b0);border-radius:var(--rs);color:var(--t0);font:inherit;font-size:13.5px;padding:10px 14px;line-height:1.5;outline:none;min-height:80px}.cmp-textarea:focus{border-color:var(--b1)}
.cmp-sidebar-col{display:flex;flex-direction:column;gap:8px;min-width:220px}
.cmp-label{font-size:10.5px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--t3)}
.cmp-sys-ta{width:100%;resize:vertical;min-height:60px;background:var(--s1);border:1px solid var(--b0);border-radius:var(--rs);color:var(--t0);font:inherit;font-size:12.5px;padding:8px 10px;outline:none}.cmp-sys-ta:focus{border-color:var(--b1)}
.cmp-controls{display:flex;align-items:center;gap:10px;flex-wrap:wrap}.cmp-controls label{font-size:12px;color:var(--t2);white-space:nowrap}
.cmp-controls input[type="number"]{background:var(--s1);border:1px solid var(--b0);color:var(--t0);padding:5px 10px;border-radius:var(--rs);font:inherit;font-size:12.5px;width:80px;outline:none}
.cmp-spacer{flex:1}
.cmp-btn-run{background:var(--accent);color:#04090f;border-radius:7px;font-size:13px;font-weight:600;padding:8px 20px}.cmp-btn-run:hover{opacity:.9}.cmp-btn-run:disabled{opacity:.35;cursor:not-allowed}
.cmp-btn-clear{padding:7px 14px;border-radius:7px;font-size:12.5px;color:var(--t2);border:1px solid var(--b0)}.cmp-btn-clear:hover{border-color:var(--b1);color:var(--t0)}
.cmp-grid{flex:1;overflow-y:auto;padding:16px 24px;display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:12px;align-content:start}
.cmp-grid::-webkit-scrollbar{width:4px}.cmp-grid::-webkit-scrollbar-thumb{background:var(--b1);border-radius:4px}
.cmp-card{background:var(--s0);border:1.5px solid var(--b0);border-radius:var(--r);overflow:hidden;display:flex;flex-direction:column}
.cmp-card-head{padding:10px 14px;background:var(--s1);border-bottom:1px solid var(--b0);display:flex;align-items:center;justify-content:space-between}
.cmp-card-label{font-size:13px;font-weight:600;display:flex;align-items:center;gap:7px}
.cmp-status{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:statusPulse 1.2s ease-in-out infinite}
.cmp-status.done{background:var(--ok);animation:none}.cmp-status.err{background:var(--err);animation:none}
@keyframes statusPulse{0%,100%{opacity:.3}50%{opacity:1}}
.cmp-card-net{font-size:10.5px;color:var(--t3);text-transform:uppercase;letter-spacing:.06em}
.cmp-card-body{flex:1;padding:14px;font-size:13.5px;line-height:1.65;min-height:120px;max-height:420px;overflow-y:auto}
.cmp-card-body::-webkit-scrollbar{width:3px}.cmp-card-body::-webkit-scrollbar-thumb{background:var(--b1);border-radius:3px}
.cmp-card-body.waiting{color:var(--t3);font-style:italic}.cmp-card-body.errored{color:var(--err)}
.cmp-card-body p{margin:0 0 8px}.cmp-card-body p:last-child{margin:0}
.cmp-card-body code{font-family:ui-monospace,monospace;font-size:12px;background:rgba(255,255,255,.06);padding:1px 5px;border-radius:3px}
.cmp-card-body pre{background:#0d1117;border:1px solid var(--b0);border-radius:6px;padding:10px 12px;overflow-x:auto;margin:8px 0}
.cmp-card-body pre code{background:transparent;padding:0;font-size:12px}.cmp-card-body strong{font-weight:600}
.cmp-card-body ul,.cmp-card-body ol{margin:4px 0;padding-left:18px}.cmp-card-body li{margin:2px 0}
.cmp-card-foot{padding:8px 14px;border-top:1px solid var(--b0);display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.cmp-metric{font-size:10.5px;color:var(--t3);font-family:ui-monospace,monospace}.cmp-metric strong{font-weight:600}
.cmp-metric .cmf{color:var(--ok)}.cmp-metric .cma{color:var(--accent)}

.sidebar{position:absolute;left:0;top:0;bottom:0;z-index:50;box-shadow:4px 0 24px rgba(0,0,0,.4)}
.sidebar.collapsed{transform:translateX(-100%)}

.sidebar-backdrop.visible{display:block}.prompt-grid{grid-template-columns:1fr}}
@media(max-width:600px){.topbar{padding:8px 12px;gap:6px}.mode-tab{padding:5px 10px;font-size:11.5px}.input-area{padding:10px 14px 14px}.msg-wrap{padding:16px 14px}.cmp-top{padding:12px 14px}.cmp-grid{padding:12px 14px;grid-template-columns:1fr}.cmp-inputs{flex-direction:column}.cmp-sidebar-col{min-width:0}}

<body>
<header><div id="nav-container"></div></header>
<div class="brain">
<div class="sidebar-backdrop" id="sidebar-backdrop"></div>
<aside class="sidebar" id="sidebar"><div class="sidebar-head"><button class="new-chat-btn" id="new-chat-btn">+ New chat</button></div><div class="sessions" id="sessions"></div></aside>
<div class="main">
<div class="topbar">
<button class="sidebar-btn" id="sidebar-btn" aria-label="Toggle sidebar">&#9776;</button>
<div class="model-picker" id="model-picker"><button class="model-trigger" id="model-trigger"><span class="model-dot" id="trigger-dot"></span><span id="trigger-label">Claude Sonnet 4.6</span><span class="model-caret">&#9662;</span></button><div class="model-dropdown" id="model-dropdown"></div></div>
<div class="mode-tabs"><button class="mode-tab active" data-mode="chat" id="tab-chat">Chat</button><button class="mode-tab" data-mode="compare" id="tab-compare">Compare</button></div>
<div class="topbar-spacer"></div>
<div class="topbar-actions"><button class="topbar-btn" id="export-btn" title="Export conversation">Export</button><button class="topbar-btn" id="clear-btn" title="Clear conversation">Clear</button></div>
</div>

async function streamCmpCard(m,body,card){const bodyEl=card.querySelector('.cmp-card-body'),dot=card.querySelector('.cmp-status'),firstEl=card.querySelector('[data-first]'),elapsedEl=card.querySelector('[data-elapsed]'),tokensEl=card.querySelector('[data-tokens]'),tpsEl=card.querySelector('[data-tps]');bodyEl.textContent='';bodyEl.classList.remove('waiting','errored');const t0=performance.now();let accumulated='',lastRender=0;await streamChat(m.key,body.messages,body.system,body.maxTokens,{signal:body.signal,onFirst(d){if(d.firstTokenMs)firstEl.textContent=d.firstTokenMs;},onChunk(delta){accumulated+=delta;const now=Date.now();if(now-lastRender>50){bodyEl.innerHTML=renderMd(accumulated);lastRender=now;}},onDone(d){if(d.elapsedMs)elapsedEl.textContent=d.elapsedMs;if(d.firstTokenMs)firstEl.textContent=d.firstTokenMs;if(d.usage?.outputTokens){tokensEl.textContent=d.usage.outputTokens;const sec=(d.elapsedMs||(performance.now()-t0))/1000;if(sec>0)tpsEl.textContent=(d.usage.outputTokens/sec).toFixed(1);}},onError(msg){bodyEl.classList.add('errored');bodyEl.innerHTML=renderMd(accumulated?accumulated+'\n\n*Error: '+msg+'*':'Error: '+msg);dot.classList.add('err');},});if(accumulated){bodyEl.innerHTML=renderMd(accumulated);highlightCode(bodyEl);}if(!dot.classList.contains('err'))dot.classList.add('done');if(!elapsedEl.textContent||elapsedEl.textContent==='—')elapsedEl.textContent=Math.round(performance.now()-t0);}
let cmpAbort=null;
async function runCompare(){const prompt=cmpPrompt.value.trim();if(!prompt)return;const selected=selectedCmp();if(!selected.length)return;cmpAbort=new AbortController();cmpRunBtn.disabled=true;buildCmpCards(selected);const body={messages:[{role:'user',content:prompt}],system:cmpSystem.value.trim()||undefined,maxTokens:Math.min(Math.max(Number(cmpTokens.value)||512,32),4096),signal:cmpAbort.signal};try{await Promise.all(selected.map(m=>streamCmpCard(m,body,cmpGrid.querySelector('[data-key="'+m.key+'"]'))));}finally{cmpRunBtn.disabled=false;cmpAbort=null;}}
cmpRunBtn.addEventListener('click',runCompare);
cmpClearBtn.addEventListener('click',()=>{cmpGrid.innerHTML='<div class="cmp-empty">Select models and run a prompt to compare responses side-by-side.</div>';if(cmpAbort)cmpAbort.abort();});
cmpPrompt.addEventListener('keydown',e=>{if(e.key==='Enter'&&(e.metaKey||e.ctrlKey)){e.preventDefault();runCompare();}});
document.addEventListener('keydown',e=>{if(e.key==='n'&&(e.metaKey||e.ctrlKey)&&!e.shiftKey){e.preventDefault();newSession(true);}if(e.key==='Escape'){closeDropdown();if(streaming)stopStreaming();}});
async function loadAgentContext(){const params=new URLSearchParams(location.search),agentId=params.get('agent');if(!agentId)return;try{const res=await fetch('/api/agents/'+encodeURIComponent(agentId),{credentials:'include'});if(!res.ok)return;const data=await res.json(),agent=data.agent;if(!agent)return;agentCtx=agent;agentBannerName.textContent=agent.name||agent.id;agentBanner.classList.add('visible');if(agent.system_prompt){systemTa.value=agent.system_prompt;sysPanel.hidden=false;sysToggle.innerHTML='&#9660; System prompt';}const bm=agent.meta?.brain?.model;if(bm){const mapped=MODELS.find(m=>m.key===bm||m.label.toLowerCase().includes(bm.toLowerCase()));if(mapped)selectModel(mapped.key);}const session=getSession()||newSession(true);session.system=agent.system_prompt||'';session.title='Chat with '+(agent.name||agent.id);saveState();renderSidebar();}catch{}}
document.getElementById('agent-banner-dismiss').addEventListener('click',()=>{agentBanner.classList.remove('visible');agentCtx=null;});
async function checkAvailability(){try{const res=await fetch('/api/brain/chat'),{providers}=await res.json();if(!Array.isArray(providers))return;for(const p of providers)if(!p.available)unavail.add(p.key);buildModelDropdown();buildCmpProviders();if(unavail.has(activeModel)){const first=MODELS.find(m=>!unavail.has(m.key));if(first)selectModel(first.key);}}catch{}}
function renderAll(){renderSidebar();renderMessages();updateModelUI();}
loadState();buildModelDropdown();buildCmpProviders();updateModelUI();
if(!sessions.length)emptyState.style.display='';else renderAll();
const s=getSession();if(s?.system)systemTa.value=s.system;
checkAvailability();loadAgentContext();
if(window.innerWidth<=860)sidebar.classList.add('collapsed');
</script>
	<script src="/brand.js" defer></script>
