<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>three.ws — Give Your AI a Body</title>
		<meta name="robots" content="noindex" />
		<link rel="stylesheet" href="/fonts/fonts.css" />
		<style>
			:root { color-scheme: dark; }
			*, *::before, *::after { box-sizing: border-box; }
			html, body { height: 100%; margin: 0; background: #04050d; color: #eee; font: 15px/1.5 'Inter', -apple-system, system-ui, sans-serif; }

			/* Canvas sits above all HTML — pointer-events:none so clicks pass through */
			#avatar-canvas {
				position: fixed;
				top: 0; left: 0;
				width: 100vw; height: 100vh;
				pointer-events: none;
				z-index: 999;
			}

			/* Page content — left column, visible through transparent canvas */
			.page {
				position: relative;
				z-index: 10;
				min-height: 100vh;
				display: flex;
				flex-direction: column;
				justify-content: center;
				padding: 100px 56px 60px;
				max-width: 520px;
			}

			.eyebrow {
				display: inline-flex; align-items: center; gap: 9px;
				font-size: 11px; font-weight: 600;
				letter-spacing: 0.17em; text-transform: uppercase;
				color: #d6ff3d; margin-bottom: 24px;
				font-family: 'Space Grotesk', 'Inter', sans-serif;
			}
			.eyebrow-dot {
				width: 7px; height: 7px; border-radius: 50%;
				background: #d6ff3d; box-shadow: 0 0 8px rgba(214,255,61,0.7);
				animation: blink 2.2s ease-in-out infinite;
			}
			@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

			.hero-title {
				font-family: 'Space Grotesk', 'Inter', sans-serif;
				font-size: clamp(38px, 4.5vw, 68px);
				font-weight: 800; letter-spacing: -0.03em;
				line-height: 1.04; margin: 0 0 20px; color: #fff;
			}
			.hero-title em { color: #d6ff3d; font-style: normal; }
			/* Proximity shadow — JS updates --agent-shadow as the avatar nears #sit-line.
			   Sharper + darker as he sits down on the text. */
			#sit-line {
				text-shadow: var(--agent-shadow, none);
				transition: text-shadow 90ms linear;
			}

			.hero-sub {
				color: #555870; font-size: 15.5px; line-height: 1.7;
				max-width: 38ch; margin: 0 0 44px;
			}

			/* Physical 3D buttons */
			.cta-row { display: flex; flex-direction: column; gap: 14px; align-items: flex-start; }

			.btn {
				display: inline-flex; align-items: center; gap: 10px;
				padding: 16px 32px; border: none; border-radius: 14px;
				font: 700 15px/1 'Inter', inherit; cursor: pointer; text-decoration: none;
				user-select: none;
				/* GSAP squishes downward into the page, not into its own center */
				transform-origin: bottom center;
				will-change: transform;
			}
			.btn-primary {
				background: linear-gradient(160deg, #e2ff5a, #c8ef2c);
				color: #0a0b0f;
				box-shadow: 0 8px 0 0 #7a9600, 0 10px 28px rgba(214,255,61,0.28);
			}
			.btn-primary:hover { filter: brightness(1.07); }
			.btn-ghost {
				background: rgba(255,255,255,0.05); color: #bbb;
				border: 1.5px solid rgba(255,255,255,0.1);
				box-shadow: 0 5px 0 0 rgba(255,255,255,0.04);
			}

			/* Animation control chips — trigger one-shot clips on the avatar */
			.anim-controls {
				display: flex; flex-wrap: wrap; gap: 8px;
				margin-top: 30px;
			}
			.anim-label {
				width: 100%; margin: 0 0 4px;
				font: 600 10px/1 'Space Grotesk','Inter',sans-serif;
				letter-spacing: 0.18em; text-transform: uppercase;
				color: #555870;
			}
			.chip {
				display: inline-flex; align-items: center; gap: 6px;
				padding: 9px 14px; border-radius: 999px;
				background: rgba(255,255,255,0.04);
				border: 1px solid rgba(255,255,255,0.1);
				color: #ccd; font: 600 12px/1 'Inter', sans-serif;
				cursor: pointer; user-select: none;
				letter-spacing: 0.02em;
				transition: background 120ms ease, border-color 120ms ease,
				            color 120ms ease, transform 120ms ease;
			}
			.chip:hover { background: rgba(214,255,61,0.08); border-color: rgba(214,255,61,0.35); color: #fff; }
			.chip:active { transform: translateY(1px); }
			.chip[aria-pressed="true"] {
				background: rgba(214,255,61,0.16);
				border-color: rgba(214,255,61,0.55);
				color: #d6ff3d;
			}
			.chip[disabled] { opacity: 0.4; cursor: wait; }

			/* Nav */
			.nav {
				position: fixed; top: 0; left: 0; right: 0; z-index: 20;
				display: flex; align-items: center; gap: 16px; padding: 14px 28px;
				background: rgba(4,5,13,0.55); backdrop-filter: blur(14px);
				border-bottom: 1px solid rgba(255,255,255,0.04);
			}
			.nav .brand { font: 700 15px/1 'Space Grotesk','Inter',sans-serif; color:#fff; text-decoration:none; display:flex; align-items:center; gap:7px; }
			.brand-dot { width:8px; height:8px; border-radius:50%; background:linear-gradient(135deg,#d6ff3d,#aacc00); box-shadow:0 0 10px rgba(214,255,61,0.6); }
			.nav a.link { color:#555870; text-decoration:none; font-size:13px; margin-left:auto; }
			.nav a.link:hover { color:#d6ff3d; }

			/* Pretext overlay — paragraph copy reflows around the avatar's
			   screen silhouette every frame. Sits above the page but below
			   the avatar canvas (z:999) so the avatar still composites over text. */
			.hero-sub-pretext {
				position: fixed; pointer-events: none;
				color: #555870;
				z-index: 11;
				contain: layout style;
			}
			.hero-sub-pretext-line {
				position: absolute; display: block;
				white-space: nowrap;
			}
			/* Original .hero-sub stays in the DOM for screen readers, but is
			   visually replaced by the overlay once pretext is active. */
			body.pretext-active .hero-sub { visibility: hidden; }
		</style>
	</head>
	<body>
		<div class="nav">
			<a href="/" class="brand">
				<img src="/three.svg" width="20" height="20" alt="" />
				<span class="brand-dot"></span>
				three.ws
			</a>
			<a href="/demos/" class="link">← lab</a>
		</div>

		<div class="page">
			<div class="eyebrow">
				<span class="eyebrow-dot"></span>
				<span>The 3D layer for onchain AI agents</span>
			</div>
			<h1 class="hero-title"><span id="sit-line">Give your AI</span><br />a <em>body.</em></h1>
			<p class="hero-sub">
				Born in 3D. Raised on-chain. Yours forever.
				Your AI has been a chatbox long enough — give it a body,
				a personality, and a permanent home.
			</p>
			<div class="cta-row">
				<a href="/create" class="btn btn-primary" id="cta-btn">
					<span>Build your agent — free</span>
					<span>→</span>
				</a>
				<a href="#" class="btn btn-ghost">
					<span>Watch it live</span>
					<span style="opacity:.4">↓</span>
				</a>
			</div>
			<div class="anim-controls" id="anim-controls" role="group" aria-label="Avatar animations">
				<div class="anim-label">Make her…</div>
				<button class="chip" data-clip="wave"      type="button" disabled>👋 Wave</button>
				<button class="chip" data-clip="rumba"     type="button" disabled>💃 Dance</button>
				<button class="chip" data-clip="celebrate" type="button" disabled>🎉 Celebrate</button>
				<button class="chip" data-clip="taunt"     type="button" disabled>😝 Taunt</button>
			</div>
		</div>

		<!-- Transparent overlay canvas — avatar renders above all HTML -->
		<canvas id="avatar-canvas"></canvas>

		<script type="module">
			import * as THREE from 'three';
			import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
			import { gsap } from 'https://cdn.jsdelivr.net/npm/gsap@3.12.5/+esm';
			import * as pretext from '@chenglou/pretext';

			const canvas    = document.getElementById('avatar-canvas');
			const ctaBtn    = document.getElementById('cta-btn');
			const sitLine   = document.getElementById('sit-line');
			const heroSub   = document.querySelector('.hero-sub');
			const animPanel = document.getElementById('anim-controls');
			const chips     = [...animPanel.querySelectorAll('.chip')];

			// ── Tracked timers ────────────────────────────────────────────────
			// Every setTimeout used by the sit→stand→jump cycle is registered
			// here so a performAction() click can cancel all pending steps
			// without leaking phase transitions onto the perform animation.
			const pendingTimers = new Set();
			function later(fn, ms) {
				const id = setTimeout(() => { pendingTimers.delete(id); fn(); }, ms);
				pendingTimers.add(id);
				return id;
			}
			function clearTimers() {
				for (const id of pendingTimers) clearTimeout(id);
				pendingTimers.clear();
			}

			// ── Renderer: alpha:true → transparent background ─────────────────
			const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
			renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
			renderer.outputColorSpace = THREE.SRGBColorSpace;
			renderer.toneMapping = THREE.ACESFilmicToneMapping;
			renderer.toneMappingExposure = 1.1;

			const scene = new THREE.Scene();
			// scene.background intentionally NOT set → transparent

			// ── OrthographicCamera: 1 world unit = PX_PER_UNIT pixels ────────
			// This makes screen→world mapping trivially exact: no perspective math.
			const PX_PER_UNIT = 120; // avatar (1.8u tall) = 216px on screen

			const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0.1, 100);
			camera.position.z = 10;

			function updateFrustum() {
				const hw = window.innerWidth  / PX_PER_UNIT / 2;
				const hh = window.innerHeight / PX_PER_UNIT / 2;
				camera.left   = -hw; camera.right  = hw;
				camera.top    =  hh; camera.bottom = -hh;
				camera.updateProjectionMatrix();
			}

			// DOM rect → world position (standard NDC + unproject pipeline)
			// Works for any DOM element regardless of camera type.
			const _v3 = new THREE.Vector3();
			function domToWorld(screenX, screenY) {
				_v3.set(
					 (screenX / window.innerWidth)  * 2 - 1,
					-(screenY / window.innerHeight) * 2 + 1,
					0
				);
				_v3.unproject(camera);
				return { x: _v3.x, y: _v3.y };
			}

			function resize() {
				renderer.setSize(window.innerWidth, window.innerHeight, false);
				updateFrustum();
			}
			window.addEventListener('resize', () => { resize(); recalibrateSitAnchor(); });
			resize();

			// ── Smooth lerp to a new world position (used for ResizeObserver) ─
			// We only retarget while the avatar is "at rest" on the sit-line — during
			// jump/standup the trajectory math owns position and we mustn't fight it.
			let recalSlide = null;
			function lerpAvatarTo(target, ms = 280) {
				if (!avatar) return;
				if (recalSlide) cancelAnimationFrame(recalSlide);
				const fromX = avatar.position.x, fromY = avatar.position.y;
				const t0 = performance.now();
				(function step(now) {
					const sp = Math.min((now - t0) / ms, 1);
					const e  = smoothstep(sp);
					avatar.position.x = fromX + (target.x - fromX) * e;
					avatar.position.y = fromY + (target.y - fromY) * e;
					if (sp < 1) recalSlide = requestAnimationFrame(step);
					else recalSlide = null;
				})(performance.now());
			}

			function recalibrateSitAnchor() {
				if (!avatar) return;
				const next = getSitWorld();
				startW = next; // keep the resting anchor authoritative
				if (phase === 'sitting' || phase === 'standingUp' || phase === 'loading') {
					lerpAvatarTo(next, 280);
				}
			}

			// ResizeObserver: the window resize event fires once, but text reflow
			// (font load, line-wrap on viewport shrink) changes the rect bounds without
			// a window resize. Observe the target element directly so we always re-anchor.
			const sitLineRO = new ResizeObserver(() => recalibrateSitAnchor());
			sitLineRO.observe(sitLine);

			// ── Pretext reflow: hero-sub parts around the avatar's silhouette ──
			// The paragraph copy under the hero title is mirrored into an overlay
			// whose lines are re-laid out by @chenglou/pretext every frame, using
			// the avatar's projected screen position as a circular obstacle. The
			// overlay extends beyond the natural .hero-sub width so the avatar —
			// which lives to the right of the page column — actually intersects
			// the text band. Original .hero-sub remains in the DOM for screen
			// readers (visibility:hidden when overlay is active).
			const REFLOW_MOBILE_MQ  = window.matchMedia('(max-width: 768px)');
			const REFLOW_RM_MQ      = window.matchMedia('(prefers-reduced-motion: reduce)');
			const REFLOW_BUDGET_MS  = 8;     // mean per-frame layout cost ceiling
			const REFLOW_WINDOW     = 30;    // samples averaged for downgrade
			const REFLOW_OVERHANG   = 200;   // px the overlay extends past .hero-sub right edge
			const REFLOW_H_PAD      = 14;    // px gap kept between text and obstacle
			const REFLOW_MAX_LINES  = 32;
			// Minimum slot width. Below this, pretext.layoutNextLine would emit
			// tiny fragments (e.g. "Bo", "rn in") that look broken. Skip the
			// band instead so text resumes on the next clear line.
			const REFLOW_MIN_SLOT_PX = 120;
			// Vertical lift of the obstacle center above the avatar's GLB origin.
			// cz.glb origin sits at the feet; her torso/head — the part the text
			// should part around — is ~90px above the origin at this PX_PER_UNIT.
			const REFLOW_OBSTACLE_LIFT_PX = 90;

			const subOverlay = document.createElement('div');
			subOverlay.className = 'hero-sub-pretext';
			subOverlay.setAttribute('aria-hidden', 'true');
			document.body.appendChild(subOverlay);

			const reflow = {
				ready: false,
				disabled: REFLOW_MOBILE_MQ.matches || REFLOW_RM_MQ.matches,
				downgraded: false,
				prepared: null,
				lineHeight: 0,
				originLeft: 0,
				originTop:  0,
				width: 0,
				maxHeight: 0,
				costSamples: [],
			};

			function prepareReflow() {
				if (!heroSub) return;
				reflow.disabled = REFLOW_MOBILE_MQ.matches || REFLOW_RM_MQ.matches;
				if (reflow.disabled) {
					reflow.ready = false;
					subOverlay.replaceChildren();
					subOverlay.style.display = 'none';
					document.body.classList.remove('pretext-active');
					return;
				}
				subOverlay.style.display = '';

				const subRect = heroSub.getBoundingClientRect();
				const style   = getComputedStyle(heroSub);
				const font    = `${style.fontStyle} ${style.fontWeight} ${style.fontSize} ${style.fontFamily}`;
				const fontSize = parseFloat(style.fontSize);
				const lhRaw    = style.lineHeight;
				const lineHeight = lhRaw === 'normal' ? fontSize * 1.5 : parseFloat(lhRaw);

				// Width extends to the right past the natural paragraph so the
				// avatar (which sits outside the .page column) is inside the
				// reflow box. Capped by the viewport so we never spill offscreen.
				const overlayRight = Math.min(
					window.innerWidth - 24,
					subRect.right + REFLOW_OVERHANG,
				);
				const overlayWidth = Math.max(subRect.width, overlayRight - subRect.left);

				// Cap the visible band a little past the natural sub height so
				// the avatar's obstacle can push one line of overflow into the
				// margin below — anything past that gets cropped instead of
				// bleeding into the CTA / chip row.
				const maxHeight = subRect.height + lineHeight;

				reflow.prepared   = pretext.prepareWithSegments(heroSub.textContent ?? '', font);
				reflow.lineHeight = lineHeight;
				reflow.originLeft = subRect.left;
				reflow.originTop  = subRect.top;
				reflow.width      = overlayWidth;
				reflow.maxHeight  = maxHeight;

				subOverlay.style.left       = `${subRect.left}px`;
				subOverlay.style.top        = `${subRect.top}px`;
				subOverlay.style.width      = `${overlayWidth}px`;
				subOverlay.style.height     = `${maxHeight}px`;
				subOverlay.style.overflow   = 'hidden';
				subOverlay.style.font       = font;
				subOverlay.style.lineHeight = `${lineHeight}px`;
				subOverlay.style.color      = style.color;

				reflow.ready = true;
				document.body.classList.add('pretext-active');
			}

			(document.fonts?.ready ?? Promise.resolve()).then(prepareReflow);
			window.addEventListener('resize', prepareReflow);
			REFLOW_MOBILE_MQ.addEventListener?.('change', prepareReflow);
			REFLOW_RM_MQ.addEventListener?.('change', prepareReflow);
			const subRO = new ResizeObserver(prepareReflow);
			if (heroSub) subRO.observe(heroSub);

			// Project the avatar's world position to viewport pixels.
			const _proj2 = new THREE.Vector3();
			function avatarScreenXY() {
				_proj2.set(avatar.position.x, avatar.position.y, avatar.position.z);
				_proj2.project(camera);
				return {
					x: (_proj2.x + 1) * 0.5 * window.innerWidth,
					y: (1 - _proj2.y) * 0.5 * window.innerHeight,
				};
			}

			// Obstacle radius in screen px. Pose-dependent: seated is compact;
			// standing/airborne extends taller; the post-landing crouch (resting)
			// is the most compact of all — using the larger radius there would
			// fragment the sub paragraph since the landing point overlaps it.
			function obstacleRadiusPx() {
				if (phase === 'resting')   return 70;
				if (phase === 'sitting' || phase === 'loading') return 100;
				return 130;
			}

			function layoutLinesAroundObstacle(cx, cy, r) {
				const { prepared, lineHeight, width, maxHeight } = reflow;
				const effR = r + REFLOW_H_PAD;
				const lines = [];
				let cursor = { segmentIndex: 0, graphemeIndex: 0 };
				let lineTop = 0;
				while (lines.length < REFLOW_MAX_LINES && lineTop < maxHeight) {
					const bandMid = lineTop + lineHeight / 2;
					const dy      = bandMid - cy;
					let slot     = width;
					let lineLeft = 0;
					if (Math.abs(dy) < effR) {
						const dx        = Math.sqrt(effR * effR - dy * dy);
						const blockLeft  = cx - dx;
						const blockRight = cx + dx;
						// Only constrain when the obstacle actually intersects the slot.
						if (blockRight > 0 && blockLeft < width) {
							const leftRoom  = blockLeft;
							const rightRoom = width - blockRight;
							// Lay text on the wider side of the obstacle. pretext
							// returns text as a flat string with a max width — we
							// position it left or right of the obstacle ourselves.
							if (leftRoom >= rightRoom && leftRoom >= REFLOW_MIN_SLOT_PX) {
								slot     = leftRoom;
								lineLeft = 0;
							} else if (rightRoom >= REFLOW_MIN_SLOT_PX) {
								slot     = rightRoom;
								lineLeft = blockRight;
							} else {
								// Neither side has room for readable text — skip
								// the band so the text never overlaps the avatar.
								lineTop += lineHeight;
								continue;
							}
						}
					}
					const line = pretext.layoutNextLine(prepared, cursor, slot);
					if (line === null) break;
					lines.push({ y: lineTop, left: lineLeft, text: line.text });
					cursor = line.end;
					lineTop += lineHeight;
				}
				return lines;
			}

			function paintReflowLines(lines) {
				const frag = document.createDocumentFragment();
				for (const { y, left, text } of lines) {
					const span = document.createElement('span');
					span.className = 'hero-sub-pretext-line';
					span.style.top  = `${y}px`;
					span.style.left = `${left}px`;
					span.textContent = text;
					frag.appendChild(span);
				}
				subOverlay.replaceChildren(frag);
			}

			function updatePretextReflow() {
				if (!reflow.ready || reflow.downgraded || !avatar) return;
				const t0 = performance.now();
				const screen = avatarScreenXY();
				const cx = screen.x - reflow.originLeft;
				const cy = screen.y - reflow.originTop - REFLOW_OBSTACLE_LIFT_PX;
				const r  = obstacleRadiusPx();
				const lines = layoutLinesAroundObstacle(cx, cy, r);
				paintReflowLines(lines);
				const cost = performance.now() - t0;
				reflow.costSamples.push(cost);
				if (reflow.costSamples.length > REFLOW_WINDOW) reflow.costSamples.shift();
				if (reflow.costSamples.length === REFLOW_WINDOW) {
					let sum = 0;
					for (const c of reflow.costSamples) sum += c;
					if (sum / REFLOW_WINDOW > REFLOW_BUDGET_MS) {
						reflow.downgraded = true;
						document.body.classList.remove('pretext-active');
						subOverlay.replaceChildren();
						console.warn('[3d-home] pretext reflow downgraded — cost budget exceeded');
					}
				}
			}

			// ── Lights ────────────────────────────────────────────────────────
			scene.add(new THREE.AmbientLight(0xffffff, 0.6));
			const key = new THREE.DirectionalLight(0xfff4dc, 2.0);
			key.position.set(3, 6, 5);
			scene.add(key);
			const rim = new THREE.DirectionalLight(0x4060ff, 0.6);
			rim.position.set(-4, 3, -2);
			scene.add(rim);
			const fill = new THREE.DirectionalLight(0xffeedd, 0.4);
			fill.position.set(0, 2, 7);
			scene.add(fill);

			// ── Avatar ────────────────────────────────────────────────────────
			let avatar = null, mixer = null, rootBone = null, baseRootPos = null;
			let sitAction = null, standupAction = null, fallAction = null;
			// On-demand clips played by the animation chips. Each is a one-shot
			// (clampWhenFinished:true) action whose 'finished' event hands control
			// back to the sit cycle. Looping clips (e.g. rumba) use a tracked
			// timer to stop after PERFORM_LOOP_MS.
			const performActions = {};               // { wave, rumba, celebrate, taunt }
			let currentPerform = null;
			const PERFORM_LOOP_MS = 6200;            // dwell on looping clips
			const PERFORM_CLIPS = [
				{ name: 'wave',      file: '/animations/clips/wave.json',      loop: false },
				{ name: 'rumba',     file: '/animations/clips/rumba.json',     loop: true  },
				{ name: 'celebrate', file: '/animations/clips/celebrate.json', loop: false },
				{ name: 'taunt',     file: '/animations/clips/taunt.json',     loop: false },
			];
			let phase = 'loading';                   // loading → sitting → standingUp → jumping → resting → performing
			let startW = { x: 0, y: 0 };             // sit/stand anchor (above the text)
			let seqT = 0, landed = false, jumpTarget = { x: 0, y: 0 };

			const STAND_S     = 2.566;  // standup clip duration
			const JUMP_S      = 2.667;  // jumpdown clip duration
			const SIT_DWELL_S = 2.4;    // how long he sits before standing
			// Earliest-possible fraction at which the impact effects MAY fire.
			// The actual trigger is gated on screen-space proximity below — this
			// just prevents the squish from going off during the arc's apex.
			const LAND_P      = 0.92;
			// Feet must be within this many SCREEN px of the button top before the
			// squish/splash fire. The parabolic arc only returns to 0 at p≈1.0, so
			// gating on real px (not the fraction p) keeps the impact synced.
			const LAND_PX     = 10;
			const PEAK_U      = 0.55;   // arc peak in world units
			const JUMP_YAW    = 0.22;   // ~12° peak yaw mid-flight (face-forward at both ends)
			// cz.glb origin is at the feet (verified in /demos/button-jump.html).
			// FEET_OFFSET stays 0 so the visible feet land on the button top.
			// SIT_OFFSET pushes the origin DOWN by the seated feet→butt distance,
			// so the butt — not the feet — rests on the text line. Tuned to the
			// sitidle pose where legs dangle below the hips.
			const FEET_OFFSET_PX = 0;
			const SIT_OFFSET_PX  = 120;

			function smoothstep(t) { return t * t * (3 - 2 * t); }

			// Sit anchor: perched on the right edge of "Give your AI".
			// SIT_OFFSET_PX shifts the GLB origin DOWN in screen px so the visible
			// butt rests on the text rather than the origin landing on the text.
			function getSitWorld() {
				const rect = sitLine.getBoundingClientRect();
				const sx = rect.right - rect.height * 0.4;
				const sy = rect.top + SIT_OFFSET_PX;
				return domToWorld(sx, sy);
			}
			// Jump target: visible feet land on the top edge of the button.
			// FEET_OFFSET_PX shifts the origin DOWN so feet (which sit above origin
			// for this GLB) align to rect.top instead of clearing it.
			function getButtonWorld() {
				const rect = ctaBtn.getBoundingClientRect();
				return domToWorld(rect.left + rect.width / 2, rect.top + FEET_OFFSET_PX);
			}

			function placeAtStart() {
				if (!avatar) return;
				startW = getSitWorld();
				if (phase === 'sitting' || phase === 'loading') {
					avatar.position.set(startW.x, startW.y, 0);
				}
			}

			function fireSquish() {
				// Kill any in-flight tween so rapid re-fires don't stack
				gsap.killTweensOf(ctaBtn);
				// Compress: fast slam downward, transform-origin:bottom center → squishes into page
				gsap.to(ctaBtn, {
					scaleY: 0.7,
					scaleX: 1.05,
					duration: 0.1,
					ease: 'power4.out',
					onComplete: () => {
						// Recoil: elastic bounce back to rest
						gsap.to(ctaBtn, {
							scaleY: 1,
							scaleX: 1,
							duration: 0.8,
							ease: 'elastic.out(1.2, 0.3)',
						});
					},
				});
			}

			// Splash on impact: a fan of lime droplets squirts from the button's
			// top edge with real ballistic motion (initial velocity + gravity),
			// so the landing reads as wet/squishy rather than a purely synthetic
			// bounce. DOM nodes so the splash composites with the button itself.
			const SPLASH_GRAVITY = 1600;   // px/s²
			const SPLASH_COUNT   = 20;
			function fireSplash() {
				const rect = ctaBtn.getBoundingClientRect();
				const ox = rect.left + rect.width / 2;
				const oy = rect.top + 2;
				const drops = [];
				for (let i = 0; i < SPLASH_COUNT; i++) {
					const size = 5 + Math.random() * 7;
					const el = document.createElement('div');
					el.style.cssText =
						`position:fixed;` +
						`left:${ox - size / 2}px;top:${oy - size / 2}px;` +
						`width:${size}px;height:${size}px;border-radius:50%;` +
						`background:radial-gradient(circle at 35% 30%,#f6ffc4,#d6ff3d 55%,#92b500);` +
						`box-shadow:0 0 6px rgba(214,255,61,0.65);` +
						`pointer-events:none;z-index:30;will-change:transform,opacity;`;
					document.body.appendChild(el);
					// Fan upward: ~-150° to -30°, biased toward overhead spray
					const angle = -Math.PI / 2 + (Math.random() - 0.5) * Math.PI * 1.15;
					const speed = 230 + Math.random() * 360;
					drops.push({
						el, x: 0, y: 0,
						vx: Math.cos(angle) * speed,
						vy: Math.sin(angle) * speed,
						life: 0,
						max: 0.85 + Math.random() * 0.5,
					});
				}
				let last = performance.now();
				(function step(now) {
					const dt = Math.min((now - last) / 1000, 0.04);
					last = now;
					let alive = false;
					for (const d of drops) {
						if (!d.el) continue;
						d.life += dt;
						d.vy   += SPLASH_GRAVITY * dt;
						d.x    += d.vx * dt;
						d.y    += d.vy * dt;
						const t = d.life / d.max;
						if (t >= 1) { d.el.remove(); d.el = null; continue; }
						d.el.style.opacity   = String(1 - t * t);
						d.el.style.transform = `translate(${d.x.toFixed(1)}px, ${d.y.toFixed(1)}px)`;
						alive = true;
					}
					if (alive) requestAnimationFrame(step);
				})(last);
			}

			function startSit() {
				if (!sitAction) return;
				phase = 'sitting';
				placeAtStart();
				fallAction?.stop();
				standupAction?.stop();
				// Stop any in-flight perform clip so it doesn't blend into sitidle
				for (const a of Object.values(performActions)) a.stop();
				currentPerform = null;
				// Face the camera the entire cycle — no turning around
				gsap.killTweensOf(avatar.rotation);
				avatar.rotation.set(0, 0, 0);
				sitAction.reset().play();
				later(startStandup, SIT_DWELL_S * 1000);
			}

			// Crossfade duration tuned for organic blending between morph targets
			// and skeletal animations. ~0.3s reads as "intentional" rather than a snap.
			const FADE_S = 0.3;

			function startStandup() {
				if (!standupAction || phase !== 'sitting') return;
				phase = 'standingUp';
				// Crossfade sit → standup, no rotation change
				standupAction.reset();
				standupAction.crossFadeFrom(sitAction, FADE_S, false).play();
				// Trigger jump just before standup ends, leaving room for the next fade
				later(triggerJump, (STAND_S - FADE_S) * 1000);
			}

			function triggerJump() {
				if (!avatar || !fallAction || phase === 'jumping') return;

				// Re-read both endpoints fresh so the trajectory is always layout-correct
				startW     = getSitWorld();      // where we ACTUALLY jump from (avatar's current rest)
				jumpTarget = getButtonWorld();   // where the feet need to land

				phase = 'jumping'; seqT = 0; landed = false;
				fallAction.reset();
				fallAction.crossFadeFrom(standupAction, FADE_S, false).play();
			}

			function updateSeq(dt) {
				if (phase !== 'jumping' || !avatar) return;
				seqT += dt;
				const p    = Math.min(seqT / JUMP_S, 1);
				const ease = smoothstep(p);

				// Animate BOTH axes between startW (sit anchor) and jumpTarget (button)
				const x   = startW.x + (jumpTarget.x - startW.x) * ease;
				const arc = PEAK_U * 4 * p * (1 - p);
				const y   = startW.y + (jumpTarget.y - startW.y) * ease + arc;

				avatar.position.set(x, y, 0);

				// Subtle in-flight yaw — peaks mid-arc, returns to 0 by landing.
				// Sign follows horizontal travel direction so he looks where he's going.
				const dir = Math.sign(jumpTarget.x - startW.x);
				avatar.rotation.y = JUMP_YAW * dir * Math.sin(Math.PI * p);

				// Squish + splash fire only on real screen-space contact. The arc
				// only returns to 0 at p≈1.0, so we gate on actual feet-to-button
				// distance (LAND_PX) rather than the time fraction — otherwise the
				// bounce telegraphs ~35px before the visual landing.
				if (!landed && p >= LAND_P) {
					const dxPx = Math.abs(avatar.position.x - jumpTarget.x) * PX_PER_UNIT;
					const dyPx = Math.abs(avatar.position.y - jumpTarget.y) * PX_PER_UNIT;
					if (dxPx < LAND_PX && dyPx < LAND_PX) {
						landed = true;
						fireSquish();
						fireSplash();
					}
				}

				if (p >= 1) {
					phase = 'resting';
					later(() => {
						const fromX = avatar.position.x;
						const fromY = avatar.position.y;
						const back  = getSitWorld();
						startW = back;
						// Settle yaw back to 0 just in case the trajectory ended mid-arc
						avatar.rotation.y = 0;
						const t0 = performance.now();
						(function slide(now) {
							const sp = Math.min((now - t0) / 700, 1);
							avatar.position.x = fromX + (back.x - fromX) * smoothstep(sp);
							avatar.position.y = fromY + (back.y - fromY) * smoothstep(sp);
							if (sp < 1) requestAnimationFrame(slide);
							else {
								avatar.position.set(back.x, back.y, 0);
								startSit();
							}
						})(performance.now());
					}, 1600);
				}
			}

			// Click skips straight to the jump (still must crossfade from current pose)
			ctaBtn.addEventListener('click', e => {
				e.preventDefault();
				if (phase === 'sitting' || phase === 'standingUp') triggerJump();
			});

			// ── On-demand performance: chip click → one-shot clip, then resume cycle
			let returnSlide = null;       // rAF id for the post-perform slide back to sit
			function cancelReturnSlide() {
				if (returnSlide) { cancelAnimationFrame(returnSlide); returnSlide = null; }
			}
			function activeAction() {
				if (sitAction?.isRunning())     return sitAction;
				if (standupAction?.isRunning()) return standupAction;
				if (fallAction?.isRunning())    return fallAction;
				return currentPerform;
			}
			function setChipPressed(name) {
				for (const c of chips) c.setAttribute('aria-pressed', String(c.dataset.clip === name));
			}
			function performAction(name) {
				const act = performActions[name];
				if (!avatar || !act) return;
				if (phase === 'performing' && currentPerform === act) return;

				// Hand-off: stop the sit/jump cycle and any in-flight position lerp.
				// cancelReturnSlide() is critical — without it, a previous perform's
				// slide-back rAF would still complete and call startSit(), nuking
				// the perform we just started.
				clearTimers();
				cancelReturnSlide();
				if (recalSlide) { cancelAnimationFrame(recalSlide); recalSlide = null; }
				phase = 'performing';

				// Stand at the CTA button — keeps the avatar centered in the
				// reader's eye-line where the page already focuses attention.
				const stage = getButtonWorld();
				avatar.position.set(stage.x, stage.y, 0);
				gsap.killTweensOf(avatar.rotation);
				avatar.rotation.set(0, 0, 0);

				const prev = activeAction();
				act.reset();
				if (prev && prev !== act) act.crossFadeFrom(prev, FADE_S, false);
				act.play();
				currentPerform = act;
				setChipPressed(name);

				// Loops have no 'finished' event — schedule the resume manually.
				const def = PERFORM_CLIPS.find(c => c.name === name);
				if (def?.loop) later(() => resumeCycleAfterPerform(act), PERFORM_LOOP_MS);
			}
			function resumeCycleAfterPerform(act) {
				if (phase !== 'performing' || currentPerform !== act) return;
				setChipPressed(null);
				// Slide the avatar from the CTA back to the sit anchor before
				// startSit teleports + plays sitidle, so the return reads as
				// "walked back to perch" rather than a hard cut.
				phase = 'resting';
				cancelReturnSlide();
				const fromX = avatar.position.x, fromY = avatar.position.y;
				const back  = getSitWorld();
				startW = back;
				avatar.rotation.y = 0;
				const t0 = performance.now();
				(function slide(now) {
					// If a new perform took over mid-slide, abandon: phase has
					// already advanced and the new perform is owning the avatar.
					if (phase !== 'resting') { returnSlide = null; return; }
					const sp = Math.min((now - t0) / 700, 1);
					avatar.position.x = fromX + (back.x - fromX) * smoothstep(sp);
					avatar.position.y = fromY + (back.y - fromY) * smoothstep(sp);
					if (sp < 1) returnSlide = requestAnimationFrame(slide);
					else {
						returnSlide = null;
						avatar.position.set(back.x, back.y, 0);
						startSit();   // resets perform clip + plays sitidle
					}
				})(performance.now());
			}
			for (const chip of chips) {
				chip.addEventListener('click', () => performAction(chip.dataset.clip));
			}

			// ── Load avatar + animations ──────────────────────────────────────
			// Realistic Avaturn-rigged humanoid; clips in /public/animations/clips
			// are retargeted to this rig (see public/animations/registry.json).
			new GLTFLoader().load('/avatars/default.glb', gltf => {
				avatar = gltf.scene;
				avatar.traverse(n => {
					if (!rootBone && /^(Hips|Root|mixamorig:?Hips)$/i.test(n.name))
						rootBone = n;
				});
				// Yaw is choreographed per-phase: facing camera while seated, rotates
				// toward the jump direction during standup.
				avatar.rotation.y = 0;
				scene.add(avatar);

				mixer = new THREE.AnimationMixer(avatar);
				mixer.addEventListener('finished', e => {
					if (phase === 'performing' && e.action === currentPerform) {
						resumeCycleAfterPerform(e.action);
					}
				});

				const fetchClip = (file) => fetch(file).then(r => r.json());
				Promise.all([
					fetchClip('/animations/clips/sitidle.json'),
					fetchClip('/animations/clips/standup.json'),
					fetchClip('/animations/clips/jumpdown.json'),
					...PERFORM_CLIPS.map(c => fetchClip(c.file)),
				]).then(([sitJson, standJson, jumpJson, ...performJsons]) => {
					sitAction = mixer.clipAction(THREE.AnimationClip.parse(sitJson));
					sitAction.setLoop(THREE.LoopRepeat, Infinity);

					standupAction = mixer.clipAction(THREE.AnimationClip.parse(standJson));
					standupAction.setLoop(THREE.LoopOnce, 1);
					standupAction.clampWhenFinished = true;

					fallAction = mixer.clipAction(THREE.AnimationClip.parse(jumpJson));
					fallAction.setLoop(THREE.LoopOnce, 1);
					fallAction.clampWhenFinished = true;

					PERFORM_CLIPS.forEach((def, i) => {
						const a = mixer.clipAction(THREE.AnimationClip.parse(performJsons[i]));
						if (def.loop) {
							a.setLoop(THREE.LoopRepeat, Infinity);
						} else {
							a.setLoop(THREE.LoopOnce, 1);
							a.clampWhenFinished = true;
						}
						performActions[def.name] = a;
					});

					// Chips were disabled until clips landed — enable now.
					for (const c of chips) c.disabled = false;

					if (rootBone) baseRootPos = rootBone.position.clone();

					// Root-bone lock — only active during 'jumping'. The jump clip
					// has translational root motion that would compete with our
					// JS-driven parabolic arc, so we clamp Hips to its rest pose
					// for those frames. Other phases (sitting, standingUp, perform)
					// must let the clip's Hips.position drive seated/standing height
					// — clamping there forces default.glb's standing rest pose into
					// every clip and the avatar floats above the sit anchor.
					const _r = renderer.render.bind(renderer);
					renderer.render = (sc, cam) => {
						try {
							if (phase === 'jumping' && rootBone && baseRootPos) {
								rootBone.position.copy(baseRootPos);
							}
						} catch (_) {}
						_r(sc, cam);
					};

					// Begin the cycle: sit on the text, stand up, jump to the button
					startSit();
				});
			});

			// ── Proximity shadow: ground the avatar by sharpening the text shadow
			// on #sit-line as he descends onto it. We project the avatar's world
			// position to screen px, compare against the rect's top edge, then map
			// vertical distance → shadow blur/darkness. As he sits (distance≈0),
			// the shadow is sharp + dark; as he leaves (distance≫), shadow fades.
			const _proj = new THREE.Vector3();
			function avatarScreenY() {
				_proj.set(avatar.position.x, avatar.position.y, avatar.position.z);
				_proj.project(camera);
				return (1 - _proj.y) * 0.5 * window.innerHeight;
			}
			function updateProximityShadow() {
				if (!avatar) return;
				const rect = sitLine.getBoundingClientRect();
				const ay = avatarScreenY();
				// Distance from avatar origin (feet) to text top edge, in px.
				// Negative = he's below the text line, clamp to 0 so shadow stays max.
				const dy = Math.max(0, rect.top - ay);
				// Map 0..220px → proximity 1..0 (closer = stronger shadow)
				const prox = 1 - Math.min(dy / 220, 1);
				if (prox <= 0.01) {
					sitLine.style.setProperty('--agent-shadow', 'none');
					return;
				}
				// Sharper (smaller blur) + darker as he gets closer.
				const blur    = (10 * (1 - prox) + 2).toFixed(2);   // 2px → 12px
				const offsetY = (2 + 6 * prox).toFixed(2);          // 2px → 8px
				const alpha   = (0.55 * prox).toFixed(3);           // 0 → 0.55
				sitLine.style.setProperty(
					'--agent-shadow',
					`0 ${offsetY}px ${blur}px rgba(0,0,0,${alpha})`
				);
			}

			// ── Render loop ───────────────────────────────────────────────────
			const clock = new THREE.Clock();
			(function tick() {
				requestAnimationFrame(tick);
				try {
					const dt = Math.min(clock.getDelta(), 0.05);
					mixer?.update(dt);
					updateSeq(dt);
					updateProximityShadow();
					updatePretextReflow();
					renderer.render(scene, camera);
				} catch (_) {}
			})();
		</script>
	</body>
</html>
