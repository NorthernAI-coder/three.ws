<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="three.ws IRL">
  <defs>
    <!-- Vertex glow -->
    <radialGradient id="irlVglow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="30%" stop-color="#b8e8ff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#b8e8ff" stop-opacity="0"/>
    </radialGradient>
    <!-- Ground-anchor glow -->
    <radialGradient id="irlGround" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7ec8e3" stop-opacity="0.35"/>
      <stop offset="60%" stop-color="#3a8fb5" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#3a8fb5" stop-opacity="0"/>
    </radialGradient>
    <!-- Anchor beam -->
    <linearGradient id="irlBeam" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b8e8ff" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#7ec8e3" stop-opacity="0"/>
    </linearGradient>
    <!-- Edge glow filter -->
    <filter id="irlEdge" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Strong vertex glow filter -->
    <filter id="irlVtx" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Cube face gradients -->
    <linearGradient id="irlFaceTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2a3a" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#0a1520" stop-opacity="0.85"/>
    </linearGradient>
    <linearGradient id="irlFaceRight" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1e2e" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#060e18" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="irlFaceLeft" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1a28" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#080f1a" stop-opacity="0.9"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#080814"/>

  <!-- Ground glow pooled under the anchor -->
  <ellipse cx="256" cy="392" rx="168" ry="48" fill="url(#irlGround)"/>

  <!-- ── Floating crystal cube (the three.ws primitive) ──
       Vertices: top 256,92 · back-L 150,150 · back-R 362,150
       center 256,208 · side-L 150,266 · side-R 362,266 · front-bottom 256,324 -->

  <!-- Faces -->
  <polygon points="256,92 150,150 150,266 256,324" fill="url(#irlFaceLeft)"/>
  <polygon points="256,92 362,150 362,266 256,324" fill="url(#irlFaceRight)"/>
  <polygon points="256,92 150,150 256,208 362,150" fill="url(#irlFaceTop)"/>

  <!-- Inner face grid -->
  <line x1="203" y1="121" x2="203" y2="295" stroke="#1a3a5a" stroke-width="0.6" opacity="0.3"/>
  <line x1="150" y1="208" x2="256" y2="208" stroke="#1a3a5a" stroke-width="0.6" opacity="0.3"/>
  <line x1="309" y1="121" x2="309" y2="295" stroke="#1a3a5a" stroke-width="0.6" opacity="0.3"/>
  <line x1="256" y1="208" x2="362" y2="208" stroke="#1a3a5a" stroke-width="0.6" opacity="0.3"/>
  <line x1="203" y1="121" x2="309" y2="121" stroke="#1a3a5a" stroke-width="0.6" opacity="0.25"/>
  <line x1="256" y1="92"  x2="256" y2="208" stroke="#1a3a5a" stroke-width="0.6" opacity="0.25"/>

  <!-- Anchor beam: cube → ground -->
  <line x1="256" y1="324" x2="256" y2="390" stroke="url(#irlBeam)" stroke-width="3" stroke-dasharray="2 9" stroke-linecap="round"/>

  <!-- Edges -->
  <g filter="url(#irlEdge)" stroke-linecap="round">
    <line x1="256" y1="92"  x2="150" y2="150" stroke="#7ec8e3" stroke-width="2.4" opacity="0.75"/>
    <line x1="256" y1="92"  x2="362" y2="150" stroke="#7ec8e3" stroke-width="2.4" opacity="0.75"/>
    <line x1="150" y1="150" x2="256" y2="208" stroke="#5aadcf" stroke-width="1.6" opacity="0.5"/>
    <line x1="362" y1="150" x2="256" y2="208" stroke="#5aadcf" stroke-width="1.6" opacity="0.5"/>
    <line x1="150" y1="150" x2="150" y2="266" stroke="#5aadcf" stroke-width="2"   opacity="0.55"/>
    <line x1="362" y1="150" x2="362" y2="266" stroke="#5aadcf" stroke-width="2"   opacity="0.55"/>
    <line x1="256" y1="208" x2="256" y2="324" stroke="#4a9abf" stroke-width="1.6" opacity="0.42"/>
    <line x1="150" y1="266" x2="256" y2="324" stroke="#5aadcf" stroke-width="2"   opacity="0.6"/>
    <line x1="362" y1="266" x2="256" y2="324" stroke="#5aadcf" stroke-width="2"   opacity="0.6"/>
  </g>

  <!-- Vertex glows -->
  <circle cx="256" cy="92"  r="15" fill="url(#irlVglow)" filter="url(#irlVtx)"/>
  <circle cx="150" cy="150" r="10" fill="url(#irlVglow)" opacity="0.6" filter="url(#irlVtx)"/>
  <circle cx="362" cy="150" r="10" fill="url(#irlVglow)" opacity="0.6" filter="url(#irlVtx)"/>
  <circle cx="256" cy="208" r="7"  fill="url(#irlVglow)" opacity="0.32" filter="url(#irlVtx)"/>
  <circle cx="150" cy="266" r="7"  fill="url(#irlVglow)" opacity="0.32" filter="url(#irlVtx)"/>
  <circle cx="362" cy="266" r="7"  fill="url(#irlVglow)" opacity="0.42" filter="url(#irlVtx)"/>
  <circle cx="256" cy="324" r="8"  fill="url(#irlVglow)" opacity="0.45" filter="url(#irlVtx)"/>

  <!-- ── AR ground-anchor reticle ── -->
  <g filter="url(#irlEdge)">
    <ellipse cx="256" cy="392" rx="140" ry="34" fill="none" stroke="#7ec8e3" stroke-width="2.2" opacity="0.7"/>
    <ellipse cx="256" cy="392" rx="88"  ry="21" fill="none" stroke="#5aadcf" stroke-width="1.6" opacity="0.5"/>
    <!-- cardinal ticks -->
    <line x1="256" y1="350" x2="256" y2="364" stroke="#b8e8ff" stroke-width="2.4" stroke-linecap="round" opacity="0.85"/>
    <line x1="256" y1="420" x2="256" y2="434" stroke="#7ec8e3" stroke-width="2.4" stroke-linecap="round" opacity="0.7"/>
    <line x1="106" y1="392" x2="120" y2="392" stroke="#7ec8e3" stroke-width="2.4" stroke-linecap="round" opacity="0.7"/>
    <line x1="392" y1="392" x2="406" y2="392" stroke="#7ec8e3" stroke-width="2.4" stroke-linecap="round" opacity="0.7"/>
  </g>
  <!-- Anchor point -->
  <circle cx="256" cy="392" r="6" fill="#b8e8ff" filter="url(#irlVtx)"/>
  <circle cx="256" cy="392" r="2.6" fill="#ffffff"/>
</svg>
