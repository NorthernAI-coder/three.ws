<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Changelog · three.ws</title>
<meta name="description" content="What's new on three.ws — features, improvements, and releases, newest first." />
<link rel="canonical" href="https://three.ws/changelog" />
<link rel="alternate" type="application/rss+xml" title="three.ws changelog" href="/changelog.xml" />
<link rel="stylesheet" href="/nav.css" />
<link rel="stylesheet" href="/footer.css" />
<style>
	:root { color-scheme: dark; }
	body { margin: 0; background: #000000; color: #e7e7e7; font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; -webkit-font-smoothing: antialiased; }
	.cl-wrap { max-width: 760px; margin: 0 auto; padding: 96px 24px 64px; }
	.cl-hero h1 { font-size: clamp(34px, 5vw, 52px); margin: 0 0 12px; letter-spacing: -0.02em; }
	.cl-hero p { color: #b6b6b6; font-size: 17px; margin: 0 0 8px; line-height: 1.55; }
	.cl-hero a { color: #cccccc; }
	.cl-filters { display: flex; flex-wrap: wrap; gap: 8px; margin: 24px 0 0; }
	.cl-filter { background: #0d0d0d; border: 1px solid #1d1d1d; color: #b6b6b6; font-size: 12px; font-weight: 600; letter-spacing: 0.03em; border-radius: 999px; padding: 6px 14px; cursor: pointer; transition: border-color .15s, color .15s; }
	.cl-filter:hover { border-color: #555555; color: #ffffff; }
	.cl-filter:focus-visible { outline: 2px solid #66ffaa; outline-offset: 2px; }
	.cl-filter[aria-pressed="true"] { border-color: #66ffaa; color: #66ffaa; background: #0c1c14; }
	.cl-day { margin: 44px 0 0; padding-top: 28px; border-top: 1px solid #1d1d1d; }
	.cl-day:first-of-type { border-top: none; padding-top: 0; }
	.cl-date { font-size: 13px; color: #777777; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; letter-spacing: 0.04em; margin: 0 0 16px; }
	.cl-item { display: block; background: #0d0d0d; border: 1px solid #1d1d1d; border-radius: 12px; padding: 16px 18px; margin-bottom: 10px; text-decoration: none; transition: border-color .15s, transform .15s; }
	a.cl-item:hover, a.cl-item:focus-visible { border-color: #ffffff; transform: translateY(-1px); outline: none; }
	.cl-item-title { color: #fff; font-weight: 600; font-size: 15px; }
	.cl-item-path { color: #777777; font-size: 12px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; margin-left: 8px; }
	.cl-item-desc { color: #b6b6b6; font-size: 13px; line-height: 1.5; margin-top: 6px; }
	.cl-empty, .cl-error { color: #9a9a9a; font-size: 15px; }
	.cl-badge { display: inline-block; font-size: 10px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; border-radius: 999px; padding: 2px 8px; margin-left: 8px; vertical-align: middle; }
	.cl-badge-new { color: #66ffaa; border: 1px solid #1f4a3f; background: #0c1c14; }
	.cl-tag { display: inline-block; font-size: 10px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; border-radius: 999px; padding: 2px 8px; margin-right: 6px; border: 1px solid #2a2a2a; color: #9a9a9a; background: #111111; }
	.cl-tag-launch { color: #66ffaa; border-color: #1f4a3f; background: #0c1c14; }
	.cl-tag-feature { color: #7ec8ff; border-color: #1d3a52; background: #0b141d; }
	.cl-tag-improvement { color: #d8b4ff; border-color: #3a2752; background: #150d1d; }
	.cl-tag-fix { color: #ffd27e; border-color: #523f1d; background: #1d150b; }
	.cl-tag-security { color: #ff8e8e; border-color: #521d1d; background: #1d0b0b; }
	.cl-tag-sdk { color: #8effd9; border-color: #1d5240; background: #0b1d16; }
	.cl-tags { margin-top: 10px; }
</style>
</head>
<body>
	<div id="nav-container"></div>
	<script src="/nav.js"></script>
	<main class="cl-wrap">
		<div class="cl-hero">
			<h1>Changelog</h1>
			<p>Everything shipped on three.ws, newest first — new pages, features, improvements, fixes, and releases.</p>
			<p>Follow along: <a href="/changelog.xml">RSS</a> · <a href="/changelog.json">JSON feed</a> · <a href="/llms.txt">llms.txt</a> · <a href="/sitemap">sitemap</a></p>
			<div class="cl-filters" id="cl-filters" role="group" aria-label="Filter changelog entries"></div>
		</div>
		<div id="cl-content"><p class="cl-empty">Loading…</p></div>
	</main>

	<script type="module">
		const RECENT_DAYS = 14;
		const elt = document.getElementById('cl-content');
		const filtersElt = document.getElementById('cl-filters');
		const FILTERS = ['all', 'launch', 'feature', 'improvement', 'fix', 'sdk', 'security', 'infra', 'docs'];
		let activeFilter = 'all';
		let entries = [];

		function fmtDate(iso) {
			try {
				return new Date(iso + 'T00:00:00Z').toLocaleDateString(undefined, {
					year: 'numeric', month: 'long', day: 'numeric', timeZone: 'UTC',
				});
			} catch { return iso; }
		}

		const esc = (s) => String(s ?? '').replace(/[<>&"]/g, (c) => ({ '<': '&lt;', '>': '&gt;', '&': '&amp;', '"': '&quot;' })[c]);

		function entryTags(e) {
			return e.type === 'launch' ? ['launch'] : e.tags || [];
		}

		function render() {
			const visible = activeFilter === 'all' ? entries : entries.filter((e) => entryTags(e).includes(activeFilter));
			if (visible.length === 0) {
				elt.innerHTML = '<p class="cl-empty">Nothing here for this filter yet — try another one.</p>';
				return;
			}
			const byDate = new Map();
			for (const e of visible) {
				if (!byDate.has(e.date)) byDate.set(e.date, []);
				byDate.get(e.date).push(e);
			}
			const now = Date.now();
			elt.innerHTML = [...byDate.entries()].map(([date, items]) => {
				const isNew = (now - new Date(date + 'T00:00:00Z').getTime()) < RECENT_DAYS * 86400000;
				const cards = items.map((e) => {
					const tags = entryTags(e).map((t) => `<span class="cl-tag cl-tag-${esc(t)}">${esc(t)}</span>`).join('');
					const inner = `
						<span class="cl-item-title">${esc(e.title)}</span>
						${e.type === 'launch' ? `<span class="cl-item-path">${esc(e.link)}</span>` : ''}
						<div class="cl-item-desc">${esc(e.summary)}</div>
						<div class="cl-tags">${tags}</div>`;
					return e.link
						? `<a class="cl-item" href="${esc(e.link)}">${inner}</a>`
						: `<div class="cl-item">${inner}</div>`;
				}).join('');
				return `<section class="cl-day">
					<p class="cl-date">${fmtDate(date)}${isNew ? '<span class="cl-badge cl-badge-new">new</span>' : ''}</p>
					${cards}
				</section>`;
			}).join('');
		}

		function renderFilters() {
			filtersElt.innerHTML = FILTERS.map((f) =>
				`<button class="cl-filter" type="button" data-filter="${f}" aria-pressed="${f === activeFilter}">${f === 'all' ? 'All' : f}</button>`,
			).join('');
			filtersElt.querySelectorAll('.cl-filter').forEach((btn) => {
				btn.addEventListener('click', () => {
					activeFilter = btn.dataset.filter;
					renderFilters();
					render();
				});
			});
		}

		try {
			const res = await fetch('/changelog.json', { headers: { accept: 'application/json' } });
			if (!res.ok) throw new Error('feed ' + res.status);
			const data = await res.json();
			entries = data.entries || [];
			renderFilters();
			render();
		} catch (err) {
			elt.innerHTML = '<p class="cl-error">Couldn\'t load the changelog right now. Try the <a href="/changelog.json">JSON feed</a> directly.</p>';
			console.error('[changelog]', err);
		}
	</script>
	<script src="/brand.js" defer></script>
		<div id="footer-container"></div>
		<script src="/footer.js"></script>
</body>
</html>
