<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Changelog · three.ws</title>
<meta name="description" content="What's new on three.ws — features, improvements, and releases, newest first." />
<link rel="canonical" href="https://three.ws/changelog" />
<link rel="alternate" type="application/rss+xml" title="three.ws changelog" href="/changelog.xml" />
<link rel="stylesheet" href="/nav.css" />
<link rel="stylesheet" href="/footer.css" />
<script>/* three.ws theme boot — no-flash; runtime in /theme-switcher.js */(function(){try{var m=localStorage.getItem('twx_theme');var l=m==='auto'?(window.matchMedia&&window.matchMedia('(prefers-color-scheme: light)').matches):m==='light';document.documentElement.setAttribute('data-theme',l?'light':'dark');}catch(e){document.documentElement.setAttribute('data-theme','dark');}})();</script>
<style>
	/* Tokens arrive via /nav.css -> tokens.css. Page-local hue accents only for
	   the two tag families with no semantic token (feature/improvement) — a
	   theme layer, not a parallel palette. */
	:root { --cl-feature: #7ec8ff; --cl-improvement: #d8b4ff; }
	body { margin: 0; background: var(--bg-0); color: var(--ink); font-family: var(--font-body); -webkit-font-smoothing: antialiased; }
	.cl-wrap { max-width: 760px; margin: 0 auto; padding: 96px 24px 64px; }
	.cl-hero h1 { font-size: clamp(34px, 5vw, 52px); margin: 0 0 12px; letter-spacing: -0.02em; color: var(--ink-bright); }
	.cl-hero p { color: var(--ink-dim); font-size: 17px; margin: 0 0 8px; line-height: 1.55; }
	.cl-hero a { color: var(--ink); }
	.cl-filters { display: flex; flex-wrap: wrap; gap: 8px; margin: 24px 0 0; }
	.cl-filter { background: var(--surface-1); border: 1px solid var(--stroke); color: var(--ink-dim); font-size: 12px; font-weight: var(--weight-semibold); letter-spacing: 0.03em; border-radius: var(--radius-pill); padding: 6px 14px; cursor: pointer; transition: border-color var(--duration-fast) var(--ease-standard), color var(--duration-fast) var(--ease-standard); }
	.cl-filter:hover { border-color: var(--stroke-strong); color: var(--ink-bright); }
	.cl-filter:focus-visible { outline: 2px solid var(--focus-ring-color); outline-offset: 2px; }
	.cl-filter[aria-pressed="true"] { border-color: var(--success); color: var(--success); background: color-mix(in srgb, var(--success) 8%, transparent); }
	.cl-day { margin: 44px 0 0; padding-top: 28px; border-top: 1px solid var(--stroke); }
	.cl-day:first-of-type { border-top: none; padding-top: 0; }
	.cl-date { font-size: 13px; color: var(--ink-faint); font-family: var(--font-mono); letter-spacing: 0.04em; margin: 0 0 16px; }
	.cl-item { display: block; background: var(--surface-1); border: 1px solid var(--stroke); border-radius: var(--radius-lg); padding: 16px 18px; margin-bottom: 10px; text-decoration: none; transition: border-color var(--duration-fast) var(--ease-standard), transform var(--duration-fast) var(--ease-standard); }
	a.cl-item:hover, a.cl-item:focus-visible { border-color: var(--accent); transform: translateY(-1px); outline: none; }
	.cl-item-title { color: var(--ink-bright); font-weight: var(--weight-semibold); font-size: 15px; }
	.cl-item-path { color: var(--ink-faint); font-size: 12px; font-family: var(--font-mono); margin-left: 8px; }
	.cl-item-desc { color: var(--ink-dim); font-size: 13px; line-height: 1.5; margin-top: 6px; }
	.cl-empty, .cl-error { color: var(--ink-dim); font-size: 15px; }
	.cl-error a { color: var(--ink); }
	.cl-badge { display: inline-block; font-size: 10px; font-weight: var(--weight-bold); letter-spacing: 0.05em; text-transform: uppercase; border-radius: var(--radius-pill); padding: 2px 8px; margin-left: 8px; vertical-align: middle; }
	.cl-badge-new { color: var(--success); border: 1px solid color-mix(in srgb, var(--success) 35%, transparent); background: color-mix(in srgb, var(--success) 8%, transparent); }
	.cl-tag { display: inline-block; font-size: 10px; font-weight: var(--weight-bold); letter-spacing: 0.05em; text-transform: uppercase; border-radius: var(--radius-pill); padding: 2px 8px; margin-right: 6px; border: 1px solid var(--stroke); color: var(--ink-dim); background: var(--surface-1); }
	.cl-tag-launch { color: var(--success); border-color: color-mix(in srgb, var(--success) 35%, transparent); background: color-mix(in srgb, var(--success) 8%, transparent); }
	.cl-tag-feature { color: var(--cl-feature); border-color: color-mix(in srgb, var(--cl-feature) 35%, transparent); background: color-mix(in srgb, var(--cl-feature) 8%, transparent); }
	.cl-tag-improvement { color: var(--cl-improvement); border-color: color-mix(in srgb, var(--cl-improvement) 35%, transparent); background: color-mix(in srgb, var(--cl-improvement) 8%, transparent); }
	.cl-tag-fix { color: var(--warn); border-color: color-mix(in srgb, var(--warn) 35%, transparent); background: color-mix(in srgb, var(--warn) 8%, transparent); }
	.cl-tag-security { color: var(--danger); border-color: color-mix(in srgb, var(--danger) 35%, transparent); background: color-mix(in srgb, var(--danger) 8%, transparent); }
	.cl-tag-sdk { color: var(--success); border-color: color-mix(in srgb, var(--success) 35%, transparent); background: color-mix(in srgb, var(--success) 8%, transparent); }
	.cl-tags { margin-top: 10px; }
</style>
</head>
<body>
	<div id="nav-container"></div>
	<script src="/nav.js"></script>
	<main class="cl-wrap">
		<div class="cl-hero">
			<h1>Changelog</h1>
			<p>Everything shipped on three.ws, newest first — new pages, features, improvements, fixes, and releases.</p>
			<p>Follow along: <a href="/changelog.xml">RSS</a> · <a href="/changelog.json">JSON feed</a> · <a href="/llms.txt">llms.txt</a> · <a href="/sitemap">sitemap</a></p>
			<div class="cl-filters" id="cl-filters" role="group" aria-label="Filter changelog entries"></div>
		</div>
		<div id="cl-content"><p class="cl-empty">Loading…</p></div>
	</main>

	<script type="module">
		const RECENT_DAYS = 14;
		const elt = document.getElementById('cl-content');
		const filtersElt = document.getElementById('cl-filters');
		const FILTERS = ['all', 'launch', 'feature', 'improvement', 'fix', 'sdk', 'security', 'infra', 'docs'];
		let activeFilter = 'all';
		let entries = [];

		function fmtDate(iso) {
			try {
				return new Date(iso + 'T00:00:00Z').toLocaleDateString(undefined, {
					year: 'numeric', month: 'long', day: 'numeric', timeZone: 'UTC',
				});
			} catch { return iso; }
		}

		const esc = (s) => String(s ?? '').replace(/[<>&"]/g, (c) => ({ '<': '&lt;', '>': '&gt;', '&': '&amp;', '"': '&quot;' })[c]);

		function slugify(title, date) {
			const slug = title.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '').slice(0, 80);
			return date + '-' + slug;
		}

		function entryTags(e) {
			return e.type === 'launch' ? ['launch'] : e.tags || [];
		}

		function render() {
			const visible = activeFilter === 'all' ? entries : entries.filter((e) => entryTags(e).includes(activeFilter));
			if (visible.length === 0) {
				elt.innerHTML = '<p class="cl-empty">Nothing here for this filter yet — try another one.</p>';
				return;
			}
			const byDate = new Map();
			for (const e of visible) {
				if (!byDate.has(e.date)) byDate.set(e.date, []);
				byDate.get(e.date).push(e);
			}
			const now = Date.now();
			elt.innerHTML = [...byDate.entries()].map(([date, items]) => {
				const isNew = (now - new Date(date + 'T00:00:00Z').getTime()) < RECENT_DAYS * 86400000;
				const cards = items.map((e) => {
					const tags = entryTags(e).map((t) => `<span class="cl-tag cl-tag-${esc(t)}">${esc(t)}</span>`).join('');
					const detailUrl = `/changelog/${slugify(e.title, e.date)}`;
					const inner = `
						<span class="cl-item-title">${esc(e.title)}</span>
						${e.type === 'launch' ? `<span class="cl-item-path">${esc(e.link)}</span>` : ''}
						<div class="cl-item-desc">${esc(e.summary)}</div>
						<div class="cl-tags">${tags}</div>`;
					return `<a class="cl-item" href="${esc(detailUrl)}">${inner}</a>`;
				}).join('');
				return `<section class="cl-day">
					<p class="cl-date">${fmtDate(date)}${isNew ? '<span class="cl-badge cl-badge-new">new</span>' : ''}</p>
					${cards}
				</section>`;
			}).join('');
		}

		function renderFilters() {
			filtersElt.innerHTML = FILTERS.map((f) =>
				`<button class="cl-filter" type="button" data-filter="${f}" aria-pressed="${f === activeFilter}">${f === 'all' ? 'All' : f}</button>`,
			).join('');
			filtersElt.querySelectorAll('.cl-filter').forEach((btn) => {
				btn.addEventListener('click', () => {
					activeFilter = btn.dataset.filter;
					renderFilters();
					render();
				});
			});
		}

		try {
			const res = await fetch('/changelog.json', { headers: { accept: 'application/json' } });
			if (!res.ok) throw new Error('feed ' + res.status);
			const data = await res.json();
			entries = data.entries || [];
			renderFilters();
			render();
		} catch (err) {
			elt.innerHTML = '<p class="cl-error">Couldn\'t load the changelog right now. Try the <a href="/changelog.json">JSON feed</a> directly.</p>';
			console.error('[changelog]', err);
		}
	</script>
	<script src="/brand.js" defer></script>
		<div id="footer-container"></div>
		<script src="/footer.js"></script>
</body>
</html>
