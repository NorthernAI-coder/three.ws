<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width,initial-scale=1" />
	<title>AI Stream · three.ws</title>
	<link rel="icon" href="/favicon.ico" />
	<link rel="stylesheet" href="/style.css" />
	<link rel="stylesheet" href="/ai-stream.css" />
	<link rel="stylesheet" href="/fonts/fonts.css" />
</head>
<body class="ai-stream-page">
	<header class="ai-stream-header">
		<h1><a href="/"><img src="/three.svg" alt="three.ws" /> AI Stream</a></h1>
		<div class="controls">
			<button id="ctl-avatar-btn" type="button" aria-haspopup="dialog" aria-expanded="false" title="Choose avatar">
				<span class="avatar-thumb" id="ctl-avatar-thumb" aria-hidden="true"></span>
				<span class="avatar-name" id="ctl-avatar-label">Avatar</span>
				<span class="avatar-caret" aria-hidden="true">▾</span>
			</button>
			<select id="ctl-mood" title="Avatar mood — biases reaction intensity">
				<option value="chill">😎 Chill</option>
				<option value="normal" selected>🙂 Normal</option>
				<option value="hype">🤩 Hype</option>
			</select>
			<button id="ctl-narrate" class="toggle" type="button" data-on="1" title="Toggle agent narration">🔊</button>
		</div>
		<div class="status">
			<span id="status-dot" class="dot connecting"></span><span id="status-label">connecting…</span>
		</div>
	</header>

	<main class="ai-stream-main">
		<div id="stage">
			<iframe id="agent" allow="autoplay" title="3D agent"></iframe>
		</div>
		<aside id="feed-container">
			<div id="feed"></div>
		</aside>
	</main>

	<!-- Re-using the same modals and logic from pumpfun.html -->
	<div class="pf-modal-backdrop" id="avatar-picker" data-open="false" role="dialog" aria-modal="true" aria-labelledby="avatar-picker-title">
		<div class="pf-modal" role="document">
			<div class="pf-modal-head">
				<h2 id="avatar-picker-title">Choose an avatar</h2>
				<span class="spacer"></span>
				<button class="pf-modal-close" type="button" aria-label="Close" data-picker-close>×</button>
			</div>
			<div class="pf-tabs" role="tablist">
				<button class="pf-tab" role="tab" type="button" data-tab="defaults" aria-selected="true">Defaults</button>
				<button class="pf-tab" role="tab" type="button" data-tab="mine">My Agents</button>
				<button class="pf-tab" role="tab" type="button" data-tab="community">Community</button>
			</div>
			<div class="pf-toolbar">
				<input type="search" id="picker-search" placeholder="Search..." />
			</div>
			<div class="pf-content">
				<div class="pf-body" id="picker-body"></div>
				<aside class="pf-preview" aria-label="Avatar preview">
					<div class="pf-preview-stage" id="picker-preview-stage"></div>
					<div class="pf-preview-meta" id="picker-preview-meta"></div>
				</aside>
			</div>
		</div>
	</div>

	<script>
		// This will be a simplified version of the script from pumpfun.html
		// focusing on the core agent + feed functionality.
		const $ = (id) => document.getElementById(id);
		const url = new URL(location.href);

		// Global state
		const params = {
			narrate: url.searchParams.get('narrate') !== '0',
			mood: url.searchParams.get('mood') || 'normal',
			avatar: url.searchParams.get('avatar') || '/avatars/cz.glb',
		};

		const iframe = $('agent');
		const feedEl = $('feed');

		function setStatus(state, label) {
			const dot = $('status-dot');
			const lbl = $('status-label');
			if(dot) dot.className = 'dot ' + state;
			if(lbl) lbl.textContent = label;
		}

		function mountAgent() {
			const modelHash = '&model=' + encodeURIComponent(params.avatar);
			const widgetId = 'wdgt_demo_pumpfun_stream';
			iframe.src = `/widget#widget=${widgetId}&kiosk=true&type=pumpfun-feed${modelHash}&narrate=${params.narrate ? '1' : '0'}`;
		}
		
		// Live mint feed via the same SSE endpoint pumpfun.html uses. Reconnects
		// with exponential backoff so the page stays useful across cold starts
		// or short network drops. Duplicate-mint suppression so the same mint
		// doesn't echo when the upstream reissues.
		let _es = null;
		let _esClosed = false;
		let _esBackoffMs = 1000;
		const _seenMints = new Set();

		function connectFeed() {
			if (_esClosed) return;
			setStatus('connecting', 'connecting…');
			if (_es) { try { _es.close(); } catch {} _es = null; }

			const endpoint = new URL('/api/agents/pumpfun-feed', location.href);
			endpoint.searchParams.set('kind', 'mint');
			_es = new EventSource(endpoint.href, { withCredentials: true });

			_es.addEventListener('open', () => {
				_esBackoffMs = 1000;
				setStatus('live', 'live');
			});
			const ingest = (evt) => {
				let payload;
				try { payload = JSON.parse(evt.data); } catch { return; }
				if (!payload || typeof payload !== 'object') return;
				if (payload.mint && _seenMints.has(payload.mint)) return;
				if (payload.mint) _seenMints.add(payload.mint);

				const card = renderEvtCard(payload);
				if (card) {
					feedEl.insertBefore(card, feedEl.firstChild);
					while (feedEl.children.length > 20) feedEl.removeChild(feedEl.lastChild);
				}
				narrateEvent(payload);
			};
			_es.addEventListener('mint', ingest);
			_es.addEventListener('ping', () => {});
			_es.onerror = () => {
				if (_esClosed || !_es) return;
				if (_es.readyState === EventSource.CLOSED) {
					setStatus('down', 'offline');
					setTimeout(connectFeed, _esBackoffMs);
					_esBackoffMs = Math.min(_esBackoffMs * 1.5, 15000);
				} else {
					setStatus('connecting', 'reconnecting…');
				}
			};
		}

		window.addEventListener('beforeunload', () => {
			_esClosed = true;
			if (_es) { try { _es.close(); } catch {} }
		});

		function renderEvtCard(evt) {
			const name = String(evt.name || 'Untitled');
			const symbol = String(evt.symbol || '');
			const description = String(evt.description || '').slice(0, 200);
			const mc = Number(evt.market_cap_usd || 0);
			const card = document.createElement('div');
			card.className = 'evt';
			card.innerHTML = `
				<div class="evt-title">${escapeHtml(name)}${symbol ? ' ($' + escapeHtml(symbol) + ')' : ''}</div>
				<div class="evt-desc">${escapeHtml(description)}</div>
				<div class="evt-meta">MC: $${mc.toLocaleString()}</div>
			`;
			return card;
		}

		function escapeHtml(s) {
			return String(s).replace(/[&<>"']/g, (c) => ({
				'&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;',
			})[c]);
		}

		function narrateEvent(evt) {
			if (!params.narrate) return;
			const name = String(evt.name || 'a new token');
			const initialBuy = Number(evt.initial_buy_sol || 0);
			const mc = Number(evt.market_cap_usd || 0);
			const text = `New token minted: ${name}! Initial buy of ${initialBuy} SOL. Market cap is now ${mc} dollars.`;
			iframe.contentWindow?.postMessage({ type: 'say', payload: { text, mood: params.mood } }, '*');
		}

		function init() {
			mountAgent();
			connectFeed();

			$('ctl-narrate').addEventListener('click', (e) => {
				params.narrate = !params.narrate;
				e.currentTarget.dataset.on = params.narrate ? '1' : '0';
			});

			$('ctl-mood').addEventListener('change', (e) => {
				params.mood = e.target.value;
			});
		}

		init();
	</script>
</body>
</html>
