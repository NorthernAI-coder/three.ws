<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width,initial-scale=1" />
	<title>Admin · three.ws</title>
	<link rel="icon" href="/favicon.ico" />
	<style>
		:root { color-scheme: dark; --accent: #ffffff; --accent2: #ffffff; }
		* { box-sizing: border-box; margin: 0; padding: 0; }
		body { font: 14px/1.5 -apple-system,system-ui,'Segoe UI',sans-serif; background: #090909; color: #ccc; min-height: 100vh; }
		a { color: #888888; text-decoration: none; }
		a:hover { text-decoration: underline; }

		/* Layout */
		.layout { display: flex; min-height: 100vh; }
		.sidebar { width: 200px; background: #0e0e0e; border-right: 1px solid #1f1f1f; padding: 20px 0; flex-shrink: 0; }
		.sidebar-brand { font-size: 11px; letter-spacing: .1em; text-transform: uppercase; color: var(--accent); padding: 0 20px 20px; display: block; }
		.sidebar-badge { display: inline-block; background: rgba(255,70,70,.15); color: #ff6060; font-size: 10px; padding: 1px 6px; border-radius: 4px; margin-left: 6px; }
		.nav-item { display: block; padding: 9px 20px; color: #888; cursor: pointer; border-left: 2px solid transparent; font-size: 13px; }
		.nav-item:hover { color: #eee; background: #131313; }
		.nav-item.active { color: #eee; border-left-color: var(--accent); background: #131313; }
		.main { flex: 1; padding: 32px; overflow-y: auto; }

		/* Header */
		.page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; }
		.page-title { font-size: 20px; color: #eee; font-weight: 600; }
		.user-chip { font-size: 12px; color: #666; }

		/* Cards */
		.stat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px,1fr)); gap: 12px; margin-bottom: 28px; }
		.stat-card { background: #101010; border: 1px solid #1f1f1f; border-radius: 10px; padding: 16px; }
		.stat-label { font-size: 11px; color: #555; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 6px; }
		.stat-value { font-size: 26px; color: #eee; font-weight: 600; }
		.stat-sub { font-size: 11px; color: #555; margin-top: 2px; }

		/* Section */
		.section { background: #101010; border: 1px solid #1f1f1f; border-radius: 10px; margin-bottom: 20px; }
		.section-head { padding: 14px 18px; border-bottom: 1px solid #1f1f1f; display: flex; align-items: center; gap: 12px; }
		.section-title { font-size: 14px; color: #eee; font-weight: 500; }
		.section-body { padding: 0; }

		/* Table */
		table { width: 100%; border-collapse: collapse; font-size: 13px; }
		th { text-align: left; padding: 10px 16px; color: #555; font-weight: 500; border-bottom: 1px solid #1b1b1b; font-size: 11px; text-transform: uppercase; letter-spacing: .06em; }
		td { padding: 10px 16px; border-bottom: 1px solid #121212; color: #aaa; vertical-align: middle; }
		tr:last-child td { border-bottom: none; }
		tr:hover td { background: #121212; }

		/* Badges */
		.badge { display: inline-block; padding: 2px 8px; border-radius: 5px; font-size: 11px; font-weight: 500; }
		.badge-free { background: #1b1b1b; color: #666; }
		.badge-pro { background: rgba(255,255,255,0.09); color: #e8e8e8; }
		.badge-team { background: rgba(0,200,150,.12); color: #00c896; }
		.badge-enterprise { background: rgba(255,92,168,.12); color: #ffffff; }
		.badge-evm { background: rgba(255,165,0,.1); color: #f90; }
		.badge-solana { background: rgba(20,241,149,.1); color: #14f195; }
		.badge-admin { background: rgba(255,70,70,.15); color: #ff6060; }

		/* Controls */
		.controls { display: flex; gap: 10px; align-items: center; }
		input[type=text], select {
			padding: 7px 12px; background: #101010; border: 1px solid #2b2b2b; border-radius: 7px;
			color: #eee; font-size: 13px; outline: none;
		}
		input[type=text]:focus, select:focus { border-color: var(--accent); }
		.btn { padding: 7px 14px; border: 0; border-radius: 7px; font-size: 13px; font-weight: 500; cursor: pointer; }
		.btn-primary { background: var(--accent); color: #fff; }
		.btn-danger  { background: rgba(255,70,70,.15); color: #ff6060; border: 1px solid rgba(255,70,70,.3); }
		.btn-sm { padding: 4px 10px; font-size: 12px; }
		.btn:disabled { opacity: .5; cursor: default; }

		/* User detail drawer */
		.drawer { display: none; position: fixed; top: 0; right: 0; width: 420px; height: 100vh; background: #0e0e0e; border-left: 1px solid #1f1f1f; padding: 24px; overflow-y: auto; z-index: 100; box-shadow: -8px 0 32px rgba(0,0,0,.5); }
		.drawer.open { display: block; }
		.drawer-close { position: absolute; top: 16px; right: 16px; background: none; border: none; color: #666; font-size: 18px; cursor: pointer; }
		.drawer h2 { font-size: 16px; color: #eee; margin-bottom: 16px; }
		.field { margin-bottom: 14px; }
		.field label { display: block; font-size: 11px; color: #555; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 4px; }
		.field-val { color: #aaa; font-size: 13px; word-break: break-all; }

		/* Pager */
		.pager { display: flex; align-items: center; gap: 12px; padding: 12px 16px; font-size: 13px; color: #555; }
		.pager button { background: #1b1b1b; border: 1px solid #2b2b2b; color: #aaa; border-radius: 6px; padding: 4px 12px; cursor: pointer; font-size: 12px; }
		.pager button:disabled { opacity: .4; cursor: default; }

		/* Loading / empty */
		.empty { padding: 40px; text-align: center; color: #444; font-size: 14px; }
		.spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #333; border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
		@keyframes spin { to { transform: rotate(360deg); } }

		/* Charts */
		.chart-wrap { padding: 16px 18px; }
		.bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; font-size: 12px; }
		.bar-label { width: 80px; color: #666; text-align: right; flex-shrink: 0; }
		.bar-track { flex: 1; background: #1b1b1b; border-radius: 4px; height: 8px; }
		.bar-fill  { height: 8px; border-radius: 4px; background: linear-gradient(90deg,var(--accent),var(--accent2)); }
		.bar-count { width: 40px; color: #aaa; flex-shrink: 0; }

		/* Column chart (time series) */
		.col-chart { display: flex; align-items: flex-end; gap: 3px; height: 120px; padding-top: 8px; }
		.col { flex: 1; min-width: 0; background: linear-gradient(180deg,var(--accent),var(--accent2)); border-radius: 3px 3px 0 0; min-height: 2px; opacity: .85; transition: opacity .15s; cursor: default; position: relative; }
		.col:hover { opacity: 1; }
		.col-axis { display: flex; justify-content: space-between; font-size: 10px; color: #444; padding-top: 6px; }

		/* Compact KPI row reused across analytics tabs */
		.kpi-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px,1fr)); gap: 12px; margin-bottom: 20px; }
	</style>
</head>
<body>
<div class="layout" id="app">
	<nav class="sidebar">
		<span class="sidebar-brand">three.ws <span class="sidebar-badge">ADMIN</span></span>
		<a class="nav-item active" data-tab="overview" onclick="switchTab('overview')">Overview</a>
		<a class="nav-item" data-tab="users" onclick="switchTab('users')">Users</a>
		<a class="nav-item" data-tab="revenue" onclick="switchTab('revenue')">Revenue</a>
		<a class="nav-item" data-tab="llm" onclick="switchTab('llm')">LLM Spend</a>
		<a class="nav-item" data-tab="usage" onclick="switchTab('usage')">Usage</a>
		<a class="nav-item" data-tab="growth" onclick="switchTab('growth')">Growth</a>
		<a class="nav-item" href="/admin/news">News</a>
		<a class="nav-item" href="/admin/sdp">Solana Platform</a>
		<a class="nav-item" href="/admin/seeder">Avatar Seeder</a>
		<a class="nav-item" href="/admin/ops">Ops Health</a>
		<a class="nav-item" href="/admin/launcher">Launcher</a>
		<a class="nav-item" href="/dashboard/">Dashboard</a>
	</nav>
	<main class="main">
		<div class="page-header">
			<span class="page-title" id="page-title">Overview</span>
			<span class="user-chip" id="user-chip"></span>
		</div>
		<div id="tab-overview"></div>
		<div id="tab-users" style="display:none"></div>
		<div id="tab-revenue" style="display:none"></div>
		<div id="tab-llm" style="display:none"></div>
		<div id="tab-usage" style="display:none"></div>
		<div id="tab-growth" style="display:none"></div>
	</main>
</div>

<!-- User detail drawer -->
<div class="drawer" id="drawer">
	<button class="drawer-close" onclick="closeDrawer()">✕</button>
	<div id="drawer-content"></div>
</div>

<script>
// Single-use CSRF token: server burns it on every state-changing call. The
// cache is invalidated immediately after we read it so the next mutation pulls
// a fresh one.
let _csrfToken = null;
async function getCsrfToken() {
	if (_csrfToken) return _csrfToken;
	const r = await fetch('/api/csrf-token', { credentials: 'include' });
	if (!r.ok) return null;
	const j = await r.json();
	_csrfToken = j?.data?.token || null;
	return _csrfToken;
}

const api = {
	get: (url) => fetch(url, { credentials: 'include' }).then((r) => r.json()),
	patch: async (url, body) => {
		const csrf = await getCsrfToken();
		_csrfToken = null;
		const headers = { 'content-type': 'application/json' };
		if (csrf) headers['x-csrf-token'] = csrf;
		return fetch(url, { method: 'PATCH', credentials: 'include', headers, body: JSON.stringify(body) }).then((r) => r.json());
	},
	post: async (url, body) => {
		const csrf = await getCsrfToken();
		_csrfToken = null;
		const headers = { 'content-type': 'application/json' };
		if (csrf) headers['x-csrf-token'] = csrf;
		return fetch(url, { method: 'POST', credentials: 'include', headers, body: body == null ? undefined : JSON.stringify(body) }).then((r) => r.json());
	},
	delete: async (url, body) => {
		const csrf = await getCsrfToken();
		_csrfToken = null;
		const headers = body ? { 'content-type': 'application/json' } : {};
		if (csrf) headers['x-csrf-token'] = csrf;
		return fetch(url, { method: 'DELETE', credentials: 'include', headers, body: body ? JSON.stringify(body) : undefined }).then((r) => r.json());
	},
};

let state = { tab: 'overview', usersPage: 1, usersQ: '', usersPlan: '', statsData: null };

// Escape any value interpolated into innerHTML. display_name/email are user-set
// profile fields and error_description comes from upstream responses — both render
// in an admin's authenticated session, so an unescaped <img onerror> would be
// stored XSS with privilege escalation. Always wrap untrusted strings with esc().
function esc(v) {
	return String(v == null ? '' : v)
		.replace(/&/g, '&amp;')
		.replace(/</g, '&lt;')
		.replace(/>/g, '&gt;')
		.replace(/"/g, '&quot;')
		.replace(/'/g, '&#39;');
}

// ── Auth guard ──────────────────────────────────────────────────────────────

async function boot() {
	const me = await api.get('/api/auth/me').catch(() => null);
	if (!me?.user) return location.replace('/login?next=/admin/');
	document.getElementById('user-chip').textContent = me.user.display_name || me.user.email || '';
	switchTab('overview');
}

// ── Tab routing ─────────────────────────────────────────────────────────────

const TAB_TITLES = { overview: 'Overview', users: 'Users', revenue: 'Revenue', llm: 'LLM Spend', usage: 'Usage', growth: 'Growth & Virality' };
function switchTab(tab) {
	state.tab = tab;
	document.querySelectorAll('.nav-item[data-tab]').forEach((el) => el.classList.toggle('active', el.dataset.tab === tab));
	['overview', 'users', 'revenue', 'llm', 'usage', 'growth'].forEach((t) => {
		document.getElementById('tab-' + t).style.display = t === tab ? '' : 'none';
	});
	document.getElementById('page-title').textContent = TAB_TITLES[tab] || 'Overview';
	if (tab === 'overview' && !state.statsData) loadOverview();
	if (tab === 'users') loadUsers();
	if (tab === 'revenue') loadRevenue();
	if (tab === 'llm') loadLlmSpend();
	if (tab === 'usage') loadFeatures();
	if (tab === 'growth') loadGrowth();
}

// ── Overview tab ─────────────────────────────────────────────────────────────

async function loadOverview() {
	const el = document.getElementById('tab-overview');
	el.innerHTML = '<div class="empty"><span class="spinner"></span></div>';
	const data = await api.get('/api/admin/stats');
	if (data.error) { el.innerHTML = `<div class="empty">Error: ${esc(data.error_description)}</div>`; return; }
	state.statsData = data;
	const c = data.counts;

	el.innerHTML = `
		<div class="stat-grid">
			${statCard('Total users', c.total_users)}
			${statCard('New (7d)', c.new_users_7d)}
			${statCard('New (30d)', c.new_users_30d)}
			${statCard('Active sessions', c.active_sessions)}
			${statCard('Total avatars', c.total_avatars)}
			${statCard('Storage', fmtBytes(c.total_bytes))}
			${statCard('Total agents', c.total_agents)}
			${statCard('Active subs', c.active_subscriptions)}
		</div>
		<div class="section">
			<div class="section-head"><span class="section-title">New signups · last 30 days</span><span style="margin-left:auto;font-size:12px;color:#555" id="signups-total"></span></div>
			<div class="chart-wrap" id="signups-chart"></div>
		</div>
		<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
			<div class="section">
				<div class="section-head"><span class="section-title">Plan breakdown</span></div>
				<div class="chart-wrap" id="plan-chart"></div>
			</div>
			<div class="section">
				<div class="section-head"><span class="section-title">Chain breakdown</span></div>
				<div class="chart-wrap" id="chain-chart"></div>
			</div>
		</div>
	`;

	renderSignups(data.recentSignups || []);

	const maxPlan = Math.max(...data.planBreakdown.map((r) => r.users), 1);
	document.getElementById('plan-chart').innerHTML = data.planBreakdown.map((r) =>
		`<div class="bar-row">
			<span class="bar-label">${r.plan}</span>
			<div class="bar-track"><div class="bar-fill" style="width:${Math.round(r.users/maxPlan*100)}%"></div></div>
			<span class="bar-count">${r.users}</span>
		</div>`
	).join('');

	const maxChain = Math.max(...data.chainBreakdown.map((r) => r.wallets), 1);
	document.getElementById('chain-chart').innerHTML = data.chainBreakdown.map((r) =>
		`<div class="bar-row">
			<span class="bar-label">${r.chain_type}</span>
			<div class="bar-track"><div class="bar-fill" style="width:${Math.round(r.wallets/maxChain*100)}%"></div></div>
			<span class="bar-count">${r.wallets}</span>
		</div>`
	).join('');
}

function statCard(label, value) {
	return `<div class="stat-card"><div class="stat-label">${label}</div><div class="stat-value">${value ?? '—'}</div></div>`;
}

// ── Users tab ──────────────────────────────────────────────────────────────

async function loadUsers() {
	const el = document.getElementById('tab-users');
	const q = state.usersQ, plan = state.usersPlan, page = state.usersPage;

	if (!el.querySelector('.section')) {
		el.innerHTML = `
			<div class="section">
				<div class="section-head">
					<span class="section-title">Users</span>
					<div class="controls" style="margin-left:auto">
						<input type="text" id="u-search" placeholder="Search email / wallet…" value="${q}" style="width:220px" oninput="debounceSearch(this.value)">
						<select id="u-plan" onchange="filterPlan(this.value)">
							<option value="">All plans</option>
							<option value="free">Free</option>
							<option value="pro">Pro</option>
							<option value="team">Team</option>
							<option value="enterprise">Enterprise</option>
						</select>
					</div>
				</div>
				<div class="section-body">
					<div id="users-table-wrap"><div class="empty"><span class="spinner"></span></div></div>
				</div>
				<div class="pager" id="users-pager"></div>
			</div>
		`;
		document.getElementById('u-plan').value = plan;
	}

	document.getElementById('users-table-wrap').innerHTML = '<div class="empty"><span class="spinner"></span></div>';
	const params = new URLSearchParams({ q, page, limit: 50, ...(plan ? { plan } : {}) });
	const data = await api.get('/api/admin/users?' + params);
	if (data.error) {
		document.getElementById('users-table-wrap').innerHTML = `<div class="empty">Error: ${data.error_description}</div>`;
		return;
	}

	const rows = data.users.map((u) => {
		const wallets = (u.wallets || []).map((w) =>
			`<span class="badge badge-${w.chain_type}">${w.chain_type === 'solana' ? shortAddr(w.address, 4) : shortAddr(w.address, 6)}</span>`
		).join(' ');
		return `<tr onclick="openDrawer('${u.id}')" style="cursor:pointer">
			<td>${u.display_name ? esc(u.display_name) : '<span style="color:#444">—</span>'}</td>
			<td style="color:#666;font-size:12px">${esc(u.email)}</td>
			<td>${wallets || '<span style="color:#444">—</span>'}</td>
			<td><span class="badge badge-${u.plan}">${u.plan}</span>${u.is_admin ? ' <span class="badge badge-admin">admin</span>' : ''}</td>
			<td style="color:#555;font-size:12px">${fmtDate(u.created_at)}</td>
			<td>${u.avatar_count}</td>
		</tr>`;
	}).join('');

	document.getElementById('users-table-wrap').innerHTML = rows.length
		? `<table><thead><tr><th>Name</th><th>Email</th><th>Wallets</th><th>Plan</th><th>Joined</th><th>Avatars</th></tr></thead><tbody>${rows}</tbody></table>`
		: '<div class="empty">No users found.</div>';

	const total = data.total;
	const pages = Math.ceil(total / data.limit);
	document.getElementById('users-pager').innerHTML = `
		<button onclick="changePage(${page-1})" ${page <= 1 ? 'disabled' : ''}>← Prev</button>
		<span>Page ${page} of ${pages} &nbsp;(${total} total)</span>
		<button onclick="changePage(${page+1})" ${page >= pages ? 'disabled' : ''}>Next →</button>
	`;
}

let _debounceTimer;
function debounceSearch(val) {
	clearTimeout(_debounceTimer);
	_debounceTimer = setTimeout(() => { state.usersQ = val; state.usersPage = 1; loadUsers(); }, 300);
}
function filterPlan(val) { state.usersPlan = val; state.usersPage = 1; loadUsers(); }
function changePage(p) { state.usersPage = p; loadUsers(); }

// ── User drawer ────────────────────────────────────────────────────────────

async function openDrawer(id) {
	const drawer = document.getElementById('drawer');
	const content = document.getElementById('drawer-content');
	content.innerHTML = '<div class="empty"><span class="spinner"></span></div>';
	drawer.classList.add('open');

	const data = await api.get(`/api/admin/user/${id}`);
	if (data.error) { content.innerHTML = `<div class="empty">${esc(data.error_description)}</div>`; return; }
	const u = data.user;
	const wallets = (u.wallets || []).map((w) =>
		`<div style="margin:3px 0"><span class="badge badge-${esc(w.chain_type)}">${esc(w.chain_type)}</span> <code style="font-size:11px;color:#888">${esc(w.address)}</code>${w.is_primary ? ' <span style="color:#555;font-size:11px">primary</span>' : ''}</div>`
	).join('');
	const subs = (u.subscriptions || []).map((s) =>
		`<div style="font-size:12px;color:#888">${s.plan} · ${s.chain_type} · <span style="color:${s.status==='active'?'#00c896':'#ff6060'}">${s.status}</span></div>`
	).join('') || '<span style="color:#444">none</span>';

	content.innerHTML = `
		<h2>${u.display_name ? esc(u.display_name) : 'Unnamed user'}</h2>
		<div class="field"><label>ID</label><div class="field-val"><code style="font-size:11px">${esc(u.id)}</code></div></div>
		<div class="field"><label>Email</label><div class="field-val">${esc(u.email)}</div></div>
		<div class="field"><label>Wallets</label><div class="field-val">${wallets || '—'}</div></div>
		<div class="field"><label>Plan</label>
			<div style="display:flex;align-items:center;gap:8px;margin-top:4px">
				<select id="d-plan" style="font-size:13px">
					<option value="free"${u.plan==='free'?' selected':''}>Free</option>
					<option value="pro"${u.plan==='pro'?' selected':''}>Pro</option>
					<option value="team"${u.plan==='team'?' selected':''}>Team</option>
					<option value="enterprise"${u.plan==='enterprise'?' selected':''}>Enterprise</option>
				</select>
				<button class="btn btn-primary btn-sm" onclick="updateUser('${u.id}',{plan:document.getElementById('d-plan').value})">Save</button>
			</div>
		</div>
		<div class="field"><label>Admin</label>
			<div style="display:flex;align-items:center;gap:8px;margin-top:4px">
				<input type="checkbox" id="d-admin" ${u.is_admin ? 'checked' : ''}>
				<label for="d-admin" style="font-size:13px;text-transform:none;letter-spacing:0;color:#aaa">Is admin</label>
				<button class="btn btn-primary btn-sm" onclick="updateUser('${u.id}',{is_admin:document.getElementById('d-admin').checked})">Save</button>
			</div>
		</div>
		<div class="field"><label>Subscriptions</label><div class="field-val">${subs}</div></div>
		<div class="field"><label>Avatars</label><div class="field-val">${u.avatar_count}</div></div>
		<div class="field"><label>Agents</label><div class="field-val">${u.agent_count}</div></div>
		<div class="field"><label>Active sessions</label><div class="field-val">${u.active_sessions}</div></div>
		<div class="field"><label>Joined</label><div class="field-val">${fmtDate(u.created_at)}</div></div>
		${u.deleted_at ? `<div style="color:#ff6060;font-size:13px;margin-top:8px">Deleted ${fmtDate(u.deleted_at)}</div>` : ''}
		<div style="margin-top:20px;display:flex;gap:8px">
			${u.deleted_at
				? `<button class="btn btn-primary btn-sm" onclick="updateUser('${u.id}',{deleted:false})">Restore</button>`
				: `<button class="btn btn-danger btn-sm" onclick="confirmDelete('${u.id}')">Delete account</button>`}
		</div>
		<div id="drawer-msg" style="margin-top:12px;font-size:13px;min-height:20px"></div>
	`;
}

async function updateUser(id, patch) {
	const msg = document.getElementById('drawer-msg');
	if (msg) msg.textContent = 'Saving…';
	const data = await api.patch(`/api/admin/user/${id}`, patch);
	if (data.error) { if (msg) msg.style.color='#ff6060', msg.textContent = data.error_description; return; }
	if (msg) { msg.style.color='#00c896'; msg.textContent = 'Saved.'; }
	state.statsData = null;
	setTimeout(() => openDrawer(id), 500);
}

function confirmDelete(id) {
	if (!confirm('Delete this account? This soft-deletes the user and their content. On-chain data is unaffected.')) return;
	updateUser(id, { deleted: true });
}

function closeDrawer() { document.getElementById('drawer').classList.remove('open'); }

// ── Shared chart renderers ───────────────────────────────────────────────────

// Column chart from [{day, <valueKey>}] rows. Fills missing days as zero so the
// 30-day window is always continuous and comparable week-over-week.
function renderSignups(rows) {
	const wrap = document.getElementById('signups-chart');
	if (!wrap) return;
	const total = rows.reduce((s, r) => s + (r.users || 0), 0);
	const totalEl = document.getElementById('signups-total');
	if (totalEl) totalEl.textContent = `${total} total`;
	wrap.innerHTML = colChart(rows.map((r) => ({ day: r.day, value: r.users })));
}

// Generic column chart markup. Each item: {day, value}. Bars scale to the max.
function colChart(items, fmt = (v) => v) {
	if (!items.length) return '<div class="empty" style="padding:20px">No activity yet.</div>';
	const max = Math.max(...items.map((i) => i.value), 1);
	const cols = items.map((i) =>
		`<div class="col" style="height:${Math.max(2, Math.round(i.value / max * 100))}%" title="${esc(fmtDate(i.day))}: ${esc(fmt(i.value))}"></div>`
	).join('');
	const first = items[0]?.day, last = items[items.length - 1]?.day;
	return `<div class="col-chart">${cols}</div><div class="col-axis"><span>${esc(fmtDate(first))}</span><span>${esc(fmtDate(last))}</span></div>`;
}

// Horizontal ranked bars from rows, picking label + value via accessors.
function rankBars(rows, labelOf, valueOf, fmt = (v) => v) {
	if (!rows.length) return '<div class="empty" style="padding:20px">No data.</div>';
	const max = Math.max(...rows.map(valueOf), 1);
	return rows.map((r) => {
		const v = valueOf(r);
		return `<div class="bar-row">
			<span class="bar-label" style="width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${esc(labelOf(r))}">${esc(labelOf(r))}</span>
			<div class="bar-track"><div class="bar-fill" style="width:${Math.round(v / max * 100)}%"></div></div>
			<span class="bar-count" style="width:70px;text-align:right">${esc(fmt(v))}</span>
		</div>`;
	}).join('');
}

function kpi(label, value, sub) {
	return `<div class="stat-card"><div class="stat-label">${esc(label)}</div><div class="stat-value">${esc(value ?? '—')}</div>${sub ? `<div class="stat-sub">${esc(sub)}</div>` : ''}</div>`;
}

// ── Growth tab (referral loop & k-factor) ──────────────────────────────────────

async function loadGrowth() {
	const el = document.getElementById('tab-growth');
	el.innerHTML = '<div class="empty"><span class="spinner"></span></div>';
	const data = await api.get('/api/admin/referrals');
	if (data.error) { el.innerHTML = `<div class="empty">Error: ${esc(data.error_description || data.error)}</div>`; return; }

	const f = data.funnel || {};
	const c = data.conversion || {};
	const t = data.totals || {};
	const k = Number(data.k_factor) || 0;
	// k-factor headline tints green when the loop is self-sustaining (>1).
	const kColor = k >= 1 ? '#22c55e' : k >= 0.5 ? '#eab308' : '#888';
	const pct = (v) => (Number(v) * 100).toFixed(1) + '%';

	el.innerHTML = `
		<div class="kpi-grid">
			<div class="stat-card">
				<div class="stat-label">k-factor · ${esc(data.window_days)}d</div>
				<div class="stat-value" style="color:${kColor}">${k.toFixed(3)}</div>
				<div class="stat-sub">signups per sharing user${k >= 1 ? ' · viral 🚀' : ''}</div>
			</div>
			${kpi('Link visits', fmtNum(f.visits), `${fmtNum(f.sharers)} sharers`)}
			${kpi('Referred signups', fmtNum(f.signups), `${pct(c.visit_to_signup)} of visits`)}
			${kpi('Activations', fmtNum(f.activations), `${pct(c.signup_to_activation)} of signups`)}
			${kpi('Rewards paid', fmtUsdShort(t.rewards_paid_usd), `${fmtNum(t.rewards_paid_count)} grants`)}
			${kpi('Referred members', fmtNum(t.referred_members), `${fmtNum(t.activated_referred_members)} activated`)}
		</div>
		<div class="section">
			<div class="section-head"><span class="section-title">Referred signups vs activations · last ${esc(data.window_days)} days</span></div>
			<div class="chart-wrap" id="growth-day"></div>
		</div>
		<div class="section">
			<div class="section-head"><span class="section-title">Top referrers · by activated referrals</span></div>
			<div class="section-body">
				<table><thead><tr><th>Referrer</th><th>Referred</th><th>Activated</th><th>Commission</th></tr></thead><tbody>
					${(data.top_referrers || []).map((r) => `<tr>
						<td style="color:#ddd">${esc(r.display_name || r.username || r.user_id)}</td>
						<td>${fmtNum(r.referred_total)}</td>
						<td>${fmtNum(r.activated_total)}</td>
						<td>$${(Number(r.commission_earned_usd) || 0).toLocaleString('en-US', { maximumFractionDigits: 2 })}</td>
					</tr>`).join('') || '<tr><td colspan="4" class="empty">No referrals yet.</td></tr>'}
				</tbody></table>
			</div>
		</div>
	`;
	// Stacked-ish two-series trend: render signups as the column height with
	// activations annotated in the tooltip (colChart is single-series).
	const byDay = data.byDay || [];
	document.getElementById('growth-day').innerHTML = colChart(
		byDay.map((r) => ({ day: r.day, value: Number(r.signups) || 0 })),
		(v) => v + ' signups',
	);
}

function fmtUsdShort(usd) {
	const v = Number(usd) || 0;
	return '$' + v.toLocaleString('en-US', { minimumFractionDigits: v < 100 ? 2 : 0, maximumFractionDigits: 2 });
}

// ── Utils ─────────────────────────────────────────────────────────────────────

function fmtUsd(micro) { const v = (Number(micro) || 0) / 1e6; return '$' + v.toLocaleString('en-US', { minimumFractionDigits: v < 100 ? 2 : 0, maximumFractionDigits: v < 1 ? 4 : 2 }); }
function fmtUsdc(atomics) { const v = (Number(atomics) || 0) / 1e6; return v.toLocaleString('en-US', { maximumFractionDigits: 2 }) + ' USDC'; }
function fmtNum(n) { return (Number(n) || 0).toLocaleString('en-US'); }
function fmtDate(iso) { return iso ? new Date(iso).toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' }) : '—'; }
function fmtBytes(b) { if (!b) return '0 B'; const u=['B','KB','MB','GB','TB']; let i=0; while(b>=1024&&i<4){b/=1024;i++;} return b.toFixed(i?1:0)+' '+u[i]; }
function shortAddr(a, n=6) { return a ? `${a.slice(0,n)}…${a.slice(-4)}` : '—'; }
