<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="robots" content="noindex" />
		<title>My Agents · three.ws</title>
		<meta name="description" content="All your agents and avatars on three.ws — native agents plus any on-chain ERC-8004 agents linked to your wallets." />
		<link rel="canonical" href="https://three.ws/my-agents" />
		<link rel="icon" href="/favicon.ico" />
		<link rel="stylesheet" href="/my-agents/my-agents.css" />
		<script
			type="module"
			src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"
			integrity="sha384-sr9b4Ux0WhAUGclJ0ym0FSY2zSOMmNSn0bP/SA0e6bNCrpn/5W3QL8mm+LdlQMKw"
			crossorigin="anonymous"
		></script>
	</head>
	<body>
		<header class="my-agents-header">
			<div class="my-agents-header__brand"><a href="/"><img src="/three.svg" alt="" class="header-logo" aria-hidden="true" />three.ws</a></div>
			<nav class="my-agents-header__nav" aria-label="Page navigation">
				<a href="/app">Viewer</a>
				<a href="/create">Create</a>
				<a href="/discover">Discover</a>
				<a href="/widgets">Widgets</a>
				<a href="/studio">Studio</a>
				<a href="/docs">Docs</a>
				<a href="/my-agents" aria-current="page" title="ERC-8004 agents controlled by your linked wallets">My Agents</a>
				<a href="/dashboard" title="Manage three.ws agents, avatars, widgets, billing">Dashboard</a>
			</nav>
		</header>

		<main class="my-agents-main" id="my-agents-main">
			<div class="my-agents-head">
				<div class="my-agents-head__text">
					<h1 class="my-agents-title">My Agents</h1>
					<p class="my-agents-subtitle">
						Every agent you own — three.ws agents and on-chain (ERC-8004) agents from
						your linked wallets. New users get a starter agent automatically.
					</p>
				</div>
				<a class="my-agents-new" href="/create" id="my-agents-new-top" hidden>
					<svg width="15" height="15" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
					New agent
				</a>
			</div>

			<div id="my-agents-stats" class="my-agents-stats" hidden aria-label="Agent summary"></div>

			<div id="my-agents-toolbar" class="my-agents-toolbar" hidden>
				<div class="my-agents-search">
					<svg width="15" height="15" viewBox="0 0 24 24" fill="none" aria-hidden="true"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/><path d="m20 20-3-3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
					<input
						id="my-agents-search-input"
						type="search"
						placeholder="Search agents…"
						aria-label="Search your agents by name"
						autocomplete="off"
					/>
				</div>
				<label class="my-agents-sort">
					<span class="my-agents-sort__label">Sort</span>
					<select id="my-agents-sort-select" aria-label="Sort agents">
						<option value="recent">Newest first</option>
						<option value="oldest">Oldest first</option>
						<option value="name">Name (A–Z)</option>
						<option value="chats">Most chats</option>
					</select>
				</label>
			</div>

			<div
				id="my-agents-error"
				class="my-agents-error-banner"
				hidden
				role="alert"
				aria-live="polite"
			></div>

			<div
				id="my-agents-grid"
				class="my-agents-grid"
				role="list"
				aria-label="Your agents"
				aria-live="polite"
				aria-busy="true"
			></div>
		</main>

		<script type="module" src="/my-agents/my-agents.js"></script>
	</body>
</html>
