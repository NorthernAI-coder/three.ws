<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width,initial-scale=1" />
	<title>Docs · three.ws</title>
	<link rel="icon" href="/favicon.ico" />
	<meta name="description" content="Documentation for three.ws — build, embed, and monetise 3D AI agents. Guides, tutorials, API reference, and SDK docs." />
	<link rel="canonical" href="https://three.ws/docs" />
	<meta property="og:type" content="website" />
	<meta property="og:site_name" content="three.ws" />
	<meta property="og:title" content="Documentation · three.ws" />
	<meta property="og:description" content="Guides, tutorials, API reference, and SDK docs for building 3D AI agents." />
	<meta property="og:url" content="https://three.ws/docs" />
	<meta property="og:image" content="https://three.ws/api/page-og?s=learn&amp;t=Docs&amp;d=Full+documentation%3A+SDKs%2C+API+reference%2C+embedding%2C+agent+system%2C+smart+contracts.&amp;p=%2Fdocs" />
	<meta name="twitter:card" content="summary_large_image" />
	<meta name="twitter:site" content="@trythreews" />
	<style>
		:root { color-scheme: dark; --bg:#000; --panel:#0a0a0b; --line:#1c1c1f; --fg:#e7e7ea; --mut:#8a8a93; --dim:#5a5a62; --brand:#69e16f; --link:#9ad7ff; }
		* { box-sizing: border-box; }
		html, body { margin: 0; }
		body { font: 15px/1.7 -apple-system, system-ui, 'Segoe UI', sans-serif; background: var(--bg); color: var(--fg); }
		a { color: var(--link); text-decoration: none; }
		a:hover { text-decoration: underline; }
		.topbar { position: sticky; top: 0; z-index: 20; display: flex; align-items: center; gap: 14px; padding: 12px 18px; background: rgba(0,0,0,.82); backdrop-filter: blur(10px); border-bottom: 1px solid var(--line); }
		.brand { display: flex; align-items: center; gap: 8px; color: #fff; font-weight: 600; letter-spacing: -.01em; }
		.brand img { width: 16px; height: 16px; }
		.brand small { color: var(--mut); font-weight: 500; }
		.menu-btn { display: none; margin-left: auto; background: #141417; color: var(--fg); border: 1px solid var(--line); border-radius: 8px; padding: 6px 12px; cursor: pointer; font: inherit; }
		.search { margin-left: auto; flex: 0 1 260px; }
		.search input { width: 100%; background: #141417; border: 1px solid var(--line); border-radius: 8px; color: var(--fg); padding: 7px 11px; font: inherit; outline: none; }
		.search input:focus { border-color: #2f2f35; }
		.layout { display: grid; grid-template-columns: 264px minmax(0,1fr); max-width: 1180px; margin: 0 auto; }
		.sidebar { border-right: 1px solid var(--line); padding: 22px 14px 80px; height: calc(100vh - 53px); position: sticky; top: 53px; overflow-y: auto; }
		.grp { margin: 0 0 18px; }
		.grp h3 { font-size: 11px; text-transform: uppercase; letter-spacing: .08em; color: var(--dim); margin: 0 0 7px; padding: 0 10px; }
		.sidebar a { display: block; color: var(--mut); padding: 5px 10px; border-radius: 7px; font-size: 13.5px; }
		.sidebar a:hover { color: var(--fg); background: #111114; text-decoration: none; }
		.sidebar a.active { color: var(--brand); background: rgba(105,225,111,.08); }
		main { padding: 34px 40px 120px; min-height: calc(100vh - 53px); }
		.content { max-width: 760px; }
		.content h1 { font-size: 30px; letter-spacing: -.02em; margin: 0 0 18px; color: #fff; }
		.content h2 { font-size: 21px; margin: 38px 0 12px; padding-top: 10px; border-top: 1px solid var(--line); color: #f2f2f4; }
		.content h3 { font-size: 16px; margin: 26px 0 8px; color: #f2f2f4; }
		.content p, .content li { color: #c4c4ca; }
		.content ul, .content ol { padding-left: 22px; }
		.content li { margin: 4px 0; }
		.content code { background: #141417; border: 1px solid var(--line); border-radius: 5px; padding: 1.5px 5px; font-size: 13px; font-family: ui-monospace, 'SF Mono', Menlo, monospace; color: #e6c07b; }
		.content pre { background: var(--panel); border: 1px solid var(--line); border-radius: 10px; padding: 16px; overflow-x: auto; }
		.content pre code { background: none; border: none; padding: 0; color: #cdd6e4; }
		.content blockquote { border-left: 3px solid #2a2a30; margin: 16px 0; padding: 2px 16px; color: var(--mut); }
		.content table { border-collapse: collapse; width: 100%; margin: 16px 0; font-size: 14px; }
		.content th, .content td { border: 1px solid var(--line); padding: 8px 12px; text-align: left; }
		.content th { background: #111114; }
		.content img { max-width: 100%; border-radius: 8px; }
		.content hr { border: none; border-top: 1px solid var(--line); margin: 32px 0; }
		.crumbs { font-size: 13px; color: var(--dim); margin: 0 0 18px; }
		.crumbs a { color: var(--mut); }
		.skeleton span { display: block; height: 14px; background: linear-gradient(90deg,#101013,#17171b,#101013); background-size: 200% 100%; border-radius: 6px; margin: 14px 0; animation: sh 1.2s infinite; }
		@keyframes sh { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
		.error { border: 1px solid #3a2326; background: #160d0f; border-radius: 12px; padding: 24px; }
		.error h1 { font-size: 22px; margin: 0 0 8px; }
		.hero-cards { display: grid; grid-template-columns: repeat(auto-fill,minmax(220px,1fr)); gap: 12px; margin: 22px 0 0; }
		.card { display: block; border: 1px solid var(--line); border-radius: 12px; padding: 16px; background: var(--panel); transition: border-color .15s, transform .15s; }
		.card:hover { border-color: #2f2f35; transform: translateY(-2px); text-decoration: none; }
		.card b { color: #fff; display: block; margin-bottom: 4px; }
		.card span { color: var(--mut); font-size: 13px; }
		.toc-empty { color: var(--mut); }
		@media (max-width: 860px) {
			.layout { grid-template-columns: 1fr; }
			.menu-btn { display: block; }
			.search { display: none; }
			.sidebar { position: fixed; inset: 53px 0 auto 0; height: auto; max-height: calc(100vh - 53px); background: #050506; z-index: 15; transform: translateY(-120%); transition: transform .2s; }
			.sidebar.open { transform: translateY(0); }
			main { padding: 24px 20px 100px; }
		}
	</style>

	<meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1">
	<meta property="og:locale" content="en_US">
	<meta property="og:image:alt" content="Docs — three.ws">
	<meta name="twitter:title" content="Docs · three.ws">
	<meta name="twitter:description" content="Full documentation: SDKs, API reference, embedding, agent system, smart contracts.">
	<meta name="twitter:image" content="https://three.ws/api/page-og?s=learn&amp;amp;t=Docs&amp;amp;d=Full+documentation%3A+SDKs%2C+API+reference%2C+embedding%2C+agent+system%2C+smart+contracts.&amp;amp;p=%2Fdocs">
	<script type="application/ld+json">{"@context":"https://schema.org","@graph":[{"@type":"WebPage","name":"Docs","description":"Full documentation: SDKs, API reference, embedding, agent system, smart contracts.","url":"https://three.ws/docs","isPartOf":{"@type":"WebSite","name":"three.ws","url":"https://three.ws"},"primaryImageOfPage":"https://three.ws/api/page-og?s=learn&amp;t=Docs&amp;d=Full+documentation%3A+SDKs%2C+API+reference%2C+embedding%2C+agent+system%2C+smart+contracts.&amp;p=%2Fdocs"}]}</script>
</head>
<body>
	<header class="topbar">
		<a class="brand" href="/"><img src="/three.svg" alt="" />three.ws <small>docs</small></a>
		<div class="search"><input id="filter" type="search" placeholder="Filter docs…" aria-label="Filter docs" autocomplete="off" /></div>
		<button class="menu-btn" id="menuBtn" aria-expanded="false">Menu</button>
	</header>
	<div class="layout">
		<nav class="sidebar" id="sidebar" aria-label="Documentation"></nav>
		<main>
			<div class="content" id="content"></div>
		</main>
	</div>

	<script type="module">
		import { marked } from 'https://cdn.jsdelivr.net/npm/marked@12/lib/marked.esm.js';

		// Curated registry — group → [slug, title, blurb]. Tutorial slugs resolve from
		// /docs/tutorials/<slug>.md via fallback, so they share the flat /docs/<slug> URL.
		const GROUPS = [
			['Getting started', [
				['introduction', 'Introduction', 'What three.ws is and who it is for.'],
				['quick-start', 'Quick start', 'Ship your first 3D agent in minutes.'],
				['how-it-works', 'How it works', 'The pipeline from selfie to embedded agent.'],
				['agents-vs-avatars', 'Agents vs avatars', 'The two primitives and how they relate.'],
			]],
			['Tutorials', [
				['getting-started', 'Getting started', 'Hands-on walkthrough of the platform.'],
				['first-agent', 'Build your first agent', 'Create, configure, and publish an agent.'],
				['custom-skill', 'Write a custom skill', 'Give an agent a new paid capability.'],
				['embed-on-website', 'Embed on a website', 'Drop an agent into any site.'],
				['personal-ai-site', 'Personal AI site', 'Your own agent at yourname.three.ws.'],
				['register-onchain', 'Register on-chain', 'Put an agent on ERC-8004.'],
			]],
			['Core concepts', [
				['agent-system', 'Agent system', 'Identity, wallet, persona, and tools.'],
				['architecture', 'Architecture', 'How the platform is put together.'],
				['layers', 'Layers', 'The stack from rendering to payments.'],
				['memory', 'Memory', 'How agents remember across sessions.'],
				['multi-agent', 'Multi-agent', 'Agents coordinating with agents.'],
				['permissions', 'Permissions', 'Scopes, keys, and what agents may do.'],
				['skills', 'Skills', 'Reusable, monetisable agent capabilities.'],
			]],
			['Avatars & 3D', [
				['avatar-creation', 'Avatar creation', 'Selfie to rigged 3D avatar.'],
				['character-studio', 'Character studio', 'Author and pose characters.'],
				['ar', 'AR', 'View agents in augmented reality.'],
				['viewer', 'Viewer', 'The 3D viewer and its controls.'],
				['editor', 'Editor', 'Editing meshes, materials, and scenes.'],
				['validation', 'Validation', 'glTF validation and quality gates.'],
			]],
			['Embed & SDK', [
				['embedding', 'Embedding', 'The <agent-3d> embed model.'],
				['web-component', 'Web component', 'Using the custom element.'],
				['widget-api', 'Widget API', 'Programmatic widget control.'],
				['widget-studio', 'Widget studio', 'Design embeds without code.'],
				['widgets', 'Widgets', 'Chat widgets and transcripts.'],
				['js-api', 'JavaScript API', 'The browser SDK surface.'],
				['sdk', 'SDK', 'Server and agent SDKs.'],
			]],
			['API & deploy', [
				['api-reference', 'REST API', 'Endpoints, params, and responses.'],
				['authentication', 'Authentication', 'Sessions, keys, and bearer auth.'],
				['configuration', 'Configuration', 'Environment and platform settings.'],
				['mcp', 'MCP', 'Model Context Protocol integration.'],
				['deployment', 'Deployment', 'Shipping agents to production.'],
			]],
			['On-chain', [
				['erc8004', 'ERC-8004', 'On-chain agent registration.'],
				['reputation', 'Reputation', 'Reviews, attestations, trust scores.'],
				['smart-contracts', 'Smart contracts', 'The contracts behind the platform.'],
				['security', 'Security', 'Threat model and protections.'],
			]],
			['Reference', [
				['agent-manifest', 'Agent manifest', 'The agent descriptor format.'],
				['examples', 'Examples', 'Copy-paste recipes.'],
				['troubleshooting', 'Troubleshooting', 'Fixes for common issues.'],
				['contributing', 'Contributing', 'How to contribute.'],
				['changelog', 'Changelog', 'Documentation changes.'],
				['popular-3d-github-repos', 'Popular 3D repos', 'Useful open-source 3D projects.'],
			]],
		];
		const TUTORIAL_SLUGS = new Set(['getting-started', 'first-agent', 'custom-skill', 'embed-on-website', 'personal-ai-site', 'register-onchain']);
		const TITLES = Object.fromEntries(GROUPS.flatMap(([, items]) => items.map(([s, t]) => [s, t])));

		const sidebar = document.getElementById('sidebar');
		const content = document.getElementById('content');
		const filter = document.getElementById('filter');
		const menuBtn = document.getElementById('menuBtn');

		function buildSidebar() {
			sidebar.innerHTML = GROUPS.map(([grp, items]) => `
				<div class="grp" data-grp="${grp.toLowerCase()}">
					<h3>${grp}</h3>
					${items.map(([slug, title]) => `<a href="/docs/${slug}" data-slug="${slug}" data-title="${title.toLowerCase()}">${title}</a>`).join('')}
				</div>`).join('');
		}

		function slugFromPath() {
			const m = location.pathname.replace(/\/+$/, '').match(/^\/docs\/(.+)$/);
			return m ? decodeURIComponent(m[1]) : '';
		}

		function setActive(slug) {
			sidebar.querySelectorAll('a').forEach((a) => a.classList.toggle('active', a.dataset.slug === slug));
		}

		async function fetchDoc(slug) {
			const tries = TUTORIAL_SLUGS.has(slug)
				? [`/docs/tutorials/${slug}.md`, `/docs/${slug}.md`]
				: [`/docs/${slug}.md`, `/docs/tutorials/${slug}.md`];
			for (const url of tries) {
				const res = await fetch(url);
				if (res.ok) return res.text();
			}
			return null;
		}

		function renderIndex() {
			document.title = 'Docs · three.ws';
			setActive(null);
			content.innerHTML = `
				<h1>Documentation</h1>
				<p>Everything you need to build, embed, and monetise 3D AI agents on three.ws. New here? Start with the <a href="/docs/quick-start">quick start</a>.</p>
				${GROUPS.map(([grp, items]) => `
					<h2>${grp}</h2>
					<div class="hero-cards">
						${items.map(([slug, title, blurb]) => `<a class="card" href="/docs/${slug}"><b>${title}</b><span>${blurb}</span></a>`).join('')}
					</div>`).join('')}`;
		}

		function renderError(slug) {
			document.title = 'Not found · three.ws docs';
			content.innerHTML = `
				<div class="error">
					<h1>That doc doesn't exist</h1>
					<p>We couldn't find a page for <code>${slug.replace(/[<>&]/g, '')}</code>. It may have moved or been renamed.</p>
					<p><a href="/docs">← Back to all docs</a></p>
				</div>`;
		}

		async function renderDoc(slug, { push } = {}) {
			setActive(slug);
			content.innerHTML = '<div class="skeleton"><span style="width:40%"></span><span style="width:90%"></span><span style="width:80%"></span><span style="width:85%"></span><span style="width:60%"></span></div>';
			const md = await fetchDoc(slug);
			if (md == null) { renderError(slug); return; }
			const html = marked.parse(md, { breaks: false, gfm: true });
			content.innerHTML = `<div class="crumbs"><a href="/docs">Docs</a> / ${TITLES[slug] || slug}</div>` + html;
			// Rewrite intra-doc relative .md links to client-side doc routes.
			content.querySelectorAll('a[href$=".md"]').forEach((a) => {
				const leaf = a.getAttribute('href').replace(/^\.?\/?/, '').replace(/^tutorials\//, '').replace(/\.md$/, '');
				a.setAttribute('href', `/docs/${leaf}`);
			});
			document.title = `${TITLES[slug] || slug} · three.ws docs`;
			content.scrollIntoView({ block: 'start' });
			if (push) history.pushState({ slug }, '', `/docs/${slug}`);
		}

		function route(opts) {
			const slug = slugFromPath();
			if (!slug) renderIndex();
			else renderDoc(slug, opts);
		}

		// Intercept sidebar / in-content doc links for SPA navigation.
		document.addEventListener('click', (e) => {
			const a = e.target.closest('a[href^="/docs/"]');
			if (!a || a.target === '_blank' || e.metaKey || e.ctrlKey) return;
			e.preventDefault();
			const slug = a.getAttribute('href').replace(/^\/docs\//, '').replace(/\/+$/, '');
			sidebar.classList.remove('open');
			renderDoc(slug, { push: true });
		});
		window.addEventListener('popstate', () => route());

		filter.addEventListener('input', () => {
			const q = filter.value.trim().toLowerCase();
			sidebar.querySelectorAll('.grp').forEach((grp) => {
				let any = false;
				grp.querySelectorAll('a').forEach((a) => {
					const hit = !q || a.dataset.title.includes(q) || a.dataset.slug.includes(q);
					a.style.display = hit ? '' : 'none';
					if (hit) any = true;
				});
				grp.style.display = any ? '' : 'none';
			});
		});
		menuBtn.addEventListener('click', () => {
			const open = sidebar.classList.toggle('open');
			menuBtn.setAttribute('aria-expanded', String(open));
		});

		buildSidebar();
		route();
	</script>
	<script src="/brand.js" defer></script>
</body>
</html>
