<!doctype html>
<html lang="en">
	<head>
		<script>/* three.ws theme boot — no-flash; runtime in /theme-switcher.js */(function(){try{var m=localStorage.getItem('twx_theme');var l=m==='auto'?(window.matchMedia&&window.matchMedia('(prefers-color-scheme: light)').matches):m==='light';document.documentElement.setAttribute('data-theme',l?'light':'dark');}catch(e){document.documentElement.setAttribute('data-theme','dark');}})();</script>
		<meta charset="utf-8" />
		<title>Agent passport · three.ws</title>
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<style>
			* {
				box-sizing: border-box;
			}
			:root {
				--fg: #111;
				--muted: #555;
				--border: #e5e5e5;
				--bg: #fafafa;
				--ok-bg: #e7f5e9;
				--ok-fg: #1b5e20;
				--warn-bg: #fff3cd;
				--warn-fg: #855008;
				--bad-bg: #fce8e8;
				--bad-fg: #b71c1c;
				--info-bg: #e3f2fd;
				--info-fg: #0d47a1;
			}
			body {
				font:
					14px/1.5 system-ui,
					-apple-system,
					sans-serif;
				max-width: 880px;
				margin: 1.5rem auto;
				padding: 0 1rem;
				color: var(--fg);
			}
			h1 {
				font-size: 1.4rem;
				margin: 0 0 0.25rem;
			}
			h2 {
				font-size: 1rem;
				margin: 1.5rem 0 0.5rem;
				display: flex;
				align-items: baseline;
				gap: 0.5rem;
			}
			h2 .hint {
				font-weight: 400;
				font-size: 0.8rem;
				color: var(--muted);
			}
			.muted {
				color: var(--muted);
			}
			.row {
				display: flex;
				gap: 0.5rem;
				align-items: center;
				flex-wrap: wrap;
				margin: 0.5rem 0 1rem;
			}
			.row input {
				font: inherit;
				padding: 0.4rem 0.55rem;
				border: 1px solid var(--border);
				border-radius: 6px;
				flex: 1 1 320px;
				min-width: 0;
			}
			.row input.invalid {
				border-color: var(--bad-fg);
				background: #fff8f8;
			}
			.row select,
			.row button {
				font: inherit;
				padding: 0.4rem 0.65rem;
				border: 1px solid #ccc;
				background: #fff;
				border-radius: 6px;
				cursor: pointer;
			}
			.row button.primary {
				background: #111;
				color: #fff;
				border-color: #111;
			}
			.row button:disabled {
				opacity: 0.5;
				cursor: wait;
			}

			.identity-card {
				border: 1px solid var(--border);
				border-radius: 10px;
				padding: 1rem 1.1rem;
				background: #fff;
			}
			.identity-row {
				display: flex;
				align-items: center;
				gap: 0.75rem;
				flex-wrap: wrap;
			}
			.identity-name {
				font-size: 1.2rem;
				font-weight: 600;
			}
			.identity-meta {
				display: flex;
				gap: 0.5rem;
				flex-wrap: wrap;
				align-items: center;
				font-size: 0.8rem;
				color: var(--muted);
				margin-top: 0.35rem;
			}
			.identity-meta code {
				background: #f3f3f3;
				padding: 0.1rem 0.35rem;
				border-radius: 4px;
				font-size: 0.75rem;
			}
			.copy-btn {
				padding: 0.1rem 0.35rem;
				font-size: 0.7rem;
				line-height: 1.4;
				cursor: pointer;
				border: 1px solid var(--border);
				background: #fff;
				border-radius: 4px;
			}
			.copy-btn:hover {
				background: #f3f3f3;
			}

			.trust-bar {
				display: flex;
				align-items: center;
				gap: 0.75rem;
				margin-top: 0.75rem;
				padding: 0.65rem 0.85rem;
				border-radius: 8px;
				background: var(--bg);
				border: 1px solid var(--border);
			}
			.trust-bar .spark {
				margin-left: auto;
				flex: 0 0 120px;
			}
			.trust-bar .spark svg {
				width: 120px;
				height: 32px;
				display: block;
			}
			.trust-bar .spark-empty {
				font-size: 0.7rem;
				color: var(--muted);
			}
			.trust-grade {
				font-size: 1.6rem;
				font-weight: 700;
				min-width: 2rem;
				text-align: center;
			}
			.trust-A {
				color: var(--ok-fg);
			}
			.trust-B {
				color: #2e7d32;
			}
			.trust-C {
				color: var(--warn-fg);
			}
			.trust-D {
				color: #c62828;
			}
			.trust-NA {
				color: var(--muted);
			}
			.trust-summary {
				font-size: 0.85rem;
				color: var(--muted);
			}

			.grid {
				display: grid;
				grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
				gap: 0.65rem;
				margin: 0.75rem 0;
			}
			.card {
				border: 1px solid var(--border);
				border-radius: 8px;
				padding: 0.65rem 0.85rem;
				background: var(--bg);
				position: relative;
			}
			.card .v {
				font-size: 1.55rem;
				font-weight: 600;
				line-height: 1.1;
			}
			.card .v small {
				font-size: 1rem;
				color: var(--muted);
				font-weight: 400;
			}
			.card .l {
				font-size: 0.75rem;
				color: var(--muted);
				margin-top: 0.15rem;
				display: flex;
				align-items: center;
				gap: 0.25rem;
			}
			.card.tier-credentialed {
				border-color: #b8d8e8;
				background: #f4faff;
			}
			.card.tier-event {
				border-color: #d4c5f0;
				background: #f8f4ff;
			}
			.card.tier-pump {
				border-color: #ffd8b8;
				background: #fff8f0;
			}
			.card.danger {
				border-color: #f5c6c6;
				background: #fff5f5;
			}

			.tip {
				display: inline-block;
				cursor: help;
				color: var(--muted);
				border: 1px solid var(--border);
				border-radius: 50%;
				width: 13px;
				height: 13px;
				font-size: 9px;
				line-height: 11px;
				text-align: center;
			}

			.pill {
				display: inline-block;
				padding: 0.1rem 0.55rem;
				border-radius: 999px;
				font-size: 0.7rem;
				line-height: 1.5;
			}
			.ok {
				background: var(--ok-bg);
				color: var(--ok-fg);
			}
			.warn {
				background: var(--warn-bg);
				color: var(--warn-fg);
			}
			.bad {
				background: var(--bad-bg);
				color: var(--bad-fg);
			}
			.info {
				background: var(--info-bg);
				color: var(--info-fg);
			}
			.vanity {
				background: linear-gradient(90deg, #ffd54f, #ff8a65);
				color: #1a1a1a;
				font-weight: 600;
			}
			.addr-prefix {
				background: #fff7c2;
				padding: 0 2px;
				border-radius: 2px;
				font-weight: 600;
			}

			.filters {
				display: flex;
				gap: 0.35rem;
				flex-wrap: wrap;
				margin: 0.5rem 0 0.75rem;
			}
			.chip {
				padding: 0.2rem 0.65rem;
				border: 1px solid var(--border);
				border-radius: 999px;
				cursor: pointer;
				font-size: 0.75rem;
				background: #fff;
				user-select: none;
			}
			.chip[aria-pressed='true'] {
				background: #111;
				color: #fff;
				border-color: #111;
			}

			.atts {
				border-top: 1px solid #eee;
			}
			.att {
				padding: 0.55rem 0.25rem;
				border-bottom: 1px solid #eee;
				display: grid;
				grid-template-columns: 92px 1fr;
				gap: 0.5rem 0.75rem;
				align-items: baseline;
				transition: background 0.8s ease;
			}
			.att.fresh {
				background: #fffbe5;
				animation: fadeFresh 4s ease forwards;
			}
			@keyframes fadeFresh {
				0% {
					background: #fff3a3;
				}
				100% {
					background: transparent;
				}
			}
			.att code {
				font-size: 0.72rem;
				color: #555;
			}
			.live-dot {
				display: inline-flex;
				align-items: center;
				gap: 0.3rem;
				font-size: 0.72rem;
				color: var(--muted);
			}
			.live-dot::before {
				content: '';
				width: 8px;
				height: 8px;
				border-radius: 50%;
				background: #c8c8c8;
			}
			.live-dot.on::before {
				background: #43a047;
				box-shadow: 0 0 0 0 rgba(67, 160, 71, 0.5);
				animation: pulse 1.6s infinite;
			}
			.live-dot.off::before {
				background: #aaa;
			}
			@keyframes pulse {
				0%,
				100% {
					box-shadow: 0 0 0 0 rgba(67, 160, 71, 0.5);
				}
				50% {
					box-shadow: 0 0 0 5px rgba(67, 160, 71, 0);
				}
			}
			.kind-feedback {
				color: var(--ok-fg);
			}
			.kind-validation {
				color: var(--info-fg);
			}
			.kind-task {
				color: #6a1b9a;
			}
			.kind-accept {
				color: #4527a0;
			}
			.kind-revoke {
				color: var(--bad-fg);
			}
			.kind-dispute {
				color: #ef6c00;
			}

			.skeleton {
				background: linear-gradient(90deg, #eee 0%, #f6f6f6 50%, #eee 100%);
				background-size: 200% 100%;
				animation: shimmer 1.2s infinite;
				border-radius: 6px;
			}
			@keyframes shimmer {
				0% {
					background-position: 200% 0;
				}
				100% {
					background-position: -200% 0;
				}
			}
			.sk-row {
				height: 76px;
				margin: 0.65rem 0;
			}

			.error-box {
				padding: 0.65rem 0.85rem;
				border: 1px solid #f5c6c6;
				background: #fff5f5;
				color: var(--bad-fg);
				border-radius: 6px;
			}

			details {
				margin-top: 0.25rem;
			}
			details pre {
				font-size: 0.72rem;
				background: #f4f4f4;
				padding: 0.4rem;
				border-radius: 4px;
				overflow: auto;
				max-height: 240px;
			}
			a {
				color: var(--info-fg);
			}

			@media (max-width: 520px) {
				.att {
					grid-template-columns: 1fr;
				}
				.identity-name {
					font-size: 1.05rem;
				}
			}

			/* ── Rate / vouch panel ─────────────────────────────────────── */
			.rate-panel {
				border: 1px solid var(--border);
				border-radius: 10px;
				padding: 0.9rem 1rem;
				margin: 0.6rem 0 0.2rem;
				background: var(--bg);
			}
			.rate-panel[hidden] {
				display: none;
			}
			.rate-head {
				display: flex;
				align-items: baseline;
				justify-content: space-between;
				gap: 0.5rem;
				flex-wrap: wrap;
			}
			.rate-title {
				font-weight: 600;
				font-size: 0.95rem;
			}
			.rate-sub {
				color: var(--muted);
				font-size: 0.78rem;
			}
			.rate-stars {
				display: inline-flex;
				gap: 0.15rem;
				margin: 0.55rem 0 0.3rem;
			}
			.rate-star {
				font: inherit;
				font-size: 1.5rem;
				line-height: 1;
				background: none;
				border: none;
				padding: 0 0.05rem;
				cursor: pointer;
				color: #cbb73a;
				filter: grayscale(1) opacity(0.5);
				transition:
					filter 0.12s ease,
					transform 0.12s ease;
			}
			.rate-star.on {
				filter: none;
			}
			.rate-star:hover {
				transform: scale(1.15);
			}
			.rate-star:focus-visible {
				outline: 2px solid var(--info-fg);
				border-radius: 4px;
			}
			.rate-row {
				display: flex;
				align-items: center;
				gap: 0.5rem;
				flex-wrap: wrap;
				margin-top: 0.5rem;
			}
			.rate-row label {
				font-size: 0.82rem;
				color: var(--muted);
				display: inline-flex;
				align-items: center;
				gap: 0.35rem;
			}
			.rate-panel input[type='text'],
			.rate-panel input[type='number'] {
				font: inherit;
				padding: 0.35rem 0.5rem;
				border: 1px solid var(--border);
				border-radius: 6px;
				background: #fff;
				color: var(--fg);
			}
			.rate-panel input[type='text'] {
				flex: 1;
				min-width: 180px;
			}
			.rate-panel input[type='number'] {
				width: 110px;
			}
			.rate-actions {
				display: flex;
				align-items: center;
				gap: 0.5rem;
				flex-wrap: wrap;
				margin-top: 0.7rem;
			}
			.rate-btn {
				font: inherit;
				padding: 0.45rem 0.8rem;
				border: 1px solid #111;
				border-radius: 6px;
				background: #111;
				color: #fff;
				cursor: pointer;
				transition:
					opacity 0.12s ease,
					transform 0.08s ease;
			}
			.rate-btn.ghost {
				background: #fff;
				color: var(--fg);
				border-color: var(--border);
			}
			.rate-btn:hover:not(:disabled) {
				transform: translateY(-1px);
			}
			.rate-btn:active:not(:disabled) {
				transform: translateY(0);
			}
			.rate-btn:disabled {
				opacity: 0.45;
				cursor: not-allowed;
			}
			.rate-status {
				font-size: 0.8rem;
				margin-top: 0.55rem;
				min-height: 1.1em;
			}
			.rate-status.err {
				color: var(--bad-fg);
			}
			.rate-status.ok {
				color: var(--ok-fg);
			}
			.rate-status.work {
				color: var(--muted);
			}
		</style>
	</head>
	<body>
		<h1>Solana agent passport</h1>
		<p class="muted">
			ERC-8004-style identity, reputation, and validation.
			<a href="/.well-known/agent-attestation-schemas" target="_blank">View schemas</a>
		</p>

		<div class="row">
			<input
				id="asset"
				placeholder="Metaplex Core asset pubkey…"
				autocomplete="off"
				spellcheck="false"
			/>
			<select id="network">
				<option value="devnet">devnet</option>
				<option value="mainnet">mainnet</option>
			</select>
			<button id="load" class="primary">Load</button>
			<button id="share" title="Copy shareable link">Share</button>
			<button id="embed" title="Copy iframe embed snippet">Embed</button>
		</div>

		<div id="identity"></div>

		<div id="token-stats" hidden></div>

		<h2>Reputation <span class="hint" id="rep-hint"></span></h2>
		<div id="reputation"></div>

		<div id="rate" class="rate-panel" hidden></div>

		<h2>
			Recent attestations <span class="hint" id="atts-count"></span>
			<span id="live" class="live-dot off" title="Live updates">off</span>
		</h2>
		<div class="filters" id="filters" hidden>
			<button class="chip" data-filter="all" aria-pressed="true">all</button>
			<button class="chip" data-filter="feedback" aria-pressed="false">feedback</button>
			<button class="chip" data-filter="validation" aria-pressed="false">validation</button>
			<button class="chip" data-filter="task" aria-pressed="false">task</button>
			<button class="chip" data-filter="event" aria-pressed="false">event-attested</button>
			<button class="chip" data-filter="disputed" aria-pressed="false">disputed</button>
		</div>
		<div id="atts" class="atts"></div>

		<script type="module">
			const $ = (id) => document.getElementById(id);
			const params = new URLSearchParams(location.search);
			$('asset').value = params.get('asset') || '';
			$('network').value = params.get('network') || 'devnet';

			let cache = { rows: [], net: 'devnet', knownSigs: new Set(), freshSigs: new Set() };
			let activeFilter = 'all';
			let pollTimer = null;
			let currentRep = null;
			const POLL_MS = 8000;

			const PUBKEY_RE = /^[1-9A-HJ-NP-Za-km-z]{32,44}$/;

			function pill(text, cls = '') {
				return `<span class="pill ${cls}">${escapeHtml(text)}</span>`;
			}
			function tip(text) {
				return `<span class="tip" title="${escapeHtml(text)}">?</span>`;
			}
			function explorer(sig, net) {
				return `https://explorer.solana.com/tx/${sig}${net === 'devnet' ? '?cluster=devnet' : ''}`;
			}
			function shortKey(k) {
				return k ? `${k.slice(0, 4)}…${k.slice(-4)}` : '';
			}
			function fmtScore(n) {
				return typeof n === 'number' && n > 0 ? n.toFixed(2) : '—';
			}

			// Trust grade. Order: credentialed > verified > event-attested > raw.
			function computeTrust(rep) {
				const f = rep?.feedback || {};
				const v = rep?.validation || {};
				const tiers = [
					{
						score: f.score_avg_weighted_credentialed,
						n: f.unique_credentialed_attesters,
						tier: 'credentialed',
					},
					{
						score: f.score_avg_weighted_verified,
						n: f.unique_verified_attesters,
						tier: 'verified',
					},
					{
						score: f.score_avg_event_attested,
						n: f.event_attested,
						tier: 'event-attested',
					},
					{ score: f.score_avg_weighted, n: f.unique_attesters, tier: 'community' },
				];
				const best = tiers.find((t) => t.score > 0 && (t.n || 0) > 0);
				if (!best) return { grade: '—', cls: 'NA', summary: 'no attestations yet' };

				const passed = v.audited_passed || v.self_passed || 0;
				const failed = v.audited_failed || v.self_failed || 0;
				const passRate = passed + failed ? passed / (passed + failed) : 1;

				const adjust = best.score - (f.disputed > 0 ? 0.5 : 0) - (passRate < 0.5 ? 1 : 0);

				const grade = adjust >= 4.5 ? 'A' : adjust >= 3.8 ? 'B' : adjust >= 3.0 ? 'C' : 'D';
				return {
					grade,
					cls: grade,
					summary:
						`${best.tier} ${best.score.toFixed(2)} from ${best.n} attester${best.n === 1 ? '' : 's'}` +
						(f.disputed ? ` · ${f.disputed} disputed` : '') +
						(failed ? ` · ${failed} failed validation${failed === 1 ? '' : 's'}` : ''),
				};
			}

			function showError(target, message) {
				$(target).innerHTML = `<div class="error-box">${escapeHtml(message)}</div>`;
			}
			function showSkeletons(target, count = 1) {
				$(target).innerHTML = Array.from(
					{ length: count },
					() => `<div class="skeleton sk-row"></div>`,
				).join('');
			}

			async function load() {
				const asset = $('asset').value.trim();
				const network = $('network').value;
				$('asset').classList.toggle('invalid', !!asset && !PUBKEY_RE.test(asset));
				if (!asset) {
					showError('identity', 'Enter an asset pubkey above.');
					return;
				}
				if (!PUBKEY_RE.test(asset)) {
					showError('identity', 'That doesn’t look like a Solana pubkey.');
					return;
				}

				stopPolling();
				history.replaceState({}, '', `?asset=${asset}&network=${network}`);
				$('load').disabled = true;
				showSkeletons('identity', 1);
				showSkeletons('reputation', 1);
				$('atts').innerHTML = '';
				$('atts-count').textContent = '';
				$('filters').hidden = true;

				try {
					const [card, rep, atts, hist] = await Promise.all([
						fetch(`/api/agents/solana-card?asset=${asset}`)
							.then((r) => (r.ok ? r.json() : null))
							.catch(() => null),
						fetch(
							`/api/agents/solana-reputation?asset=${asset}&network=${network}`,
						).then((r) => r.json()),
						fetch(
							`/api/agents/solana-attestations?asset=${asset}&network=${network}&limit=25`,
						).then((r) => r.json()),
						fetch(
							`/api/agents/solana-reputation-history?asset=${asset}&network=${network}&days=30`,
						)
							.then((r) => r.json())
							.catch(() => ({ series: [] })),
					]);

					const initialRows = atts.data || [];
					renderIdentity(card, rep, asset, network, hist?.series || []);
					renderTokenStats(card?.token_stats);
					currentRep = rep;
					renderReputation(rep);
					cache = {
						rows: initialRows,
						net: network,
						knownSigs: new Set(initialRows.map((r) => r.signature)),
						freshSigs: new Set(),
					};
					$('filters').hidden = false;
					renderAttestations();
					renderRatePanel({ asset, network, owner: card?.identity?.owner || null });
					startPolling(asset, network);
				} catch (e) {
					showError('identity', `Failed to load: ${e.message || e}`);
				} finally {
					$('load').disabled = false;
				}
			}

			// -- Live polling --------------------------------------------------

			function startPolling(asset, network) {
				stopPolling();
				setLive(true);
				const tick = async () => {
					if (document.hidden) return;
					try {
						const [atts, rep] = await Promise.all([
							fetch(
								`/api/agents/solana-attestations?asset=${asset}&network=${network}&limit=25`,
							).then((r) => r.json()),
							fetch(
								`/api/agents/solana-reputation?asset=${asset}&network=${network}`,
							).then((r) => r.json()),
						]);
						const rows = atts.data || [];
						const freshSigs = new Set();
						for (const r of rows) {
							if (!cache.knownSigs.has(r.signature)) freshSigs.add(r.signature);
						}
						if (freshSigs.size > 0) {
							cache.rows = rows;
							cache.knownSigs = new Set(rows.map((r) => r.signature));
							cache.freshSigs = freshSigs;
							renderAttestations();
							currentRep = rep;
							renderReputation(rep);
							// clear the highlight class after the animation
							setTimeout(() => {
								cache.freshSigs = new Set();
							}, 4500);
						}
					} catch {
						// transient — stay live, try again next tick
					}
				};
				pollTimer = setInterval(tick, POLL_MS);
			}

			function stopPolling() {
				if (pollTimer) {
					clearInterval(pollTimer);
					pollTimer = null;
				}
				setLive(false);
			}

			function setLive(on) {
				const el = $('live');
				el.classList.toggle('on', on);
				el.classList.toggle('off', !on);
				el.textContent = on ? 'live' : 'off';
			}

			document.addEventListener('visibilitychange', () => {
				if (!pollTimer) return;
				setLive(!document.hidden);
			});

			function renderValidationBadge(v, network) {
				if (!v || typeof v.passed !== 'boolean') return '';
				const explorer = v.signature
					? `https://explorer.solana.com/tx/${v.signature}${network === 'devnet' ? '?cluster=devnet' : ''}`
					: null;
				const proof = v.proof_uri || explorer || '#';
				const label = v.passed ? '✓ model verified' : '✗ model failed';
				const cls = v.passed ? 'ok' : 'warn';
				const title = `glTF/schema validation by platform validator${v.proof_hash ? ` · proof ${String(v.proof_hash).slice(0, 12)}…` : ''}`;
				return `<a class="pill ${cls}" href="${escapeHtml(proof)}" target="_blank" rel="noopener" title="${escapeHtml(title)}" style="text-decoration:none">${label}</a>`;
			}

			async function loadOperatorBalance(address, network) {
				const el = document.getElementById('operator-balance');
				if (!el) return;
				try {
					const rpc = network === 'devnet'
						? 'https://api.devnet.solana.com'
						: 'https://api.mainnet-beta.solana.com';
					const r = await fetch(rpc, {
						method: 'POST',
						headers: { 'content-type': 'application/json' },
						body: JSON.stringify({ jsonrpc: '2.0', id: 1, method: 'getBalance', params: [address] }),
					}).then((x) => x.json());
					const lamports = r?.result?.value ?? 0;
					el.textContent = `${(lamports / 1e9).toFixed(3)} SOL`;
				} catch {
					el.textContent = '—';
				}
			}

			async function loadOwnerBalance(owner, network) {
				const el = document.getElementById('owner-balance');
				if (!el) return;
				try {
					const rpc =
						network === 'devnet'
							? 'https://api.devnet.solana.com'
							: 'https://api.mainnet-beta.solana.com';
					const r = await fetch(rpc, {
						method: 'POST',
						headers: { 'content-type': 'application/json' },
						body: JSON.stringify({
							jsonrpc: '2.0',
							id: 1,
							method: 'getBalance',
							params: [owner],
						}),
					}).then((x) => x.json());
					const lamports = r?.result?.value;
					if (typeof lamports === 'number') {
						el.textContent = `${(lamports / 1e9).toFixed(3)} SOL`;
						el.classList.add(lamports > 0 ? 'ok' : 'warn');
					} else {
						el.textContent = '— SOL';
					}
				} catch {
					el.textContent = '— SOL';
				}
			}

			function renderAttestations() {
				const rows = filterRows(cache.rows, activeFilter);
				$('atts-count').textContent = `${rows.length} of ${cache.rows.length}`;
				if (!rows.length) {
					$('atts').innerHTML =
						`<p class="muted" style="padding:.75rem 0">no matching attestations</p>`;
					return;
				}
				$('atts').innerHTML = rows
					.map((row) => {
						const k = row.kind?.split('.')[1] || 'unknown';
						const flags = [];
						if (row.verified) flags.push(pill('verified', 'ok'));
						if (row.disputed) flags.push(pill('disputed', 'warn'));
						if (row.revoked) flags.push(pill('revoked', 'bad'));
						if (isEventSource(row.payload?.source))
							flags.push(pill(row.payload.source, 'info'));
						const fresh = cache.freshSigs.has(row.signature) ? ' fresh' : '';
						return `
					<div class="att${fresh}">
						<div class="kind-${k}"><strong>${escapeHtml(k)}</strong></div>
						<div>
							<div>${escapeHtml(describe(row))}</div>
							<div class="muted" style="font-size:.72rem; margin-top:.15rem">
								by <code>${escapeHtml(shortKey(row.attester))}</code>
								· slot ${row.slot ?? '—'}
								· <a href="${explorer(row.signature, cache.net)}" target="_blank" rel="noopener">tx ↗</a>
								${flags.length ? ' ' + flags.join(' ') : ''}
							</div>
							<details><summary class="muted" style="font-size:.72rem">payload</summary><pre>${escapeHtml(JSON.stringify(row.payload, null, 2))}</pre></details>
						</div>
					</div>`;
					})
					.join('');
			}

			function isEventSource(s) {
				return typeof s === 'string' && (s.startsWith('pumpkit.') || s.startsWith('pumpfun.'));
			}

			function filterRows(rows, filter) {
				if (filter === 'all') return rows;
				if (filter === 'disputed') return rows.filter((r) => r.disputed || r.revoked);
				if (filter === 'event')
					return rows.filter((r) => isEventSource(r.payload?.source));
				return rows.filter((r) => r.kind?.includes(`.${filter}.`));
			}

			function describe(row) {
				const p = row.payload || {};
				switch (row.kind) {
					case 'threews.feedback.v1':
						return `score ${p.score}/5${p.task_id ? ` for task ${p.task_id}` : ''}${p.source ? ` (${p.source})` : ''}`;
					case 'threews.validation.v1':
						if (p.subkind === 'glb-schema')
							return `model validation ${p.passed ? '✓ passed' : '✗ failed'}${p.proof_hash ? ` (proof ${String(p.proof_hash).slice(0, 12)}…)` : ''}`;
						return `validation ${p.passed ? '✓ passed' : '✗ failed'}${p.task_hash ? ` (task hash ${String(p.task_hash).slice(0, 12)}…)` : ''}`;
					case 'threews.task.v1':
						return `task offered: ${p.task_id}`;
					case 'threews.accept.v1':
						return `task accepted: ${p.task_id}`;
					case 'threews.revoke.v1':
						return `revoked ${String(p.target_signature || '').slice(0, 12)}…`;
					case 'threews.dispute.v1':
						return `disputed ${String(p.target_signature || '').slice(0, 12)}…${p.reason ? ` — ${p.reason}` : ''}`;
					default:
						return row.kind;
				}
			}

			// ── Rate / vouch (the write path) ─────────────────────────────────
			// Lets any visitor with a Solana wallet submit an on-chain feedback
			// attestation (SPL Memo, kind=threews.feedback.v1) about this agent —
			// optionally backed by a SOL stake (kind=threews.stake.v1) sent to the
			// agent owner. Both reference the agent asset pubkey as a read-only key
			// so the indexer (getSignaturesForAddress(asset)) folds them into the
			// reputation summary shown above.
			const MEMO_PROGRAM = 'MemoSq4gqABAXKb96qnH8TysNcWxMyWCqXgDLGmfcHr';
			const MIN_STAKE_SOL = 0.001;
			const WEB3_CDN = 'https://esm.sh/@solana/web3.js@1.95.3';
			let web3Lib = null;
			let rateState = { score: 0, asset: null, network: 'devnet', owner: null };

			async function loadWeb3() {
				if (web3Lib) return web3Lib;
				web3Lib = await import(/* @vite-ignore */ WEB3_CDN);
				return web3Lib;
			}

			function getSolanaWallet() {
				if (typeof window === 'undefined') return null;
				if (window.solflare?.isSolflare) return window.solflare;
				if (window.solana?.isPhantom) return window.solana;
				return window.solana || null;
			}

			function rpcUrl(network) {
				return network === 'devnet'
					? `${location.origin}/api/solana-rpc?net=devnet`
					: `${location.origin}/api/solana-rpc`;
			}

			function setRateStatus(kind, text) {
				const el = $('rate-status');
				if (!el) return;
				el.className = `rate-status ${kind}`;

			}

			function isUserRejection(err) {
				if (!err) return false;
				if (err.code === 4001 || err.code === 'ACTION_REJECTED') return true;
				return /reject|denied|cancel/i.test(err.message || '');
			}

			function wireRatePanel() {
				const panel = $('rate');
				const stars = Array.from(panel.querySelectorAll('.rate-star'));
				const submitBtn = $('rate-submit');

				function paint(score) {
					stars.forEach((s) => {
						const n = Number(s.dataset.score);
						s.classList.toggle('on', n <= score);
						s.setAttribute('aria-checked', n === score ? 'true' : 'false');
						s.tabIndex = n === (score || 1) ? 0 : -1;
					});
				}
				function pick(score) {
					rateState.score = score;
					paint(score);
					submitBtn.disabled = false;
				}
				stars.forEach((s) => {
					const n = Number(s.dataset.score);
					s.addEventListener('mouseenter', () => paint(n));
					s.addEventListener('mouseleave', () => paint(rateState.score));
					s.addEventListener('click', () => pick(n));
					s.addEventListener('keydown', (e) => {
						if (e.key === 'ArrowRight' || e.key === 'ArrowUp') {
							e.preventDefault();
							const next = Math.min(5, (rateState.score || 0) + 1);
							pick(next);
							stars[next - 1].focus();
						} else if (e.key === 'ArrowLeft' || e.key === 'ArrowDown') {
							e.preventDefault();
							const next = Math.max(1, (rateState.score || 1) - 1);
							pick(next);
							stars[next - 1].focus();
						} else if (e.key === ' ' || e.key === 'Enter') {
							e.preventDefault();
							pick(n);
						}
					});
				});

				const toggle = $('rate-stake-toggle');
				toggle.addEventListener('change', () => {
					$('rate-stake-wrap').hidden = !toggle.checked;
					submitBtn.textContent = toggle.checked ? 'Stake & vouch' : 'Sign & submit';
				});

				submitBtn.addEventListener('click', submitRating);
				$('rate-refresh').addEventListener('click', async () => {
					setRateStatus('work', 'Reading latest from chain…');
					await refreshFromChain(rateState.asset, rateState.network, { force: true });
					setRateStatus('work', '');
				});
			}

			async function submitRating() {
				const submitBtn = $('rate-submit');
				const score = rateState.score;
				if (!(score >= 1 && score <= 5)) {
					setRateStatus('err', 'Pick a score from 1 to 5.');
					return;
				}
				const comment = ($('rate-comment').value || '').trim().slice(0, 280);
				const useStake = $('rate-stake-toggle').checked;
				let stakeSol = 0;
				if (useStake) {
					stakeSol = parseFloat($('rate-stake-amount').value) || 0;
					if (stakeSol < MIN_STAKE_SOL) {
						setRateStatus('err', `Minimum stake is ${MIN_STAKE_SOL} SOL.`);
						return;
					}
					if (!rateState.owner) {
						setRateStatus('err', 'No owner wallet on record to receive a stake.');
						return;
					}
				}
				const wallet = getSolanaWallet();
				if (!wallet) {
					setRateStatus('err', 'No Solana wallet found — install Phantom or Solflare.');
					return;
				}

				submitBtn.disabled = true;
				setRateStatus('work', 'Connecting wallet…');
				try {
					const resp = await wallet.connect();
					const payer = wallet.publicKey || resp?.publicKey;
					if (!payer) throw new Error('Wallet returned no account');
					const payerStr = payer.toString();

					if (rateState.owner && payerStr === rateState.owner) {
						setRateStatus('err', "You can't rate your own agent — connect a different wallet.");
						submitBtn.disabled = false;
						return;
					}

					// Double-review guard: the system averages each attester's ratings,
					// so a second rating updates rather than duplicates. Confirm intent.
					const already = (cache.rows || []).some(
						(r) => r.kind === 'threews.feedback.v1' && r.attester === payerStr,
					);
					if (already && submitBtn.dataset.confirmed !== '1') {
						submitBtn.dataset.confirmed = '1';
						submitBtn.textContent = 'Update my rating';
						setRateStatus('work', 'You have rated this agent before — submit again to update it.');
						submitBtn.disabled = false;
						return;
					}

					const web3 = await loadWeb3();
					setRateStatus('work', useStake ? 'Building stake transaction…' : 'Building attestation…');
					const conn = new web3.Connection(rpcUrl(rateState.network), 'confirmed');

					const memo = {
						v: 1,
						kind: useStake ? 'threews.stake.v1' : 'threews.feedback.v1',
						agent: rateState.asset,
						score,
						...(comment ? { comment } : {}),
						ts: Math.floor(Date.now() / 1000),
					};

					const ixs = [];
					if (useStake) {
						ixs.push(
							web3.SystemProgram.transfer({
								fromPubkey: payer,
								toPubkey: new web3.PublicKey(rateState.owner),
								lamports: Math.round(stakeSol * 1e9),
							}),
						);
					}
					ixs.push(
						new web3.TransactionInstruction({
							programId: new web3.PublicKey(MEMO_PROGRAM),
							keys: [{ pubkey: new web3.PublicKey(rateState.asset), isSigner: false, isWritable: false }],
							data: new TextEncoder().encode(JSON.stringify(memo)),
						}),
					);

					const { blockhash, lastValidBlockHeight } = await conn.getLatestBlockhash('finalized');
					const tx = new web3.Transaction({ feePayer: payer, blockhash, lastValidBlockHeight });
					tx.add(...ixs);

					setRateStatus('work', 'Approve in your wallet…');
					const sent = await wallet.signAndSendTransaction(tx);
					const sig = sent?.signature || sent;

					setRateStatus('work', 'Confirming on-chain…');
					await conn.confirmTransaction({ signature: sig, blockhash, lastValidBlockHeight }, 'confirmed');

					// Optimistic projection — corrected by the from-chain refresh below.
					optimisticBump(score, useStake);

					setRateStatus('ok', 'Submitted ✓ — ');
					const a = document.createElement('a');
					a.href = explorer(sig, rateState.network);
					a.target = '_blank';
					a.rel = 'noopener';
					a.textContent = 'view tx ↗';
					$('rate-status').appendChild(a);

					submitBtn.textContent = useStake ? 'Stake & vouch' : 'Sign & submit';
					delete submitBtn.dataset.confirmed;
					refreshFromChain(rateState.asset, rateState.network, { force: true });
				} catch (e) {
					if (isUserRejection(e)) setRateStatus('err', 'Cancelled.');
					else setRateStatus('err', `Failed: ${e?.message || e}`);
				} finally {
					submitBtn.disabled = false;
				}
			}

			function optimisticBump(score, useStake) {
				if (!currentRep) return;
				const rep = JSON.parse(JSON.stringify(currentRep));
				rep.feedback = rep.feedback || {};
				const prevTotal = rep.feedback.total || 0;
				const prevAvg = rep.feedback.score_avg_weighted || rep.feedback.score_avg || 0;
				const newTotal = prevTotal + 1;
				rep.feedback.total = newTotal;
				rep.feedback.unique_attesters = (rep.feedback.unique_attesters || 0) + 1;
				rep.feedback.score_avg = (prevAvg * prevTotal + score) / newTotal;
				rep.feedback.score_avg_weighted = rep.feedback.score_avg;
				if (useStake) {
					rep.stake = rep.stake || { total_lamports: '0', count: 0, unique_stakers: 0, top_stakers: [] };
					rep.stake.count = (rep.stake.count || 0) + 1;
				}
				currentRep = rep;
				renderReputation(rep);
			}

			async function refreshFromChain(asset, network, { force = false } = {}) {
				if (!asset) return;
				try {
					if (force) {
						await fetch(
							`/api/agents/solana-attestations?asset=${asset}&network=${network}&limit=25&refresh=1`,
						).catch(() => {});
					}
					const [atts, rep] = await Promise.all([
						fetch(`/api/agents/solana-attestations?asset=${asset}&network=${network}&limit=25`).then((r) => r.json()),
						fetch(`/api/agents/solana-reputation?asset=${asset}&network=${network}`).then((r) => r.json()),
					]);
					const rows = atts.data || [];
					cache.rows = rows;
					cache.knownSigs = new Set(rows.map((r) => r.signature));
					renderAttestations();
					currentRep = rep;
					renderReputation(rep);
				} catch {
					/* transient — live poll will catch up */
				}
			}

			function escapeHtml(s) {
				return String(s ?? '').replace(
					/[&<>"']/g,
					(c) =>
						({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[
							c
						],
				);
			}

			// SVG sparkline of historical scores (1..5 fixed y-axis).
			function renderSparkline(series) {
				if (!series || series.length < 2) {
					return `<div class="spark-empty">${series?.length ? '1 day' : 'no history'}</div>`;
				}
				const W = 120,
					H = 32,
					P = 2;
				const xs = series.map((_, i) => P + (i * (W - 2 * P)) / (series.length - 1));
				const ys = series.map((d) => {
					const score = Math.max(1, Math.min(5, d.score || 0));
					return P + (1 - (score - 1) / 4) * (H - 2 * P);
				});
				const path = xs
					.map((x, i) => `${i === 0 ? 'M' : 'L'}${x.toFixed(1)},${ys[i].toFixed(1)}`)
					.join(' ');
				const lastScore = series[series.length - 1].score;
				const stroke = lastScore >= 4 ? '#1b5e20' : lastScore >= 3 ? '#855008' : '#c62828';
				const fillPath = `${path} L${xs[xs.length - 1].toFixed(1)},${H - P} L${xs[0].toFixed(1)},${H - P} Z`;
				return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" aria-label="score history">
				<path d="${fillPath}" fill="${stroke}" opacity=".12" />
				<path d="${path}" fill="none" stroke="${stroke}" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" />
				<circle cx="${xs[xs.length - 1].toFixed(1)}" cy="${ys[ys.length - 1].toFixed(1)}" r="2" fill="${stroke}" />
			</svg>`;
			}

			async function copyText(text, btn) {
				try {
					await navigator.clipboard.writeText(text);
					const prev = btn.textContent;
					btn.textContent = 'copied';
					setTimeout(() => {
						btn.textContent = prev;
					}, 1200);
				} catch {}
			}

			$('load').onclick = load;
			$('asset').addEventListener('keydown', (e) => {
				if (e.key === 'Enter') load();
			});
			$('network').addEventListener('change', () => {
				if ($('asset').value.trim()) load();
			});
			$('share').onclick = () => copyText(location.href, $('share'));
			$('embed').onclick = () => {
				const asset = $('asset').value.trim();
				const network = $('network').value;
				if (!asset || !PUBKEY_RE.test(asset)) return;
				const src = `${location.origin}/agent-badge.html?asset=${asset}&network=${network}`;
				const snippet = `<iframe src="${src}" width="320" height="80" style="border:0" loading="lazy"></iframe>`;
				copyText(snippet, $('embed'));
			};
			$('filters').addEventListener('click', (e) => {
				const btn = e.target.closest('.chip');
				if (!btn) return;
				activeFilter = btn.dataset.filter;
				$('filters')
					.querySelectorAll('.chip')
					.forEach((c) => c.setAttribute('aria-pressed', c === btn ? 'true' : 'false'));
				renderAttestations();
			});

			if ($('asset').value) load();
		</script>
		<script src="/brand.js" defer></script>
</body>
</html>
