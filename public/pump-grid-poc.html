<!DOCTYPE html>
<html lang="en">
<head>
	<script>/* three.ws theme boot — no-flash; runtime in /theme-switcher.js */(function(){try{var m=localStorage.getItem('twx_theme');var l=m==='auto'?(window.matchMedia&&window.matchMedia('(prefers-color-scheme: light)').matches):m==='light';document.documentElement.setAttribute('data-theme',l?'light':'dark');}catch(e){document.documentElement.setAttribute('data-theme','dark');}})();</script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PumpFun Grid POC</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/gridstack@10.1.2/dist/gridstack.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/gridstack@10.1.2/dist/gridstack-all.js" integrity="sha384-6IelLg5vJ9FDli+2FiM5mdHxGkb5pvYCGXlIN9Tqlv6ufE1DNgZkrqeIz/me4Phs" crossorigin="anonymous"></script>
  <style>
    body {
      font-family: sans-serif;
      background-color: #111;
      color: #fff;
    }
    .grid-stack {
      background-color: #222;
    }
    .grid-stack-item-content {
      background-color: #333;
      color: #fff;
      text-align: center;
      line-height: 100px;
      font-size: 20px;
    }
  </style>
</head>
<body>

  <h1>Pump.fun Free-Flowing Dashboard (POC)</h1>

  <div class="grid-stack"></div>

  <script type="text/javascript">
    const grid = GridStack.init();

    const widgets = [
      {x: 0, y: 0, w: 4, h: 2, content: 'Component A (e.g., Chart)'},
      {x: 4, y: 0, w: 4, h: 4, content: 'Component B (e.g., Live Feed)'},
      {x: 8, y: 0, w: 2, h: 2, content: 'Component C (e.g., Stats)'},
      {x: 10, y: 0, w: 2, h: 2, content: 'Component D (e.g., Wallet)'},
      {x: 0, y: 2, w: 2, h: 2, content: 'Component E'},
      {x: 2, y: 2, w: 2, h: 2, content: 'Component F'},
    ];

    grid.load(widgets);
  </script>

	<script src="/brand.js" defer></script>
</body>
</html>
