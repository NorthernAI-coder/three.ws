<!doctype html>
<html lang="en" style="background:transparent">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Agent Directory · three.ws</title>
  <meta name="robots" content="noindex">
  <link rel="stylesheet" href="/style.css">
  <link rel="stylesheet" href="/fonts/fonts.css">
  <style>
    html, body {
      background: transparent !important;
      color: #161616 !important;
      font-family: 'Helvetica Neue', 'Helvetica Neue', Arial, sans-serif !important;
      margin: 0; padding: 0;
    }
    :root {
      color-scheme: light !important;
      --bg: transparent !important;
      --ink: #161616 !important;
      --ink-dim: #525252 !important;
      --border: #e0e0e0 !important;
      --accent: #0f62fe !important;
    }
    header, footer, #nav-container, #footer-container { display: none !important; }

    .agents-hero {
      text-align: center;
      padding: 32px 1rem 20px;
      background: transparent;
    }
    .agents-eyebrow {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #0f62fe;
      margin-bottom: 0.5rem;
    }
    .agents-hero h1 {
      font-size: clamp(24px, 4vw, 36px);
      font-weight: 300;
      line-height: 1.1;
      margin-bottom: 0.5rem;
      color: #161616;
      background: none !important;
      -webkit-text-fill-color: #161616 !important;
    }
    .agents-hero p { font-size: 0.95rem; color: #525252; max-width: 500px; margin: 0 auto; }

    .agents-controls {
      max-width: 1400px;
      margin: 0 auto 1.5rem;
      padding: 0 1.5rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      align-items: center;
      background: transparent;
    }
    .agents-search { position: relative; flex: 1; min-width: 220px; }
    .agents-search input {
      width: 100%;
      padding: 0.6rem 1rem;
      background: transparent;
      border: 1px solid #e0e0e0;
      color: #161616;
      font-size: 0.9rem;
      font-family: inherit;
      transition: border-color 0.15s;
    }
    .agents-search input::placeholder { color: #a8a8a8; }
    .agents-search input:focus { outline: none; border-color: #0f62fe; }
    .agents-filter-group { display: flex; align-items: center; gap: 0.4rem; flex-wrap: wrap; }
    .agents-filter-label { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: #525252; }
    .filter-chip {
      padding: 0.35rem 0.8rem;
      background: transparent;
      border: 1px solid #e0e0e0;
      cursor: pointer;
      font-size: 0.82rem;
      font-family: inherit;
      color: #525252;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }
    .filter-chip:hover { border-color: #161616; color: #161616; }
    .filter-chip.active { background: #0f62fe; border-color: #0f62fe; color: #fff; font-weight: 600; }
    .agents-sort {
      padding: 0.4rem 0.8rem;
      background: transparent;
      border: 1px solid #e0e0e0;
      color: #161616;
      cursor: pointer;
      font-size: 0.85rem;
      font-family: inherit;
    }
    .agents-sort:focus { outline: none; border-color: #0f62fe; }

    .agents-wrap { max-width: 1400px; margin: 0 auto; padding: 0 1.5rem 3rem; background: transparent; }
    .agent-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1px;
      background: #e0e0e0;
      margin-bottom: 2rem;
    }
    .agent-card {
      background: transparent;
      padding: 1.1rem 1.25rem 1.25rem;
      gap: 0.5rem;
      display: flex;
      flex-direction: column;
      cursor: pointer;
      transition: background 0.15s;
    }
    .agent-card:hover { background: rgba(15,98,254,0.04); }
    .card-head { display: flex; align-items: center; gap: 0.75rem; }
    .card-avatar-sm {
      width: 48px; height: 48px; flex-shrink: 0;
      border: 1px solid #e0e0e0;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; color: #c6c6c6; font-size: 1.2rem;
      background: transparent;
    }
    .card-avatar-sm img { width: 100%; height: 100%; object-fit: cover; }
    .card-title { flex: 1; min-width: 0; }
    .card-name-row { display: flex; align-items: center; gap: 0.4rem; margin-bottom: 0.15rem; }
    .card-name { font-size: 0.9rem; font-weight: 600; color: #161616; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .active-dot { width: 6px; height: 6px; border-radius: 50%; background: #24a148; flex-shrink: 0; }
    .card-id { font-size: 0.72rem; color: #6f6f6f; font-family: monospace, monospace; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-desc { font-size: 0.8rem; color: #525252; line-height: 1.4; }
    .card-protos, .card-trust, .card-onchain, .card-owner { display: flex; flex-wrap: wrap; gap: 0.3rem; font-size: 0.7rem; }
    .proto-badge { padding: 0.15rem 0.4rem; background: transparent; border: 1px solid #e0e0e0; color: #525252; font-weight: 500; }
    .trust-pill { padding: 0.15rem 0.4rem; background: transparent; border: 1px solid #24a148; color: #198038; font-weight: 500; }
    .owner-addr { font-family: monospace, monospace; color: #6f6f6f; cursor: pointer; }
    .owner-copy { background: none; border: none; color: #6f6f6f; cursor: pointer; font-size: 0.9em; padding: 0 0.2rem; }
    .owner-copy.copied { color: #24a148; }
    .card-actions { display: flex; gap: 0.4rem; flex-wrap: wrap; margin-top: auto; padding-top: 0.2rem; }
    .card-see3d {
      display: inline-flex; align-items: center; gap: 0.3rem;
      padding: 0.3rem 0.6rem; font-size: 0.74rem; font-weight: 600;
      color: #0f62fe; background: transparent; border: 1px solid #0f62fe;
      text-decoration: none; transition: background 0.15s;
    }
    .card-see3d:hover { background: rgba(15,98,254,0.06); }

    .agents-loading { text-align: center; padding: 3rem 2rem; color: #525252; display: flex; align-items: center; justify-content: center; gap: 0.75rem; }
    .agents-loading::after { content: ''; display: inline-block; width: 1rem; height: 1rem; border: 2px solid rgba(15,98,254,0.2); border-top-color: #0f62fe; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .agents-empty { text-align: center; padding: 4rem 2rem; background: transparent; }
    .agents-empty h2 { font-size: 1.25rem; font-weight: 600; color: #161616; margin-bottom: 0.5rem; }
    .agents-empty p { font-size: 0.9rem; color: #525252; margin-bottom: 1.5rem; max-width: 440px; margin-inline: auto; }
    .agents-empty-actions { display: flex; gap: 0.75rem; justify-content: center; flex-wrap: wrap; }
    .btn-primary { padding: 0.6rem 1.25rem; background: #0f62fe; border: none; color: #fff; font-weight: 600; font-size: 0.88rem; cursor: pointer; text-decoration: none; display: inline-block; transition: background 0.15s; }
    .btn-primary:hover { background: #0353e9; }
    .btn-ghost { padding: 0.6rem 1.25rem; background: transparent; border: 1px solid #e0e0e0; color: #161616; font-weight: 500; font-size: 0.88rem; cursor: pointer; text-decoration: none; display: inline-block; transition: border-color 0.15s; }
    .btn-ghost:hover { border-color: #161616; }

    .agents-pagination { display: flex; justify-content: center; align-items: center; gap: 1rem; padding: 2rem 0; flex-wrap: wrap; }
    .pag-btn { padding: 0.45rem 0.9rem; background: transparent; border: 1px solid #e0e0e0; color: #161616; cursor: pointer; font-size: 0.85rem; font-family: inherit; transition: border-color 0.15s, color 0.15s; }
    .pag-btn:hover:not(:disabled) { border-color: #0f62fe; color: #0f62fe; }
    .pag-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .pag-info { font-size: 0.85rem; color: #525252; }

    @media (max-width: 640px) {
      .agents-controls { flex-direction: column; align-items: stretch; }
      .agent-grid { grid-template-columns: 1fr; gap: 0; }
    }
  </style>
</head>
<body style="background:transparent">
  <main>
    <section class="agents-hero">
      <p class="agents-eyebrow">ERC-8004 · three.ws</p>
      <h1>Agent Directory</h1>
      <p>Discover registered 3D AI agents across the ecosystem</p>
    </section>

    <div class="agents-controls">
      <div class="agents-search">
        <input type="text" id="search" placeholder="Search by name, ID, or description…" aria-label="Search agents">
      </div>
      <div class="agents-filter-group">
        <span class="agents-filter-label">Chain:</span>
        <button class="filter-chip active" data-filter="all">All</button>
        <button class="filter-chip" data-filter="8453">Base</button>
        <button class="filter-chip" data-filter="84532">Base Sepolia</button>
        <button class="filter-chip" data-filter="10">Optimism</button>
        <button class="filter-chip" data-filter="137">Polygon</button>
      </div>
      <select id="sort" class="agents-sort" aria-label="Sort agents">
        <option value="newest">Newest First</option>
        <option value="oldest">Oldest First</option>
        <option value="name">Alphabetical</option>
      </select>
    </div>

    <div class="agents-wrap">
      <div id="loading" class="agents-loading" style="display:none">Loading agents</div>
      <div id="agents" class="agent-grid"></div>
      <div id="empty-state" class="agents-empty" style="display:none">
        <h2>No agents found</h2>
        <p>Be the first to register your agent on-chain — generate its 3D body from a text prompt, then give it a brain.</p>
        <div class="agents-empty-actions">
          <a href="https://three.ws/create" target="_blank" class="btn-primary">Create Agent</a>
          <a href="https://three.ws/forge" target="_blank" class="btn-ghost">Generate 3D from text</a>
        </div>
      </div>
      <div id="pagination" class="agents-pagination" style="display:none">
        <button id="prev-btn" class="pag-btn">← Previous</button>
        <span id="page-info" class="pag-info"></span>
        <button id="next-btn" class="pag-btn">Next →</button>
      </div>
    </div>
  </main>

  <script type="module" src="/agents/boot.js"></script>
</body>
</html>
