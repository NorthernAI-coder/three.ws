<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta http-equiv="X-UA-Compatible" content="IE=edge" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
		<title>Agent Directory · three.ws</title>
		<meta name="description" content="Browse every registered agent on three.ws — filter by chain, search by name, and view on-chain passports." />
		<meta name="theme-color" content="#000000" />
		<link rel="canonical" href="https://three.ws/agents" />
		<meta property="og:type" content="website" />
		<meta property="og:site_name" content="three.ws" />
		<meta property="og:title" content="Agent Directory · three.ws" />
		<meta property="og:description" content="Browse every registered agent on three.ws." />
		<meta property="og:url" content="https://three.ws/agents" />
		<meta property="og:image" content="https://three.ws/og-image.png" />
		<meta property="og:image:width" content="1200" />
		<meta property="og:image:height" content="630" />
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:title" content="Agent Directory · three.ws" />
		<meta name="twitter:description" content="Browse every registered agent on three.ws." />
		<meta name="twitter:image" content="https://three.ws/og-image.png" />
		<script type="application/ld+json">{"@context":"https://schema.org","@type":"WebPage","name":"Agent Directory","description":"Browse every registered agent on three.ws.","url":"https://three.ws/agents","isPartOf":{"@type":"WebSite","name":"three.ws","url":"https://three.ws"}}</script>
		<link rel="shortcut icon" href="/favicon.ico" />
		<link rel="stylesheet" href="/style.css" />
		<link rel="stylesheet" href="/nav.css" />
		<link rel="stylesheet" href="/fonts/fonts.css" />
		<style>
			/* ── Page-scoped styles ── */
			.agents-hero {
				text-align: center;
				padding: 4rem 1rem 2.5rem;
			}

			.agents-eyebrow {
				font-size: 0.78rem;
				font-weight: 600;
				letter-spacing: 0.08em;
				text-transform: uppercase;
				color: var(--ink-dim, #888);
				margin-bottom: 0.75rem;
			}

			.agents-hero h1 {
				font-size: clamp(2rem, 5vw, 3rem);
				font-weight: 700;
				line-height: 1.1;
				margin-bottom: 0.75rem;
				background: linear-gradient(135deg, #00d9ff 0%, #ffffff 60%);
				background-clip: text;
				-webkit-background-clip: text;
				-webkit-text-fill-color: transparent;
			}

			.agents-hero p {
				font-size: 1rem;
				color: var(--ink-dim, #a0a0a0);
				max-width: 520px;
				margin: 0 auto;
			}

			/* Controls bar */
			.agents-controls {
				max-width: 1400px;
				margin: 0 auto 2rem;
				padding: 0 1.5rem;
				display: flex;
				flex-wrap: wrap;
				gap: 1rem;
				align-items: center;
			}

			.agents-search {
				position: relative;
				flex: 1;
				min-width: 220px;
			}

			.agents-search input {
				width: 100%;
				padding: 0.65rem 1rem;
				background: rgba(255, 255, 255, 0.05);
				border: 1px solid rgba(255, 255, 255, 0.12);
				border-radius: 8px;
				color: var(--ink, #e0e0e0);
				font-size: 0.95rem;
				font-family: inherit;
				transition: border-color 0.18s ease, background 0.18s ease;
			}

			.agents-search input::placeholder { color: #555; }

			.agents-search input:focus {
				outline: none;
				border-color: #00d9ff;
				background: rgba(0, 217, 255, 0.04);
			}

			.agents-filter-group {
				display: flex;
				align-items: center;
				gap: 0.5rem;
				flex-wrap: wrap;
			}

			.agents-filter-label {
				font-size: 0.8rem;
				font-weight: 600;
				text-transform: uppercase;
				letter-spacing: 0.06em;
				color: var(--ink-dim, #888);
			}

			.filter-chip {
				padding: 0.4rem 0.9rem;
				background: rgba(255, 255, 255, 0.05);
				border: 1px solid rgba(255, 255, 255, 0.1);
				border-radius: 20px;
				cursor: pointer;
				font-size: 0.85rem;
				font-family: inherit;
				color: var(--ink-dim, #a0a0a0);
				transition: background 0.18s ease, border-color 0.18s ease, color 0.18s ease;
			}

			.filter-chip:hover { background: rgba(255, 255, 255, 0.1); }

			.filter-chip.active {
				background: #00d9ff;
				border-color: transparent;
				color: #000;
				font-weight: 600;
			}

			.agents-sort {
				padding: 0.45rem 0.9rem;
				background: rgba(255, 255, 255, 0.05);
				border: 1px solid rgba(255, 255, 255, 0.12);
				border-radius: 8px;
				color: var(--ink, #e0e0e0);
				cursor: pointer;
				font-size: 0.85rem;
				font-family: inherit;
			}

			.agents-sort:focus { outline: none; border-color: #00d9ff; }
			.agents-sort option { background: #111; color: #e0e0e0; }

			/* Grid */
			.agents-wrap {
				max-width: 1400px;
				margin: 0 auto;
				padding: 0 1.5rem 4rem;
			}

			.agent-grid {
				display: grid;
				grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
				gap: 1.5rem;
				margin-bottom: 2rem;
			}

			/* Cards rendered by AgentsDirectory.js */
			.agent-card {
				background: rgba(255, 255, 255, 0.03);
				border: 1px solid rgba(255, 255, 255, 0.08);
				border-radius: 12px;
				overflow: hidden;
				cursor: pointer;
				transition: border-color 0.22s ease, background 0.22s ease, transform 0.22s ease, box-shadow 0.22s ease;
				display: flex;
				flex-direction: column;
				padding: 1.1rem 1.25rem 1.25rem;
				gap: 0.65rem;
			}

			.agent-card:hover {
				border-color: rgba(0, 217, 255, 0.45);
				background: rgba(0, 217, 255, 0.04);
				transform: translateY(-3px);
				box-shadow: 0 8px 28px rgba(0, 217, 255, 0.12);
			}

			/* card-head: small avatar + title side by side */
			.card-head {
				display: flex;
				align-items: center;
				gap: 0.85rem;
			}

			.card-avatar-sm {
				width: 52px;
				height: 52px;
				flex-shrink: 0;
				border-radius: 8px;
				background: rgba(255, 255, 255, 0.04);
				border: 1px solid rgba(255, 255, 255, 0.08);
				display: flex;
				align-items: center;
				justify-content: center;
				overflow: hidden;
				color: #555;
				font-size: 1.4rem;
			}

			.card-avatar-sm img {
				width: 100%;
				height: 100%;
				object-fit: cover;
			}

			.avatar-placeholder { opacity: 0.4; }

			.card-title { flex: 1; min-width: 0; }

			.card-name-row {
				display: flex;
				align-items: center;
				gap: 0.4rem;
				margin-bottom: 0.2rem;
			}

			.card-name {
				font-size: 0.95rem;
				font-weight: 600;
				color: var(--ink, #fff);
				line-height: 1.3;
				white-space: nowrap;
				overflow: hidden;
				text-overflow: ellipsis;
			}

			.active-dot {
				width: 7px;
				height: 7px;
				border-radius: 50%;
				background: #22c55e;
				flex-shrink: 0;
			}

			.card-id {
				font-size: 0.75rem;
				color: var(--ink-dim, #888);
				font-family: 'Monaco', 'Courier New', monospace;
				white-space: nowrap;
				overflow: hidden;
				text-overflow: ellipsis;
			}

			.card-desc {
				font-size: 0.82rem;
				color: var(--ink-dim, #a0a0a0);
				line-height: 1.45;
			}

			.card-protos, .card-trust, .card-onchain, .card-owner {
				display: flex;
				flex-wrap: wrap;
				gap: 0.35rem;
				font-size: 0.72rem;
			}

			.proto-badge {
				padding: 0.2rem 0.45rem;
				background: rgba(255, 255, 255, 0.06);
				border: 1px solid rgba(255, 255, 255, 0.12);
				border-radius: 4px;
				color: var(--ink-dim, #aaa);
				font-weight: 500;
			}

			.trust-pill {
				padding: 0.2rem 0.45rem;
				background: rgba(34, 197, 94, 0.1);
				border: 1px solid rgba(34, 197, 94, 0.25);
				border-radius: 4px;
				color: #86efac;
				font-weight: 500;
			}

			.owner-addr {
				font-family: 'Monaco', 'Courier New', monospace;
				color: var(--ink-dim, #888);
				cursor: pointer;
			}

			.owner-copy {
				background: none;
				border: none;
				color: var(--ink-dim, #888);
				cursor: pointer;
				font-size: 0.9em;
				padding: 0 0.2rem;
			}

			.owner-copy.copied { color: #22c55e; }

			.card-actions {
				display: flex;
				gap: 0.5rem;
				flex-wrap: wrap;
				margin-top: auto;
				padding-top: 0.2rem;
			}

			.card-see3d {
				display: inline-flex;
				align-items: center;
				gap: 0.35rem;
				padding: 0.35rem 0.65rem;
				font-size: 0.76rem;
				font-weight: 600;
				color: #00d9ff;
				background: rgba(0, 217, 255, 0.08);
				border: 1px solid rgba(0, 217, 255, 0.28);
				border-radius: 6px;
				text-decoration: none;
				transition: background 0.18s ease, border-color 0.18s ease, transform 0.18s ease;
			}

			.card-see3d:hover {
				background: rgba(0, 217, 255, 0.15);
				border-color: rgba(0, 217, 255, 0.55);
				transform: translateY(-1px);
			}

			.card-see3d:focus-visible {
				outline: 2px solid #00d9ff;
				outline-offset: 2px;
			}

			/* States */
			.agents-loading {
				text-align: center;
				padding: 3rem 2rem;
				color: var(--ink-dim, #a0a0a0);
				display: flex;
				align-items: center;
				justify-content: center;
				gap: 0.75rem;
			}

			.agents-loading::after {
				content: '';
				display: inline-block;
				width: 1rem;
				height: 1rem;
				border: 2px solid rgba(0, 217, 255, 0.3);
				border-top-color: #00d9ff;
				border-radius: 50%;
				animation: spin 0.8s linear infinite;
			}

			@keyframes spin { to { transform: rotate(360deg); } }

			.agents-empty {
				text-align: center;
				padding: 5rem 2rem;
			}

			.agents-empty h2 {
				font-size: 1.4rem;
				font-weight: 600;
				color: var(--ink, #fff);
				margin-bottom: 0.75rem;
			}

			.agents-empty p {
				font-size: 0.95rem;
				color: var(--ink-dim, #a0a0a0);
				margin-bottom: 2rem;
				max-width: 460px;
				margin-inline: auto;
			}

			.agents-empty-actions {
				display: flex;
				gap: 0.75rem;
				justify-content: center;
				flex-wrap: wrap;
			}

			.btn-primary {
				padding: 0.65rem 1.4rem;
				background: #00d9ff;
				border: none;
				border-radius: 8px;
				color: #000;
				font-weight: 600;
				font-size: 0.9rem;
				cursor: pointer;
				text-decoration: none;
				display: inline-block;
				transition: opacity 0.18s ease, transform 0.18s ease;
			}

			.btn-primary:hover { opacity: 0.88; transform: translateY(-1px); }

			.btn-ghost {
				padding: 0.65rem 1.4rem;
				background: transparent;
				border: 1px solid rgba(255, 255, 255, 0.22);
				border-radius: 8px;
				color: var(--ink, #e0e0e0);
				font-weight: 500;
				font-size: 0.9rem;
				cursor: pointer;
				text-decoration: none;
				display: inline-block;
				transition: border-color 0.18s ease, background 0.18s ease;
			}

			.btn-ghost:hover {
				border-color: rgba(255, 255, 255, 0.4);
				background: rgba(255, 255, 255, 0.05);
			}

			/* Pagination */
			.agents-pagination {
				display: flex;
				justify-content: center;
				align-items: center;
				gap: 1rem;
				padding: 2rem 0;
				flex-wrap: wrap;
			}

			.pag-btn {
				padding: 0.5rem 1rem;
				background: rgba(255, 255, 255, 0.05);
				border: 1px solid rgba(255, 255, 255, 0.1);
				border-radius: 8px;
				color: var(--ink, #e0e0e0);
				cursor: pointer;
				font-size: 0.88rem;
				font-family: inherit;
				transition: background 0.18s ease, border-color 0.18s ease, color 0.18s ease;
			}

			.pag-btn:hover:not(:disabled) {
				background: rgba(0, 217, 255, 0.1);
				border-color: #00d9ff;
				color: #00d9ff;
			}

			.pag-btn:disabled { opacity: 0.3; cursor: not-allowed; }

			.pag-info {
				font-size: 0.88rem;
				color: var(--ink-dim, #a0a0a0);
			}

			@media (max-width: 640px) {
				.agents-controls { flex-direction: column; align-items: stretch; }
				.agents-search { min-width: 100%; }
				.agents-search input { font-size: max(16px, 1em); }
				.agent-grid { grid-template-columns: 1fr; }
			}
		</style>
	</head>
	<body>
		<header>
			<div id="nav-container"></div>
		</header>
		<script src="/nav.js"></script>

		<main>
			<section class="agents-hero">
				<p class="agents-eyebrow">ERC-8004 Agent Directory</p>
				<h1>Agent Directory</h1>
				<p>Discover registered agents across the ecosystem</p>
			</section>

			<div class="agents-controls">
				<div class="agents-search">
					<input
						type="text"
						id="search"
						placeholder="Search by name, ID, or description…"
						aria-label="Search agents"
					/>
				</div>
				<div class="agents-filter-group">
					<span class="agents-filter-label">Chain:</span>
					<button class="filter-chip active" data-filter="all">All</button>
					<button class="filter-chip" data-filter="8453">Base</button>
					<button class="filter-chip" data-filter="84532">Base Sepolia</button>
					<button class="filter-chip" data-filter="10">Optimism</button>
					<button class="filter-chip" data-filter="137">Polygon</button>
				</div>
				<select id="sort" class="agents-sort" aria-label="Sort agents">
					<option value="newest">Newest First</option>
					<option value="oldest">Oldest First</option>
					<option value="name">Alphabetical</option>
				</select>
			</div>

			<div class="agents-wrap">
				<div id="loading" class="agents-loading" style="display: none">Loading agents</div>
				<div id="agents" class="agent-grid"></div>

				<div id="empty-state" class="agents-empty" style="display: none">
					<h2>No agents found</h2>
					<p>Be the first to register your agent on-chain — generate its 3D body from a text prompt, then give it a brain.</p>
					<div class="agents-empty-actions">
						<a href="/create" class="btn-primary">Create Agent</a>
						<a href="/forge" class="btn-ghost">Generate 3D from text</a>
					</div>
				</div>

				<div id="pagination" class="agents-pagination" style="display: none">
					<button id="prev-btn" class="pag-btn">← Previous</button>
					<span id="page-info" class="pag-info"></span>
					<button id="next-btn" class="pag-btn">Next →</button>
				</div>
			</div>
		</main>

		<div id="footer-container"></div>
		<script src="/footer.js" defer></script>
		<script type="module" src="./boot.js"></script>
		<script src="/brand.js" defer></script>
	</body>
</html>
