<!doctype html>
<html lang="en">
<head>
	<script>/* three.ws theme boot — no-flash; runtime in /theme-switcher.js */(function(){try{var m=localStorage.getItem('twx_theme');var l=m==='auto'?(window.matchMedia&&window.matchMedia('(prefers-color-scheme: light)').matches):m==='light';document.documentElement.setAttribute('data-theme',l?'light':'dark');}catch(e){document.documentElement.setAttribute('data-theme','dark');}})();</script>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width,initial-scale=1" />
	<title>Payment Required — three.ws</title>
	<meta name="description" content="Pay with USDC to access this x402 endpoint." />
	<link rel="icon" href="/favicon.ico" />
	<link rel="stylesheet" href="/fonts/fonts.css" />
	<style>
		:root {
			color-scheme: dark;
			--bg:        #050505;
			--surface-0: #0b0b0b;
			--surface-1: #111111;
			--surface-2: #181818;
			--surface-3: #1e1e1e;
			--hairline:  #1c1c1c;
			--hairline-strong: #2a2a2a;
			--text:      #f6f6f6;
			--text-2:    #a8a8a8;
			--text-3:    #6a6a6a;
			--text-4:    #4a4a4a;
			--accent:    #ffffff;
			--font-display: 'Space Grotesk', 'Inter', system-ui, sans-serif;
			--font-body:    "Inter", -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
			--font-mono:    "JetBrains Mono", ui-monospace, "SF Mono", Menlo, Consolas, monospace;
		}
		* { box-sizing: border-box; }
		html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: var(--font-body); }
		body {
			font-size: 15.5px; line-height: 1.55; min-height: 100vh;
			-webkit-font-smoothing: antialiased;
			display: flex; flex-direction: column;
		}
		a { color: inherit; text-decoration: none; }
		button { font-family: inherit; cursor: pointer; }
		::selection { background: var(--text); color: var(--bg); }

		/* ── MINIMAL NAV ─────────────────────────────────────────── */
		.nav {
			border-bottom: 1px solid var(--hairline);
			background: rgba(5,5,5,0.92);
			backdrop-filter: blur(20px);
		}
		.nav-inner {
			display: flex; align-items: center; justify-content: space-between;
			padding: 16px 32px; max-width: 1440px; margin: 0 auto;
		}
		.brand {
			display: flex; align-items: center; gap: 10px;
			font-family: var(--font-display);
			font-weight: 600; letter-spacing: -0.025em; font-size: 16.5px;
		}
		.brand-mark {
			width: 18px; height: 18px;
			border: 1px solid var(--text); border-radius: 3px;
			position: relative;
		}
		.brand-mark::after {
			content: ""; position: absolute; inset: 4px;
			background: var(--text);
		}
		.nav-close {
			display: flex; align-items: center; justify-content: center;
			width: 32px; height: 32px; border-radius: 6px;
			border: 1px solid var(--hairline-strong);
			color: var(--text-3); font-size: 18px; line-height: 1;
			transition: border-color 0.12s, color 0.12s;
		}
		.nav-close:hover { border-color: var(--text-3); color: var(--text); }

		/* ── LAYOUT ──────────────────────────────────────────────── */
		.page-body {
			flex: 1;
			display: flex; align-items: center; justify-content: center;
			padding: 48px 20px;
		}

		/* ── PAYMENT CARD ────────────────────────────────────────── */
		.pay-card {
			width: 100%; max-width: 480px;
			background: var(--surface-1);
			border: 1px solid var(--hairline-strong);
			border-radius: 16px;
			overflow: hidden;
		}

		/* Service header */
		.card-head {
			padding: 28px 28px 20px;
			border-bottom: 1px solid var(--hairline);
		}
		.service-row {
			display: flex; align-items: center; gap: 12px;
			margin-bottom: 16px;
		}
		.service-icon {
			width: 40px; height: 40px; border-radius: 10px;
			background: var(--surface-3);
			border: 1px solid var(--hairline-strong);
			display: flex; align-items: center; justify-content: center;
			font-size: 20px; flex-shrink: 0;
		}
		.service-name {
			font-family: var(--font-display);
			font-size: 17px; font-weight: 600;
			letter-spacing: -0.02em;
			color: var(--text);
		}
		.service-desc {
			font-size: 13.5px; color: var(--text-3);
			margin-top: 2px;
			line-height: 1.4;
		}
		.price-block {
			display: flex; align-items: baseline; gap: 8px;
		}
		.price-amount {
			font-family: var(--font-display);
			font-size: 40px; font-weight: 700;
			letter-spacing: -0.04em;
			color: var(--text);
			font-variant-numeric: tabular-nums;
		}
		.price-currency {
			font-size: 14px; color: var(--text-3);
		}

		/* Network tabs */
		.card-body { padding: 20px 28px; }
		.tab-row {
			display: flex; gap: 0;
			margin-bottom: 20px;
			border: 1px solid var(--hairline-strong);
			border-radius: 8px; overflow: hidden;
		}
		.tab-btn {
			flex: 1; padding: 9px 12px;
			font-size: 13.5px; font-weight: 450;
			background: transparent; color: var(--text-3);
			border: none; outline: none;
			transition: background 0.12s, color 0.12s;
			cursor: pointer;
		}
		.tab-btn:not(:first-child) {
			border-left: 1px solid var(--hairline-strong);
		}
		.tab-btn.active {
			background: var(--surface-3);
			color: var(--text);
		}
		.tab-btn:hover:not(.active) {
			background: rgba(255,255,255,0.03);
		}

		/* Network panel */
		.net-panel { display: none; }
		.net-panel.active { display: block; }

		/* Wallet buttons */
		.wallet-list {
			display: flex; flex-direction: column; gap: 10px;
		}
		.wallet-btn {
			display: flex; align-items: center; gap: 14px;
			width: 100%; padding: 14px 16px;
			background: var(--surface-2);
			border: 1px solid var(--hairline-strong);
			border-radius: 10px;
			color: var(--text);
			font-size: 14.5px; font-weight: 500;
			transition: border-color 0.13s, background 0.13s;
			cursor: pointer;
			text-align: left;
		}
		.wallet-btn:hover { border-color: var(--text-3); background: var(--surface-3); }
		.wallet-btn:active { background: var(--surface-2); }
		.wallet-icon {
			width: 34px; height: 34px; border-radius: 8px;
			display: flex; align-items: center; justify-content: center;
			font-size: 18px; background: var(--surface-3); flex-shrink: 0;
		}
		.wallet-name { flex: 1; }
		.wallet-arrow {
			color: var(--text-4); font-size: 16px;
			transition: transform 0.12s;
		}
		.wallet-btn:hover .wallet-arrow { transform: translateX(3px); }

		/* "Opening wallet…" state */
		.wallet-status {
			margin-top: 16px;
			padding: 12px 16px;
			background: var(--surface-2);
			border: 1px solid var(--hairline);
			border-radius: 8px;
			font-size: 13.5px; color: var(--text-3);
			display: none;
		}
		.wallet-status.visible { display: block; }
		.wallet-status.pw-status-error {
			border-color: rgba(248,113,113,0.3);
			background: rgba(248,113,113,0.07);
			color: #f87171;
		}
		.wallet-status.pw-status-error strong { color: #fca5a5; }
		.pw-status-row { display: flex; align-items: center; gap: 10px; }
		.pw-spin { flex-shrink: 0; color: var(--text-2); animation: pw-spin 0.8s linear infinite; }
		@keyframes pw-spin { to { transform: rotate(360deg); } }

		/* Unlocked / confirmed state */
		.service-icon.pw-ok-icon {
			background: #0b2a18; border-color: #14532d; color: #4ade80;
		}
		.pw-receipt {
			margin-top: 18px;
			display: flex; flex-direction: column; gap: 6px;
		}
		.pw-receipt-row {
			display: flex; align-items: center; justify-content: space-between; gap: 12px;
			font-family: var(--font-mono); font-size: 12px;
		}
		.pw-receipt-row .pw-k { color: var(--text-3); }
		.pw-receipt-row .pw-v { color: var(--text); text-align: right; word-break: break-all; }
		.pw-receipt-row .pw-v a { color: #6aa8ff; }
		.pw-receipt-row .pw-v a:hover { text-decoration: underline; }
		.pw-unlocked-label {
			font-family: var(--font-mono); font-size: 10.5px;
			letter-spacing: 0.15em; text-transform: uppercase;
			color: var(--text-4); margin-bottom: 10px;
		}
		.pw-content-pre {
			margin: 0;
			background: var(--surface-2);
			border: 1px solid var(--hairline);
			border-radius: 8px;
			padding: 14px;
			font-family: var(--font-mono); font-size: 11.5px; line-height: 1.5;
			color: var(--text-2);
			overflow: auto; max-height: 320px;
			white-space: pre-wrap; word-break: break-word;
		}
		.pw-content-frame {
			width: 100%; min-height: 280px; max-height: 60vh;
			border: 1px solid var(--hairline);
			border-radius: 8px; background: #fff;
		}

		/* Advanced: paste tx hash */
		.accordion-trigger {
			display: flex; align-items: center; justify-content: space-between;
			width: 100%; background: none; border: none;
			padding: 14px 0 0;
			font-size: 13px; color: var(--text-4);
			cursor: pointer;
			transition: color 0.12s;
		}
		.accordion-trigger:hover { color: var(--text-3); }
		.accordion-trigger svg {
			transition: transform 0.18s;
		}
		.accordion-trigger.open svg { transform: rotate(180deg); }
		.accordion-body {
			display: none; padding-top: 12px;
		}
		.accordion-body.open { display: block; }
		.raw-json {
			background: var(--surface-2);
			border: 1px solid var(--hairline);
			border-radius: 8px;
			padding: 14px;
			font-family: var(--font-mono); font-size: 11px;
			color: var(--text-3);
			overflow-x: auto;
			white-space: pre;
			max-height: 240px; overflow-y: auto;
		}
		.raw-label {
			font-family: var(--font-mono); font-size: 10.5px;
			letter-spacing: 0.15em; text-transform: uppercase;
			color: var(--text-4); margin-bottom: 8px;
		}

		/* Testnet faucet hint */
		.testnet-hint {
			margin-top: 14px;
			padding: 10px 14px;
			border: 1px solid rgba(255,180,0,0.2);
			background: rgba(255,180,0,0.05);
			border-radius: 8px;
			font-size: 13px; color: #c99020;
			display: none;
		}
		.testnet-hint.visible { display: block; }
		.testnet-hint a { color: #e6b030; text-decoration: underline; }

		/* Footer */
		.card-foot {
			padding: 14px 28px;
			border-top: 1px solid var(--hairline);
			display: flex; align-items: center; justify-content: center;
			gap: 8px;
		}
		.foot-text {
			font-size: 12.5px; color: var(--text-4);
		}
		.foot-text a { color: var(--text-3); }
		.foot-text a:hover { color: var(--text-2); }
		.foot-dot {
			width: 3px; height: 3px; border-radius: 50%;
			background: var(--text-4);
		}

		/* Page footer */
		footer.page-footer {
			padding: 20px 32px;
			text-align: center;
			font-size: 12px; color: var(--text-4);
		}
	</style>
</head>
<body>

<!-- ── MINIMAL NAV ──────────────────────────────────────────── -->
<nav class="nav">
	<div class="nav-inner">
		<a class="brand" href="/">
			<span class="brand-mark"></span>
			three.ws
		</a>
		<a class="nav-close" id="close-btn" href="/" title="Close">&#x2715;</a>
	</div>
</nav>

<!-- ── PAYMENT CARD ─────────────────────────────────────────── -->
<div class="page-body">
	<div class="pay-card" id="pay-card">

		<!-- Service header -->
		<div class="card-head">
			<div class="service-row">
				<div class="service-icon" id="service-icon">⚡</div>
				<div>
					<div class="service-name" id="service-name">Paid Endpoint</div>
					<div class="service-desc" id="service-desc">Access requires a micropayment via x402</div>
				</div>
			</div>
			<div class="price-block">
				<div class="price-amount" id="price-amount">$0.00</div>
				<div class="price-currency" id="price-currency">USDC</div>
			</div>
		</div>

		<!-- Body -->
		<div class="card-body">

			<!-- Network tabs -->
			<div class="tab-row" id="tab-row">
				<button class="tab-btn active" data-net="base" id="tab-base">Base</button>
				<button class="tab-btn" data-net="solana" id="tab-solana">Solana</button>
			</div>

			<!-- Base network -->
			<div class="net-panel active" id="net-base">
				<div class="wallet-list">
					<button class="wallet-btn" data-wallet="coinbase">
						<span class="wallet-icon">🔵</span>
						<span class="wallet-name">Coinbase Wallet</span>
						<span class="wallet-arrow">›</span>
					</button>
					<button class="wallet-btn" data-wallet="metamask">
						<span class="wallet-icon">🦊</span>
						<span class="wallet-name">MetaMask</span>
						<span class="wallet-arrow">›</span>
					</button>
					<button class="wallet-btn" data-wallet="walletconnect">
						<span class="wallet-icon">🔗</span>
						<span class="wallet-name">WalletConnect</span>
						<span class="wallet-arrow">›</span>
					</button>
				</div>
				<div class="wallet-status" id="wallet-status-base"></div>
				<div class="testnet-hint" id="testnet-hint-base">
					Testing on testnet? <a href="https://faucet.circle.com/" target="_blank" rel="noopener">Get free USDC on Base Sepolia →</a>
				</div>
			</div>

			<!-- Solana network -->
			<div class="net-panel" id="net-solana">
				<div class="wallet-list">
					<button class="wallet-btn" data-wallet="phantom">
						<span class="wallet-icon">👻</span>
						<span class="wallet-name">Phantom</span>
						<span class="wallet-arrow">›</span>
					</button>
					<button class="wallet-btn" data-wallet="solflare">
						<span class="wallet-icon">🌟</span>
						<span class="wallet-name">Solflare</span>
						<span class="wallet-arrow">›</span>
					</button>
				</div>
				<div class="wallet-status" id="wallet-status-solana"></div>
			</div>

			<!-- Advanced: raw payment requirements -->
			<button class="accordion-trigger" id="adv-toggle">
				<span>Advanced — view payment requirements</span>
				<svg width="14" height="14" fill="none" viewBox="0 0 14 14"><path d="M3 5l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
			</button>
			<div class="accordion-body" id="adv-body">
				<div class="raw-label">Raw x402 PaymentRequirements</div>
				<pre class="raw-json" id="raw-json">(loading…)</pre>
			</div>
		</div>

		<!-- Footer -->
		<div class="card-foot">
			<span class="foot-text">Powered by <a href="https://x402.org" target="_blank" rel="noopener">x402</a></span>
			<span class="foot-dot"></span>
			<span class="foot-text"><a href="https://three.ws" target="_blank" rel="noopener">three.ws</a></span>
			<span class="foot-dot"></span>
			<span class="foot-text"><a href="https://x402.org/docs" target="_blank" rel="noopener">Learn more</a></span>
		</div>
	</div>
</div>

<footer class="page-footer">Secured by the x402 micropayment protocol</footer>

<script type="module" src="/x402-pay-core.js"></script>
<script src="/paywall.js"></script>
	<script src="/brand.js" defer></script>
</body>
</html>
