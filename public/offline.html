<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
		<title>You're offline · three.ws</title>
		<meta name="theme-color" content="#000000" />
		<style>
			*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

			:root {
				--bg: #080814;
				--surface: #0f0f1a;
				--border: rgba(255,255,255,0.08);
				--text: rgba(255,255,255,0.9);
				--muted: rgba(255,255,255,0.45);
				--accent: #6c63ff;
			}

			html, body {
				height: 100%;
				background: var(--bg);
				color: var(--text);
				font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
				-webkit-font-smoothing: antialiased;
			}

			body {
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				min-height: 100dvh;
				padding: env(safe-area-inset-top, 24px) 24px env(safe-area-inset-bottom, 24px);
				text-align: center;
				gap: 0;
			}

			.icon {
				width: 72px;
				height: 72px;
				margin-bottom: 28px;
				opacity: 0.85;
				animation: float 3s ease-in-out infinite;
			}

			@keyframes float {
				0%, 100% { transform: translateY(0); }
				50% { transform: translateY(-8px); }
			}

			h1 {
				font-size: clamp(1.5rem, 6vw, 2rem);
				font-weight: 700;
				letter-spacing: -0.03em;
				margin-bottom: 12px;
			}

			p {
				font-size: 1rem;
				color: var(--muted);
				max-width: 28ch;
				line-height: 1.6;
				margin-bottom: 36px;
			}

			.retry-btn {
				display: inline-flex;
				align-items: center;
				gap: 8px;
				background: rgba(255,255,255,0.07);
				border: 1px solid var(--border);
				border-radius: 12px;
				color: var(--text);
				font-size: 0.95rem;
				font-weight: 500;
				padding: 14px 28px;
				cursor: pointer;
				text-decoration: none;
				transition: background 0.15s, border-color 0.15s;
				min-height: 52px;
				-webkit-tap-highlight-color: transparent;
				touch-action: manipulation;
			}
			.retry-btn:hover, .retry-btn:active {
				background: rgba(255,255,255,0.12);
				border-color: rgba(255,255,255,0.18);
			}
			.retry-btn svg { flex-shrink: 0; }

			.home-link {
				margin-top: 16px;
				font-size: 0.85rem;
				color: var(--muted);
				text-decoration: none;
				display: block;
				padding: 8px;
			}
			.home-link:hover { color: var(--text); }

			.logo {
				position: fixed;
				top: max(env(safe-area-inset-top, 0px), 20px);
				left: 50%;
				transform: translateX(-50%);
				font-size: 0.85rem;
				font-weight: 600;
				letter-spacing: 0.04em;
				color: rgba(255,255,255,0.5);
				text-decoration: none;
			}
		</style>
	</head>
	<body>
		<a href="/" class="logo">three.ws</a>

		<svg class="icon" viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
			<circle cx="36" cy="36" r="35" stroke="rgba(255,255,255,0.1)" stroke-width="1.5"/>
			<path d="M20 36C20 27.163 27.163 20 36 20s16 7.163 16 16" stroke="rgba(255,255,255,0.3)" stroke-width="2" stroke-linecap="round"/>
			<path d="M26 42l-6-6 6-6" stroke="rgba(255,255,255,0.5)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
			<path d="M46 30l6 6-6 6" stroke="rgba(255,255,255,0.5)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
			<circle cx="36" cy="48" r="3" fill="rgba(255,255,255,0.25)"/>
		</svg>

		<h1>You're offline</h1>
		<p>Check your connection and try again.</p>

		<button class="retry-btn" onclick="window.location.reload()">
			<svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
				<path d="M13.5 8A5.5 5.5 0 1 1 8 2.5c1.8 0 3.4.86 4.4 2.2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
				<path d="M11 4.5L12.5 2.5 14.5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
			</svg>
			Try again
		</button>

		<a href="/" class="home-link">Go to home</a>

		<script>
			// Auto-reload when connection is restored.
			window.addEventListener('online', () => window.location.reload());
		</script>
	</body>
</html>
