<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beach Meme Diorama — WASD + VR</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <style>
      body { margin: 0; background: #000; }
      #hud {
        position: fixed; left: 12px; top: 12px; z-index: 10;
        font: 12px/1.4 -apple-system, system-ui, sans-serif;
        color: #fff; background: rgba(0,0,0,0.45);
        padding: 8px 10px; border-radius: 6px; pointer-events: none;
      }
      #hud b { color: #ffb968; }
    </style>
  </head>
  <body>
    <div id="hud">
      <b>WASD</b> walk &nbsp; <b>mouse</b> look &nbsp; <b>click</b> capture pointer<br>
      Bottom-right <b>VR</b> button works on Quest / Vision Pro / Cardboard.
    </div>

    <a-scene background="color: #2a1a2e" renderer="colorManagement: true; physicallyCorrectLights: true">

      <a-assets>
        <img id="lyr0" src="layers/layer_0.png" crossorigin="anonymous">
        <img id="lyr1" src="layers/layer_1.png" crossorigin="anonymous">
        <img id="lyr2" src="layers/layer_2.png" crossorigin="anonymous">
        <img id="lyr3" src="layers/layer_3.png" crossorigin="anonymous">
        <img id="lyr4" src="layers/layer_4.png" crossorigin="anonymous">
      </a-assets>

      <!-- Sunset gradient backdrop sphere -->
      <a-sky color="#ff7a32"></a-sky>

      <!-- Sand floor -->
      <a-plane position="0 0 -15" rotation="-90 0 0" width="200" height="200"
               color="#c69968" shader="flat"></a-plane>

      <!--
        Five depth slabs sized so width = 1.33 * |Z| (height = |Z|).
        That gives ~53° vertical angular size at every distance, so they all
        share the same field of view from origin and stack into one image.
        Walking forward gives true parallax between near and far slabs.
        material: flat shading so sunset colours stay vivid; alphaTest hides
        the soft feather edges so layers don't ghost through each other.
      -->
      <a-image src="#lyr0" position="0 1.6 -20" width="26.7" height="20"
               material="shader: flat; transparent: true; alphaTest: 0.05; side: double"></a-image>
      <a-image src="#lyr1" position="0 1.6 -14" width="18.7" height="14"
               material="shader: flat; transparent: true; alphaTest: 0.05; side: double"></a-image>
      <a-image src="#lyr2" position="0 1.6 -9"  width="12"   height="9"
               material="shader: flat; transparent: true; alphaTest: 0.05; side: double"></a-image>
      <a-image src="#lyr3" position="0 1.6 -5"  width="6.67" height="5"
               material="shader: flat; transparent: true; alphaTest: 0.05; side: double"></a-image>
      <a-image src="#lyr4" position="0 1.6 -2.5" width="3.33" height="2.5"
               material="shader: flat; transparent: true; alphaTest: 0.05; side: double"></a-image>

      <!-- Player rig: WASD walk + mouse look, eye height 1.6m -->
      <a-entity id="rig" position="0 0 0" wasd-controls="acceleration: 30">
        <a-camera position="0 1.6 0" look-controls="pointerLockEnabled: true">
          <a-cursor color="#ffb968" raycaster="far: 30"></a-cursor>
        </a-camera>
      </a-entity>

    </a-scene>
  </body>
</html>
