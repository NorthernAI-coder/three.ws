<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    html, body { margin: 0; background: #f3efe6; }
    .wrap { padding: 40px; background: #f3efe6; }
    /* Mirror Message.svelte avatar container */
    .btn { display:flex; width:140px; height:280px; border-radius:6px; }
    .span { width:100%; height:100%; overflow:hidden; display:inline-block; border-radius:inherit; }
  </style>
  <script type="module" src="/agent-3d/latest/agent-3d.js"></script>
</head>
<body>
  <div class="wrap">
    <div class="btn">
      <span class="span">
        <agent-3d
          src="/avatars/cz.glb"
          mode="inline"
          width="140"
          height="280"
          background="transparent"
          kiosk
          name-plate="off"
          style="width:100%;height:100%;display:block;"
        ></agent-3d>
      </span>
    </div>
  </div>
</body>
</html>
