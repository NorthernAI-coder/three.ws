<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>three.ws · NVIDIA TRELLIS demo</title>
<style>
	:root { color-scheme: dark; }
	* { margin: 0; box-sizing: border-box; }
	html, body { height: 100%; overflow: hidden; font-family: ui-sans-serif, system-ui, -apple-system, sans-serif; }
	#stage { position: fixed; inset: 0; background: radial-gradient(120% 120% at 50% 20%, #1a2238 0%, #0b0e18 55%, #05060c 100%); }
	canvas { display: block; }
	.badge {
		position: fixed; left: 24px; bottom: 22px; display: flex; align-items: center; gap: 10px;
		padding: 10px 16px; border-radius: 999px; background: rgba(12,16,28,.62); backdrop-filter: blur(10px);
		border: 1px solid rgba(118,185,0,.35); color: #e8edf7; font-size: 14px; letter-spacing: .2px;
		box-shadow: 0 8px 30px rgba(0,0,0,.45); opacity: 0; transition: opacity .6s ease .3s;
	}
	.badge.show { opacity: 1; }
	.dot { width: 9px; height: 9px; border-radius: 50%; background: #76b900; box-shadow: 0 0 10px #76b900; }
	.badge b { color: #76b900; font-weight: 700; }
	.prompt { position: fixed; right: 24px; bottom: 24px; max-width: 46vw; text-align: right; color: #aeb8cc; font-size: 13px; opacity: 0; transition: opacity .6s ease .5s; }
	.prompt.show { opacity: 1; }
	.hint { position: fixed; top: 20px; right: 22px; color: #566; font-size: 12px; opacity:.5; }
	.loading { position: fixed; inset: 0; display: grid; place-items: center; color: #76b900; font-size: 14px; letter-spacing: 2px; }
	.loading.hide { display: none; }
</style>
</head>
<body>
<div id="stage"></div>
<div class="loading" id="loading">GENERATING VIEW…</div>
<div class="badge" id="badge"><span class="dot"></span> image → 3D, <b>rigged &amp; live</b> · NVIDIA TRELLIS</div>
<div class="prompt" id="prompt"></div>
<script type="importmap">
{ "imports": {
	"three": "https://unpkg.com/three@0.160.0/build/three.module.js",
	"three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
} }
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

const params = new URLSearchParams(location.search);
const modelUrl = params.get('model');
const promptText = params.get('prompt') || '';
document.getElementById('prompt').textContent = promptText ? `“${promptText}”` : '';

const stage = document.getElementById('stage');
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.05;
stage.appendChild(renderer.domElement);

const scene = new THREE.Scene();
const pmrem = new THREE.PMREMGenerator(renderer);
scene.environment = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;

const camera = new THREE.PerspectiveCamera(38, innerWidth / innerHeight, 0.01, 100);
camera.position.set(0, 0.4, 3.2);

const key = new THREE.DirectionalLight(0xffffff, 2.4); key.position.set(3, 5, 4); scene.add(key);
const rim = new THREE.DirectionalLight(0x86b6ff, 1.6); rim.position.set(-4, 2, -4); scene.add(rim);
scene.add(new THREE.AmbientLight(0xffffff, 0.3));

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true; controls.dampingFactor = 0.06;
controls.autoRotate = true; controls.autoRotateSpeed = 2.2;
controls.minDistance = 1.2; controls.maxDistance = 8;

function frameObject(obj) {
	const box = new THREE.Box3().setFromObject(obj);
	const size = box.getSize(new THREE.Vector3());
	const center = box.getCenter(new THREE.Vector3());
	const maxDim = Math.max(size.x, size.y, size.z) || 1;
	const scale = 1.8 / maxDim;
	obj.scale.setScalar(scale);
	obj.position.sub(center.multiplyScalar(scale));
	obj.position.y += (size.y * scale) * 0.0;
	controls.target.set(0, 0, 0);
}

const loader = new GLTFLoader();
if (modelUrl) {
	loader.load(modelUrl, (gltf) => {
		frameObject(gltf.scene);
		scene.add(gltf.scene);
		document.getElementById('loading').classList.add('hide');
		document.getElementById('badge').classList.add('show');
		document.getElementById('prompt').classList.add('show');
		// Cinematic intro: start tucked behind, sweep around to the front.
		controls.autoRotateSpeed = 6.0;
		setTimeout(() => { controls.autoRotateSpeed = 2.0; }, 2600);
	}, undefined, (err) => {
		document.getElementById('loading').textContent = 'FAILED TO LOAD MODEL';
		console.error(err);
	});
} else {
	document.getElementById('loading').textContent = 'NO ?model= PARAM';
}

addEventListener('resize', () => {
	camera.aspect = innerWidth / innerHeight; camera.updateProjectionMatrix();
	renderer.setSize(innerWidth, innerHeight);
});

renderer.setAnimationLoop(() => { controls.update(); renderer.render(scene, camera); });
</script>
</body>
</html>
