<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>x402 modal — browser e2e</title>
	<style>
		body { font: 15px/1.5 system-ui, sans-serif; max-width: 640px; margin: 48px auto; padding: 0 20px; color: #111; }
		h1 { font-size: 20px; }
		button { font: inherit; padding: 12px 18px; border-radius: 10px; border: 1px solid #111; background: #111; color: #fff; cursor: pointer; }
		button:hover { background: #333; }
		pre { background: #f4f4f5; padding: 12px; border-radius: 8px; overflow: auto; font-size: 13px; }
		.row { display: flex; gap: 12px; align-items: center; margin: 18px 0; }
		.tag { font-size: 12px; color: #666; }
	</style>
</head>
<body>
	<h1>@three-ws/x402-payment-modal — browser e2e</h1>
	<p class="tag">Real modal source, keypair-backed provider, local self-transfer settlement.</p>

	<div class="row">
		<!-- The modal binds this declaratively via init(); we also drive it via X402.pay() from the runner. -->
		<button id="payBtn" data-x402-endpoint="/paid" data-x402-merchant="x402 local test" data-x402-action="Local paid call">
			Pay & call /paid
		</button>
	</div>

	<pre id="log">waiting…</pre>

	<script type="module">
		import nacl from 'https://esm.sh/tweetnacl@1.0.3';

		const logEl = document.getElementById('log');
		const lines = [];
		function log(...a) { lines.push(a.join(' ')); logEl.textContent = lines.join('\n'); }
		window.__x402log = log;

		// ── Inject a Phantom-shaped provider backed by the throwaway keypair. ──
		// SECRET_KEY (64-byte array) and PUBKEY (base58) are filled in by the runner.
		const SECRET_KEY = Uint8Array.from(window.__X402_SECRET || []);
		const PUBKEY = window.__X402_PUBKEY;

		function signerIndex(tx) {
			const keys = tx.message.staticAccountKeys.map((k) => k.toBase58());
			return keys.indexOf(PUBKEY);
		}

		const provider = {
			isPhantom: true,
			publicKey: { toString: () => PUBKEY },
			async connect() { return { publicKey: { toString: () => PUBKEY } }; },
			async disconnect() {},
			// Sign the modal's VersionedTransaction in-place with tweetnacl.
			async signTransaction(tx) {
				const msg = tx.message.serialize();
				const sig = nacl.sign.detached(msg, SECRET_KEY);
				const idx = signerIndex(tx);
				if (idx < 0) throw new Error('buyer is not a required signer of this tx');
				tx.signatures[idx] = sig;
				return tx;
			},
			async signAllTransactions(txs) { return Promise.all(txs.map((t) => this.signTransaction(t))); },
			async signMessage(message) {
				return { signature: nacl.sign.detached(message, SECRET_KEY), publicKey: provider.publicKey };
			},
		};
		window.solana = provider;
		window.phantom = { solana: provider };

		// ── Load the real published modal and point it at this local server. ──
		const X402 = await import('/x402.js');
		X402.configure({ checkoutOrigin: location.origin, checkoutPath: '/api/x402-checkout' });
		log('modal version:', X402.version);

		// Surface results to the runner via globals + DOM events.
		window.__x402done = null;
		window.addEventListener('x402:result', (e) => {
			window.__x402done = { ok: true, detail: e.detail };
			log('RESULT', JSON.stringify(e.detail).slice(0, 400));
		});
		window.addEventListener('x402:error', (e) => {
			window.__x402done = { ok: false, detail: e.detail };
			log('ERROR', JSON.stringify(e.detail).slice(0, 400));
		});

		// Kick off pay() WITHOUT awaiting so the runner can click the token pill
		// and the Phantom button while the modal is open. Resolution lands on
		// window.__x402done.
		window.__startPay = (label) => {
			window.__x402done = null;
			log('pay() opening for', label);
			X402.pay({ endpoint: '/paid', merchant: 'x402 local test', action: `Local ${label} call` })
				.then((res) => { window.__x402done = { ok: true, detail: res }; log('pay() resolved:', JSON.stringify(res).slice(0, 400)); })
				.catch((err) => { window.__x402done = { ok: false, detail: { message: String(err.message || err) } }; log('pay() threw:', String(err.message || err)); });
		};

		log('ready');
	</script>
</body>
</html>
