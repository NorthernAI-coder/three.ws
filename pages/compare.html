	<body>
		<header><div id="nav-container"></div></header>
		<script src="/nav.js"></script>

		<main class="cv-container">
			<nav class="cv-crumbs" aria-label="Breadcrumb">
				<a href="/markets">Markets</a><span class="sep">/</span
				><span class="here">Compare</span>
			</nav>
			<h1 class="cv-h1">Compare Coins</h1>
			<p class="cv-sub">
				Put up to four coins head to head — overlay how they've performed and line up the
				numbers that matter. Add coins with the search box; the URL updates so you can share
				the matchup.
			</p>

			<div class="cmp-picker">
				<div class="cv-search" id="cmp-search" style="max-width: 24rem">
					<span class="mag" aria-hidden="true">
						<svg
							viewBox="0 0 24 24"
							fill="none"
							stroke="currentColor"
							stroke-width="2"
							stroke-linecap="round"
							stroke-linejoin="round"
						>
							<circle cx="11" cy="11" r="8" />
							<path d="m21 21-4.3-4.3" />
						</svg>
					</span>
					<input
						id="cmp-search-input"
						type="search"
						placeholder="Add a coin to compare…"
						autocomplete="off"
						spellcheck="false"
						role="combobox"
						aria-expanded="false"
						aria-controls="cmp-search-pop"
						aria-label="Search coins to add to the comparison"
					/>
					<div id="cmp-search-pop" class="cv-search-pop" role="listbox" hidden></div>
				</div>
				<div class="cmp-chips" id="cmp-chips" aria-label="Selected coins"></div>
			</div>

			<!-- Overlay performance chart. Hydrated by src/compare.js. -->

				class="cv-section"
				aria-label="Performance comparison"
