<!doctype html>
<html lang="en">
	<head>
		<script>/* three.ws theme boot — no-flash; runtime in /theme-switcher.js */(function(){try{var m=localStorage.getItem('twx_theme');var l=m==='auto'?(window.matchMedia&&window.matchMedia('(prefers-color-scheme: light)').matches):m==='light';document.documentElement.setAttribute('data-theme',l?'light':'dark');}catch(e){document.documentElement.setAttribute('data-theme','dark');}})();</script>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />

			property="og:description"

	<body>
		<header><div id="nav-container"></div></header>
		<script src="/nav.js"></script>

		<!-- Ambient field — drifting particle constellation behind everything. -->
		<canvas id="ld-field" aria-hidden="true"></canvas>
		<div class="ld-aurora" aria-hidden="true"></div>

		<main id="ld-shell" class="ld-shell" aria-busy="true">
			<a class="ld-back" href="/launches" aria-label="Back to all launches">← All launches</a>

			<!-- Hero / identity. Hydrated by src/launch-detail.js. -->
			<section id="ld-hero" class="ld-hero" aria-label="Coin overview"></section>

			<!-- Primary intelligence + market column, secondary sidebar. -->
			<div class="ld-body">
				<div class="ld-main">
					<section id="ld-verdict" class="ld-section" aria-label="Coin Intelligence verdict"></section>
					<section id="ld-smart" class="ld-section" aria-label="Smart money in this coin"></section>
					<section id="ld-chart" class="ld-section" aria-label="Price history"></section>
					<section id="ld-distribution" class="ld-section" aria-label="Holder distribution"></section>
					<section id="ld-economics" class="ld-section" aria-label="Buyback &amp; burn economics"></section>
				</div>
				<aside class="ld-side">
					<section id="ld-agent" class="ld-section" aria-label="The agent behind this coin"></section>
					<section id="ld-tape" class="ld-section" aria-label="Live trades"></section>
					<section id="ld-community" class="ld-section" aria-label="Community"></section>
					<section id="ld-actions" class="ld-section ld-actions" aria-label="Actions"></section>
				</aside>
			</div>

			<div id="ld-state" class="ld-state" role="status"></div>
		</main>

		<script type="module" src="/src/launch-detail.js"></script>
		<script src="/brand.js" defer></script>
		<div id="footer-container"></div>
		<script src="/footer.js"></script>
