<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width,initial-scale=1" />
		<title>Watch · Agent · three.ws</title>
		<meta name="robots" content="noindex" />
		<link rel="icon" href="/favicon.ico" />
		<link rel="stylesheet" href="/fonts/fonts.css" />
		<link rel="stylesheet" href="/dashboard-next/shell.css" />
		<style>
			/* Override shell max-width for the watch view — screen needs room */
			.dn-content { max-width: 1200px !important; }
			.watch-header {
				display: flex;
				align-items: center;
				gap: 12px;
				margin-bottom: 20px;
			}
			.watch-header-avatar {
				width: 40px;
				height: 40px;
				border-radius: 50%;
				object-fit: cover;
				background: rgba(255,255,255,0.06);
				border: 1px solid rgba(255,255,255,0.1);
				flex-shrink: 0;
			}
			.watch-header-name {
				font-size: 18px;
				font-weight: 700;
				color: var(--ink, #f0f0f4);
			}
			.watch-header-sub {
				font-size: 13px;
				color: var(--ink-dim, #888);
				margin-top: 1px;
			}
			.watch-header-back {
				margin-left: auto;
				font-size: 13px;
				color: var(--ink-dim, #888);
				text-decoration: none;
				padding: 6px 12px;
				border-radius: 6px;
				border: 1px solid rgba(255,255,255,0.08);
				transition: background 0.15s, color 0.15s;
			}
			.watch-header-back:hover {
				background: rgba(255,255,255,0.06);
				color: var(--ink, #f0f0f4);
			}
			#watch-mount { width: 100%; }
			.watch-loading {
				display: flex;
				align-items: center;
				justify-content: center;
				min-height: 320px;
				color: var(--ink-dim, #888);
				font-size: 14px;
			}
			.watch-error {
				padding: 24px;
				color: var(--ink-dim, #888);
				font-size: 14px;
				text-align: center;
			}
		</style>
	</head>
	<body>
		<script src="/embed.js"></script>
		<script type="module" src="/src/dashboard-next/pages/watch.js"></script>
	</body>
</html>
