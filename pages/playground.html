<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Playground · three.ws</title>
		<link rel="icon" href="/favicon.ico" sizes="any" />
		<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
		<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
		<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
		<link rel="apple-touch-icon" href="/apple-touch-icon.png" />
		<link rel="manifest" href="/site.webmanifest" />
		<link rel="stylesheet" href="/style.css" />
		<link rel="stylesheet" href="/nav.css" />
		<link rel="stylesheet" href="/footer.css" />
		<link rel="stylesheet" href="/fonts/fonts.css" />
		<link rel="stylesheet" href="/mobile.css" />
		<script
			type="module"
			src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"
			integrity="sha384-sr9b4Ux0WhAUGclJ0ym0FSY2zSOMmNSn0bP/SA0e6bNCrpn/5W3QL8mm+LdlQMKw"
			crossorigin="anonymous"
		></script>
		<script defer src="/footer-newsletter.js"></script>
		<style>
			:root {
				--bg: #0a0a0a;
				--panel: #111;
				--panel-2: #161616;
				--border: #1f1f1f;
				--border-2: #2a2a2a;
				--text: #fafafa;
				--text-2: #a1a1aa;
				--text-3: #52525b;
				--accent: #ffffff;
				--accent-dim: rgba(255, 255, 255, 0.1);
				--success: #e8e8e8;
				--err: #f87171;
			}

			html,
			body {
				margin: 0;
				background: var(--bg);
				color: var(--text);
				font-family: var(--font-body);
				-webkit-font-smoothing: antialiased;
			}
			body {
				display: flex;
				flex-direction: column;
				min-height: 100vh;
			}
			a {
				color: inherit;
			}

			/* ── header ── */
			.pg-header {
				position: sticky;
				top: 0;
				z-index: 100;
				display: flex;
				align-items: center;
				justify-content: space-between;
				gap: 1rem;
				padding: 0.75rem 1.618rem;
				border-bottom: 1px solid rgba(255, 255, 255, 0.06);
				background: rgba(10, 10, 10, 0.9);
				backdrop-filter: blur(14px);
				-webkit-backdrop-filter: blur(14px);
			}
			.pg-header-left {
				display: inline-flex;
				align-items: center;
				gap: 0;
			}
			.pg-header-logo {
				height: 26px;
				width: auto;
				display: block;
			}
			.pg-header-nav {
				display: flex;
				align-items: center;
				gap: 1.25rem;
				margin-left: 1.5rem;
			}
			.pg-header-nav a {
				color: rgba(255, 255, 255, 0.4);
				text-decoration: none;
				font-size: 0.8rem;
				transition: color 0.15s;
			}
			.pg-header-nav a:hover {
				color: rgba(255, 255, 255, 0.85);
			}
			.pg-header-nav a.active {
				color: rgba(255, 255, 255, 0.85);
			}

			/* ── layout ── */
			.pg-body {
				flex: 1;
				display: grid;
				grid-template-columns: 1fr 300px;
				gap: 0;
				min-height: 0;
			}

			/* ── viewer column ── */
			.pg-viewer-col {
				display: flex;
				flex-direction: column;
				padding: 1.5rem;
				gap: 0.75rem;
				border-right: 1px solid var(--border);
			}
			.pg-viewer-wrap {
				position: relative;
				flex: 1;
				border-radius: 14px;
				overflow: hidden;
				border: 1px solid var(--border);
				background:
					radial-gradient(
						ellipse at 50% 30%,
						rgba(255, 255, 255, 0.03) 0%,
						transparent 65%
					),
					var(--panel);
				min-height: 420px;
			}
			.pg-viewer-wrap.drag-over {
				border-color: var(--accent);
				background:
					radial-gradient(
						ellipse at 50% 30%,
						rgba(255, 255, 255, 0.08) 0%,
						transparent 65%
					),
					var(--panel);
			}
			#viewer {
				width: 100%;
				height: 100%;
				position: absolute;
				inset: 0;
				--poster-color: transparent;
			}

			/* drop overlay shown before any model loads */
			.drop-overlay {
				position: absolute;
				inset: 0;
				z-index: 10;
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				gap: 0.75rem;
				pointer-events: none;
				transition: opacity 0.2s;
			}
			.drop-overlay.hidden {
				opacity: 0;
				pointer-events: none;
			}
			.drop-icon {
				width: 56px;
				height: 56px;
				border-radius: 14px;
				border: 1.5px dashed var(--border-2);
				display: flex;
				align-items: center;
				justify-content: center;
				color: var(--text-3);
			}
			.drop-overlay p {
				margin: 0;
				font-size: 13px;
				color: var(--text-3);
				text-align: center;
				line-height: 1.5;
			}
			.drop-overlay small {
				display: block;
				font-size: 11px;
				color: var(--text-3);
				opacity: 0.6;
				margin-top: 0.1rem;
			}

			.pg-viewer-bar {
				display: flex;
				align-items: center;
				gap: 0.5rem;
				flex-wrap: wrap;
			}
			.pg-file-chip {
				font-size: 12px;
				color: var(--text-3);
				background: var(--panel);
				border: 1px solid var(--border);
				border-radius: 6px;
				padding: 0.3rem 0.6rem;
				white-space: nowrap;
				overflow: hidden;
				text-overflow: ellipsis;
				max-width: 220px;
			}
			.pg-file-chip.loaded {
				color: var(--text-2);
				border-color: var(--border-2);
			}

			/* ── controls column ── */
			.pg-controls-col {
				display: flex;
				flex-direction: column;
				overflow-y: auto;
				padding: 1.25rem;
				gap: 0;
				scrollbar-width: thin;
				scrollbar-color: var(--border) transparent;
			}

			.pg-section {
				padding: 1rem 0;
				border-bottom: 1px solid var(--border);
			}
			.pg-section:first-child {
				padding-top: 0.25rem;
			}
			.pg-section:last-child {
				border-bottom: none;
			}

			.pg-section-label {
				font-size: 10px;
				font-weight: 600;
				letter-spacing: 0.08em;
				text-transform: uppercase;
				color: var(--text-3);
				margin: 0 0 0.75rem;
			}

			/* upload */
			.pg-upload-label {
				display: flex;
				align-items: center;
				justify-content: center;
				gap: 0.5rem;
				padding: 0.65rem 1rem;
				border-radius: 8px;
				border: 1px dashed var(--border-2);
				color: var(--text-2);
				font-size: 12.5px;
				cursor: pointer;
				transition:
					color 0.15s,
					border-color 0.15s,
					background 0.15s;
				width: 100%;
				box-sizing: border-box;
			}
			.pg-upload-label:hover {
				color: var(--text);
				border-color: var(--text-3);
				background: var(--panel-2);
			}
			#avatar-upload {
				display: none;
			}

			/* pills */
			.pill-row {
				display: flex;
				gap: 0.35rem;
				flex-wrap: wrap;
			}
			.pill {
				padding: 0.35rem 0.75rem;
				border-radius: 6px;
				border: 1px solid var(--border-2);
				background: transparent;
				color: var(--text-2);
				font-family: inherit;
				font-size: 12px;
				cursor: pointer;
				transition:
					color 0.12s,
					border-color 0.12s,
					background 0.12s;
			}
			.pill:hover {
				color: var(--text);
				border-color: var(--text-3);
			}
			.pill.active {
				background: var(--accent-dim);
				border-color: var(--accent);
				color: var(--accent);
			}

			/* sliders */
			.pg-slider {
				width: 100%;
				height: 4px;
				border-radius: 2px;
				accent-color: var(--accent);
				cursor: pointer;
			}
			.slider-row {
				display: flex;
				align-items: center;
				gap: 0.75rem;
			}
			.slider-val {
				font-size: 11px;
				color: var(--text-3);
				min-width: 28px;
				text-align: right;
				font-variant-numeric: tabular-nums;
			}

			/* toggle */
			.toggle-row {
				display: flex;
				align-items: center;
				justify-content: space-between;
			}
			.toggle-row span {
				font-size: 12.5px;
				color: var(--text-2);
			}
			.toggle {
				position: relative;
				display: inline-block;
				width: 36px;
				height: 20px;
			}
			.toggle input {
				opacity: 0;
				width: 0;
				height: 0;
			}
			.toggle-slider {
				position: absolute;
				inset: 0;
				background: var(--border-2);
				border-radius: 20px;
				cursor: pointer;
				transition: background 0.2s;
			}
			.toggle-slider::before {
				content: '';
				position: absolute;
				height: 14px;
				width: 14px;
				left: 3px;
				top: 3px;
				background: var(--text-2);
				border-radius: 50%;
				transition:
					transform 0.2s,
					background 0.2s;
			}
			.toggle input:checked + .toggle-slider {
				background: var(--accent);
			}
			.toggle input:checked + .toggle-slider::before {
				transform: translateX(16px);
				background: #fff;
			}

			/* animations */
			.anim-controls {
				display: flex;
				gap: 0.5rem;
				align-items: center;
			}
			#anim-select {
				flex: 1;
				min-width: 0;
				padding: 0.4rem 0.6rem;
				border-radius: 8px;
				border: 1px solid var(--border-2);
				background: var(--panel-2);
				color: var(--text);
				font-family: inherit;
				font-size: 12px;
			}
			#anim-select:focus {
				outline: none;
				border-color: var(--accent);
			}
			.anim-btn {
				width: 32px;
				height: 32px;
				border-radius: 8px;
				border: 1px solid var(--border-2);
				background: var(--panel-2);
				color: var(--text-2);
				display: flex;
				align-items: center;
				justify-content: center;
				cursor: pointer;
				flex-shrink: 0;
				transition:
					color 0.12s,
					border-color 0.12s,
					background 0.12s;
			}
			.anim-btn:hover {
				color: var(--text);
				border-color: var(--text-3);
			}

			/* model info */
			.info-grid {
				display: grid;
				grid-template-columns: auto 1fr;
				gap: 0.35rem 0.75rem;
				margin: 0;
			}
			.info-grid dt {
				font-size: 11.5px;
				color: var(--text-3);
			}
			.info-grid dd {
				font-size: 11.5px;
				color: var(--text-2);
				margin: 0;
				font-variant-numeric: tabular-nums;
			}

			/* embed */
			#embed-code {
				width: 100%;
				box-sizing: border-box;
				height: 90px;
				padding: 0.65rem;
				border-radius: 8px;
				border: 1px solid var(--border-2);
				background: var(--panel-2);
				color: var(--text-2);
				font-family: var(--font-mono);
				font-size: 10.5px;
				resize: none;
				line-height: 1.5;
			}
			#embed-code:focus {
				outline: none;
				border-color: var(--accent);
			}
			.embed-note {
				font-size: 11px;
				color: var(--text-3);
				margin: 0.4rem 0 0;
				line-height: 1.45;
			}

			/* buttons */
			.pg-btn {
				display: inline-flex;
				align-items: center;
				justify-content: center;
				gap: 0.4rem;
				padding: 0.5rem 0.85rem;
				border-radius: 8px;
				border: 1px solid var(--border-2);
				background: var(--panel-2);
				color: var(--text-2);
				font-family: inherit;
				font-size: 12px;
				cursor: pointer;
				transition:
					color 0.12s,
					border-color 0.12s,
					background 0.12s;
				text-decoration: none;
			}
			.pg-btn:hover {
				color: var(--text);
				border-color: var(--text-3);
			}
			.pg-btn.accent {
				background: var(--accent);
				border-color: var(--accent);
				color: #0a0a0a;
				font-weight: 600;
			}
			.pg-btn.accent:hover {
				background: #e0e0e0;
				border-color: #e0e0e0;
			}
			.btn-row {
				display: flex;
				gap: 0.4rem;
				flex-wrap: wrap;
				margin-top: 0.6rem;
			}

			/* status */
			#pg-status {
				font-size: 11.5px;
				color: var(--text-3);
				min-height: 14px;
				text-align: center;
			}
			#pg-status.ok {
				color: var(--success);
			}
			#pg-status.err {
				color: var(--err);
			}

			/* loading */
			.loading-indicator {
				display: none;
				position: fixed;
				inset: 0;
				z-index: 150;
				background: rgba(0, 0, 0, 0.45);
				backdrop-filter: blur(2px);
				-webkit-backdrop-filter: blur(2px);
				align-items: center;
				justify-content: center;
			}
			.loading-indicator.open {
				display: flex;
			}
			.spinner {
				width: 44px;
				height: 44px;
				border: 3px solid rgba(255, 255, 255, 0.08);
				border-top-color: var(--accent);
				border-radius: 50%;
				animation: spin 0.85s linear infinite;
			}
			@keyframes spin {
				to {
					transform: rotate(360deg);
				}
			}

			/* responsive */
			@media (max-width: 768px) {
				.pg-body {
					grid-template-columns: 1fr;
				}
				.pg-viewer-col {
					border-right: none;
					border-bottom: 1px solid var(--border);
					padding: 1rem;
				}
				.pg-viewer-wrap {
					min-height: 300px;
				}
				.pg-controls-col {
					padding: 1rem;
				}
				.pg-header-nav {
					display: none;
				}
			}
		</style>

			{
				"@context": "https://schema.org",
				"@type": "WebPage",
				"name": "Playground",
				"description": "Sandbox for experimenting with agents, prompts, and 3D scenes.",

	</head>
	<body>
		<header class="pg-header">
			<div class="pg-header-left">
				<a href="/" aria-label="three.ws home">
					<img src="/three.svg" alt="three.ws" class="pg-header-logo" />
				</a>
				<nav class="pg-header-nav" aria-label="Primary">
					<a href="/discover">Discover</a>
					<a href="/create">Create</a>
					<a href="/studio">Studio</a>
					<a href="/playground" class="active">Playground</a>
				</nav>
			</div>
		</header>

		<div class="pg-body">
			<!-- viewer column -->
			<div class="pg-viewer-col">
				<div class="pg-viewer-wrap" id="dropzone">
					<!-- shown before a model is loaded -->
					<div class="drop-overlay" id="drop-overlay">
						<div class="drop-icon">
							<svg
								width="22"
								height="22"
								viewBox="0 0 24 24"
								fill="none"
								stroke="currentColor"
								stroke-width="1.5"
								stroke-linecap="round"
								stroke-linejoin="round"
							>
								<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
								<polyline points="17 8 12 3 7 8" />
								<line x1="12" y1="3" x2="12" y2="15" />
							</svg>
						</div>
						<p>Drop a .glb file here<small>or use the upload button →</small></p>
					</div>

					<model-viewer
						id="viewer"
						src="/avatars/default.glb"
						alt="A 3D avatar"
						ar
						ar-modes="webxr scene-viewer quick-look"
						camera-controls
						shadow-intensity="1"
						environment-image="neutral"
						exposure="1"
						auto-rotate
						autoplay
					></model-viewer>
				</div>

				<div class="pg-viewer-bar">
					<span id="file-chip" class="pg-file-chip loaded">default.glb</span>
					<div id="pg-status"></div>
				</div>
			</div>

			<!-- controls column -->
			<div class="pg-controls-col">
				<!-- upload -->
				<div class="pg-section">
					<div class="pg-section-label">Model</div>
					<label for="avatar-upload" class="pg-upload-label">
						<svg
							width="14"
							height="14"
							viewBox="0 0 24 24"
							fill="none"
							stroke="currentColor"
							stroke-width="2"
							stroke-linecap="round"
							stroke-linejoin="round"
						>
							<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
							<polyline points="17 8 12 3 7 8" />
							<line x1="12" y1="3" x2="12" y2="15" />
						</svg>
						Upload .glb file
					</label>
					<input type="file" id="avatar-upload" accept=".glb" />
				</div>

				<!-- animations -->
				<div class="pg-section" id="anim-section" style="display: none">
					<div class="pg-section-label">Animations</div>
					<div class="anim-controls">
						<button
							class="anim-btn"
							id="anim-play-pause"
							title="Play / Pause"
							aria-label="Play or pause animation"
						>
							<svg
								id="anim-icon-pause"
								width="14"
								height="14"
								viewBox="0 0 24 24"
								fill="currentColor"
							>
								<rect x="6" y="4" width="4" height="16" />
								<rect x="14" y="4" width="4" height="16" />
							</svg>
							<svg
								id="anim-icon-play"
								width="14"
								height="14"
								viewBox="0 0 24 24"
								fill="currentColor"
								style="display: none"
							>
								<polygon points="5 3 19 12 5 21 5 3" />
							</svg>
						</button>
						<select id="anim-select" aria-label="Select animation"></select>
					</div>
				</div>

				<!-- environment -->
				<div class="pg-section">
					<div class="pg-section-label">Environment</div>
					<div class="pill-row">
						<button class="pill active" data-env="neutral">Neutral</button>
						<button class="pill" data-env="legacy">Warm</button>
						<button class="pill" data-env="">Dark</button>
					</div>
				</div>

				<!-- background -->
				<div class="pg-section">
					<div class="pg-section-label">Background</div>
					<div class="pill-row" id="bg-pills">
						<button class="pill active" data-bg="#0f0f0f">Dark</button>
						<button class="pill" data-bg="#1b1b1b">Midnight</button>
						<button class="pill" data-bg="#0d1a0d">Forest</button>
						<button class="pill" data-bg="#1a0d0d">Ember</button>
					</div>
				</div>

				<!-- rotation + shadow -->
				<div class="pg-section">
					<div class="pg-section-label">Controls</div>
					<div class="toggle-row" style="margin-bottom: 0.85rem">
						<span>Auto-rotate</span>
						<label class="toggle">
							<input type="checkbox" id="toggle-rotate" checked />
							<span class="toggle-slider"></span>
						</label>
					</div>
					<div class="toggle-row">
						<span>Shadow</span>
						<label class="toggle">
							<input type="checkbox" id="toggle-shadow" checked />
							<span class="toggle-slider"></span>
						</label>
					</div>
				</div>

				<!-- exposure -->
				<div class="pg-section">
					<div class="pg-section-label">Exposure</div>
					<div class="slider-row">
						<input
							type="range"
							class="pg-slider"
							id="exposure-slider"
							min="0.2"
							max="2.5"
							step="0.05"
							value="1"
						/>
						<span class="slider-val" id="exposure-val">1.0</span>
					</div>
				</div>

				<!-- model info -->
				<div class="pg-section" id="info-section" style="display: none">
					<div class="pg-section-label">Model info</div>
					<dl class="info-grid">
						<dt>File</dt>
						<dd id="info-filename">—</dd>
						<dt>Size</dt>
						<dd id="info-size">—</dd>
						<dt>Animations</dt>
						<dd id="info-anims">—</dd>
					</dl>
				</div>

				<!-- embed -->
				<div class="pg-section">
					<div class="pg-section-label">Embed</div>
					<textarea id="embed-code" readonly spellcheck="false"></textarea>
					<p class="embed-note" id="embed-note"></p>
					<div class="btn-row">
						<button class="pg-btn accent" id="copy-embed">Copy snippet</button>
						<button class="pg-btn" id="reset-btn">Reset</button>
					</div>
				</div>
			</div>
		</div>

		<div id="loading-indicator" class="loading-indicator">
			<div class="spinner"></div>
		</div>

		<div id="footer-container"></div>
		<script src="/footer.js"></script>

		<script>
			(() => {
				const viewer = document.getElementById('viewer');
				const upload = document.getElementById('avatar-upload');
				const dropzone = document.getElementById('dropzone');
				const dropOverlay = document.getElementById('drop-overlay');
				const fileChip = document.getElementById('file-chip');
				const statusEl = document.getElementById('pg-status');
				const loading = document.getElementById('loading-indicator');
				const animSection = document.getElementById('anim-section');
				const animSelect = document.getElementById('anim-select');
				const animPlayPause = document.getElementById('anim-play-pause');
				const animIconPause = document.getElementById('anim-icon-pause');
				const animIconPlay = document.getElementById('anim-icon-play');
				const infoSection = document.getElementById('info-section');
				const infoFilename = document.getElementById('info-filename');
				const infoSize = document.getElementById('info-size');
				const infoAnims = document.getElementById('info-anims');
				const embedCode = document.getElementById('embed-code');
				const embedNote = document.getElementById('embed-note');
				const copyEmbed = document.getElementById('copy-embed');
				const resetBtn = document.getElementById('reset-btn');
				const exposureSlider = document.getElementById('exposure-slider');
				const exposureVal = document.getElementById('exposure-val');

				const DEFAULT_SRC = '/avatars/default.glb';
				const DEFAULT_NAME = 'default.glb';

				let isPlaying = true;
				let currentFilename = DEFAULT_NAME;
				let currentFileSize = null;
				let currentIsLocal = false;
				let statusTimer = null;

				/* ── status ── */
				const setStatus = (msg, kind = '') => {
					statusEl.textContent = msg || '';
					statusEl.className = kind;
					if (statusTimer) clearTimeout(statusTimer);
					if (msg) statusTimer = setTimeout(() => setStatus(''), 3000);
				};

				/* ── loading overlay ── */
				const showLoading = () => loading.classList.add('open');
				const hideLoading = () => loading.classList.remove('open');

				/* ── load model ── */
				const loadModel = (src, filename, fileSize) => {
					showLoading();
					currentFilename = filename;
					currentFileSize = fileSize || null;
					currentIsLocal = src.startsWith('blob:');
					viewer.src = src;
					dropOverlay.classList.add('hidden');
					fileChip.textContent = filename;
					fileChip.classList.add('loaded');
					viewer.addEventListener('load', onModelLoad, { once: true });
					viewer.addEventListener(
						'error',
						() => {
							hideLoading();
							setStatus('Could not load model.', 'err');
						},
						{ once: true },
					);
				};

				const onModelLoad = () => {
					hideLoading();
					updateAnimations();
					updateInfo();
					updateEmbed();
				};

				/* ── animations ── */
				const updateAnimations = () => {
					const anims = viewer.availableAnimations || [];
					if (anims.length === 0) {
						animSection.style.display = 'none';
						return;
					}
					animSection.style.display = '';
					animSelect.innerHTML = anims
						.map((a, i) => `<option value="${i}">${a || `Animation ${i + 1}`}</option>`)
						.join('');
					isPlaying = true;
					setAnimIcon(true);
					viewer.animationName = anims[0];
				};

				const setAnimIcon = (playing) => {
					animIconPause.style.display = playing ? '' : 'none';
					animIconPlay.style.display = playing ? 'none' : '';
				};

				animPlayPause.addEventListener('click', () => {
					if (isPlaying) {
						viewer.pause();
						isPlaying = false;
					} else {
						viewer.play();
						isPlaying = true;
					}
					setAnimIcon(isPlaying);
				});

				animSelect.addEventListener('change', () => {
					const anims = viewer.availableAnimations || [];
					viewer.animationName = anims[animSelect.value] ?? anims[0];
					if (!isPlaying) {
						viewer.play();
						isPlaying = true;
						setAnimIcon(true);
					}
				});

				/* ── model info ── */
				const formatBytes = (b) => {
					if (!b) return '—';
					if (b < 1024) return b + ' B';
					if (b < 1048576) return (b / 1024).toFixed(1) + ' KB';
					return (b / 1048576).toFixed(2) + ' MB';
				};

				const updateInfo = () => {
					const anims = viewer.availableAnimations || [];
					infoFilename.textContent = currentFilename;
					infoSize.textContent = formatBytes(currentFileSize);
					infoAnims.textContent = anims.length === 0 ? 'None' : anims.length;
					infoSection.style.display = '';
				};

				/* ── embed code ── */
				const updateEmbed = () => {
					if (currentIsLocal) {
						embedCode.value = `<script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js" integrity="sha384-sr9b4Ux0WhAUGclJ0ym0FSY2zSOMmNSn0bP/SA0e6bNCrpn/5W3QL8mm+LdlQMKw" crossorigin="anonymous"><\/script>\n<model-viewer\n  src="YOUR_HOSTED_MODEL_URL.glb"\n  camera-controls\n  auto-rotate\n  autoplay\n  style="width:500px;height:500px"\n></model-viewer>`;
						embedNote.textContent =
							'Host your .glb file on a server and replace the src URL above.';
					} else {
						const src = `${window.location.origin}${DEFAULT_SRC}`;
						embedCode.value = `<script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js" integrity="sha384-sr9b4Ux0WhAUGclJ0ym0FSY2zSOMmNSn0bP/SA0e6bNCrpn/5W3QL8mm+LdlQMKw" crossorigin="anonymous"><\/script>\n<model-viewer\n  src="${src}"\n  camera-controls\n  auto-rotate\n  autoplay\n  style="width:500px;height:500px"\n></model-viewer>`;
						embedNote.textContent = '';
					}
				};

				updateEmbed();

				/* ── copy embed ── */
				copyEmbed.addEventListener('click', async () => {
					try {
						await navigator.clipboard.writeText(embedCode.value);
					} catch {
						embedCode.select();
						document.execCommand('copy');
					}
					setStatus('Snippet copied.', 'ok');
				});

				/* ── reset ── */
				resetBtn.addEventListener('click', () => {
					upload.value = '';
					animSection.style.display = 'none';
					dropOverlay.classList.remove('hidden');
					fileChip.textContent = DEFAULT_NAME;
					loadModel(DEFAULT_SRC, DEFAULT_NAME, null);
				});

				/* ── file upload ── */
				const handleFile = (file) => {
					if (!file) return;
					if (!file.name.toLowerCase().endsWith('.glb')) {
						setStatus('Only .glb files are supported.', 'err');
						return;
					}
					const url = URL.createObjectURL(file);
					loadModel(url, file.name, file.size);
				};

				upload.addEventListener('change', (e) => handleFile(e.target.files[0]));

				/* ── drag & drop ── */
				dropzone.addEventListener('dragover', (e) => {
					e.preventDefault();
					dropzone.classList.add('drag-over');
				});
				dropzone.addEventListener('dragleave', () =>
					dropzone.classList.remove('drag-over'),
				);
				dropzone.addEventListener('drop', (e) => {
					e.preventDefault();
					dropzone.classList.remove('drag-over');
					handleFile(e.dataTransfer.files[0]);
				});

				/* ── environment pills ── */
				document.querySelectorAll('[data-env]').forEach((btn) => {
					btn.addEventListener('click', () => {
						document
							.querySelectorAll('[data-env]')
							.forEach((b) => b.classList.remove('active'));
						btn.classList.add('active');
						viewer.setAttribute('environment-image', btn.dataset.env || 'neutral');
						if (btn.dataset.env === '') {
							viewer.setAttribute('environment-image', 'neutral');
							viewer.setAttribute('exposure', '0.35');
							exposureSlider.value = '0.35';
							exposureVal.textContent = '0.35';
						}
					});
				});

				/* ── background pills ── */
				document.querySelectorAll('[data-bg]').forEach((btn) => {
					btn.addEventListener('click', () => {
						document
							.querySelectorAll('[data-bg]')
							.forEach((b) => b.classList.remove('active'));
						btn.classList.add('active');
						document.querySelector('.pg-viewer-wrap').style.background =
							`radial-gradient(ellipse at 50% 30%, rgba(255,255,255,0.03) 0%, transparent 65%), ${btn.dataset.bg}`;
					});
				});

				/* ── auto-rotate toggle ── */
				document.getElementById('toggle-rotate').addEventListener('change', function () {
					if (this.checked) viewer.setAttribute('auto-rotate', '');
					else viewer.removeAttribute('auto-rotate');
				});

				/* ── shadow toggle ── */
				document.getElementById('toggle-shadow').addEventListener('change', function () {
					viewer.setAttribute('shadow-intensity', this.checked ? '1' : '0');
				});

				/* ── exposure slider ── */
				exposureSlider.addEventListener('input', () => {
					const v = parseFloat(exposureSlider.value).toFixed(2);
					exposureVal.textContent = v;
					viewer.setAttribute('exposure', v);
				});

				/* ── initial load ── */
				showLoading();
				viewer.addEventListener('load', onModelLoad, { once: true });
			})();
		</script>

		<script src="/brand.js" defer></script>
	</body>
</html>
