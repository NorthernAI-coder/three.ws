		<script>
			/* three.ws theme boot — no-flash; runtime in /theme-switcher.js */ (function () {
				try {
					var m = localStorage.getItem('twx_theme');
					var l =
						m === 'auto'
							? window.matchMedia &&
								window.matchMedia('(prefers-color-scheme: light)').matches
							: m === 'light';
					document.documentElement.setAttribute('data-theme', l ? 'light' : 'dark');
				} catch (e) {
					document.documentElement.setAttribute('data-theme', 'dark');
				}
			})();
		</script>

	<body>
		<header><div id="nav-container"></div></header>
		<script src="/nav.js"></script>

		<main class="cv-container nwb">
			<nav class="cv-crumbs" aria-label="Breadcrumb">
				<a href="/markets">Markets</a><span class="sep">/</span><span class="here">News</span>
			</nav>

			<!-- Briefing masthead: title + date left, search/filters/AI right. -->
			<header class="nwb-head">
				<div class="nwb-head-id">
					<h1 class="cv-h1">Your briefing</h1>
					<p class="nwb-date" id="nwb-date"></p>
				</div>
				<div class="nwb-head-tools">
					<div class="cv-search nwb-search">
						<input
							id="nw-search"
							type="search"
							placeholder="Search news… (e.g., Ethereum ETF, DeFi hack)"
							aria-label="Search news"
							autocomplete="off"
						/>
					</div>
					<div class="nwb-controls">
						<select id="nw-lang" class="nw-select" aria-label="Filter by language">
							<option value="en">English</option>
						</select>
						<select id="nw-source" class="nw-select" aria-label="Filter by source">
							<option value="">All sources</option>
						</select>
						<a class="nwb-ask" href="/markets/digest">
							<svg viewBox="0 0 16 16" width="14" height="14" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><path d="M8 1.5c-3.6 0-6.5 2.5-6.5 5.6 0 1.8 1 3.4 2.5 4.4v3l2.8-1.6c.4.1.8.1 1.2.1 3.6 0 6.5-2.5 6.5-5.9S11.6 1.5 8 1.5z"/></svg>
							Ask AI about this
						</a>
					</div>
				</div>
			</header>

			<!-- Primary briefing tabs. Hydrated by src/markets-news.js. -->
			<div id="nw-tabs" class="nwb-tabs" role="group" aria-label="Briefing sections"></div>

			<!-- Full category picker, revealed by the "All" tab. -->
			<div id="nwb-cats" class="nw-tabs nwb-cats" role="group" aria-label="All news categories" hidden></div>

			<!-- Breaking-news ticker. Hidden until a story <45 min old exists. -->
			<div id="nwb-breaking" class="nwb-break" role="region" aria-label="Breaking news" hidden></div>

			<!-- Today's AI Briefing — narratives from /api/news/digest. -->
			<section id="nwb-brief" class="nwb-brief" aria-label="Today's AI briefing" hidden></section>

			<p id="nw-count" class="nw-count" role="status"></p>

			<!-- Top stories (hero + rail), trending narratives, saved stories, and
			     the latest grid all render inside. Hydrated by src/markets-news.js. -->
			<section id="nw-feed" class="cv-section nwb-feed" aria-label="News feed" aria-live="polite"></section>

			<div style="display: flex; justify-content: center; margin: 1.5rem 0 0">
				<button id="nw-more" class="cv-load-more" type="button" hidden>Load more stories</button>
			</div>

			<!-- Sibling market surfaces. -->
			<nav class="cv-tools" aria-label="Market tools" style="margin-top: 2rem">
				<a class="cv-pill" href="/markets">Markets Hub</a>
				<a class="cv-pill" href="/markets/news" aria-current="page">News</a>
				<a class="cv-pill" href="/markets/digest">Digest</a>
				<a class="cv-pill" href="/markets/archive">Archive</a>
				<a class="cv-pill" href="/coins">Coins</a>
				<a class="cv-pill" href="/heatmap">Heatmap</a>
				<a class="cv-pill" href="/screener">Screener</a>
				<a class="cv-pill" href="/fear-greed">Fear &amp; Greed</a>
				<a class="cv-pill" href="/gas">Gas</a>
			</nav>

			<!-- Archive cross-link. -->
			<section class="cv-section" aria-label="Historical archive">
				<div class="art-preview-note" style="margin-top: 1.25rem">
					<span aria-hidden="true">🗞</span>
					<span>
						Looking for older coverage? The
						<a href="/markets/archive">news archive</a> holds
						<strong>660,000+ articles back to September 2017</strong> — searchable by
						ticker, date, source, sentiment, and language.
					</span>
				</div>
			</section>
		</main>

		<script type="module" src="/src/markets-news.js"></script>
		<script src="/brand.js" defer></script>
		<div id="footer-container"></div>
		<script src="/footer.js"></script>
	</body>
</html>
