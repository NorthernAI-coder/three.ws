<head>
	<script>/* three.ws theme boot */(function(){try{var m=localStorage.getItem('twx_theme');var l=m==='auto'?(window.matchMedia&&window.matchMedia('(prefers-color-scheme: light)').matches):m==='light';document.documentElement.setAttribute('data-theme',l?'light':'dark');}catch(e){document.documentElement.setAttribute('data-theme','dark');}})();</script>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

	<meta property="og:type" content="website" />
	<meta property="og:site_name" content="three.ws" />
	<meta property="og:url" content="https://three.ws/irl" />
	<meta property="og:title" content="IRL · three.ws" />
	<meta property="og:description" content="Walk a 3D avatar in your real space. Camera AR passthrough, joystick movement, tap-to-place objects." />
	<meta property="og:image" content="https://three.ws/og-image.png" />

	<link rel="icon" href="/favicon.ico" sizes="any" />
	<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
	<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
	<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />

	<style>
		:root {
			--bg: #000000;
			--bg2: #0a0a0a;
			--text: #e8e8e8;
			--text-2: #888888;
			--text-3: #444444;
			--accent: #ffffff;
			--panel: rgba(255, 255, 255, 0.04);
			--border: rgba(255, 255, 255, 0.08);
			--border-hi: rgba(255, 255, 255, 0.22);
			--danger: #f87171;
			--green: #4ade80;
			--radius: 14px;
		}

		*, *::before, *::after { box-sizing: border-box; }

		html, body {
			margin: 0;
			padding: 0;
			width: 100%;
			height: 100%;
			overflow: hidden;
			background: var(--bg);
			color: var(--text);
			font-family: 'Inter', system-ui, -apple-system, sans-serif;
			-webkit-font-smoothing: antialiased;
			touch-action: none;
			overscroll-behavior: none;
		}

		/* ── Background ambient glow ─────────────────────────────── */
		.irl-bg {
			position: fixed;
			inset: 0;
			pointer-events: none;
			z-index: 0;
		}
		.irl-bg::before {
			content: '';
			position: absolute;
			inset: 0;
			background:
				radial-gradient(ellipse 80% 60% at 50% 0%, rgba(255,255,255,0.04) 0%, transparent 65%),
				radial-gradient(ellipse 60% 50% at 80% 80%, rgba(255,255,255,0.025) 0%, transparent 60%),
				radial-gradient(ellipse 50% 40% at 20% 70%, rgba(255,255,255,0.025) 0%, transparent 55%);
		}

		/* ── Camera feed ─────────────────────────────────────────── */
		#irl-camera {
			position: fixed;
			inset: 0;
			width: 100vw;
			height: 100vh;
			object-fit: cover;
			z-index: 1;
			display: none;
			background: #000;
		}
		body.is-ar #irl-camera { display: block; }

		/* ── Three.js canvas ─────────────────────────────────────── */
		#irl-canvas {
			position: fixed;
			inset: 0;
			width: 100vw;
			height: 100vh;
			z-index: 2;
			display: block;
			touch-action: none;
		}

		/* ── Top bar ─────────────────────────────────────────────── */
		.irl-topbar {
			position: fixed;
			top: 0;
			left: 0;
			right: 0;
			z-index: 10;
			display: flex;
			align-items: center;
			justify-content: space-between;
			padding-left: 16px;
			padding-right: 16px;
			padding-top: calc(env(safe-area-inset-top, 0px) + 14px);
			padding-bottom: 14px;
			background: linear-gradient(to bottom, rgba(0,0,0,0.85) 0%, transparent 100%);
		}

		.irl-back {
			display: inline-flex;
			align-items: center;
			gap: 6px;
			color: var(--text-2);
			text-decoration: none;
			font-size: 14px;
			font-weight: 500;
			transition: color 0.15s;
			padding: 6px 0;
		}
		.irl-back:hover { color: var(--text); }
		.irl-back svg { flex-shrink: 0; }

		.irl-topbar-center {
			position: absolute;
			left: 50%;
			transform: translateX(-50%);
			text-align: center;
			pointer-events: none;
		}
		.irl-badge {
			display: inline-flex;
			align-items: center;
			gap: 5px;
			font-size: 11px;
			font-weight: 600;
			letter-spacing: 0.08em;
			text-transform: uppercase;
			color: var(--accent);
			background: rgba(255,255,255,0.08);
			border: 1px solid rgba(255,255,255,0.2);
			border-radius: 999px;
			padding: 4px 10px;
			transition: border-color 0.3s;
		}
		body.is-ar .irl-badge { border-color: rgba(74,222,128,0.5); }
		.irl-badge-dot {
			width: 5px;
			height: 5px;
			border-radius: 50%;
			background: var(--text-2);
			transition: background 0.3s, box-shadow 0.3s;
		}
		body.is-ar .irl-badge-dot {
			background: var(--green);
			box-shadow: 0 0 6px var(--green);
			animation: irl-pulse 2s ease-in-out infinite;
		}
		@keyframes irl-pulse {
			0%, 100% { opacity: 1; transform: scale(1); }
			50%       { opacity: 0.5; transform: scale(0.7); }
		}

		.irl-share-btn {
			background: transparent;
			border: 1px solid var(--border);
			border-radius: 999px;
			color: var(--text-2);
			font-size: 13px;
			font-weight: 500;
			font-family: inherit;
			cursor: pointer;
			padding: 6px 14px;
			transition: border-color 0.15s, color 0.15s;
		}
		.irl-share-btn:hover { border-color: var(--text-3); color: var(--text); }

		/* ── Joystick ────────────────────────────────────────────── */
		#irl-joystick {
			position: fixed;
			z-index: 9;
			left: 0;
			bottom: 0;
			width: min(50vw, 220px);
			height: min(55vh, 360px);
			touch-action: none;
			pointer-events: auto;
		}
		@media (hover: hover) and (pointer: fine) {
			#irl-joystick {
				left: 24px;
				bottom: calc(200px + env(safe-area-inset-bottom, 0));
				width: 140px;
				height: 140px;
			}
		}

		/* ── Bottom panel ────────────────────────────────────────── */
		.irl-bottom {
			position: fixed;
			bottom: 0;
			left: 0;
			right: 0;
			z-index: 10;
			padding: 0 20px;
			padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 28px);
			background: linear-gradient(
				to top,
				rgba(0,0,0,0.95) 0%,
				rgba(0,0,0,0.75) 55%,
				transparent 100%
			);
			display: flex;
			flex-direction: column;
			align-items: center;
			gap: 10px;
			pointer-events: none;
		}
		.irl-bottom > * { pointer-events: auto; }

		.irl-avatar-name {
			font-size: 22px;
			font-weight: 700;
			letter-spacing: -0.02em;
			color: var(--text);
			text-align: center;
			margin: 0;
			line-height: 1.2;
			font-family: 'Space Grotesk', system-ui, sans-serif;
		}

		.irl-subtitle {
			font-size: 13px;
			color: var(--text-2);
			text-align: center;
			margin: 0;
			transition: opacity 0.3s;
		}

		.irl-status {
			font-size: 12.5px;
			color: var(--accent);
			text-align: center;
			height: 18px;
			display: flex;
			align-items: center;
			gap: 6px;
			opacity: 1;
			transition: opacity 0.3s;
		}
		.irl-status.is-hidden { opacity: 0; }
		.irl-status.is-error { color: var(--danger); }
		.irl-status-spinner {
			width: 13px;
			height: 13px;
			border-radius: 50%;
			border: 2px solid rgba(255,255,255,0.2);
			border-top-color: var(--accent);
			animation: irl-spin 0.7s linear infinite;
			flex-shrink: 0;
		}
		.irl-status-spinner.hidden { display: none; }
		@keyframes irl-spin { to { transform: rotate(360deg); } }

		/* Hero camera button */
		#irl-camera-btn {
			width: 100%;
			max-width: 380px;
			height: 60px;
			background: #ffffff;
			color: #000000;
			border: 0;
			border-radius: 18px;
			font-family: 'Space Grotesk', system-ui, sans-serif;
			font-size: 17px;
			font-weight: 700;
			letter-spacing: -0.01em;
			cursor: pointer;
			display: flex;
			align-items: center;
			justify-content: center;
			gap: 10px;
			transition: transform 0.12s, box-shadow 0.2s, opacity 0.15s, background 0.25s, color 0.25s;
			box-shadow: 0 8px 32px -8px rgba(255,255,255,0.2), 0 0 0 1px rgba(255,255,255,0.08) inset;
			position: relative;
			overflow: hidden;
		}
		#irl-camera-btn::after {
			content: '';
			position: absolute;
			inset: 0;
			background: linear-gradient(to bottom, rgba(255,255,255,0.12) 0%, transparent 50%);
			pointer-events: none;
		}
		#irl-camera-btn:hover:not(:disabled) {
			transform: translateY(-2px);
			box-shadow: 0 14px 40px -8px rgba(255,255,255,0.25), 0 0 0 1px rgba(255,255,255,0.1) inset;
		}
		#irl-camera-btn:active:not(:disabled) { transform: translateY(0); }
		#irl-camera-btn:disabled { opacity: 0.4; cursor: not-allowed; }
		#irl-camera-btn.is-active {
			background: rgba(74,222,128,0.15);
			color: var(--green);
			border: 1px solid rgba(74,222,128,0.45);
			box-shadow: 0 0 24px -8px rgba(74,222,128,0.3);
		}
		#irl-camera-btn svg { flex-shrink: 0; }

		/* Secondary row: place + clear */
		.irl-secondary-row {
			display: flex;
			align-items: center;
			gap: 10px;
			justify-content: center;
		}

		.irl-pill-btn {
			appearance: none;
			border: 1px solid var(--border);
			background: rgba(255,255,255,0.05);
			color: var(--text-2);
			font: inherit;
			font-size: 13px;
			font-weight: 600;
			padding: 9px 18px;
			border-radius: 999px;
			cursor: pointer;
			display: inline-flex;
			align-items: center;
			gap: 7px;
			transition: transform 0.1s, background 0.15s, border-color 0.15s, color 0.15s;
			-webkit-tap-highlight-color: transparent;
			white-space: nowrap;
			backdrop-filter: blur(8px);
			-webkit-backdrop-filter: blur(8px);
		}
		.irl-pill-btn:hover { color: var(--text); border-color: var(--border-hi); background: rgba(255,255,255,0.08); }
		.irl-pill-btn:active { transform: scale(0.95); }
		.irl-pill-btn.is-active {
			color: var(--text);
			border-color: rgba(255,255,255,0.35);
			background: rgba(255,255,255,0.1);
		}
		.irl-pill-btn:disabled { opacity: 0.35; cursor: not-allowed; }
		#irl-clear-btn { color: var(--danger); border-color: rgba(248,113,113,0.3); background: rgba(248,113,113,0.06); }
		#irl-clear-btn:hover { background: rgba(248,113,113,0.12); border-color: rgba(248,113,113,0.5); }
		#irl-lock-btn.is-active {
			color: #fbbf24;
			border-color: rgba(251,191,36,0.45);
			background: rgba(251,191,36,0.1);
		}
		#irl-lock-btn.is-active:hover { background: rgba(251,191,36,0.18); }
		/* Gyro pulse on lock icon when actively tracking orientation in AR */
		body.is-ar.is-locked #irl-lock-icon {
			animation: irl-gyro-pulse 2.5s ease-in-out infinite;
		}
		@keyframes irl-gyro-pulse {
			0%, 100% { opacity: 1; }
			50%       { opacity: 0.45; }
		}
		/* Hide joystick when avatar is locked (can't move) */
		body.is-ar.is-locked #irl-joystick { pointer-events: none; opacity: 0; transition: opacity 0.2s; }
		body.is-ar.is-locked #irl-keys { display: none; }

		/* Object picker — slides up above the secondary row */
		#irl-picker {
			display: flex;
			flex-direction: row;
			gap: 8px;
			justify-content: center;
			flex-wrap: wrap;
			max-width: 380px;
			animation: irl-slide-up 0.2s ease-out;
		}
		#irl-picker[hidden] { display: none; }
		@keyframes irl-slide-up {
			from { opacity: 0; transform: translateY(10px); }
			to   { opacity: 1; transform: translateY(0); }
		}
		.irl-obj-btn {
			appearance: none;
			border: 1px solid var(--border);
			background: rgba(255,255,255,0.05);
			color: var(--text-2);
			font: inherit;
			font-size: 12px;
			font-weight: 600;
			padding: 7px 14px;
			border-radius: 999px;
			cursor: pointer;
			display: inline-flex;
			align-items: center;
			gap: 6px;
			transition: transform 0.1s, background 0.15s, border-color 0.15s, color 0.15s;
			-webkit-tap-highlight-color: transparent;
			backdrop-filter: blur(8px);
			-webkit-backdrop-filter: blur(8px);
		}
		.irl-obj-btn:hover { color: var(--text); border-color: var(--border-hi); }
		.irl-obj-btn:active { transform: scale(0.95); }
		.irl-obj-btn.active {
			color: var(--text);
			border-color: rgba(255,255,255,0.4);
			background: rgba(255,255,255,0.12);
		}
		.irl-obj-swatch {
			width: 12px;
			height: 12px;
			border-radius: 50%;
			flex-shrink: 0;
		}

		/* Nearby agents badge — inline next to the IRL badge in the topbar */
		#irl-nearby-badge {
			display: inline-flex;
			align-items: center;
			margin-left: 6px;
			font-size: 10px;
			font-weight: 700;
			letter-spacing: 0.04em;
			color: var(--green);
			background: rgba(74,222,128,0.12);
			border: 1px solid rgba(74,222,128,0.35);
			border-radius: 999px;
			padding: 2px 8px;
			white-space: nowrap;
		}
		#irl-nearby-badge[hidden] { display: none; }

		/* Agent interaction bottom sheet */
		#irl-sheet {
			position: fixed;
			bottom: 0;
			left: 0;
			right: 0;
			z-index: 20;
			background: rgba(12,14,20,0.92);
			border-top: 1px solid rgba(255,255,255,0.10);
			border-radius: 18px 18px 0 0;
			padding: 20px 24px 36px;
			backdrop-filter: blur(20px);
			-webkit-backdrop-filter: blur(20px);
			transform: translateY(100%);
			transition: transform 0.28s cubic-bezier(0.32,0.72,0,1);
			pointer-events: none;
		}
		#irl-sheet.is-open {
			transform: translateY(0);
			pointer-events: all;
		}
		.irl-sheet-handle {
			width: 40px;
			height: 4px;
			border-radius: 2px;
			background: rgba(255,255,255,0.2);
			margin: 0 auto 16px;
		}
		.irl-sheet-header {
			display: flex;
			align-items: center;
			justify-content: space-between;
			gap: 12px;
			margin-bottom: 12px;
		}
		.irl-sheet-meta {
			display: flex;
			flex-direction: column;
			gap: 2px;
			flex: 1;
			min-width: 0;
		}
		.irl-sheet-title {
			font-size: 20px;
			font-weight: 700;
			color: #e5e7eb;
			white-space: nowrap;
			overflow: hidden;
			text-overflow: ellipsis;
		}
		#irl-sheet-dist {
			font-size: 13px;
			color: #6b7280;
			font-variant-numeric: tabular-nums;
		}
		#irl-sheet-caption {
			font-size: 14px;
			color: #9ca3af;
			margin-bottom: 14px;
			line-height: 1.5;
		}
		.irl-sheet-actions {
			display: flex;
			gap: 10px;
		}
		.irl-sheet-btn {
			flex: 1;
			padding: 12px 16px;
			border-radius: 12px;
			border: 1px solid rgba(255,255,255,0.12);
			background: rgba(255,255,255,0.06);
			color: #e5e7eb;
			font: inherit;
			font-size: 14px;
			font-weight: 600;
			cursor: pointer;
			transition: background 0.15s, border-color 0.15s;
		}
		.irl-sheet-btn:hover { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.22); }
		.irl-sheet-btn-primary { background: rgba(52,211,153,0.18); border-color: rgba(52,211,153,0.4); color: #34d399; }
		.irl-sheet-btn-primary:hover { background: rgba(52,211,153,0.28); }
		.irl-sheet-close {
			width: 32px;
			height: 32px;
			flex-shrink: 0;
			padding: 0;
			display: flex;
			align-items: center;
			justify-content: center;
			background: rgba(255,255,255,0.06);
			border: 1px solid rgba(255,255,255,0.12);
			border-radius: 50%;
			color: #6b7280;
			font: inherit;
			font-size: 16px;
			cursor: pointer;
			transition: color 0.15s, border-color 0.15s, background 0.15s;
		}
		.irl-sheet-close:hover { color: #e5e7eb; border-color: rgba(255,255,255,0.25); background: rgba(255,255,255,0.10); }

		/* 3D→2D agent labels (injected by JS per nearby pin) */
		.irl-agent-label {
			position: fixed;
			transform: translate(-50%, -100%);
			pointer-events: auto;
			cursor: pointer;
			z-index: 7;
			background: rgba(0,0,0,0.76);
			border: 1px solid rgba(136,187,255,0.42);
			border-radius: 9px;
			padding: 4px 10px;
			font-size: 12px;
			font-weight: 600;
			color: #88bbff;
			white-space: nowrap;
			backdrop-filter: blur(8px);
			-webkit-backdrop-filter: blur(8px);
			box-shadow: 0 0 10px rgba(136,187,255,0.15);
			animation: irl-label-in 0.22s ease-out;
		}
		@keyframes irl-label-in {
			from { opacity:0; transform: translate(-50%, -90%); }
			to   { opacity:1; transform: translate(-50%, -100%); }
		}
		.irl-agent-label-name { display: block; }

		/* Desktop keyboard hints */
		#irl-keys {
			position: fixed;
			z-index: 5;
			right: 16px;
			top: 50%;
			transform: translateY(-50%);
			display: flex;
			flex-direction: column;
			gap: 6px;
			align-items: flex-end;
			color: var(--text-2);
			font-size: 11px;
			pointer-events: none;
		}
		@media (hover: none), (max-width: 640px) { #irl-keys { display: none; } }
		.irl-key {
			display: inline-flex;
			align-items: center;
			gap: 4px;
			background: rgba(0,0,0,0.6);
			border: 1px solid var(--border);
			border-radius: 8px;
			padding: 4px 8px;
			backdrop-filter: blur(10px);
			-webkit-backdrop-filter: blur(10px);
		}
		.irl-key kbd {
			font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
			font-size: 10px;
			padding: 1px 5px;
			border-radius: 4px;
			background: rgba(255,255,255,0.08);
			border: 1px solid var(--border);
			color: var(--text);
		}
	</style>

	<link rel="canonical" href="https://three.ws/irl">
	<script type="application/ld+json">{"@context":"https://schema.org","@type":"WebPage","name":"IRL","description":"Place a 3D avatar in your real environment. Camera AR passthrough, joystick movement, and tap-to-place 3D objects on your floor.","url":"https://three.ws/irl","isPartOf":{"@type":"WebSite","name":"three.ws","url":"https://three.ws"}}</script>

<body>

<!-- Ambient background glow (behind everything) -->
<div class="irl-bg" aria-hidden="true"></div>

<!-- Camera passthrough (shown only in AR mode) -->
<video id="irl-camera" autoplay muted playsinline></video>

<!-- Three.js canvas -->
<canvas id="irl-canvas"></canvas>

<!-- Top bar -->
<header class="irl-topbar">
	<a class="irl-back" id="irl-back-link" href="/walk">
		<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="15 18 9 12 15 6"/></svg>
		Back
	</a>
	<div class="irl-topbar-center">
		<span class="irl-badge">
			<span class="irl-badge-dot"></span>
			IRL
		</span>
		<span id="irl-nearby-badge" hidden aria-live="polite"></span>
	</div>
	<button class="irl-share-btn" id="irl-share-btn" type="button" aria-label="Share">Share</button>
</header>

<!-- Joystick zone -->
<div id="irl-joystick"></div>

<!-- Desktop keyboard hints -->
<div id="irl-keys">
	<span class="irl-key"><kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> move</span>
	<span class="irl-key"><kbd>Shift</kbd> run</span>
	<span class="irl-key">drag to orbit</span>
</div>

<!-- Bottom panel -->
<footer class="irl-bottom">
	<h1 class="irl-avatar-name" id="irl-avatar-name">Loading…</h1>
	<p class="irl-subtitle" id="irl-subtitle">Turn on camera to place in your space</p>

	<p class="irl-status is-hidden" id="irl-status">
		<span class="irl-status-spinner hidden" id="irl-spinner" aria-hidden="true"></span>
		<span id="irl-status-text"></span>
	</p>

	<button id="irl-camera-btn" type="button" disabled aria-busy="true">
		<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M23 7 16 12l7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
		<span id="irl-camera-label">Camera AR</span>
	</button>

	<div class="irl-secondary-row">
		<button class="irl-pill-btn" id="irl-avatar-btn" type="button" aria-label="Change avatar">
			<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.582-7 8-7s8 3 8 7"/></svg>
			Avatar
		</button>
		<button class="irl-pill-btn" id="irl-lock-btn" type="button" aria-pressed="false" aria-label="Pin avatar in real space">
			<svg id="irl-lock-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
			<span class="irl-lock-label">Pin here</span>
		</button>
		<button class="irl-pill-btn" id="irl-place-btn" type="button" aria-pressed="false">
			<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
			Add object
		</button>
		<button class="irl-pill-btn" id="irl-clear-btn" type="button" hidden>
			<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/></svg>
			Clear
		</button>
	</div>

	<!-- Object picker (revealed when Add Object is active) -->
	<div id="irl-picker" hidden>
		<button class="irl-obj-btn" data-type="orb">
			<span class="irl-obj-swatch" style="background:rgba(136,187,255,0.9);box-shadow:0 0 6px rgba(136,187,255,0.6)"></span>
			Orb
		</button>
		<button class="irl-obj-btn" data-type="crate">
			<span class="irl-obj-swatch" style="background:#b07830;border-radius:2px"></span>
			Crate
		</button>
		<button class="irl-obj-btn" data-type="crystal">
			<span class="irl-obj-swatch" style="background:rgba(204,119,255,0.9);clip-path:polygon(50% 0%,100% 50%,50% 100%,0% 50%);border-radius:0"></span>
			Crystal
		</button>
		<button class="irl-obj-btn" data-type="ring">
			<span class="irl-obj-swatch" style="background:transparent;border:2px solid #ffd700;box-shadow:0 0 5px rgba(255,215,0,0.5)"></span>
			Ring
		</button>
		<button class="irl-obj-btn" data-type="pillar">
			<span class="irl-obj-swatch" style="background:#c8c0b8;border-radius:3px;width:7px;height:12px;margin:0 3px"></span>
			Pillar
		</button>
	</div>
</footer>

<!-- Agent interaction bottom sheet (slides up when user taps a nearby pin label) -->
<div id="irl-sheet" role="dialog" aria-modal="false" aria-label="Nearby agent">
	<div class="irl-sheet-handle" aria-hidden="true"></div>
	<div class="irl-sheet-header">
		<div class="irl-sheet-meta">
			<div class="irl-sheet-title" id="irl-sheet-name">Agent</div>
			<div class="irl-sheet-dist" id="irl-sheet-dist"></div>
		</div>
		<button class="irl-sheet-close" id="irl-sheet-close" type="button" aria-label="Close">×</button>
	</div>
	<p id="irl-sheet-caption" hidden></p>
	<div class="irl-sheet-actions">
		<button id="irl-sheet-pay" class="irl-sheet-btn irl-sheet-btn-primary" type="button" hidden>Pay via x402</button>
		<button id="irl-sheet-view" class="irl-sheet-btn irl-sheet-btn-secondary" type="button">View agent</button>
	</div>
</div>

<script type="module" src="/src/irl.js"></script>

<script>
document.getElementById('irl-share-btn').addEventListener('click', async () => {
	const url = location.href;
	if (navigator.share) {
		try { await navigator.share({ title: 'IRL · three.ws', url }); return; } catch {}
	}
	try {
		await navigator.clipboard.writeText(url);
		const btn = document.getElementById('irl-share-btn');
		const orig = btn.textContent;
		btn.textContent = 'Copied!';
		setTimeout(() => { btn.textContent = orig; }, 1800);
	} catch {}
});
</script>
</body>
</html>
