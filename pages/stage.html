		<style>
			:root {
				--stage-bg: #07060d;
				--stage-panel: rgba(20, 18, 34, 0.72);
				--stage-line: rgba(155, 107, 255, 0.18);
				--stage-accent: #9b6bff;
				--stage-accent-2: #32d6ff;
				--stage-gold: #ffd24a;
				--stage-text: #ece9ff;
				--stage-dim: #a59fc4;
			}
			* { box-sizing: border-box; }
			html, body { margin: 0; height: 100%; background: var(--stage-bg); color: var(--stage-text); font-family: 'Inter', system-ui, -apple-system, sans-serif; }
			a { color: var(--stage-accent-2); }
			#stage-app { min-height: 100vh; display: flex; flex-direction: column; }

			/* ── directory ─────────────────────────────────────────────────── */
			.stage-dir-head { padding: 48px 24px 8px; max-width: 1100px; margin: 0 auto; text-align: center; }
			.stage-dir-head h1 { font-size: clamp(28px, 5vw, 46px); margin: 0 0 8px; letter-spacing: -0.02em; background: linear-gradient(90deg, var(--stage-accent), var(--stage-accent-2)); -webkit-background-clip: text; background-clip: text; color: transparent; }
			.stage-dir-head p { color: var(--stage-dim); max-width: 560px; margin: 0 auto; line-height: 1.5; }
			.stage-dir { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 18px; padding: 28px 24px 64px; max-width: 1100px; margin: 0 auto; width: 100%; }
			.stage-card { display: flex; flex-direction: column; background: var(--stage-panel); border: 1px solid var(--stage-line); border-radius: 16px; overflow: hidden; text-decoration: none; color: inherit; transition: transform .18s ease, border-color .18s ease, box-shadow .18s ease; }
			.stage-card:hover { transform: translateY(-4px); border-color: var(--stage-accent); box-shadow: 0 12px 40px rgba(155,107,255,.18); }
			.stage-card:focus-visible { outline: 2px solid var(--stage-accent-2); outline-offset: 2px; }
			.stage-card.is-live { border-color: rgba(255,93,177,.5); }
			.stage-card-art { height: 150px; background: #15122a center/cover no-repeat; position: relative; display: flex; align-items: flex-start; }
			.stage-badge-live { margin: 10px; padding: 4px 10px; border-radius: 999px; background: #ff2d6f; color: #fff; font-size: 12px; font-weight: 700; letter-spacing: .04em; animation: pulse 1.6s infinite; }
			.stage-badge-soon { margin: 10px; padding: 4px 10px; border-radius: 999px; background: rgba(0,0,0,.5); color: var(--stage-dim); font-size: 12px; font-weight: 700; }
			.stage-card-body { padding: 14px 16px 18px; }
			.stage-card-body h3 { margin: 0 0 4px; font-size: 18px; }
			.stage-card-host { margin: 0 0 8px; color: var(--stage-dim); font-size: 13px; }
			.stage-card-meta { margin: 0; font-size: 13px; color: var(--stage-text); }
			.stage-card-skel .stage-card-art { background: linear-gradient(100deg, #15122a, #221d3c, #15122a); background-size: 200% 100%; animation: shimmer 1.4s infinite; }
			.sk-line { height: 12px; border-radius: 6px; background: #221d3c; margin: 8px 0; }
			.sk-line.short { width: 60%; }

			/* ── venue ─────────────────────────────────────────────────────── */
			.stage-venue { display: grid; grid-template-columns: 1fr 340px; gap: 0; flex: 1; min-height: 0; height: 100vh; }
			.stage-main { position: relative; min-width: 0; }
			.stage-3d { position: absolute; inset: 0; overflow: hidden; }
			#stage-canvas { width: 100%; height: 100%; display: block; }
			.stage-3d.no-webgl #stage-canvas { display: none; }
			.stage-3d-fallback { position: absolute; inset: 0; display: grid; place-items: center; padding: 24px; background: radial-gradient(circle at 50% 30%, #1a1330, #07060d); }
			.stage-fallback-card { max-width: 420px; text-align: center; }
			.stage-fallback-card h2 { margin: 0 0 8px; }
			.stage-fallback-card p { color: var(--stage-dim); line-height: 1.5; }

			.stage-overlay-top { position: absolute; top: 0; left: 0; right: 0; display: flex; justify-content: space-between; align-items: flex-start; padding: 18px 20px; background: linear-gradient(180deg, rgba(7,6,13,.7), transparent); pointer-events: none; }
			.stage-id h1 { margin: 4px 0 2px; font-size: clamp(18px, 2.6vw, 26px); }
			.stage-host { margin: 0; color: var(--stage-dim); font-size: 13px; }
			.stage-phase { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 700; letter-spacing: .06em; color: var(--stage-dim); text-transform: uppercase; }
			.stage-phase.is-live { color: #ff5db1; }
			.stage-phase.is-live .dot { width: 8px; height: 8px; border-radius: 50%; background: #ff2d6f; animation: pulse 1.4s infinite; }
			.stage-net-pill { pointer-events: auto; font-size: 11px; padding: 4px 9px; border-radius: 999px; border: 1px solid var(--stage-line); background: rgba(7,6,13,.6); }
			.stage-net-pill.ok { color: #6ee7a8; border-color: rgba(110,231,168,.4); }
			.stage-net-pill.warn { color: var(--stage-gold); }
			.stage-net-pill.bad { color: #ff7a90; }

			.stage-caption { position: absolute; left: 50%; bottom: 96px; transform: translateX(-50%); max-width: min(80%, 680px); padding: 12px 18px; border-radius: 14px; background: rgba(7,6,13,.78); border: 1px solid var(--stage-line); font-size: clamp(15px, 2vw, 19px); line-height: 1.4; text-align: center; backdrop-filter: blur(8px); transition: border-color .2s; }
			.stage-caption.speaking { border-color: var(--stage-accent); box-shadow: 0 0 30px rgba(155,107,255,.25); }

			.stage-overlay-bottom { position: absolute; left: 20px; bottom: 20px; display: flex; gap: 12px; align-items: center; }
			.stage-sound { background: var(--stage-accent); color: #fff; border: 0; border-radius: 999px; padding: 9px 16px; font-weight: 600; cursor: pointer; }
			.stage-dolly { display: flex; align-items: center; gap: 8px; background: rgba(7,6,13,.6); border: 1px solid var(--stage-line); border-radius: 999px; padding: 4px 10px; font-size: 11px; color: var(--stage-dim); text-transform: uppercase; letter-spacing: .05em; }
			.stage-dolly button { width: 28px; height: 28px; border-radius: 50%; border: 1px solid var(--stage-line); background: rgba(155,107,255,.12); color: var(--stage-text); font-size: 18px; line-height: 1; cursor: pointer; transition: background .15s; }
			.stage-dolly button:hover { background: rgba(155,107,255,.3); }
			.stage-dolly button:focus-visible { outline: 2px solid var(--stage-accent-2); }

			.stage-ticker { position: absolute; right: 18px; bottom: 80px; width: min(300px, 60%); display: flex; flex-direction: column; gap: 6px; pointer-events: none; }
			.stage-ticker-item { background: rgba(7,6,13,.78); border: 1px solid var(--stage-line); border-left: 3px solid var(--stage-accent); border-radius: 10px; padding: 8px 11px; font-size: 13px; pointer-events: auto; }
			.stage-ticker-item.tip { border-left-color: var(--stage-gold); }
			.stage-ticker-item a { color: var(--stage-text); text-decoration: none; }

			.stage-reactions { position: absolute; right: 18px; top: 72px; display: flex; flex-direction: column; gap: 8px; }
			.stage-react { width: 42px; height: 42px; border-radius: 50%; border: 1px solid var(--stage-line); background: rgba(20,18,34,.7); font-size: 20px; cursor: pointer; transition: transform .12s, background .15s; }
			.stage-react:hover { background: rgba(155,107,255,.25); transform: scale(1.1); }
			.stage-react:focus-visible { outline: 2px solid var(--stage-accent-2); }
			.stage-float-emoji { position: absolute; bottom: 40%; font-size: 30px; pointer-events: none; z-index: 5; }

			/* ── side panels ───────────────────────────────────────────────── */
			.stage-side { background: #0b0913; border-left: 1px solid var(--stage-line); overflow-y: auto; display: flex; flex-direction: column; gap: 14px; padding: 16px; }
			.stage-panel { background: var(--stage-panel); border: 1px solid var(--stage-line); border-radius: 14px; padding: 14px 16px; }
			.stage-panel h2 { margin: 0 0 12px; font-size: 15px; display: flex; justify-content: space-between; align-items: baseline; }
			.stage-coin { color: var(--stage-gold); font-weight: 700; }
			.stage-total { font-size: 12px; color: var(--stage-dim); font-weight: 500; }
			.stage-tip-presets { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-bottom: 10px; }
			.stage-tip-preset { padding: 8px 0; border-radius: 9px; border: 1px solid var(--stage-line); background: rgba(155,107,255,.08); color: var(--stage-text); font-size: 13px; font-weight: 600; cursor: pointer; transition: background .15s, border-color .15s; }
			.stage-tip-preset:hover { background: rgba(155,107,255,.2); }
			.stage-tip-preset.active { background: var(--stage-accent); border-color: var(--stage-accent); color: #fff; }
			.stage-tip-row { display: flex; gap: 8px; margin-bottom: 8px; }
			.stage-tip-row input, .stage-tip-msg, .stage-ask-row input { flex: 1; width: 100%; background: rgba(7,6,13,.6); border: 1px solid var(--stage-line); border-radius: 9px; padding: 9px 11px; color: var(--stage-text); font-size: 14px; }
			.stage-tip-msg { margin-bottom: 8px; }
			input:focus-visible { outline: 2px solid var(--stage-accent-2); outline-offset: 0; }
			.stage-tip-send, .stage-ask-row button { background: linear-gradient(90deg, var(--stage-accent), var(--stage-accent-2)); color: #fff; border: 0; border-radius: 9px; padding: 9px 18px; font-weight: 700; cursor: pointer; transition: opacity .15s, transform .1s; }
			.stage-tip-send:hover, .stage-ask-row button:hover { opacity: .92; }
			.stage-tip-send:active { transform: scale(.97); }
			.stage-tip-send:disabled { opacity: .5; cursor: progress; }
			.stage-tip-status, .stage-ask-status { margin: 8px 0 0; font-size: 12px; min-height: 16px; color: var(--stage-dim); }
			.stage-tip-status.ok { color: #6ee7a8; }
			.stage-tip-status.bad { color: #ff7a90; }
			.stage-tip-status.warn { color: var(--stage-gold); }

			.stage-leaderboard { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 6px; }
			.stage-leaderboard li { display: grid; grid-template-columns: 22px 1fr auto; align-items: center; gap: 8px; padding: 7px 9px; border-radius: 9px; background: rgba(7,6,13,.4); font-size: 13px; }
			.stage-leaderboard li.top { background: rgba(255,210,74,.12); border: 1px solid rgba(255,210,74,.3); }
			.stage-leaderboard .rank { color: var(--stage-dim); font-weight: 700; text-align: center; }
			.stage-leaderboard .who { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
			.stage-leaderboard .amt { color: var(--stage-gold); font-weight: 700; }
			.stage-lb-empty { color: var(--stage-dim); font-size: 13px; text-align: center; padding: 12px 0; }
			.stage-ask-row { display: flex; gap: 8px; }

			/* ── shared states ─────────────────────────────────────────────── */
			.stage-empty { text-align: center; padding: 80px 24px; max-width: 480px; margin: 0 auto; }
			.stage-empty h2 { margin: 0 0 8px; }
			.stage-empty p { color: var(--stage-dim); line-height: 1.5; }
			.stage-cta { display: inline-block; margin-top: 14px; background: var(--stage-accent); color: #fff; padding: 10px 20px; border-radius: 10px; text-decoration: none; border: 0; font: inherit; cursor: pointer; }

			@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .4; } }
			@keyframes shimmer { to { background-position: -200% 0; } }
			@media (prefers-reduced-motion: reduce) { * { animation: none !important; transition: none !important; } }

			@media (max-width: 880px) {
				.stage-venue { grid-template-columns: 1fr; height: auto; }
				.stage-main { height: 62vh; }
				.stage-side { border-left: 0; border-top: 1px solid var(--stage-line); }
				.stage-ticker { width: 50%; }
			}
		</style>
