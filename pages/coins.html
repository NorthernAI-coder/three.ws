<!doctype html>
<html lang="en" class="cv-page">
	<head>
		<script>/* three.ws theme boot — no-flash; runtime in /theme-switcher.js */(function(){try{var m=localStorage.getItem('twx_theme');var l=m==='auto'?(window.matchMedia&&window.matchMedia('(prefers-color-scheme: light)').matches):m==='light';document.documentElement.setAttribute('data-theme',l?'light':'dark');}catch(e){document.documentElement.setAttribute('data-theme','dark');}})();</script>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Markets · three.ws</title>
		<meta
			name="description"
			content="Live cryptocurrency market data — prices, trends, and a global overview for the top digital assets, with rich detail pages for every coin."
		/>
		<meta property="og:type" content="website" />
		<meta property="og:site_name" content="three.ws" />
		<meta property="og:url" content="https://three.ws/coins" />
		<meta property="og:title" content="Markets · three.ws" />
		<meta
			property="og:description"
			content="Live cryptocurrency market data — prices, trends, and a global overview for the top digital assets."
		/>
		<meta property="og:image" content="https://three.ws/og-image.png" />
		<meta property="og:image:width" content="1200" />
		<meta property="og:image:height" content="630" />
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:site" content="@trythreews" />
		<meta name="twitter:title" content="Markets · three.ws" />
		<meta
			name="twitter:description"
			content="Live cryptocurrency market data — prices, trends, and a global overview for the top digital assets."
		/>
		<meta name="twitter:image" content="https://three.ws/og-image.png" />
		<meta name="theme-color" content="#09090b" />
		<link rel="icon" href="/favicon.ico" sizes="any" />
		<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
		<link rel="apple-touch-icon" href="/apple-touch-icon.png" />
		<link rel="manifest" href="/site.webmanifest" />
		<link rel="stylesheet" href="/fonts/fonts.css" />
		<link rel="stylesheet" href="/nav.css" />
		<link rel="stylesheet" href="/src/coin-pages.css" />
		<link rel="stylesheet" href="/footer.css" />
		<link rel="canonical" href="https://three.ws/coins" />
	</head>
	<body>
		<header><div id="nav-container"></div></header>
		<script src="/nav.js"></script>

		<main class="cv-container">
			<h1 class="cv-h1">Markets</h1>
			<p class="cv-sub">
				Real-time cryptocurrency market data — prices, trends, and global overview for hundreds of
				digital assets.
			</p>

			<!-- Global stats bar. Hydrated by src/coins-index.js. -->
			<section id="cv-stats" class="cv-section" aria-label="Market statistics"></section>

			<!-- Toolbar: search type-ahead. -->
			<div class="cv-toolbar">
				<h2 class="cv-h2" style="margin: 0">Top Cryptocurrencies</h2>
				<div class="cv-search" id="cv-search">
					<span class="mag" aria-hidden="true">
						<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
					</span>
					<input
						id="cv-search-input"
						type="search"
						placeholder="Search coins…"
						autocomplete="off"
						spellcheck="false"
						role="combobox"
						aria-expanded="false"
						aria-controls="cv-search-pop"
						aria-label="Search coins by name or symbol"
					/>
					<div id="cv-search-pop" class="cv-search-pop" role="listbox" hidden></div>
				</div>
			</div>

			<!-- Top-100 table. Hydrated by src/coins-index.js. -->
			<section id="cv-market" aria-label="Top cryptocurrencies by market cap"></section>
		</main>

		<script type="module" src="/src/coins-index.js"></script>
		<script src="/brand.js" defer></script>
		<div id="footer-container"></div>
		<script src="/footer.js"></script>
	</body>
</html>
