<!doctype html>
<html lang="en">
	<head>
		<script>/* three.ws theme boot — no-flash; runtime in /theme-switcher.js */(function(){try{var m=localStorage.getItem('twx_theme');var l=m==='auto'?(window.matchMedia&&window.matchMedia('(prefers-color-scheme: light)').matches):m==='light';document.documentElement.setAttribute('data-theme',l?'light':'dark');}catch(e){document.documentElement.setAttribute('data-theme','dark');}})();</script>
		<meta charset="utf-8" />
		<title>Omniology Arena · three.ws</title>
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1, viewport-fit=cover"
		/>
		<meta
			name="description"
			content="The Omniology Arena — a live 3D venue on three.ws. Walk in as your avatar, meet other players in real time, and watch AI-agent contests unfold on the in-world screens."
		/>
		<meta name="theme-color" content="#060607" />

		<!--
			Multiplayer server URL — the deployed Colyseus host (Cloud Run). Local dev
			ignores this and uses ws://localhost:2567 automatically (see
			defaultServerUrl in src/game/community-net.js), so `npm run dev:walk-all`
			still works out of the box. Copied verbatim from pages/play.html.
		-->
		<meta name="game-server" content="wss://three-ws-multiplayer-93741856042.us-central1.run.app" />

		<!--
			Omniology service base URL — the live contest feed + entry-submission API
			(CONTRACTS §3). Empty until the partner endpoint is live; prompts 03/04 read
			it via src/game/arena/omniology-adapter.js (meta first, then VITE_OMNIOLOGY_BASE).
			Leaving it blank keeps the screens/desk in their designed empty states — never
			mock data — until the real base lands, which is a config-only change.
		-->
		<meta name="omniology-base" content="" />

		<link rel="icon" href="/favicon.ico" sizes="any" />
		<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
		<link rel="apple-touch-icon" href="/apple-touch-icon.png" />
		<link rel="manifest" href="/site.webmanifest" />

		<meta property="og:type" content="website" />
		<meta property="og:site_name" content="three.ws" />
		<meta property="og:title" content="Omniology Arena · three.ws" />
		<meta property="og:description" content="A live 3D venue on three.ws — walk in, meet other players in real time, and watch AI-agent contests on the in-world screens." />
		<meta property="og:url" content="https://three.ws/arena/omniology" />
		<meta property="og:image" content="https://three.ws/og-image.png" />
		<meta property="og:image:width" content="1200" />
		<meta property="og:image:height" content="630" />
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:site" content="@trythreews" />
		<meta name="twitter:title" content="Omniology Arena · three.ws" />
		<meta name="twitter:description" content="Step into the Omniology Arena — a live multiplayer 3D venue on three.ws." />
		<meta name="twitter:image" content="https://three.ws/og-image.png" />

		<!-- Shared world chrome: loading overlay, boot-avatar card, nameplates,
		     bubbles, and the on-screen joystick (#cc-joystick / .cc-joy-*). Reusing
		     /play's stylesheet keeps the arena visually consistent with the core
		     worlds and gives every presence label the same treatment. -->
		<link rel="stylesheet" href="/src/game/coincommunities.css" />
		<style>
			/* Arena-only chrome layered over the shared world styles. Kept tiny and
			   self-contained; the venue HUD (screens, entry desk) arrives in 02–04. */
			#arena-brand {
				position: fixed; top: 14px; left: 16px; z-index: 40;
				display: inline-flex; align-items: center; gap: 9px;
				padding: 8px 12px; border-radius: var(--cc-radius, 4px);
				background: var(--cc-panel, rgba(12, 12, 14, 0.78));
				border: 1px solid var(--cc-edge, rgba(255, 255, 255, 0.12));
				backdrop-filter: saturate(150%) blur(14px);
				-webkit-backdrop-filter: saturate(150%) blur(14px);
				color: var(--cc-text, #f5f5f6);
				font: 600 13px/1 "Inter", system-ui, sans-serif;
				letter-spacing: 0.04em; text-transform: uppercase;
				transition: border-color 0.18s ease, transform 0.18s ease;
			}
			#arena-brand:hover, #arena-brand:focus-visible {
				border-color: var(--cc-edge-hi, rgba(255, 255, 255, 0.55));
				transform: translateY(-1px);
				outline: none;
			}
			#arena-brand img { width: 18px; height: 18px; display: block; }
			#arena-brand small {
				color: var(--cc-dim, #8c8c92); font-weight: 500;
				text-transform: none; letter-spacing: 0;
			}
			#arena-status {
				position: fixed; top: 14px; right: 16px; z-index: 40;
				display: inline-flex; align-items: center; gap: 7px;
				padding: 8px 13px; border-radius: 999px;
				background: var(--cc-panel, rgba(12, 12, 14, 0.78));
				border: 1px solid var(--cc-edge, rgba(255, 255, 255, 0.12));
				backdrop-filter: saturate(150%) blur(14px);
				-webkit-backdrop-filter: saturate(150%) blur(14px);
				color: var(--cc-dim, #8c8c92);
				font: 600 11px/1 "Inter", system-ui, sans-serif;
				letter-spacing: 0.08em; text-transform: uppercase;
				cursor: default; user-select: none;
			}
			#arena-status[data-retry="1"] { cursor: pointer; }
			#arena-status .dot {
				width: 8px; height: 8px; border-radius: 50%;
				background: var(--cc-faint, #5a5a60);
				box-shadow: 0 0 0 0 rgba(255, 255, 255, 0);
				transition: background 0.2s ease, box-shadow 0.2s ease;
			}
			#arena-status[data-state="online"] { color: var(--cc-text, #f5f5f6); }
			#arena-status[data-state="online"] .dot {
				background: var(--cc-live, #fff);
				box-shadow: 0 0 10px rgba(255, 255, 255, 0.85);
				animation: arena-pulse 1.8s ease-in-out infinite;
			}
			#arena-status[data-state="connecting"] .dot { animation: arena-blink 1s ease-in-out infinite; }
			@keyframes arena-pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.55; } }
			@keyframes arena-blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.25; } }
			@media (prefers-reduced-motion: reduce) {
				#arena-status .dot { animation: none !important; }
			}
			@media (max-width: 560px) {
				#arena-brand small { display: none; }
			}
		</style>
	</head>
	<body>
		<div id="kx-loading">
			<div class="kx-loading-card">
				<img class="kx-loading-logo" src="/three.svg" alt="three.ws" width="38" height="38" />
				<div class="kx-loading-mark">OMNIOLOGY ARENA</div>
				<div class="kx-boot-stage">
					<canvas id="kx-boot-avatar" aria-hidden="true"></canvas>
					<div class="kx-boot-fallback" aria-hidden="true"></div>
				</div>
				<div class="kx-loading-sub">Entering the arena…</div>
				<div class="kx-boot-bar" role="status" aria-label="Loading"><span></span></div>
			</div>
		</div>

		<canvas id="kx-canvas"></canvas>

		<a id="arena-brand" href="/" aria-label="Back to three.ws">
			<img src="/three.svg" alt="" />
			Arena<small>Omniology</small>
		</a>
		<div id="arena-status" data-state="connecting" role="status" aria-live="polite">
			<span class="dot" aria-hidden="true"></span>
			<span class="label">Connecting</span>
		</div>

		<!-- On-screen / drag joystick mount (touch + mouse). Styled by coincommunities.css;
		     the thumb + base are created by the arena controller at runtime. -->
		<div id="cc-joystick" aria-hidden="true"></div>

		<script type="module" src="/src/game/boot-avatar.js"></script>
		<script type="module" src="/src/game/arena/omniology.js"></script>
</body>
</html>
