			}
			.mind-page-header .back {
				display: inline-flex; align-items: center; gap: 0.45rem; color: rgba(255, 255, 255, 0.7);

			#mind-root { flex: 1; min-height: 0; position: relative; }

			.mind-signin { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1rem; text-align: center; padding: 2rem; color: #e8edf7; font-family: system-ui, sans-serif; }
			.mind-signin a { display: inline-flex; align-items: center; gap: 0.5rem; border-radius: 10px; padding: 0.6rem 1.1rem; font-weight: 650; text-decoration: none; background: linear-gradient(135deg, #7aa2ff, #9d7aff); color: #06080f; }
