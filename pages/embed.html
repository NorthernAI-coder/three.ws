		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Embed editor — three.ws</title>
		<meta name="description" content="Embed a live 3D avatar on any website — static, idle, walking, or chat. Configure, preview, and copy the snippet." />
	<meta property="og:type" content="website" />
	<meta property="og:site_name" content="three.ws" />
	<meta property="og:url" content="https://three.ws/embed" />

		<style>
			html,
			body {
				margin: 0;
				padding: 0;
				height: 100%;
				background: #0d0d0d;
				color: #fff;
				font-family: system-ui, sans-serif;
			}
			#root {
				min-height: 100vh;
			}
		</style>
	</head>
	<body>
		<div id="root"></div>
		<script type="module">
			import { mountEmbedEditor } from '/src/editor/embed-editor.js';
			const q = new URL(location.href).searchParams;
			mountEmbedEditor(document.getElementById('root'), {
				mode: q.get('mode') || '',
				avatar: q.get('avatar') || q.get('id') || '',
				controls: q.get('controls') || '',
				env: q.get('env') || '',
				bg: q.get('bg') || '',
				width: q.get('width') || '',
				height: q.get('height') || '',
				autoplay: q.get('autoplay'),
			});
		</script>
	</body>
</html>
