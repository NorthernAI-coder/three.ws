		<script>/* three.ws theme boot — no-flash; runtime in /theme-switcher.js */(function(){try{var m=localStorage.getItem('twx_theme');var l=m==='auto'?(window.matchMedia&&window.matchMedia('(prefers-color-scheme: light)').matches):m==='light';document.documentElement.setAttribute('data-theme',l?'light':'dark');}catch(e){document.documentElement.setAttribute('data-theme','dark');}})();</script>

		<script>
			// Patch OG image to include avatar + handle from URL params so
			// shared links unfurl with the correct avatar thumbnail.
			(function() {
				var p = new URLSearchParams(location.search);
				var av = p.get('avatar') || '';
				var handle = p.get('handle') || '';
				if (av) {
					var q = new URLSearchParams();
					if (av) q.set('avatar', av);
					if (handle) q.set('handle', handle);
					var src = 'https://three.ws/api/walk-og?' + q;
					document.getElementById('og-image').content = src;
					document.getElementById('twitter-image').content = src;
				}
			})();
		</script>

		<style>
			:root {
				--bg: #0a0a0a;
				--panel: rgba(17, 17, 17, 0.72);
				--border: rgba(255, 255, 255, 0.08);
				--text: #fafafa;
				--text-2: #a1a1aa;
				--accent: #ffffff;
				--danger: #f87171;
			}

			html, body {
				margin: 0;
				padding: 0;
				width: 100%;
				height: 100%;
				overflow: hidden;
				background: #000;
				color: var(--text);
				font-family: 'Inter', system-ui, -apple-system, sans-serif;
				-webkit-font-smoothing: antialiased;
				touch-action: none;
				overscroll-behavior: none;
			}

			#walk-stage {
				position: fixed;
				inset: 0;
				background:
					radial-gradient(80% 60% at 50% 30%, #242424 0%, #0a0a0a 70%) #0a0a0a;
			}

			#walk-camera-feed {
				position: fixed;
				inset: 0;
				width: 100vw;
				height: 100vh;
				object-fit: cover;
				z-index: 1;
				display: none;
				background: #000;
			}
			#walk-stage.is-ar #walk-camera-feed { display: block; }
			#walk-stage.is-ar {
				background: transparent;
			}

			#walk-canvas {
				position: fixed;
				inset: 0;
				width: 100vw;
				height: 100vh;
				z-index: 2;
				display: block;
				/* Own every touch: orbit/pinch are handled in JS, so suppress the
				   browser's native pan + double-tap/pinch page zoom. touch-action
				   doesn't inherit, so the body rule above doesn't cover the canvas.
				   Joystick / buttons sit on the UI layer above this. */
				touch-action: none;
			}

			#walk-hud {
				position: fixed;
				top: calc(env(safe-area-inset-top, 0) + 56px);
				left: 0;
				right: 0;
				z-index: 4;
				display: flex;
				gap: 8px;
				align-items: flex-start;
				justify-content: space-between;
				padding: 14px 16px;
				pointer-events: none;
			}
			#walk-hud > * { pointer-events: auto; }

			.walk-card {
				background: var(--panel);
				border: 1px solid var(--border);
				border-radius: 12px;
				padding: 10px 12px;
				backdrop-filter: blur(10px);
				-webkit-backdrop-filter: blur(10px);
				font-size: 13px;
				line-height: 1.35;
				max-width: min(60vw, 320px);
			}
			.walk-card h1 {
				margin: 0 0 2px 0;
				font-size: 14px;
				font-weight: 600;
				letter-spacing: 0.01em;
			}
			.walk-card p {
				margin: 0;
				color: var(--text-2);
				font-size: 12px;
			}
			.walk-card a {
				color: var(--accent);
				text-decoration: none;
			}

			.walk-actions {
				display: flex;
				flex-direction: column;
				gap: 8px;
				align-items: flex-end;
			}

			.walk-btn {
				appearance: none;
				border: 1px solid var(--border);
				background: var(--panel);
				color: var(--text);
				font: inherit;
				font-size: 13px;
				font-weight: 500;
				padding: 8px 12px;
				border-radius: 999px;
				cursor: pointer;
				backdrop-filter: blur(10px);
				-webkit-backdrop-filter: blur(10px);
				display: inline-flex;
				align-items: center;
				gap: 6px;
				transition: transform 0.12s ease, background 0.12s ease;
			}
			.walk-btn:hover { background: rgba(34, 34, 34, 0.85); }
			.walk-btn:active { transform: scale(0.97); }
			.walk-btn[aria-pressed="true"] {
				background: rgba(255, 255, 255, 0.18);
				border-color: rgba(255, 255, 255, 0.45);
				color: #e0f2fe;
			}
			.walk-btn[disabled] { opacity: 0.5; cursor: not-allowed; }
			.walk-btn .dot {
				width: 6px;
				height: 6px;
				border-radius: 50%;
				background: var(--text-2);
			}
			.walk-btn[aria-pressed="true"] .dot {
				background: var(--accent);
				box-shadow: 0 0 8px var(--accent);
			}

			#walk-joystick,
			#walk-look-joystick {
				position: fixed;
				/* Above the bottom HUD (chat z8, status/record z6, emote z5) so a
				   touch inside a stick's 140px square always reaches nipplejs
				   instead of the chat input or status pill stacked over it. Stays
				   below real modals (avatar picker z10, zen z11, palettes z9998+). */
				z-index: 9;
				bottom: calc(28px + env(safe-area-inset-bottom, 0));
				width: 140px;
				height: 140px;
				touch-action: none;
				pointer-events: auto;
			}
			#walk-joystick { left: 24px; }
			/* Right-hand look stick — only on touch / narrow viewports, where the
			   desktop WASD + mouse-look hints (#walk-help) are hidden, so the two
			   never fight for the bottom-right corner. */
			#walk-look-joystick { right: 24px; display: none; }
			@media (hover: none), (max-width: 640px) {
				#walk-look-joystick { display: block; }
				/* Floating movement stick — the zone spans the lower-left so the
				   thumb summons the pad wherever it lands (nipplejs dynamic mode).
				   Sits BELOW the chat (z8) so the centre chat input stays tappable
				   where the two overlap; still above the canvas + emote bar. */
				#walk-joystick {
					left: 0;
					bottom: 0;
					width: min(50vw, 240px);
					height: min(55vh, 380px);
					z-index: 7;
				}
			}

			/* On-screen action cluster — stacked on the right edge above the look
			   stick. Touch only; on desktop these actions live on keys + the HUD. */
			#walk-touch-actions {
				position: fixed;
				z-index: 9;
				right: calc(20px + env(safe-area-inset-right, 0));
				bottom: calc(184px + env(safe-area-inset-bottom, 0));
				display: none;
				flex-direction: column;
				gap: 12px;
				align-items: center;
				pointer-events: auto;
			}
			@media (hover: none), (max-width: 640px) {
				#walk-touch-actions { display: flex; }
			}
			.walk-touch-btn {
				appearance: none;
				border: 1px solid var(--border);
				background: var(--panel);
				color: var(--text);
				border-radius: 50%;
				width: 52px;
				height: 52px;
				display: flex;
				align-items: center;
				justify-content: center;
				backdrop-filter: blur(10px);
				-webkit-backdrop-filter: blur(10px);
				touch-action: manipulation;
				-webkit-tap-highlight-color: transparent;
				transition: transform 0.08s ease, background 0.15s ease, border-color 0.15s ease;
			}
			.walk-touch-btn:active { transform: scale(0.92); background: rgba(255,255,255,0.12); }
			.walk-touch-btn.is-jump {
				width: 72px;
				height: 72px;
				border-color: var(--accent);
				background: color-mix(in srgb, var(--accent) 22%, var(--panel));
				color: #fff;
			}
			.walk-touch-btn.is-jump:active { background: color-mix(in srgb, var(--accent) 38%, var(--panel)); }

			#walk-status {
				position: fixed;
				z-index: 6;
				left: 50%;
				bottom: calc(24px + env(safe-area-inset-bottom, 0));
				transform: translateX(-50%);
				background: var(--panel);
				border: 1px solid var(--border);
				border-radius: 999px;
				padding: 8px 14px;
				font-size: 12px;
				color: var(--text-2);
				backdrop-filter: blur(10px);
				-webkit-backdrop-filter: blur(10px);
				pointer-events: none;
				transition: opacity 0.2s ease;
			}
			#walk-status.is-error { color: var(--danger); border-color: rgba(248, 113, 113, 0.5); }
			#walk-status.is-hidden { opacity: 0; }

			#walk-help {
				position: fixed;
				z-index: 5;
				right: 16px;
				bottom: calc(28px + env(safe-area-inset-bottom, 0));
				display: flex;
				flex-direction: column;
				gap: 6px;
				align-items: flex-end;
				color: var(--text-2);
				font-size: 11px;
				pointer-events: none;
			}
			.walk-key {
				display: inline-flex;
				align-items: center;
				gap: 4px;
				background: var(--panel);
				border: 1px solid var(--border);
				border-radius: 8px;
				padding: 4px 8px;
				backdrop-filter: blur(10px);
				-webkit-backdrop-filter: blur(10px);
			}
			.walk-key kbd {
				font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
				font-size: 10.5px;
				padding: 1px 5px;
				border-radius: 4px;
				background: rgba(255, 255, 255, 0.08);
				border: 1px solid var(--border);
				color: var(--text);
			}

			/* Hide help text on small/touch screens — joystick is enough.
			   Joystick stays visible on all devices: mouse-drag works on
			   desktop the same way touch does on mobile, and keeping the
			   element laid out from page load ensures nipplejs measures
			   its 140×140 zone correctly. */
			@media (hover: none), (max-width: 640px) {
				#walk-help { display: none; }
			}

			/* ── Multiplayer HUD ────────────────────────────────────────────── */
			#walk-online {
				appearance: none;
				border: 1px solid var(--border);
				background: var(--panel);
				color: var(--text);
				font: inherit;
				font-size: 12px;
				font-weight: 500;
				padding: 6px 10px;
				border-radius: 999px;
				cursor: default;
				backdrop-filter: blur(10px);
				-webkit-backdrop-filter: blur(10px);
				display: inline-flex;
				align-items: center;
				gap: 6px;
				transition: background 0.12s ease;
			}
			#walk-online .dot {
				width: 7px;
				height: 7px;
				border-radius: 50%;
				background: var(--text-2);
			}
			#walk-online[data-status="online"] .dot {
				background: #e8e8e8;
				box-shadow: 0 0 8px rgba(255, 255, 255, 0.5);
			}
			#walk-online[data-status="connecting"] .dot,
			#walk-online[data-status="offline"] .dot {
				background: #fbbf24;
			}
			#walk-online[data-status="unavailable"] {
				cursor: default;
			}
			#walk-online[data-status="unavailable"] .dot {
				background: var(--text-2);
			}
			#walk-online[data-status="failed"] {
				cursor: pointer;
				border-color: rgba(248, 113, 113, 0.5);
			}
			#walk-online[data-status="failed"] .dot {
				background: var(--danger);
			}
			#walk-online .count {
				color: var(--text-2);
				font-variant-numeric: tabular-nums;
				min-width: 1ch;
				text-align: right;
			}
			#walk-online[data-status="online"] .count { color: var(--text); }

			/* Floating name tag for remote players — positioned by walk.js
			   from world-space → screen-space each frame. Pointer-events
			   off so it never blocks the orbit drag. */
			.walk-remote-label {
				position: fixed;
				top: 0; left: 0;
				z-index: 3;
				background: rgba(10, 10, 10, 0.72);
				border: 1px solid var(--border);
				border-radius: 999px;
				padding: 3px 9px;
				font-size: 11px;
				font-weight: 500;
				color: var(--text);
				white-space: nowrap;
				pointer-events: none;
				transform: translate(-50%, -100%);
				backdrop-filter: blur(6px);
				-webkit-backdrop-filter: blur(6px);
				will-change: transform;
			}

			/* ── IRL AR mobile CTA ─────────────────────────────────────────
			   Hidden until walk.js detects a touch device with camera
			   support and the avatar has finished loading. Sells the
			   project's IRL-not-metaverse positioning: "your agent on
			   your real floor" instead of "explore a virtual world".
			*/
			#walk-ar-cta {
				position: fixed;
				z-index: 7;
				left: 50%;
				top: calc(env(safe-area-inset-top, 0) + 76px);
				transform: translateX(-50%) translateY(-6px);
				display: none;
				align-items: center;
				gap: 10px;
				padding: 10px 14px 10px 12px;
				background: linear-gradient(135deg, rgba(255, 255, 255, 0.92), rgba(255, 255, 255, 0.92));
				color: #101010;
				border: 1px solid rgba(255, 255, 255, 0.35);
				border-radius: 999px;
				font-size: 13px;
				font-weight: 600;
				cursor: pointer;
				box-shadow: 0 8px 28px rgba(0, 0, 0, 0.4);
				backdrop-filter: blur(10px);
				-webkit-backdrop-filter: blur(10px);
				opacity: 0;
				transition: opacity 0.25s ease, transform 0.25s ease;
				white-space: nowrap;
				max-width: calc(100vw - 32px);
			}
			#walk-ar-cta.is-visible {
				display: inline-flex;
				opacity: 1;
				transform: translateX(-50%) translateY(0);
			}
			#walk-ar-cta .pulse {
				width: 8px;
				height: 8px;
				border-radius: 50%;
				background: #f87171;
				box-shadow: 0 0 0 0 rgba(248, 113, 113, 0.6);
				animation: walk-cta-pulse 1.6s infinite;
			}
			@keyframes walk-cta-pulse {
				0%   { box-shadow: 0 0 0 0 rgba(248, 113, 113, 0.55); }
				70%  { box-shadow: 0 0 0 10px rgba(248, 113, 113, 0); }
				100% { box-shadow: 0 0 0 0 rgba(248, 113, 113, 0); }
			}
			#walk-ar-cta .dismiss {
				margin-left: 4px;
				padding: 2px 6px;
				font-size: 14px;
				line-height: 1;
				background: rgba(7, 17, 28, 0.18);
				border-radius: 999px;
				color: #101010;
				font-weight: 700;
			}

			/* ── Site header (glass overlay) ───────────────────────────── */
			/* The header is the shared site nav (public/nav.html + nav.css),
			   which styles and positions itself. This wrapper only carries the
			   class so zen mode can hide it (see body.is-zen rules below). */
			.walk-site-header { display: block; }

			/* ── Loading overlay ───────────────────────────────────────── */
			.walk-loading {
				position: fixed;
				inset: 0;
				z-index: 9;
				background: var(--bg);
				display: flex;
				align-items: center;
				justify-content: center;
				transition: opacity 0.4s ease;
			}
			.walk-loading.is-done {
				opacity: 0;
				pointer-events: none;
			}
			.walk-loading-inner {
				display: flex;
				flex-direction: column;
				align-items: center;
				gap: 20px;
			}
			.walk-loading-spinner {
				width: 40px;
				height: 40px;
				border: 2.5px solid rgba(255, 255, 255, 0.08);
				border-top-color: var(--accent);
				border-radius: 50%;
				animation: walk-spin 0.8s linear infinite;
			}
			@keyframes walk-spin { to { transform: rotate(360deg); } }
			.walk-loading-text {
				margin: 0;
				color: var(--text-2);
				font-size: 14px;
				font-weight: 500;
				letter-spacing: 0.02em;
			}

			/* ── Name input ────────────────────────────────────────────── */
			.walk-identity-row {
				margin-bottom: 4px;
			}
			.walk-name-input {
				background: transparent;
				border: none;
				border-bottom: 1.5px solid rgba(255, 255, 255, 0.12);
				color: var(--text);
				font: 600 15px/1.3 inherit;
				padding: 2px 0 4px;
				width: 100%;
				max-width: 180px;
				outline: none;
				transition: border-color 0.15s;
			}
			.walk-name-input:focus {
				border-color: var(--accent);
			}
			.walk-name-input::placeholder {
				color: var(--text-2);
				font-weight: 400;
			}

			/* ── Players panel ─────────────────────────────────────────── */
			.walk-players-panel {
				position: fixed;
				z-index: 6;
				top: calc(env(safe-area-inset-top, 0) + 68px);
				right: 16px;
				width: 220px;
				max-height: 60vh;
				background: var(--panel);
				border: 1px solid var(--border);
				border-radius: 12px;
				backdrop-filter: blur(12px);
				-webkit-backdrop-filter: blur(12px);
				overflow: hidden;
				animation: walk-panel-in 0.18s ease;
			}
			@keyframes walk-panel-in {
				from { opacity: 0; transform: translateY(-8px); }
				to { opacity: 1; transform: none; }
			}
			.walk-players-header {
				display: flex;
				align-items: center;
				justify-content: space-between;
				padding: 10px 14px;
				font-size: 12px;
				font-weight: 600;
				letter-spacing: 0.06em;
				text-transform: uppercase;
				color: var(--text-2);
				border-bottom: 1px solid var(--border);
			}
			.walk-players-header button {
				background: none;
				border: none;
				color: var(--text-2);
				cursor: pointer;
				font-size: 18px;
				line-height: 1;
				padding: 0 2px;
			}
			.walk-players-header button:hover { color: var(--text); }
			.walk-players-list {
				list-style: none;
				margin: 0;
				padding: 6px 0;
				overflow-y: auto;
				max-height: calc(60vh - 44px);
			}
			.walk-players-list li {
				display: flex;
				align-items: center;
				gap: 8px;
				padding: 7px 14px;
				font-size: 13px;
				color: var(--text);
			}
			.walk-players-list .player-dot {
				width: 8px;
				height: 8px;
				border-radius: 50%;
				flex-shrink: 0;
			}
			.walk-players-list .player-motion {
				margin-left: auto;
				font-size: 11px;
				color: var(--text-2);
			}
			.walk-players-list li.is-you {
				color: var(--accent);
			}

			/* ── Emote tray ────────────────────────────────────────────── */
			.walk-emote-tray {
				position: fixed;
				z-index: 5;
				right: 16px;
				bottom: calc(28px + env(safe-area-inset-bottom, 0));
				display: flex;
				flex-direction: column;
				gap: 6px;
				align-items: flex-end;
			}
			.walk-emote-btn {
				appearance: none;
				width: 44px;
				height: 44px;
				border-radius: 50%;
				border: 1px solid var(--border);
				background: var(--panel);
				backdrop-filter: blur(10px);
				-webkit-backdrop-filter: blur(10px);
				cursor: pointer;
				font-size: 20px;
				display: flex;
				align-items: center;
				justify-content: center;
				transition: transform 0.1s, border-color 0.1s, background 0.1s;
				position: relative;
			}
			.walk-emote-btn:hover {
				border-color: rgba(255, 255, 255, 0.2);
				background: rgba(34, 34, 34, 0.85);

					<svg viewBox="0 0 16 16" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="8" r="3"/><path d="M5 3.5h6l1 1.5h1.5a1 1 0 0 1 1 1V12a1 1 0 0 1-1 1H1.5a1 1 0 0 1-1-1V6a1 1 0 0 1 1-1H3z"/></svg>
				</button>
				<button type="button" class="walk-touch-btn" id="walk-touch-gesture" aria-label="Gestures">
					<svg viewBox="0 0 16 16" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 8V3.2a1.2 1.2 0 0 1 2.4 0V7m0-.5a1.2 1.2 0 0 1 2.4 0V8m0-.8a1.2 1.2 0 0 1 2.4 0v3.2c0 2-1.6 3.6-3.6 3.6H8.4c-1.2 0-2-.5-2.7-1.4L3.3 11a1.2 1.2 0 0 1 1.8-1.5L6 10.4"/></svg>
				</button>
				<button type="button" class="walk-touch-btn is-jump" id="walk-touch-jump" aria-label="Jump">
					<svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 4l5 6h-3v6h-4v-6H7z"/></svg>
				</button>
			</div>

			<div id="walk-help" aria-hidden="true">
				<span class="walk-key"><kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> move</span>
				<span class="walk-key"><kbd>shift</kbd> run</span>
				<span class="walk-key"><kbd>space</kbd> jump</span>
				<span class="walk-key"><kbd>C</kbd> camera</span>
				<span class="walk-key"><kbd>G</kbd> gestures</span>
				<span class="walk-key"><kbd>V</kbd> scene</span>
				<span class="walk-key"><kbd>M</kbd> map</span>
				<span class="walk-key"><kbd>Z</kbd> hide UI</span>
				<span class="walk-key"><kbd>H</kbd> help</span>
			</div>

			<div id="walk-status">loading avatar…</div>
		</div>
