<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="/favicon.ico" sizes="any" />
		<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
		<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
		<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
		<link rel="apple-touch-icon" href="/apple-touch-icon.png" />
		<link rel="manifest" href="/site.webmanifest" />
		<title>Bounties · three.ws</title>
		<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
		<meta
			name="description"
			content="Browse live pump.fun GO bounties — rewards, submissions, and on-chain escrow — on three.ws."
		/>
		<meta name="theme-color" content="#0a0a0f" />
		<meta property="og:type" content="website" />
		<meta property="og:site_name" content="three.ws" />
		<meta property="og:title" content="Bounties · three.ws" />
		<meta
			property="og:description"
			content="Live pump.fun GO bounties — rewards, submissions, on-chain escrow."
		/>
		<meta property="og:url" content="https://three.ws/bounties" />
		<meta property="og:image" content="https://three.ws/og-image.png" />
		<meta property="og:image:width" content="1200" />
		<meta property="og:image:height" content="630" />
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:site" content="@trythreews" />
		<meta name="twitter:title" content="Bounties · three.ws" />
		<meta name="twitter:description" content="Live pump.fun GO bounties — rewards, submissions, on-chain escrow." />
		<meta name="twitter:image" content="https://three.ws/og-image.png" />
		<link rel="stylesheet" href="/pump-bounties.css" />
	</head>
	<body>
		<header class="topbar">
			<a href="/" class="brand">
				<span class="dot"></span>
				three.ws
				<span class="badge-go">Bounties</span>
			</a>
			<div class="topbar-right">
				<a href="/go" class="btn btn-ghost btn-sm">$THREE board</a>
				<a
					href="https://pump.fun/go/bounties"
					target="_blank"
					rel="noopener noreferrer"
					class="btn btn-primary btn-sm"
					>Open on pump.fun ↗</a
				>
			</div>
		</header>

		<main class="wrap">
			<div class="page-head">
				<h1>Bounty Board <span class="src-tag">Live · pump.fun GO</span></h1>
				<p>
					Every open bounty on pump.fun GO — task, reward, submissions, and the on-chain
					escrow backing it. Read-only and live; click any bounty for the full brief and
					proof feed.
				</p>
			</div>

			<div class="stats" id="stats" aria-label="Board totals">
				<div class="stat">
					<span class="stat-n skeleton" id="s-count">—</span
					><span class="stat-l">Live bounties</span>
				</div>
				<div class="stat">
					<span class="stat-n skeleton" id="s-usd">—</span
					><span class="stat-l">In rewards</span>
				</div>
				<div class="stat">
					<span class="stat-n skeleton" id="s-subs">—</span
					><span class="stat-l">Submissions</span>
				</div>
			</div>

			<div class="controls">
				<label class="search" for="q">
					<svg
						class="search-ico"
						viewBox="0 0 20 20"
						fill="none"
						stroke="currentColor"
						stroke-width="1.8"
						aria-hidden="true"
					>
						<circle cx="9" cy="9" r="6" />
						<path d="M14 14l4 4" stroke-linecap="round" />
					</svg>
					<input
						id="q"
						type="search"
						placeholder="Search title, brief, or creator…"
						autocomplete="off"
						spellcheck="false"
						aria-label="Search bounties"
					/>
					<button
						id="q-clear"
						class="q-clear"
						type="button"
						aria-label="Clear search"
						hidden
					>
						×
					</button>
				</label>
				<div class="seg" id="sort-seg" role="tablist" aria-label="Sort bounties">
					<button data-sort="reward" class="active">Top reward</button>
					<button data-sort="newest">Newest</button>
					<button data-sort="submissions">Most subs</button>
					<button data-sort="likes">Most liked</button>
				</div>
				<button id="refresh-btn" class="btn btn-ghost btn-sm" aria-label="Refresh">
					↻ Refresh
				</button>
			</div>

			<div class="result-meta" id="result-meta" hidden></div>

			<div class="grid" id="grid"></div>
		</main>

		<script type="module" src="/src/bounties.js"></script>
	</body>
</html>
