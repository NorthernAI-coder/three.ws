<!DOCTYPE html>
<html lang="en">
<head>
	<script>/* three.ws theme boot — no-flash; runtime in /theme-switcher.js */(function(){try{var m=localStorage.getItem('twx_theme');var l=m==='auto'?(window.matchMedia&&window.matchMedia('(prefers-color-scheme: light)').matches):m==='light';document.documentElement.setAttribute('data-theme',l?'light':'dark');}catch(e){document.documentElement.setAttribute('data-theme','dark');}})();</script>
	<meta charset="UTF-8">
		<link rel="icon" href="/favicon.ico" sizes="any" />
		<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
		<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
		<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
		<link rel="apple-touch-icon" href="/apple-touch-icon.png" />
		<link rel="manifest" href="/site.webmanifest" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>3D-Agent · Pump.fun Visualizer</title>
	<meta name="description" content="A real-time 3D visualization of trending tokens on Pump.fun. Each sphere is a live coin, sized by market cap.">
	<link rel="canonical" href="https://three.ws/pump-visualizer">
	<link rel="stylesheet" href="/style.css">
	<link rel="stylesheet" href="/nav.css" />
	<link rel="stylesheet" href="/mobile.css" />
	<style>
		:root {
			--vz-bg: #060606;
			--vz-panel: rgba(10, 10, 10, 0.88);
			--vz-border: rgba(255, 255, 255, 0.10);
			--vz-text: #e8e8e8;
			--vz-muted: #888888;
			--vz-accent: #ffffff;
			--vz-green: #34d399;
			--vz-red: #f87171;
		}
		html, body { background: var(--vz-bg); color: var(--vz-text); overflow: hidden; height: 100%; }
		body { margin: 0; }
		.site-header { position: relative; z-index: 20; background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); }

		#vz-stage {
			position: fixed;
			inset: 0;
			z-index: 0;
		}
		#vz-canvas-host {
			position: absolute;
			inset: 0;
		}
		#vz-canvas-host canvas {
			display: block;
			width: 100% !important;
			height: 100% !important;
			cursor: grab;
		}
		#vz-canvas-host canvas:active { cursor: grabbing; }
		#vz-canvas-host.is-pointing canvas { cursor: pointer; }

		.vz-overlay {
			position: absolute;
			pointer-events: none;
			z-index: 10;
		}
		.vz-overlay > * { pointer-events: auto; }

		/* ── Top status bar ───────────────────────────── */
		.vz-status {
			top: calc(var(--header-h, 3.5rem) + 12px);
			left: 16px;
			display: flex;
			align-items: center;
			gap: 10px;
			background: var(--vz-panel);
			border: 1px solid var(--vz-border);
			border-radius: 10px;
			padding: 8px 14px;
			font-family: var(--font-mono);
			font-size: 12px;
			letter-spacing: 0.04em;
			color: var(--vz-text);
		}
		.vz-status .dot {
			width: 8px; height: 8px; border-radius: 50%;
			background: #555; box-shadow: 0 0 8px rgba(0,0,0,0.4);
		}
		.vz-status[data-state="loading"] .dot { background: #f59e0b; animation: vzPulse 1.2s ease-in-out infinite; }
		.vz-status[data-state="ready"] .dot { background: var(--vz-green); box-shadow: 0 0 10px rgba(52, 211, 153, 0.7); }
		.vz-status[data-state="error"] .dot { background: var(--vz-red); }
		@keyframes vzPulse {
			0%, 100% { opacity: 0.4; }
			50% { opacity: 1; }
		}
		.vz-status button {
			background: transparent;
			border: 1px solid var(--vz-border);
			color: var(--vz-text);
			border-radius: 6px;
			padding: 4px 10px;
			font: inherit;
			cursor: pointer;
			margin-left: 4px;
		}
		.vz-status button:hover { background: var(--accent-soft); }
		.vz-status button:disabled { opacity: 0.5; cursor: not-allowed; }
		.vz-status .sep { width: 1px; height: 14px; background: rgba(255,255,255,0.1); margin: 0 4px; }
		.vz-status .stat { color: var(--vz-muted); display: flex; align-items: center; gap: 6px; }
		.vz-status .stat b { color: var(--vz-text); font-weight: 600; }
		.vz-status .countdown {
			color: var(--vz-muted); font-variant-numeric: tabular-nums;
			min-width: 28px; text-align: right;
		}

		/* ── Controls panel (search + sort) ──────────────── */
		.vz-controls {
			top: calc(var(--header-h, 3.5rem) + 12px);
			left: 50%;
			transform: translateX(-50%);
			display: flex;
			gap: 8px;
			align-items: center;
			flex-wrap: wrap;
			justify-content: center;
			max-width: calc(100vw - 32px);
			background: var(--vz-panel);
			border: 1px solid var(--vz-border);
			border-radius: 10px;
			padding: 6px;
			font-family: var(--font-mono);
			font-size: 12px;
		}
		.vz-search {
			position: relative;
			display: flex;
			align-items: center;
		}
		.vz-search input {
			background: rgba(0,0,0,0.4);
			border: 1px solid rgba(255,255,255,0.08);
			color: var(--vz-text);
			border-radius: 6px;
			padding: 6px 10px 6px 28px;
			font: inherit;
			width: 180px;
			outline: none;
			transition: border-color 0.15s, width 0.2s;
		}
		.vz-search input:focus {
			border-color: var(--vz-accent);
			width: 220px;
		}
		.vz-search input::placeholder { color: var(--vz-muted); }
		.vz-search::before {
			content: '';
			position: absolute;
			left: 10px; top: 50%;
			width: 12px; height: 12px;
			border: 1.5px solid var(--vz-muted);
			border-radius: 50%;
			transform: translateY(-65%);
			pointer-events: none;
		}
		.vz-search::after {
			content: '';
			position: absolute;
			left: 19px; top: 50%;
			width: 6px; height: 1.5px;
			background: var(--vz-muted);
			transform: translateY(2px) rotate(45deg);
			pointer-events: none;
		}
		.vz-mode {
			display: flex;
			gap: 0;
			padding: 2px;
			border-radius: 8px;
			background: rgba(0,0,0,0.35);
			border: 1px solid rgba(255,255,255,0.06);
			margin-right: 2px;
		}
		.vz-mode button {
			background: transparent;
			border: 1px solid transparent;
			color: var(--vz-muted);
			border-radius: 6px;
			padding: 5px 11px;
			font: inherit;
			cursor: pointer;
			letter-spacing: 0.06em;
			text-transform: uppercase;
			font-size: 10px;
			font-weight: 600;
			display: inline-flex;
			align-items: center;
			gap: 5px;
		}
		.vz-mode button:hover { color: var(--vz-text); }
		.vz-mode button.is-active {
			background: rgba(255, 255, 255, 0.22);
			color: var(--vz-text);
			border-color: var(--vz-border);
		}
		.vz-mode button[data-mode="feed"] .live-dot {
			width: 6px; height: 6px; border-radius: 50%;
			background: var(--vz-red);
			box-shadow: 0 0 6px rgba(248, 113, 113, 0.85);
		}
		.vz-mode button[data-mode="feed"].is-active {
			background: rgba(248, 113, 113, 0.18);
			color: var(--vz-text);
			border-color: rgba(248, 113, 113, 0.45);
		}
		.vz-mode button[data-mode="feed"].is-active .live-dot {
			animation: vzPulse 1.2s ease-in-out infinite;
		}
		.vz-mode button[data-mode="migrations"] .live-dot {
			width: 6px; height: 6px; border-radius: 50%;
			background: var(--vz-green);
			box-shadow: 0 0 6px rgba(52, 211, 153, 0.85);
		}
		.vz-mode button[data-mode="migrations"].is-active {
			background: rgba(52, 211, 153, 0.18);
			color: var(--vz-text);
			border-color: rgba(52, 211, 153, 0.45);
		}
		.vz-mode button[data-mode="migrations"].is-active .live-dot {
			animation: vzPulse 1.2s ease-in-out infinite;
		}
		.vz-sort {
			display: flex;
			gap: 2px;
			border-left: 1px solid rgba(255,255,255,0.08);
			padding-left: 8px;
			margin-left: 2px;
		}
		.vz-controls[data-mode="feed"] .vz-sort { display: none; }
		.vz-controls[data-mode="migrations"] .vz-sort { display: none; }
		.vz-status[data-mode="feed"] #vz-refresh { display: none; }
		.vz-status[data-mode="migrations"] #vz-refresh { display: none; }
		.vz-status[data-mode="feed"][data-state="ready"] .dot { background: var(--vz-red); box-shadow: 0 0 10px rgba(248,113,113,0.7); animation: vzPulse 1.2s ease-in-out infinite; }
		.vz-status[data-mode="migrations"][data-state="ready"] .dot { background: var(--vz-green); box-shadow: 0 0 10px rgba(52,211,153,0.7); animation: vzPulse 1.2s ease-in-out infinite; }
		.vz-status[data-mode="feed"] #vz-stat-mcap-wrap { display: none !important; }
		.vz-status[data-mode="migrations"] #vz-stat-mcap-wrap { display: none !important; }
		.vz-status[data-mode="trending"] #vz-stat-rate-wrap { display: none !important; }
		.vz-sort button {
			background: transparent;
			border: 1px solid transparent;
			color: var(--vz-muted);
			border-radius: 6px;
			padding: 5px 10px;
			font: inherit;
			cursor: pointer;
			letter-spacing: 0.04em;
			text-transform: uppercase;
			font-size: 10px;
		}
		.vz-sort button:hover { color: var(--vz-text); }
		.vz-sort button.is-active {
			background: rgba(255, 255, 255, 0.18);
			border-color: var(--vz-border);
			color: var(--vz-text);
		}

		/* ── Cross-links to sibling launchpad surfaces ──── */
		.vz-links {
			display: flex;
			gap: 12px;
			align-items: center;
			border-left: 1px solid rgba(255, 255, 255, 0.08);
			padding-left: 8px;
			margin-left: 2px;
		}
		.vz-links a {
			color: var(--vz-muted);
			text-decoration: none;
			font-size: 10px;
			letter-spacing: 0.04em;
			text-transform: uppercase;
			white-space: nowrap;
			transition: color 0.15s;
		}
		.vz-links a:hover { color: var(--vz-text); }
		.vz-links a:focus-visible {
			outline: 1px solid var(--vz-accent);
			outline-offset: 2px;
			border-radius: 4px;
		}

		/* ── Help / hint ──────────────────────────────── */
		.vz-hint {
			top: calc(var(--header-h, 3.5rem) + 12px);
			right: 16px;
			background: var(--vz-panel);
			border: 1px solid rgba(255, 255, 255, 0.08);
			border-radius: 10px;
			padding: 8px 12px;
			font-family: var(--font-mono);
			font-size: 11px;
			color: var(--vz-muted);
			max-width: 240px;
			line-height: 1.6;
		}
		.vz-hint b { color: var(--vz-text); font-weight: 600; }

		/* ── Hover tooltip (follows cursor) ───────────── */
		.vz-tooltip {
			position: fixed;
			z-index: 15;
			pointer-events: none;
			background: rgba(0, 0, 0, 0.95);
			border: 1px solid var(--vz-border);
			border-radius: 8px;
			padding: 8px 12px;
			font-family: var(--font-mono);
			font-size: 12px;
			color: var(--vz-text);
			transform: translate(12px, 12px);
			opacity: 0;
			transition: opacity 0.12s ease;
			white-space: nowrap;
		}
		.vz-tooltip.is-visible { opacity: 1; }
		.vz-tooltip .name { color: var(--vz-accent); font-weight: 600; }
		.vz-tooltip .mcap { color: var(--vz-green); }

		/* ── Detail panel ─────────────────────────────── */
		.vz-detail {
			position: absolute;
			top: 0;
			right: 0;
			bottom: 0;
			width: 360px;
			max-width: 90vw;
			background: var(--vz-panel);
			border-left: 1px solid var(--vz-border);
			backdrop-filter: blur(12px);
			-webkit-backdrop-filter: blur(12px);
			padding: calc(var(--header-h, 3.5rem) + 20px) 20px 20px;
			overflow-y: auto;
			transform: translateX(100%);
			transition: transform 0.28s cubic-bezier(0.2, 0.8, 0.2, 1);
			display: flex;
			flex-direction: column;
			gap: 14px;
		}
		.vz-detail.is-open { transform: translateX(0); }
		.vz-detail .close {
			position: absolute;
			top: calc(var(--header-h, 3.5rem) + 12px);
			right: 12px;
			width: 28px; height: 28px;
			border: 1px solid rgba(255,255,255,0.15);
			background: rgba(255,255,255,0.04);
			color: var(--vz-text);
			border-radius: 50%;
			cursor: pointer;
			font-size: 16px;
			line-height: 1;
		}
		.vz-detail .close:hover { background: var(--accent-soft); }
		.vz-detail .head { display: flex; align-items: center; gap: 12px; }
		.vz-detail .avatar {
			width: 56px; height: 56px; border-radius: 50%;
			background: #111; border: 1px solid var(--vz-border);
			object-fit: cover; flex-shrink: 0;
		}
		.vz-detail .title { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
		.vz-detail .title .name {
			font-family: var(--font-display);
			font-size: 18px; font-weight: 600;
			color: var(--vz-text);
			overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
		}
		.vz-detail .title .symbol {
			font-family: var(--font-mono);
			font-size: 13px; color: var(--vz-accent);
		}
		.vz-detail .stats {
			display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
			padding: 12px; border-radius: 8px;
			background: rgba(255,255,255,0.03);
			border: 1px solid rgba(255,255,255,0.06);
		}
		.vz-detail .stat .label {
			font-family: var(--font-mono);
			font-size: 10px; letter-spacing: 0.08em;
			color: var(--vz-muted); text-transform: uppercase;
		}
		.vz-detail .stat .value {
			font-family: var(--font-mono);
			font-size: 14px; color: var(--vz-text); margin-top: 2px;
		}
		.vz-detail .stat .value.green { color: var(--vz-green); }
		.vz-detail .description {
			font-size: 13px; line-height: 1.55; color: var(--vz-muted);
			max-height: 140px; overflow-y: auto;
			padding: 10px; border-radius: 8px;
			background: rgba(255,255,255,0.02);
			border: 1px solid rgba(255,255,255,0.05);
		}
		.vz-detail .description:empty { display: none; }
		.vz-detail .mint {
			font-family: var(--font-mono);
			font-size: 11px; color: var(--vz-muted);
			word-break: break-all;
			padding: 8px 10px;
			background: rgba(0,0,0,0.4);
			border: 1px solid rgba(255,255,255,0.05);
			border-radius: 6px;
		}
		.vz-detail .links { display: flex; flex-wrap: wrap; gap: 6px; }
		.vz-detail .links a {
			display: inline-flex; align-items: center; gap: 4px;
			padding: 6px 10px; font-size: 12px;
			border-radius: 6px;
			border: 1px solid var(--vz-border);
			color: var(--vz-text);
			text-decoration: none;
			background: rgba(255, 255, 255, 0.08);
			transition: background 0.15s;
		}
		.vz-detail .links a:hover { background: var(--accent-soft); }
		.vz-detail .links a.primary {
			background: var(--vz-accent); color: #fff; border-color: var(--vz-accent);
		}
		.vz-detail .live-badge {
			display: inline-flex; align-items: center; gap: 6px;
			padding: 3px 8px; font-size: 10px; letter-spacing: 0.06em;
			text-transform: uppercase;
			background: rgba(248, 113, 113, 0.15);
			color: var(--vz-red);
			border: 1px solid rgba(248, 113, 113, 0.4);
			border-radius: 20px;
			margin-top: 4px;
			width: max-content;
		}
		.vz-detail .live-badge::before {
			content: ''; width: 6px; height: 6px; border-radius: 50%;
			background: var(--vz-red); animation: vzPulse 1.2s ease-in-out infinite;
		}
		.vz-detail .live-badge.is-grad {
			background: rgba(52, 211, 153, 0.15);
			color: var(--vz-green);
			border-color: rgba(52, 211, 153, 0.4);
		}
		.vz-detail .live-badge.is-grad::before { background: var(--vz-green); }

		/* ── Legend (bottom-left rank list) ───────────── */
		.vz-legend {
			bottom: 16px;
			left: 16px;
			background: var(--vz-panel);
			border: 1px solid rgba(255,255,255,0.08);
			border-radius: 10px;
			padding: 10px 12px;
			max-height: 260px;
			overflow-y: auto;
			width: 280px;
			font-family: var(--font-mono);
			font-size: 12px;
		}
		.vz-legend .head {
			color: var(--vz-muted);
			font-size: 10px; letter-spacing: 0.1em;
			text-transform: uppercase;
			padding-bottom: 6px; margin-bottom: 6px;
			border-bottom: 1px solid rgba(255,255,255,0.06);
		}
		.vz-legend ol { list-style: none; padding: 0; margin: 0; }
		.vz-legend li {
			display: flex; align-items: center; gap: 8px;
			padding: 4px 2px; border-radius: 4px;
			cursor: pointer;
			color: var(--vz-text);
		}
		.vz-legend li:hover { background: rgba(255,255,255,0.04); }
		.vz-legend li.is-selected { background: var(--accent-soft); }
		.vz-legend li .rank { color: var(--vz-muted); width: 26px; font-size: 10px; font-variant-numeric: tabular-nums; }
		.vz-legend li .rank.age { color: var(--vz-red); font-weight: 600; }
		.vz-legend li .sym { color: var(--vz-accent); font-size: 11px; }
		.vz-legend li .name {
			flex: 1; min-width: 0;
			overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
		}
		.vz-legend li .thumb {
			width: 18px; height: 18px;
			border-radius: 50%;
			background: #111;
			object-fit: cover;
			flex-shrink: 0;
			border: 1px solid rgba(255,255,255,0.06);
		}
		.vz-legend li .mc {
			color: var(--vz-green);
			font-size: 10px;
			margin-left: auto;
			padding-left: 6px;
		}
		/* Live equalizer — three bouncing bars + LIVE pill */
		.vz-eq {
			display: inline-flex;
			align-items: flex-end;
			gap: 2px;
			height: 12px;
			margin-left: 4px;
			flex-shrink: 0;
		}
		.vz-eq span {
			display: block;
			width: 2px;
			background: var(--vz-red);
			border-radius: 1px;
			box-shadow: 0 0 4px rgba(248, 113, 113, 0.75);
			animation: vzEqBounce 0.9s ease-in-out infinite;
			transform-origin: bottom;
		}
		.vz-eq span:nth-child(1) { height: 60%; animation-delay: -0.10s; }
		.vz-eq span:nth-child(2) { height: 100%; animation-delay: -0.45s; }
		.vz-eq span:nth-child(3) { height: 75%; animation-delay: -0.25s; }
		.vz-eq span:nth-child(4) { height: 45%; animation-delay: -0.60s; }
		@keyframes vzEqBounce {
			0%, 100% { transform: scaleY(0.30); }
			50%      { transform: scaleY(1.00); }
		}
		.vz-live-pill {
			display: inline-flex;
			align-items: center;
			gap: 4px;
			font-size: 9px;
			letter-spacing: 0.08em;
			color: var(--vz-red);
			text-transform: uppercase;
			padding: 1px 5px;
			border: 1px solid rgba(248, 113, 113, 0.45);
			background: rgba(248, 113, 113, 0.12);
			border-radius: 999px;
			margin-left: 4px;
			flex-shrink: 0;
		}
		.vz-legend li.is-live .mc { color: var(--vz-red); }
		.vz-legend.is-empty::after {
			content: 'No matches';
			display: block;
			text-align: center;
			color: var(--vz-muted);
			font-size: 11px;
			padding: 18px 8px;
		}

		/* ── Intro / loading overlay ──────────────────── */
		.vz-intro {
			position: absolute;
			inset: 0;
			z-index: 12;
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			background: radial-gradient(ellipse at center, rgba(255, 255, 255, 0.08) 0%, var(--vz-bg) 70%);
			pointer-events: none;
			opacity: 1;
			transition: opacity 0.6s ease 0.2s;
		}
		.vz-intro.is-hidden { opacity: 0; }
		.vz-intro .ring {

	<script type="module">
		import * as THREE from 'three';
		import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
		import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
		import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
		import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
		import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

		const TRENDING_API = '/api/pump/trending?limit=50&rich=1';
		const LIVE_FEED_API = '/api/agents/pumpfun-feed?kind=mint';
		const MIGRATIONS_FEED_API = '/api/agents/pumpfun-feed?kind=graduation';
		const MIGRATIONS_BACKFILL_API = '/api/pump/recent-graduations?limit=20';
		const STATS_API    = '/api/pump/helius-stats';
		const SPHERE_RADIUS = 28;
		const MIN_TOKEN_R = 0.7;
		const MAX_TOKEN_R = 6.0;
		const REFRESH_INTERVAL_MS = 60_000;
		const STATS_INTERVAL_MS = 5_000;
		const LABEL_COUNT = 3;            // always-on 3D labels for top-N
		const FLASH_DURATION_MS = 1800;   // diff-flash on refresh (trending mode)
		const FEED_CAP = 60;              // max simultaneous spheres in feed mode
		const FEED_FADE_OUT_MS = 520;     // eviction fade (ms)
		const FEED_LIVE_MIN_LOG = Math.log10(4_000);    // $4k → smallest sphere
		const FEED_LIVE_MAX_LOG = Math.log10(500_000);  // $500k+ → biggest sphere

		const host = document.getElementById('vz-canvas-host');
		const statusEl = document.getElementById('vz-status');
		const statusText = document.getElementById('vz-status-text');
		const refreshBtn = document.getElementById('vz-refresh');
		const countdownEl = document.getElementById('vz-countdown');
		const statCountEl = document.getElementById('vz-stat-count');
		const statMcapEl = document.getElementById('vz-stat-mcap');
		const statRateEl = document.getElementById('vz-stat-rate');
		const statRateUnitEl = document.getElementById('vz-stat-rate-unit');
		const controlsEl = document.getElementById('vz-controls');
		const searchInput = document.getElementById('vz-search-input');
		const sortBtns = controlsEl.querySelectorAll('.vz-sort button');
		const modeBtns = controlsEl.querySelectorAll('.vz-mode button');
		const legendHeadEl = document.querySelector('#vz-legend .head');
		const hintEl = document.getElementById('vz-hint');
		const hintDismiss = document.getElementById('vz-hint-dismiss');
		const introEl = document.getElementById('vz-intro');
		const tooltip = document.getElementById('vz-tooltip');
		const ttName = document.getElementById('vz-tt-name');
		const ttMcap = document.getElementById('vz-tt-mcap');
		const detailEl = document.getElementById('vz-detail');
		const detailClose = document.getElementById('vz-detail-close');
		const legendEl = document.getElementById('vz-legend');
		const legendList = document.getElementById('vz-legend-list');
		const errorEl = document.getElementById('vz-error');
		const errorMessage = document.getElementById('vz-error-message');
		const errorRetry = document.getElementById('vz-error-retry');

		// ── three.js scene ────────────────────────────────────────────
		const scene = new THREE.Scene();
		scene.background = new THREE.Color(0x05060a);
		scene.fog = new THREE.Fog(0x05060a, 80, 220);

		const camera = new THREE.PerspectiveCamera(55, 1, 0.1, 500);
		// Start far out so we can fly in once data arrives.
		camera.position.set(0, 14, 180);

		const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
		renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
		renderer.outputColorSpace = THREE.SRGBColorSpace;
		renderer.toneMapping = THREE.ACESFilmicToneMapping;
		renderer.toneMappingExposure = 1.05;
		host.appendChild(renderer.domElement);

		// Post-processing — bloom gives emissive (live red, accent purple) cinematic glow.
		const composer = new EffectComposer(renderer);
		composer.addPass(new RenderPass(scene, camera));
		const bloomPass = new UnrealBloomPass(new THREE.Vector2(1, 1), 0.85, 0.55, 0.18);
		composer.addPass(bloomPass);
		composer.addPass(new OutputPass());

		const controls = new OrbitControls(camera, renderer.domElement);
		controls.enableDamping = true;
		controls.dampingFactor = 0.06;
		controls.rotateSpeed = 0.6;
		controls.zoomSpeed = 0.7;
		controls.minDistance = 8;
		controls.maxDistance = 160;
		controls.autoRotate = true;
		controls.autoRotateSpeed = 0.35;

		// Lights
		scene.add(new THREE.AmbientLight(0xffffff, 0.55));
		const key = new THREE.DirectionalLight(0xc4b5fd, 0.9);
		key.position.set(40, 60, 50);
		scene.add(key);
		const rim = new THREE.DirectionalLight(0x6366f1, 0.45);
		rim.position.set(-50, -20, -40);
		scene.add(rim);

		// Starfield
		(function buildStars() {
			const count = 2500;
			const geom = new THREE.BufferGeometry();
			const positions = new Float32Array(count * 3);
			for (let i = 0; i < count; i++) {
				const r = 180 + Math.random() * 140;
				const t = Math.random() * Math.PI * 2;
				const p = Math.acos(2 * Math.random() - 1);
				positions[i * 3 + 0] = r * Math.sin(p) * Math.cos(t);
				positions[i * 3 + 1] = r * Math.sin(p) * Math.sin(t);
				positions[i * 3 + 2] = r * Math.cos(p);
			}
			geom.setAttribute('position', new THREE.BufferAttribute(positions, 3));
			const mat = new THREE.PointsMaterial({ size: 0.6, color: 0xaaaaff, transparent: true, opacity: 0.7, sizeAttenuation: true });
			scene.add(new THREE.Points(geom, mat));
		})();

		// Centerpiece — accent core
		const core = new THREE.Mesh(
			new THREE.IcosahedronGeometry(1.6, 1),
			new THREE.MeshStandardMaterial({ color: 0x8b5cf6, emissive: 0x4c1d95, emissiveIntensity: 0.5, roughness: 0.35, metalness: 0.7, wireframe: false })
		);
		scene.add(core);
		const coreGlow = new THREE.Mesh(
			new THREE.SphereGeometry(2.4, 32, 32),
			new THREE.MeshBasicMaterial({ color: 0x8b5cf6, transparent: true, opacity: 0.12 })
		);
		scene.add(coreGlow);

		// Token meshes
		const tokensGroup = new THREE.Group();
		scene.add(tokensGroup);

		const tokenMeshes = []; // { mesh, ring, data, baseScale, label, sonarRings, deltaPct, flashAt }
		const previousMcaps = new Map(); // mint → last refresh's usd_market_cap, for diff flash
		const textureLoader = new THREE.TextureLoader();
		textureLoader.crossOrigin = 'anonymous';

		// Route remote token art through the same-origin proxy (/api/img) so the
		// browser never makes a cross-origin image request — this eliminates the
		// CORS / ERR_BLOCKED_BY_ORB failures that blanked token textures (one per
		// token in the cloud). data: URIs and already-same-origin paths pass
		// through untouched; the proxy itself falls back to a placeholder on any
		// upstream failure, so a returned src always resolves.
		function proxiedImg(uri, seed) {
			if (!uri || typeof uri !== 'string') return null;
			if (uri.startsWith('data:') || uri.startsWith('/')) return uri;
			const s = seed ? `&seed=${encodeURIComponent(seed)}` : '';
			return `/api/img?url=${encodeURIComponent(uri)}${s}`;
		}

		function fibonacciSphere(n) {
			const points = [];
			const phi = Math.PI * (Math.sqrt(5) - 1);
			for (let i = 0; i < n; i++) {
				const y = 1 - (i / (n - 1)) * 2;
				const r = Math.sqrt(1 - y * y);
				const theta = phi * i;
				points.push({ x: Math.cos(theta) * r, y, z: Math.sin(theta) * r });
			}
			return points;
		}

		// Fallback canvas-textured material when the token image fails to load.
		// Renders the symbol on a tinted background so the sphere is never blank.
		function fallbackTexture(symbol, seedMint) {
			const size = 256;
			const c = document.createElement('canvas');
			c.width = size; c.height = size;
			const ctx = c.getContext('2d');
			const hue = hashStr(seedMint || symbol || 'pump') % 360;
			const grad = ctx.createRadialGradient(size / 2, size / 2, size / 8, size / 2, size / 2, size / 2);
			grad.addColorStop(0, `hsl(${hue}, 70%, 55%)`);
			grad.addColorStop(1, `hsl(${(hue + 40) % 360}, 70%, 25%)`);
			ctx.fillStyle = grad;
			ctx.fillRect(0, 0, size, size);
			ctx.fillStyle = '#fff';
			ctx.font = 'bold 88px "Space Grotesk", system-ui, sans-serif';
			ctx.textAlign = 'center';
			ctx.textBaseline = 'middle';
			const label = ((symbol || '?').slice(0, 4)).toUpperCase();
			ctx.fillText(label, size / 2, size / 2 + 6);
			const tex = new THREE.CanvasTexture(c);
			tex.colorSpace = THREE.SRGBColorSpace;
			tex.anisotropy = 4;
			return tex;
		}

		function hashStr(s) {
			let h = 0;
			for (let i = 0; i < s.length; i++) h = ((h << 5) - h + s.charCodeAt(i)) | 0;
			return Math.abs(h);
		}

		function loadTokenTexture(url, fallback) {
			return new Promise((resolve) => {
				if (!url) return resolve(fallback);
				textureLoader.load(
					url,
					(tex) => {
						tex.colorSpace = THREE.SRGBColorSpace;
						tex.anisotropy = 4;
						resolve(tex);
					},
					undefined,
					() => resolve(fallback),
				);
			});
		}

		// Sprite label — only built for the top-N spheres so the scene stays clean.
		function buildLabelSprite(symbol, mcap) {
			const w = 384, h = 128;
			const c = document.createElement('canvas');
			c.width = w; c.height = h;
			const ctx = c.getContext('2d');
			ctx.clearRect(0, 0, w, h);
			// Symbol — large, bright
			ctx.font = 'bold 64px "Space Grotesk", system-ui, sans-serif';
			ctx.textAlign = 'center';
			ctx.textBaseline = 'middle';
			ctx.shadowColor = 'rgba(0, 0, 0, 0.85)';
			ctx.shadowBlur = 8;
			ctx.fillStyle = '#ffffff';
			ctx.fillText('$' + (symbol || '?').toUpperCase().slice(0, 8), w / 2, h / 2 - 18);
			// Mcap — accent green
			ctx.font = '600 38px "JetBrains Mono", ui-monospace, monospace';
			ctx.fillStyle = '#34d399';
			ctx.fillText(mcap, w / 2, h / 2 + 30);
			const tex = new THREE.CanvasTexture(c);
			tex.colorSpace = THREE.SRGBColorSpace;
			tex.anisotropy = 8;
			tex.minFilter = THREE.LinearMipmapLinearFilter;
			tex.needsUpdate = true;
			const mat = new THREE.SpriteMaterial({ map: tex, transparent: true, depthTest: false, depthWrite: false });
			const sprite = new THREE.Sprite(mat);
			sprite.scale.set(7.5, 2.5, 1);
			sprite.renderOrder = 999;
			return sprite;
		}

		// Live-glow color: green for "just migrated" tokens, red for everything
		// else (fresh mints and pump.fun livestream-active trending tokens).
		function liveGlowHex(token) {
			return token?.is_migration ? 0x34d399 : 0xf87171;
		}

		function buildTokenMesh(token, position, radius) {
			const fallback = fallbackTexture(token.symbol, token.mint);
			const isLive = !!token.is_currently_live;
			const glow = liveGlowHex(token);
			const material = new THREE.MeshStandardMaterial({
				map: fallback,
				roughness: 0.45,
				metalness: 0.25,
				emissive: isLive ? new THREE.Color(glow) : new THREE.Color(0x000000),
				emissiveIntensity: isLive ? 0.25 : 0,
			});
			const geometry = new THREE.SphereGeometry(radius, 28, 28);
			const mesh = new THREE.Mesh(geometry, material);
			mesh.position.copy(position);
			mesh.scale.setScalar(0.001); // grow in during spawn animation

			// Selection / hover ring (hidden by default)
			const ringGeo = new THREE.RingGeometry(radius * 1.18, radius * 1.32, 48);
			const ringMat = new THREE.MeshBasicMaterial({
				color: isLive ? glow : 0x8b5cf6,
				transparent: true,
				opacity: isLive ? 0.45 : 0,
				side: THREE.DoubleSide,
				depthWrite: false,
			});
			const ring = new THREE.Mesh(ringGeo, ringMat);
			ring.position.copy(position);
			ring.lookAt(0, 0, 0);
			ring.scale.setScalar(0.001);

			mesh.userData = { token, ring };

			// Swap to real artwork asynchronously; keeps fallback if it fails.
			if (token.image_uri) {
				loadTokenTexture(proxiedImg(token.image_uri, token.mint || token.symbol), null).then((tex) => {
					if (tex) {
						material.map = tex;
						material.needsUpdate = true;
					}
				});
			}

			return { mesh, ring, isLive };
		}

		function placeTokens(tokens) {
			// Snapshot previous mcaps so the new entries can compute a delta.
			tokenMeshes.forEach((entry) => {
				const m = Number(entry.data?.usd_market_cap) || 0;
				if (entry.data?.mint && m > 0) previousMcaps.set(entry.data.mint, m);
			});
			// Wipe previous run so refresh swaps cleanly.
			while (tokensGroup.children.length) {
				const child = tokensGroup.children[0];
				tokensGroup.remove(child);
				const isSprite = child.isSprite;
				// Sprites share a single geometry across instances — don't dispose it.
				if (!isSprite && child.geometry) child.geometry.dispose();
				if (child.material) {
					if (child.material.map) child.material.map.dispose();
					child.material.dispose();
				}
			}
			tokenMeshes.length = 0;

			const caps = tokens.map((t) => Math.max(1, Number(t.usd_market_cap) || 0));
			const maxLog = Math.log10(Math.max(...caps, 10));
			const minLog = Math.log10(Math.max(Math.min(...caps), 1));
			const span = Math.max(0.0001, maxLog - minLog);

			const points = fibonacciSphere(tokens.length);
			const spawnStart = performance.now();

			tokens.forEach((token, i) => {
				const cap = caps[i];
				const t = (Math.log10(cap) - minLog) / span;
				const radius = MIN_TOKEN_R + t * (MAX_TOKEN_R - MIN_TOKEN_R);

				// Wobble each point inward a touch for big caps so they don't all sit on a perfect shell.
				const shellR = SPHERE_RADIUS * (0.82 + (1 - t) * 0.25);
				const p = points[i];
				const position = new THREE.Vector3(p.x * shellR, p.y * shellR, p.z * shellR);

				const { mesh, ring, isLive } = buildTokenMesh(token, position, radius);
				tokensGroup.add(mesh);
				tokensGroup.add(ring);
				const prevMcap = previousMcaps.get(token.mint);
				const currMcap = Number(token.usd_market_cap) || 0;
				let deltaPct = 0;
				if (prevMcap && prevMcap > 0 && currMcap > 0) {
					deltaPct = (currMcap - prevMcap) / prevMcap;
				}
				const entry = {
					mesh, ring, data: token,
					baseScale: 1,
					radius,
					isLive,
					spawnAt: spawnStart + i * 22, // ms — stagger reveals
					spawned: false,
					hoverScale: 1,
					visible: true,
					label: null,            // sprite, attached lazily for top-N
					labelOffset: radius + 1.6,
					sonarRings: [],         // expanding "broadcasting" rings for live tokens
					nextSonarAt: 0,
					deltaPct,               // refresh-to-refresh change
					flashAt: deltaPct !== 0 ? performance.now() + 50 + i * 30 : 0,
				};
				tokenMeshes.push(entry);
				if (isLive) seedSonarRing(entry);
			});
		}

		// ── live "broadcasting" rings — sonar pings out of live spheres ──
		function seedSonarRing(entry) {
			const ringGeo = new THREE.RingGeometry(entry.radius * 1.05, entry.radius * 1.18, 48);
			const ringMat = new THREE.MeshBasicMaterial({
				color: liveGlowHex(entry.data),
				transparent: true,
				opacity: 0.7,
				side: THREE.DoubleSide,
				depthWrite: false,
			});
			const ring = new THREE.Mesh(ringGeo, ringMat);
			ring.position.copy(entry.mesh.position);
			ring.lookAt(0, 0, 0);
			ring.userData = { bornAt: performance.now(), life: 1600, baseR: entry.radius };
			tokensGroup.add(ring);
			entry.sonarRings.push(ring);
		}

		// ── always-on labels for top-N (recomputed on filter/sort) ──
		function syncLabels() {
			// Find the top-N visible entries by current sort.
			const visible = tokenMeshes
				.filter((e) => e.visible)
				.slice(0, LABEL_COUNT);
			const winners = new Set(visible);
			tokenMeshes.forEach((entry) => {
				const wants = winners.has(entry);
				if (wants && !entry.label) {
					entry.label = buildLabelSprite(entry.data.symbol, formatMcap(entry.data.usd_market_cap));
					tokensGroup.add(entry.label);
				} else if (!wants && entry.label) {
					tokensGroup.remove(entry.label);
					if (entry.label.material.map) entry.label.material.map.dispose();
					entry.label.material.dispose();
					entry.label = null;
				}
			});
		}

		function applyVisibility(filteredMints) {
			const set = filteredMints ? new Set(filteredMints) : null;
			tokenMeshes.forEach((entry) => {
				const show = !set || set.has(entry.data.mint);
				entry.visible = show;
				entry.mesh.visible = show;
				// Ring stays hidden when filtered out, regardless of live state.
				if (!show) entry.ring.visible = false;
				else entry.ring.visible = true;
				// Sonar rings only meaningful for visible live tokens.
				entry.sonarRings.forEach((sr) => { sr.visible = show; });
				if (entry.label) entry.label.visible = show;
			});
			// Reorder tokenMeshes to match the filtered/sorted rank so syncLabels
			// can pluck the top-N straight off the front of the array.
			if (filteredMints) {
				const rank = new Map(filteredMints.map((m, i) => [m, i]));
				tokenMeshes.sort((a, b) => {
					const ra = rank.has(a.data.mint) ? rank.get(a.data.mint) : Number.POSITIVE_INFINITY;
					const rb = rank.has(b.data.mint) ? rank.get(b.data.mint) : Number.POSITIVE_INFINITY;
					return ra - rb;
				});
			}
			syncLabels();
		}

		// ── interactivity ────────────────────────────────────────────
		const raycaster = new THREE.Raycaster();
		const pointer = new THREE.Vector2();
		let hovered = null;
		let selected = null;

		renderer.domElement.addEventListener('pointermove', (ev) => {
			const rect = renderer.domElement.getBoundingClientRect();
			pointer.x = ((ev.clientX - rect.left) / rect.width) * 2 - 1;
			pointer.y = -((ev.clientY - rect.top) / rect.height) * 2 + 1;
			tooltip.style.left = ev.clientX + 'px';
			tooltip.style.top = ev.clientY + 'px';
		});

		// Click vs drag detection — OrbitControls swallows drags but we still
		// want to suppress clicks that came from a long mouse-down or movement.
		let pressStart = null;
		renderer.domElement.addEventListener('pointerdown', (ev) => {
			pressStart = { x: ev.clientX, y: ev.clientY, t: Date.now() };
		});
		renderer.domElement.addEventListener('pointerup', (ev) => {
			if (!pressStart) return;
			const dx = ev.clientX - pressStart.x;
			const dy = ev.clientY - pressStart.y;
			const dt = Date.now() - pressStart.t;
			pressStart = null;
			if (Math.hypot(dx, dy) > 6 || dt > 350) return;
			handleClick();
		});

		function visibleMeshes() {
			return tokenMeshes.filter((t) => t.visible).map((t) => t.mesh);
		}

		function handleClick() {
			raycaster.setFromCamera(pointer, camera);
			const hits = raycaster.intersectObjects(visibleMeshes(), false);
			if (!hits.length) return;
			const data = hits[0].object.userData.token;
			selectToken(data);
		}

		// Double-click drills straight into the full 3D coin page (same tab).
		renderer.domElement.addEventListener('dblclick', () => {
			raycaster.setFromCamera(pointer, camera);
			const hits = raycaster.intersectObjects(visibleMeshes(), false);
			if (!hits.length) return;
			const mint = hits[0].object.userData.token?.mint;
			if (mint) window.location.href = `/coin3d?mint=${encodeURIComponent(mint)}`;
		});

		function setHovered(entry) {
			if (hovered === entry) return;
			if (hovered && hovered !== selected) {
				// Restore non-selected previous hover ring.
				hovered.ring.material.opacity = hovered.isLive ? 0.45 : 0;
			}
			hovered = entry;
			if (entry) {
				if (entry !== selected) entry.ring.material.opacity = 0.7;
				host.classList.add('is-pointing');
				ttName.textContent = (entry.data.name || 'Unknown') + (entry.data.symbol ? ` · $${entry.data.symbol}` : '');
				ttMcap.textContent = formatMcap(entry.data.usd_market_cap);
				tooltip.classList.add('is-visible');
			} else {
				host.classList.remove('is-pointing');
				tooltip.classList.remove('is-visible');
			}
		}

		function selectToken(token) {
			const entry = tokenMeshes.find((t) => t.data.mint === token.mint);
			if (!entry) return;
			if (selected && selected !== entry) {
				selected.ring.material.opacity = selected.isLive ? 0.45 : 0;
				selected.ring.material.color.set(selected.isLive ? liveGlowHex(selected.data) : 0x8b5cf6);
			}
			selected = entry;
			selected.ring.material.color.set(0x34d399);
			selected.ring.material.opacity = 1;
			controls.autoRotate = false;
			renderDetail(token);
			highlightLegend(token.mint);
		}

		function clearSelection() {
			if (selected) {
				selected.ring.material.opacity = selected.isLive ? 0.45 : 0;
				selected.ring.material.color.set(selected.isLive ? liveGlowHex(selected.data) : 0x8b5cf6);
				selected = null;
			}
			detailEl.classList.remove('is-open');
			detailEl.setAttribute('aria-hidden', 'true');
			controls.autoRotate = true;
			highlightLegend(null);
		}

		detailClose.addEventListener('click', clearSelection);
		document.addEventListener('keydown', (ev) => {
			if (ev.key === 'Escape') {
				if (document.activeElement === searchInput) {
					searchInput.value = '';
					applyFilterAndRender();
					searchInput.blur();
				} else {
					clearSelection();
				}
			} else if (ev.key === '/' && document.activeElement !== searchInput) {
				ev.preventDefault();
				searchInput.focus();
				searchInput.select();
			} else if (ev.key.toLowerCase() === 'r' && document.activeElement !== searchInput && !ev.metaKey && !ev.ctrlKey) {
				if (!refreshBtn.disabled) {
					clearSelection();
					loadData();
				}
			}
		});

		// ── detail panel rendering ───────────────────────────────────
		function renderDetail(token) {
			const avatar = document.getElementById('vz-detail-avatar');
			const fallbackAvatar = `https://api.dicebear.com/7.x/shapes/svg?seed=${encodeURIComponent(token.mint || token.symbol || 'x')}`;
			avatar.src = proxiedImg(token.image_uri, token.mint || token.symbol) || fallbackAvatar;
			avatar.onerror = () => { avatar.onerror = null; avatar.src = fallbackAvatar; };

			document.getElementById('vz-detail-name').textContent = token.name || 'Unknown';
			document.getElementById('vz-detail-symbol').textContent = token.symbol ? '$' + token.symbol : '';

			document.getElementById('vz-detail-mcap').textContent = formatMcap(token.usd_market_cap);
			document.getElementById('vz-detail-ath').textContent = formatMcap(token.ath_market_cap);
			document.getElementById('vz-detail-replies').textContent = token.reply_count != null ? Number(token.reply_count).toLocaleString() : '—';
			document.getElementById('vz-detail-age').textContent = formatAge(token.created_timestamp);

			const desc = (token.description || '').trim();
			const descEl = document.getElementById('vz-detail-description');
			descEl.textContent = desc.length > 800 ? desc.slice(0, 800) + '…' : desc;

			document.getElementById('vz-detail-mint').textContent = token.mint || '';
			const liveBadge = document.getElementById('vz-detail-live');
			liveBadge.hidden = !token.is_currently_live;
			if (token.is_migration) {
				liveBadge.classList.add('is-grad');
				liveBadge.textContent = 'Just migrated';
			} else {
				liveBadge.classList.remove('is-grad');
				liveBadge.textContent = 'Live now';
			}

			const linksEl = document.getElementById('vz-detail-links');
			linksEl.innerHTML = '';
			if (token.mint) {
				// Primary action keeps the user inside three.ws — the full 3D coin page.
				linksEl.appendChild(linkNode(`/coin3d?mint=${encodeURIComponent(token.mint)}`, 'Open in 3D →', { primary: true, internal: true }));
				linksEl.appendChild(linkNode(`https://pump.fun/coin/${token.mint}`, 'Pump.fun ↗'));
				linksEl.appendChild(linkNode(`https://solscan.io/token/${token.mint}`, 'Solscan ↗'));
			}
			if (token.twitter) linksEl.appendChild(linkNode(token.twitter, 'Twitter ↗'));
			if (token.telegram) linksEl.appendChild(linkNode(token.telegram, 'Telegram ↗'));
			if (token.website) linksEl.appendChild(linkNode(token.website, 'Website ↗'));

			detailEl.classList.add('is-open');
			detailEl.setAttribute('aria-hidden', 'false');
		}

		function linkNode(href, label, opts = {}) {
			const { primary = false, internal = false } = opts;
			const a = document.createElement('a');
			a.href = href;
			if (!internal) {
				a.target = '_blank';
				a.rel = 'noopener noreferrer';
			}
			a.textContent = label;
			if (primary) a.className = 'primary';
			return a;
		}

		// ── formatters ───────────────────────────────────────────────
		function formatMcap(v) {
			const n = Number(v);
			if (!Number.isFinite(n) || n <= 0) return '—';
			if (n >= 1e9) return '$' + (n / 1e9).toFixed(2) + 'B';
			if (n >= 1e6) return '$' + (n / 1e6).toFixed(2) + 'M';
			if (n >= 1e3) return '$' + (n / 1e3).toFixed(1) + 'K';
			return '$' + n.toFixed(2);
		}
		function formatAge(ts) {
			const n = Number(ts);
			if (!Number.isFinite(n) || n <= 0) return '—';
			const ms = Date.now() - n;
			const days = ms / 86_400_000;
			if (days >= 30) return Math.floor(days / 30) + 'mo';
			if (days >= 1) return Math.floor(days) + 'd';
			const hours = ms / 3_600_000;
			if (hours >= 1) return Math.floor(hours) + 'h';
			return Math.max(1, Math.floor(ms / 60_000)) + 'm';
		}

		// ── legend ───────────────────────────────────────────────────
		function renderLegend(tokens) {
			legendList.innerHTML = '';
			legendEl.classList.toggle('is-empty', tokens.length === 0);
			const isFeed = state.mode === 'feed' || state.mode === 'migrations';
			tokens.slice(0, 20).forEach((token, i) => {
				const li = document.createElement('li');
				li.dataset.mint = token.mint || '';
				if (token.is_currently_live) li.classList.add('is-live');

				const rank = document.createElement('span');
				rank.className = 'rank';
				if (isFeed) {
					rank.classList.add('age');
					rank.dataset.ts = String(token.created_timestamp || 0);
					rank.textContent = formatAgeShort(token.created_timestamp);
				} else {
					rank.textContent = '#' + (i + 1);
				}

				const thumb = document.createElement('img');
				thumb.className = 'thumb';
				thumb.alt = '';
				thumb.loading = 'lazy';
				thumb.referrerPolicy = 'no-referrer';
				thumb.src = proxiedImg(token.image_uri, token.mint || token.symbol) || `https://api.dicebear.com/7.x/shapes/svg?seed=${encodeURIComponent(token.mint || token.symbol || 'x')}`;
				thumb.onerror = () => { thumb.onerror = null; thumb.src = `https://api.dicebear.com/7.x/shapes/svg?seed=${encodeURIComponent(token.mint || 'x')}`; };

				const name = document.createElement('span');
				name.className = 'name';
				name.textContent = token.name || 'Unknown';

				const sym = document.createElement('span');
				sym.className = 'sym';
				sym.textContent = token.symbol ? '$' + token.symbol : '';

				const mc = document.createElement('span');
				mc.className = 'mc';
				mc.textContent = formatMcap(token.usd_market_cap);

				li.appendChild(rank);
				li.appendChild(thumb);
				li.appendChild(name);
				li.appendChild(sym);
				li.appendChild(mc);

				if (token.is_currently_live) {
					const eq = document.createElement('span');
					eq.className = 'vz-eq';
					eq.setAttribute('aria-hidden', 'true');
					eq.innerHTML = '<span></span><span></span><span></span><span></span>';
					const pill = document.createElement('span');
					pill.className = 'vz-live-pill';
					pill.textContent = state.mode === 'migrations' ? 'Grad' : (isFeed ? 'New' : 'Live');
					li.appendChild(eq);
					li.appendChild(pill);
				}

				li.addEventListener('click', () => focusToken(token));
				legendList.appendChild(li);
			});
			legendEl.hidden = false;
		}

		function formatAgeShort(ts) {
			const n = Number(ts);
			if (!Number.isFinite(n) || n <= 0) return 'now';
			const ms = Date.now() - n;
			if (ms < 5_000) return 'now';
			if (ms < 60_000) return Math.floor(ms / 1000) + 's';
			if (ms < 3_600_000) return Math.floor(ms / 60_000) + 'm';
			if (ms < 86_400_000) return Math.floor(ms / 3_600_000) + 'h';
			return Math.floor(ms / 86_400_000) + 'd';
		}

		// Refresh the "5s / 2m / …" age cells in the legend so they tick up live.
		setInterval(() => {
			if (state.mode !== 'feed') return;
			legendList.querySelectorAll('.rank.age').forEach((el) => {
				const ts = Number(el.dataset.ts);
				if (ts) el.textContent = formatAgeShort(ts);
			});
		}, 1000);
		function highlightLegend(mint) {
			legendList.querySelectorAll('li').forEach((li) => {
				li.classList.toggle('is-selected', !!mint && li.dataset.mint === mint);
			});
		}

		// Camera tween — used both for the intro fly-in and clicked-token focus.
		const tween = { active: false, from: new THREE.Vector3(), to: new THREE.Vector3(), target: new THREE.Vector3(), start: 0, duration: 700, targetLerp: 0.4 };
		function focusToken(token) {
			selectToken(token);
			const entry = tokenMeshes.find((t) => t.data.mint === token.mint);
			if (!entry) return;
			const pos = entry.mesh.position.clone();
			const dir = pos.clone().normalize();
			const dest = pos.clone().add(dir.multiplyScalar(8));
			tween.from.copy(camera.position);
			tween.to.copy(dest);
			tween.target.copy(pos);
			tween.start = performance.now();
			tween.duration = 700;
			tween.targetLerp = 0.4;
			tween.active = true;
		}
		function startIntroFlyIn() {
			tween.from.copy(camera.position);
			tween.to.set(0, 8, 70);
			tween.target.set(0, 0, 0);
			tween.start = performance.now();
			tween.duration = 1800;
			tween.targetLerp = 1.0;
			tween.active = true;
		}
		function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }
		function easeOutBack(t) {
			const c = 1.70158;
			return 1 + (c + 1) * Math.pow(t - 1, 3) + c * Math.pow(t - 1, 2);
		}

		// ── animation loop ───────────────────────────────────────────
		let frameCount = 0;
		function animate() {
			requestAnimationFrame(animate);
			const time = performance.now();
			frameCount++;

			core.rotation.x += 0.003;
			core.rotation.y += 0.005;
			coreGlow.scale.setScalar(1 + Math.sin(time * 0.0015) * 0.04);

			if (tween.active) {
				const t = Math.min(1, (time - tween.start) / tween.duration);
				const e = easeOutCubic(t);
				camera.position.lerpVectors(tween.from, tween.to, e);
				controls.target.lerp(tween.target, e * tween.targetLerp);
				if (t >= 1) tween.active = false;
			}

			// Per-token: spawn animation, hover scale lerp, live pulse, flash, sonar.
			const evictedThisFrame = [];
			tokenMeshes.forEach((entry) => {
				// Fade-out (feed eviction): shrink + drop opacity then remove.
				if (entry.fadeOutAt) {
					const t = Math.min(1, (time - entry.fadeOutAt) / FEED_FADE_OUT_MS);
					const k = 1 - t;
					entry.mesh.scale.setScalar(Math.max(0.001, k));
					entry.ring.scale.setScalar(Math.max(0.001, k));
					if (entry.mesh.material) {
						entry.mesh.material.transparent = true;
						entry.mesh.material.opacity = k;
					}
					if (entry.ring.material) entry.ring.material.opacity *= k;
					if (t >= 1) evictedThisFrame.push(entry);
					return;
				}
				if (!entry.visible) return;
				// Spawn pop-in (stagger).
				if (!entry.spawned) {
					const dt = time - entry.spawnAt;
					if (dt > 0) {
						const t = Math.min(1, dt / 600);
						const e = easeOutBack(t);
						entry.mesh.scale.setScalar(e);
						entry.ring.scale.setScalar(e);
						if (t >= 1) entry.spawned = true;
					}
					return;
				}
				// Hover scale ease.
				const wantHover = (entry === hovered || entry === selected) ? 1.18 : 1;
				entry.hoverScale += (wantHover - entry.hoverScale) * 0.18;
				entry.mesh.scale.setScalar(entry.hoverScale);

				// Persistent tint by refresh-to-refresh delta — subtle wash on top of texture.
				if (entry.deltaPct !== 0 && entry.mesh.material) {
					const mag = Math.min(1, Math.abs(entry.deltaPct) * 4); // ±25% saturates
					if (entry.deltaPct > 0) {
						entry.mesh.material.color.setRGB(1 - mag * 0.45, 1, 1 - mag * 0.45);
					} else {
						entry.mesh.material.color.setRGB(1, 1 - mag * 0.55, 1 - mag * 0.55);
					}
				}

				// Diff-flash: brief emissive burst right after refresh shows movement.
				if (entry.flashAt && time >= entry.flashAt) {
					const fdt = time - entry.flashAt;
					if (fdt < FLASH_DURATION_MS) {
						const k = 1 - (fdt / FLASH_DURATION_MS);
						const burst = k * k * 1.4;
						const positive = entry.deltaPct > 0;
						const flashColor = positive ? new THREE.Color(0x34d399) : new THREE.Color(0xf87171);
						entry.mesh.material.emissive.copy(flashColor);
						entry.mesh.material.emissiveIntensity = burst;
					} else {
						entry.flashAt = 0;
						entry.mesh.material.emissive.copy(entry.isLive ? new THREE.Color(liveGlowHex(entry.data)) : new THREE.Color(0x000000));
						entry.mesh.material.emissiveIntensity = entry.isLive ? 0.25 : 0;
					}
				}

				// Live pulse on emissive + ring.
				if (entry.isLive && !entry.flashAt) {
					const pulse = 0.5 + 0.5 * Math.sin(time * 0.006 + entry.spawnAt * 0.001);
					entry.mesh.material.emissiveIntensity = 0.18 + pulse * 0.35;
					if (entry !== selected && entry !== hovered) {
						entry.ring.material.opacity = 0.35 + pulse * 0.35;
					}
					entry.ring.scale.setScalar(entry.hoverScale * (1 + pulse * 0.06));
				} else if (entry !== selected) {
					entry.ring.scale.setScalar(entry.hoverScale);
				}

				// Sonar rings — emit a new one every ~1.4s while live; expand & fade existing.
				if (entry.isLive) {
					if (time >= entry.nextSonarAt) {
						seedSonarRing(entry);
						entry.nextSonarAt = time + 1400;
					}
				}
				for (let i = entry.sonarRings.length - 1; i >= 0; i--) {
					const sr = entry.sonarRings[i];
					const age = time - sr.userData.bornAt;
					const t = age / sr.userData.life;
					if (t >= 1) {
						tokensGroup.remove(sr);
						sr.geometry.dispose();
						sr.material.dispose();
						entry.sonarRings.splice(i, 1);
						continue;
					}
					const scale = 1 + t * 2.6;
					sr.scale.setScalar(scale);
					sr.material.opacity = 0.55 * (1 - t);
					sr.position.copy(entry.mesh.position);
					sr.lookAt(camera.position);
				}

				// Position the always-on label just above the sphere, facing camera.
				if (entry.label) {
					const r = entry.radius * entry.hoverScale;
					entry.label.position.set(
						entry.mesh.position.x,
						entry.mesh.position.y + r + 1.4,
						entry.mesh.position.z
					);
				}
			});

			// Finalize feed-mode evictions whose fade just completed.
			if (evictedThisFrame.length) {
				for (const e of evictedThisFrame) {
					const mint = e.data?.mint;
					removeEntry(e);
					if (mint) {
						const idx = state.all.findIndex((t) => t.mint === mint);
						if (idx >= 0) state.all.splice(idx, 1);
					}
				}
				if (state.mode === 'feed') {
					applyFilterAndRender();
					updateStats();
				}
			}

			// Hover raycast — every 2nd frame, only against visible & spawned meshes.
			if (frameCount % 2 === 0) {
				raycaster.setFromCamera(pointer, camera);
				const targets = tokenMeshes.filter((t) => t.visible && t.spawned).map((t) => t.mesh);
				const hits = raycaster.intersectObjects(targets, false);
				if (hits.length) {
					const hit = hits[0].object;
					const entry = tokenMeshes.find((t) => t.mesh === hit);
					setHovered(entry || null);
				} else {
					setHovered(null);
				}
			}

			// Subtle pulse on selected ring.
			if (selected) {
				const s = (selected.hoverScale || 1) * (1 + Math.sin(time * 0.005) * 0.06);
				selected.ring.scale.setScalar(s);
			}

			controls.update();
			composer.render();
		}

		// ── resize ───────────────────────────────────────────────────
		function resize() {
			const w = host.clientWidth || window.innerWidth;
			const h = host.clientHeight || window.innerHeight;
			renderer.setSize(w, h, false);
			composer.setSize(w, h);
			composer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
			bloomPass.setSize(w, h);
			camera.aspect = w / h;
			camera.updateProjectionMatrix();
		}
		window.addEventListener('resize', resize);
		resize();
		animate();

		// ── state, filtering, sorting ────────────────────────────────
		const state = {
			mode: 'feed',     // 'feed' (live mints) | 'migrations' (live graduations) | 'trending' (top-50 snapshot)
			all: [],          // raw tokens; in stream modes = recent events, newest first
			sortMode: 'mcap', // 'mcap' | 'live' | 'replies' | 'recent' — trending only
			query: '',
			feed: {
				es: null,
				kind: 'mint',   // 'mint' | 'graduation' — which SSE event stream is open
				retryTimer: null,
				statsTimer: null,
				mintsPerMin: 0,
				gradsPerHour: 0,
				seen: new Set(),
			},
		};

		function sortTokens(tokens, mode) {
			const arr = tokens.slice();
			switch (mode) {
				case 'live':
					arr.sort((a, b) => (Number(!!b.is_currently_live) - Number(!!a.is_currently_live)) || (Number(b.usd_market_cap || 0) - Number(a.usd_market_cap || 0)));
					break;
				case 'replies':
					arr.sort((a, b) => Number(b.reply_count || 0) - Number(a.reply_count || 0));
					break;
				case 'recent':
					arr.sort((a, b) => Number(b.created_timestamp || 0) - Number(a.created_timestamp || 0));
					break;
				default:
					arr.sort((a, b) => Number(b.usd_market_cap || 0) - Number(a.usd_market_cap || 0));
			}
			return arr;
		}

		function filterTokens(tokens, query) {
			const q = query.trim().toLowerCase();
			if (!q) return tokens;
			return tokens.filter((t) => {
				const name = (t.name || '').toLowerCase();
				const sym = (t.symbol || '').toLowerCase();
				const mint = (t.mint || '').toLowerCase();
				return name.includes(q) || sym.includes(q) || mint.includes(q);
			});
		}

		function applyFilterAndRender() {
			if (state.mode === 'feed' || state.mode === 'migrations') {
				// In stream modes `state.all` is already newest-first; no re-sort.
				const filtered = filterTokens(state.all, state.query);
				applyVisibility(filtered.map((t) => t.mint));
				renderLegend(filtered.slice(0, 20));
				return;
			}
			const sorted = sortTokens(state.all, state.sortMode);
			const filtered = filterTokens(sorted, state.query);
			applyVisibility(filtered.map((t) => t.mint));
			renderLegend(filtered);
		}

		function updateStats() {
			if (state.mode === 'feed') {
				statCountEl.textContent = tokenMeshes.length;
				statRateEl.textContent = state.feed.mintsPerMin || '—';
				statRateUnitEl.textContent = '/min';
				statusText.textContent = 'pump.fun firehose · live mints';
				return;
			}
			if (state.mode === 'migrations') {
				statCountEl.textContent = tokenMeshes.length;
				statRateEl.textContent = state.feed.gradsPerHour || '—';
				statRateUnitEl.textContent = '/hr';
				statusText.textContent = 'pump.fun firehose · live migrations';
				return;
			}
			const liveTokens = state.all.filter((t) => t.is_currently_live).length;
			statCountEl.textContent = state.all.length;
			const total = state.all.reduce((s, t) => s + (Number(t.usd_market_cap) || 0), 0);
			statMcapEl.textContent = formatMcap(total);
			statusText.textContent = liveTokens > 0
				? `${liveTokens} streaming · pump.fun`
				: `top 50 by market cap · pump.fun`;
		}

		// ── live feed (SSE firehose) ─────────────────────────────────
		// Streams new mints from /api/agents/pumpfun-feed (PumpPortal WS bridge).
		// Each mint → one sphere appended; oldest fades out at FEED_CAP. The mode
		// is the page default — "Trending" is the alt cached snapshot view.

		function feedRadius(mcUsd) {
			const n = Math.max(1, Number(mcUsd) || 0);
			const t = Math.max(0, Math.min(1, (Math.log10(n) - FEED_LIVE_MIN_LOG) / (FEED_LIVE_MAX_LOG - FEED_LIVE_MIN_LOG)));
			return MIN_TOKEN_R + t * (MAX_TOKEN_R - MIN_TOKEN_R);
		}

		function randomShellPoint() {
			// Uniform random point on the unit sphere (Marsaglia).
			const theta = Math.random() * Math.PI * 2;
			const z = Math.random() * 2 - 1;
			const r = Math.sqrt(1 - z * z);
			return { x: Math.cos(theta) * r, y: z, z: Math.sin(theta) * r };
		}

		// Normalize a PumpPortal mint event into the same token shape the rest of
		// the viewer (renderDetail, renderLegend, tooltip) already speaks.
		function normalizeFeedMint(d) {
			const mc = Number(d.market_cap_usd) > 0
				? Number(d.market_cap_usd)
				: (Number(d.market_cap_sol) > 0 && Number(d.sol_price) > 0)
					? Number(d.market_cap_sol) * Number(d.sol_price)
					: null;
			return {
				mint: d.mint,
				name: d.name,
				symbol: d.symbol,
				usd_market_cap: mc,
				market_cap: mc,
				ath_market_cap: mc,
				reply_count: null,
				created_timestamp: d.created_at ? Number(d.created_at) * 1000 : Date.now(),
				image_uri: d.image_uri || null,
				description: d.description || null,
				twitter: d.twitter || null,
				telegram: d.telegram || null,
				website: d.website || null,
				creator: d.creator || null,
				creator_launches: d.creator_launches ?? null,
				creator_graduated: d.creator_graduated ?? null,
				is_currently_live: true,          // visual: red glow + sonar = fresh mint
				signature: d.signature || null,
				replay: !!d.replay,
			};
		}

		// Normalize a PumpPortal migration event (graduation to Raydium/PumpSwap).
		// Re-uses the same token shape; visually distinguished by `is_migration`
		// → green glow + green sonar.
		function normalizeFeedGraduation(d) {
			const mc = Number(d.usd_market_cap) > 0 ? Number(d.usd_market_cap)
				: Number(d.market_cap) > 0 ? Number(d.market_cap)
				: null;
			const ath = Number(d.ath_market_cap) > 0 ? Number(d.ath_market_cap) : mc;
			// Prefer the token's own creation timestamp for the Age stat — it tells
			// the viewer how long this token lived on the bonding curve before
			// graduating. Falls back to the migration timestamp if unavailable.
			const createdMs = d.created_at ? Number(d.created_at) * 1000
				: d.timestamp ? Number(d.timestamp) * 1000
				: Date.now();
			return {
				mint: d.mint,
				name: d.name,
				symbol: d.symbol,
				usd_market_cap: mc,
				market_cap: mc,
				ath_market_cap: ath,
				reply_count: typeof d.reply_count === 'number' ? d.reply_count : null,
				created_timestamp: createdMs,
				image_uri: d.image_uri || null,
				description: d.description || null,
				twitter: d.twitter || null,
				telegram: d.telegram || null,
				website: d.website || null,
				creator: d.creator || null,
				creator_launches: d.creator_launches ?? null,
				creator_graduated: d.creator_graduated ?? null,
				is_currently_live: true,          // visual: green glow + sonar
				is_migration: true,
				pool: d.pool || null,
				raydium_pool: d.raydium_pool || null,
				pump_swap_pool: d.pump_swap_pool || null,
				amount_sol: d.amount_sol ?? null,
				amount_usd: d.amount_usd ?? null,
				migration_at: d.timestamp ? Number(d.timestamp) * 1000 : Date.now(),
				signature: d.signature || d.tx_signature || null,
				replay: !!d.replay,
			};
		}

		function appendFeedToken(token) {
			if (!token.mint || state.feed.seen.has(token.mint)) return;
			state.feed.seen.add(token.mint);
			if (state.feed.seen.size > 4096) {
				// Bound the dedupe set; oldest forgotten mints can re-enter the scene,
				// which is acceptable for a firehose visualizer.
				const it = state.feed.seen.values();
				for (let i = 0; i < 1024; i++) state.feed.seen.delete(it.next().value);
			}
			const p = randomShellPoint();
			const shellR = SPHERE_RADIUS * (0.80 + Math.random() * 0.22);
			const position = new THREE.Vector3(p.x * shellR, p.y * shellR, p.z * shellR);
			const radius = feedRadius(token.usd_market_cap);
			const { mesh, ring } = buildTokenMesh(token, position, radius);
			tokensGroup.add(mesh);
			tokensGroup.add(ring);
			const entry = {
				mesh, ring, data: token,
				baseScale: 1, radius,
				isLive: true,
				spawnAt: performance.now(),
				spawned: false,
				hoverScale: 1,
				visible: true,
				label: null,
				labelOffset: radius + 1.6,
				sonarRings: [],
				nextSonarAt: 0,
				deltaPct: 0,
				flashAt: 0,
				fadeOutAt: 0,
			};
			tokenMeshes.push(entry);
			seedSonarRing(entry);
			state.all.unshift(token);
			if (state.all.length > FEED_CAP * 2) state.all.length = FEED_CAP * 2;
			evictExcessFeedTokens();
		}

		function evictExcessFeedTokens() {
			// Pick the oldest tokens (by spawnAt) that aren't already fading and
			// flag them — the animation loop handles the fade + final removal.
			const active = tokenMeshes.filter((e) => !e.fadeOutAt);
			if (active.length <= FEED_CAP) return;
			active.sort((a, b) => a.spawnAt - b.spawnAt);
			const drop = active.slice(0, active.length - FEED_CAP);
			const now = performance.now();
			for (const e of drop) e.fadeOutAt = now;
		}

		function removeEntry(entry) {
			const idx = tokenMeshes.indexOf(entry);
			if (idx >= 0) tokenMeshes.splice(idx, 1);
			if (selected === entry) clearSelection();
			if (hovered === entry) setHovered(null);
			tokensGroup.remove(entry.mesh);
			tokensGroup.remove(entry.ring);
			if (entry.label) {
				tokensGroup.remove(entry.label);
				if (entry.label.material.map) entry.label.material.map.dispose();
				entry.label.material.dispose();
				entry.label = null;
			}
			for (const sr of entry.sonarRings) {
				tokensGroup.remove(sr);
				sr.geometry.dispose();
				sr.material.dispose();
			}
			entry.sonarRings.length = 0;
			if (entry.mesh.geometry) entry.mesh.geometry.dispose();
			if (entry.mesh.material) {
				if (entry.mesh.material.map) entry.mesh.material.map.dispose();
				entry.mesh.material.dispose();
			}
			if (entry.ring.geometry) entry.ring.geometry.dispose();
			if (entry.ring.material) entry.ring.material.dispose();
		}

		function clearAllTokens() {
			// Iterate a copy because removeEntry mutates tokenMeshes.
			for (const e of tokenMeshes.slice()) removeEntry(e);
			state.feed.seen.clear();
			state.all = [];
		}

		function connectFeed() {
			disconnectFeed();
			const kind = state.feed.kind;
			const url = kind === 'graduation' ? MIGRATIONS_FEED_API : LIVE_FEED_API;
			const eventName = kind === 'graduation' ? 'graduation' : 'mint';
			const normalize = kind === 'graduation' ? normalizeFeedGraduation : normalizeFeedMint;
			const es = new EventSource(url);
			state.feed.es = es;
			es.addEventListener('open', () => {
				state.feed.everOpened = true;
				if (firstLoad) revealVisualizer();
				statusEl.dataset.state = 'ready';
				updateStats();
			});
			es.addEventListener(eventName, (msg) => {
				// Bail if the user has switched modes since this listener was wired.
				if (state.feed.kind !== kind) return;
				let raw;
				try { raw = JSON.parse(msg.data); } catch { return; }
				const token = normalize(raw);
				appendFeedToken(token);
				applyFilterAndRender();
				updateStats();
				state.feed.everOpened = true;
				if (firstLoad) revealVisualizer();
			});
			// Server keeps SSE open for 90s then sends `close` — we reconnect.
			es.addEventListener('close', () => scheduleFeedReconnect());
			es.addEventListener('error', () => {
				if (es.readyState === EventSource.CLOSED) scheduleFeedReconnect();
				// Don't surface "unreachable" once we've had a working connection —
				// transient reconnects are normal (server cycles every 90s).
				else if (!state.feed.everOpened) {
					statusEl.dataset.state = 'error';
					statusText.textContent = 'Feed unreachable, retrying…';
				}
			});
		}

		function disconnectFeed() {
			if (state.feed.es) { try { state.feed.es.close(); } catch {} state.feed.es = null; }
			clearTimeout(state.feed.retryTimer);
			state.feed.retryTimer = null;
		}

		function scheduleFeedReconnect() {
			if (state.mode !== 'feed' && state.mode !== 'migrations') return;
			clearTimeout(state.feed.retryTimer);
			state.feed.retryTimer = setTimeout(connectFeed, 1200);
		}

		async function tickFeedStats() {
			if (state.mode !== 'feed' && state.mode !== 'migrations') return;
			try {
				const r = await fetch(STATS_API, { headers: { accept: 'application/json' } });
				if (!r.ok) return;
				const d = await r.json();
				state.feed.mintsPerMin = Number(d?.feed?.mints_per_min) || 0;
				state.feed.gradsPerHour = Number(d?.feed?.graduations_per_hour) || 0;
				updateStats();
			} catch {}
		}

		function revealVisualizer() {
			if (!firstLoad) return;
			firstLoad = false;
			controlsEl.hidden = false;
			introEl.classList.add('is-hidden');
			setTimeout(() => { try { introEl.remove(); } catch {} }, 900);
			startIntroFlyIn();
		}

		function enterFeedMode() {
			state.mode = 'feed';
			state.feed.kind = 'mint';
			controlsEl.dataset.mode = 'feed';
			statusEl.dataset.mode = 'feed';
			modeBtns.forEach((b) => b.classList.toggle('is-active', b.dataset.mode === 'feed'));
			clearInterval(refreshTimer);
			refreshBtn.disabled = true;
			errorEl.hidden = true;
			clearAllTokens();
			legendHeadEl.textContent = 'Latest mints';
			statusEl.dataset.state = firstLoad ? 'loading' : 'ready';
			statusText.textContent = firstLoad ? 'Connecting to pump.fun firehose…' : 'pump.fun firehose · live mints';
			updateStats();
			connectFeed();
			clearInterval(state.feed.statsTimer);
			tickFeedStats();
			state.feed.statsTimer = setInterval(tickFeedStats, STATS_INTERVAL_MS);
		}

		// Backfill the migrations feed with the most-recent enriched graduations
		// from Postgres (or the WS feed's ring buffer) so the canvas never opens
		// blank — graduations can be minutes apart on a slow stretch.
		async function backfillMigrations() {
			try {
				const r = await fetch(MIGRATIONS_BACKFILL_API, { headers: { accept: 'application/json' } });
				if (!r.ok) return;
				const d = await r.json();
				const items = Array.isArray(d?.items) ? d.items : [];
				// Oldest first so each unshift puts the newest on top.
				for (let i = items.length - 1; i >= 0; i--) {
					if (state.mode !== 'migrations') return; // user switched away mid-fetch
					const token = normalizeFeedGraduation({ ...items[i], replay: true });
					appendFeedToken(token);
				}
				applyFilterAndRender();
				updateStats();
			} catch {}
		}

		function enterMigrationsMode() {
			state.mode = 'migrations';
			state.feed.kind = 'graduation';
			controlsEl.dataset.mode = 'migrations';
			statusEl.dataset.mode = 'migrations';
			modeBtns.forEach((b) => b.classList.toggle('is-active', b.dataset.mode === 'migrations'));
			clearInterval(refreshTimer);
			refreshBtn.disabled = true;
			errorEl.hidden = true;
			clearAllTokens();
			legendHeadEl.textContent = 'Latest migrations';
			statusEl.dataset.state = firstLoad ? 'loading' : 'ready';
			statusText.textContent = firstLoad ? 'Connecting to pump.fun firehose…' : 'pump.fun firehose · live migrations';
			updateStats();
			backfillMigrations();
			connectFeed();
			clearInterval(state.feed.statsTimer);
			tickFeedStats();
			state.feed.statsTimer = setInterval(tickFeedStats, STATS_INTERVAL_MS);
		}

		function enterTrendingMode() {
			state.mode = 'trending';
			controlsEl.dataset.mode = 'trending';
			statusEl.dataset.mode = 'trending';
			modeBtns.forEach((b) => b.classList.toggle('is-active', b.dataset.mode === 'trending'));
			disconnectFeed();
			clearInterval(state.feed.statsTimer);
			state.feed.statsTimer = null;
			clearAllTokens();
			legendHeadEl.textContent = 'Top 20 by Market Cap';
			loadData();
		}

		// Mode toggle wiring.
		modeBtns.forEach((btn) => {
			btn.addEventListener('click', () => {
				const m = btn.dataset.mode;
				if (state.mode === m) return;
				if (m === 'feed') enterFeedMode();
				else if (m === 'migrations') enterMigrationsMode();
				else enterTrendingMode();
			});
		});

		// Search wiring (debounced).
		let searchDebounce = null;
		searchInput.addEventListener('input', () => {
			clearTimeout(searchDebounce);
			searchDebounce = setTimeout(() => {
				state.query = searchInput.value;
				applyFilterAndRender();
			}, 90);
		});

		// Sort wiring.
		sortBtns.forEach((btn) => {
			btn.addEventListener('click', () => {
				const mode = btn.dataset.sort;
				if (state.sortMode === mode) return;
				state.sortMode = mode;
				sortBtns.forEach((b) => b.classList.toggle('is-active', b === btn));
				applyFilterAndRender();
			});
		});

		// Hint dismiss.
		hintDismiss.addEventListener('click', () => {
			hintEl.classList.add('is-hidden');
			try { localStorage.setItem('vz-hint-dismissed', '1'); } catch {}
		});
		try {
			if (localStorage.getItem('vz-hint-dismissed') === '1') hintEl.classList.add('is-hidden');
		} catch {}

		// ── data loading ─────────────────────────────────────────────
		let refreshTimer = null;
		let nextRefreshAt = 0;
		let firstLoad = true;

		function scheduleNextRefresh() {
			clearInterval(refreshTimer);
			nextRefreshAt = Date.now() + REFRESH_INTERVAL_MS;
			updateCountdown();
			refreshTimer = setInterval(() => {
				const remaining = Math.max(0, nextRefreshAt - Date.now());
				updateCountdown();
				if (remaining <= 0) {
					loadData(true);
				}
			}, 1000);
		}

		function updateCountdown() {
			const remaining = Math.max(0, Math.ceil((nextRefreshAt - Date.now()) / 1000));
			countdownEl.textContent = remaining + 's';
		}

		async function loadData(silent = false) {
			if (!silent) {
				statusEl.dataset.state = 'loading';
				statusText.textContent = 'Loading trending tokens…';
				countdownEl.textContent = '…';
			}
			refreshBtn.disabled = true;
			errorEl.hidden = true;
			try {
				const resp = await fetch(TRENDING_API, { headers: { accept: 'application/json' } });
				if (!resp.ok) throw new Error(`API returned ${resp.status}`);
				const payload = await resp.json();
				// Rich trending is wrapped as { data: [...] }; tolerate a bare array
				// too so the viewer survives any future shape change upstream.
				const data = Array.isArray(payload) ? payload
					: Array.isArray(payload?.data) ? payload.data
					: [];
				if (!data.length) throw new Error('No trending tokens returned');

				state.all = data;
				const sorted = sortTokens(state.all, state.sortMode);
				placeTokens(sorted);
				applyFilterAndRender();
				updateStats();
				statusEl.dataset.state = 'ready';
				refreshBtn.disabled = false;
				controlsEl.hidden = false;

				if (firstLoad) {
					firstLoad = false;
					introEl.classList.add('is-hidden');
					setTimeout(() => { introEl.remove(); }, 900);
					startIntroFlyIn();
				}

				scheduleNextRefresh();
			} catch (err) {
				console.error('[pump-visualizer] load failed', err);
				statusEl.dataset.state = 'error';
				statusText.textContent = 'Failed to load';
				refreshBtn.disabled = false;
				countdownEl.textContent = '!';
				errorMessage.textContent = err.message || 'Unknown error';
				errorEl.hidden = false;
				introEl.classList.add('is-hidden');
			}
		}

		refreshBtn.addEventListener('click', () => {
			if (refreshBtn.disabled) return;
			clearSelection();
			loadData();
		});
		errorRetry.addEventListener('click', () => loadData());

		// Pause auto-refresh / live feed when tab is hidden; resume on focus.
		document.addEventListener('visibilitychange', () => {
			const isStream = state.mode === 'feed' || state.mode === 'migrations';
			if (document.hidden) {
				clearInterval(refreshTimer);
				if (isStream) {
					disconnectFeed();
					clearInterval(state.feed.statsTimer);
					state.feed.statsTimer = null;
				}
			} else if (isStream) {
				connectFeed();
				clearInterval(state.feed.statsTimer);
				tickFeedStats();
				state.feed.statsTimer = setInterval(tickFeedStats, STATS_INTERVAL_MS);
			} else if (nextRefreshAt && !firstLoad) {
				if (Date.now() >= nextRefreshAt) loadData(true);
				else scheduleNextRefresh();
			}
		});

		// Boot in live-firehose mode.
		enterFeedMode();
	</script>

	<script src="/brand.js" defer></script>
</body>
</html>
