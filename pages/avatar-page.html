<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<title>Avatar Studio · three.ws</title>
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<meta name="theme-color" content="#000000" />
		<link rel="icon" href="/favicon.ico" sizes="any" />
		<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
		<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
		<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
		<link rel="apple-touch-icon" href="/apple-touch-icon.png" />
		<link rel="manifest" href="/site.webmanifest" />
		<link rel="stylesheet" href="/style.css" />
		<link rel="stylesheet" href="/footer.css" />
		<link rel="stylesheet" href="/nav.css" />
		<script defer src="/footer-newsletter.js"></script>
		<link rel="stylesheet" href="/fonts/fonts.css" />
		<link rel="stylesheet" href="/mobile.css" />
		<script
			type="module"
			src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"
		></script>

		<meta property="og:type" content="website" />
		<meta property="og:site_name" content="three.ws" />
		<meta property="og:url" content="" id="og-url" />
		<meta property="og:title" content="Avatar — three.ws" id="og-title" />
		<meta property="og:description" content="A 3D avatar on three.ws" id="og-description" />
		<meta property="og:image" content="https://three.ws/og-image.png" id="og-image" />
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:title" content="Avatar — three.ws" id="tw-title" />
		<meta name="twitter:description" content="A 3D avatar on three.ws" id="tw-description" />

		<style>
			:root {
				--bg: #0a0a0a;
				--panel: #111;
				--panel-2: #161616;
				--border: #1f1f1f;
				--border-2: #2a2a2a;
				--text: #fafafa;
				--text-2: #a1a1aa;
				--text-3: #71717a;
				--accent: #ffffff;
				--accent-2: #ffffff;
				--success: #e8e8e8;
				--warn: #fbbf24;
				--radius: 14px;
			}

			html, body {
				margin: 0;
				background: var(--bg);
				color: var(--text);
				font-family: 'Inter', system-ui, sans-serif;
				-webkit-font-smoothing: antialiased;
			}
			body {
				display: flex;
				flex-direction: column;
				min-height: 100vh;
			}
			a { color: inherit; }

			/* ── Top action bar ────────────────────────────────── */
			.av-actionbar {
				display: flex;
				align-items: center;
				justify-content: space-between;
				gap: 12px;
				padding: 12px 24px;
				border-bottom: 1px solid var(--border);
				background: rgba(10, 10, 10, 0.85);
				backdrop-filter: blur(8px);
				position: sticky;
				top: 0;
				z-index: 20;
			}
			.av-back {
				display: inline-flex;
				align-items: center;
				gap: 8px;
				color: var(--text-2);
				text-decoration: none;
				font-size: 13px;
			}
			.av-back:hover { color: var(--text); }
			.av-actionbar-center {
				flex: 1 1 auto;
				display: flex;
				justify-content: center;
				min-width: 0;
			}
			.av-actionbar-center:empty { display: none; }
			@media (max-width: 600px) {
				.av-actionbar-center { order: 3; flex-basis: 100%; margin-top: 10px; }
			}
			.av-share-group {
				display: inline-flex;
				gap: 6px;
			}
			.av-share-btn {
				background: transparent;
				border: 1px solid var(--border-2);
				color: var(--text-2);
				padding: 6px 12px;
				border-radius: 8px;
				cursor: pointer;
				font-size: 12px;
				font-family: inherit;
				transition: color 0.15s, border-color 0.15s;
			}
			.av-share-btn:hover { color: var(--text); border-color: var(--text-3); }
			.av-share-btn.copied {
				color: var(--success);
				border-color: var(--success);
			}

			/* ── Layout ───────────────────────────────────────── */
			.av-shell {
				display: grid;
				grid-template-columns: minmax(0, 1.5fr) minmax(380px, 1fr);
				gap: 0;
				min-height: calc(100vh - 56px);
			}

			.av-stage-col {
				border-right: 1px solid var(--border);
				display: flex;
				flex-direction: column;
				min-height: 0;
			}
			.av-stage {
				flex: 1;
				min-height: 560px;
				background:
					radial-gradient(ellipse at 50% 35%, rgba(255, 255, 255, 0.03), transparent 60%),
					radial-gradient(ellipse at 70% 80%, rgba(255, 255, 255, 0.02), transparent 50%),
					var(--bg);
				position: relative;
			}
			.av-stage model-viewer {
				width: 100%;
				height: 100%;
				background: transparent;
				--poster-color: transparent;
			}
			.av-stage-loading {
				position: absolute;
				inset: 0;
				display: flex;
				align-items: center;
				justify-content: center;
				color: var(--text-3);
				font-size: 13px;
				pointer-events: none;
			}

			.av-meta-strip {
				display: flex;
				gap: 18px;
				padding: 14px 24px;
				border-top: 1px solid var(--border);
				background: var(--panel);
				font-size: 12px;
				color: var(--text-2);
				flex-wrap: wrap;
			}
			.av-meta-item { display: flex; flex-direction: column; gap: 1px; }
			.av-meta-key { font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-3); }
			.av-meta-val { color: var(--text); font-weight: 500; }

			/* ── Sidebar (right column) ───────────────────────── */
			.av-side {
				display: flex;
				flex-direction: column;
				min-height: 0;
			}
			.av-side-head {
				padding: 22px 24px 16px;
				border-bottom: 1px solid var(--border);
			}
			.av-eyebrow {
				display: inline-flex;
				align-items: center;
				gap: 7px;
				font-family: var(--font-display);
				font-size: 10px;
				letter-spacing: 0.18em;
				text-transform: uppercase;
				color: var(--accent);
				font-weight: 600;
				padding: 3px 9px;
				border: 1px solid rgba(255, 255, 255, 0.3);
				border-radius: 999px;
				background: rgba(255, 255, 255, 0.07);
			}
			.av-eyebrow-help {
				color: rgba(255, 255, 255, 0.65);
				text-decoration: none;
				border-left: 1px solid rgba(255, 255, 255, 0.3);
				padding-left: 7px;
				font-size: 11px;
				letter-spacing: 0;
				cursor: help;
			}
			.av-eyebrow-help:hover { color: var(--text); }
			.av-source-tag {
				font-size: 11px;
				color: var(--text-3);
				margin: 8px 0 0;
				letter-spacing: 0.02em;
			}
			.av-name {
				font-family: var(--font-display);
				font-size: 28px;
				font-weight: 700;
				color: var(--text);
				margin: 6px 0 4px;
				line-height: 1.1;
				letter-spacing: -0.01em;
				word-break: break-word;
			}
			.av-by {
				font-size: 13px;
				color: var(--text-3);
				margin: 0 0 10px;
			}
			.av-by a { color: var(--accent-2); text-decoration: none; }
			.av-by a:hover { color: var(--text); }
			.av-tags {
				display: flex;
				flex-wrap: wrap;
				gap: 5px;
				margin-top: 8px;
			}
			.av-tag {
				font-size: 11px;
				padding: 3px 9px;
				border-radius: 999px;
				background: rgba(255, 255, 255, 0.08);
				border: 1px solid rgba(255, 255, 255, 0.2);
				color: rgba(255, 255, 255, 0.9);
			}

			.av-cta-talk-row {
				padding: 16px 24px 0;
				display: flex;
				flex-direction: column;
				gap: 8px;
				align-items: stretch;
			}
			.av-cta-talk {
				width: 100%;
				background: #ffffff;
				color: #000000;
				border: 0;
				border-radius: 12px;
				padding: 14px 18px;
				font-family: inherit;
				font-size: 15px;
				font-weight: 700;
				letter-spacing: -0.01em;
				cursor: pointer;
				display: inline-flex;
				align-items: center;
				justify-content: center;
				gap: 10px;
				transition: transform 0.1s, box-shadow 0.2s;
				box-shadow: 0 6px 24px -8px rgba(255, 255, 255, 0.45);
			}
			.av-cta-talk:hover {
				transform: translateY(-1px);
				box-shadow: 0 10px 32px -8px rgba(255, 255, 255, 0.5);
			}
			.av-cta-talk-dot {
				display: inline-block;
				width: 8px; height: 8px;
				border-radius: 999px;
				background: #ef4444;
				box-shadow: 0 0 0 4px rgba(239, 68, 68, 0.18);
				animation: av-cta-talk-pulse 2s ease-in-out infinite;
			}
			@keyframes av-cta-talk-pulse {
				0%, 100% { transform: scale(1); }
				50%       { transform: scale(1.25); }
			}
			.av-cta-row {
				display: grid;
				grid-template-columns: repeat(3, 1fr);
				gap: 8px;
				padding: 16px 24px;
				border-bottom: 1px solid var(--border);
			}
			@media (max-width: 480px) {
				.av-cta-row {
					grid-template-columns: 1fr;
				}
			}
			.av-cta {
				background: var(--text);
				color: #000;
				border: 0;
				border-radius: 10px;
				padding: 10px 12px;
				font-size: 13px;
				font-weight: 600;
				font-family: inherit;
				cursor: pointer;
				text-align: center;
				text-decoration: none;
				transition: transform 0.1s;
			}
			.av-cta:hover { transform: translateY(-1px); }
			.av-cta-sec {
				background: transparent;
				border: 1px solid var(--border-2);
				color: var(--text);
				border-radius: 10px;
				padding: 10px 12px;
				font-size: 13px;
				font-weight: 500;
				font-family: inherit;
				cursor: pointer;
				text-align: center;
				text-decoration: none;
				transition: border-color 0.15s, color 0.15s;
			}
			.av-cta-sec:hover { border-color: var(--text-2); }

			/* ── AR row ──────────────────────────────────── */
			.av-ar-row {
				display: flex;
				justify-content: center;
				padding: 0 24px 12px;
			}
			.av-ar-btn {
				display: inline-flex;
				align-items: center;
				gap: 6px;
				padding: 9px 18px;
				background: linear-gradient(135deg, rgba(255,255,255,0.10) 0%, rgba(255,255,255,0.10) 100%);
				border: 1px solid rgba(255,255,255,0.28);
				border-radius: 999px;
				color: var(--accent);
				font-size: 13px;
				font-weight: 600;
				font-family: inherit;
				text-decoration: none;
				cursor: pointer;
				transition: background 0.15s, border-color 0.15s, box-shadow 0.2s;
				letter-spacing: 0.01em;
			}
			.av-ar-btn:hover {
				background: linear-gradient(135deg, rgba(255,255,255,0.18) 0%, rgba(255,255,255,0.18) 100%);
				border-color: rgba(255,255,255,0.5);
				box-shadow: 0 0 18px -4px rgba(255,255,255,0.3);
			}

			/* ── Owner actions row ───────────────────────── */
			.av-owner-row {
				display: flex;
				gap: 6px;
				padding: 0 24px 14px;
				flex-wrap: wrap;
			}
			.av-owner-btn {
				display: inline-flex;
				align-items: center;
				gap: 5px;
				padding: 7px 11px;
				background: transparent;
				border: 1px solid var(--border-2);
				border-radius: 8px;
				color: var(--text-2);
				font-size: 12px;
				font-weight: 500;
				font-family: inherit;
				cursor: pointer;
				text-decoration: none;
				transition: border-color 0.15s, color 0.15s, background 0.15s;
				white-space: nowrap;
			}
			.av-owner-btn:hover {
				border-color: var(--text-3);
				color: var(--text);
				background: rgba(255,255,255,0.04);
			}
			.av-owner-btn svg { flex-shrink: 0; }

			/* ── Pump.fun launch modal ────────────────────── */
			.av-pump-backdrop {
				position: fixed;
				inset: 0;
				background: rgba(0,0,0,0.72);
				backdrop-filter: blur(6px);
				display: flex;
				align-items: center;
				justify-content: center;
				z-index: 9999;
				padding: 1rem;
			}
			.av-pump-modal {
				width: 100%;
				max-width: 480px;
				max-height: 90vh;
				overflow-y: auto;
				background: #111;
				border: 1px solid var(--border-2);
				border-radius: 16px;
				display: flex;
				flex-direction: column;
				box-shadow: 0 24px 60px rgba(0,0,0,0.5);
			}
			.av-pump-header {
				display: flex;
				align-items: center;
				justify-content: space-between;
				padding: 14px 18px 12px;
				border-bottom: 1px solid var(--border);
				flex-shrink: 0;
			}
			.av-pump-title {
				font-size: 14px;
				font-weight: 600;
				color: var(--text);
			}
			.av-pump-close {
				background: transparent;
				border: 1px solid var(--border-2);
				color: var(--text-3);
				width: 26px;
				height: 26px;
				border-radius: 50%;
				cursor: pointer;
				font-size: 16px;
				line-height: 1;
				display: flex;
				align-items: center;
				justify-content: center;
				font-family: inherit;
				transition: color 0.15s, border-color 0.15s;
			}
			.av-pump-close:hover { color: var(--text); border-color: var(--text-3); }
			.av-pump-inner {
				padding: 18px;
				flex: 1;
			}

			/* Download menu — anchored to #av-download */
			.av-download-menu {
				position: absolute;
				z-index: 60;
				width: 280px;
				background: var(--bg-1, #101010);
				border: 1.5px solid var(--border-2, #202020);
				border-radius: 12px;
				padding: 6px;
				box-shadow: 0 14px 40px rgba(0, 0, 0, 0.55);
				display: flex;
				flex-direction: column;
				gap: 2px;
				animation: avDlFadeIn 0.16s ease-out;
			}
			@keyframes avDlFadeIn {
				from { opacity: 0; transform: translateY(-4px); }
				to   { opacity: 1; transform: translateY(0); }
			}
			.av-download-menu button {
				appearance: none;
				background: transparent;
				border: 1px solid transparent;
				color: var(--text, #eee);
				font: inherit;
				text-align: left;
				padding: 9px 10px;
				border-radius: 8px;
				cursor: pointer;
				display: flex;
				flex-direction: column;
				gap: 2px;
				transition: background 0.12s, border-color 0.12s;
			}
			.av-download-menu button:hover {
				background: rgba(255, 255, 255, 0.07);
				border-color: rgba(255, 255, 255, 0.3);
			}
			.av-download-menu button strong {
				font-size: 13.5px;
				font-weight: 600;
			}
			.av-download-menu button span {
				font-size: 11.5px;
				color: var(--text-3, #8a8d98);
				line-height: 1.35;
			}
			.av-download-status {
				font-size: 11.5px;
				color: var(--text-3, #8a8d98);
				padding: 4px 10px 2px;
				min-height: 1em;
			}
			.av-download-status[data-tone='busy'] { color: #b9c0ff; }
			.av-download-status[data-tone='ok']   { color: #ffffff; }
			.av-download-status[data-tone='err']  { color: #ffb3b3; }

			/* ── Tabs ────────────────────────────────────────── */
			.av-tabs {
				display: flex;
				gap: 0;
				border-bottom: 1px solid var(--border);
				padding: 0 8px;
				overflow-x: auto;
				background: var(--panel);
			}
			.av-tab {
				background: transparent;
				border: 0;
				color: var(--text-3);
				padding: 12px 14px;
				font-size: 13px;
				font-weight: 500;
				cursor: pointer;
				font-family: inherit;
				border-bottom: 2px solid transparent;
				transition: color 0.15s, border-color 0.15s;
				white-space: nowrap;
			}
			.av-tab:hover { color: var(--text-2); }
			.av-tab.active {
				color: var(--text);
				border-color: var(--text);
			}

			.av-panels {
				flex: 1;
				min-height: 0;
				overflow-y: auto;
			}
			.av-panel { display: none; padding: 20px 24px; }
			.av-panel.active { display: block; }

			/* ── Overview panel ──────────────────────────────── */
			.av-desc {
				font-size: 14px;
				color: var(--text-2);
				line-height: 1.6;
				margin: 0;
				white-space: pre-wrap;
			}
			.av-attribution {
				margin-top: 18px;
				padding: 12px 14px;
				background: var(--panel);
				border: 1px solid var(--border);
				border-radius: 10px;
				font-size: 12px;
				color: var(--text-3);
				display: flex;
				flex-direction: column;
				gap: 4px;
			}
			.av-attribution strong { color: var(--text-2); font-weight: 500; }
			.av-attribution a { color: var(--accent); text-decoration: none; }
			.av-attribution a:hover { color: var(--text); }

			/* ── Chat panel ──────────────────────────────────── */
			.av-chat {
				display: flex;
				flex-direction: column;
				height: 100%;
				min-height: 380px;
				gap: 0;
			}
			.av-chat-modelbar {
				display: flex;
				align-items: center;
				gap: 8px;
				padding: 6px 0 10px;
				border-bottom: 1px solid var(--border);
			}
			.av-chat-modellabel {
				font-size: 11px;
				letter-spacing: 0.06em;
				text-transform: uppercase;
				color: var(--text-3);
			}
			.av-chat-model {
				flex: 1;
				background: var(--panel);
				border: 1px solid var(--border-2);
				color: var(--text);
				border-radius: 8px;
				padding: 6px 8px;
				font-family: inherit;
				font-size: 13px;
				outline: none;
				cursor: pointer;
			}
			.av-chat-model:focus { border-color: var(--accent); }
			.av-chat-ibm {
				display: none;
				align-items: center;
				gap: 6px;
				font-size: 11px;
				font-weight: 600;
				letter-spacing: 0.01em;
				color: var(--text);
				background: var(--panel);
				border: 1px solid var(--border-2);
				border-radius: 999px;
				padding: 4px 10px;
				white-space: nowrap;
			}
			.av-chat-ibm[data-on="1"] { display: inline-flex; }
			.av-chat-ibm-dot {
				width: 7px;
				height: 7px;
				border-radius: 50%;
				background: #0f62fe;
				box-shadow: 0 0 0 3px color-mix(in srgb, #0f62fe 25%, transparent);
			}
			.av-chat-log {
				flex: 1;
				min-height: 240px;
				overflow-y: auto;
				padding: 4px 0 12px;
				display: flex;
				flex-direction: column;
				gap: 10px;
			}
			.av-chat-msg {
				max-width: 85%;
				padding: 10px 13px;
				border-radius: 12px;
				font-size: 14px;
				line-height: 1.5;
				white-space: pre-wrap;
				word-wrap: break-word;
			}
			.av-chat-msg.user {
				align-self: flex-end;
				background: rgba(255, 255, 255, 0.12);
				border: 1px solid rgba(255, 255, 255, 0.25);
				color: var(--text);
			}
			.av-chat-msg.assistant {
				align-self: flex-start;
				background: var(--panel);
				border: 1px solid var(--border);
				color: var(--text);
			}
			.av-chat-msg.assistant .av-chat-cursor {
				display: inline-block;
				width: 7px;
				height: 14px;
				vertical-align: -2px;
				background: var(--accent);
				margin-left: 2px;
				animation: av-blink 1s steps(2, start) infinite;
			}
			@keyframes av-blink { 0%, 50% { opacity: 1; } 50.01%, 100% { opacity: 0; } }
			.av-chat-empty {
				align-self: center;
				font-size: 13px;
				color: var(--text-3);
				text-align: center;
				padding: 32px 0;
			}
			.av-chat-empty strong { color: var(--text); display: block; margin-bottom: 4px; }
			.av-chat-form {
				display: flex;
				gap: 8px;
				padding-top: 10px;
				border-top: 1px solid var(--border);
			}
			.av-chat-input {
				flex: 1;
				background: var(--panel);
				border: 1px solid var(--border-2);
				border-radius: 10px;
				padding: 10px 12px;
				color: var(--text);
				font-family: inherit;
				font-size: 14px;
				outline: none;
				resize: none;
				min-height: 40px;
				max-height: 120px;
			}
			.av-chat-input:focus { border-color: var(--accent); }
			.av-chat-send {
				background: var(--text);
				color: #000;
				border: 0;
				border-radius: 10px;
				padding: 0 16px;
				font-weight: 600;
				font-size: 13px;
				cursor: pointer;
				font-family: inherit;
			}
			.av-chat-send:disabled { opacity: 0.4; cursor: default; }
			.av-chat-mic {
				background: var(--panel);
				border: 1px solid var(--border-2);
				color: var(--text-2);
				border-radius: 10px;
				width: 40px;
				height: 40px;
				cursor: pointer;
				font-size: 16px;
				font-family: inherit;
				transition: border-color 0.15s, background 0.15s, color 0.15s;
			}
			.av-chat-mic:hover { border-color: var(--text-3); color: var(--text); }
			.av-chat-mic.listening {
				background: rgba(244, 63, 94, 0.16);
				border-color: rgba(244, 63, 94, 0.6);
				color: #f43f5e;
				animation: av-mic-pulse 1.2s ease-in-out infinite;
			}
			@keyframes av-mic-pulse {
				0%, 100% { box-shadow: 0 0 0 0 rgba(244, 63, 94, 0.4); }
				50% { box-shadow: 0 0 0 6px rgba(244, 63, 94, 0); }
			}
			.av-row-disabled { opacity: 0.5; }
			.av-row-disabled .av-row-action { cursor: not-allowed; }

			/* ── Thought bubble (hotspot above avatar) ────────── */
			#av-hotspot-thought {
				--min-hotspot-opacity: 0;
				background: none !important;
				border: none !important;
				box-shadow: none !important;
				width: 0 !important;
				height: 0 !important;
				pointer-events: none;
			}
			.av-thought-bubble {
				position: absolute;
				bottom: 12px;
				left: 50%;
				transform: translateX(-50%) scale(0.92);
				transform-origin: bottom center;
				background: rgba(10, 10, 10, 0.92);
				backdrop-filter: blur(16px);
				-webkit-backdrop-filter: blur(16px);
				border: 1px solid rgba(255, 255, 255, 0.13);
				border-radius: 16px;
				padding: 12px 16px;
				max-width: 300px;
				min-width: 48px;
				font-size: 13px;
				line-height: 1.55;
				color: var(--text);
				white-space: pre-wrap;
				word-wrap: break-word;
				opacity: 0;
				transition: opacity 0.3s ease, transform 0.3s ease;
				pointer-events: none;
				box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
			}
			.av-thought-bubble.visible {
				opacity: 1;
				transform: translateX(-50%) scale(1);
				pointer-events: auto;
			}
			.av-thought-bubble::after {
				content: '';
				position: absolute;
				bottom: -7px;
				left: 50%;
				transform: translateX(-50%);
				width: 0;
				height: 0;
				border-left: 7px solid transparent;
				border-right: 7px solid transparent;
				border-top: 7px solid rgba(10, 10, 10, 0.92);
			}
			.av-thought-content {
				max-height: 150px;
				overflow: hidden;
				position: relative;
			}
			.av-thought-bubble.overflow .av-thought-content::after {
				content: '';
				position: absolute;
				bottom: 0;
				left: 0;
				right: 0;
				height: 28px;
				background: linear-gradient(transparent, rgba(10, 10, 10, 0.92));
				pointer-events: none;
			}
			.av-thinking-dots {
				display: flex;
				gap: 5px;
				padding: 2px 6px;
				justify-content: center;
			}
			.av-thinking-dots span {
				width: 6px;
				height: 6px;
				border-radius: 50%;
				background: var(--text-2);
				animation: av-dot-bounce 1.4s ease-in-out infinite;
			}
			.av-thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
			.av-thinking-dots span:nth-child(3) { animation-delay: 0.4s; }
			@keyframes av-dot-bounce {
				0%, 80%, 100% { transform: translateY(0); opacity: 0.35; }
				40% { transform: translateY(-5px); opacity: 1; }
			}
			.av-thought-cursor {
				display: inline-block;
				width: 6px;
				height: 13px;
				vertical-align: -1px;
				background: var(--accent);
				margin-left: 2px;
				animation: av-blink 1s steps(2, start) infinite;
			}

			/* ── Skills / Plugins panel ──────────────────────── */
			.av-list {
				display: flex;
				flex-direction: column;
				gap: 8px;
			}
			.av-row {
				display: flex;
				justify-content: space-between;
				align-items: center;
				gap: 12px;
				padding: 12px 14px;
				background: var(--panel);
				border: 1px solid var(--border);
				border-radius: 10px;
				transition: border-color 0.15s;
			}
			.av-row:hover { border-color: var(--border-2); }
			.av-row-main { min-width: 0; flex: 1; }
			.av-row-title {
				font-size: 13px;
				font-weight: 600;
				color: var(--text);
				margin: 0 0 2px;
				white-space: nowrap;
				overflow: hidden;
				text-overflow: ellipsis;
			}
			.av-row-sub {
				font-size: 11px;
				color: var(--text-3);
				margin: 0;
			}
			.av-row-action {
				background: transparent;
				border: 1px solid var(--border-2);
				color: var(--text-2);
				padding: 5px 10px;
				border-radius: 7px;
				font-size: 11px;
				font-family: inherit;
				font-weight: 600;
				cursor: pointer;
				flex-shrink: 0;
			}
			.av-row-action.active {
				background: var(--text);
				color: #000;
				border-color: var(--text);
			}
			.av-row-action:hover { border-color: var(--text-2); color: var(--text); }
			.av-row-action.active:hover { color: #000; }
			.av-list-loading {
				color: var(--text-3);
				font-size: 13px;
				text-align: center;
				padding: 24px 0;
			}

			.av-attached {
				margin-top: 18px;
				padding: 12px 14px;
				background: rgba(255, 255, 255, 0.05);
				border: 1px solid rgba(255, 255, 255, 0.18);
				border-radius: 10px;
				font-size: 12px;
				color: rgba(255, 255, 255, 0.9);
			}
			.av-attached-list {
				display: flex;
				gap: 6px;
				flex-wrap: wrap;
				margin-top: 6px;
			}
			.av-attached-pill {
				background: rgba(255, 255, 255, 0.1);
				color: rgba(255, 255, 255, 1);
				border-radius: 999px;
				padding: 2px 8px;
				font-size: 10px;
				font-weight: 600;
			}

			/* ── Used by (agents wearing this body) ──────────── */
			.av-used-by {
				margin-top: 18px;
				padding-top: 16px;
				border-top: 1px solid var(--border);
			}
			.av-used-by-heading {
				font-size: 11px;
				text-transform: uppercase;
				letter-spacing: 0.08em;
				color: var(--text-3);
				margin: 0 0 10px;
				font-weight: 600;
			}
			.av-used-by-grid {
				display: grid;
				grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
				gap: 8px;
			}
			.av-used-by-card {
				display: flex;
				align-items: center;
				gap: 10px;
				padding: 8px 10px;
				background: var(--panel);
				border: 1px solid var(--border);
				border-radius: 10px;
				text-decoration: none;
				color: inherit;
				transition: border-color 0.15s, transform 0.15s;
			}
			.av-used-by-card:hover {
				border-color: var(--text-3);
				transform: translateY(-1px);
			}
			.av-used-by-thumb {
				flex: 0 0 32px;
				width: 32px;
				height: 32px;
				border-radius: 50%;
				object-fit: cover;
				background: var(--panel-2);
			}
			.av-used-by-thumb--placeholder {
				display: grid;
				place-items: center;
				color: var(--text-3);
				font-size: 13px;
				font-weight: 600;
				font-family: var(--font-display);
			}
			.av-used-by-meta {
				min-width: 0;
				display: flex;
				flex-direction: column;
				gap: 2px;
			}
			.av-used-by-name {
				font-size: 12px;
				font-weight: 600;
				color: var(--text);
				white-space: nowrap;
				overflow: hidden;
				text-overflow: ellipsis;
			}
			.av-used-by-badge {
				font-size: 9px;
				letter-spacing: 0.08em;
				text-transform: uppercase;
				color: var(--success);
				font-weight: 600;
			}

			/* ── Embed panel ─────────────────────────────────── */
			.av-embed-section { margin-bottom: 18px; }
			.av-embed-label {
				display: flex;
				justify-content: space-between;
				align-items: center;
				margin-bottom: 6px;
				font-size: 11px;
				text-transform: uppercase;
				letter-spacing: 0.06em;
				color: var(--text-3);
			}
			.av-embed-code {
				background: #050505;
				border: 1px solid var(--border);
				border-radius: 10px;
				padding: 12px 14px;
				font-family: ui-monospace, 'SF Mono', monospace;
				font-size: 12px;
				color: var(--text-2);
				overflow-x: auto;
				white-space: pre;
				line-height: 1.5;
			}
			.av-embed-copy {
				background: transparent;
				border: 1px solid var(--border-2);
				color: var(--text-2);
				padding: 3px 9px;
				border-radius: 6px;
				font-size: 10px;
				font-weight: 600;
				cursor: pointer;
				font-family: inherit;
			}
			.av-embed-copy:hover { color: var(--text); border-color: var(--text-3); }
			.av-embed-copy.copied { color: var(--success); border-color: var(--success); }

			/* ── Related row ─────────────────────────────────── */
			.av-related {
				border-top: 1px solid var(--border);
				padding: 24px;
			}
			.av-related h2 {
				font-family: var(--font-display);
				font-size: 16px;
				font-weight: 600;
				margin: 0 0 12px;
				color: var(--text);
			}
			.av-related-grid {
				display: grid;
				grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
				gap: 12px;
			}
			.av-related-card {
				background: var(--panel);
				border: 1px solid var(--border);
				border-radius: 12px;
				overflow: hidden;
				cursor: pointer;
				text-decoration: none;
				color: inherit;
				transition: border-color 0.15s, transform 0.15s;
			}
			.av-related-card:hover {
				border-color: var(--border-2);
				transform: translateY(-1px);
			}
			.av-related-thumb {
				aspect-ratio: 1 / 1;
				background:
					radial-gradient(ellipse at center, rgba(255, 255, 255, 0.05), transparent 60%),
					var(--panel-2);
				position: relative;
			}
			.av-related-thumb model-viewer {
				width: 100%;
				height: 100%;
				background: transparent;
				--poster-color: transparent;
			}
			.av-related-info {
				padding: 10px 12px;
			}
			.av-related-name {
				font-size: 12px;
				font-weight: 600;
				color: var(--text);
				margin: 0;
				white-space: nowrap;
				overflow: hidden;
				text-overflow: ellipsis;
			}
			.av-related-author {
				font-size: 10px;
				color: var(--text-3);
				margin: 2px 0 0;
			}

			.av-error {
				padding: 80px 24px;
				text-align: center;
				color: var(--text-3);
				font-size: 14px;
			}

			/* ── Responsive ──────────────────────────────────── */
			@media (max-width: 980px) {
				.av-shell {
					grid-template-columns: 1fr;
				}
				.av-stage-col {
					border-right: 0;
					border-bottom: 1px solid var(--border);
				}
				.av-stage { min-height: 420px; }
			}
			@media (max-width: 600px) {
				.av-actionbar { padding: 10px 14px; flex-wrap: wrap; }
				.av-side-head, .av-cta-row { padding-left: 16px; padding-right: 16px; }
				.av-panel { padding: 16px; }
				.av-related { padding: 16px; }
				.av-name { font-size: 22px; }
			}
		</style>
	</head>
	<body>
		<header><div id="nav-container"></div></header>
		<script src="/nav.js"></script>

		<header class="av-actionbar">
			<a class="av-back" href="/marketplace">← Marketplace</a>
			<div class="av-actionbar-center" id="view-switch-slot"></div>
			<div class="av-share-group">
				<button class="av-share-btn" id="share-link">Copy link</button>
				<a class="av-share-btn" id="share-twitter" target="_blank" rel="noopener">Share on X</a>
			</div>
		</header>

		<main class="av-shell" id="av-shell">
			<div class="av-error" id="av-loading">Loading avatar…</div>
		</main>

		<section class="av-related" id="av-related" hidden>
			<h2>Related avatars</h2>
			<div class="av-related-grid" id="av-related-grid"></div>
		</section>

		<footer class="h-footer-horizon">
			<div class="h-footer-glow-line" aria-hidden="true"></div>
			<div class="h-footer-watermark" aria-hidden="true">three.ws</div>
			<div class="h-footer-inner">
				<div class="h-footer-brand-col">
					<div class="h-footer-brand">
						<img class="wordmark-logo" src="/three.svg" alt="" aria-hidden="true" />
						<span class="wordmark-dot" aria-hidden="true"></span>
						<span>three.ws</span>
					</div>
					<p class="h-footer-tagline">Give your AI a body.</p>
				</div>
				<nav class="h-footer-links" aria-label="Footer">
					<div class="h-footer-link-col">
						<h4 class="h-footer-link-heading">Product</h4>
						<a href="/create">Create</a>
						<a href="/studio">Studio</a>
						<a href="/marketplace">Marketplace</a>
					</div>
					<div class="h-footer-link-col">
						<h4 class="h-footer-link-heading">Developers</h4>
						<a href="/docs">Docs</a>
						<a href="https://github.com/nirholas/three.ws" target="_blank" rel="noopener">GitHub</a>
					</div>
				</nav>
			</div>
			<div class="h-footer-bottom">
				<p class="h-footer-legal">© 2026 three.ws — All rights reserved.</p>
				<div class="h-footer-legal-links">
					<a href="/legal/privacy">Privacy</a>
					<a href="/legal/tos">Terms</a>
				</div>
			</div>
		</footer>

		<script src="/src/avatar-page.js" type="module"></script>
		<script src="/brand.js" defer></script>
</body>
</html>
