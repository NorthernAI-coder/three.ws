<!doctype html>
<html lang="en" class="cv-page">
	<head>
		<script>/* three.ws theme boot — no-flash; runtime in /theme-switcher.js */(function(){try{var m=localStorage.getItem('twx_theme');var l=m==='auto'?(window.matchMedia&&window.matchMedia('(prefers-color-scheme: light)').matches):m==='light';document.documentElement.setAttribute('data-theme',l?'light':'dark');}catch(e){document.documentElement.setAttribute('data-theme','dark');}})();</script>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Coin · three.ws</title>
		<meta
			name="description"
			content="Live price, interactive chart, market stats, related news, and links for any cryptocurrency — a rich detail page for every coin."
		/>
		<meta property="og:type" content="website" />
		<meta property="og:site_name" content="three.ws" />
		<meta property="og:url" content="https://three.ws/coins" />
		<meta property="og:title" content="Coin · three.ws" />
		<meta
			property="og:description"
			content="Live price, interactive chart, market stats, related news, and links for any cryptocurrency."
		/>
		<meta property="og:image" content="https://three.ws/og-image.png" />
		<meta property="og:image:width" content="1200" />
		<meta property="og:image:height" content="630" />
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:site" content="@trythreews" />
		<meta name="twitter:title" content="Coin · three.ws" />
		<meta
			name="twitter:description"
			content="Live price, interactive chart, market stats, related news, and links for any cryptocurrency."
		/>
		<meta name="twitter:image" content="https://three.ws/og-image.png" />
		<meta name="theme-color" content="#09090b" />
		<link rel="icon" href="/favicon.ico" sizes="any" />
		<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
		<link rel="apple-touch-icon" href="/apple-touch-icon.png" />
		<link rel="manifest" href="/manifest.webmanifest" />
		<link rel="stylesheet" href="/fonts/fonts.css" />
		<link rel="stylesheet" href="/nav.css" />
		<link rel="stylesheet" href="/src/coin-pages.css" />
		<link rel="stylesheet" href="/footer.css" />
		<style>
			/* /coin/:id enrichment sections — same token/card system as coin-pages.css,
			   scoped here because only this page renders them. */

			/* ── Price performance matrix ── */
			.cv-perf-grid {
				display: grid;
				grid-template-columns: repeat(4, 1fr);
				gap: 0.5rem;
			}
			@media (min-width: 768px) {
				.cv-perf-grid {
					grid-template-columns: repeat(8, 1fr);
				}
			}
			.cv-perf-cell {
				border: 1px solid var(--cv-border);
				border-radius: var(--cv-radius-md);
				background: var(--cv-surface-2);
				padding: 0.625rem 0.375rem;
				text-align: center;
				display: flex;
				flex-direction: column;
				gap: 0.125rem;
				transition: border-color 0.15s, box-shadow 0.15s;
			}
			.cv-perf-cell:hover {
				border-color: var(--cv-border-hover);
				box-shadow: var(--cv-shadow-card);
			}
			.cv-perf-cell .win {
				font-size: 0.6875rem;
				font-weight: 500;
				letter-spacing: 0.04em;
				text-transform: uppercase;
				color: var(--cv-text-3);
			}
			.cv-perf-cell .val {
				font-size: 0.8125rem;
				font-weight: 600;
				color: var(--cv-text-2);
			}
			.cv-perf-cell.up {
				background: var(--cv-green-soft);
			}
			.cv-perf-cell.up .val {
				color: var(--cv-green);
			}
			.cv-perf-cell.down {
				background: var(--cv-red-soft);
			}
			.cv-perf-cell.down .val {
				color: var(--cv-red);
			}

			/* ── Supply bar ── */
			.cv-supply-card {
				background: var(--cv-surface);
				border: 1px solid var(--cv-border);
				border-radius: var(--cv-radius-lg);
				box-shadow: var(--cv-shadow-card);
				padding: 1.25rem;
			}
			.cv-supply-row {
				display: flex;
				flex-wrap: wrap;
				justify-content: space-between;
				gap: 0.5rem 1rem;
				font-size: 0.8125rem;
				color: var(--cv-text-2);
			}
			.cv-supply-track {
				height: 10px;
				border-radius: 999px;
				background: var(--cv-surface-3);
				overflow: hidden;
				margin: 0.625rem 0 0;
			}
			.cv-supply-fill {
				height: 100%;
				border-radius: 999px;
				background: var(--cv-accent);
				transition: width 0.4s ease;
			}
			.cv-supply-meta {
				display: flex;
				flex-wrap: wrap;
				gap: 0.375rem 1.5rem;
				margin-top: 0.875rem;
				font-size: 0.8125rem;
				color: var(--cv-text-3);
			}
			.cv-supply-meta strong {
				color: var(--cv-text);
				font-weight: 600;
			}
			.cv-supply-meta strong.cv-up {
				color: var(--cv-green);
			}
			.cv-supply-meta strong.cv-down {
				color: var(--cv-red);
			}

			/* ── ATH / ATL cards ── */
			.cv-extremes-grid {
				display: grid;
				gap: 0.75rem;
			}
			@media (min-width: 640px) {
				.cv-extremes-grid {
					grid-template-columns: repeat(2, 1fr);
				}
			}
			.cv-extreme {
				background: var(--cv-surface);
				border: 1px solid var(--cv-border);
				border-radius: var(--cv-radius-lg);
				box-shadow: var(--cv-shadow-card);
				padding: 1.25rem;
				transition: box-shadow 0.2s, border-color 0.2s;
			}
			.cv-extreme:hover {
				box-shadow: var(--cv-shadow-card-hover);
				border-color: var(--cv-border-hover);
			}
			.cv-extreme .label {
				font-size: 0.7rem;
				font-weight: 500;
				letter-spacing: 0.06em;
				text-transform: uppercase;
				color: var(--cv-text-3);
				margin: 0 0 0.25rem;
			}
			.cv-extreme .value {
				font-size: 1.375rem;
				font-weight: 700;
				color: var(--cv-text);
				margin: 0;
			}
			.cv-extreme .sub {
				font-size: 0.8125rem;
				color: var(--cv-text-3);
				margin: 0.25rem 0 0;
			}

			/* ── Sentiment vote split ── */
			.cv-sent-card {
				background: var(--cv-surface);
				border: 1px solid var(--cv-border);
				border-radius: var(--cv-radius-lg);
				box-shadow: var(--cv-shadow-card);
				padding: 1.25rem;
			}
			.cv-sent-row {
				display: flex;
				justify-content: space-between;
				gap: 1rem;
				font-size: 0.875rem;
				font-weight: 600;
				margin-bottom: 0.5rem;
			}
			.cv-sent-bar {
				display: flex;
				height: 10px;
				border-radius: 999px;
				overflow: hidden;
				background: var(--cv-surface-3);
			}
			.cv-sent-bar .up {
				background: var(--cv-green);
				transition: width 0.4s ease;
			}
			.cv-sent-bar .down {
				background: var(--cv-red);
				transition: width 0.4s ease;
			}
			.cv-sent-watch {
				font-size: 0.8125rem;
				color: var(--cv-text-3);
				margin: 0.875rem 0 0;
			}
			.cv-sent-watch strong {
				color: var(--cv-text);
				font-weight: 600;
			}

			/* ── Community & developer grids ── */
			.cv-dc-wrap {
				display: grid;
				gap: 2rem;
			}
			@media (min-width: 768px) {
				.cv-dc-wrap.two {
					grid-template-columns: 1fr 1fr;
					gap: 1.5rem;
				}
			}
			.cv-dc-grid {
				display: grid;
				grid-template-columns: repeat(2, 1fr);
				gap: 0.75rem;
			}
			@media (min-width: 640px) {
				.cv-dc-grid {
					grid-template-columns: repeat(3, 1fr);
				}
			}

			/* ── Markets (tickers) table ── */
			.cv-mkt-x {
				display: flex;
				align-items: center;
				gap: 0.5rem;
				color: inherit;
				text-decoration: none;
			}
			.cv-mkt-x img {
				width: 20px;
				height: 20px;
				border-radius: 50%;
				flex-shrink: 0;
				background: var(--cv-surface-3);
			}
			.cv-mkt-x .nm {
				font-weight: 500;
				color: var(--cv-text);
				max-width: 140px;
				overflow: hidden;
				text-overflow: ellipsis;
				white-space: nowrap;
			}
			a.cv-mkt-x:hover .nm,
			a.cv-mkt-x:focus-visible .nm {
				color: var(--cv-accent);
			}
			a.cv-mkt-x:focus-visible {
				outline: 2px solid var(--cv-accent);
				outline-offset: 2px;
				border-radius: var(--cv-radius-sm);
			}
			.cv-mkt-pair {
				color: var(--cv-text-2);
				text-decoration: none;
				transition: color 0.15s;
			}
			a.cv-mkt-pair:hover,
			a.cv-mkt-pair:focus-visible {
				color: var(--cv-accent);
			}
			a.cv-mkt-pair:focus-visible {
				outline: 2px solid var(--cv-accent);
				outline-offset: 2px;
				border-radius: var(--cv-radius-sm);
			}
			.cv-trust {
				display: inline-flex;
				align-items: center;
				gap: 0.375rem;
				font-size: 0.8125rem;
				color: var(--cv-text-2);
			}
			.cv-trust .dot {
				width: 8px;
				height: 8px;
				border-radius: 50%;
				flex-shrink: 0;
			}
			.cv-trust .dot.green {
				background: var(--cv-green);
			}
			.cv-trust .dot.yellow {
				background: #eab308; /* no yellow token in the cv palette */
			}
			.cv-trust .dot.red {
				background: var(--cv-red);
			}
			.cv-table tr.cv-stale td {
				opacity: 0.55;
			}
			.cv-mkt-error {
				border: 1px solid var(--cv-border);
				border-radius: var(--cv-radius-lg);
				background: var(--cv-surface);
				color: var(--cv-text-2);
				padding: 2rem 1.5rem;
				text-align: center;
				font-size: 0.875rem;
			}
			.cv-mkt-error button,
			.cv-load-more {
				appearance: none;
				cursor: pointer;
				font: inherit;
				font-weight: 600;
				color: var(--cv-text);
				background: var(--cv-surface-2);
				border: 1px solid var(--cv-border);
				border-radius: var(--cv-radius-md);
				padding: 0.5rem 1.125rem;
				transition: border-color 0.15s, background 0.15s;
			}
			.cv-load-more {
				display: block;
				margin: 1rem auto 0;
			}
			.cv-mkt-error button:hover,
			.cv-load-more:hover {
				border-color: var(--cv-border-hover);
				background: var(--cv-surface-3);
			}
			.cv-mkt-error button:focus-visible,
			.cv-load-more:focus-visible {
				outline: 2px solid var(--cv-accent);
				outline-offset: 2px;
			}
			.cv-load-more[disabled] {
				opacity: 0.6;
				cursor: default;
			}

			/* Sub-heading inside the community/developer split. */
			.cv-h3 {
				font-size: 0.8125rem;
				font-weight: 600;
				letter-spacing: 0.04em;
				text-transform: uppercase;
				color: var(--cv-text-3);
				margin: 0 0 0.75rem;
			}

			@media (prefers-reduced-motion: reduce) {
				.cv-perf-cell,
				.cv-extreme,
				.cv-supply-fill,
				.cv-sent-bar .up,
				.cv-sent-bar .down {
					transition: none;
				}
			}
		</style>
	</head>
	<body>
		<header><div id="nav-container"></div></header>
		<script src="/nav.js"></script>

		<main class="cv-container" id="cv-main" aria-busy="true">
			<!-- Breadcrumbs -->
			<nav class="cv-crumbs" aria-label="Breadcrumb">
				<a href="/">Home</a>
				<span class="sep" aria-hidden="true">›</span>
				<a href="/markets">Markets</a>
				<span class="sep" aria-hidden="true">›</span>
				<span class="here" id="cv-crumb-name">…</span>
			</nav>

			<!-- Coin header: icon, name, symbol, rank, price, change chips. -->
			<section id="cv-head" aria-label="Coin overview"></section>

			<!-- Interactive price chart with time-range selector. -->
			<section id="cv-chart" aria-label="Price chart"></section>

			<!-- Price performance matrix: 1h → 1y colored change cells. -->
			<section id="cv-perf" class="cv-section" aria-label="Price performance"></section>

			<!-- Market stats grid. -->
			<section id="cv-stats" class="cv-section" aria-label="Market stats"></section>

			<!-- Circulating vs max supply bar + Mkt Cap/FDV ratio. -->
			<section id="cv-supply" class="cv-section" aria-label="Supply"></section>

			<!-- ATH/ATL cards with drawdown and recovery multiple. -->
			<section id="cv-extremes" class="cv-section" aria-label="All-time high and low"></section>

			<!-- Bullish/bearish vote split + watchlist count. Hidden when unvoted. -->
			<section id="cv-sentiment" class="cv-section" aria-label="Community sentiment"></section>

			<!-- Community followings + developer repo activity. Hidden when untracked. -->
			<section id="cv-devcom" class="cv-section" aria-label="Community and developer activity"></section>

			<!-- Exchange listings table from /api/coin/tickers, paginated. -->
			<section id="cv-markets" class="cv-section" aria-label="Markets"></section>

			<!-- Related news from the live aggregator. -->
			<section id="cv-news" class="cv-section" aria-label="Related news"></section>

			<!-- About / description. -->
			<section id="cv-about" class="cv-section" aria-label="About this coin"></section>

			<!-- Official links + explorers + contracts. -->
			<section id="cv-links" class="cv-section" aria-label="Links"></section>

			<p class="cv-updated" id="cv-updated" hidden></p>
		</main>

		<script type="module" src="/src/coin-page.js"></script>
		<script src="/brand.js" defer></script>
		<div id="footer-container"></div>
		<script src="/footer.js"></script>
	</body>
</html>
