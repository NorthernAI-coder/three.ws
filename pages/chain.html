<!doctype html>
<html lang="en" class="cv-page">
	<head>
		<script>
			/* three.ws theme boot — no-flash; runtime in /theme-switcher.js */ (function () {
				try {
					var m = localStorage.getItem('twx_theme');
					var l =
						m === 'auto'
							? window.matchMedia &&
								window.matchMedia('(prefers-color-scheme: light)').matches
							: m === 'light';
					document.documentElement.setAttribute('data-theme', l ? 'light' : 'dark');
				} catch (e) {
					document.documentElement.setAttribute('data-theme', 'dark');
				}
			})();
		</script>

		<meta name="viewport" content="width=device-width, initial-scale=1.0" />

			content="A rich profile for any blockchain — total value locked, dominance share, stablecoin supply, DEX volume, fees, and the top protocols deployed on the chain. Real DeFiLlama data, no API key."
		/>
