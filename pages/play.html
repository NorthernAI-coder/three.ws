<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<title>Play · Coin Communities — three.ws</title>
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
		/>
		<meta
			name="description"
			content="Coin Communities — a browser isometric MMO on three.ws. Join coin communities, gather, fight, trade, and explore a shared world. Sign in with your wallet and play."
		/>
		<meta name="theme-color" content="#060607" />

		<!--
			Multiplayer server URL — the deployed Colyseus host (Cloud Run).
			Local dev ignores this and uses ws://localhost:2567 automatically
			(see defaultServerUrl in src/game/community-net.js), so
			`npm run dev:walk-all` still works out of the box.
		-->
		<meta name="game-server" content="wss://three-ws-multiplayer-93741856042.us-central1.run.app" />

		<link rel="shortcut icon" href="/favicon.ico" />

		<meta property="og:type" content="website" />
		<meta property="og:site_name" content="three.ws" />
		<meta property="og:title" content="Play · Coin Communities" />
		<meta property="og:description" content="A browser isometric MMO on three.ws — join coin communities, gather, fight, trade, explore." />
		<meta property="og:url" content="https://three.ws/play" />

		<link rel="stylesheet" href="/src/game/coincommunities.css" />
	</head>
	<body>
		<div id="kx-loading">
			<div class="kx-loading-card">
				<img class="kx-loading-logo" src="/three.svg" alt="three.ws" width="38" height="38" />
				<div class="kx-loading-mark">COIN COMMUNITIES</div>
				<div class="kx-boot-stage">
					<canvas id="kx-boot-avatar" aria-hidden="true"></canvas>
					<div class="kx-boot-fallback" aria-hidden="true"></div>
				</div>
				<div class="kx-loading-sub">Joining the community…</div>
				<div class="kx-boot-bar" role="status" aria-label="Loading"><span></span></div>
			</div>
		</div>

		<canvas id="kx-canvas"></canvas>

		<script type="module" src="/src/game/boot-avatar.js"></script>
		<script type="module" src="/src/game/coincommunities.js"></script>
		<script type="module" src="/src/game/ambient-crowd.js"></script>
	</body>
</html>
