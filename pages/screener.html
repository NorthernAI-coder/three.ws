		<script>
			/* three.ws theme boot — no-flash; runtime in /theme-switcher.js */ (function () {
				try {
					var m = localStorage.getItem('twx_theme');
					var l =
						m === 'auto'
							? window.matchMedia &&
								window.matchMedia('(prefers-color-scheme: light)').matches
							: m === 'light';
					document.documentElement.setAttribute('data-theme', l ? 'light' : 'dark');
				} catch (e) {
					document.documentElement.setAttribute('data-theme', 'dark');
				}
			})();
		</script>

	<body>
		<header><div id="nav-container"></div></header>
		<script src="/nav.js"></script>

		<main class="cv-container">
			<nav class="cv-crumbs" aria-label="Breadcrumb">
				<a href="/coins">Markets</a><span class="sep">/</span
				><span class="here">Screener</span>
			</nav>
			<h1 class="cv-h1">Token Screener</h1>
			<p class="cv-sub">
				Filter the top 250 coins by market cap in real time — search by name, isolate
				gainers or losers, set floors on market cap and volume, then sort any column. Every
				row opens the full coin profile.
			</p>

			<!-- Filter controls. Wired by src/screener.js. -->
			<div class="scr-controls">
				<div class="cv-search" id="scr-search" style="max-width: 20rem">
					<span class="mag" aria-hidden="true">
						<svg
							viewBox="0 0 24 24"
							fill="none"
							stroke="currentColor"
							stroke-width="2"
							stroke-linecap="round"
							stroke-linejoin="round"
						>
							<circle cx="11" cy="11" r="8" />
							<path d="m21 21-4.3-4.3" />
						</svg>
					</span>
					<input
						id="scr-search-input"
						type="search"
						placeholder="Filter by name or symbol…"
						autocomplete="off"
						spellcheck="false"
						aria-label="Filter coins by name or symbol"
					/>
				</div>

				<div class="hm-seg" role="group" aria-label="Direction filter" id="scr-dir">
					<button type="button" data-dir="all" aria-pressed="true">All</button>
					<button type="button" data-dir="gainers" aria-pressed="false">Gainers</button>
					<button type="button" data-dir="losers" aria-pressed="false">Losers</button>
				</div>

				<label class="scr-field">
					<span>Min market cap</span>
					<select id="scr-mcap" aria-label="Minimum market cap">
						<option value="0">Any</option>
						<option value="10000000">$10M+</option>
						<option value="100000000">$100M+</option>
						<option value="1000000000">$1B+</option>
						<option value="10000000000">$10B+</option>
						<option value="100000000000">$100B+</option>
					</select>
				</label>

				<label class="scr-field">
					<span>Min 24h volume</span>
					<select id="scr-vol" aria-label="Minimum 24h volume">
						<option value="0">Any</option>
						<option value="1000000">$1M+</option>
						<option value="10000000">$10M+</option>
						<option value="100000000">$100M+</option>
						<option value="1000000000">$1B+</option>
					</select>
				</label>

				<button type="button" class="scr-reset" id="scr-reset">Reset</button>
			</div>

			<div class="scr-meta">
				<span id="scr-count" class="scr-count" aria-live="polite"></span>
				<div class="cv-pills">
					<a class="cv-pill" href="/coins">All Coins</a>
					<a class="cv-pill" href="/categories">Categories</a>
					<a class="cv-pill" href="/heatmap">Heatmap</a>
				</div>
			</div>

			<!-- Results table. Hydrated by src/screener.js. -->
			<section id="scr-table" aria-label="Screened cryptocurrencies"></section>
			<p class="cv-updated" id="scr-updated"></p>
		</main>

		<script type="module" src="/src/screener.js"></script>
		<script src="/brand.js" defer></script>
		<div id="footer-container"></div>
		<script src="/footer.js"></script>
