<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta http-equiv="X-UA-Compatible" content="IE=edge" />
		<title>Walk · three.ws</title>
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
		/>
		<meta name="author" content="nirholas" />
		<meta
			name="description"
			content="See a 3D agent walking on your real floor through your phone camera. Joystick or WASD. One-tap AR. Built on three.ws."
		/>
		<meta name="theme-color" content="#000000" />

		<!--
			Multiplayer server URL. Empty in dev — the page falls back to
			ws://<host>:2567 so `npm run dev:walk-all` works out of the box.
			In production, set this to the deployed Colyseus host once the
			multiplayer/ workspace is live (see multiplayer/README.md):
				<meta name="walk-server" content="wss://three-ws-multiplayer.fly.dev">
		-->
		<meta name="walk-server" content="" />

		<link rel="shortcut icon" href="/favicon.ico" />
		<link rel="stylesheet" href="/style.css" />
		<link rel="stylesheet" href="/footer.css" />
		<link rel="stylesheet" href="/nav.css" />
		<link rel="stylesheet" href="/fonts/fonts.css" />
		<link rel="stylesheet" href="/mobile.css" />

		<meta property="og:type" content="website" />
		<meta property="og:site_name" content="three.ws" />
		<meta property="og:title" content="Walk · three.ws" />
		<meta property="og:description" content="A 3D avatar you can walk around — in the browser and in AR." />
		<meta property="og:url" content="https://three.ws/walk" />
		<meta property="og:image" id="og-image" content="https://three.ws/api/walk-og" />
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:title" content="Walk · three.ws" />
		<meta name="twitter:description" content="A 3D avatar you can walk around — in the browser and in AR." />
		<meta name="twitter:image" id="twitter-image" content="https://three.ws/api/walk-og" />
		<script>
			// Patch OG image to include avatar + handle from URL params so
			// shared links unfurl with the correct avatar thumbnail.
			(function() {
				var p = new URLSearchParams(location.search);
				var av = p.get('avatar') || '';
				var handle = p.get('handle') || '';
				if (av) {
					var q = new URLSearchParams();
					if (av) q.set('avatar', av);
					if (handle) q.set('handle', handle);
					var src = 'https://three.ws/api/walk-og?' + q;
					document.getElementById('og-image').content = src;
					document.getElementById('twitter-image').content = src;
				}
			})();
		</script>

		<style>
			:root {
				--bg: #0a0a0a;
				--panel: rgba(17, 17, 17, 0.72);
				--border: rgba(255, 255, 255, 0.08);
				--text: #fafafa;
				--text-2: #a1a1aa;
				--accent: #ffffff;
				--danger: #f87171;
			}

			html, body {
				margin: 0;
				padding: 0;
				width: 100%;
				height: 100%;
				overflow: hidden;
				background: #000;
				color: var(--text);
				font-family: 'Inter', system-ui, -apple-system, sans-serif;
				-webkit-font-smoothing: antialiased;
				touch-action: none;
				overscroll-behavior: none;
			}

			#walk-stage {
				position: fixed;
				inset: 0;
				background:
					radial-gradient(80% 60% at 50% 30%, #1a2538 0%, #0a0a0a 70%) #0a0a0a;
			}

			#walk-camera-feed {
				position: fixed;
				inset: 0;
				width: 100vw;
				height: 100vh;
				object-fit: cover;
				z-index: 1;
				display: none;
				background: #000;
			}
			#walk-stage.is-ar #walk-camera-feed { display: block; }
			#walk-stage.is-ar {
				background: transparent;
			}

			#walk-canvas {
				position: fixed;
				inset: 0;
				width: 100vw;
				height: 100vh;
				z-index: 2;
				display: block;
				/* Joystick / buttons sit on the UI layer above this. The canvas
				   accepts pointer events for the camera-orbit drag handler. */
			}

			#walk-hud {
				position: fixed;
				top: env(safe-area-inset-top, 0);
				left: 0;
				right: 0;
				z-index: 4;
				display: flex;
				gap: 8px;
				align-items: flex-start;
				justify-content: space-between;
				padding: 14px 16px;
				pointer-events: none;
			}
			#walk-hud > * { pointer-events: auto; }

			.walk-card {
				background: var(--panel);
				border: 1px solid var(--border);
				border-radius: 12px;
				padding: 10px 12px;
				backdrop-filter: blur(10px);
				-webkit-backdrop-filter: blur(10px);
				font-size: 13px;
				line-height: 1.35;
				max-width: min(60vw, 320px);
			}
			.walk-card h1 {
				margin: 0 0 2px 0;
				font-size: 14px;
				font-weight: 600;
				letter-spacing: 0.01em;
			}
			.walk-card p {
				margin: 0;
				color: var(--text-2);
				font-size: 12px;
			}
			.walk-card a {
				color: var(--accent);
				text-decoration: none;
			}

			.walk-actions {
				display: flex;
				flex-direction: column;
				gap: 8px;
				align-items: flex-end;
			}

			.walk-btn {
				appearance: none;
				border: 1px solid var(--border);
				background: var(--panel);
				color: var(--text);
				font: inherit;
				font-size: 13px;
				font-weight: 500;
				padding: 8px 12px;
				border-radius: 999px;
				cursor: pointer;
				backdrop-filter: blur(10px);
				-webkit-backdrop-filter: blur(10px);
				display: inline-flex;
				align-items: center;
				gap: 6px;
				transition: transform 0.12s ease, background 0.12s ease;
			}
			.walk-btn:hover { background: rgba(34, 34, 34, 0.85); }
			.walk-btn:active { transform: scale(0.97); }
			.walk-btn[aria-pressed="true"] {
				background: rgba(255, 255, 255, 0.18);
				border-color: rgba(255, 255, 255, 0.45);
				color: #e0f2fe;
			}
			.walk-btn[disabled] { opacity: 0.5; cursor: not-allowed; }
			.walk-btn .dot {
				width: 6px;
				height: 6px;
				border-radius: 50%;
				background: var(--text-2);
			}
			.walk-btn[aria-pressed="true"] .dot {
				background: var(--accent);
				box-shadow: 0 0 8px var(--accent);
			}

			#walk-joystick {
				position: fixed;
				z-index: 5;
				left: 24px;
				bottom: calc(28px + env(safe-area-inset-bottom, 0));
				width: 140px;
				height: 140px;
				touch-action: none;
				pointer-events: auto;
			}

			#walk-status {
				position: fixed;
				z-index: 6;
				left: 50%;
				bottom: calc(24px + env(safe-area-inset-bottom, 0));
				transform: translateX(-50%);
				background: var(--panel);
				border: 1px solid var(--border);
				border-radius: 999px;
				padding: 8px 14px;
				font-size: 12px;
				color: var(--text-2);
				backdrop-filter: blur(10px);
				-webkit-backdrop-filter: blur(10px);
				pointer-events: none;
				transition: opacity 0.2s ease;
			}
			#walk-status.is-error { color: var(--danger); border-color: rgba(248, 113, 113, 0.5); }
			#walk-status.is-hidden { opacity: 0; }

			#walk-help {
				position: fixed;
				z-index: 5;
				right: 16px;
				bottom: calc(28px + env(safe-area-inset-bottom, 0));
				display: flex;
				flex-direction: column;
				gap: 6px;
				align-items: flex-end;
				color: var(--text-2);
				font-size: 11px;
				pointer-events: none;
			}
			.walk-key {
				display: inline-flex;
				align-items: center;
				gap: 4px;
				background: var(--panel);
				border: 1px solid var(--border);
				border-radius: 8px;
				padding: 4px 8px;
				backdrop-filter: blur(10px);
				-webkit-backdrop-filter: blur(10px);
			}
			.walk-key kbd {
				font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
				font-size: 10.5px;
				padding: 1px 5px;
				border-radius: 4px;
				background: rgba(255, 255, 255, 0.08);
				border: 1px solid var(--border);
				color: var(--text);
			}

			/* Hide help text on small/touch screens — joystick is enough.
			   Joystick stays visible on all devices: mouse-drag works on
			   desktop the same way touch does on mobile, and keeping the
			   element laid out from page load ensures nipplejs measures
			   its 140×140 zone correctly. */
			@media (hover: none), (max-width: 640px) {
				#walk-help { display: none; }
			}

			/* ── Multiplayer HUD ────────────────────────────────────────────── */
			#walk-online {
				appearance: none;
				border: 1px solid var(--border);
				background: var(--panel);
				color: var(--text);
				font: inherit;
				font-size: 12px;
				font-weight: 500;
				padding: 6px 10px;
				border-radius: 999px;
				cursor: default;
				backdrop-filter: blur(10px);
				-webkit-backdrop-filter: blur(10px);
				display: inline-flex;
				align-items: center;
				gap: 6px;
				transition: background 0.12s ease;
			}
			#walk-online .dot {
				width: 7px;
				height: 7px;
				border-radius: 50%;
				background: var(--text-2);
			}
			#walk-online[data-status="online"] .dot {
				background: #e8e8e8;
				box-shadow: 0 0 8px rgba(255, 255, 255, 0.5);
			}
			#walk-online[data-status="connecting"] .dot,
			#walk-online[data-status="offline"] .dot {
				background: #fbbf24;
			}
			#walk-online[data-status="failed"] {
				cursor: pointer;
				border-color: rgba(248, 113, 113, 0.5);
			}
			#walk-online[data-status="failed"] .dot {
				background: var(--danger);
			}
			#walk-online .count {
				color: var(--text-2);
				font-variant-numeric: tabular-nums;
				min-width: 1ch;
				text-align: right;
			}
			#walk-online[data-status="online"] .count { color: var(--text); }

			/* Floating name tag for remote players — positioned by walk.js
			   from world-space → screen-space each frame. Pointer-events
			   off so it never blocks the orbit drag. */
			.walk-remote-label {
				position: fixed;
				top: 0; left: 0;
				z-index: 3;
				background: rgba(10, 10, 10, 0.72);
				border: 1px solid var(--border);
				border-radius: 999px;
				padding: 3px 9px;
				font-size: 11px;
				font-weight: 500;
				color: var(--text);
				white-space: nowrap;
				pointer-events: none;
				transform: translate(-50%, -100%);
				backdrop-filter: blur(6px);
				-webkit-backdrop-filter: blur(6px);
				will-change: transform;
			}

			/* ── IRL AR mobile CTA ─────────────────────────────────────────
			   Hidden until walk.js detects a touch device with camera
			   support and the avatar has finished loading. Sells the
			   project's IRL-not-metaverse positioning: "your agent on
			   your real floor" instead of "explore a virtual world".
			*/
			#walk-ar-cta {
				position: fixed;
				z-index: 7;
				left: 50%;
				top: calc(env(safe-area-inset-top, 0) + 76px);
				transform: translateX(-50%) translateY(-6px);
				display: none;
				align-items: center;
				gap: 10px;
				padding: 10px 14px 10px 12px;
				background: linear-gradient(135deg, rgba(255, 255, 255, 0.92), rgba(255, 255, 255, 0.92));
				color: #07111c;
				border: 1px solid rgba(255, 255, 255, 0.35);
				border-radius: 999px;
				font-size: 13px;
				font-weight: 600;
				cursor: pointer;
				box-shadow: 0 8px 28px rgba(0, 0, 0, 0.4);
				backdrop-filter: blur(10px);
				-webkit-backdrop-filter: blur(10px);
				opacity: 0;
				transition: opacity 0.25s ease, transform 0.25s ease;
				white-space: nowrap;
				max-width: calc(100vw - 32px);
			}
			#walk-ar-cta.is-visible {
				display: inline-flex;
				opacity: 1;
				transform: translateX(-50%) translateY(0);
			}
			#walk-ar-cta .pulse {
				width: 8px;
				height: 8px;
				border-radius: 50%;
				background: #f87171;
				box-shadow: 0 0 0 0 rgba(248, 113, 113, 0.6);
				animation: walk-cta-pulse 1.6s infinite;
			}
			@keyframes walk-cta-pulse {
				0%   { box-shadow: 0 0 0 0 rgba(248, 113, 113, 0.55); }
				70%  { box-shadow: 0 0 0 10px rgba(248, 113, 113, 0); }
				100% { box-shadow: 0 0 0 0 rgba(248, 113, 113, 0); }
			}
			#walk-ar-cta .dismiss {
				margin-left: 4px;
				padding: 2px 6px;
				font-size: 14px;
				line-height: 1;
				background: rgba(7, 17, 28, 0.18);
				border-radius: 999px;
				color: #07111c;
				font-weight: 700;
			}

			/* ── Recording UI ──────────────────────────────────────────── */
			#walk-record-btn .dot { transition: background 0.15s ease, box-shadow 0.15s ease; }
			#walk-record-btn[data-recording="true"] .dot {
				background: #f87171;
				box-shadow: 0 0 8px rgba(248, 113, 113, 0.8);
				animation: walk-rec-pulse 0.9s infinite;
			}
			@keyframes walk-rec-pulse {
				0%, 100% { opacity: 1; }
				50%      { opacity: 0.45; }
			}
			#walk-record-status {
				position: fixed;
				z-index: 6;
				left: 50%;
				top: calc(env(safe-area-inset-top, 0) + 12px);
				transform: translateX(-50%);
				background: rgba(248, 113, 113, 0.92);
				color: #fff;
				border: 1px solid rgba(255, 255, 255, 0.25);
				border-radius: 999px;
				padding: 6px 12px;
				font-size: 12px;
				font-weight: 600;
				letter-spacing: 0.02em;
				display: none;
				align-items: center;
				gap: 8px;
				pointer-events: none;
				backdrop-filter: blur(6px);
				-webkit-backdrop-filter: blur(6px);
			}
			#walk-record-status.is-visible { display: inline-flex; }
			#walk-record-status .rec-dot {
				width: 8px;
				height: 8px;
				border-radius: 50%;
				background: #fff;
				animation: walk-rec-pulse 0.9s infinite;
			}
		</style>
	</head>
	<body>
		<div id="walk-stage">
			<video id="walk-camera-feed" autoplay playsinline muted></video>
			<canvas id="walk-canvas"></canvas>

			<div id="walk-hud">
				<div class="walk-card">
					<h1>three.ws · walk</h1>
					<p>Drag to orbit. Joystick or <kbd>WASD</kbd> to move.</p>
				</div>
				<div class="walk-actions">
					<button
						type="button"
						id="walk-online"
						data-status="idle"
						title="Multiplayer presence"
					>
						<span class="dot"></span>
						<span data-label>solo</span>
						<span class="count" id="walk-online-count">1</span>
					</button>
					<button
						type="button"
						class="walk-btn"
						id="walk-ar-toggle"
						aria-pressed="false"
						title="Put your avatar on your real floor"
					>
						<span class="dot"></span>
						<span data-label>AR</span>
					</button>
					<button
						type="button"
						class="walk-btn"
						id="walk-record-btn"
						data-recording="false"
						title="Record a 6-second clip to share"
					>
						<span class="dot"></span>
						<span data-label>Record</span>
					</button>
					<a class="walk-btn" href="/" title="Back to three.ws home" style="text-decoration:none">
						<span>← home</span>
					</a>
				</div>
			</div>

			<button type="button" id="walk-ar-cta" aria-hidden="true">
				<span class="pulse"></span>
				<span>See your avatar on your floor — tap for AR</span>
				<span class="dismiss" aria-label="Dismiss">×</span>
			</button>

			<div id="walk-record-status" role="status" aria-live="polite">
				<span class="rec-dot"></span>
				<span data-label>REC 6s</span>
			</div>

			<div id="walk-joystick" aria-label="Movement joystick"></div>

			<div id="walk-help" aria-hidden="true">
				<span class="walk-key"><kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> move</span>
				<span class="walk-key"><kbd>shift</kbd> run</span>
				<span class="walk-key"><kbd>drag</kbd> orbit camera</span>
			</div>

			<div id="walk-status">loading avatar…</div>
		</div>

		<script type="module" src="/src/walk.js"></script>
		<script src="/brand.js" defer></script>
</body>
</html>
