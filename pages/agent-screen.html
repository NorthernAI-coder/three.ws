<!doctype html>
<html lang="en">
	<head>
		<script>/* three.ws theme boot — no-flash */(function(){try{var m=localStorage.getItem('twx_theme');var l=m==='auto'?(window.matchMedia&&window.matchMedia('(prefers-color-scheme: light)').matches):m==='light';document.documentElement.setAttribute('data-theme',l?'light':'dark');}catch(e){document.documentElement.setAttribute('data-theme','dark');}})();</script>
		<meta charset="utf-8" />
		<title>Agent Screen · three.ws</title>
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<meta name="theme-color" content="#0a0a0b" />
		<meta name="description" content="Watch your agent in real time — see their screen and avatar as they autonomously trade, browse, and act." />

		<meta property="og:type" content="website" />
		<meta property="og:url" content="https://three.ws/agent-screen" />
		<meta property="og:title" content="Agent Screen · three.ws" />
		<meta property="og:description" content="Watch your agent work — live screen and avatar feed." />
		<meta property="og:image" content="https://three.ws/og-image.png" />
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:image" content="https://three.ws/og-image.png" />

		<link rel="icon" href="/favicon.ico" sizes="any" />
		<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
		<link rel="apple-touch-icon" href="/apple-touch-icon.png" />
		<link rel="manifest" href="/site.webmanifest" />
		<link rel="stylesheet" href="/style.css" />
		<link rel="stylesheet" href="/fonts/fonts.css" />

		<style>
			:root {
				/* Monochrome viewer: the accent and the "live" signal are both pure
				   white against the near-black panels; depth comes from tone, not hue. */
				--screen-accent: #f4f4f5;
				--screen-live: #ffffff;
				--screen-dark: rgba(255,255,255,0.3);
				--screen-on-accent: #0a0a0b;
				--asc-panel-bg: rgba(12,12,14,0.82);
				--asc-border: rgba(255,255,255,0.1);
			}

			body {
				overflow: hidden;
				display: flex;
				flex-direction: column;
				height: 100vh;
				min-height: 100vh;
				background: #060607;
			}

			/* ── header ── */
			.asc-header {
				display: flex;
				align-items: center;
				gap: 0.9rem;
				padding: 0.55rem 0.9rem;
				border-bottom: 1px solid rgba(255,255,255,0.07);
				background: rgba(6, 10, 18, 0.95);
				backdrop-filter: blur(12px);
				flex: none;
				z-index: 60;
				transition: transform 0.32s cubic-bezier(0.4,0,0.2,1), opacity 0.32s;
			}
			/* In zen mode the whole header slides up out of view. */
			body.asc-zen .asc-header {
				transform: translateY(-110%);
				opacity: 0;
				pointer-events: none;
			}
			/* …unless the user nudges the mouse to the top edge to peek. */
			body.asc-zen.asc-peek .asc-header {
				transform: none;
				opacity: 1;
				pointer-events: auto;
			}
			.asc-header .back {
				display: inline-flex;
				align-items: center;
				gap: 0.4rem;
				color: rgba(255,255,255,0.6);
				text-decoration: none;
				font-size: 0.95rem;
				font-weight: 600;
				padding: 0.3rem 0.5rem;
				border-radius: 7px;
				transition: background 0.15s, color 0.15s;
			}
			.asc-header .back:hover { color: #fff; background: rgba(255,255,255,0.07); }
			.asc-agent-info { display: flex; align-items: center; gap: 0.65rem; min-width: 0; }
			.asc-agent-name {
				font-size: 0.95rem;
				font-weight: 680;
				color: #f4f4f5;
				letter-spacing: -0.01em;
				white-space: nowrap;
				overflow: hidden;
				text-overflow: ellipsis;
				max-width: 30vw;
			}
			.asc-live-badge {
				display: inline-flex;
				align-items: center;
				gap: 0.35rem;
				background: rgba(255,255,255,0.12);
				color: var(--screen-live);
				font-size: 0.72rem;
				font-weight: 700;
				letter-spacing: 0.07em;
				text-transform: uppercase;
				padding: 0.25rem 0.6rem;
				border-radius: 999px;
				border: 1px solid rgba(255,255,255,0.25);
				flex: none;
			}
			.asc-live-badge .dot {
				width: 6px;
				height: 6px;
				border-radius: 50%;
				background: var(--screen-live);
				animation: asc-pulse 1.4s ease-in-out infinite;
			}
			.asc-live-badge.dark {
				background: rgba(255,255,255,0.06);
				color: var(--screen-dark);
				border-color: rgba(255,255,255,0.1);
			}
			.asc-live-badge.dark .dot { background: var(--screen-dark); animation: none; }

			/* ── live PnL ticker ── */
			.asc-pnl {
				display: inline-flex;
				align-items: baseline;
				gap: 0.4rem;
				background: rgba(255,255,255,0.05);
				border: 1px solid rgba(255,255,255,0.12);
				border-radius: 999px;
				padding: 0.22rem 0.6rem;
				font: inherit;
				color: #d4d4d8;
				cursor: pointer;
				flex: none;
				transition: background 0.15s, border-color 0.15s, transform 0.1s, box-shadow 0.2s;
			}
			.asc-pnl:hover { background: rgba(255,255,255,0.09); border-color: rgba(255,255,255,0.22); }
			.asc-pnl:active { transform: scale(0.97); }
			.asc-pnl:focus-visible { outline: none; box-shadow: 0 0 0 2px rgba(120,170,255,0.55); }
			.asc-pnl-label {
				font-size: 0.6rem;
				font-weight: 700;
				letter-spacing: 0.1em;
				text-transform: uppercase;
				color: rgba(255,255,255,0.4);
			}
			.asc-pnl-value {
				font-size: 0.9rem;
				font-weight: 720;
				font-variant-numeric: tabular-nums;
				letter-spacing: -0.01em;
				color: #e4e4e7;
				transition: color 0.2s;
			}
			.asc-pnl-detail {
				font-size: 0.7rem;
				font-weight: 600;
				font-variant-numeric: tabular-nums;
				color: rgba(255,255,255,0.5);
				padding-left: 0.45rem;
				border-left: 1px solid rgba(255,255,255,0.14);
			}
			.asc-pnl.pos .asc-pnl-value { color: var(--screen-live, #4ade80); }
			.asc-pnl.neg .asc-pnl-value { color: #f87171; }
			.asc-pnl.pos { border-color: rgba(74,222,128,0.35); background: rgba(74,222,128,0.08); }
			.asc-pnl.neg { border-color: rgba(248,113,113,0.35); background: rgba(248,113,113,0.08); }
			/* brief flash when a fresh fill moves the number */
			.asc-pnl.bump { animation: asc-pnl-bump 0.45s ease; }
			@keyframes asc-pnl-bump {
				0% { transform: scale(1); }
				40% { transform: scale(1.09); }
				100% { transform: scale(1); }
			}
			body.asc-zen .asc-pnl { display: none; }

			.asc-header-right {
				margin-left: auto;
				display: flex;
				align-items: center;
				gap: 0.3rem;
			}
			.asc-ctl-group { display: flex; align-items: center; gap: 0.2rem; }
			.asc-ctl-sep { width: 1px; height: 20px; background: rgba(255,255,255,0.12); margin: 0 0.25rem; flex: none; }

			/* compact icon control button shared by header toggles */
			.asc-ctl {
				appearance: none;
				display: inline-flex;
				align-items: center;
				justify-content: center;
				gap: 0.35rem;
				background: rgba(255,255,255,0.06);
				border: 1px solid rgba(255,255,255,0.1);
				color: rgba(255,255,255,0.72);
				border-radius: 8px;
				min-width: 32px;
				height: 32px;
				padding: 0 0.5rem;
				font: inherit;
				font-size: 0.95rem;
				line-height: 1;
				cursor: pointer;
				text-decoration: none;
				transition: background 0.15s, color 0.15s, border-color 0.15s, transform 0.1s;
			}
			.asc-ctl:hover { background: rgba(255,255,255,0.12); color: #fff; border-color: rgba(255,255,255,0.2); }
			.asc-ctl:active { transform: scale(0.94); }
			.asc-ctl.active {
				background: rgba(255,255,255,0.16);
				border-color: rgba(255,255,255,0.4);
				color: #fff;
			}
			.asc-ctl--label { font-size: 0.82rem; font-weight: 620; }
			.asc-ctl--primary {
				background: var(--screen-accent);
				color: var(--screen-on-accent);
				border-color: transparent;
				font-size: 0.82rem;
				font-weight: 650;
			}
			.asc-ctl--primary:hover { background: #fff; color: var(--screen-on-accent); }
			.asc-ctl--zen.active { background: #fff; color: var(--screen-on-accent); border-color: #fff; }

			/* ── stage: full-bleed screen + floating panels ── */
			.asc-stage {
				position: relative;
				flex: 1;
				min-height: 0;
				overflow: hidden;
				background:
					radial-gradient(120% 80% at 50% 0%, rgba(255,255,255,0.03), transparent 60%),
					#060607;
			}

			/* the screen canvas fills the stage, letterboxed by object-fit */
			.asc-screen-stage {
				position: absolute;
				inset: 0;
				display: flex;
				align-items: center;
				justify-content: center;
			}
			#asc-screen-canvas {
				max-width: 100%;
				max-height: 100%;
				width: auto;
				height: auto;
				display: block;
				border-radius: 4px;
				image-rendering: auto;
				transition: filter 0.2s;
			}
			.asc-stage.fit-cover #asc-screen-canvas {
				width: 100%;
				height: 100%;
				max-width: none;
				max-height: none;
				object-fit: cover;
				border-radius: 0;
			}

			.asc-screen-overlay {
				position: absolute;
				inset: 0;
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				gap: 1rem;
				color: rgba(255,255,255,0.5);
				font-size: 0.9rem;
				pointer-events: none;
				text-align: center;
				padding: 1rem;
			}
			.asc-screen-overlay .pulse-ring {
				width: 56px;
				height: 56px;
				border: 2px solid rgba(255,255,255,0.35);
				border-radius: 50%;
				animation: asc-ring 2s ease-out infinite;
				position: relative;
			}
			.asc-screen-overlay .pulse-ring::after {
				content: '';
				position: absolute;
				inset: 8px;
				border-radius: 50%;
				background: rgba(255,255,255,0.12);
				animation: asc-inner 2s ease-out infinite;
			}
			.asc-screen-overlay p { margin: 0; }
			.asc-screen-overlay small { font-size: 0.75rem; color: rgba(255,255,255,0.3); }

			/* ── floating panel chrome (shared by cam / log / stats) ── */
			.asc-panel {
				position: absolute;
				display: flex;
				flex-direction: column;
				background: var(--asc-panel-bg);
				backdrop-filter: blur(16px) saturate(1.15);
				border: 1px solid var(--asc-border);
				border-radius: 14px;
				box-shadow: 0 10px 44px rgba(0,0,0,0.55), inset 0 0 0 1px rgba(255,255,255,0.03);
				overflow: hidden;
				z-index: 20;
				min-width: 0;
				animation: asc-panel-in 0.25s ease both;
				transition: box-shadow 0.18s, opacity 0.22s, transform 0.22s;
			}
			.asc-panel.dragging {
				box-shadow: 0 22px 70px rgba(0,0,0,0.72);
				cursor: grabbing;
				transition: none;
				z-index: 50;
				user-select: none;
			}
			.asc-panel.focused { z-index: 30; }
			.asc-panel[hidden] { display: none; }
			.asc-panel-head {
				display: flex;
				align-items: center;
				gap: 0.45rem;
				padding: 0.4rem 0.4rem 0.4rem 0.7rem;
				cursor: grab;
				user-select: none;
				border-bottom: 1px solid rgba(255,255,255,0.07);
				flex: none;
			}
			.asc-panel.minimized .asc-panel-head { border-bottom: none; }
			.asc-panel-head:active { cursor: grabbing; }
			.asc-panel-grip {
				color: rgba(255,255,255,0.25);
				font-size: 0.7rem;
				letter-spacing: -1px;
				flex: none;
			}
			.asc-panel-title {
				font-size: 0.66rem;
				font-weight: 700;
				letter-spacing: 0.08em;
				text-transform: uppercase;
				color: rgba(255,255,255,0.5);
				flex: 1;
				min-width: 0;
				white-space: nowrap;
				overflow: hidden;
				text-overflow: ellipsis;
			}
			.asc-panel-btns { display: flex; gap: 0.15rem; flex: none; }
			.asc-panel-btn {
				appearance: none;
				width: 22px;
				height: 22px;
				display: inline-flex;
				align-items: center;
				justify-content: center;
				background: transparent;
				border: none;
				color: rgba(255,255,255,0.4);
				border-radius: 6px;
				font-size: 0.78rem;
				line-height: 1;
				cursor: pointer;
				transition: background 0.14s, color 0.14s;
			}
			.asc-panel-btn:hover { background: rgba(255,255,255,0.12); color: #fff; }
			.asc-panel-body { flex: 1; min-height: 0; display: flex; flex-direction: column; overflow: hidden; }
			.asc-panel.minimized { resize: none !important; }
			.asc-panel.minimized .asc-panel-body { display: none; }

			/* resize handle (cam + log) */
			.asc-resize {
				position: absolute;
				right: 2px;
				bottom: 2px;
				width: 16px;
				height: 16px;
				cursor: nwse-resize;
				z-index: 4;
				background:
					linear-gradient(135deg, transparent 50%, rgba(255,255,255,0.35) 50%, rgba(255,255,255,0.35) 60%, transparent 60%, transparent 72%, rgba(255,255,255,0.35) 72%, rgba(255,255,255,0.35) 82%, transparent 82%);
				border-bottom-right-radius: 12px;
			}
			.asc-panel.minimized .asc-resize { display: none; }

			/* ── cam panel ── */
			.asc-panel--cam { width: 260px; }
			.asc-cam-body { padding: 0; }
			.asc-webcam-bezel {
				position: relative;
				width: 100%;
				aspect-ratio: 4 / 3;
				background: #141416;
				overflow: hidden;
			}
			.asc-webcam-bezel video,
			.asc-webcam-bezel canvas {
				width: 100%;
				height: 100%;
				object-fit: cover;
				display: block;
			}
			.asc-webcam-badge {
				position: absolute;
				top: 8px;
				left: 10px;
				display: flex;
				align-items: center;
				gap: 5px;
				background: rgba(0,0,0,0.6);
				backdrop-filter: blur(4px);
				border-radius: 6px;
				padding: 3px 8px;
				font-size: 0.7rem;
				font-weight: 600;
				color: #fff;
				pointer-events: none;
			}
			.asc-webcam-badge .cam-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--screen-live); }
			.asc-webcam-idle {
				position: absolute;
				inset: 0;
				display: flex;
				align-items: center;
				justify-content: center;
				color: rgba(255,255,255,0.3);
				font-size: 0.82rem;
			}

			/* ── log panel ── */
			.asc-panel--log { width: 320px; height: 60%; max-height: calc(100% - 2rem); }
			.asc-log-tools {
				display: flex;
				align-items: center;
				gap: 0.3rem;
				padding: 0.4rem 0.55rem;
				border-bottom: 1px solid rgba(255,255,255,0.05);
				flex: none;
				overflow-x: auto;
				scrollbar-width: none;
			}
			.asc-log-tools::-webkit-scrollbar { display: none; }
			.asc-log-filter {
				appearance: none;
				background: rgba(255,255,255,0.05);
				border: 1px solid rgba(255,255,255,0.08);
				color: rgba(255,255,255,0.5);
				border-radius: 6px;
				padding: 0.2rem 0.5rem;
				font: inherit;
				font-size: 0.68rem;
				font-weight: 640;
				letter-spacing: 0.03em;
				text-transform: uppercase;
				cursor: pointer;
				white-space: nowrap;
				transition: all 0.14s;
			}
			.asc-log-filter:hover { color: #fff; border-color: rgba(255,255,255,0.2); }
			.asc-log-filter.active { background: rgba(255,255,255,0.16); border-color: rgba(255,255,255,0.4); color: #fff; }
			.asc-log-clear { margin-left: auto; }
			#asc-log {
				flex: 1;
				min-height: 0;
				overflow-y: auto;
				padding: 0.4rem 0;
				display: flex;
				flex-direction: column;
				scrollbar-width: thin;
				scrollbar-color: rgba(255,255,255,0.12) transparent;
			}
			.asc-log-entry {
				display: flex;
				align-items: flex-start;
				gap: 0.5rem;
				padding: 0.38rem 0.7rem;
				font-size: 0.78rem;
				line-height: 1.4;
				border-bottom: 1px solid rgba(255,255,255,0.03);
				animation: asc-fadein 0.25s ease;
			}
			#asc-log.filtered-trade .asc-log-entry:not(.type-trade),
			#asc-log.filtered-analysis .asc-log-entry:not(.type-analysis),
			#asc-log.filtered-activity .asc-log-entry:not(.type-activity),
			#asc-log.filtered-screenshot .asc-log-entry:not(.type-screenshot) { display: none; }
			.asc-log-time { color: rgba(255,255,255,0.28); font-size: 0.7rem; flex: none; padding-top: 1px; font-variant-numeric: tabular-nums; }
			.asc-log-type {
				flex: none;
				font-size: 0.64rem;
				font-weight: 700;
				letter-spacing: 0.05em;
				text-transform: uppercase;
				padding: 1px 5px;
				border-radius: 4px;
			}
			.asc-log-type.screenshot { background: rgba(255,255,255,0.10); color: rgba(255,255,255,0.7); box-shadow: inset 2px 0 0 rgba(255,255,255,0.4); }
			.asc-log-type.trade { background: rgba(255,255,255,0.18); color: #fff; box-shadow: inset 2px 0 0 #fff; }
			.asc-log-type.analysis { background: rgba(255,255,255,0.10); color: rgba(255,255,255,0.7); box-shadow: inset 2px 0 0 rgba(255,255,255,0.55); }
			.asc-log-type.activity { background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.45); }
			.asc-log-text { color: rgba(255,255,255,0.78); word-break: break-word; }
				/* Launch Director result card — the clickable explorer / pump.fun / feed CTA */
				.asc-launch-result {
					flex-direction: column;
					align-items: stretch;
					gap: 0.45rem;
					padding: 0.6rem 0.7rem;
					background: linear-gradient(180deg, rgba(143,162,255,0.12), rgba(143,162,255,0.03));
					border-left: 2px solid #8fa2ff;
				}
				.asc-launch-result-head { font-size: 0.82rem; font-weight: 700; color: #eef0fb; }
				.asc-launch-mint { font-family: ui-monospace, Menlo, monospace; color: #9aa6d8; font-weight: 600; }
				.asc-launch-result-links { display: flex; flex-wrap: wrap; gap: 0.35rem 0.8rem; }
				.asc-launch-result-links a {
					font-size: 0.76rem;
					color: #aeb8e6;
					text-decoration: none;
					border-bottom: 1px solid transparent;
					transition: color 0.15s ease, border-color 0.15s ease;
				}
				.asc-launch-result-links a:hover,
				.asc-launch-result-links a:focus-visible { color: #fff; border-bottom-color: rgba(255,255,255,0.5); outline: none; }
				.asc-launch-result-links a.asc-launch-cta { font-weight: 700; color: #8fa2ff; }
				.asc-launch-result-links a.asc-launch-cta:hover,
				.asc-launch-result-links a.asc-launch-cta:focus-visible { color: #c3ccff; border-bottom-color: #8fa2ff; }
				.asc-launch-result-note { font-size: 0.7rem; color: rgba(255,255,255,0.4); }
				/* realized-exit lines tint by sign so a green/red scan reads as a P&L tape */
				.asc-log-entry.pnl-pos .asc-log-text { color: #6ee7a0; }
				.asc-log-entry.pnl-neg .asc-log-text { color: #f9a8a8; }
				.asc-log-entry.pnl-pos .asc-log-type.trade { background: rgba(74,222,128,0.18); color: #6ee7a0; box-shadow: inset 2px 0 0 #4ade80; }
				.asc-log-entry.pnl-neg .asc-log-type.trade { background: rgba(248,113,113,0.18); color: #f9a8a8; box-shadow: inset 2px 0 0 #f87171; }
			.asc-log-empty {
				display: flex;
				align-items: center;
				justify-content: center;
				height: 80px;
				color: rgba(255,255,255,0.2);
				font-size: 0.82rem;
			}

			/* ── mirror panel (copy-trade cockpit) ── */
			.asc-panel--mirror { width: 380px; height: 62%; max-height: calc(100% - 2rem); }
			.asc-mir { display: flex; flex-direction: column; height: 100%; min-height: 0; }
			.asc-mir-head {
				display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap;
				padding: 0.5rem 0.6rem; border-bottom: 1px solid rgba(255,255,255,0.06); flex: none;
			}
			.asc-mir-target { min-width: 0; }
			.asc-mir-wallet {
				appearance: none; display: inline-flex; align-items: center; gap: 0.35rem;
				background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
				color: #e4e4e7; border-radius: 7px; padding: 0.22rem 0.5rem; font: inherit;

			.asc-mir-lat {

			}
			.asc-mir-relay {

			}

			.asc-mir-cfg summary {

				background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); color: #e4e4e7;
				border-radius: 7px; padding: 0.35rem 0.5rem; font: inherit; font-size: 0.78rem; min-width: 0; width: 100%;
			}
			.asc-mir-field input:focus, .asc-mir-field select:focus { outline: none; border-color: rgba(255,255,255,0.45); }
			.asc-mir-field--wide { flex-basis: 100%; }
			.asc-mir-row2 { display: flex; gap: 0.5rem; }
			.asc-mir-check { flex-direction: row; align-items: center; gap: 0.4rem; align-self: flex-end; padding-bottom: 0.4rem; }
			.asc-mir-check span { text-transform: none; letter-spacing: 0; font-size: 0.74rem; color: rgba(255,255,255,0.7); }

			.asc-mir-caps { border: 1px solid rgba(255,255,255,0.08); border-radius: 9px; padding: 0.5rem; }

				color: rgba(255,255,255,0.7); border-radius: 8px; padding: 0.45rem 0.8rem; font: inherit;
				font-size: 0.78rem; font-weight: 650; cursor: pointer; transition: all 0.14s;
			}
			.asc-mir-btn:hover { background: rgba(255,255,255,0.12); color: #fff; }

			.asc-mir-cfg-msg.err { color: #fda4af; }
			body.asc-zen .asc-panel--mirror { opacity: 0; pointer-events: none; transform: scale(0.97); }
			body.asc-zen .asc-panel--heatmap { opacity: 0; pointer-events: none; transform: scale(0.97); }

			/* ── stats panel ── */
			.asc-panel--stats { width: 218px; }
			.asc-stats-grid { display: flex; flex-direction: column; padding: 0.35rem 0; }
			.asc-stat-row {
				display: flex;
				align-items: baseline;
				justify-content: space-between;
				gap: 0.6rem;
				padding: 0.3rem 0.75rem;
				font-size: 0.78rem;
			}
			.asc-stat-key { color: rgba(255,255,255,0.4); font-weight: 560; }
			.asc-stat-val { color: #f4f4f5; font-weight: 660; font-variant-numeric: tabular-nums; white-space: nowrap; }
			.asc-stat-val.dim { color: rgba(255,255,255,0.35); font-weight: 560; }
			.asc-stat-val .unit { color: rgba(255,255,255,0.35); font-weight: 500; font-size: 0.9em; margin-left: 1px; }

			/* ── task bar (docked bottom of stage) ── */
			.asc-task-bar {
				position: absolute;
				left: 50%;
				bottom: 1rem;
				transform: translateX(-50%);
				width: min(640px, calc(100% - 2rem));
				z-index: 35;
				display: flex;
				flex-direction: column;
				gap: 0.3rem;
				transition: transform 0.3s cubic-bezier(0.4,0,0.2,1), opacity 0.3s;
			}
			body.asc-zen .asc-task-bar { transform: translateX(-50%) translateY(160%); opacity: 0; pointer-events: none; }
			body.asc-zen.asc-peek-bottom .asc-task-bar { transform: translateX(-50%); opacity: 1; pointer-events: auto; }
			.asc-task-form {
				display: flex;
				align-items: center;
				gap: 0.55rem;
				background: rgba(10,10,12,0.86);
				backdrop-filter: blur(14px);
				border: 1px solid rgba(255,255,255,0.12);
				border-radius: 12px;
				padding: 0.45rem 0.55rem 0.45rem 0.8rem;
				box-shadow: 0 8px 36px rgba(0,0,0,0.5);
				transition: border-color 0.15s, box-shadow 0.15s;
			}
			.asc-task-form:focus-within {
				border-color: rgba(255,255,255,0.55);
				box-shadow: 0 8px 36px rgba(0,0,0,0.5), 0 0 0 3px rgba(255,255,255,0.12);
			}
			.asc-task-icon { color: rgba(255,255,255,0.55); font-size: 0.72rem; flex: none; user-select: none; }
			.asc-task-input {
				flex: 1;
				min-width: 0;
				background: transparent;
				border: none;
				outline: none;
				color: rgba(255,255,255,0.92);
				font: inherit;
				font-size: 0.88rem;
				caret-color: #f4f4f5;
			}
			.asc-task-input::placeholder { color: rgba(255,255,255,0.3); }
			.asc-task-input:disabled { opacity: 0.5; }
			.asc-task-send {
				flex: none;
				appearance: none;
				border: none;
				background: var(--screen-accent);
				color: var(--screen-on-accent);

				width: 32px;
				height: 32px;
				display: flex;
				align-items: center;
				justify-content: center;
				cursor: pointer;
				transition: opacity 0.15s, transform 0.1s;
			}
			.asc-task-send:hover { opacity: 0.88; }
			.asc-task-send:active { transform: scale(0.92); }
			.asc-task-send:disabled { opacity: 0.35; cursor: not-allowed; }
			.asc-task-send.sending { opacity: 0.6; animation: asc-pulse 0.8s ease-in-out infinite; }
			.asc-task-status {
				font-size: 0.74rem;
				min-height: 0;
				max-height: 0;
				overflow: hidden;
				padding-left: 0.6rem;

			.asc-task-status:not(:empty) { max-height: 2.2rem; padding: 0.35rem 0.7rem; }
			.asc-task-status.ok { color: var(--screen-live); }
			.asc-task-status.err { color: #fda4af; }
			/* ── Live Avatar Forge controls ── */
			.asc-forge-form {
				display: flex; align-items: center; gap: 0.5rem; margin-top: 0.3rem;
				background: rgba(10,10,12,0.86); backdrop-filter: blur(14px);
				border: 1px solid rgba(255,255,255,0.12); border-radius: 12px;
				padding: 0.4rem 0.5rem 0.4rem 0.7rem; box-shadow: 0 8px 36px rgba(0,0,0,0.5);

			.asc-forge-icon { color: rgba(255,255,255,0.5); font-size: 0.85rem; flex: none; user-select: none; }
			.asc-forge-input { flex: 1; min-width: 0; background: transparent; border: none; outline: none; color: rgba(255,255,255,0.92); font: inherit; font-size: 0.85rem; caret-color: #f4f4f5; }

			.asc-zen-hint {

			.asc-toast-wrap {
				position: fixed;

				transform: translateX(-50%);

				align-items: center;

				justify-content: space-between;
				gap: 1rem;
				padding: 0.5rem 0.7rem;
				font-size: 0.85rem;
				color: rgba(255,255,255,0.7);
			}

			.asc-help-row kbd {
				font: inherit;
				font-size: 0.75rem;
				font-weight: 600;
				background: rgba(255,255,255,0.1);
				border: 1px solid rgba(255,255,255,0.18);
				border-radius: 6px;
				padding: 2px 9px;

			.asc-no-agent a {
				display: inline-flex;
				align-items: center;
				gap: 0.4rem;
				background: var(--screen-accent);

				display: flex;
				flex-direction: column;
				align-items: center;
				animation: asc-fadein 0.3s ease both;
			}
			.ws-setup-inner { width: 100%; max-width: 680px; display: flex; flex-direction: column; gap: 1.5rem; }
			.ws-setup-hero { text-align: center; margin-bottom: 0.5rem; }
			.ws-setup-hero h1 { margin: 0 0 0.5rem; font-size: 1.6rem; font-weight: 760; color: #f4f4f5; letter-spacing: -0.03em; }
			.ws-setup-hero p { margin: 0; color: rgba(255,255,255,0.45); font-size: 0.9rem; line-height: 1.55; }
			.ws-setup-step { background: rgba(255,255,255,0.035); border: 1px solid rgba(255,255,255,0.08); border-radius: 14px; overflow: hidden; }
			.ws-setup-step-head { display: flex; align-items: center; gap: 0.75rem; padding: 0.95rem 1.1rem; border-bottom: 1px solid rgba(255,255,255,0.07); }
			.ws-step-num {
				width: 26px; height: 26px; border-radius: 50%;
				background: rgba(255,255,255,0.18);
				border: 1.5px solid rgba(255,255,255,0.4);
				color: #d4d4d8; font-size: 0.78rem; font-weight: 760;
				display: flex; align-items: center; justify-content: center; flex: none;
			}
			.ws-step-num.done { background: rgba(255,255,255,0.15); border-color: rgba(255,255,255,0.4); color: #ffffff; }
			.ws-setup-step-head h3 { margin: 0; font-size: 0.92rem; font-weight: 680; color: #e4e4e7; letter-spacing: -0.01em; }
			.ws-setup-step-head p { margin: 0; font-size: 0.8rem; color: rgba(255,255,255,0.4); }
			.ws-setup-step-body { padding: 1.1rem; }
			.ws-agent-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 0.65rem; }
			.ws-agent-card {
				display: flex; align-items: center; gap: 0.65rem;
				padding: 0.65rem 0.8rem; border-radius: 10px;
				border: 1.5px solid rgba(255,255,255,0.09);
				background: rgba(255,255,255,0.04);
				cursor: pointer; transition: border-color 0.15s, background 0.15s; text-align: left;
			}
			.ws-agent-card:hover { border-color: rgba(255,255,255,0.35); background: rgba(255,255,255,0.07); }
			.ws-agent-card.selected { border-color: #f4f4f5; background: rgba(255,255,255,0.12); }
			.ws-agent-avatar { width: 36px; height: 36px; border-radius: 8px; object-fit: cover; flex: none; background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.2); }
			.ws-agent-avatar-placeholder {
				width: 36px; height: 36px; border-radius: 8px; flex: none;
				background: linear-gradient(135deg, rgba(255,255,255,0.2), rgba(255,255,255,0.2));
				border: 1px solid rgba(255,255,255,0.2);
				display: flex; align-items: center; justify-content: center; font-size: 1rem;
			}
			.ws-agent-info { min-width: 0; }
			.ws-agent-name { font-size: 0.82rem; font-weight: 660; color: #e4e4e7; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
			.ws-agent-uuid { font-size: 0.7rem; color: rgba(255,255,255,0.3); font-family: monospace; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
			.ws-agent-empty { color: rgba(255,255,255,0.35); font-size: 0.85rem; padding: 1rem 0; text-align: center; }
			.ws-agent-empty a { color: #d4d4d8; }
			.ws-key-row { display: flex; gap: 0.65rem; align-items: center; }
			.ws-key-display {
				flex: 1; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px;
				padding: 0.6rem 0.85rem; font-family: 'Courier New', monospace; font-size: 0.8rem; color: #c8c8cc;
				overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0;
			}
			.ws-key-display.placeholder { color: rgba(255,255,255,0.2); font-style: italic; font-family: inherit; }
			.ws-btn {
				appearance: none; border: none; border-radius: 9px; padding: 0.55rem 1rem;
				font: inherit; font-size: 0.82rem; font-weight: 660; cursor: pointer;
				transition: opacity 0.15s, transform 0.1s; white-space: nowrap; flex: none;
			}
			.ws-btn:active { transform: scale(0.97); }
			.ws-btn-primary { background: var(--screen-accent); color: var(--screen-on-accent); }
			.ws-btn-primary:hover { opacity: 0.88; }
			.ws-btn-primary:disabled { opacity: 0.45; cursor: not-allowed; }
			.ws-btn-ghost { background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12); color: rgba(255,255,255,0.7); }
			.ws-btn-ghost:hover { background: rgba(255,255,255,0.11); color: #fff; }
			.ws-btn-copy { background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12); color: rgba(255,255,255,0.6); padding: 0.55rem 0.75rem; border-radius: 8px; font-size: 0.8rem; }
			.ws-btn-copy.copied { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.3); color: #ffffff; }
			.ws-key-note { font-size: 0.78rem; color: rgba(255,255,255,0.35); margin-top: 0.6rem; line-height: 1.5; }
			.ws-key-note strong { color: rgba(255,255,255,0.8); }
			.ws-cmd-tabs { display: flex; gap: 0.4rem; margin-bottom: 0.8rem; }
			.ws-cmd-tab {
				appearance: none; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.04);
				color: rgba(255,255,255,0.5); border-radius: 7px; padding: 0.3rem 0.7rem;
				font: inherit; font-size: 0.78rem; font-weight: 640; cursor: pointer; transition: all 0.15s;
			}
			.ws-cmd-tab.active { background: rgba(255,255,255,0.15); border-color: rgba(255,255,255,0.4); color: #d4d4d8; }
			.ws-cmd-block { position: relative; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.09); border-radius: 10px; padding: 1rem 1rem 1rem 1.1rem; }
			.ws-cmd-copy { position: absolute; top: 0.6rem; right: 0.6rem; }
			.ws-cmd-block pre { margin: 0; font-family: 'Courier New', monospace; font-size: 0.78rem; line-height: 1.65; color: #c8c8cc; overflow-x: auto; white-space: pre; padding-right: 3rem; }
			.ws-cmd-block pre .cmd-comment { color: rgba(255,255,255,0.3); }
			.ws-cmd-block pre .cmd-key { color: #d4d4d8; }
			.ws-cmd-block pre .cmd-val { color: #c8c8cc; }
			.ws-cmd-block pre .cmd-run { color: #d4d4d8; }
			.ws-cmd-block pre .cmd-dim { color: rgba(255,255,255,0.25); }
			.ws-status-ok {
				display: flex; align-items: center; gap: 0.5rem; font-size: 0.82rem; color: #ffffff;
				margin-top: 0.9rem; padding: 0.55rem 0.85rem; background: rgba(255,255,255,0.08);
				border: 1px solid rgba(255,255,255,0.2); border-radius: 8px;
			}
			.ws-watch-link {
				display: inline-flex; align-items: center; gap: 0.45rem; margin-top: 0.75rem;
				background: var(--screen-accent); color: var(--screen-on-accent); border-radius: 9px;
				padding: 0.6rem 1.2rem; font-size: 0.88rem; font-weight: 660; text-decoration: none;
				transition: opacity 0.15s; width: fit-content;
			}
			.ws-watch-link:hover { opacity: 0.88; }
			.ws-not-signed-in {
				display: flex; align-items: center; gap: 0.6rem; font-size: 0.85rem; color: rgba(255,255,255,0.5);
				padding: 0.8rem 1rem; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.15); border-radius: 8px;
			}
			.ws-not-signed-in a { color: #d4d4d8; }
			.ws-spinner {
				display: inline-block; width: 14px; height: 14px;
				border: 2px solid rgba(255,255,255,0.3); border-top-color: #f4f4f5;
				border-radius: 50%; animation: ws-spin 0.7s linear infinite; flex: none;
			}
			@keyframes ws-spin { to { transform: rotate(360deg); } }

			/* ── deploy-to-wall: progress stepper ── */
			.ws-progress {
				display: flex; align-items: center; justify-content: center; gap: 0.35rem;
				flex-wrap: wrap; margin: -0.4rem 0 0.4rem;
			}
			.ws-prog-node { display: inline-flex; align-items: center; gap: 0.45rem; opacity: 0.55; transition: opacity 0.2s; }
			.ws-prog-node.active, .ws-prog-node.done { opacity: 1; }
			.ws-prog-dot {
				display: inline-flex; align-items: center; justify-content: center;
				width: 22px; height: 22px; border-radius: 50%; flex: none;
				font-size: 0.72rem; font-weight: 700;
				background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.16); color: rgba(255,255,255,0.6);
				transition: background 0.2s, border-color 0.2s, color 0.2s;
			}
			.ws-prog-node.active .ws-prog-dot { background: var(--screen-accent); border-color: var(--screen-accent); color: var(--screen-on-accent); }
			.ws-prog-node.done .ws-prog-dot { background: rgba(74,222,128,0.16); border-color: rgba(74,222,128,0.5); color: #6ee7a0; }
			.ws-prog-label { font-size: 0.74rem; font-weight: 600; color: rgba(255,255,255,0.7); white-space: nowrap; }
			.ws-prog-line { flex: 0 1 28px; height: 1px; background: rgba(255,255,255,0.16); }

			/* ── deploy-to-wall: agent search (overflow) ── */
			.ws-agent-search {
				width: 100%; margin-bottom: 0.7rem; box-sizing: border-box;
				padding: 0.55rem 0.75rem; border-radius: 9px;
				background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.12);
				color: #e4e4e7; font-size: 0.85rem; outline: none;
				transition: border-color 0.15s, background 0.15s;
			}
			.ws-agent-search::placeholder { color: rgba(255,255,255,0.3); }
			.ws-agent-search:focus { border-color: rgba(255,255,255,0.4); background: rgba(0,0,0,0.45); }

			/* ── deploy-to-wall: key error ── */
			.ws-key-error {
				font-size: 0.8rem; color: #f9a8a8; margin-top: 0.6rem; line-height: 1.5;
				padding: 0.55rem 0.75rem; background: rgba(248,113,113,0.08);
				border: 1px solid rgba(248,113,113,0.3); border-radius: 8px;
			}
			.ws-link-btn {
				background: none; border: none; color: #fca5a5; text-decoration: underline;
				cursor: pointer; font: inherit; padding: 0;
			}
			.ws-link-btn:hover { color: #fecaca; }

			/* ── deploy-to-wall: go-live strip ── */
			.ws-golive {
				display: flex; align-items: center; gap: 0.7rem;
				padding: 0.85rem 1rem; border-radius: 10px;
				border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.04);
			}
			.ws-golive strong { display: block; font-size: 0.9rem; color: #f4f4f5; font-weight: 680; margin-bottom: 0.15rem; }
			.ws-golive span { font-size: 0.8rem; color: rgba(255,255,255,0.5); line-height: 1.5; }
			.ws-golive.watching { border-color: rgba(120,170,255,0.35); background: rgba(120,170,255,0.07); }
			.ws-golive.live { border-color: rgba(74,222,128,0.4); background: rgba(74,222,128,0.1); }
			.ws-golive.live strong { color: #6ee7a0; }
			.ws-golive-dot { width: 9px; height: 9px; border-radius: 50%; background: rgba(255,255,255,0.3); flex: none; }
			.ws-golive-check {
				display: inline-flex; align-items: center; justify-content: center;
				width: 26px; height: 26px; border-radius: 50%; flex: none;
				background: rgba(74,222,128,0.2); color: #6ee7a0; font-size: 0.85rem; font-weight: 700;
			}
			.ws-golive-pulse {
				width: 12px; height: 12px; border-radius: 50%; flex: none;
				background: #78aaff; box-shadow: 0 0 0 0 rgba(120,170,255,0.6);
				animation: ws-golive-pulse 1.6s ease-out infinite;
			}
			@keyframes ws-golive-pulse {
				0% { box-shadow: 0 0 0 0 rgba(120,170,255,0.55); }
				70% { box-shadow: 0 0 0 9px rgba(120,170,255,0); }
				100% { box-shadow: 0 0 0 0 rgba(120,170,255,0); }
			}
			.ws-golive-note {
				margin-top: 0.65rem; font-size: 0.78rem; line-height: 1.5;
				color: #fcd34d; padding: 0.55rem 0.75rem;
				background: rgba(252,211,77,0.08); border: 1px solid rgba(252,211,77,0.28); border-radius: 8px;
			}
			.ws-golive-note a { color: #fde68a; }
			.ws-golive-actions { display: flex; flex-wrap: wrap; gap: 0.6rem; align-items: center; margin-top: 0.85rem; }
			.ws-golive-actions .ws-watch-link { margin-top: 0; }
			.ws-golive-open { text-decoration: none; padding: 0.6rem 1.1rem; border-radius: 9px; font-size: 0.85rem; }

			/* ── deploy-to-wall: troubleshooting ── */
			.ws-trouble { margin-top: 0.9rem; font-size: 0.82rem; }
			.ws-trouble summary {
				cursor: pointer; color: rgba(255,255,255,0.55); list-style: none;
				padding: 0.35rem 0; transition: color 0.15s; user-select: none;
			}
			.ws-trouble summary::-webkit-details-marker { display: none; }
			.ws-trouble summary::before { content: '▸ '; color: rgba(255,255,255,0.35); }
			.ws-trouble[open] summary::before { content: '▾ '; }
			.ws-trouble summary:hover { color: rgba(255,255,255,0.8); }
			.ws-trouble ul { margin: 0.5rem 0 0; padding-left: 1.1rem; color: rgba(255,255,255,0.5); line-height: 1.65; }
			.ws-trouble li { margin-bottom: 0.3rem; }
			.ws-trouble strong { color: rgba(255,255,255,0.78); font-weight: 640; }
			.ws-trouble code {
				font-size: 0.76rem; background: rgba(255,255,255,0.08); padding: 0.05rem 0.3rem;
				border-radius: 4px; color: #d4d4d8;
			}
			.ws-trouble a { color: #d4d4d8; }


			/* ── animations ── */
			@keyframes asc-pulse { 0%,100%{opacity:1}50%{opacity:0.35} }
			@keyframes asc-ring { 0%{transform:scale(1);opacity:0.8}100%{transform:scale(1.6);opacity:0} }
			@keyframes asc-inner { 0%{opacity:0.5}100%{opacity:0} }
			@keyframes asc-fadein { from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none} }
			@keyframes asc-panel-in { from{opacity:0;transform:scale(0.96) translateY(6px)}to{opacity:1;transform:none} }
			@keyframes asc-toast-in { from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none} }
			@keyframes asc-toast-out { to{opacity:0;transform:translateY(8px)} }

			/* hide panels & taskbar in zen so screenshots are clean (cam optional, see body.asc-zen-cam) */
			body.asc-zen .asc-panel--log,
			body.asc-zen .asc-panel--stats { opacity: 0; pointer-events: none; transform: scale(0.97); }
			body.asc-zen:not(.asc-zen-cam) .asc-panel--cam { opacity: 0; pointer-events: none; transform: scale(0.97); }

			/* ── fullscreen ── */
			.asc-stage:fullscreen { background: #000; }

			/* ── responsive ── */
			@media (max-width: 640px) {
				.asc-agent-name { max-width: 38vw; }
				.asc-ctl--label span { display: none; }
				.asc-panel--log { width: min(320px, calc(100% - 1.4rem)); }
			}

			/* ── Treasury cockpit panel ── */
			.asc-panel--treasury { width: 344px; height: 72%; max-height: calc(100% - 2rem); }
			.ast-cockpit { flex: 1; min-height: 0; overflow-y: auto; padding: 0.7rem 0.8rem 0.9rem; display: flex; flex-direction: column; gap: 0.7rem; scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.12) transparent; }
			.ast-cockpit::-webkit-scrollbar { width: 6px; }
			.ast-cockpit::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 3px; }

			/* balance header */
			.ast-balance { display: flex; flex-direction: column; gap: 0.1rem; }
			.ast-balance-main { display: flex; align-items: baseline; gap: 0.5rem; }
			.ast-balance-sol { font-size: 1.7rem; font-weight: 760; color: #f4f4f5; letter-spacing: -0.02em; font-variant-numeric: tabular-nums; line-height: 1.1; }
			.ast-stale { font-size: 0.58rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: #fcd34d; background: rgba(252,211,77,0.12); border: 1px solid rgba(252,211,77,0.3); border-radius: 5px; padding: 1px 5px; }
			.ast-balance-sub { display: flex; align-items: center; gap: 0.4rem; flex-wrap: wrap; font-size: 0.74rem; color: rgba(255,255,255,0.45); }
			.ast-balance-usd { color: rgba(255,255,255,0.7); font-weight: 620; font-variant-numeric: tabular-nums; }
			.ast-balance-sub b { color: #d4d4d8; font-weight: 680; }
			.ast-sep { color: rgba(255,255,255,0.2); }
			.ast-explorer { margin-left: auto; color: rgba(255,255,255,0.5); text-decoration: none; font-weight: 620; transition: color 0.14s; }
			.ast-explorer:hover { color: #fff; }

			/* runway gauge */
			.ast-gauge { position: relative; width: 132px; height: 132px; align-self: center; }
			.ast-gauge svg { width: 100%; height: 100%; display: block; }
			.ast-gauge-bg { fill: none; stroke: rgba(255,255,255,0.08); stroke-width: 9; }
			.ast-gauge-arc { fill: none; stroke: #f4f4f5; stroke-width: 9; stroke-linecap: round; transform: rotate(-90deg); transform-origin: 60px 60px; transition: stroke-dasharray 0.6s cubic-bezier(0.4,0,0.2,1), stroke 0.3s; }
			.ast-gauge[data-tone="warn"] .ast-gauge-arc { stroke: rgba(255,255,255,0.55); }
			.ast-gauge[data-tone="critical"] .ast-gauge-arc { stroke: #fda4af; }
			.ast-gauge[data-tone="unknown"] .ast-gauge-arc { stroke: rgba(255,255,255,0.18); }
			.ast-gauge-center { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1px; }
			.ast-gauge-label { font-size: 1.5rem; font-weight: 780; color: #f4f4f5; font-variant-numeric: tabular-nums; }
			.ast-gauge-sub { font-size: 0.62rem; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; color: rgba(255,255,255,0.4); }

			/* stat strip */
			.ast-stats { display: grid; grid-template-columns: repeat(5, 1fr); gap: 0.3rem; }
			.ast-stat { display: flex; flex-direction: column; gap: 1px; align-items: center; text-align: center; padding: 0.4rem 0.2rem; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); border-radius: 8px; }
			.ast-stat-k { font-size: 0.56rem; font-weight: 600; letter-spacing: 0.02em; text-transform: uppercase; color: rgba(255,255,255,0.38); }
			.ast-stat-v { font-size: 0.78rem; font-weight: 700; color: #e4e4e7; font-variant-numeric: tabular-nums; white-space: nowrap; }
			.ast-stat-v.pos { color: #86efac; }
			.ast-stat-v.neg { color: #fda4af; }

			/* sections */
			.ast-section { display: flex; flex-direction: column; gap: 0.35rem; }
			.ast-section[hidden] { display: none; }
			.ast-section-head { display: flex; align-items: center; justify-content: space-between; font-size: 0.64rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: rgba(255,255,255,0.4); }
			.ast-badge { display: inline-flex; align-items: center; gap: 0.3rem; font-size: 0.6rem; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; padding: 2px 7px; border-radius: 999px; border: 1px solid rgba(255,255,255,0.12); }
			.ast-badge-armed { background: rgba(255,255,255,0.14); color: #fff; border-color: rgba(255,255,255,0.3); }
			.ast-badge-idle { color: rgba(255,255,255,0.4); }
			.ast-badge-killed { background: rgba(253,164,175,0.14); color: #fda4af; border-color: rgba(253,164,175,0.35); }
			.ast-dot { width: 5px; height: 5px; border-radius: 50%; background: #fff; animation: asc-pulse 1.4s ease-in-out infinite; }

			/* rules */
			.ast-rules { display: flex; flex-direction: column; gap: 0.3rem; }
			.ast-rule { display: flex; align-items: center; gap: 0.5rem; padding: 0.45rem 0.55rem; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 8px; font-size: 0.76rem; }
			.ast-rule[data-state="paused"], .ast-rule[data-state="off"] { opacity: 0.55; }
			.ast-rule-glyph { flex: none; font-size: 0.9rem; }
			.ast-rule-text { flex: 1; min-width: 0; color: rgba(255,255,255,0.82); line-height: 1.35; }
			.ast-rule-last { flex: none; font-size: 0.56rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.03em; padding: 1px 5px; border-radius: 4px; color: rgba(255,255,255,0.55); background: rgba(255,255,255,0.06); }
			.ast-rule-last.s-ok, .ast-rule-last.s-confirmed { color: #86efac; background: rgba(134,239,172,0.12); }
			.ast-rule-last.s-error, .ast-rule-last.s-paused { color: #fda4af; background: rgba(253,164,175,0.12); }
			.ast-rule-last.s-alert { color: #fcd34d; background: rgba(252,211,77,0.12); }
			.ast-rule-state { flex: none; font-size: 0.56rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; color: rgba(255,255,255,0.4); }
			.ast-rule-state.st-armed { color: #d4d4d8; }

			/* spend caps */
			.ast-caps { display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; padding: 0.5rem 0.6rem; background: rgba(255,255,255,0.025); border: 1px dashed rgba(255,255,255,0.12); border-radius: 8px; }
			.ast-cap { display: flex; flex-direction: column; gap: 1px; }

			.ast-cap-v { font-size: 0.78rem; font-weight: 700; color: #e4e4e7; font-variant-numeric: tabular-nums; }
			.ast-cap-frozen .ast-cap-v { color: #fda4af; }
			.ast-cap-link { margin-left: auto; font-size: 0.68rem; font-weight: 620; color: rgba(255,255,255,0.5); text-decoration: none; transition: color 0.14s; }

			/* per-coin economy */
			.ast-coins { display: flex; flex-direction: column; gap: 0.3rem; }
			.ast-coin { display: flex; align-items: center; gap: 0.5rem; padding: 0.45rem 0.55rem; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 8px; }

			.ast-coin-name { font-size: 0.78rem; font-weight: 700; color: #e4e4e7; }
			.ast-coin-tag { font-size: 0.54rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; color: rgba(255,255,255,0.45); background: rgba(255,255,255,0.07); padding: 1px 5px; border-radius: 4px; }
			.ast-coin-toggles { display: flex; gap: 0.5rem; flex: none; }
			.ast-switch { display: inline-flex; align-items: center; gap: 0.3rem; font-size: 0.66rem; font-weight: 600; color: rgba(255,255,255,0.55); cursor: pointer; }
			.ast-switch input { accent-color: #f4f4f5; cursor: pointer; }

			/* owner editor */
			.ast-editor { display: flex; flex-direction: column; gap: 0.5rem; padding-top: 0.5rem; border-top: 1px solid rgba(255,255,255,0.06); }
			.ast-editor-label { font-size: 0.64rem; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; color: rgba(255,255,255,0.45); }
			.ast-editor-label span { color: rgba(255,255,255,0.28); font-weight: 600; text-transform: none; letter-spacing: 0; }
			.ast-textarea, .ast-input { width: 100%; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #e4e4e7; font: inherit; font-size: 0.78rem; line-height: 1.45; padding: 0.5rem 0.6rem; resize: vertical; outline: none; transition: border-color 0.15s, box-shadow 0.15s; }
			.ast-input { resize: none; }
			.ast-textarea:focus, .ast-input:focus { border-color: rgba(255,255,255,0.45); box-shadow: 0 0 0 3px rgba(255,255,255,0.08); }
			.ast-textarea::placeholder, .ast-input::placeholder { color: rgba(255,255,255,0.28); }
			.ast-preview:not(:empty) { display: flex; flex-direction: column; gap: 0.25rem; padding: 0.5rem 0.6rem; background: rgba(255,255,255,0.025); border: 1px solid rgba(255,255,255,0.06); border-radius: 8px; }
			.ast-preview-head { font-size: 0.64rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; color: rgba(255,255,255,0.4); }
			.ast-preview-rule { display: flex; gap: 0.4rem; font-size: 0.74rem; color: rgba(255,255,255,0.75); }
			.ast-preview-loading { font-size: 0.74rem; color: rgba(255,255,255,0.4); }
			.ast-preview-warn { font-size: 0.7rem; color: #fcd34d; }
			.ast-preview-contra { font-size: 0.7rem; color: #fda4af; }
			.ast-preview-err { font-size: 0.74rem; color: #fda4af; }
			.ast-actions { display: flex; flex-wrap: wrap; gap: 0.4rem; }
			.ast-btn { appearance: none; border: 1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.78); border-radius: 8px; padding: 0.42rem 0.8rem; font: inherit; font-size: 0.76rem; font-weight: 650; cursor: pointer; transition: background 0.15s, color 0.15s, border-color 0.15s, transform 0.1s; }
			.ast-btn:hover { background: rgba(255,255,255,0.12); color: #fff; border-color: rgba(255,255,255,0.25); }
			.ast-btn:active { transform: scale(0.96); }
			.ast-btn:focus-visible { outline: none; box-shadow: 0 0 0 3px rgba(255,255,255,0.18); }
			.ast-btn:disabled { opacity: 0.4; cursor: not-allowed; }
			.ast-btn-primary { background: var(--screen-accent); color: var(--screen-on-accent); border-color: transparent; }
			.ast-btn-primary:hover { background: #fff; color: var(--screen-on-accent); }
			.ast-btn-go { background: rgba(134,239,172,0.14); border-color: rgba(134,239,172,0.3); color: #86efac; }
			.ast-btn-go:hover { background: rgba(134,239,172,0.22); color: #bbf7d0; }
			.ast-btn-warn { background: rgba(252,211,77,0.12); border-color: rgba(252,211,77,0.28); color: #fcd34d; }
			.ast-btn-kill { margin-left: auto; background: rgba(253,164,175,0.1); border-color: rgba(253,164,175,0.25); color: #fda4af; }
			.ast-btn-kill:hover { background: rgba(253,164,175,0.18); color: #fecdd3; }
			.ast-btn-kill.active { background: #fda4af; color: #1a0b0d; border-color: #fda4af; }
			.ast-btn.running { animation: asc-pulse 0.8s ease-in-out infinite; }
			.ast-msg { font-size: 0.72rem; min-height: 0; color: rgba(255,255,255,0.5); }
			.ast-msg.ok { color: #86efac; }
			.ast-msg.err { color: #fda4af; }

			/* states (loading / empty / error / viewer) */
			.ast-state { display: flex; flex-direction: column; align-items: center; gap: 0.55rem; text-align: center; padding: 1.4rem 0.9rem; }
			.ast-state-icon { font-size: 1.6rem; opacity: 0.5; }
			.ast-state h4 { margin: 0; font-size: 0.92rem; font-weight: 700; color: #e4e4e7; }
			.ast-state p { margin: 0; font-size: 0.78rem; line-height: 1.5; color: rgba(255,255,255,0.5); max-width: 280px; }
			.ast-state p b { color: #d4d4d8; }
			.ast-state .ast-editor { width: 100%; border-top: none; padding-top: 0.3rem; }
			.ast-state-error p { color: #fda4af; }

			/* skeleton */
			.ast-skel { gap: 0.8rem; }
			.ast-sk { background: linear-gradient(90deg, rgba(255,255,255,0.04) 25%, rgba(255,255,255,0.09) 37%, rgba(255,255,255,0.04) 63%); background-size: 400% 100%; animation: ast-shimmer 1.4s ease infinite; border-radius: 8px; }
			.ast-sk-bal { width: 60%; height: 26px; }
			.ast-sk-bal2 { width: 38%; height: 12px; margin-top: 6px; }
			.ast-sk-gauge { width: 120px; height: 120px; border-radius: 50%; align-self: center; }
			.ast-sk-row { width: 100%; height: 34px; }
			@keyframes ast-shimmer { 0% { background-position: 100% 0; } 100% { background-position: -100% 0; } }

			/* ── Newsroom Anchor lower-third ──────────────────────────────── */
			.asc-lt {
				position: absolute;
				left: 0; right: 0; bottom: 0;
				display: flex; align-items: flex-end; gap: 0.75rem;
				padding: 1.1rem 1.3rem;
				background: linear-gradient(0deg, rgba(6,9,18,0.94) 0%, rgba(6,9,18,0.72) 60%, rgba(6,9,18,0) 100%);
				transform: translateY(110%);
				opacity: 0;
				transition: transform 0.42s cubic-bezier(0.16,1,0.3,1), opacity 0.42s ease;
				pointer-events: none;
				z-index: 6;
			}
			.asc-lt--show { transform: translateY(0); opacity: 1; pointer-events: auto; }
			.asc-lt-bar {
				flex: 0 0 4px; align-self: stretch; min-height: 48px;
				border-radius: 4px;
				background: linear-gradient(180deg, #6ea8ff, #3b6ed8);
				box-shadow: 0 0 14px rgba(110,168,255,0.5);
			}
			.asc-lt-body { flex: 1 1 auto; min-width: 0; }
			.asc-lt-eyebrow {
				display: inline-flex; align-items: center; gap: 0.4rem;
				font-size: 0.66rem; font-weight: 800; letter-spacing: 0.13em;
				color: #6ea8ff; text-transform: uppercase; margin-bottom: 0.3rem;
			}
			.asc-lt-dot {
				width: 8px; height: 8px; border-radius: 50%; background: #ff4d4f;
				box-shadow: 0 0 0 0 rgba(255,77,79,0.6);
				animation: asc-lt-pulse 1.6s ease-out infinite;
			}
			@keyframes asc-lt-pulse {
				0% { box-shadow: 0 0 0 0 rgba(255,77,79,0.55); }
				70% { box-shadow: 0 0 0 7px rgba(255,77,79,0); }
				100% { box-shadow: 0 0 0 0 rgba(255,77,79,0); }
			}
			.asc-lt-headline {
				font-size: clamp(1.1rem, 2.3vw, 1.9rem); font-weight: 800; line-height: 1.15;
				color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
				text-shadow: 0 2px 12px rgba(0,0,0,0.6);
			}
			/* Long headlines marquee on hover instead of clipping. */
			.asc-lt--overflow:hover .asc-lt-headline {
				text-overflow: clip;
				animation: asc-lt-marquee 9s linear infinite;
			}
			@keyframes asc-lt-marquee {
				0%, 8% { transform: translateX(0); }
				92%, 100% { transform: translateX(calc(-100% + 70vw)); }
			}
			.asc-lt-note {
				margin-top: 0.32rem; font-size: 0.74rem; font-weight: 600;
				color: #f0b36b; letter-spacing: 0.02em;
			}
			.asc-lt--skeleton .asc-lt-headline {
				width: 60%; height: 1.4rem; border-radius: 6px; color: transparent;
				background: linear-gradient(90deg, rgba(255,255,255,0.05) 25%, rgba(255,255,255,0.12) 37%, rgba(255,255,255,0.05) 63%);
				background-size: 400% 100%; animation: ast-shimmer 1.4s ease infinite;
			}
			.asc-lt-mute {
				flex: 0 0 auto; width: 40px; height: 40px; border-radius: 50%;
				border: 1px solid rgba(255,255,255,0.16); background: rgba(255,255,255,0.06);
				color: #fff; font-size: 1.05rem; cursor: pointer; line-height: 1;
				display: flex; align-items: center; justify-content: center;
				transition: background 0.18s ease, transform 0.18s ease, border-color 0.18s ease;
			}
			.asc-lt-mute:hover { background: rgba(110,168,255,0.18); border-color: rgba(110,168,255,0.5); transform: scale(1.06); }
			.asc-lt-mute:active { transform: scale(0.94); }
			.asc-lt-mute:focus-visible { outline: 2px solid #6ea8ff; outline-offset: 2px; }
			.asc-lt-mute.asc-muted { color: rgba(255,255,255,0.6); }

			/* One-tap unmute CTA */
			.asc-anchor-unmute {
				position: absolute; left: 50%; bottom: 7.2rem; transform: translateX(-50%);
				display: flex; align-items: center; gap: 0.5rem;
				padding: 0.6rem 1.1rem; border-radius: 999px;
				border: 1px solid rgba(110,168,255,0.5);
				background: rgba(13,20,38,0.92); color: #eaf1ff;
				font-size: 0.86rem; font-weight: 700; cursor: pointer;
				box-shadow: 0 8px 30px rgba(0,0,0,0.45);
				animation: asc-unmute-bob 2.4s ease-in-out infinite;
				z-index: 7; transition: background 0.18s ease, transform 0.18s ease;
			}
			.asc-anchor-unmute:hover { background: rgba(110,168,255,0.22); }
			.asc-anchor-unmute:focus-visible { outline: 2px solid #6ea8ff; outline-offset: 2px; }
			.asc-anchor-unmute-icon { font-size: 1.05rem; }
			@keyframes asc-unmute-bob {
				0%, 100% { transform: translateX(-50%) translateY(0); }
				50% { transform: translateX(-50%) translateY(-4px); }
			}
			body.asc-zen .asc-anchor-unmute { display: none !important; }


			/* ── live stage show panel (Moonshot 08) ── */
			.asc-panel--stage { width: 320px; }
			.asc-stage-body { padding: 0.6rem 0.7rem 0.7rem; gap: 0.6rem; overflow-y: auto; scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.12) transparent; }
			.asc-stage-status { display: flex; align-items: center; gap: 0.5rem; }
			.asc-stage-dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.35); flex: none; transition: background 0.2s; }
			.asc-stage-dot.is-live { background: var(--screen-live); box-shadow: 0 0 0 0 rgba(255,255,255,0.5); animation: asc-stage-pulse 1.8s infinite; }
			.asc-stage-dot.is-paused { background: #f5b53f; }
			.asc-stage-state { font-size: 0.74rem; color: rgba(255,255,255,0.6); flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
			.asc-stage-beat { font-size: 0.6rem; font-weight: 800; letter-spacing: 0.09em; text-transform: uppercase; color: #0a0a0b; background: var(--screen-accent); border-radius: 5px; padding: 2px 6px; flex: none; }
			.asc-stage-beat:empty { display: none; }
			.asc-stage-beat.beat-tip_shoutout { background: #ffd36b; }
			.asc-stage-now { font-size: 0.92rem; line-height: 1.4; color: #f4f4f5; min-height: 2.4em; font-weight: 540; letter-spacing: -0.01em; }
			.asc-stage-start {
				appearance: none; width: 100%; padding: 0.5rem 0.7rem; border-radius: 9px; cursor: pointer;
				background: var(--screen-accent); color: var(--screen-on-accent); border: none;
				font: inherit; font-size: 0.8rem; font-weight: 720; letter-spacing: 0.01em;
				display: inline-flex; align-items: center; justify-content: center; gap: 0.4rem; transition: filter 0.15s, transform 0.08s;
			}
			.asc-stage-start:hover { filter: brightness(1.08); }
			.asc-stage-start:active { transform: translateY(1px); }
			.asc-stage-start:focus-visible { outline: 2px solid #fff; outline-offset: 2px; }
			.asc-stage-start.live { background: rgba(255,255,255,0.08); color: #f4f4f5; border: 1px solid var(--asc-border); }
			.asc-stage-pulse { width: 7px; height: 7px; border-radius: 50%; background: var(--screen-live); animation: asc-stage-pulse 1.6s infinite; }
			.asc-stage-lead { border: 1px solid rgba(255,255,255,0.06); border-radius: 10px; overflow: hidden; background: rgba(255,255,255,0.02); }
			.asc-stage-lead-head { font-size: 0.6rem; font-weight: 800; letter-spacing: 0.09em; text-transform: uppercase; color: rgba(255,255,255,0.42); padding: 0.4rem 0.6rem; border-bottom: 1px solid rgba(255,255,255,0.05); }
			.asc-stage-lead-list { list-style: none; margin: 0; padding: 0.2rem; display: flex; flex-direction: column; gap: 1px; max-height: 168px; overflow-y: auto; scrollbar-width: thin; }
			.asc-stage-lead-row { display: flex; align-items: center; gap: 0.5rem; padding: 0.32rem 0.45rem; border-radius: 7px; font-size: 0.8rem; animation: asc-fadein 0.25s ease; }
			.asc-stage-lead-row.top { background: rgba(255,211,107,0.1); }
			.asc-stage-rank { width: 1.1rem; text-align: center; font-variant-numeric: tabular-nums; color: rgba(255,255,255,0.35); font-size: 0.72rem; font-weight: 700; flex: none; }
			.asc-stage-lead-row.top .asc-stage-rank { color: #ffd36b; }
			.asc-stage-tipper { flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #e7e7ea; }
			.asc-stage-amt { flex: none; font-variant-numeric: tabular-nums; font-weight: 720; color: #f4f4f5; }
			.asc-stage-lead-empty { padding: 0.55rem 0.6rem; font-size: 0.76rem; color: rgba(255,255,255,0.34); text-align: center; }
			.asc-stage-ask { display: flex; gap: 0.35rem; }
			.asc-stage-ask-input {
				flex: 1; min-width: 0; appearance: none; background: rgba(255,255,255,0.05);
				border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #f4f4f5;
				padding: 0.42rem 0.6rem; font: inherit; font-size: 0.8rem; transition: border-color 0.15s, background 0.15s;
			}
			.asc-stage-ask-input::placeholder { color: rgba(255,255,255,0.3); }
			.asc-stage-ask-input:focus { outline: none; border-color: rgba(255,255,255,0.4); background: rgba(255,255,255,0.08); }
			.asc-stage-ask-send {
				appearance: none; flex: none; padding: 0.42rem 0.7rem; border-radius: 8px; cursor: pointer;
				background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.12); color: #f4f4f5;
				font: inherit; font-size: 0.78rem; font-weight: 680; transition: background 0.14s, border-color 0.14s;
			}
			.asc-stage-ask-send:hover { background: rgba(255,255,255,0.18); border-color: rgba(255,255,255,0.3); }
			.asc-stage-ask-send:active { transform: translateY(1px); }
			.asc-stage-ask-send:focus-visible { outline: 2px solid #fff; outline-offset: 2px; }
			.asc-stage-ask-status { font-size: 0.72rem; min-height: 1em; color: rgba(255,255,255,0.5); }
			.asc-stage-ask-status.ok { color: #7fdca0; }
			.asc-stage-ask-status.err { color: #f1808a; }
			body.asc-zen .asc-panel--stage { opacity: 0; pointer-events: none; transform: scale(0.97); }
			@keyframes asc-stage-pulse {
				0% { box-shadow: 0 0 0 0 rgba(255,255,255,0.45); }
				70% { box-shadow: 0 0 0 7px rgba(255,255,255,0); }
				100% { box-shadow: 0 0 0 0 rgba(255,255,255,0); }
			}

			/* ── Ambient World DJ mode (Brief 22) ── */
			.asc-tod {
				display: inline-flex; align-items: center; gap: 0.3rem;
				padding: 0 0.55rem; height: 30px; border-radius: 7px;
				font-size: 0.72rem; font-weight: 650; letter-spacing: 0.02em;
				text-transform: capitalize; color: #d4d4d8;
				background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.10);
				white-space: nowrap; flex: none;
			}
			#asc-ambient-btn.active {
				color: #061; background: #8be9b0; border-color: #8be9b0;
				box-shadow: 0 0 14px rgba(139,233,176,0.45);
			}
			#asc-audio-btn.active {
				color: #061; background: #8be9b0; border-color: #8be9b0;
			}
			/* The world canvas fills the stage; the 2D stream canvas hides behind it. */
			.asc-ambient-host {
				position: absolute; inset: 0; z-index: 6;
				overflow: hidden; border-radius: inherit;
				animation: asc-ambient-in 0.5s ease;
			}
			.asc-screen-stage.ambient #asc-screen-canvas { opacity: 0; }
			@keyframes asc-ambient-in { from { opacity: 0; } to { opacity: 1; } }
			@media (prefers-reduced-motion: reduce) {
				.asc-ambient-host { animation: none; }
			}
			/* ── sentiment heatmap panel ── */
			.asc-panel--heatmap { width: 460px; height: 340px; max-height: calc(100% - 2rem); }
			.asc-hm-body { position: relative; padding: 0; }
			#asc-heatmap-canvas { width: 100%; height: 100%; display: block; }
			.asc-hm-focus {
				appearance: none;
				background: rgba(255,255,255,0.08);
				border: 1px solid rgba(255,255,255,0.16);
				color: rgba(255,255,255,0.85);
				border-radius: 6px;
				font: inherit; font-size: 0.62rem; font-weight: 700;
				letter-spacing: 0.03em;
				padding: 0.18rem 0.45rem;
				margin-right: 0.25rem;
				cursor: pointer;
				white-space: nowrap;
				transition: background 0.14s, border-color 0.14s, color 0.14s, transform 0.1s;
			}
			.asc-hm-focus:hover { background: rgba(255,255,255,0.16); color: #fff; border-color: rgba(255,255,255,0.35); }
			.asc-hm-focus:active { transform: scale(0.94); }
			.asc-hm-overlay {
				position: absolute; inset: 0;
				display: flex; flex-direction: column; align-items: center; justify-content: center;
				gap: 0.9rem; color: rgba(255,255,255,0.55); font-size: 0.82rem; text-align: center; padding: 1rem;
				background: radial-gradient(120% 90% at 50% 30%, rgba(20,26,48,0.45), rgba(5,6,10,0.85));
				pointer-events: none;
			}
			.asc-hm-overlay[hidden] { display: none; }
			.asc-hm-overlay p { margin: 0; }
			.asc-hm-stale {
				position: absolute; top: 8px; right: 8px;
				display: flex; align-items: center; gap: 0.4rem;
				background: rgba(40,30,10,0.85); border: 1px solid rgba(240,180,60,0.4);
				color: #f4c768; font-size: 0.64rem; font-weight: 650;
				padding: 0.2rem 0.5rem; border-radius: 7px; backdrop-filter: blur(6px);
			}
			.asc-hm-stale[hidden] { display: none; }
			.asc-hm-stale button {
				appearance: none; background: rgba(240,180,60,0.18); border: 1px solid rgba(240,180,60,0.5);
				color: #f4c768; border-radius: 5px; font: inherit; font-size: 0.6rem; font-weight: 700;
				padding: 0.08rem 0.4rem; cursor: pointer;
			}
			.asc-hm-stale button:hover { background: rgba(240,180,60,0.3); }
			.asc-hm-tooltip {
				position: absolute; z-index: 5; pointer-events: none;
				min-width: 118px; max-width: 210px;
				background: rgba(8,10,16,0.92); border: 1px solid rgba(255,255,255,0.16);
				border-radius: 9px; padding: 0.45rem 0.6rem; backdrop-filter: blur(10px);
				box-shadow: 0 8px 28px rgba(0,0,0,0.55);
				font-size: 0.72rem; color: #e4e4e7;
			}
			.asc-hm-tooltip[hidden] { display: none; }
			.asc-hm-tip-head { font-weight: 700; font-size: 0.8rem; margin-bottom: 0.3rem; display: flex; align-items: center; gap: 0.35rem; }
			.asc-hm-tip-anchor { font-size: 0.56rem; font-weight: 800; letter-spacing: 0.06em; background: rgba(255,255,255,0.16); padding: 0.05rem 0.3rem; border-radius: 5px; }
			.asc-hm-tip-row { display: flex; justify-content: space-between; gap: 0.9rem; color: rgba(255,255,255,0.55); line-height: 1.55; }
			.asc-hm-tip-row b { color: #fff; font-weight: 640; }
			.asc-hm-legend {
				position: absolute; left: 8px; right: 8px; bottom: 8px;
				display: flex; align-items: center; gap: 0.45rem;
				font-size: 0.58rem; font-weight: 650; letter-spacing: 0.05em; text-transform: uppercase;
				color: rgba(255,255,255,0.45); pointer-events: none;
			}
			.asc-hm-legend-ramp {
				flex: 1; height: 6px; border-radius: 3px;
				background: linear-gradient(90deg, #366bf2 0%, #525a6b 50%, #22eb76 100%);
				box-shadow: inset 0 0 0 1px rgba(255,255,255,0.12);
			}
			.asc-hm-legend-meta { color: rgba(255,255,255,0.7); text-transform: none; letter-spacing: 0; }

			/* ── Portfolio / PnL HUD panel ── */
			.asc-panel--hud { width: 288px; }
			.asc-hud {
				--success: #4ade80;
				--danger: #f87171;
				display: flex; flex-direction: column; gap: 0.6rem;
				padding: 0.7rem 0.8rem 0.85rem;
				min-height: 0; height: 100%; overflow-y: auto; position: relative;
			}
			.asc-hud-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 0.5rem; }
			.asc-hud-net { min-width: 0; }
			.asc-hud-usd {
				font: 800 1.55rem/1 var(--font-display, "Space Grotesk", system-ui, sans-serif);
				color: #fff; font-feature-settings: "tnum"; letter-spacing: -0.01em;
				white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
			}
			.asc-hud-usd.tick-up { animation: asc-hud-tick-up 0.7s ease; }
			.asc-hud-usd.tick-down { animation: asc-hud-tick-down 0.7s ease; }
			@keyframes asc-hud-tick-up { 0% { color: var(--success); } 100% { color: #fff; } }
			@keyframes asc-hud-tick-down { 0% { color: var(--danger); } 100% { color: #fff; } }
			.asc-hud-sol {
				margin-top: 0.15rem; font: 600 0.7rem/1 var(--font-mono, ui-monospace, Menlo, monospace);
				color: rgba(255,255,255,0.45);
			}
			.asc-hud-aside { display: flex; flex-direction: column; align-items: flex-end; gap: 0.25rem; flex: none; }
			.asc-hud-delta {
				display: inline-flex; align-items: baseline; gap: 0.2rem;
				font: 700 0.82rem/1 var(--font-mono, ui-monospace, Menlo, monospace);
				color: rgba(255,255,255,0.5); white-space: nowrap;
			}
			.asc-hud-delta[data-tone="up"] { color: var(--success); }
			.asc-hud-delta[data-tone="down"] { color: var(--danger); }
			.asc-hud-delta[data-tone="flat"] { color: rgba(255,255,255,0.5); }
			.asc-hud-arrow { font-size: 0.62rem; }
			.asc-hud-delta-meta, .asc-hud-delta-na { font-size: 0.6rem; font-weight: 600; color: rgba(255,255,255,0.4); }
			.asc-hud-stale {
				font: 700 0.55rem/1 var(--font-mono, ui-monospace, Menlo, monospace);
				text-transform: uppercase; letter-spacing: 0.05em; color: #fbbf24;
				background: rgba(251,191,36,0.12); border-radius: 999px; padding: 2px 6px;
			}
			.asc-hud-livedot { width: 7px; height: 7px; border-radius: 50%; background: var(--success); box-shadow: 0 0 6px var(--success); }
			.asc-hud-livedot[data-state="reconnecting"] { background: #fbbf24; box-shadow: 0 0 6px #fbbf24; animation: asc-hud-blink 1s steps(2) infinite; }
			@keyframes asc-hud-blink { 50% { opacity: 0.25; } }
			.asc-hud-spark-wrap { position: relative; height: 48px; }
			.asc-hud-spark { width: 100%; height: 48px; display: block; }
			.asc-hud-spark-note {
				position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
				font: 600 0.62rem/1 var(--font-body, Inter, system-ui, sans-serif); color: rgba(255,255,255,0.3);
				pointer-events: none;
			}
			.asc-hud-rows { display: flex; flex-direction: column; gap: 1px; }
			.asc-hud-row {
				display: grid; grid-template-columns: 1fr auto auto; align-items: center; gap: 0.5rem;
				padding: 0.32rem 0.45rem; border-radius: 7px; background: rgba(255,255,255,0.025);
				text-decoration: none; color: inherit; transition: background 0.14s ease, transform 0.1s ease;
			}
			.asc-hud-row + .asc-hud-row { margin-top: 1px; }
			a.asc-hud-row:hover, a.asc-hud-row:focus-visible { background: rgba(255,255,255,0.07); outline: none; }
			a.asc-hud-row:focus-visible { box-shadow: 0 0 0 2px rgba(196,181,253,0.55); }
			a.asc-hud-row:active { transform: scale(0.99); }
			.asc-hud-row--three { background: rgba(139,92,246,0.1); border: 1px solid rgba(139,92,246,0.28); }
			.asc-hud-row--three:hover { background: rgba(139,92,246,0.18); }
			.asc-hud-row-sym {
				display: inline-flex; align-items: center; gap: 0.4rem; min-width: 0;
				font: 700 0.74rem/1 var(--font-body, Inter, system-ui, sans-serif); color: #f4f4f5;
				white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
			}
			.asc-hud-three-chip {
				font-weight: 800; color: #c4b5fd; letter-spacing: 0.01em;
			}
			.asc-hud-row-logo { width: 15px; height: 15px; border-radius: 50%; flex: none; object-fit: cover; }
			.asc-hud-row-logo--ph { background: rgba(255,255,255,0.08); }
			.asc-hud-row-amt {
				font: 500 0.64rem/1 var(--font-mono, ui-monospace, Menlo, monospace);
				color: rgba(255,255,255,0.4); white-space: nowrap; text-align: right;
			}
			.asc-hud-row-val {
				display: inline-flex; align-items: center; gap: 0.3rem;
				font: 700 0.72rem/1 var(--font-mono, ui-monospace, Menlo, monospace);
				color: #fff; font-feature-settings: "tnum"; white-space: nowrap; justify-self: end;
			}
			.asc-hud-row-pnl { font-size: 0.6rem; font-weight: 700; }
			.asc-hud-row-pnl[data-tone="up"] { color: var(--success); }
			.asc-hud-row-pnl[data-tone="down"] { color: var(--danger); }
			.asc-hud-row-pnl[data-tone="flat"] { color: rgba(255,255,255,0.45); }
			.asc-hud-rows-empty, .asc-hud-more {
				font: 600 0.62rem/1.3 var(--font-body, Inter, system-ui, sans-serif);
				color: rgba(255,255,255,0.32); padding: 0.3rem 0.45rem;
			}
			.asc-hud-more { text-align: center; }
			.asc-hud-state { display: none; flex-direction: column; gap: 0.45rem; padding: 0.4rem 0.2rem; }
			.asc-hud[data-phase="empty"] .asc-hud-state,
			.asc-hud[data-phase="error"] .asc-hud-state { display: flex; }
			.asc-hud-msg { font: 700 0.78rem/1.25 var(--font-body, Inter, system-ui, sans-serif); color: #e8e8e8; margin: 0; }
			.asc-hud-sub { font: 500 0.66rem/1.4 var(--font-body, Inter, system-ui, sans-serif); color: rgba(255,255,255,0.45); margin: 0; }
			.asc-hud-retry {
				align-self: flex-start; appearance: none; cursor: pointer;
				font: 700 0.7rem/1 var(--font-body, Inter, system-ui, sans-serif);
				color: #fff; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.18);
				border-radius: 999px; padding: 0.4rem 0.8rem; transition: background 0.14s ease, transform 0.1s ease;
			}
			.asc-hud-retry:hover { background: rgba(255,255,255,0.16); }
			.asc-hud-retry:active { transform: scale(0.96); }
			.asc-hud-retry:focus-visible { outline: 2px solid rgba(196,181,253,0.7); outline-offset: 2px; }
			/* loading skeleton — visible only in the loading phase */
			.asc-hud-skel { display: none; flex-direction: column; gap: 0.6rem; padding: 0.2rem; }
			.asc-hud[data-phase="loading"] .asc-hud-skel { display: flex; }
			.asc-hud[data-phase="loading"] .asc-hud-head,
			.asc-hud[data-phase="loading"] .asc-hud-spark-wrap,
			.asc-hud[data-phase="loading"] .asc-hud-rows { display: none; }
			.asc-hud-skel-bar, .asc-hud-skel-spark {
				border-radius: 6px;
				background: linear-gradient(90deg, rgba(255,255,255,0.05), rgba(255,255,255,0.13), rgba(255,255,255,0.05));
				background-size: 200% 100%; animation: asc-hud-sk 1.2s ease-in-out infinite;
			}
			.asc-hud-skel-bar { height: 12px; }
			.asc-hud-skel-bar.w80 { width: 80%; } .asc-hud-skel-bar.w70 { width: 70%; }
			.asc-hud-skel-bar.w60 { width: 60%; } .asc-hud-skel-bar.w35 { width: 35%; }
			.asc-hud-skel-spark { height: 44px; }
			@keyframes asc-hud-sk { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
			@media (prefers-reduced-motion: reduce) {
				.asc-hud-usd.tick-up, .asc-hud-usd.tick-down,
				.asc-hud-livedot[data-state="reconnecting"],
				.asc-hud-skel-bar, .asc-hud-skel-spark { animation: none; }
			}

		</style>
	</head>
	<body>
		<script src="/nav.js"></script>

		<header class="asc-header" id="asc-header">
			<a class="back" id="asc-back" href="/agents" title="Back to agents">←</a>
			<div class="asc-agent-info">
				<span class="asc-agent-name" id="asc-agent-name">Loading…</span>
				<span class="asc-live-badge dark" id="asc-live-badge">
					<span class="dot"></span>
					<span id="asc-badge-text">Connecting</span>
				</span>
				<button class="asc-pnl" id="asc-pnl" type="button" hidden
					title="Session realized + unrealized, from real fills — click for detail"
					aria-label="Session profit and loss">
					<span class="asc-pnl-label">PnL</span>
					<span class="asc-pnl-value" id="asc-pnl-value">—</span>
					<span class="asc-pnl-detail" id="asc-pnl-detail" hidden></span>
				</button>
			</div>
			<div class="asc-header-right" id="asc-controls">
				<div class="asc-ctl-group" id="asc-panel-toggles">
					<button class="asc-ctl" data-panel-toggle="cam" title="Avatar cam — C" aria-label="Toggle avatar cam">◉</button>
					<button class="asc-ctl" data-panel-toggle="log" title="Activity log — L" aria-label="Toggle activity log">☰</button>
					<button class="asc-ctl" data-panel-toggle="stats" title="Stream stats — I" aria-label="Toggle stats">📊</button>
					<button class="asc-ctl" data-panel-toggle="treasury" title="Treasury cockpit — T" aria-label="Toggle treasury">◎</button>
					<button class="asc-ctl" data-panel-toggle="mirror" title="Copy-trade mirror — M" aria-label="Toggle mirror">⇋</button>
					<button class="asc-ctl" data-panel-toggle="hud" title="Portfolio HUD — B" aria-label="Toggle portfolio HUD">📈</button>
					<button class="asc-ctl" data-panel-toggle="stage" title="Live stage show — G" aria-label="Toggle live stage show">🎙</button>
					<button class="asc-ctl" data-panel-toggle="heatmap" title="Sentiment heatmap — H" aria-label="Toggle sentiment heatmap">🌡</button>
				</div>
				<div class="asc-ctl-sep"></div>
				<button class="asc-ctl" id="asc-fit-btn" title="Fit / Fill screen — V" aria-label="Toggle screen fit">▢</button>
				<button class="asc-ctl" id="asc-shot-btn" title="Capture screenshot — S" aria-label="Screenshot">⎙</button>
				<button class="asc-ctl" id="asc-pip-btn" title="Picture-in-picture — P" aria-label="Picture in picture">⧉</button>
				<button class="asc-ctl" id="asc-fullscreen-btn" title="Fullscreen — F" aria-label="Fullscreen">⛶</button>
				<div class="asc-ctl-sep"></div>
				<span class="asc-tod" id="asc-tod" hidden title="In-world time of day">· —</span>
				<button class="asc-ctl asc-ctl--label" id="asc-ambient-btn" title="Ambient mode — your agent hosts a living world — A" aria-label="Toggle ambient world mode">◉ <span>Ambient</span></button>
				<button class="asc-ctl" id="asc-audio-btn" hidden title="Narration voice — speak the host lines aloud" aria-label="Toggle narration voice">🔈</button>
				<div class="asc-ctl-sep"></div>
				<button class="asc-ctl asc-ctl--zen asc-ctl--label" id="asc-zen-btn" title="Zen mode — hide everything for a clean shot — Z">◍ <span>Zen</span></button>
				<a class="asc-ctl" id="asc-all-live" href="/agents-live" title="All live agents">◳</a>
				<a class="asc-ctl asc-ctl--primary asc-ctl--label" id="asc-agent-link" href="/agents">Agent →</a>
			</div>
		</header>

		<div class="asc-stage" id="asc-stage" style="display:none">
			<!-- populated by agent-screen.js -->
		</div>

		<div id="asc-no-agent" class="asc-no-agent" style="display:flex">
			<div class="ws-spinner"></div>
		</div>

		<div class="asc-toast-wrap" id="asc-toast-wrap"></div>

		<script type="module" src="/src/agent-screen.js"></script>
		<script src="/footer.js"></script>
	</body>
</html>
