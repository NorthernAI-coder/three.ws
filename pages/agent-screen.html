<!doctype html>
<html lang="en">
	<head>
		<script>/* three.ws theme boot — no-flash */(function(){try{var m=localStorage.getItem('twx_theme');var l=m==='auto'?(window.matchMedia&&window.matchMedia('(prefers-color-scheme: light)').matches):m==='light';document.documentElement.setAttribute('data-theme',l?'light':'dark');}catch(e){document.documentElement.setAttribute('data-theme','dark');}})();</script>
		<meta charset="utf-8" />
		<title>Agent Screen · three.ws</title>
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<meta name="theme-color" content="#060a12" />
		<meta name="description" content="Watch your agent in real time — see their screen and avatar as they autonomously trade, browse, and act." />

		<meta property="og:type" content="website" />
		<meta property="og:url" content="https://three.ws/agent-screen" />
		<meta property="og:title" content="Agent Screen · three.ws" />
		<meta property="og:description" content="Watch your agent work — live screen and avatar feed." />
		<meta property="og:image" content="https://three.ws/og-image.png" />
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:image" content="https://three.ws/og-image.png" />

		<link rel="icon" href="/favicon.ico" sizes="any" />
		<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
		<link rel="apple-touch-icon" href="/apple-touch-icon.png" />
		<link rel="manifest" href="/site.webmanifest" />
		<link rel="stylesheet" href="/style.css" />
		<link rel="stylesheet" href="/fonts/fonts.css" />

		<style>
			:root {
				/* Monochrome viewer: the accent and the "live" signal are both pure
				   white against the near-black panels; depth comes from tone, not hue. */
				--screen-accent: #f4f4f5;
				--screen-live: #ffffff;
				--screen-dark: rgba(255,255,255,0.3);
				--screen-on-accent: #0a0a0b;
			}

			body {
				overflow: hidden;
				display: flex;
				flex-direction: column;
				min-height: 100vh;
				background: #060a12;
			}

			/* ── header ── */
			.asc-header {
				display: flex;
				align-items: center;
				gap: 0.9rem;
				padding: 0.6rem 1rem;
				border-bottom: 1px solid rgba(255,255,255,0.07);
				background: rgba(6, 10, 18, 0.95);
				backdrop-filter: blur(12px);
				flex: none;
				z-index: 30;
			}
			.asc-header .back {
				display: inline-flex;
				align-items: center;
				gap: 0.4rem;
				color: rgba(255,255,255,0.6);
				text-decoration: none;
				font-size: 0.82rem;
				font-weight: 600;
				padding: 0.3rem 0.55rem;
				border-radius: 7px;
				transition: background 0.15s, color 0.15s;
			}
			.asc-header .back:hover { color: #fff; background: rgba(255,255,255,0.07); }
			.asc-agent-info { display: flex; align-items: center; gap: 0.65rem; }
			.asc-agent-name {
				font-size: 0.95rem;
				font-weight: 680;
				color: #eef2fa;
				letter-spacing: -0.01em;
			}
			.asc-live-badge {
				display: inline-flex;
				align-items: center;
				gap: 0.35rem;
				background: rgba(255,255,255,0.12);
				color: var(--screen-live);
				font-size: 0.72rem;
				font-weight: 700;
				letter-spacing: 0.07em;
				text-transform: uppercase;
				padding: 0.25rem 0.6rem;
				border-radius: 999px;
				border: 1px solid rgba(255,255,255,0.25);
			}
			.asc-live-badge .dot {
				width: 6px;
				height: 6px;
				border-radius: 50%;
				background: var(--screen-live);
				animation: asc-pulse 1.4s ease-in-out infinite;
			}
			.asc-live-badge.dark {
				background: rgba(255,255,255,0.06);
				color: var(--screen-dark);
				border-color: rgba(255,255,255,0.1);
			}
			.asc-live-badge.dark .dot {
				background: var(--screen-dark);
				animation: none;
			}
			.asc-header-right {
				margin-left: auto;
				display: flex;
				align-items: center;
				gap: 0.6rem;
			}
			.asc-btn {
				appearance: none;
				background: rgba(255,255,255,0.07);
				border: 1px solid rgba(255,255,255,0.12);
				color: rgba(255,255,255,0.75);
				border-radius: 8px;
				padding: 0.35rem 0.75rem;
				font: inherit;
				font-size: 0.8rem;
				cursor: pointer;
				transition: background 0.15s, color 0.15s;
			}
			.asc-btn:hover { background: rgba(255,255,255,0.12); color: #fff; }

			/* ── main layout ── */
			.asc-main {
				flex: 1;
				min-height: 0;
				display: flex;
				overflow: hidden;
			}

			/* ── screen panel (left 64%) ── */
			.asc-screen-panel {
				flex: 0 0 64%;
				min-width: 0;
				display: flex;
				flex-direction: column;
				border-right: 1px solid rgba(255,255,255,0.06);
				background: #04060d;
				position: relative;
			}
			.asc-screen-label {
				padding: 0.5rem 0.9rem;
				font-size: 0.72rem;
				font-weight: 600;
				letter-spacing: 0.08em;
				text-transform: uppercase;
				color: rgba(255,255,255,0.35);
				border-bottom: 1px solid rgba(255,255,255,0.05);
				flex: none;
			}
			.asc-screen-wrap {
				flex: 1;
				min-height: 0;
				display: flex;
				align-items: center;
				justify-content: center;
				position: relative;
				overflow: hidden;
			}
			#asc-screen-canvas {
				max-width: 100%;
				max-height: 100%;
				display: block;
				border-radius: 4px;
				image-rendering: crisp-edges;
			}
			.asc-screen-overlay {
				position: absolute;
				inset: 0;
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				gap: 1rem;
				color: rgba(255,255,255,0.5);
				font-size: 0.9rem;
				pointer-events: none;
			}
			.asc-screen-overlay .pulse-ring {
				width: 56px;
				height: 56px;
				border: 2px solid rgba(255,255,255,0.35);
				border-radius: 50%;
				animation: asc-ring 2s ease-out infinite;
				position: relative;
			}
			.asc-screen-overlay .pulse-ring::after {
				content: '';
				position: absolute;
				inset: 8px;
				border-radius: 50%;
				background: rgba(255,255,255,0.12);
				animation: asc-inner 2s ease-out infinite;
			}
			.asc-screen-overlay p { margin: 0; text-align: center; }
			.asc-screen-overlay small { font-size: 0.75rem; color: rgba(255,255,255,0.3); }

			/* ── right panel ── */
			.asc-right-panel {
				flex: 1;
				min-width: 0;
				display: flex;
				flex-direction: column;
				background: #060a14;
			}

			/* ── webcam section ── */
			.asc-webcam-section {
				flex: 0 0 auto;
				border-bottom: 1px solid rgba(255,255,255,0.06);
			}
			.asc-webcam-label {
				padding: 0.5rem 0.9rem;
				font-size: 0.72rem;
				font-weight: 600;
				letter-spacing: 0.08em;
				text-transform: uppercase;
				color: rgba(255,255,255,0.35);
				border-bottom: 1px solid rgba(255,255,255,0.05);
			}
			.asc-webcam-wrap {
				padding: 0.9rem;
				display: flex;
				justify-content: center;
			}
			.asc-webcam-bezel {
				position: relative;
				border-radius: 14px;
				overflow: hidden;
				border: 2px solid rgba(255,255,255,0.1);
				background: #0a0d1a;
				box-shadow: 0 4px 24px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.04);
				aspect-ratio: 4/3;
				width: 100%;
				max-width: 300px;
			}
			.asc-webcam-bezel video,
			.asc-webcam-bezel canvas {
				width: 100%;
				height: 100%;
				object-fit: cover;
				display: block;
			}
			.asc-webcam-badge {
				position: absolute;
				top: 8px;
				left: 10px;
				display: flex;
				align-items: center;
				gap: 5px;
				background: rgba(0,0,0,0.65);
				backdrop-filter: blur(4px);
				border-radius: 6px;
				padding: 3px 8px;
				font-size: 0.7rem;
				font-weight: 600;
				color: #fff;
			}
			.asc-webcam-badge .cam-dot {
				width: 6px;
				height: 6px;
				border-radius: 50%;
				background: var(--screen-live);
			}
			.asc-webcam-idle {
				display: flex;
				align-items: center;
				justify-content: center;
				height: 100%;
				color: rgba(255,255,255,0.3);
				font-size: 0.82rem;
			}

			/* ── activity log ── */
			.asc-log-section { flex: 1; min-height: 0; display: flex; flex-direction: column; }
			.asc-log-label {
				padding: 0.5rem 0.9rem;
				font-size: 0.72rem;
				font-weight: 600;
				letter-spacing: 0.08em;
				text-transform: uppercase;
				color: rgba(255,255,255,0.35);
				border-bottom: 1px solid rgba(255,255,255,0.05);
				flex: none;
			}
			#asc-log {
				flex: 1;
				min-height: 0;
				overflow-y: auto;
				padding: 0.6rem 0;
				display: flex;
				flex-direction: column-reverse;
				scrollbar-width: thin;
				scrollbar-color: rgba(255,255,255,0.1) transparent;
			}
			.asc-log-entry {
				display: flex;
				align-items: flex-start;
				gap: 0.55rem;
				padding: 0.4rem 0.9rem;
				font-size: 0.8rem;
				line-height: 1.4;
				border-bottom: 1px solid rgba(255,255,255,0.03);
				animation: asc-fadein 0.25s ease;
			}
			.asc-log-entry:first-child { border-bottom: none; }
			.asc-log-time { color: rgba(255,255,255,0.28); font-size: 0.72rem; flex: none; padding-top: 1px; }
			.asc-log-type {
				flex: none;
				font-size: 0.68rem;
				font-weight: 700;
				letter-spacing: 0.06em;
				text-transform: uppercase;
				padding: 1px 6px;
				border-radius: 4px;
			}
			.asc-log-type.screenshot { background: rgba(255,255,255,0.15); color: #d4d4d8; }
			.asc-log-type.trade { background: rgba(255,255,255,0.15); color: #ffffff; }
			.asc-log-type.analysis { background: rgba(255,255,255,0.15); color: #d4d4d8; }
			.asc-log-type.activity { background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.5); }
			.asc-log-text { color: rgba(255,255,255,0.78); }
			.asc-log-empty {
				display: flex;
				align-items: center;
				justify-content: center;
				height: 80px;
				color: rgba(255,255,255,0.2);
				font-size: 0.82rem;
			}

			/* ── current activity bar ── */
			.asc-activity-bar {
				padding: 0.55rem 0.9rem;
				background: rgba(255,255,255,0.03);
				border-top: 1px solid rgba(255,255,255,0.06);
				font-size: 0.82rem;
				color: rgba(255,255,255,0.6);
				display: flex;
				align-items: center;
				gap: 0.5rem;
				min-height: 38px;
				flex: none;
			}
			.asc-activity-icon { font-size: 0.9rem; flex: none; }
			#asc-current-activity { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

			/* ── no-agent / setup state ── */
			.asc-no-agent {
				flex: 1;
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				gap: 1.2rem;
				text-align: center;
				padding: 2rem;
				color: #e8edf7;
				font-family: system-ui, sans-serif;
			}
			.asc-no-agent h2 { margin: 0; font-size: 1.15rem; font-weight: 680; color: #c8d4f0; }
			.asc-no-agent p { margin: 0; font-size: 0.88rem; color: rgba(255,255,255,0.45); max-width: 340px; }
			.asc-no-agent a {
				display: inline-flex;
				align-items: center;
				gap: 0.4rem;
				background: var(--screen-accent);
				color: var(--screen-on-accent);
				border-radius: 9px;
				padding: 0.55rem 1.1rem;
				font-weight: 650;
				font-size: 0.88rem;
				text-decoration: none;
				transition: opacity 0.15s;
			}
			.asc-no-agent a:hover { opacity: 0.88; }

			/* ── Worker Setup panel ── */
			.ws-setup {
				flex: 1;
				overflow-y: auto;
				padding: 2.5rem 1rem 3rem;
				display: flex;
				flex-direction: column;
				align-items: center;
				animation: asc-fadein 0.3s ease both;
			}
			.ws-setup-inner {
				width: 100%;
				max-width: 680px;
				display: flex;
				flex-direction: column;
				gap: 1.5rem;
			}
			.ws-setup-hero {
				text-align: center;
				margin-bottom: 0.5rem;
			}
			.ws-setup-hero h1 {
				margin: 0 0 0.5rem;
				font-size: 1.6rem;
				font-weight: 760;
				color: #f4f4f5;
				letter-spacing: -0.03em;
			}
			.ws-setup-hero p {
				margin: 0;
				color: rgba(255,255,255,0.45);
				font-size: 0.9rem;
				line-height: 1.55;
			}
			.ws-setup-step {
				background: rgba(255,255,255,0.035);
				border: 1px solid rgba(255,255,255,0.08);
				border-radius: 14px;
				overflow: hidden;
			}
			.ws-setup-step-head {
				display: flex;
				align-items: center;
				gap: 0.75rem;
				padding: 0.95rem 1.1rem;
				border-bottom: 1px solid rgba(255,255,255,0.07);
			}
			.ws-step-num {
				width: 26px;
				height: 26px;
				border-radius: 50%;
				background: rgba(255,255,255,0.18);
				border: 1.5px solid rgba(255,255,255,0.4);
				color: #d4d4d8;
				font-size: 0.78rem;
				font-weight: 760;
				display: flex;
				align-items: center;
				justify-content: center;
				flex: none;
			}
			.ws-step-num.done {
				background: rgba(255,255,255,0.15);
				border-color: rgba(255,255,255,0.4);
				color: #ffffff;
			}
			.ws-setup-step-head h3 {
				margin: 0;
				font-size: 0.92rem;
				font-weight: 680;
				color: #dce6ff;
				letter-spacing: -0.01em;
			}
			.ws-setup-step-head p {
				margin: 0;
				font-size: 0.8rem;
				color: rgba(255,255,255,0.4);
			}
			.ws-setup-step-body { padding: 1.1rem; }

			/* agent picker */
			.ws-agent-grid {
				display: grid;
				grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
				gap: 0.65rem;
			}
			.ws-agent-card {
				display: flex;
				align-items: center;
				gap: 0.65rem;
				padding: 0.65rem 0.8rem;
				border-radius: 10px;
				border: 1.5px solid rgba(255,255,255,0.09);
				background: rgba(255,255,255,0.04);
				cursor: pointer;
				transition: border-color 0.15s, background 0.15s;
				text-align: left;
			}
			.ws-agent-card:hover { border-color: rgba(255,255,255,0.35); background: rgba(255,255,255,0.07); }
			.ws-agent-card.selected { border-color: #f4f4f5; background: rgba(255,255,255,0.12); }
			.ws-agent-avatar {
				width: 36px;
				height: 36px;
				border-radius: 8px;
				object-fit: cover;
				flex: none;
				background: rgba(255,255,255,0.15);
				border: 1px solid rgba(255,255,255,0.2);
			}
			.ws-agent-avatar-placeholder {
				width: 36px;
				height: 36px;
				border-radius: 8px;
				flex: none;
				background: linear-gradient(135deg, rgba(255,255,255,0.2), rgba(255,255,255,0.2));
				border: 1px solid rgba(255,255,255,0.2);
				display: flex;
				align-items: center;
				justify-content: center;
				font-size: 1rem;
			}
			.ws-agent-info { min-width: 0; }
			.ws-agent-name {
				font-size: 0.82rem;
				font-weight: 660;
				color: #dce6ff;
				white-space: nowrap;
				overflow: hidden;
				text-overflow: ellipsis;
			}
			.ws-agent-uuid {
				font-size: 0.7rem;
				color: rgba(255,255,255,0.3);
				font-family: monospace;
				white-space: nowrap;
				overflow: hidden;
				text-overflow: ellipsis;
			}
			.ws-agent-empty {
				color: rgba(255,255,255,0.35);
				font-size: 0.85rem;
				padding: 1rem 0;
				text-align: center;
			}
			.ws-agent-empty a { color: #d4d4d8; }

			/* API key area */
			.ws-key-row {
				display: flex;
				gap: 0.65rem;
				align-items: center;
			}
			.ws-key-display {
				flex: 1;
				background: rgba(0,0,0,0.3);
				border: 1px solid rgba(255,255,255,0.1);
				border-radius: 8px;
				padding: 0.6rem 0.85rem;
				font-family: 'Courier New', monospace;
				font-size: 0.8rem;
				color: #c8c8cc;
				overflow: hidden;
				text-overflow: ellipsis;
				white-space: nowrap;
				min-width: 0;
			}
			.ws-key-display.placeholder { color: rgba(255,255,255,0.2); font-style: italic; font-family: inherit; }
			.ws-btn {
				appearance: none;
				border: none;
				border-radius: 9px;
				padding: 0.55rem 1rem;
				font: inherit;
				font-size: 0.82rem;
				font-weight: 660;
				cursor: pointer;
				transition: opacity 0.15s, transform 0.1s;
				white-space: nowrap;
				flex: none;
			}
			.ws-btn:active { transform: scale(0.97); }
			.ws-btn-primary {
				background: var(--screen-accent);
				color: var(--screen-on-accent);
			}
			.ws-btn-primary:hover { opacity: 0.88; }
			.ws-btn-primary:disabled { opacity: 0.45; cursor: not-allowed; }
			.ws-btn-ghost {
				background: rgba(255,255,255,0.07);
				border: 1px solid rgba(255,255,255,0.12);
				color: rgba(255,255,255,0.7);
			}
			.ws-btn-ghost:hover { background: rgba(255,255,255,0.11); color: #fff; }
			.ws-btn-copy {
				background: rgba(255,255,255,0.07);
				border: 1px solid rgba(255,255,255,0.12);
				color: rgba(255,255,255,0.6);
				padding: 0.55rem 0.75rem;
				border-radius: 8px;
				font-size: 0.8rem;
			}
			.ws-btn-copy.copied { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.3); color: #ffffff; }
			.ws-key-note {
				font-size: 0.78rem;
				color: rgba(255,255,255,0.35);
				margin-top: 0.6rem;
				line-height: 1.5;
			}
			.ws-key-note strong { color: rgba(255,255,255,0.8); }

			/* Command block */
			.ws-cmd-tabs {
				display: flex;
				gap: 0.4rem;
				margin-bottom: 0.8rem;
			}
			.ws-cmd-tab {
				appearance: none;
				border: 1px solid rgba(255,255,255,0.1);
				background: rgba(255,255,255,0.04);
				color: rgba(255,255,255,0.5);
				border-radius: 7px;
				padding: 0.3rem 0.7rem;
				font: inherit;
				font-size: 0.78rem;
				font-weight: 640;
				cursor: pointer;
				transition: all 0.15s;
			}
			.ws-cmd-tab.active {
				background: rgba(255,255,255,0.15);
				border-color: rgba(255,255,255,0.4);
				color: #d4d4d8;
			}
			.ws-cmd-block {
				position: relative;
				background: rgba(0,0,0,0.4);
				border: 1px solid rgba(255,255,255,0.09);
				border-radius: 10px;
				padding: 1rem 1rem 1rem 1.1rem;
			}
			.ws-cmd-copy {
				position: absolute;
				top: 0.6rem;
				right: 0.6rem;
			}
			.ws-cmd-block pre {
				margin: 0;
				font-family: 'Courier New', monospace;
				font-size: 0.78rem;
				line-height: 1.65;
				color: #c8c8cc;
				overflow-x: auto;
				white-space: pre;
				padding-right: 3rem;
			}
			.ws-cmd-block pre .cmd-comment { color: rgba(255,255,255,0.3); }
			.ws-cmd-block pre .cmd-key { color: #d4d4d8; }
			.ws-cmd-block pre .cmd-val { color: #c8c8cc; }
			.ws-cmd-block pre .cmd-run { color: #d4d4d8; }
			.ws-cmd-block pre .cmd-dim { color: rgba(255,255,255,0.25); }

			.ws-status-ok {
				display: flex;
				align-items: center;
				gap: 0.5rem;
				font-size: 0.82rem;
				color: #ffffff;
				margin-top: 0.9rem;
				padding: 0.55rem 0.85rem;
				background: rgba(255,255,255,0.08);
				border: 1px solid rgba(255,255,255,0.2);
				border-radius: 8px;
			}
			.ws-watch-link {
				display: inline-flex;
				align-items: center;
				gap: 0.45rem;
				margin-top: 0.75rem;
				background: var(--screen-accent);
				color: var(--screen-on-accent);
				border-radius: 9px;
				padding: 0.6rem 1.2rem;
				font-size: 0.88rem;
				font-weight: 660;
				text-decoration: none;
				transition: opacity 0.15s;
				width: fit-content;
			}
			.ws-watch-link:hover { opacity: 0.88; }
			.ws-not-signed-in {
				display: flex;
				align-items: center;
				gap: 0.6rem;
				font-size: 0.85rem;
				color: rgba(255,255,255,0.5);
				padding: 0.8rem 1rem;
				background: rgba(255,255,255,0.06);
				border: 1px solid rgba(255,255,255,0.15);
				border-radius: 8px;
			}
			.ws-not-signed-in a { color: #d4d4d8; }
			.ws-spinner {
				display: inline-block;
				width: 14px;
				height: 14px;
				border: 2px solid rgba(255,255,255,0.3);
				border-top-color: #f4f4f5;
				border-radius: 50%;
				animation: ws-spin 0.7s linear infinite;
				flex: none;
			}
			@keyframes ws-spin { to { transform: rotate(360deg); } }

			/* ── animations ── */
			@keyframes asc-pulse { 0%,100%{opacity:1}50%{opacity:0.35} }
			@keyframes asc-ring { 0%{transform:scale(1);opacity:0.8}100%{transform:scale(1.6);opacity:0} }
			@keyframes asc-inner { 0%{opacity:0.5}100%{opacity:0} }
			@keyframes asc-fadein { from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none} }

			/* ── task input bar ── */
			.asc-task-bar {
				flex: none;
				border-top: 1px solid rgba(255,255,255,0.06);
				background: rgba(4, 6, 15, 0.95);
				backdrop-filter: blur(8px);
				padding: 0.6rem 0.8rem;
				display: flex;
				flex-direction: column;
				gap: 0.35rem;
			}
			.asc-task-form {
				display: flex;
				align-items: center;
				gap: 0.55rem;
				background: rgba(255,255,255,0.04);
				border: 1px solid rgba(255,255,255,0.1);
				border-radius: 10px;
				padding: 0.45rem 0.55rem 0.45rem 0.7rem;
				transition: border-color 0.15s, box-shadow 0.15s;
			}
			.asc-task-form:focus-within {
				border-color: rgba(255,255,255,0.55);
				box-shadow: 0 0 0 3px rgba(255,255,255,0.12);
			}
			.asc-task-icon {
				color: rgba(255,255,255,0.6);
				font-size: 0.72rem;
				flex: none;
				user-select: none;
			}
			.asc-task-input {
				flex: 1;
				min-width: 0;
				background: transparent;
				border: none;
				outline: none;
				color: rgba(255,255,255,0.9);
				font: inherit;
				font-size: 0.85rem;
				caret-color: #f4f4f5;
			}
			.asc-task-input::placeholder { color: rgba(255,255,255,0.28); }
			.asc-task-input:disabled { opacity: 0.5; }
			.asc-task-send {
				flex: none;
				appearance: none;
				border: none;
				background: var(--screen-accent);
				color: var(--screen-on-accent);
				border-radius: 7px;
				width: 30px;
				height: 30px;
				display: flex;
				align-items: center;
				justify-content: center;
				cursor: pointer;
				transition: opacity 0.15s, transform 0.1s;
			}
			.asc-task-send:hover { opacity: 0.88; }
			.asc-task-send:active { transform: scale(0.93); }
			.asc-task-send:disabled { opacity: 0.35; cursor: not-allowed; }
			.asc-task-send.sending { opacity: 0.6; animation: asc-pulse 0.8s ease-in-out infinite; }
			.asc-task-status {
				font-size: 0.75rem;
				min-height: 1rem;
				padding-left: 0.2rem;
				color: rgba(255,255,255,0.4);
				transition: opacity 0.2s;
			}
			.asc-task-status.ok { color: var(--screen-live); }
			.asc-task-status.err { color: #f4f4f5; }

			/* ── fullscreen mode ── */
			.asc-screen-panel:fullscreen { background: #000; }
			.asc-screen-panel:fullscreen .asc-screen-label { display: none; }
			.asc-screen-panel:fullscreen .asc-screen-wrap { align-items: stretch; }
			.asc-screen-panel:fullscreen #asc-screen-canvas { max-height: 100%; border-radius: 0; }
			.asc-screen-panel:fullscreen .asc-task-bar { display: none; }

			/* ── responsive ── */
			@media (max-width: 700px) {
				.asc-main { flex-direction: column; }
				.asc-screen-panel { flex: 0 0 55vh; border-right: none; border-bottom: 1px solid rgba(255,255,255,0.06); }
				.asc-right-panel { flex: 1; }
				.asc-webcam-wrap { padding: 0.6rem; }
				.asc-webcam-bezel { max-width: 180px; }
			}
		</style>
	</head>
	<body>
		<script src="/nav.js"></script>

		<header class="asc-header">
			<a class="back" id="asc-back" href="/agents">← Agents</a>
			<div class="asc-agent-info">
				<span class="asc-agent-name" id="asc-agent-name">Loading…</span>
				<span class="asc-live-badge dark" id="asc-live-badge">
					<span class="dot"></span>
					<span id="asc-badge-text">Connecting</span>
				</span>
			</div>
			<div class="asc-header-right">
				<button class="asc-btn" id="asc-fullscreen-btn" title="Fullscreen screen view">⛶ Fullscreen</button>
				<a class="asc-btn" id="asc-agent-link" href="/agents" style="text-decoration:none">View Agent →</a>
			</div>
		</header>

		<div class="asc-main" id="asc-main">
			<!-- populated by agent-screen.js -->
			<div id="asc-no-agent" class="asc-no-agent" style="display:flex">
				<div class="ws-spinner"></div>
			</div>
		</div>

		<script type="module" src="/src/agent-screen.js"></script>
		<script src="/footer.js"></script>
	</body>
</html>
