<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<title>Widget Studio · three.ws</title>
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link rel="stylesheet" href="/style.css" />
		<link rel="stylesheet" href="/marketplace.css" />
		<script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>
		<style>
			.studio-container {
				display: flex;
				height: 100vh;
			}
			.studio-sidebar {
				width: 320px;
				padding: 20px;
				background: #111;
				color: #eee;
				overflow-y: auto;
				flex-shrink: 0;
			}
			.studio-preview {
				flex-grow: 1;
				padding: 20px;
				display: flex;
				flex-direction: column;
				gap: 16px;
			}
			.studio-preview iframe {
				flex: 1;
				border: 1px solid #333;
				border-radius: 6px;
			}
			.form-group {
				margin-bottom: 18px;
			}
			.form-group label {
				display: block;
				margin-bottom: 6px;
				font-size: 11px;
				text-transform: uppercase;
				letter-spacing: 0.04em;
				color: #888;
			}
			.form-group input[type="text"],
			.form-group input[type="color"],
			.form-group select {
				width: 100%;
				padding: 8px;
				background: #1a1a1a;
				border: 1px solid #333;
				color: #eee;
				border-radius: 4px;
				box-sizing: border-box;
				font-size: 13px;
			}
			.form-group input[type="color"] {
				height: 36px;
				padding: 2px 4px;
				cursor: pointer;
			}

			/* avatar gallery */
			.avatar-gallery {
				display: grid;
				grid-template-columns: repeat(2, 1fr);
				gap: 8px;
				margin-bottom: 10px;
			}
			.av-card {
				border: 2px solid #2a2a2a;
				border-radius: 6px;
				cursor: pointer;
				background: #0d0d0d;
				overflow: hidden;
				position: relative;
				height: 110px;
				display: flex;
				align-items: flex-end;
				justify-content: center;
				padding-bottom: 7px;
				transition: border-color 0.15s;
			}
			.av-card:hover { border-color: #444; }
			.av-card.selected { border-color: #4a9eff; }
			.av-card model-viewer {
				position: absolute;
				inset: 0;
				width: 100%;
				height: 100%;
				--poster-color: transparent;
			}
			.av-card-label {
				position: relative;
				z-index: 1;
				font-size: 11px;
				color: #ddd;
				background: rgba(0,0,0,0.6);
				padding: 2px 7px;
				border-radius: 3px;
			}
			.av-card-custom {
				background: #0d0d0d;
				border: 2px dashed #2a2a2a;
				color: #555;
				font-size: 12px;
				text-align: center;
				flex-direction: column;
				gap: 4px;
				justify-content: center;
				align-items: center;
				padding-bottom: 0;
			}
			.av-card-custom .plus { font-size: 22px; color: #333; line-height: 1; }

			#embed-code {
				width: 100%;
				background: #0a0a0a;
				color: #00ff41;
				padding: 10px;
				border: 1px solid #2a2a2a;
				border-radius: 4px;
				min-height: 80px;
				white-space: pre-wrap;
				word-wrap: break-word;
				font-family: monospace;
				font-size: 11px;
			}
			#copy-btn {
				background: #1e1e1e;
				border: 1px solid #333;
				color: #ccc;
				padding: 8px 16px;
				font-size: 12px;
				cursor: pointer;
				border-radius: 4px;
				width: 100%;
				margin-top: 8px;
			}
			#copy-btn:hover { background: #252525; color: #fff; }
		</style>
			<link rel="stylesheet" href="/nav.css" />
			<link rel="stylesheet" href="/footer.css" />
			<script defer src="/footer-newsletter.js"></script>
	</head>
	<body class="market-page">
		<header class="site-header">
			<h1 class="site-header-brand">
				<a href="/" aria-label="three.ws home"><img class="wordmark-logo" src="/three.svg" alt="" aria-hidden="true" /><span class="wordmark-dot" aria-hidden="true"></span>three.ws</a>
			</h1>
			<div id="nav-container"></div>
		</header>
		<script src="/nav.js"></script>

		<div class="studio-container">
			<aside class="studio-sidebar">
				<h2 style="margin-top:0">Widget Studio</h2>

				<div class="form-group">
					<label>Avatar</label>
					<div class="avatar-gallery" id="avatar-gallery">
						<!-- built by JS -->
					</div>
					<input type="text" id="custom-avatar-url" placeholder="Paste custom GLB/GLTF URL…" />
				</div>

				<div class="form-group">
					<label>Idle Animation</label>
					<select id="anim-select">
						<option value="">None</option>
						<option value="Idle_Breath">Idle Breath</option>
						<option value="Just_chilling">Just Chilling</option>
						<option value="Standard_Vtubing_Movement">Vtubing Movement</option>
						<option value="Standard_Waiting">Waiting</option>
						<option value="dance_shuffle">Dance Shuffle</option>
						<option value="Expressing_joy">Expressing Joy</option>
						<option value="Cheering">Cheering</option>
						<option value="Brag_n_Claps">Brag &amp; Claps</option>
						<option value="Flexing_Arm">Flexing Arm</option>
						<option value="Energic_conductor">Energetic Conductor</option>
						<option value="Facepalm">Facepalm</option>
						<option value="Call_Me">Call Me</option>
					</select>
				</div>

				<div class="form-group">
					<label>Brand Color</label>
					<input type="color" id="brand-color" value="#4a9eff" />
				</div>

				<div class="form-group">
					<label>Theme</label>
					<select id="theme-select">
						<option value="dark">Dark</option>
						<option value="light">Light</option>
					</select>
				</div>

				<h3 style="font-size:13px;color:#888;margin-bottom:6px;">Embed Code</h3>
				<pre id="embed-code"><code></code></pre>
				<button id="copy-btn">Copy Code</button>
			</aside>
			<main class="studio-preview">
				<iframe id="widget-preview" style="width:100%;height:100%;border:1px solid #333;border-radius:6px;"></iframe>
			</main>
		</div>

		<script>
			const AVATARS = [
				{ id: 'default', label: 'Default', url: '/avatars/default.glb' },
				{ id: 'cz', label: 'CZ', url: '/avatars/cz.glb' },
			];

			const gallery = document.getElementById('avatar-gallery');
			const customUrlInput = document.getElementById('custom-avatar-url');
			const animSelect = document.getElementById('anim-select');
			const brandColorInput = document.getElementById('brand-color');
			const themeSelect = document.getElementById('theme-select');
			const embedCodeEl = document.getElementById('embed-code').querySelector('code');
			const previewFrame = document.getElementById('widget-preview');
			const copyBtn = document.getElementById('copy-btn');

			let selectedAvatarUrl = AVATARS[0].url;

			AVATARS.forEach(av => {
				const card = document.createElement('div');
				card.className = 'av-card' + (av.url === selectedAvatarUrl ? ' selected' : '');
				card.dataset.url = av.url;

				const mv = document.createElement('model-viewer');
				mv.setAttribute('src', av.url);
				mv.setAttribute('auto-rotate', '');
				mv.setAttribute('camera-controls', '');
				mv.setAttribute('shadow-intensity', '0.5');
				mv.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;--poster-color:transparent';

				const lbl = document.createElement('span');
				lbl.className = 'av-card-label';
				lbl.textContent = av.label;

				card.appendChild(mv);
				card.appendChild(lbl);

				card.addEventListener('click', () => {
					gallery.querySelectorAll('.av-card').forEach(c => c.classList.remove('selected'));
					card.classList.add('selected');
					selectedAvatarUrl = av.url;
					customUrlInput.value = '';
					updatePreviewAndCode();
				});

				gallery.appendChild(card);
			});

			// Custom URL card
			const customCard = document.createElement('div');
			customCard.className = 'av-card av-card-custom';
			customCard.innerHTML = '<span class="plus">+</span>Custom URL';
			customCard.addEventListener('click', () => { customUrlInput.focus(); });
			gallery.appendChild(customCard);

			customUrlInput.addEventListener('input', () => {
				const val = customUrlInput.value.trim();
				if (val) {
					gallery.querySelectorAll('.av-card').forEach(c => c.classList.remove('selected'));
					customCard.classList.add('selected');
					selectedAvatarUrl = val;
				} else {
					customCard.classList.remove('selected');
					const first = gallery.querySelector('.av-card:not(.av-card-custom)');
					if (first) {
						first.classList.add('selected');
						selectedAvatarUrl = first.dataset.url;
					}
				}
				updatePreviewAndCode();
			});

			function updatePreviewAndCode() {
				const idleAnim = animSelect.value;
				const brandColor = brandColorInput.value;
				const theme = themeSelect.value;

				const p = new URLSearchParams({ avatarUrl: selectedAvatarUrl, brandColor, theme });
				if (idleAnim) p.set('idleAnim', idleAnim);

				const widgetUrl = `/agent-chat-widget.html?${p}`;
				previewFrame.src = widgetUrl;

				embedCodeEl.textContent = `<iframe src="${location.origin}${widgetUrl}" width="400" height="600" style="border:none;"></iframe>`;
			}

			animSelect.addEventListener('change', updatePreviewAndCode);
			brandColorInput.addEventListener('input', updatePreviewAndCode);
			themeSelect.addEventListener('change', updatePreviewAndCode);

			copyBtn.addEventListener('click', () => {
				navigator.clipboard.writeText(embedCodeEl.textContent);
				copyBtn.textContent = 'Copied!';
				setTimeout(() => { copyBtn.textContent = 'Copy Code'; }, 2000);
			});

			updatePreviewAndCode();
		</script>

		<div id="footer-container"></div>
		<script src="/footer.js"></script>
</body>
</html>
