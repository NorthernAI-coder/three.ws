<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<title>Widget Studio · three.ws</title>
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link rel="stylesheet" href="/style.css" />
		<link rel="stylesheet" href="/marketplace.css" />
		<script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>
		<style>
			.studio-container {
				display: flex;
				height: 100vh;
			}
			.studio-sidebar {
				width: 320px;
				padding: 20px;
				background: #111;
				color: #eee;
				overflow-y: auto;
				flex-shrink: 0;
			}
			.studio-preview {
				flex-grow: 1;
				padding: 20px;
				display: flex;
				flex-direction: column;
				gap: 16px;
			}
			.studio-preview iframe {
				flex: 1;
				border: 1px solid #333;
				border-radius: 6px;
			}
			.form-group {
				margin-bottom: 18px;
			}
			.form-group label {
				display: block;
				margin-bottom: 6px;
				font-size: 11px;
				text-transform: uppercase;
				letter-spacing: 0.04em;
				color: #888;
			}
			.form-group input[type="text"],
			.form-group input[type="color"],
			.form-group select {
				width: 100%;
				padding: 8px;
				background: #1a1a1a;
				border: 1px solid #333;
				color: #eee;
				border-radius: 4px;
				box-sizing: border-box;
				font-size: 13px;
			}
			.form-group input[type="color"] {
				height: 36px;
				padding: 2px 4px;
				cursor: pointer;
			}

			/* avatar gallery */
			.avatar-gallery {
				display: grid;
				grid-template-columns: repeat(2, 1fr);
				gap: 8px;
				margin-bottom: 10px;
			}
			.av-card {
				border: 2px solid #2a2a2a;
				border-radius: 6px;
				cursor: pointer;
				background: #0d0d0d;
				overflow: hidden;
				position: relative;
				height: 110px;
				display: flex;
				align-items: flex-end;
				justify-content: center;
				padding-bottom: 7px;
				transition: border-color 0.15s;
			}
			.av-card:hover { border-color: #444; }
			.av-card.selected { border-color: #4a9eff; }
			.av-card model-viewer {
				position: absolute;
				inset: 0;
				width: 100%;
				height: 100%;
				--poster-color: transparent;
			}
			.av-card-label {
				position: relative;
				z-index: 1;
				font-size: 11px;
				color: #ddd;
				background: rgba(0,0,0,0.6);
				padding: 2px 7px;
				border-radius: 3px;
			}
			.av-card-custom {
				background: #0d0d0d;
				border: 2px dashed #2a2a2a;
				color: #555;
				font-size: 12px;
				text-align: center;
				flex-direction: column;
				gap: 4px;
				justify-content: center;
				align-items: center;
				padding-bottom: 0;
			}
			.av-card-custom .plus { font-size: 22px; color: #333; line-height: 1; }

			#embed-code {
				width: 100%;
				background: #0a0a0a;
				color: #00ff41;
				padding: 10px;
				border: 1px solid #2a2a2a;
				border-radius: 4px;
				min-height: 80px;
				white-space: pre-wrap;
				word-wrap: break-word;
				font-family: monospace;
				font-size: 11px;
			}
			#copy-btn {
				background: #1e1e1e;
				border: 1px solid #333;
				color: #ccc;
				padding: 8px 16px;
				font-size: 12px;
				cursor: pointer;
				border-radius: 4px;
				width: 100%;
				margin-top: 8px;
			}
			#copy-btn:hover { background: #252525; color: #fff; }

			/* motion path section */
			.section-divider { border: none; border-top: 1px solid #1e1e1e; margin: 18px 0 14px; }
			.section-title { font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: #555; margin: 0 0 12px; }
			#path-canvas-wrap {
				position: relative; border: 1px solid #2a2a2a; border-radius: 4px;
				overflow: hidden; height: 150px; background: #070707; cursor: crosshair;
			}
			#path-canvas { position: absolute; inset: 0; width: 100%; height: 100%; }
			#path-hint {
				position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
				color: #333; font-size: 11px; pointer-events: none; white-space: nowrap;
			}
			#clear-path-btn {
				background: #111; border: 1px solid #2a2a2a; color: #666;
				padding: 5px 10px; font-size: 11px; cursor: pointer;
				border-radius: 3px; width: 100%; margin-top: 6px;
			}
			#clear-path-btn:hover { color: #ccc; border-color: #444; }
			.range-row { display: flex; align-items: center; gap: 8px; }
			.range-row input[type="range"] { flex: 1; accent-color: #4a9eff; }
			.range-val { font-size: 12px; color: #aaa; min-width: 28px; text-align: right; }
			#preview-motion-btn {
				background: #0e2340; border: 1px solid #1a4a80; color: #4a9eff;
				padding: 8px; font-size: 12px; cursor: pointer;
				border-radius: 4px; width: 100%; margin-top: 10px;
			}
			#preview-motion-btn:hover { background: #132d55; }
			#preview-motion-btn:disabled { opacity: 0.4; cursor: default; }

			/* preview pane overlay for motion demo */
			.studio-preview { position: relative; }
			#motion-preview-overlay {
				position: absolute; inset: 20px; pointer-events: none;
				z-index: 10; overflow: hidden; border-radius: 6px;
			}
		</style>
			<link rel="stylesheet" href="/nav.css" />
			<link rel="stylesheet" href="/footer.css" />
			<script defer src="/footer-newsletter.js"></script>
	</head>
	<body class="market-page">
		<header class="site-header">
			<h1 class="site-header-brand">
				<a href="/" aria-label="three.ws home"><img class="wordmark-logo" src="/three.svg" alt="" aria-hidden="true" /><span class="wordmark-dot" aria-hidden="true"></span>three.ws</a>
			</h1>
			<div id="nav-container"></div>
		</header>
		<script src="/nav.js"></script>

		<div class="studio-container">
			<aside class="studio-sidebar">
				<h2 style="margin-top:0">Widget Studio</h2>

				<div class="form-group">
					<label>Avatar</label>
					<div class="avatar-gallery" id="avatar-gallery">
						<!-- built by JS -->
					</div>
					<input type="text" id="custom-avatar-url" placeholder="Paste custom GLB/GLTF URL…" />
				</div>

				<div class="form-group">
					<label>Starting Animation</label>
					<select id="anim-select">
						<option value="">None (idle)</option>
					</select>
				</div>

				<div class="form-group">
					<label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
						<input type="checkbox" id="anim-picker-toggle" checked style="width:auto;margin:0;" />
						Show animation picker in embed
					</label>
				</div>

				<div class="form-group">
					<label>Background</label>
					<select id="bg-select">
						<option value="transparent">Transparent</option>
						<option value="dark">Dark</option>
						<option value="light">Light</option>
					</select>
				</div>

				<div class="form-group">
					<label>Brand Color</label>
					<input type="color" id="brand-color" value="#4a9eff" />
				</div>

				<div class="form-group">
					<label>Theme</label>
					<select id="theme-select">
						<option value="dark">Dark</option>
						<option value="light">Light</option>
					</select>
				</div>

				<hr class="section-divider" />
				<p class="section-title">Motion Path</p>

				<div class="form-group">
					<label>Preset</label>
					<select id="motion-preset">
						<option value="">None (Static)</option>
						<option value="patrol">Patrol — left &harr; right</option>
						<option value="slide-in">Slide In</option>
						<option value="bounce-across">Bounce Across</option>
						<option value="orbit">Orbit</option>
						<option value="figure-eight">Figure Eight</option>
						<option value="float">Float</option>
						<option value="custom">Custom (Draw Path)</option>
					</select>
				</div>

				<div class="form-group" id="draw-group" style="display:none">
					<label>Draw Path <span style="color:#555;font-weight:normal">(click to place points)</span></label>
					<div id="path-canvas-wrap">
						<canvas id="path-canvas"></canvas>
						<span id="path-hint">Click to add control points</span>
					</div>
					<button id="clear-path-btn">Clear Path</button>
				</div>

				<div id="motion-options-group" style="display:none">
					<div class="form-group">
						<label>Duration</label>
						<div class="range-row">
							<input type="range" id="motion-duration" min="1" max="15" step="0.5" value="4" />
							<span class="range-val" id="motion-duration-val">4s</span>
						</div>
					</div>
					<div class="form-group">
						<label>Repeat</label>
						<select id="motion-loop">
							<option value="true">Loop</option>
							<option value="false">Play Once</option>
						</select>
					</div>
					<div class="form-group">
						<label>Walk Animation</label>
						<select id="motion-walk-anim">
							<option value="Walking">Walking</option>
							<option value="dance_shuffle">Dancing</option>
							<option value="Energic_conductor">Energetic</option>
						</select>
					</div>
					<button id="preview-motion-btn" disabled>&#9654; Preview Motion</button>
				</div>

				<h3 style="font-size:13px;color:#888;margin-bottom:6px;margin-top:18px;">Embed Code</h3>
				<pre id="embed-code"><code></code></pre>
				<button id="copy-btn">Copy Code</button>
			</aside>
			<main class="studio-preview">
				<div id="motion-preview-overlay"></div>
				<iframe id="widget-preview" style="width:100%;height:100%;border:1px solid #333;border-radius:6px;"></iframe>
			</main>
		</div>

		<script>
			const AVATARS = [
				{ id: 'default', label: 'Default', url: '/avatars/default.glb' },
				{ id: 'cz', label: 'CZ', url: '/avatars/cz.glb' },
			];

			const gallery = document.getElementById('avatar-gallery');
			const customUrlInput = document.getElementById('custom-avatar-url');
			const animSelect = document.getElementById('anim-select');
			const animPickerToggle = document.getElementById('anim-picker-toggle');
			const bgSelect = document.getElementById('bg-select');
			const brandColorInput = document.getElementById('brand-color');
			const themeSelect = document.getElementById('theme-select');
			const embedCodeEl = document.getElementById('embed-code').querySelector('code');
			const previewFrame = document.getElementById('widget-preview');
			const copyBtn = document.getElementById('copy-btn');

			// ── Motion controls ───────────────────────────────────────────────
			const motionPresetSel   = document.getElementById('motion-preset');
			const drawGroup         = document.getElementById('draw-group');
			const motionOptionsGrp  = document.getElementById('motion-options-group');
			const pathCanvas        = document.getElementById('path-canvas');
			const pathHint          = document.getElementById('path-hint');
			const clearPathBtn      = document.getElementById('clear-path-btn');
			const motionDurationEl  = document.getElementById('motion-duration');
			const motionDurationVal = document.getElementById('motion-duration-val');
			const motionLoopSel     = document.getElementById('motion-loop');
			const motionWalkSel     = document.getElementById('motion-walk-anim');
			const previewMotionBtn  = document.getElementById('preview-motion-btn');
			const motionOverlay     = document.getElementById('motion-preview-overlay');

			let selectedAvatarUrl = AVATARS[0].url;
			let customPathPoints  = [];
			let activeMotionPath  = null;
			let motionPathLoaded  = false;

			// ── Populate animation dropdown from real manifest ────────────────
			fetch('/animations/manifest.json')
				.then(r => r.ok ? r.json() : [])
				.then(defs => {
					for (const def of defs) {
						const opt = document.createElement('option');
						opt.value = def.name;
						opt.textContent = (def.icon ? def.icon + ' ' : '') + (def.label || def.name);
						animSelect.appendChild(opt);
					}
				})
				.catch(() => {});

			// ── Avatar gallery ────────────────────────────────────────────────
			AVATARS.forEach(av => {
				const card = document.createElement('div');
				card.className = 'av-card' + (av.url === selectedAvatarUrl ? ' selected' : '');
				card.dataset.url = av.url;

				const mv = document.createElement('model-viewer');
				mv.setAttribute('src', av.url);
				mv.setAttribute('auto-rotate', '');
				mv.setAttribute('camera-controls', '');
				mv.setAttribute('shadow-intensity', '0.5');
				mv.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;--poster-color:transparent';

				const lbl = document.createElement('span');
				lbl.className = 'av-card-label';
				lbl.textContent = av.label;

				card.appendChild(mv);
				card.appendChild(lbl);

				card.addEventListener('click', () => {
					gallery.querySelectorAll('.av-card').forEach(c => c.classList.remove('selected'));
					card.classList.add('selected');
					selectedAvatarUrl = av.url;
					customUrlInput.value = '';
					updatePreviewAndCode();
				});

				gallery.appendChild(card);
			});

			const customCard = document.createElement('div');
			customCard.className = 'av-card av-card-custom';
			customCard.innerHTML = '<span class="plus">+</span>Custom URL';
			customCard.addEventListener('click', () => { customUrlInput.focus(); });
			gallery.appendChild(customCard);

			customUrlInput.addEventListener('input', () => {
				const val = customUrlInput.value.trim();
				if (val) {
					gallery.querySelectorAll('.av-card').forEach(c => c.classList.remove('selected'));
					customCard.classList.add('selected');
					selectedAvatarUrl = val;
				} else {
					customCard.classList.remove('selected');
					const first = gallery.querySelector('.av-card:not(.av-card-custom)');
					if (first) {
						first.classList.add('selected');
						selectedAvatarUrl = first.dataset.url;
					}
				}
				updatePreviewAndCode();
			});

			// ── Motion preset change ──────────────────────────────────────────
			motionPresetSel.addEventListener('change', () => {
				const val = motionPresetSel.value;
				drawGroup.style.display        = val === 'custom' ? 'block' : 'none';
				motionOptionsGrp.style.display = val ? 'block' : 'none';
				previewMotionBtn.disabled      = !val || (val === 'custom' && customPathPoints.length < 2);
				updatePreviewAndCode();
			});

			motionDurationEl.addEventListener('input', () => {
				motionDurationVal.textContent = motionDurationEl.value + 's';
				updatePreviewAndCode();
			});
			motionLoopSel.addEventListener('change', updatePreviewAndCode);
			motionWalkSel.addEventListener('change', updatePreviewAndCode);

			// ── Canvas draw mode ──────────────────────────────────────────────
			function resizeCanvas() {
				const wrap = pathCanvas.parentElement;
				pathCanvas.width  = wrap.clientWidth;
				pathCanvas.height = wrap.clientHeight;
				drawPathCanvas();
			}

			function evalSplinePreview(pts, t) {
				const n = pts.length;
				if (n === 1) return pts[0];
				if (n === 2) return [pts[0][0] + (pts[1][0] - pts[0][0]) * t, pts[0][1] + (pts[1][1] - pts[0][1]) * t];
				const segments = n - 1;
				const seg = Math.min(Math.floor(t * segments), segments - 1);
				const lt  = t * segments - seg;
				const p0  = pts[Math.max(seg - 1, 0)];
				const p1  = pts[seg];
				const p2  = pts[Math.min(seg + 1, n - 1)];
				const p3  = pts[Math.min(seg + 2, n - 1)];
				const t2  = lt * lt, t3 = t2 * lt;
				return [
					0.5 * ((2*p1[0]) + (-p0[0]+p2[0])*lt + (2*p0[0]-5*p1[0]+4*p2[0]-p3[0])*t2 + (-p0[0]+3*p1[0]-3*p2[0]+p3[0])*t3),
					0.5 * ((2*p1[1]) + (-p0[1]+p2[1])*lt + (2*p0[1]-5*p1[1]+4*p2[1]-p3[1])*t2 + (-p0[1]+3*p1[1]-3*p2[1]+p3[1])*t3)
				];
			}

			function drawPathCanvas() {
				const ctx = pathCanvas.getContext('2d');
				const w = pathCanvas.width, h = pathCanvas.height;
				ctx.clearRect(0, 0, w, h);

				if (customPathPoints.length === 0) return;

				const toCanvas = ([fx, fy]) => [fx * w, fy * h];

				if (customPathPoints.length >= 2) {
					ctx.beginPath();
					ctx.strokeStyle = '#4a9eff';
					ctx.lineWidth = 2;
					const start = toCanvas(evalSplinePreview(customPathPoints, 0));
					ctx.moveTo(start[0], start[1]);
					for (let i = 1; i <= 80; i++) {
						const pt = toCanvas(evalSplinePreview(customPathPoints, i / 80));
						ctx.lineTo(pt[0], pt[1]);
					}
					ctx.stroke();
				}

				customPathPoints.forEach((p, i) => {
					const [cx, cy] = toCanvas(p);
					ctx.beginPath();
					ctx.arc(cx, cy, 5, 0, Math.PI * 2);
					ctx.fillStyle = i === 0 ? '#00ff88' : i === customPathPoints.length - 1 ? '#ff4444' : '#4a9eff';
					ctx.fill();
				});
			}

			pathCanvas.addEventListener('pointerdown', e => {
				const rect = pathCanvas.getBoundingClientRect();
				const fx = (e.clientX - rect.left) / rect.width;
				const fy = (e.clientY - rect.top)  / rect.height;
				customPathPoints.push([fx, fy]);
				pathHint.style.display = 'none';
				drawPathCanvas();
				previewMotionBtn.disabled = customPathPoints.length < 2;
				updatePreviewAndCode();
			});

			clearPathBtn.addEventListener('click', () => {
				customPathPoints = [];
				pathHint.style.display = '';
				drawPathCanvas();
				previewMotionBtn.disabled = true;
				updatePreviewAndCode();
			});

			new ResizeObserver(resizeCanvas).observe(pathCanvas.parentElement);
			setTimeout(resizeCanvas, 50);

			// ── Motion path lazy loader ───────────────────────────────────────
			function loadMotionPath(cb) {
				if (motionPathLoaded) { cb(); return; }
				const s = document.createElement('script');
				s.src = '/motion-path.js';
				s.onload = () => { motionPathLoaded = true; cb(); };
				document.head.appendChild(s);
			}

			function stopMotionPreview() {
				if (activeMotionPath) {
					activeMotionPath.stop();
					activeMotionPath = null;
				}
				// Return iframe to its normal position in the preview pane
				const previewPane = document.querySelector('.studio-preview');
				if (previewFrame.parentElement !== previewPane) {
					previewPane.appendChild(previewFrame);
				}
				previewFrame.style.position = '';
				previewFrame.style.left = '';
				previewFrame.style.top  = '';
				previewFrame.style.width  = '';
				previewFrame.style.height = '';
				motionOverlay.innerHTML = '';
			}

			previewMotionBtn.addEventListener('click', () => {
				stopMotionPreview();
				loadMotionPath(() => {
					const cfg = buildMotionConfig();
					if (!cfg) return;

					// Move iframe into overlay for isolated motion demo
					motionOverlay.style.pointerEvents = 'none';
					const overlayRect = motionOverlay.getBoundingClientRect();

					previewFrame.style.position = 'absolute';
					previewFrame.style.width    = '200px';
					previewFrame.style.height   = '320px';
					previewFrame.style.border   = 'none';
					motionOverlay.appendChild(previewFrame);

					// Scale points to overlay-relative fractions
					const scaledCfg = Object.assign({}, cfg, { duration: cfg.duration });

					activeMotionPath = new window.MotionPath(previewFrame, scaledCfg, previewFrame);
					activeMotionPath.preview();

					// Restore after duration
					setTimeout(stopMotionPreview, (cfg.duration || 4000) + 500);
				});
			});

			// ── Build motion config from current UI state ─────────────────────
			function buildMotionConfig() {
				const preset = motionPresetSel.value;
				if (!preset) return null;
				const duration = parseFloat(motionDurationEl.value) * 1000;
				const loop     = motionLoopSel.value === 'true';
				const walkAnim = motionWalkSel.value;
				if (preset === 'custom') {
					if (customPathPoints.length < 2) return null;
					return { type: 'custom', points: customPathPoints, duration, loop, walkAnim };
				}
				return { type: 'preset', preset, duration, loop, walkAnim };
			}

			// ── Preview + embed code ──────────────────────────────────────────
			function updatePreviewAndCode() {
				const animation = animSelect.value;
				const showPicker = animPickerToggle.checked;
				const bg = bgSelect.value;

				const previewParams = new URLSearchParams({ model: selectedAvatarUrl, bg });
				if (animation) previewParams.set('animation', animation);
				if (!showPicker) previewParams.set('animPicker', '0');

				const motionCfg = buildMotionConfig();

				if (!motionCfg) {
					previewFrame.src = `/pages/avatar-embed.html?${previewParams}`;
				}

				const embedParams = new URLSearchParams({ model: selectedAvatarUrl, bg });
				if (animation) embedParams.set('animation', animation);
				if (!showPicker) embedParams.set('animPicker', '0');

				const widgetUrl  = `/pages/avatar-embed.html?${embedParams}`;
				const origin     = location.origin;

				if (motionCfg) {
					embedCodeEl.textContent =
						`<script async src="${origin}/embed.js"\n  data-widget-url="${origin}${widgetUrl}"\n  data-type="talking-agent"\n  data-motion='${JSON.stringify(motionCfg)}'><\/script>`;
				} else {
					const embedUrl = `${origin}${widgetUrl}`;
					embedCodeEl.textContent =
						`<iframe\n  src="${embedUrl}"\n  width="400"\n  height="600"\n  style="border:none;"\n  allow="autoplay; clipboard-write"\n></iframe>`;
				}
			}

			animSelect.addEventListener('change', updatePreviewAndCode);
			animPickerToggle.addEventListener('change', updatePreviewAndCode);
			bgSelect.addEventListener('change', updatePreviewAndCode);
			brandColorInput.addEventListener('input', updatePreviewAndCode);
			themeSelect.addEventListener('change', updatePreviewAndCode);

			copyBtn.addEventListener('click', () => {
				navigator.clipboard.writeText(embedCodeEl.textContent);
				copyBtn.textContent = 'Copied!';
				setTimeout(() => { copyBtn.textContent = 'Copy Code'; }, 2000);
			});

			updatePreviewAndCode();
		</script>

		<div id="footer-container"></div>
		<script src="/footer.js"></script>
</body>
</html>
