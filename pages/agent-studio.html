<!doctype html>
<html lang="en">
	<head>
		<script>/* three.ws theme boot — no-flash; runtime in /theme-switcher.js */(function(){try{var m=localStorage.getItem('twx_theme');var l=m==='auto'?(window.matchMedia&&window.matchMedia('(prefers-color-scheme: light)').matches):m==='light';document.documentElement.setAttribute('data-theme',l?'light':'dark');}catch(e){document.documentElement.setAttribute('data-theme','dark');}})();</script>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<title>Agent Studio · three.ws</title>
		<meta name="theme-color" content="#000000" />
		<meta name="mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<meta name="apple-mobile-web-app-title" content="three.ws" />
		<link rel="icon" href="/favicon.ico" sizes="any" />
		<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
		<link rel="apple-touch-icon" href="/apple-touch-icon.png" />
		<link rel="manifest" href="/site.webmanifest" />
		<meta
			name="description"
			content="Agent Studio — author your AI agent's brain, memory, body, money, and skills in one place, with a live 3D avatar that updates everywhere as you edit."
		/>
		<meta name="robots" content="noindex" />

		<link rel="stylesheet" href="/nav.css" />
		<link rel="stylesheet" href="/footer.css" />
		<link rel="stylesheet" href="/mobile.css" />
		<link rel="stylesheet" href="/buttons.css" />
		<link rel="stylesheet" href="/brain-studio.css" />
		<link rel="stylesheet" href="/memory-studio.css" />
		<link rel="stylesheet" href="/studio-panels.css" />

		<style>
			/* Base reset: this page deliberately skips style.css, so it must carry
			   the [hidden] guard itself. Without it, components that toggle the
			   `hidden` attribute (brain studio's onboard/editor/modal views, etc.)
			   stay visible — their class rules set `display`, which beats the UA
			   `[hidden]{display:none}` rule. */
			[hidden] {
				display: none !important;
			}

			html,
			body {
				margin: 0;
				background: var(--bg-0, #0a0a0a);
				color: var(--ink, #e8e8e8);
				font-family: var(--font-body, 'Inter', system-ui, sans-serif);
			}
			#studio-root {
				min-height: calc(100vh - var(--header-h, 3.5rem));
			}

			/* ── Layout ──────────────────────────────────────────────────────── */
			.studio {
				display: grid;
				grid-template-columns: minmax(340px, 42%) 1fr;
				gap: var(--space-md, 1rem);
				padding: var(--space-md, 1rem);
				max-width: 1600px;
				margin: 0 auto;
				min-height: calc(100vh - var(--header-h, 3.5rem));
				box-sizing: border-box;
			}

			/* Persistent live avatar stage */
			.studio-stage {
				position: relative;
				border-radius: var(--radius-lg, 14px);
				background:
					radial-gradient(120% 80% at 50% 0%, rgba(139, 92, 246, 0.12), transparent 60%),
					var(--surface-glass, linear-gradient(180deg, rgba(20, 21, 28, 0.7), rgba(14, 15, 22, 0.5)));
				border: 1px solid var(--stroke, rgba(255, 255, 255, 0.08));
				overflow: hidden;
				min-height: clamp(420px, 70vh, 820px);
				box-shadow: var(--shadow-2);
			}
			.studio-stage agent-presence {
				position: absolute;
				inset: 0;
			}
			.studio-stage-hud {
				position: absolute;
				left: 14px;
				bottom: 14px;
				display: inline-flex;
				align-items: center;
				gap: 7px;
				padding: 5px 11px;
				border-radius: var(--radius-pill, 999px);
				background: rgba(0, 0, 0, 0.45);
				border: 1px solid var(--stroke);
				backdrop-filter: blur(var(--blur-sm, 8px));
				-webkit-backdrop-filter: blur(var(--blur-sm, 8px));
				font-size: var(--text-2xs, 0.6875rem);
				font-weight: var(--weight-semibold, 600);
				color: var(--ink-dim, #888);
				pointer-events: none;
			}
			.studio-live-dot {
				width: 7px;
				height: 7px;
				border-radius: 50%;
				background: var(--success, #4ade80);
				box-shadow: 0 0 8px var(--success, #4ade80);
				animation: studio-pulse 2s ease-in-out infinite;
			}
			@keyframes studio-pulse {
				0%, 100% { opacity: 1; }
				50% { opacity: 0.4; }
			}

			/* Editing surface */
			.studio-panel {
				display: flex;
				flex-direction: column;
				min-width: 0;
				border-radius: var(--radius-lg, 14px);
				background: var(--surface-1, rgba(255, 255, 255, 0.03));
				border: 1px solid var(--stroke, rgba(255, 255, 255, 0.08));
				overflow: hidden;
			}

			.studio-identity {
				display: grid;
				grid-template-columns: 1fr auto;
				grid-template-areas: 'name actions' 'tag actions';
				gap: 4px var(--space-sm, 0.618rem);
				padding: var(--space-md, 1rem) var(--space-lg, 1.618rem);
				border-bottom: 1px solid var(--stroke);
			}
			.studio-actions {
				grid-area: actions;
				align-self: center;
				display: flex;
				align-items: center;
				flex-wrap: wrap;
				justify-content: flex-end;
				gap: var(--space-sm, 0.618rem);
			}
			.studio-name {
				grid-area: name;
				font-family: var(--font-display);
				font-size: var(--text-xl, 1.618rem);
				font-weight: var(--weight-bold, 700);
				color: var(--ink-bright, #fff);
				background: transparent;
				border: 1px solid transparent;
				border-radius: var(--radius-sm, 6px);
				padding: 2px 6px;
				margin-left: -6px;
				transition: border-color var(--duration-fast, 140ms) var(--ease-standard), background var(--duration-fast) var(--ease-standard);
			}
			.studio-tagline {
				grid-area: tag;
				font-size: var(--text-ui, 0.875rem);
				color: var(--ink-dim, #888);
				background: transparent;
				border: 1px solid transparent;
				border-radius: var(--radius-sm, 6px);
				padding: 2px 6px;
				margin-left: -6px;
			}
			.studio-name:hover,
			.studio-tagline:hover {
				border-color: var(--stroke);
			}
			.studio-name:focus,
			.studio-tagline:focus {
				outline: none;
				border-color: var(--stroke-strong);
				background: var(--surface-2);
			}
			.studio-save {
				align-self: center;
				font-size: var(--text-2xs, 0.6875rem);
				font-weight: var(--weight-semibold, 600);
				color: var(--ink-faint);
				transition: color var(--duration-fast) var(--ease-standard);
				white-space: nowrap;
			}
			.studio-save[data-state='pending'] { color: var(--warn, #fbbf24); }
			.studio-save[data-state='saved'] { color: var(--success, #4ade80); }
			.studio-save[data-state='error'] { color: var(--danger, #f87171); }

			/* Tabs */
			.studio-tabs {
				display: flex;
				gap: 2px;
				padding: var(--space-sm, 0.618rem) var(--space-lg, 1.618rem) 0;
				border-bottom: 1px solid var(--stroke);
				overflow-x: auto;
				scrollbar-width: none;
			}
			.studio-tabs::-webkit-scrollbar { display: none; }
			.studio-tab {
				appearance: none;
				display: inline-flex;
				align-items: center;
				gap: 7px;
				white-space: nowrap;
				padding: 9px 14px;
				border: none;
				border-bottom: 2px solid transparent;
				margin-bottom: -1px;
				background: transparent;
				color: var(--ink-dim, #888);
				font-family: var(--font-body);
				font-size: var(--text-ui, 0.875rem);
				font-weight: var(--weight-semibold, 600);
				cursor: pointer;
				border-radius: var(--radius-sm) var(--radius-sm) 0 0;
				transition: color var(--duration-fast) var(--ease-standard), background var(--duration-fast) var(--ease-standard), border-color var(--duration-fast) var(--ease-standard);
			}
			.studio-tab:hover { color: var(--ink, #e8e8e8); background: var(--surface-1); }
			.studio-tab[aria-selected='true'] {
				color: var(--ink-bright, #fff);
				border-bottom-color: var(--accent, #fff);
			}
			.studio-tab:focus-visible {
				outline: 2px solid var(--focus-ring-color, #fff);
				outline-offset: -2px;
			}
			.studio-tab-num {
				display: inline-grid;
				place-items: center;
				width: 16px;
				height: 16px;
				border-radius: var(--radius-sm, 6px);
				background: var(--surface-3, rgba(255, 255, 255, 0.08));
				font-size: 10px;
				font-weight: var(--weight-bold, 700);
				color: var(--ink-dim);
			}
			.studio-tab[aria-selected='true'] .studio-tab-num {
				background: var(--accent-soft);
				color: var(--ink-bright);
			}

			.studio-tabpanels {
				flex: 1;
				min-height: 0;
				overflow-y: auto;
			}
			.studio-tabpanel {
				padding: var(--space-lg, 1.618rem);
				animation: studio-fade var(--duration-base, 220ms) var(--ease-out);
			}
			.studio-tabpanel:focus-visible {
				outline: 2px solid var(--focus-ring-color, #fff);
				outline-offset: -4px;
				border-radius: var(--radius-md);
			}
			@keyframes studio-fade {
				from { opacity: 0; transform: translateY(6px); }
				to { opacity: 1; transform: none; }
			}

			/* Designed empty state (each tab) */
			.studio-empty {
				max-width: 380px;
				margin: clamp(24px, 8vh, 80px) auto;
				text-align: center;
				color: var(--ink-dim, #888);
			}
			.studio-empty-glyph {
				width: 52px;
				height: 52px;
				margin: 0 auto var(--space-md, 1rem);
				border-radius: var(--radius-lg, 14px);
				background:
					radial-gradient(circle at 30% 30%, rgba(139, 92, 246, 0.4), transparent 70%),
					var(--surface-2, rgba(255, 255, 255, 0.05));
				border: 1px solid var(--stroke);
			}
			.studio-empty h2 {
				margin: 0 0 6px;
				font-family: var(--font-display);
				font-size: var(--text-lg, 1.236rem);
				color: var(--ink-bright, #fff);
			}
			.studio-empty p {
				margin: 0 0 var(--space-md, 1rem);
				font-size: var(--text-md, 0.8125rem);
				line-height: var(--leading-normal, 1.618);
			}

			/* Buttons (shell-local; mirrors token vocabulary) */
			.studio-btn {
				display: inline-flex;
				align-items: center;
				justify-content: center;
				padding: 9px 18px;
				border-radius: var(--radius-pill, 999px);
				font-family: var(--font-body);
				font-size: var(--text-ui, 0.875rem);
				font-weight: var(--weight-semibold, 600);
				text-decoration: none;
				cursor: pointer;
				border: 1px solid transparent;
				transition: transform var(--duration-fast) var(--ease-standard), background var(--duration-fast) var(--ease-standard), border-color var(--duration-fast) var(--ease-standard);
			}
			.studio-btn:active { transform: scale(0.97); }
			.studio-btn:focus-visible { outline: 2px solid var(--focus-ring-color, #fff); outline-offset: 2px; }
			.studio-btn-primary {
				background: var(--ink-bright, #fff);
				color: var(--bg-0, #0a0a0a);
			}
			.studio-btn-primary:hover { background: #e6e6e6; }
			.studio-btn-ghost {
				background: var(--surface-2, rgba(255, 255, 255, 0.05));
				color: var(--ink, #e8e8e8);
				border-color: var(--stroke);
				margin-top: 8px;
			}
			.studio-btn-ghost:hover { background: var(--surface-3); }
			/* Compact header actions (Save draft / Exit) — sit inline beside the save
			   indicator without the ghost button's stacking margin. */
			.studio-action {
				margin-top: 0;
				padding: 6px 13px;
				font-size: var(--text-md, 0.8125rem);
				white-space: nowrap;
			}

			/* Gate / error / empty-agent */
			.studio-gate {
				display: grid;
				place-items: center;
				min-height: calc(100vh - var(--header-h, 3.5rem));
				padding: var(--space-lg);
			}
			.studio-gate-inner {
				max-width: 460px;
				text-align: center;
			}
			.studio-gate-glyph {
				font-size: 44px;
				margin-bottom: var(--space-md);
				opacity: 0.7;
			}
			.studio-gate h1 {
				font-family: var(--font-display);
				font-size: var(--text-2xl, 2.618rem);
				margin: 0 0 var(--space-sm);
				color: var(--ink-bright, #fff);
			}
			.studio-gate p {
				font-size: var(--text-base, 1rem);
				line-height: var(--leading-normal);
				color: var(--ink-dim);
				margin: 0 0 var(--space-lg);
			}
			.studio-gate .studio-btn { margin: 6px; }

			/* Loading skeleton */
			.studio-skeleton {
				display: grid;
				grid-template-columns: minmax(340px, 42%) 1fr;
				gap: var(--space-md);
				padding: var(--space-md);
				max-width: 1600px;
				margin: 0 auto;
			}
			.studio-skeleton > div {
				border-radius: var(--radius-lg, 14px);
				background: linear-gradient(110deg, rgba(255, 255, 255, 0.03) 30%, rgba(255, 255, 255, 0.07) 50%, rgba(255, 255, 255, 0.03) 70%);
				background-size: 220% 100%;
				animation: studio-shimmer 1.4s ease-in-out infinite;
			}
			.sk-stage { min-height: clamp(420px, 70vh, 820px); }
			.sk-panel { display: flex; flex-direction: column; gap: 12px; padding: 20px; background: none; animation: none; }
			.sk-tabs { height: 38px; }
			.sk-rows { display: flex; flex-direction: column; gap: 12px; }
			.sk-row { height: 54px; }
			@keyframes studio-shimmer { to { background-position: -220% 0; } }

			/* ── Responsive ───────────────────────────────────────────────────── */
			@media (max-width: 980px) {
				.studio,
				.studio-skeleton {
					grid-template-columns: 1fr;
				}
				.studio-stage {
					position: sticky;
					top: calc(var(--header-h, 3.5rem) + 8px);
					z-index: 5;
					min-height: clamp(220px, 34vh, 360px);
				}
				.sk-stage { min-height: 240px; }
			}
			@media (max-width: 420px) {
				.studio { padding: var(--space-sm); gap: var(--space-sm); }
				.studio-stage { min-height: 180px; }
				.studio-identity { padding: var(--space-sm) var(--space-md); }
				.studio-tabs { padding: var(--space-xs) var(--space-md) 0; }
				.studio-tabpanel { padding: var(--space-md); }
				.studio-name { font-size: var(--text-lg, 1.236rem); }
			}
			@media (min-width: 1441px) {
				.studio-stage { min-height: clamp(560px, 78vh, 900px); }
			}
			@media (prefers-reduced-motion: reduce) {
				.studio-skeleton > div,
				.studio-live-dot,
				.studio-tabpanel { animation: none; }
			}
		</style>
	</head>
	<body>
		<div id="nav-container"></div>
		<script src="/nav.js"></script>

		<main id="studio-root"></main>

		<div id="footer-container"></div>
		<script src="/footer.js"></script>

		<script type="module" src="/src/studio/studio-shell.js"></script>
		<!-- P1: Brain Studio binds itself to the shell's Brain tab on studio-shell:ready. -->
		<script type="module" src="/src/studio/brain/brain-mount.js"></script>
		<!-- P2: Memory Studio binds itself to the shell's Memory tab on studio-shell:ready. -->
		<script type="module" src="/src/studio/memory/memory-mount.js"></script>
		<!-- P3: Body Studio binds itself to the shell's Body tab on studio-shell:ready. -->
		<script type="module" src="/src/studio/body/body-mount.js"></script>
		<!-- P4: Money Studio binds itself to the shell's Money tab on studio-shell:ready. -->
		<script type="module" src="/src/studio/money/money-mount.js"></script>
		<!-- P5: Skills Studio binds itself to the shell's Skills tab on studio-shell:ready. -->
		<script type="module" src="/src/studio/skills/skills-mount.js"></script>
	</body>
</html>
