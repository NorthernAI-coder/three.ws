<!doctype html>
<html lang="en">
<head>
	<style>/* three.ws hidden-guard */[hidden]{display:none!important}</style>
	<script>/* three.ws theme boot — no-flash */(function(){try{var m=localStorage.getItem('twx_theme');var l=m==='auto'?(window.matchMedia&&window.matchMedia('(prefers-color-scheme: light)').matches):m==='light';document.documentElement.setAttribute('data-theme',l?'light':'dark');}catch(e){document.documentElement.setAttribute('data-theme','dark');}})();</script>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width,initial-scale=1" />
	<title>Autopilot Activity — three.ws</title>
	<meta name="description" content="Every autonomous action your three.ws agent took — each with the memory that motivated it, a signed receipt, and a one-tap undo. Explainable autonomy you can trust." />
	<meta property="og:title" content="Autopilot Activity — three.ws" />
	<meta property="og:description" content="Explainable autonomy: every action your agent took, with the memory that motivated it and a signed receipt." />
	<meta name="twitter:card" content="summary_large_image" />
	<link rel="icon" href="/favicon.ico" sizes="any" />
	<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
	<link rel="manifest" href="/manifest.webmanifest" />
	<link rel="stylesheet" href="/fonts/fonts.css" />
	<style>
		:root {
			color-scheme: dark;
			--bg: #050505; --surface-0: #0b0b0b; --surface-1: #111; --surface-2: #181818;
			--hairline: #1c1c1c; --text: #f6f6f6; --text-2: #a8a8a8; --text-3: #6a6a6a;
			--mint: #78c88c; --amber: #f59e0b; --red: #ef4444;
			--font-display: 'Space Grotesk', 'Inter', system-ui, sans-serif;
			--font-body: "Inter", -apple-system, system-ui, sans-serif;
		}
		* { box-sizing: border-box; }
		html, body { margin: 0; background: var(--bg); color: var(--text); font-family: var(--font-body); }
		body { font-size: 15px; line-height: 1.55; min-height: 100vh; -webkit-font-smoothing: antialiased; }
		a { color: inherit; text-decoration: none; }
		.topbar { position: sticky; top: 0; z-index: 50; display: flex; align-items: center; gap: 20px;
			padding: 14px 24px; border-bottom: 1px solid var(--hairline); background: rgba(5,5,5,0.9); backdrop-filter: blur(18px); }
		.brand { display: flex; align-items: center; gap: 9px; font-family: var(--font-display); font-weight: 600; letter-spacing: -0.02em; }
		.brand .glyph { width: 16px; height: 16px; border: 1px solid var(--text); border-radius: 3px; position: relative; }
		.brand .glyph::after { content:''; position:absolute; inset:3px; background: var(--text); }
		.topbar nav { display: flex; gap: 4px; margin-left: auto; }
		.topbar nav a { padding: 6px 10px; font-size: 14px; color: var(--text-2); border-radius: 7px; transition: color .12s, background .12s; }
		.topbar nav a:hover { color: var(--text); background: var(--surface-1); }
		.wrap { max-width: 760px; margin: 0 auto; padding: 28px 24px 80px; }
		.hero h1 { font-family: var(--font-display); font-size: 1.7rem; letter-spacing: -0.03em; margin: 0 0 6px; }
		.hero p { color: var(--text-2); margin: 0 0 18px; max-width: 60ch; }
		.controls { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 18px; }
		.controls label { font-size: 0.8rem; color: var(--text-3); }
		.controls select { padding: 0.4rem 0.6rem; border-radius: 8px; border: 1px solid var(--hairline);
			background: var(--surface-1); color: var(--text); font: inherit; font-size: 0.85rem; }
		.ledger { border: 1px solid var(--hairline); border-radius: 14px; background: var(--surface-1); padding: 0.4rem 1.1rem; }
		.loadmore { display: block; margin: 18px auto 0; }
		.skel { height: 64px; border-radius: 11px; margin: 0.5rem 0; background: linear-gradient(90deg,var(--surface-1) 0%,var(--surface-2) 50%,var(--surface-1) 100%);
			background-size: 200% 100%; animation: shimmer 1.3s infinite; border: 1px solid var(--hairline); }
		@keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
		@media (prefers-reduced-motion: reduce) { .skel { animation: none; } }
		.state { text-align: center; color: var(--text-3); padding: 3rem 1rem; }
		.state .ico { font-size: 2rem; opacity: 0.7; }
		.state h2 { font-size: 1.05rem; color: var(--text-2); margin: 0.7rem 0 0.3rem; }
		.state .btn { display: inline-block; margin-top: 1rem; padding: 0.5rem 1rem; border-radius: 8px;
			border: 1px solid var(--hairline); background: var(--surface-2); color: var(--text); cursor: pointer; font: inherit; }
		.state .btn:hover { border-color: var(--text-3); }
	</style>
</head>
<body>
	<header class="topbar">
		<a class="brand" href="/dashboard" aria-label="three.ws"><span class="glyph"></span> three.ws</a>
		<nav>
			<a href="/dashboard">Dashboard</a>
			<a href="/autopilot-activity" class="active" aria-current="page">Activity</a>
		</nav>
	</header>

	<main class="wrap">
		<section class="hero">
			<h1>Autopilot activity</h1>
			<p>Every action your agent took on your behalf — each grounded in the memory that motivated it,
			signed, and reversible where it can be. This is autonomy you can audit.</p>
		</section>

		<div class="controls">
			<label for="agent-filter">Agent</label>
			<select id="agent-filter" aria-label="Filter by agent"><option value="">All your agents</option></select>
			<span id="trust-slot"></span>
		</div>

		<div id="ledger" class="ledger" aria-live="polite">
			<div class="skel"></div><div class="skel"></div><div class="skel"></div>
		</div>
		<button class="loadmore apm-btn" id="loadmore" hidden>Load more</button>
	</main>

	<script type="module" src="/src/autopilot-activity.js"></script>
</body>
</html>
