	<head>
		<style>/* three.ws hidden-guard — make the `hidden` attribute authoritative; see scripts/lib/hidden-guard.mjs */[hidden]{display:none!important}</style>
		<script>/* three.ws theme boot */(function(){try{var m=localStorage.getItem('twx_theme');var l=m==='auto'?(window.matchMedia&&window.matchMedia('(prefers-color-scheme: light)').matches):m==='light';document.documentElement.setAttribute('data-theme',l?'light':'dark');}catch(e){document.documentElement.setAttribute('data-theme','dark');}})();</script>
		<meta charset="utf-8" />

		<style>
			:root {
				--bg: #0d0d0d;
				--bg-2: #141414;
				--card: #181818;
				--line: rgba(255,255,255,0.07);
				--line-2: rgba(255,255,255,0.12);
				--text: #e7e9ee;
				--muted: rgba(231,233,238,0.55);
				--dim: rgba(231,233,238,0.35);
				--green: #4ade80;
				--amber: #f5a524;
				--violet: #a78bfa;
				--cyan: #57c7ff;
				--radius: 12px;
				--skeleton-base: rgba(255,255,255,0.04);
				--skeleton-sheen: rgba(255,255,255,0.08);
			}
			[data-theme="light"]{
				--bg:#f5f5f5;--bg-2:#fff;--card:#fff;--line:rgba(0,0,0,.07);--line-2:rgba(0,0,0,.12);--text:#111;--muted:rgba(0,0,0,.55);--dim:rgba(0,0,0,.35);--skeleton-base:rgba(0,0,0,.04);--skeleton-sheen:rgba(0,0,0,.08);
			}
			*{box-sizing:border-box;margin:0;padding:0;}
			html,body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;min-height:100vh;}
			a{color:inherit;text-decoration:none;}
			.page-shell{max-width:1100px;margin:0 auto;padding:0 20px 80px;}
			.page-hero{padding:48px 0 36px;}
			.page-hero h1{font-size:28px;font-weight:700;letter-spacing:-0.02em;}
			.page-hero p{color:var(--muted);margin-top:8px;font-size:14px;}
			/* Stats grid */
			.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px;margin-bottom:36px;}
			.stat-card{background:var(--card);border:1px solid var(--line-2);border-radius:var(--radius);padding:20px 18px;}
			.stat-val{font-size:28px;font-weight:700;letter-spacing:-0.03em;}
			.stat-lbl{font-size:12px;color:var(--muted);margin-top:4px;}
			/* Section */
			.an-section{margin-bottom:40px;}
			.an-section h2{font-size:16px;font-weight:600;margin-bottom:16px;display:flex;align-items:center;gap:8px;}
			.an-section h2 .an-count{font-size:12px;font-weight:500;color:var(--muted);background:var(--bg-2);padding:2px 8px;border-radius:20px;border:1px solid var(--line-2);}
			/* Rank list */
			.rank-list{display:flex;flex-direction:column;gap:10px;}
			.rank-row{background:var(--card);border:1px solid var(--line-2);border-radius:var(--radius);padding:14px 16px;display:grid;grid-template-columns:28px 1fr auto;align-items:center;gap:12px;transition:border-color .15s;}
			.rank-row:hover{border-color:rgba(255,255,255,.2);}
			[data-theme="light"] .rank-row:hover{border-color:rgba(0,0,0,.2);}
			.rank-num{font-size:13px;font-weight:600;color:var(--dim);text-align:right;}
			.rank-row:nth-child(1) .rank-num{color:var(--amber);}
			.rank-row:nth-child(2) .rank-num{color:var(--muted);}
			.rank-row:nth-child(3) .rank-num{color:var(--amber);}
			.rank-meta{min-width:0;}
			.rank-name{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
			.rank-sub{font-size:12px;color:var(--muted);margin-top:2px;}
			.rank-val{text-align:right;white-space:nowrap;}
			.rank-primary{font-size:14px;font-weight:600;}
			.rank-secondary{font-size:11px;color:var(--muted);margin-top:2px;}
			/* Chart */
			.chart-wrap{background:var(--card);border:1px solid var(--line-2);border-radius:var(--radius);padding:20px;}
			.chart-canvas{width:100%;height:220px;}
			/* Skeleton */
			.skeleton{background:var(--skeleton-base);background-image:linear-gradient(90deg,var(--skeleton-base) 0%,var(--skeleton-sheen) 50%,var(--skeleton-base) 100%);background-size:200% 100%;border-radius:6px;animation:shimmer 1.4s ease-in-out infinite;}
			@keyframes shimmer{0%{background-position:200% 0;}100%{background-position:-200% 0;}}
			.skeleton-stat{height:28px;border-radius:4px;margin-bottom:6px;}
			.skeleton-row{height:14px;border-radius:4px;}
			.skeleton-rank{background:var(--card);border:1px solid var(--line-2);border-radius:var(--radius);padding:14px 16px;height:52px;}
			/* Error */
			.an-error{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25);border-radius:10px;padding:16px 20px;color:#ef4444;font-size:13px;margin-bottom:24px;}
			/* Two column layout for top tables */
			.an-two-col{display:grid;grid-template-columns:1fr 1fr;gap:24px;}
			@media(max-width:720px){
				.an-two-col{grid-template-columns:1fr;}
				.stats-grid{grid-template-columns:repeat(2,1fr);}
			}
			@media(max-width:400px){
				.stats-grid{grid-template-columns:1fr;}
			}
		</style>
