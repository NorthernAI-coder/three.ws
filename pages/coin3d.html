		<style>
			:root {
				--bg-0: #060606;
				--bg-1: #111111;
				--fg: #eef1ff;
				--muted: #97a0c4;
				--accent: #6ea8ff;
				--card: rgba(16, 18, 36, 0.72);
				--border: rgba(120, 140, 220, 0.18);
			}
			* {
				box-sizing: border-box;
			}
			html,
			body {
				margin: 0;
				height: 100%;
			}
			body {
				font-family:
					-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, system-ui, sans-serif;
				color: var(--fg);
				background: radial-gradient(120% 120% at 50% 0%, var(--bg-1) 0%, var(--bg-0) 60%);
				overflow: hidden;
			}
			#scene {
				position: fixed;
				inset: 0;
				width: 100vw;
				height: 100vh;
				display: block;
				touch-action: none;
			}

			/* HUD */
			#hud {
				position: fixed;
				left: max(20px, env(safe-area-inset-left));
				bottom: max(20px, env(safe-area-inset-bottom));
				width: min(372px, calc(100vw - 40px));
				max-height: min(86vh, calc(100vh - 40px));
				overflow-y: auto;
				overscroll-behavior: contain;
				padding: 18px 20px;
				background: var(--card);
				border: 1px solid var(--border);
				border-radius: 16px;
				backdrop-filter: blur(14px);
				-webkit-backdrop-filter: blur(14px);
				box-shadow: 0 12px 40px rgba(0, 0, 0, 0.45);
				animation: rise 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) both;
				scrollbar-width: thin;
				scrollbar-color: rgba(120, 140, 220, 0.4) transparent;
			}
			#hud::-webkit-scrollbar {
				width: 6px;
			}
			#hud::-webkit-scrollbar-thumb {
				background: rgba(120, 140, 220, 0.32);
				border-radius: 3px;
			}
			@keyframes rise {
				from {
					opacity: 0;
					transform: translateY(16px);
				}
				to {
					opacity: 1;
					transform: none;
				}
			}
			.hud-head {
				display: flex;
				align-items: baseline;
				gap: 10px;
				flex-wrap: wrap;
			}
			.hud-head h1 {
				font-size: 20px;
				margin: 0;
				line-height: 1.2;
			}
			.ticker {
				color: var(--accent);
				font-weight: 700;
				font-size: 14px;
				letter-spacing: 0.02em;
			}
			.hud-stats {
				display: grid;
				grid-template-columns: 1fr 1fr;
				gap: 10px 18px;
				margin: 16px 0 14px;
			}
			.hud-stats div {
				min-width: 0;
			}
			.hud-stats dt {
				color: var(--muted);
				font-size: 11px;
				text-transform: uppercase;
				letter-spacing: 0.06em;
				margin: 0 0 2px;
			}
			.hud-stats dd {
				margin: 0;
				font-size: 15px;
				font-weight: 600;
				font-variant-numeric: tabular-nums;
			}
			.hud-links {
				display: flex;
				flex-wrap: wrap;
				gap: 8px 16px;
				align-items: center;
			}
			.hud-link {
				display: inline-block;
				color: var(--accent);
				text-decoration: none;
				font-size: 13px;
				font-weight: 600;
				transition: opacity 0.15s ease;
			}
			.hud-link:hover {
				opacity: 0.78;
			}
			.hud-link:focus-visible {
				outline: 2px solid var(--accent);
				outline-offset: 3px;
				border-radius: 4px;
			}

			/* Hint */
			.hint {
				position: fixed;
				top: max(16px, env(safe-area-inset-top));
				right: max(16px, env(safe-area-inset-right));
				color: var(--muted);
				font-size: 12px;
				letter-spacing: 0.03em;
				pointer-events: none;
				opacity: 0.7;
			}

			/* Status overlay (loading / error / empty) */
			#status {
				position: fixed;
				inset: 0;
				display: grid;
				place-items: center;
				padding: 24px;
				background: radial-gradient(120% 120% at 50% 0%, var(--bg-1) 0%, var(--bg-0) 70%);
				z-index: 5;
			}
			.status-card {
				text-align: center;
				max-width: 380px;
				animation: rise 0.4s ease both;
			}
			.status-card h2 {
				margin: 14px 0 8px;
				font-size: 19px;
			}
			.status-card p {
				color: var(--muted);
				font-size: 14px;
				line-height: 1.5;
				margin: 0 0 18px;
				word-break: break-word;
			}
			.status-action {
				display: inline-block;
				padding: 9px 18px;
				background: var(--accent);
				color: #060606;
				font-weight: 700;
				font-size: 14px;
				border-radius: 10px;
				text-decoration: none;
				transition:
					transform 0.12s ease,
					box-shadow 0.12s ease;
			}
			.status-action:hover {
				transform: translateY(-1px);
				box-shadow: 0 8px 24px rgba(110, 168, 255, 0.35);
			}
			.status-action:focus-visible {
				outline: 2px solid #fff;
				outline-offset: 3px;
			}
			#status[data-kind='error'] .status-card h2 {
				color: #ff8f8f;
			}
			.spinner {
				width: 38px;
				height: 38px;
				margin: 0 auto;
				border: 3px solid var(--border);
				border-top-color: var(--accent);
				border-radius: 50%;
				animation: spin 0.9s linear infinite;
			}
			@keyframes spin {
				to {
					transform: rotate(360deg);
				}
			}

			/* Oracle conviction badge */
			.c3d-oracle {
				display: flex;
				align-items: center;
				gap: 8px;
				padding: 10px 12px;
				background: rgba(255, 255, 255, 0.04);
				border: 1px solid rgba(255, 255, 255, 0.07);
				border-radius: 8px;
				margin: 12px 0 14px;
				text-decoration: none;
				color: inherit;
				transition: background 0.12s;
			}
			.c3d-oracle:hover {
				background: rgba(255, 255, 255, 0.08);
			}
			.c3d-oracle:focus-visible {
				outline: 2px solid var(--accent);
				outline-offset: 3px;
			}
			.c3d-oracle-label {
				font-size: 11px;
				text-transform: uppercase;
				letter-spacing: 0.06em;
				color: var(--muted);
				flex-shrink: 0;
			}
			.c3d-oracle-score {
				font-size: 22px;
				font-weight: 700;
				line-height: 1;
			}
			.c3d-oracle-tier {
				font-size: 11px;
				font-weight: 600;
				text-transform: uppercase;
				letter-spacing: 0.05em;
			}
			.c3d-oracle-arrow {
				margin-left: auto;
				color: var(--muted);
				font-size: 13px;
			}
			.c3d-oracle-sk {
				height: 42px;
				background: rgba(255, 255, 255, 0.05);
				border-radius: 8px;
				margin: 12px 0 14px;
				animation: c3dPulse 1.4s ease-in-out infinite;
			}
			@keyframes c3dPulse {
				0%, 100% { opacity: 0.4; }
				50% { opacity: 0.8; }
			}
			/* Watch button */
			.c3d-watch-btn {
				background: none;
				border: none;
				cursor: pointer;
				padding: 0;
				font-family: inherit;
				font-size: 13px;
				font-weight: 600;
				color: var(--accent);
				transition: opacity 0.15s ease;
			}
			.c3d-watch-btn:hover { opacity: 0.78; }
			.c3d-watch-btn:focus-visible {
				outline: 2px solid var(--accent);
				outline-offset: 3px;
				border-radius: 4px;
			}

			/* Category chip + price line in the HUD head */
			.c3d-cat {
				font-size: 10px;
				font-weight: 700;
				text-transform: uppercase;
				letter-spacing: 0.06em;
				color: var(--muted);
				border: 1px solid var(--border);
				border-radius: 999px;
				padding: 2px 8px;
				white-space: nowrap;
			}
			.hud-price {
				display: flex;
				align-items: baseline;
				gap: 10px;
				margin: 10px 0 2px;
				flex-wrap: wrap;
			}
			.hud-price .px {
				font-size: 24px;
				font-weight: 700;
				font-variant-numeric: tabular-nums;
				line-height: 1;
			}
			.c3d-change {
				font-size: 13px;
				font-weight: 700;
				font-variant-numeric: tabular-nums;
			}
			.c3d-change.up {
				color: #44e08a;
			}
			.c3d-change.down {
				color: #ff6b6b;
			}
			.c3d-change.flat {
				color: var(--muted);
			}

			/* Sparkline */
			.c3d-spark-wrap {
				margin: 8px 0 14px;
			}
			.c3d-spark {
				width: 100%;
				height: 44px;
				display: block;
				overflow: visible;
			}
			.c3d-spark-empty {
				height: 44px;
				border-radius: 8px;
				background: rgba(255, 255, 255, 0.04);
			}

			/* Risk flags */
			.c3d-risks {
				display: flex;
				flex-wrap: wrap;
				gap: 6px;
				margin: 0 0 14px;
			}
			.c3d-risk {
				font-size: 10px;
				font-weight: 700;
				text-transform: uppercase;
				letter-spacing: 0.04em;
				padding: 3px 8px;
				border-radius: 6px;
				background: rgba(255, 85, 85, 0.12);
				color: #ff8f8f;
				border: 1px solid rgba(255, 85, 85, 0.25);
			}
			.c3d-risk.ok {
				background: rgba(68, 224, 138, 0.12);
				color: #74e0a8;
				border-color: rgba(68, 224, 138, 0.25);
			}

			/* Live trade tape */
			.c3d-tape {
				margin: 14px 0 4px;
				border-top: 1px solid var(--border);
				padding-top: 12px;
			}
			.c3d-tape-head {
				display: flex;
				align-items: center;
				justify-content: space-between;
				margin: 0 0 8px;
			}
			.c3d-tape-title {
				display: flex;
				align-items: center;
				gap: 7px;
				font-size: 11px;
				font-weight: 700;
				text-transform: uppercase;
				letter-spacing: 0.06em;
				color: var(--muted);
			}
			.c3d-live-dot {
				width: 7px;
				height: 7px;
				border-radius: 50%;
				background: #44e08a;
				box-shadow: 0 0 0 0 rgba(68, 224, 138, 0.6);
				animation: c3dLive 1.6s ease-out infinite;
			}
			.c3d-live-dot.stale {
				background: var(--muted);
				animation: none;
			}
			@keyframes c3dLive {
				0% {
					box-shadow: 0 0 0 0 rgba(68, 224, 138, 0.5);
				}
				70% {
					box-shadow: 0 0 0 7px rgba(68, 224, 138, 0);
				}
				100% {
					box-shadow: 0 0 0 0 rgba(68, 224, 138, 0);
				}
			}
			.c3d-tape-flow {
				font-size: 11px;
				font-weight: 600;
				font-variant-numeric: tabular-nums;
				color: var(--muted);
			}
			.c3d-tape-list {
				display: flex;
				flex-direction: column;
				gap: 1px;
				max-height: 168px;
				overflow-y: auto;
				scrollbar-width: thin;
				scrollbar-color: rgba(120, 140, 220, 0.4) transparent;
			}
			.c3d-tape-list::-webkit-scrollbar {
				width: 5px;
			}
			.c3d-tape-list::-webkit-scrollbar-thumb {
				background: rgba(120, 140, 220, 0.3);
				border-radius: 3px;
			}
			.c3d-trade {
				display: grid;
				grid-template-columns: auto 1fr auto;
				align-items: center;
				gap: 8px;
				padding: 5px 6px;
				border-radius: 7px;
				text-decoration: none;
				color: inherit;
				font-size: 12px;
				font-variant-numeric: tabular-nums;
				transition: background 0.12s ease;
			}
			.c3d-trade:hover {
				background: rgba(255, 255, 255, 0.05);
			}
			.c3d-trade:focus-visible {
				outline: 2px solid var(--accent);
				outline-offset: 1px;
			}
			.c3d-trade.enter {
				animation: c3dTradeIn 0.4s ease both;
			}
			@keyframes c3dTradeIn {
				from {
					opacity: 0;
					transform: translateX(-8px);
				}
				to {
					opacity: 1;
					transform: none;
				}
			}
			.c3d-trade .t-side {
				width: 6px;
				height: 6px;
				border-radius: 50%;
				flex-shrink: 0;
			}
			.c3d-trade.buy .t-side {
				background: #44e08a;
			}
			.c3d-trade.sell .t-side {
				background: #ff6b6b;
			}
			.c3d-trade.buy .t-usd {
				color: #74e0a8;
				font-weight: 700;
			}
			.c3d-trade.sell .t-usd {
				color: #ff8f8f;
				font-weight: 700;
			}
			.c3d-trade .t-mid {
				color: var(--muted);
				white-space: nowrap;
				overflow: hidden;
				text-overflow: ellipsis;
			}
			.c3d-trade .t-time {
				color: var(--muted);
				font-size: 11px;
				white-space: nowrap;
			}
			.c3d-tape-empty {
				color: var(--muted);
				font-size: 12px;
				padding: 6px 6px 2px;
				line-height: 1.5;
			}

			/* Landing (no-mint) state */
			.c3d-landing {
				text-align: center;
				max-width: 540px;
				width: 100%;
				animation: rise 0.45s ease both;
			}
			.c3d-landing h2 {
				font-size: 26px;
				margin: 16px 0 8px;
				letter-spacing: -0.01em;
			}
			.c3d-landing p.lede {
				color: var(--muted);
				font-size: 15px;
				line-height: 1.55;
				margin: 0 auto 22px;
				max-width: 440px;
			}
			.c3d-search {
				display: flex;
				gap: 8px;
				max-width: 460px;
				margin: 0 auto 12px;
			}
			.c3d-search input {
				flex: 1;
				min-width: 0;
				padding: 11px 14px;
				font-size: 14px;
				font-family: inherit;
				color: var(--fg);
				background: rgba(255, 255, 255, 0.05);
				border: 1px solid var(--border);
				border-radius: 10px;
				outline: none;
				transition: border-color 0.15s ease, box-shadow 0.15s ease;
			}
			.c3d-search input::placeholder {
				color: var(--muted);
			}
			.c3d-search input:focus {
				border-color: var(--accent);
				box-shadow: 0 0 0 3px rgba(110, 168, 255, 0.18);
			}
			.c3d-search button {
				padding: 11px 18px;
				font-size: 14px;
				font-weight: 700;
				font-family: inherit;
				color: #060606;
				background: var(--accent);
				border: none;
				border-radius: 10px;
				cursor: pointer;
				transition: transform 0.12s ease, box-shadow 0.12s ease, opacity 0.12s ease;
			}
			.c3d-search button:hover {
				transform: translateY(-1px);
				box-shadow: 0 8px 24px rgba(110, 168, 255, 0.35);
			}
			.c3d-search button:disabled {
				opacity: 0.5;
				cursor: not-allowed;
				transform: none;
				box-shadow: none;
			}
			.c3d-search-err {
				color: #ff8f8f;
				font-size: 12px;
				min-height: 16px;
				margin: 0 0 12px;
			}
			.c3d-three {
				display: inline-flex;
				align-items: center;
				gap: 8px;
				padding: 9px 16px;
				margin: 0 0 28px;
				font-size: 13px;
				font-weight: 700;
				color: var(--fg);
				text-decoration: none;
				background: rgba(110, 168, 255, 0.1);
				border: 1px solid rgba(110, 168, 255, 0.3);
				border-radius: 999px;
				transition: background 0.15s ease, transform 0.12s ease;
			}
			.c3d-three:hover {
				background: rgba(110, 168, 255, 0.18);
				transform: translateY(-1px);
			}
			.c3d-three:focus-visible {
				outline: 2px solid var(--accent);
				outline-offset: 3px;
			}
			.c3d-recent-label {
				font-size: 11px;
				font-weight: 700;
				text-transform: uppercase;
				letter-spacing: 0.08em;
				color: var(--muted);
				margin: 0 0 12px;
			}
			.c3d-recent {
				display: grid;
				grid-template-columns: repeat(4, 1fr);
				gap: 10px;
				margin: 0 0 22px;
			}
			.c3d-recent-card {
				display: flex;
				flex-direction: column;
				align-items: center;
				gap: 7px;
				padding: 12px 8px;
				background: rgba(255, 255, 255, 0.04);
				border: 1px solid var(--border);
				border-radius: 12px;
				text-decoration: none;
				color: inherit;
				transition: transform 0.14s ease, border-color 0.14s ease, background 0.14s ease;
			}
			.c3d-recent-card:hover {
				transform: translateY(-3px);
				border-color: rgba(110, 168, 255, 0.45);
				background: rgba(110, 168, 255, 0.08);
			}
			.c3d-recent-card:focus-visible {
				outline: 2px solid var(--accent);
				outline-offset: 2px;
			}
			.c3d-recent-img {
				width: 46px;
				height: 46px;
				border-radius: 50%;
				object-fit: cover;
				background: rgba(255, 255, 255, 0.06);
				border: 1px solid var(--border);
			}
			.c3d-recent-img.ph {
				display: grid;
				place-items: center;
				font-size: 16px;
				font-weight: 700;
				color: var(--accent);
			}
			.c3d-recent-sym {
				font-size: 12px;
				font-weight: 700;
				max-width: 100%;
				overflow: hidden;
				text-overflow: ellipsis;
				white-space: nowrap;
			}
			.c3d-recent-sk {
				height: 92px;
				border-radius: 12px;
				background: rgba(255, 255, 255, 0.05);
