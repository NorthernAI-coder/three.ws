<!doctype html>
<html lang="en">
	<head>
		<script>/* three.ws theme boot — no-flash; runtime in /theme-switcher.js */(function(){try{var m=localStorage.getItem('twx_theme');var l=m==='auto'?(window.matchMedia&&window.matchMedia('(prefers-color-scheme: light)').matches):m==='light';document.documentElement.setAttribute('data-theme',l?'light':'dark');}catch(e){document.documentElement.setAttribute('data-theme','dark');}})();</script>
		<meta charset="utf-8" />
		<link rel="icon" href="/favicon.ico" sizes="any" />
		<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
		<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
		<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
		<link rel="apple-touch-icon" href="/apple-touch-icon.png" />
		<link rel="manifest" href="/site.webmanifest" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<title>Token in 3D · three.ws</title>
		<meta
			name="description"
			content="A live 3D snapshot of any pump.fun / Solana token — coin medallion, holder galaxy, and bonding-curve graduation, rendered from real on-chain data."
		/>
		<meta property="og:title" content="Token in 3D · three.ws" />
		<meta
			property="og:description"
			content="See any pump.fun token as a live 3D scene — coin, holders, and graduation progress."
		/>
		<meta property="og:type" content="website" />
	<meta property="og:site_name" content="three.ws" />
	<meta property="og:url" content="https://three.ws/coin3d" />
	<meta property="og:image" content="https://three.ws/og-image.png" />
	<meta property="og:image:width" content="1200" />
	<meta property="og:image:height" content="630" />
	<meta name="twitter:card" content="summary_large_image" />
	<meta name="twitter:site" content="@trythreews" />
	<meta name="twitter:title" content="Token in 3D · three.ws" />
	<meta name="twitter:description" content="View any token in 3D — bonding curves, holder bubbles, and live trades rendered as an interactive 3D scene." />
	<meta name="twitter:image" content="https://three.ws/og-image.png" />
		<style>
			:root {
				--bg-0: #060606;
				--bg-1: #111111;
				--fg: #eef1ff;
				--muted: #97a0c4;
				--accent: #6ea8ff;
				--card: rgba(16, 18, 36, 0.72);
				--border: rgba(120, 140, 220, 0.18);
			}
			* {
				box-sizing: border-box;
			}
			html,
			body {
				margin: 0;
				height: 100%;
			}
			body {
				font-family:
					-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, system-ui, sans-serif;
				color: var(--fg);
				background: radial-gradient(120% 120% at 50% 0%, var(--bg-1) 0%, var(--bg-0) 60%);
				overflow: hidden;
			}
			#scene {
				position: fixed;
				inset: 0;
				width: 100vw;
				height: 100vh;
				display: block;
				touch-action: none;
			}

			/* HUD */
			#hud {
				position: fixed;
				left: max(20px, env(safe-area-inset-left));
				bottom: max(20px, env(safe-area-inset-bottom));
				width: min(360px, calc(100vw - 40px));
				padding: 18px 20px;
				background: var(--card);
				border: 1px solid var(--border);
				border-radius: 16px;
				backdrop-filter: blur(14px);
				-webkit-backdrop-filter: blur(14px);
				box-shadow: 0 12px 40px rgba(0, 0, 0, 0.45);
				animation: rise 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) both;
			}
			@keyframes rise {
				from {
					opacity: 0;
					transform: translateY(16px);
				}
				to {
					opacity: 1;
					transform: none;
				}
			}
			.hud-head {
				display: flex;
				align-items: baseline;
				gap: 10px;
				flex-wrap: wrap;
			}
			.hud-head h1 {
				font-size: 20px;
				margin: 0;
				line-height: 1.2;
			}
			.ticker {
				color: var(--accent);
				font-weight: 700;
				font-size: 14px;
				letter-spacing: 0.02em;
			}
			.hud-stats {
				display: grid;
				grid-template-columns: 1fr 1fr;
				gap: 10px 18px;
				margin: 16px 0 14px;
			}
			.hud-stats div {
				min-width: 0;
			}
			.hud-stats dt {
				color: var(--muted);
				font-size: 11px;
				text-transform: uppercase;
				letter-spacing: 0.06em;
				margin: 0 0 2px;
			}
			.hud-stats dd {
				margin: 0;
				font-size: 15px;
				font-weight: 600;
				font-variant-numeric: tabular-nums;
			}
			.hud-link {
				display: inline-block;
				color: var(--accent);
				text-decoration: none;
				font-size: 13px;
				font-weight: 600;
				transition: opacity 0.15s ease;
			}
			.hud-link:hover {
				opacity: 0.78;
			}
			.hud-link:focus-visible {
				outline: 2px solid var(--accent);
				outline-offset: 3px;
				border-radius: 4px;
			}

			/* Hint */
			.hint {
				position: fixed;
				top: max(16px, env(safe-area-inset-top));
				right: max(16px, env(safe-area-inset-right));
				color: var(--muted);
				font-size: 12px;
				letter-spacing: 0.03em;
				pointer-events: none;
				opacity: 0.7;
			}

			/* Status overlay (loading / error / empty) */
			#status {
				position: fixed;
				inset: 0;
				display: grid;
				place-items: center;
				padding: 24px;
				background: radial-gradient(120% 120% at 50% 0%, var(--bg-1) 0%, var(--bg-0) 70%);
				z-index: 5;
			}
			.status-card {
				text-align: center;
				max-width: 380px;
				animation: rise 0.4s ease both;
			}
			.status-card h2 {
				margin: 14px 0 8px;
				font-size: 19px;
			}
			.status-card p {
				color: var(--muted);
				font-size: 14px;
				line-height: 1.5;
				margin: 0 0 18px;
				word-break: break-word;
			}
			.status-action {
				display: inline-block;
				padding: 9px 18px;
				background: var(--accent);
				color: #060606;
				font-weight: 700;
				font-size: 14px;
				border-radius: 10px;
				text-decoration: none;
				transition:
					transform 0.12s ease,
					box-shadow 0.12s ease;
			}
			.status-action:hover {
				transform: translateY(-1px);
				box-shadow: 0 8px 24px rgba(110, 168, 255, 0.35);
			}
			.status-action:focus-visible {
				outline: 2px solid #fff;
				outline-offset: 3px;
			}
			#status[data-kind='error'] .status-card h2 {
				color: #ff8f8f;
			}
			.spinner {
				width: 38px;
				height: 38px;
				margin: 0 auto;
				border: 3px solid var(--border);
				border-top-color: var(--accent);
				border-radius: 50%;
				animation: spin 0.9s linear infinite;
			}
			@keyframes spin {
				to {
					transform: rotate(360deg);
				}
			}

			@media (max-width: 520px) {
				#hud {
					width: calc(100vw - 32px);
					left: 16px;
					bottom: 16px;
				}
				.hint {
					display: none;
				}
			}
		</style>
	</head>
	<body>
		<canvas id="scene"></canvas>
		<div class="hint">drag to orbit · scroll to zoom</div>
		<div id="hud" hidden></div>
		<div id="status"></div>
		<script type="module" src="/src/coin3d/main.js"></script>
	</body>
</html>
