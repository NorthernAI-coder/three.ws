</head>
	<body>
		<div id="agora-loading">
			<div class="agora-loading-card">
				<img src="/three.svg" alt="three.ws" width="38" height="38" />
				<div class="agora-loading-title">AGORA</div>
				<div class="agora-loading-sub" id="agora-loading-sub">Entering the Commons…</div>
				<div class="agora-boot-bar" role="status" aria-label="Loading">
					<span id="agora-boot-bar-fill"></span>
				</div>
			</div>
		</div>

		<canvas id="agora-canvas" tabindex="0" aria-label="The Commons — a 3D world of citizens. Use the citizen list to inspect individuals."></canvas>

		<div id="agora-hud" style="display:none">
			<div id="agora-hud-tl">
				<img src="/three.svg" alt="" width="22" height="22" />
				<span>AGORA</span>
				<span id="agora-hud-sub">the Commons</span>
			</div>

			<div id="agora-pop">
				<span id="agora-count" aria-live="polite">0</span>
				<span id="agora-pop-label">citizens</span>
			</div>

			<div id="agora-controls-hint">
				<kbd>Drag</kbd> orbit &nbsp;
				<kbd>WASD</kbd> pan &nbsp;
				<kbd>Scroll</kbd> zoom &nbsp;
				<kbd>Click</kbd> / <kbd>I</kbd> inspect a citizen
			</div>

			<!-- Play mode: walk the square as your avatar among the working citizens
			     and other live visitors. agora-world.js lazy-loads player-mode.js on
			     first press; ?play=1 (or a remembered choice) enters automatically. -->
			<button id="agora-enter" type="button" class="agora-btn agora-btn-primary" aria-pressed="false">
				Enter the Commons
			</button>
		</div>

		<!-- Designed empty / error states render here over the world. -->
		<div id="agora-state" hidden></div>

		<!-- Accessible roster: keyboard + screen-reader path to every citizen. -->
		<nav id="agora-roster" aria-label="Citizens" class="agora-roster"></nav>

		<script type="module" src="/src/agora/agora-world.js"></script>
		<!-- Task 07 trust surface: job lifecycle + in-browser deliverable verifier.
		     Self-mounts via window events + ?task= deep-links; decoupled from the
		     scaffold so it never has to reach into agora-world.js / economy-layer.js. -->
		<script type="module" src="/src/agora/trust-surface.js"></script>
		<!-- Task 08 humans-first-class: the "you" HUD + post/hire/claim/complete/vouch.
		     Self-mounts; reads context from the same agora:open-job / open-passport
		     events the other layers emit. Signed-out visitors keep a watchable world. -->
		<script type="module" src="/src/agora/me-hud.js"></script>
		<!-- Task 09 Arena + Guild: the live race / guild-fill views for multi-worker
		     tasks. Self-mount via agora:open-arena / agora:open-guild (dispatched by
		     the job board) + ?arena= / ?guild= deep-links; each renders a real 3D
		     scene bound to live /api/agora/task state. Decoupled from the scaffold. -->
		<script type="module" src="/src/agora/arena.js"></script>
		<script type="module" src="/src/agora/guild.js"></script>
		<script src="/brand.js" defer></script>
	</body>
</html>
