<html lang="en">
	<head>
		<style>/* three.ws hidden-guard — make the `hidden` attribute authoritative; see scripts/lib/hidden-guard.mjs */[hidden]{display:none!important}</style>
		<script>/* three.ws theme boot */(function(){try{var m=localStorage.getItem('twx_theme');var l=m==='auto'?(window.matchMedia&&window.matchMedia('(prefers-color-scheme: light)').matches):m==='light';document.documentElement.setAttribute('data-theme',l?'light':'dark');}catch(e){document.documentElement.setAttribute('data-theme','dark');}})();</script>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>My Collection · three.ws</title>
		<meta name="description" content="View all the skills and subscriptions you've unlocked on three.ws." />
		<meta name="robots" content="noindex" />
		<meta name="theme-color" content="#0a0a0a" />
		<link rel="icon" href="/favicon.ico" sizes="any" />
		<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
		<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
		<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
		<link rel="apple-touch-icon" href="/apple-touch-icon.png" />
		<link rel="manifest" href="/manifest.webmanifest" />

		<style>
			:root {
				--bg: #0d0d0d;
				--bg-2: #141414;
				--card: #181818;
				--line: rgba(255,255,255,0.07);
				--line-2: rgba(255,255,255,0.12);
				--text: #e7e9ee;
				--muted: rgba(231,233,238,0.55);
				--dim: rgba(231,233,238,0.35);
				--green: #4ade80;
				--amber: #f5a524;
				--violet: #a78bfa;
				--radius: 12px;
				--skeleton-base: rgba(255,255,255,0.04);
				--skeleton-sheen: rgba(255,255,255,0.08);
			}
			[data-theme="light"] {
				--bg: #f5f5f5;
				--bg-2: #ffffff;
				--card: #ffffff;
				--line: rgba(0,0,0,0.07);
				--line-2: rgba(0,0,0,0.12);
				--text: #111;
				--muted: rgba(0,0,0,0.55);
				--dim: rgba(0,0,0,0.35);
				--skeleton-base: rgba(0,0,0,0.04);
				--skeleton-sheen: rgba(0,0,0,0.08);
			}
			*{box-sizing:border-box;margin:0;padding:0;}
			html,body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;min-height:100vh;}
			a{color:inherit;text-decoration:none;}
			.page-shell{max-width:1100px;margin:0 auto;padding:0 20px 80px;}
			.page-hero{padding:48px 0 32px;}
			.page-hero h1{font-size:28px;font-weight:700;letter-spacing:-0.02em;}
			.page-hero p{color:var(--muted);margin-top:8px;font-size:14px;}
			/* Tabs */
			.col-tabs{display:flex;gap:4px;border-bottom:1px solid var(--line-2);margin-bottom:32px;}
			.col-tab{padding:10px 18px;font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:color .15s,border-color .15s;background:none;border-top:none;border-left:none;border-right:none;}
			.col-tab:hover{color:var(--text);}
			.col-tab.active{color:var(--text);border-bottom-color:var(--text);}
			/* Grid */
			.col-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;}
			/* Card */
			.col-card{background:var(--card);border:1px solid var(--line-2);border-radius:var(--radius);padding:18px;display:flex;flex-direction:column;gap:12px;transition:border-color .15s;}
			.col-card:hover{border-color:rgba(255,255,255,0.2);}
			[data-theme="light"] .col-card:hover{border-color:rgba(0,0,0,0.2);}
			.col-card-header{display:flex;gap:12px;align-items:center;}
			.col-card-avatar{width:44px;height:44px;border-radius:50%;background:var(--bg-2);border:1px solid var(--line);object-fit:cover;flex-shrink:0;}
			.col-card-avatar.placeholder{display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--muted);}
			.col-card-meta{flex:1;min-width:0;}
			.col-card-skill{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
			.col-card-agent{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;}
			.col-card-badges{display:flex;gap:6px;flex-wrap:wrap;}
			.badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:500;padding:3px 8px;border-radius:20px;border:1px solid;}
			.badge-green{color:var(--green);border-color:rgba(74,222,128,.25);background:rgba(74,222,128,.08);}
			.badge-amber{color:var(--amber);border-color:rgba(245,165,36,.25);background:rgba(245,165,36,.08);}
			.badge-violet{color:var(--violet);border-color:rgba(167,139,250,.25);background:rgba(167,139,250,.08);}
			.badge-muted{color:var(--muted);border-color:var(--line-2);background:var(--bg-2);}
			.col-card-footer{display:flex;align-items:center;justify-content:space-between;margin-top:4px;}
			.col-card-date{font-size:11px;color:var(--dim);}
			.col-card-nft{font-size:11px;color:var(--muted);}
			.col-card-nft a{color:var(--violet);text-decoration:underline;text-underline-offset:2px;}
			.col-cta{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:500;padding:6px 12px;border-radius:8px;background:#fff;color:#000;border:none;cursor:pointer;transition:opacity .15s;text-decoration:none;}
			.col-cta:hover{opacity:.85;}
			/* Skeleton */
			.skeleton{background:var(--skeleton-base);background-image:linear-gradient(90deg,var(--skeleton-base) 0%,var(--skeleton-sheen) 50%,var(--skeleton-base) 100%);background-size:200% 100%;border-radius:6px;animation:shimmer 1.4s ease-in-out infinite;}
			@keyframes shimmer{0%{background-position:200% 0;}100%{background-position:-200% 0;}}
			.skeleton-card{background:var(--card);border:1px solid var(--line-2);border-radius:var(--radius);padding:18px;display:flex;flex-direction:column;gap:12px;}
			.skeleton-row{height:14px;border-radius:4px;}
			/* Empty */
			.col-empty{text-align:center;padding:80px 20px;color:var(--muted);}
			.col-empty svg{margin-bottom:16px;opacity:.35;}
			.col-empty h3{font-size:18px;font-weight:600;color:var(--text);margin-bottom:8px;}
			.col-empty p{font-size:14px;line-height:1.5;}
			.col-empty a{color:var(--text);text-decoration:underline;text-underline-offset:3px;}
			/* Panel */
			.col-panel{display:none;}
			.col-panel.active{display:block;}
			/* Stats bar */
			.col-stats{display:flex;gap:32px;padding:20px 0 28px;border-bottom:1px solid var(--line);margin-bottom:28px;}
			.col-stat-val{font-size:24px;font-weight:700;letter-spacing:-0.03em;}
			.col-stat-lbl{font-size:12px;color:var(--muted);margin-top:2px;}
			/* Subscription expiry */
			.col-sub-expiry{font-size:11px;}
			.col-sub-expiry.active{color:var(--green);}
			.col-sub-expiry.expired{color:var(--amber);}
			/* Auth gate */
			.col-auth-wall{text-align:center;padding:120px 20px;}
			.col-auth-wall h2{font-size:22px;font-weight:700;margin-bottom:12px;}
			.col-auth-wall p{color:var(--muted);font-size:14px;margin-bottom:24px;}
			/* Error */
			.col-error{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25);border-radius:10px;padding:16px 20px;color:#ef4444;font-size:13px;margin-bottom:24px;}
			@media(max-width:600px){
				.col-grid{grid-template-columns:1fr;}
				.col-stats{gap:20px;flex-wrap:wrap;}
			}
		</style>

	<body>
		<header><div id="nav-container"></div></header>
		<script src="/nav.js"></script>

		<main class="page-shell">
			<div class="page-hero">
				<h1>My Collection</h1>
				<p>Skills and subscriptions you've unlocked across three.ws agents.</p>
			</div>

			<div id="col-auth-wall" class="col-auth-wall" hidden>
				<h2>Sign in to view your collection</h2>
				<p>Your purchased skills and active subscriptions live here.</p>
				<a href="/login?next=/collection" class="col-cta">Sign in</a>
			</div>

			<div id="col-error" class="col-error" hidden></div>

			<div id="col-stats" class="col-stats" hidden>
				<div>
					<div class="col-stat-val" id="stat-skills">—</div>
					<div class="col-stat-lbl">Owned skills</div>
				</div>
				<div>
					<div class="col-stat-val" id="stat-subs">—</div>
					<div class="col-stat-lbl">Active subscriptions</div>
				</div>
				<div>
					<div class="col-stat-val" id="stat-nfts">—</div>
					<div class="col-stat-lbl">NFT receipts</div>
				</div>
			</div>

			<div id="col-main" hidden>
				<div class="col-tabs" role="tablist">
					<button class="col-tab active" role="tab" aria-selected="true" data-panel="skills">Skills</button>
					<button class="col-tab" role="tab" aria-selected="false" data-panel="subscriptions">Subscriptions</button>
				</div>

				<div id="panel-skills" class="col-panel active" role="tabpanel">
					<div id="skills-grid" class="col-grid"></div>
				</div>
				<div id="panel-subscriptions" class="col-panel" role="tabpanel">
					<div id="subs-grid" class="col-grid"></div>
				</div>
			</div>
		</main>

		<div id="footer-container"></div>
		<script src="/footer.js"></script>
		<script type="module" src="/src/collection.js"></script>
