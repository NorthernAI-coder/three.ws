<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<title>Agent Deal — real on-chain AI payments · three.ws</title>
		<meta
			name="description"
			content="Two AI agents negotiate and settle a real Solana payment on-chain, live. Agent A pays Agent B for a market brief. Watch the blockchain transaction confirm in real time."
		/>
		<meta name="theme-color" content="#080b14" />
		<meta property="og:title" content="Agent Deal — AI agents pay each other on-chain" />
		<meta
			property="og:description"
			content="Watch two 3D AI agents negotiate and settle a real Solana payment. The blockchain transaction is live."
		/>
		<meta property="og:image" content="https://three.ws/og-agent-deal.png" />
		<meta property="og:type" content="website" />
		<meta name="twitter:card" content="summary_large_image" />
		<link rel="icon" href="/favicon.ico" />
		<style>
			:root {
				--blue: #0f62fe;
				--blue-2: #4589ff;
				--blue-3: #78a9ff;
				--up: #42be65;
				--down: #fa4d56;
				--warn: #f1c21b;
				--ink: #f4f4f4;
				--muted: #8b95a9;
				--panel: rgba(10, 14, 26, 0.7);
				--stroke: rgba(120, 169, 255, 0.18);
				--stroke-2: rgba(120, 169, 255, 0.32);
				--font: 'IBM Plex Sans', system-ui, -apple-system, sans-serif;
				--mono: 'IBM Plex Mono', 'Fira Code', ui-monospace, monospace;
				--a-color: #4589ff;
				--b-color: #42be65;
			}
			* {
				box-sizing: border-box;
			}
			html,
			body {
				margin: 0;
				height: 100%;
				overflow: hidden;
			}
			body {
				font-family: var(--font);
				color: var(--ink);
				background:
					radial-gradient(
						1400px 800px at 20% -20%,
						rgba(15, 98, 254, 0.12) 0%,
						transparent 55%
					),
					radial-gradient(
						1000px 600px at 85% 110%,
						rgba(66, 190, 101, 0.1) 0%,
						transparent 55%
					),
					#080b14;
			}

			/* ── Layout ── */
			.shell {
				display: grid;
				grid-template-rows: 56px 1fr;
				height: 100vh;
			}
			.topbar {
				display: flex;
				align-items: center;
				justify-content: space-between;
				padding: 0 22px;
				border-bottom: 1px solid var(--stroke);
				background: rgba(8, 11, 20, 0.6);
				backdrop-filter: blur(12px);
				z-index: 10;
			}
			.brand {
				display: flex;
				align-items: center;
				gap: 10px;
				font-weight: 600;
				font-size: 14px;
				letter-spacing: 0.01em;
			}
			.brand-dot {
				width: 8px;
				height: 8px;
				border-radius: 50%;
				background: var(--blue);
				box-shadow: 0 0 10px var(--blue);
			}
			.brand small {
				color: var(--muted);
				font-weight: 400;
			}
			.topbar a {
				font-size: 13px;
				color: var(--muted);
				text-decoration: none;
				border: 1px solid var(--stroke);
				padding: 6px 12px;
				border-radius: 8px;
				background: rgba(255, 255, 255, 0.03);
				transition:
					color 0.15s,
					border-color 0.15s;
			}
			.topbar a:hover {
				color: var(--ink);
				border-color: var(--blue-2);
			}

			.arena {
				display: grid;
				grid-template-columns: 1fr 340px 1fr;
				gap: 0;
				height: 100%;
				overflow: hidden;
			}

			/* ── Avatar columns ── */
			.agent-col {
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: flex-start;
				padding: 24px 18px 18px;
				position: relative;
			}
			.agent-label {
				display: flex;
				align-items: center;
				gap: 9px;
				font-size: 13px;
				font-weight: 600;
				letter-spacing: 0.04em;
				text-transform: uppercase;
				margin-bottom: 14px;
				padding: 7px 14px;
				border-radius: 999px;
				border: 1px solid var(--stroke);
				background: var(--panel);
				backdrop-filter: blur(8px);
			}
			.agent-label .dot {
				width: 7px;
				height: 7px;
				border-radius: 50%;
				flex: 0 0 auto;
			}
			.agent-a .dot {
				background: var(--a-color);
				box-shadow: 0 0 8px var(--a-color);
			}
			.agent-b .dot {
				background: var(--b-color);
				box-shadow: 0 0 8px var(--b-color);
			}
			.avatar-frame {
				flex: 1;
				width: 100%;
				max-height: calc(100vh - 180px);
				border: none;
				border-radius: 16px;
				overflow: hidden;
				background: rgba(255, 255, 255, 0.02);
				border: 1px solid var(--stroke);
			}
			.wallet-chip {
				margin-top: 12px;
				font-family: var(--mono);
				font-size: 11px;
				color: var(--muted);
				background: var(--panel);
				border: 1px solid var(--stroke);
				border-radius: 8px;
				padding: 8px 12px;
				width: 100%;
				display: flex;
				gap: 8px;
				align-items: center;
				justify-content: space-between;
			}
			.wallet-chip .addr {
				overflow: hidden;
				text-overflow: ellipsis;
				white-space: nowrap;
			}
			.wallet-chip .balance {
				flex: 0 0 auto;
				color: var(--ink);
				font-weight: 600;
			}
			.wallet-chip .balance.loading {
				opacity: 0.4;
			}
			.wallet-chip a {
				flex: 0 0 auto;
				color: var(--blue-3);
				text-decoration: none;
				font-size: 10px;
			}

			/* ── Deal feed (center) ── */
			.feed-col {
				display: flex;
				flex-direction: column;
				padding: 18px 0 18px;
				border-left: 1px solid var(--stroke);
				border-right: 1px solid var(--stroke);
				overflow: hidden;
			}
			.feed-header {
				padding: 0 18px 14px;
				border-bottom: 1px solid var(--stroke);
				display: flex;
				align-items: center;
				gap: 10px;
				flex: 0 0 auto;
			}
			.feed-title {
				font-size: 13px;
				font-weight: 600;
				letter-spacing: 0.06em;
				text-transform: uppercase;
				color: var(--blue-3);
			}
			.feed-badge {
				font-size: 11px;
				color: var(--muted);
				background: rgba(120, 169, 255, 0.08);
				border: 1px solid var(--stroke);
				border-radius: 6px;
				padding: 3px 8px;
			}

			.messages {
				flex: 1;
				overflow-y: auto;
				padding: 14px 18px;
				display: flex;
				flex-direction: column;
				gap: 12px;
				scroll-behavior: smooth;
			}
			.messages::-webkit-scrollbar {
				width: 4px;
			}
			.messages::-webkit-scrollbar-track {
				background: transparent;
			}
			.messages::-webkit-scrollbar-thumb {
				background: var(--stroke-2);
				border-radius: 4px;
			}

			.msg {
				display: flex;
				gap: 9px;
				animation: msgIn 0.22s ease both;
			}
			@keyframes msgIn {
				from {
					opacity: 0;
					transform: translateY(6px);
				}
				to {
					opacity: 1;
					transform: none;
				}
			}
			.msg-dot {
				width: 7px;
				height: 7px;
				border-radius: 50%;
				flex: 0 0 auto;
				margin-top: 5px;
			}
			.msg.A .msg-dot {
				background: var(--a-color);
				box-shadow: 0 0 6px var(--a-color);
			}
			.msg.B .msg-dot {
				background: var(--b-color);
				box-shadow: 0 0 6px var(--b-color);
			}
			.msg-body {
				flex: 1;
				min-width: 0;
			}
			.msg-name {
				font-size: 10.5px;
				font-weight: 700;
				letter-spacing: 0.08em;
				text-transform: uppercase;
				margin-bottom: 3px;
			}
			.msg.A .msg-name {
				color: var(--a-color);
			}
			.msg.B .msg-name {
				color: var(--b-color);
			}
			.msg-text {
				font-size: 13.5px;
				line-height: 1.5;
				color: var(--ink);
			}

			/* Quote card */
			.quote-card {
				background: rgba(15, 98, 254, 0.08);
				border: 1px solid rgba(120, 169, 255, 0.25);
				border-radius: 12px;
				padding: 12px 14px;
				animation: msgIn 0.22s ease both;
			}
			.quote-card .ql {
				font-size: 10.5px;
				letter-spacing: 0.1em;
				text-transform: uppercase;
				color: var(--blue-3);
				margin-bottom: 8px;
			}
			.quote-card .qservice {
				font-size: 13px;
				font-weight: 600;
				margin-bottom: 10px;
			}
			.quote-card .qrow {
				display: flex;
				justify-content: space-between;
				font-size: 12px;
				color: var(--muted);
				margin-bottom: 4px;
			}
			.quote-card .qrow .val {
				font-family: var(--mono);
				color: var(--ink);
				font-weight: 600;
			}

			/* Paying indicator */
			.paying-card {
				background: rgba(241, 194, 27, 0.07);
				border: 1px solid rgba(241, 194, 27, 0.22);
				border-radius: 12px;
				padding: 12px 14px;
				animation: msgIn 0.22s ease both;
				display: flex;
				align-items: center;
				gap: 10px;
			}
			.paying-pulse {
				width: 10px;
				height: 10px;
				border-radius: 50%;
				background: var(--warn);
				animation: payPulse 0.8s infinite ease-in-out;
				flex: 0 0 auto;
			}
			@keyframes payPulse {
				0%,
				100% {
					transform: scale(0.7);
					opacity: 0.5;
				}
				50% {
					transform: scale(1.2);
					opacity: 1;
				}
			}
			.paying-text {
				font-size: 13px;
				color: var(--ink);
			}
			.paying-text .detail {
				font-size: 11px;
				color: var(--muted);
				font-family: var(--mono);
				margin-top: 3px;
			}

			/* Transaction confirmed card */
			.tx-card {
				background: rgba(66, 190, 101, 0.07);
				border: 1px solid rgba(66, 190, 101, 0.28);
				border-radius: 12px;
				padding: 14px 16px;
				animation: txIn 0.35s cubic-bezier(0.34, 1.56, 0.64, 1) both;
			}
			@keyframes txIn {
				from {
					opacity: 0;
					transform: scale(0.94) translateY(8px);
				}
				to {
					opacity: 1;
					transform: none;
				}
			}
			.tx-card .tx-header {
				display: flex;
				align-items: center;
				gap: 8px;
				margin-bottom: 10px;
			}
			.tx-check {
				width: 22px;
				height: 22px;
				border-radius: 50%;
				background: var(--up);
				display: flex;
				align-items: center;
				justify-content: center;
				flex: 0 0 auto;
				font-size: 12px;
			}
			.tx-label {
				font-size: 12px;
				font-weight: 700;
				letter-spacing: 0.06em;
				text-transform: uppercase;
				color: var(--up);
			}
			.tx-card .tx-row {
				display: flex;
				justify-content: space-between;
				font-size: 12px;
				color: var(--muted);
				margin-bottom: 5px;
			}
			.tx-card .tx-row .val {
				font-family: var(--mono);
				color: var(--ink);
				font-weight: 600;
				word-break: break-all;
				text-align: right;
				max-width: 60%;
			}
			.tx-card .tx-link {
				display: flex;
				align-items: center;
				gap: 6px;
				margin-top: 10px;
				padding-top: 10px;
				border-top: 1px solid rgba(66, 190, 101, 0.18);
				font-size: 12px;
				font-weight: 600;
				color: var(--up);
				text-decoration: none;
				transition: opacity 0.15s;
			}
			.tx-card .tx-link:hover {
				opacity: 0.8;
			}
			.tx-link svg {
				width: 12px;
				height: 12px;
			}

			/* Brief delivery card */
			.brief-card {
				background: rgba(120, 169, 255, 0.06);
				border: 1px solid var(--stroke-2);
				border-radius: 12px;
				padding: 14px 16px;
				animation: msgIn 0.22s ease both;
			}
			.brief-card .brief-header {
				font-size: 10.5px;
				letter-spacing: 0.1em;
				text-transform: uppercase;
				color: var(--blue-3);
				margin-bottom: 8px;
				display: flex;
				align-items: center;
				gap: 8px;
				justify-content: space-between;
			}
			.brief-card .source {
				font-size: 10px;
				color: var(--muted);
				letter-spacing: 0;
				text-transform: none;
			}
			.brief-card .brief-text {
				font-size: 14px;
				line-height: 1.6;
				color: var(--ink);
			}

			/* Error */
			.err-card {
				background: rgba(250, 77, 86, 0.07);
				border: 1px solid rgba(250, 77, 86, 0.25);
				border-radius: 12px;
				padding: 12px 14px;
				font-size: 13px;
				color: var(--ink);
				animation: msgIn 0.22s ease both;
			}
			.err-card .err-head {
				font-size: 11px;
				font-weight: 700;
				letter-spacing: 0.08em;
				text-transform: uppercase;
				color: var(--down);
				margin-bottom: 5px;
			}
			.err-card .fund-hint {
				font-family: var(--mono);
				font-size: 11px;
				color: var(--muted);
				margin-top: 8px;
				word-break: break-all;
			}
			.err-card a {
				color: var(--blue-3);
			}

			/* Controls */
			.controls {
				flex: 0 0 auto;
				padding: 12px 18px 0;
				border-top: 1px solid var(--stroke);
			}
			.run-btn {
				width: 100%;
				padding: 11px;
				font: inherit;
				font-size: 13px;
				font-weight: 700;
				letter-spacing: 0.04em;
				text-transform: uppercase;
				color: #fff;
				background: var(--blue);
				border: none;
				border-radius: 10px;
				cursor: pointer;
				transition:
					background 0.15s,
					opacity 0.15s,
					transform 0.12s;
			}
			.run-btn:hover {
				background: var(--blue-2);
			}
			.run-btn:active {
				transform: translateY(1px);
			}
			.run-btn:disabled {
				opacity: 0.45;
				cursor: progress;
			}
			.run-status {
				text-align: center;
				font-size: 11.5px;
				color: var(--muted);
				margin-top: 7px;
				min-height: 1.2em;
			}
			.run-status.busy::after {
				content: '';
				display: inline-block;
				width: 5px;
				height: 5px;
				border-radius: 50%;
				background: var(--blue-3);
				margin-left: 5px;
				animation: pulse 0.9s infinite;
			}
			@keyframes pulse {
				0%,
				100% {
					opacity: 0.3;
				}
				50% {
					opacity: 1;
				}
			}
			.run-count {
				text-align: center;
				font-size: 11px;
				color: var(--muted);
				margin-top: 4px;
				letter-spacing: 0.04em;
			}

			/* Empty state */
			.empty {
				flex: 1;
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				gap: 10px;
				color: var(--muted);
				text-align: center;
				padding: 20px;
			}
			.empty .icon {
				font-size: 28px;
				opacity: 0.4;
			}
			.empty p {
				font-size: 13px;
				line-height: 1.5;
				max-width: 240px;
				margin: 0;
			}

			@media (max-width: 900px) {
				.arena {
					grid-template-columns: 1fr;
					grid-template-rows: auto 1fr;
					overflow-y: auto;
				}
				.agent-col {
					display: none;
				}
				.feed-col {
					border: none;
					height: calc(100vh - 56px);
				}
			}
		</style>
	</head>
	<body>
		<div class="shell">
			<header class="topbar">
				<div class="brand">
					<span class="brand-dot"></span>
					<span>Agent Deal</span>
					<small>real Solana · x402</small>
				</div>
				<a href="/">← three.ws</a>
			</header>

			<div class="arena">
				<!-- Agent A -->
				<div class="agent-col agent-a">
					<div class="agent-label">
						<span class="dot"></span>
						<span>Agent&nbsp;A · Reporter</span>
					</div>
					<iframe
						id="frame-a"
						class="avatar-frame"
						title="Agent A avatar"
						allow="autoplay"
						src="/avatar-embed.html?bg=dark&kiosk=1&hideChrome=1"
					></iframe>
					<div class="wallet-chip">
						<span class="addr" id="addr-a">loading…</span>
						<span class="balance loading" id="bal-a">— SOL</span>
						<a id="link-a" href="#" target="_blank" rel="noopener">↗</a>
					</div>
				</div>

				<!-- Deal feed -->
				<div class="feed-col">
					<div class="feed-header">
						<span class="feed-title">Deal Feed</span>
						<span class="feed-badge" id="deal-badge">ready</span>
					</div>

					<div id="messages" class="messages">
						<div class="empty">
							<div class="icon">⇌</div>
							<p>
								Two AI agents negotiate and settle a real Solana payment. Hit Run
								Deal to start.
							</p>
						</div>
					</div>

					<div class="controls">
						<button id="run-btn" class="run-btn">Run Deal</button>
						<div id="run-status" class="run-status"></div>
						<div id="run-count" class="run-count"></div>
					</div>
				</div>

				<!-- Agent B -->
				<div class="agent-col agent-b">
					<div class="agent-label">
						<span class="dot"></span>
						<span>Agent&nbsp;B · Oracle</span>
					</div>
					<iframe
						id="frame-b"
						class="avatar-frame"
						title="Agent B avatar"
						allow="autoplay"
						src="/avatar-embed.html?bg=dark&kiosk=1&hideChrome=1"
					></iframe>
					<div class="wallet-chip">
						<span class="addr" id="addr-b">—</span>
						<span class="balance" id="bal-b">receiving</span>
						<a id="link-b" href="#" target="_blank" rel="noopener">↗</a>
					</div>
				</div>
			</div>
		</div>

		<script type="module">
			// Deal feed client — consumes SSE from /api/pay/deal and renders the
			// negotiation, payment, and delivery events live.

			const $ = (id) => document.getElementById(id);
			const messages = $('messages');
			const runBtn = $('run-btn');
			const runStatus = $('run-status');
			const runCount = $('run-count');
			const dealBadge = $('deal-badge');
			const frameA = $('frame-a');
			const frameB = $('frame-b');

			// ── Avatar speech via postMessage to the embed iframes ──────────────
			const origin = location.origin;
			const readyA = { ready: false };
			const readyB = { ready: false };

			function avatarReady(frame, state) {
				frame.contentWindow?.postMessage({ type: 'v1.avatar.hello' }, origin);
				state.ready = true;
			}
			frameA.addEventListener('load', () => avatarReady(frameA, readyA));
			frameB.addEventListener('load', () => avatarReady(frameB, readyB));

			window.addEventListener('message', (e) => {
				if (e.source === frameA.contentWindow && e.data?.type === 'v1.avatar.ready')
					readyA.ready = true;
				if (e.source === frameB.contentWindow && e.data?.type === 'v1.avatar.ready')
					readyB.ready = true;
			});

			function speak(frame, state, text) {
				if (!text) return;
				if (state.ready) {
					frame.contentWindow?.postMessage({ type: 'v1.avatar.speak', text }, origin);
				} else {
					try {
						const u = new SpeechSynthesisUtterance(text.slice(0, 200));
						u.rate = 1;
						window.speechSynthesis?.speak(u);
					} catch {}
				}
			}

			function emote(frame, state, trigger) {
				if (!state.ready || !trigger) return;
				frame.contentWindow?.postMessage(
					{ type: 'v1.avatar.emote', name: trigger, weight: 1 },
					origin,
				);
			}

			// ── Feed rendering ───────────────────────────────────────────────────
			let dealCount = 0;
			let running = false;

			function clearFeed() {
				messages.innerHTML = '';
			}

			function appendMsg(speaker, text) {
				const el = document.createElement('div');
				el.className = `msg ${speaker}`;
				el.innerHTML = `
					<span class="msg-dot"></span>
					<div class="msg-body">
						<div class="msg-name">Agent ${speaker}</div>
						<div class="msg-text">${escHtml(text)}</div>
					</div>`;
				messages.appendChild(el);
				messages.scrollTop = messages.scrollHeight;
				return el;
			}

			function appendCard(html) {
				const el = document.createElement('div');
				el.innerHTML = html;
				messages.appendChild(el.firstElementChild);
				messages.scrollTop = messages.scrollHeight;
			}

			function escHtml(s) {
				return String(s)
					.replace(/&/g, '&amp;')
					.replace(/</g, '&lt;')
					.replace(/>/g, '&gt;')
					.replace(/"/g, '&quot;');
			}

			const fmtSol = (n) => Number(n).toFixed(6);
			const addrShort = (a) => (a ? `${a.slice(0, 4)}…${a.slice(-4)}` : '');

			// ── Quote card ───────────────────────────────────────────────────────
			function renderQuote(d) {
				appendCard(`
					<div class="quote-card">
						<div class="ql">Service Quote</div>
						<div class="qservice">${escHtml(d.service)}</div>
						<div class="qrow"><span>Amount</span><span class="val">${fmtSol(d.sol)} SOL</span></div>
						<div class="qrow"><span>USD equivalent</span><span class="val">$${Number(d.usd).toFixed(2)}</span></div>
						<div class="qrow"><span>From</span><span class="val">${addrShort(d.from)}</span></div>
						<div class="qrow"><span>To</span><span class="val">${addrShort(d.to)}</span></div>
					</div>`);
			}

			// ── Paying card ──────────────────────────────────────────────────────
			function renderPaying(d) {
				appendCard(`
					<div class="paying-card">
						<div class="paying-pulse"></div>
						<div class="paying-text">
							Signing &amp; broadcasting ${fmtSol(d.sol)} SOL on-chain…
							<div class="detail">${addrShort(d.from)} → ${addrShort(d.to)}</div>
						</div>
					</div>`);
			}

			// ── Transaction confirmed card ────────────────────────────────────────
			function renderPaid(d) {
				appendCard(`
					<div class="tx-card">
						<div class="tx-header">
							<div class="tx-check">✓</div>
							<div class="tx-label">Transaction Confirmed</div>
						</div>
						<div class="tx-row"><span>Signature</span><span class="val">${escHtml(d.signature.slice(0, 20))}…</span></div>
						<div class="tx-row"><span>Amount</span><span class="val">${fmtSol(d.sol)} SOL · $${Number(d.usd).toFixed(2)}</span></div>
						<div class="tx-row"><span>Network</span><span class="val">${escHtml(d.network)}</span></div>
						<a class="tx-link" href="${escHtml(d.explorer)}" target="_blank" rel="noopener">
							<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
							View on Solscan
						</a>
					</div>`);
			}

			// ── Brief delivery card ───────────────────────────────────────────────
			function renderDeliver(d) {
				appendCard(`
					<div class="brief-card">
						<div class="brief-header">
							<span>${escHtml(d.service)}</span>
							<span class="source">${escHtml(d.source)}</span>
						</div>
						<div class="brief-text">${escHtml(d.brief)}</div>
					</div>`);
			}

			// ── Error card ────────────────────────────────────────────────────────
			function renderError(d) {
				const fundLine = d.fundAddress
					? `<div class="fund-hint">Fund address: <a href="${escHtml(d.fundUrl || '#')}" target="_blank">${escHtml(d.fundAddress)}</a></div>`
					: '';
				appendCard(`
					<div class="err-card">
						<div class="err-head">Error</div>
						${escHtml(d.message)}${fundLine}
					</div>`);
			}

			// ── Wallet status ─────────────────────────────────────────────────────
			async function loadWalletStatus() {
				try {
					const r = await fetch('/api/agent/wallet');
					if (!r.ok) return;
					const d = await r.json();
					if (d.address) {
						$('addr-a').textContent = addrShort(d.address);
						$('link-a').href = `https://solscan.io/account/${d.address}`;
						$('link-a').title = d.address;
					}
					if (d.sol != null) {
						const bal = $('bal-a');
						bal.textContent = `${Number(d.sol).toFixed(4)} SOL`;
						bal.classList.remove('loading');
					}
				} catch {}
			}

			function setAgentBInfo(from, to) {
				if (to) {
					$('addr-b').textContent = addrShort(to);
					$('link-b').href = `https://solscan.io/account/${to}`;
					$('link-b').title = to;
				}
			}

			// ── Run deal ──────────────────────────────────────────────────────────
			function setStatus(msg, busy = false) {
				runStatus.textContent = msg || '';
				runStatus.classList.toggle('busy', busy);
				runBtn.disabled = busy;
				dealBadge.textContent = busy ? 'in progress' : msg ? 'done' : 'ready';
			}

			async function runDeal() {
				if (running) return;
				running = true;
				clearFeed();
				setStatus('Connecting…', true);

				const es = new EventSource('/api/pay/deal');

				es.addEventListener('line', (e) => {
					const d = JSON.parse(e.data);
					appendMsg(d.speaker, d.text);
					const frame = d.speaker === 'A' ? frameA : frameB;
					const state = d.speaker === 'A' ? readyA : readyB;
					speak(frame, state, d.text);
					emote(frame, state, d.emotion);
					setStatus(`Agent ${d.speaker} speaking…`, true);
				});

				es.addEventListener('quote', (e) => {
					const d = JSON.parse(e.data);
					renderQuote(d);
					setAgentBInfo(d.from, d.to);
					setStatus('Quote received', true);
				});

				es.addEventListener('paying', (e) => {
					const d = JSON.parse(e.data);
					renderPaying(d);
					setStatus('Broadcasting transaction…', true);
				});

				es.addEventListener('paid', (e) => {
					const d = JSON.parse(e.data);
					renderPaid(d);
					setStatus('Transaction confirmed', true);
					// Refresh Agent A balance after payment
					loadWalletStatus();
				});

				es.addEventListener('deliver', (e) => {
					const d = JSON.parse(e.data);
					renderDeliver(d);
					setStatus('Brief delivered', true);
				});

				es.addEventListener('error', (e) => {
					try {
						const d = JSON.parse(e.data);
						renderError(d);
						setStatus(d.message?.slice(0, 60) || 'Error', false);
					} catch {
						setStatus('Connection error', false);
					}
					es.close();
					running = false;
					runBtn.disabled = false;
				});

				es.addEventListener('done', () => {
					es.close();
					running = false;
					dealCount++;
					runCount.textContent = `${dealCount} deal${dealCount === 1 ? '' : 's'} settled`;
					setStatus('Deal complete', false);
					runBtn.disabled = false;
					dealBadge.textContent = 'done';
					loadWalletStatus();
				});

				// SSE connection error (network drop, 503, etc.)
				es.onerror = (e) => {
					if (es.readyState === EventSource.CLOSED) {
						if (running) {
							renderError({
								message:
									'SSE connection closed unexpectedly. Is AVATAR_WALLET_SECRET set?',
							});
							setStatus('Disconnected', false);
							running = false;
							runBtn.disabled = false;
						}
					}
				};
			}

			runBtn.addEventListener('click', runDeal);
			loadWalletStatus();
		</script>
	</body>
</html>
