<style>
  :root {
    --green: #00ff41;
    --dark-grey: #1a1a1a;
    --medium-grey: #2a2a2a;
    --light-grey: #3a3a3a;
    --text-color: #e0e0e0;
    --glow-color: rgba(0, 255, 65, 0.5);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    color: var(--text-color);
    font-family: 'Roboto Mono', 'Courier New', monospace;
    font-size: 14px;
    line-height: 1.6;
  }
  a { color: var(--green); text-decoration: none; }
  a:hover { text-decoration: underline; }

  /* ── Main Layout ──────────────────────────────────────────
     The kiosk row (3D viewer + token feed) gets a viewport-sized
     height so it fills the screen on first paint, then the site
     footer scrolls in below it. Mobile breakpoint stacks the row
     vertically — see media query at the bottom of this block. */
  #main-container {
    display: flex;
    min-height: 0;
    height: calc(100svh - 130px);
  }
  #viewer-container {
    flex: 1;
    min-width: 0;
    position: relative;
    border-right: 1px solid var(--dark-grey);
  }
  #feed-container {
    width: 450px;
    display: flex;
    flex-direction: column;
    background: #0f0f0f;
  }

  /* ── Header ────────────────────────────────────────── */
  #header {
    background: #111;
    border-bottom: 1px solid var(--dark-grey);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
    z-index: 10;
  }
  #header h1 {
    font-size: 18px;

    text-shadow: 0 0 8px var(--glow-color);
  }
  #header .status {
    font-size: 12px;
    color: #666;
  }
  #header .status.connected { color: var(--green); }
  #header .status.error { color: #ff4141; }
  #header .header-links {
    margin-left: auto;
    display: flex;
    gap: 18px;
    font-size: 13px;
  }
  #header .header-links a { color: var(--green); }
  #header .header-links a:hover { text-decoration: underline; }
  #header .header-links a:focus-visible { outline: 2px solid var(--green); outline-offset: 2px; border-radius: 4px; }

  /* ── Stats bar ───────────────────────────────────── */
  #stats-bar {
    display: flex;
    gap: 0;
    background: #0d0d0d;
    border-bottom: 1px solid var(--dark-grey);
  }
  .stat {
    flex: 1;
    padding: 10px 16px;
    border-right: 1px solid var(--dark-grey);

  .stat:last-child { border-right: none; }
  .stat-label {
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;

  }
  .stat-value {
    font-size: 18px;
    font-weight: bold;
    color: var(--green);
    font-variant-numeric: tabular-nums;
    transition: color 0.3s;
  }
  .stat-value.flash { color: #fff; }

  /* ── Feed ────────────────────────────────────────── */
  #feed-header {
    padding: 12px;
    border-bottom: 1px solid var(--dark-grey);
    background: #131313;
  }
  #feed {
    flex: 1;
    overflow-y: auto;

  .token-card {
    background: var(--dark-grey);
    border: 1px solid var(--medium-grey);
    border-radius: 8px;
    margin-bottom: 8px;

  .token-card:hover {

  .token-card img {

  .token-info { flex: 1; min-width: 0; }
  .token-name {

  .token-mcap { margin-top: 4px; font-size: 14px; color: var(--green); }
  .token-meta { margin-top: 2px; font-size: 11px; color: #777; }
  .token-links { margin-top: 8px; font-size: 11px; display: flex; gap: 10px; align-items: center; }
  .token-watch { background: none; border: 1px solid var(--medium-grey); border-radius: 6px; color: #666;
    font-size: 14px; line-height: 1; padding: 2px 7px; cursor: pointer; transition: color .15s, border-color .15s; }

  .pl-oracle-badge { margin-left: auto; flex-shrink: 0; }

  .pl-ob-tier { font: 600 8px/1 monospace; text-transform: uppercase; letter-spacing: .06em; opacity: .8; }

  @keyframes fadeIn {

  }

  /* ── Skeleton (empty / waiting state) ──────────────── */
  .skeleton-card {
    background: var(--dark-grey);

    border-radius: 8px;

  .skeleton-card .sk-avatar {

  }
  .skeleton-card .sk-lines { flex: 1; display: flex; flex-direction: column; gap: 8px; }
  .sk-line { height: 12px; border-radius: 4px; }
  .sk-line.w70 { width: 70%; }
  .sk-line.w40 { width: 40%; }
  .sk-line.w55 { width: 55%; }
  .sk-avatar, .sk-line {
    background: linear-gradient(90deg, #1a1a1a 25%, #242424 50%, #1a1a1a 75%);
    background-size: 200% 100%;
    animation: shimmer 1.4s ease-in-out infinite;
  }
  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }
  .feed-empty-hint {
    text-align: center;
    color: #666;
    font-size: 12px;
    padding: 4px 0 12px;
  }

  /* ── Error state ───────────────────────────────────── */
  .feed-error {
    margin: 12px 8px;
    padding: 20px 16px;
    border: 1px solid #5a2222;
    background: rgba(255, 65, 65, 0.06);
    border-radius: 8px;
    text-align: center;
  }
  .feed-error h3 { color: #ff6b6b; font-size: 14px; margin-bottom: 6px; }
  .feed-error p { color: #999; font-size: 12px; margin-bottom: 14px; line-height: 1.5; }
  .feed-error button {
    background: var(--green);
    color: #0a0a0a;
    border: none;
    border-radius: 6px;
    padding: 9px 18px;
    font-family: inherit;
    font-size: 13px;
    font-weight: bold;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s, filter 0.15s;
  }
  .feed-error button:hover { filter: brightness(1.1); box-shadow: 0 0 12px var(--glow-color); }
  .feed-error button:active { transform: translateY(1px); }
  .feed-error button:focus-visible { outline: 2px solid var(--green); outline-offset: 2px; }

  /* ── Scrollbar ─────────────────────────────────────── */
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: #0f0f0f; }
  ::-webkit-scrollbar-thumb { background: var(--medium-grey); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--light-grey); }

  /* ── Responsive ──────────────────────────────────────
     Below 900px the kiosk row stacks vertically: the reacting 3D agent on
     top, the live feed (with its own scroll region) beneath it. */
  @media (max-width: 900px) {
    #main-container { flex-direction: column; }
    #viewer-container { height: 45vh; min-height: 240px; border-right: none; border-bottom: 1px solid var(--dark-grey); }
    #feed-container { width: 100%; flex: 1; min-height: 0; }
  }

<div id="header">
  <h1>🚀 3D Agent Live Feed</h1>
  <div class="status" id="status">● Connecting...</div>
  <nav class="header-links" aria-label="Explore the launchpad">
    <a href="/launches">All launches →</a>
    <a href="/pump-visualizer">Visualizer →</a>
  </nav>

<div id="main-container">
  <div id="viewer-container"></div>
  <div id="feed-container">
    <div id="stats-bar" role="group" aria-label="Live launch statistics">
      <div class="stat">
        <span class="stat-label">Tokens launched</span>
        <span class="stat-value" id="stat-launched" aria-live="polite">0</span>
      </div>
      <div class="stat">
        <span class="stat-label">Initial-buy volume</span>
        <span class="stat-value" id="stat-volume" aria-live="polite">$0</span>
      </div>
      <div class="stat">
        <span class="stat-label">Last launch</span>
        <span class="stat-value" id="stat-age" aria-live="polite">—</span>
      </div>
    </div>
    <div id="feed-header">
      <h2>New Tokens on Pump.fun</h2>
    </div>
    <div id="feed"></div>
  </div>
</div>

<script type="module">
  // ════════════════════════════════════════════════════════════════════
  // PumpFun Live Token Feed — the primary content.
  //
  // This module imports nothing heavy (no three.js), so it executes the instant
  // it parses and the WebSocket feed connects immediately. The 3D agent viewer
  // lives in a SEPARATE module below and only reacts to the `pumplive:token`
  // event this module dispatches — the feed therefore never waits on (and never
  // breaks with) WebGL, the GLB download, or a slow CDN.
  // ════════════════════════════════════════════════════════════════════

  // ════════════════════════════════════════════════════════════════════
  // SOL price — drives real USD market caps. Sourced from the same-origin
  // /api/pump/helius-stats endpoint (CoinGecko-backed, cached server-side).
  // Refreshed every 60s; never blocks rendering. No hardcoded price.
  // ════════════════════════════════════════════════════════════════════

  const WATCH_KEY = 'ld_watchlist';
  function isWatched(mint) {
    try { return JSON.parse(localStorage.getItem(WATCH_KEY) || '[]').includes(mint); } catch { return false; }
  }
  function toggleWatch(mint) {
    try {
      const list = JSON.parse(localStorage.getItem(WATCH_KEY) || '[]');
      const idx = list.indexOf(mint);
      if (idx >= 0) list.splice(idx, 1); else list.unshift(mint);
      localStorage.setItem(WATCH_KEY, JSON.stringify(list.slice(0, 200)));
      return idx < 0;
    } catch { return false; }
  }

  let solPrice = 0;

  async function refreshSolPrice() {
    try {
      const r = await fetch('/api/pump/helius-stats', { headers: { accept: 'application/json' } });
      if (!r.ok) return;
      const d = await r.json();
      if (typeof d.sol_price === 'number' && d.sol_price > 0) solPrice = d.sol_price;
    } catch { /* keep last known price; cards fall back to SOL-denominated MC */ }
  }

  // ════════════════════════════════════════════════════════════════════
  // PumpFun Live Token Feed
  //
  // PumpPortal `subscribeNewToken` envelope (verified against the live feed):
  //   { txType:'create', mint, name, symbol, uri, marketCapSol, solAmount,
  //     traderPublicKey, signature, bondingCurveKey, ... }
  //   - `uri` is a metadata JSON URL; the real image lives at its `.image`.
  //   - there is NO `imageUri` field (the old renderer read a phantom field).
  // ════════════════════════════════════════════════════════════════════

  const RPC_ENDPOINT = 'wss://pumpportal.fun/api/data';
  const MAX_FEED_ITEMS = 100;

  // Reconnect backoff: 2s → 4s → 8s → 16s → 32s → cap 60s, reset on open.
  // After MAX_RECONNECT_ATTEMPTS consecutive failures we stop auto-retrying
  // and surface a manual Retry button (permanent-outage error state).
  const BASE_BACKOFF_MS = 2000;
  const MAX_BACKOFF_MS = 60000;
  const MAX_RECONNECT_ATTEMPTS = 8;

  const $log = document.getElementById('feed');
  const $status = document.getElementById('status');
  const $statLaunched = document.getElementById('stat-launched');
  const $statVolume = document.getElementById('stat-volume');
  const $statAge = document.getElementById('stat-age');

  let ws = null;
  let reconnectTimer = null;
  let reconnectAttempts = 0;
  let hasRenderedToken = false;
  const seenMints = new Set();

  // Live stats — accumulated only from real create events. Volume is kept in
  // SOL and converted with the current SOL price at render time so a price
  // refresh retroactively corrects the USD figure without double-counting.
  let launchedCount = 0;
  let volumeSol = 0;
  let lastLaunchAt = 0;

  const usd = (n) => '$' + n.toLocaleString(undefined, { maximumFractionDigits: n < 1000 ? 2 : 0 });
  const isHttpUrl = (u) => typeof u === 'string' && /^https?:\/\//i.test(u);

  function showSkeleton() {
    $log.innerHTML = '';
    for (let i = 0; i < 4; i++) {
      const sk = document.createElement('div');
      sk.className = 'skeleton-card';
      sk.setAttribute('aria-hidden', 'true');
      sk.innerHTML =
        '<div class="sk-avatar"></div>' +
        '<div class="sk-lines">' +
          '<div class="sk-line w70"></div>' +
          '<div class="sk-line w40"></div>' +
          '<div class="sk-line w55"></div>' +
        '</div>';
      $log.appendChild(sk);
    }
    const hint = document.createElement('div');
    hint.className = 'feed-empty-hint';
    hint.id = 'feed-empty-hint';
    hint.textContent = 'Waiting for new launches…';
    $log.appendChild(hint);
  }

  function clearSkeleton() {
    $log.querySelectorAll('.skeleton-card, #feed-empty-hint, .feed-error').forEach((el) => el.remove());
  }

  function showError() {
    $log.innerHTML = '';
    const box = document.createElement('div');
    box.className = 'feed-error';
    box.setAttribute('role', 'alert');

    const h = document.createElement('h3');
    h.textContent = 'Live feed unavailable';
    const p = document.createElement('p');
    p.textContent = 'Could not reach the pump.fun launch stream after several attempts. PumpPortal may be temporarily down.';
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.textContent = 'Retry connection';
    btn.addEventListener('click', () => {
      reconnectAttempts = 0;
      showSkeleton();
      connect();
    });

    box.append(h, p, btn);
    $log.appendChild(box);
  }

  function flash(el) {
    el.classList.add('flash');
    setTimeout(() => el.classList.remove('flash'), 320);
  }

  function renderStats() {
    $statLaunched.textContent = launchedCount.toLocaleString();
    $statVolume.textContent = solPrice > 0
      ? usd(volumeSol * solPrice)
      : volumeSol.toFixed(2) + ' SOL';
  }

  function formatAgo(ts) {
    if (!ts) return '—';
    const s = Math.max(0, Math.floor((Date.now() - ts) / 1000));
    if (s < 60) return s + 's ago';
    const m = Math.floor(s / 60);
    if (m < 60) return m + 'm ago';
    return Math.floor(m / 60) + 'h ago';
  }

  // The "Last launch" stat re-formats a real timestamp once a second — it is a
  // relative-time label over actual event data, not a fabricated ticker.
  setInterval(() => {
    $statAge.textContent = formatAgo(lastLaunchAt);
  }, 1000);

  function connect() {
    if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }

    setStatus('● Connecting…', '');
    if (!hasRenderedToken) showSkeleton();

    ws = new WebSocket(RPC_ENDPOINT);

    ws.onopen = () => {
      reconnectAttempts = 0;
      setStatus('● Live', 'connected');
      ws.send(JSON.stringify({ method: 'subscribeNewToken' }));
    };

    ws.onmessage = (event) => {
      let token;
      try {
        token = JSON.parse(event.data);
      } catch (error) {
        console.error('[pump-live] bad frame:', error);
        return;
      }
      // Subscription acks ("Successfully subscribed…") have no mint — ignore.
      if (!token || !token.mint || token.txType !== 'create') return;
      if (seenMints.has(token.mint)) return;
      seenMints.add(token.mint);
      renderToken(token);
    };

    ws.onclose = () => {
      if (reconnectAttempts >= MAX_RECONNECT_ATTEMPTS) {
        setStatus('● Offline', 'error');
        showError();
        return;
      }
      const delay = Math.min(BASE_BACKOFF_MS * 2 ** reconnectAttempts, MAX_BACKOFF_MS);
      reconnectAttempts++;
      setStatus(`● Reconnecting in ${Math.round(delay / 1000)}s…`, 'error');
      reconnectTimer = setTimeout(connect, delay);
    };

    ws.onerror = (error) => {
      console.error('[pump-live] WebSocket error:', error?.message || error);
      try { ws.close(); } catch { /* onclose drives reconnect */ }
    };
  }

  function renderToken(token) {
    if (!hasRenderedToken) {
      hasRenderedToken = true;
      clearSkeleton();
    }

    // Update live stats from the real event.
    launchedCount++;
    if (typeof token.solAmount === 'number' && token.solAmount > 0) volumeSol += token.solAmount;
    lastLaunchAt = Date.now();
    renderStats();
    flash($statLaunched);
    $statAge.textContent = formatAgo(lastLaunchAt);

    const name = (token.name && String(token.name).trim()) || 'Unnamed Token';
    const symbol = token.symbol ? '$' + String(token.symbol).trim() : '';
    const mcSol = typeof token.marketCapSol === 'number' ? token.marketCapSol : null;
    const mcapText = mcSol == null
      ? 'Market Cap: —'
      : solPrice > 0
        ? 'Market Cap: ' + usd(mcSol * solPrice)
        : 'Market Cap: ' + mcSol.toFixed(2) + ' SOL';

    const card = document.createElement('article');
    card.className = 'token-card';
    card.dataset.mint = token.mint;

    // Real token art via the same-origin image proxy. /api/img resolves the
    // creator metadata JSON server-side (no client CORS), follows IPFS gateway
    // fallbacks, and always returns a valid image — on-brand placeholder art
    // (seeded by symbol) when the source is missing or unreachable.
    const img = document.createElement('img');
    img.loading = 'lazy';
    img.decoding = 'async';
    img.width = 50;
    img.height = 50;
    img.alt = `${name} token art`;
    const seed = token.symbol || token.name || token.mint || 'token';
    img.src = isHttpUrl(token.uri)
      ? `/api/img?meta=${encodeURIComponent(token.uri)}&seed=${encodeURIComponent(seed)}`
      : `/api/img?seed=${encodeURIComponent(seed)}`;

    const info = document.createElement('div');
    info.className = 'token-info';

    const nameEl = document.createElement('div');
    nameEl.className = 'token-name';
    nameEl.textContent = name;          // textContent → no HTML injection
    nameEl.title = name;

    const symEl = document.createElement('div');
    symEl.className = 'token-symbol';
    symEl.textContent = symbol;

    const mcapEl = document.createElement('div');
    mcapEl.className = 'token-mcap';
    mcapEl.textContent = mcapText;

    const links = document.createElement('div');
    links.className = 'token-links';
    const pumpLink = document.createElement('a');
    pumpLink.href = 'https://pump.fun/' + encodeURIComponent(token.mint);
    pumpLink.target = '_blank';
    pumpLink.rel = 'noopener noreferrer';
    pumpLink.textContent = 'Pump.fun';
    const solscanLink = document.createElement('a');
    solscanLink.href = 'https://solscan.io/token/' + encodeURIComponent(token.mint);
    solscanLink.target = '_blank';
    solscanLink.rel = 'noopener noreferrer';
    solscanLink.textContent = 'Solscan';
    const watchBtn = document.createElement('button');
    watchBtn.className = `token-watch${isWatched(token.mint) ? ' watched' : ''}`;
    watchBtn.type = 'button';
    watchBtn.textContent = isWatched(token.mint) ? '★' : '☆';
    watchBtn.title = isWatched(token.mint) ? 'Remove from watchlist' : 'Add to watchlist';
    watchBtn.setAttribute('aria-label', watchBtn.title);
    watchBtn.setAttribute('aria-pressed', String(isWatched(token.mint)));
    watchBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      const nowWatched = toggleWatch(token.mint);
      watchBtn.textContent = nowWatched ? '★' : '☆';
      watchBtn.classList.toggle('watched', nowWatched);
      const lbl = nowWatched ? 'Remove from watchlist' : 'Add to watchlist';
      watchBtn.title = lbl;
      watchBtn.setAttribute('aria-label', lbl);
      watchBtn.setAttribute('aria-pressed', String(nowWatched));
    });
    const oracleBadge = document.createElement('span');
    oracleBadge.className = 'pl-oracle-badge';
    oracleBadge.dataset.oracleMint = token.mint;
    links.append(pumpLink, solscanLink, watchBtn, oracleBadge);

    info.append(nameEl, symEl, mcapEl, links);
    card.append(img, info);

    $log.prepend(card);
    while ($log.children.length > MAX_FEED_ITEMS) $log.removeChild($log.lastChild);

    // Notify the 3D viewer module (decoupled — it may not be loaded yet).
    window.dispatchEvent(new CustomEvent('pumplive:token', { detail: { symbol: token.symbol || '' } }));
  }

  function setStatus(text, className) {
    $status.textContent = text;
    $status.className = `status ${className}`;
  }

  // Bootstrap. The feed opens first and never waits on anything else — the SOL
  // price hydrates in the background. Until the first price lands, market caps
  // render in SOL (real data) and upgrade to USD on the next paint; cards are
  // never blocked behind a price.
  renderStats();
  connect();
  refreshSolPrice();
  setInterval(refreshSolPrice, 60000);

  // ── Oracle conviction badges ────────────────────────────────────────────
  // Newly-launched coins are too fresh to have conviction scores; batch-poll
  // every 30s so cards that get scored while on screen upgrade automatically.
  const TIER_COLOR = { prime: '#c084fc', strong: '#34d399', lean: '#fbbf24', watch: '#94a3b8', avoid: '#f87171' };
  const BATCH_MAX = 20;

  async function enrichOracleBadges() {
    const badges = $log.querySelectorAll('[data-oracle-mint]');
    if (!badges.length) return;
    // Collect unscored mints only (badge is still empty)
    const pending = [];
    for (const b of badges) {
      if (!b.hasChildNodes()) pending.push(b.dataset.oracleMint);
    }
    if (!pending.length) return;
    // Chunk into batches of ≤20
    for (let i = 0; i < pending.length; i += BATCH_MAX) {
      const chunk = pending.slice(i, i + BATCH_MAX);
      try {
        const r = await fetch(`/api/oracle/batch?mints=${chunk.map(encodeURIComponent).join(',')}&network=mainnet`);
        if (!r.ok) continue;
        const { results = {} } = await r.json();
        for (const mint of chunk) {
          const d = results[mint];
          if (!d || d.score == null) continue;
          const badge = $log.querySelector(`[data-oracle-mint="${CSS.escape(mint)}"]`);
          if (!badge || badge.hasChildNodes()) continue;
          const color = TIER_COLOR[d.tier] || '#94a3b8';
          const a = document.createElement('a');
          a.className = 'pl-ob-link';
          a.href = `/oracle?mint=${encodeURIComponent(mint)}`;
          a.title = `Oracle conviction: ${d.score} (${d.tier})`;
          a.setAttribute('aria-label', `Oracle ${d.tier} — score ${d.score}`);
          a.innerHTML = `<span class="pl-ob-score" style="color:${color}">${d.score}</span><span class="pl-ob-tier" style="color:${color}">${d.tier}</span>`;
          badge.appendChild(a);
        }
      } catch { /* non-fatal */ }
    }
  }

  // First pass after 30s (new coins need time to get scored), then every 30s
  setTimeout(enrichOracleBadges, 30_000);
  setInterval(enrichOracleBadges, 30_000);
</script>

<script type="module">
  // ════════════════════════════════════════════════════════════════════
  // 3D Agent Viewer — loaded independently of the feed. It imports three.js
  // (heavy), so isolating it here means its download never delays the live
  // feed above. It listens for `pumplive:token` and waves on each new launch.
  // If WebGL is unavailable (no-GPU / locked-down browser) the whole init
  // fails soft: the feed keeps working, the avatar pane just stays empty.
  // ════════════════════════════════════════════════════════════════════
  import { LoopOnce, LoopRepeat } from 'three';
  import { Viewer } from '/src/viewer.js';

  let viewer = null;

  function playAnimation(animationName, { loop = false } = {}) {
    if (!viewer || !viewer.mixer) return;
    const clip = viewer.clips.find((c) => c.name === animationName);
    if (!clip) return;
    const action = viewer.mixer.clipAction(clip);
    action.reset();
    action.setLoop(loop ? LoopRepeat : LoopOnce, loop ? Infinity : 1);
    action.clampWhenFinished = !loop;
    action.play();
  }

  // React to launches even while the GLB is still loading — once `viewer` is
  // set the next event animates; events before that simply no-op.
  window.addEventListener('pumplive:token', () => playAnimation('Wave', { loop: false }));

  try {
    const viewerEl = document.getElementById('viewer-container');
    const v = new Viewer(viewerEl, { kiosk: true });
    await v.load('/animations/robotexpressive.glb', '', new Map());

    const idleClip = v.clips.find((c) => /^idle$/i.test(c.name)) || v.clips[0];
    if (idleClip && v.mixer) v.mixer.clipAction(idleClip).play();

    viewer = v;            // expose only once fully loaded so playAnimation() is safe
    window.viewer = v;
  } catch (err) {
    console.warn('[pump-live] 3D viewer unavailable, feed continues without it:', err?.message || err);
    viewer = null;
  }
</script>
