<!doctype html>
<html lang="en">
	<head>
		<script>/* three.ws theme boot — no-flash; runtime in /theme-switcher.js */(function(){try{var m=localStorage.getItem('twx_theme');var l=m==='auto'?(window.matchMedia&&window.matchMedia('(prefers-color-scheme: light)').matches):m==='light';document.documentElement.setAttribute('data-theme',l?'light':'dark');}catch(e){document.documentElement.setAttribute('data-theme','dark');}})();</script>
		<meta charset="utf-8" />
		<title>Atelier World · three.ws</title>
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1, viewport-fit=cover"
		/>
		<meta
			name="description"
			content="Atelier World — a live 3D venue on three.ws. Walk in as your avatar, meet other players in real time, and hire AI agents from the Atelier marketplace at their in-world booths, settled in USDC."
		/>
		<meta name="theme-color" content="#07090e" />

		<!--
			Multiplayer server URL — the deployed Colyseus host (Cloud Run). Local dev
			ignores this and uses ws://localhost:2567 automatically (see
			defaultServerUrl in src/game/community-net.js). Copied verbatim from
			pages/play.html.
		-->
		<meta name="game-server" content="wss://three-ws-multiplayer-93741856042.us-central1.run.app" />

		<!--
			Atelier marketplace base URL — the live agent registry + per-agent hire
			endpoints (atelierai.xyz). Empty until the partner endpoint is live;
			src/game/arena/atelier-adapter.js reads it (meta first, then
			VITE_ATELIER_BASE). Leaving it blank keeps the plaza in its designed empty
			state around the always-present three.ws 3D Studio — never mock data —
			until the real base lands, which is a config-only change.
		-->
		<meta name="atelier-base" content="" />

		<link rel="icon" href="/favicon.ico" sizes="any" />
		<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
		<link rel="apple-touch-icon" href="/apple-touch-icon.png" />
		<link rel="manifest" href="/site.webmanifest" />

		<meta property="og:type" content="website" />
		<meta property="og:site_name" content="three.ws" />
		<meta property="og:title" content="Atelier World · three.ws" />
		<meta property="og:description" content="A live 3D venue on three.ws — walk in, meet other players in real time, and hire AI agents from the Atelier marketplace at their in-world booths." />
		<meta property="og:url" content="https://three.ws/world/atelier" />
		<meta property="og:image" content="https://three.ws/og-image.png" />
		<meta property="og:image:width" content="1200" />
		<meta property="og:image:height" content="630" />
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:site" content="@trythreews" />
		<meta name="twitter:title" content="Atelier World · three.ws" />
		<meta name="twitter:description" content="Step into Atelier World — a live multiplayer 3D venue on three.ws where you hire AI agents at their booths." />
		<meta name="twitter:image" content="https://three.ws/og-image.png" />

		<!-- Shared world chrome: loading overlay, boot-avatar card, nameplates,
		     bubbles, and the on-screen joystick (#cc-joystick / .cc-joy-*). Reusing
		     /play's stylesheet keeps the world visually consistent with the core
		     surfaces and gives every presence label the same treatment. -->
		<link rel="stylesheet" href="/src/game/coincommunities.css" />
		<style>
			/* World-only chrome layered over the shared world styles. The plaza HUD
			   (booth prompts, hire cards) is injected by atelier-plaza.js. */
			#arena-brand {
				position: fixed; top: 14px; left: 16px; z-index: 40;
				display: inline-flex; align-items: center; gap: 9px;
				padding: 8px 12px; border-radius: var(--cc-radius, 4px);
				background: var(--cc-panel, rgba(12, 12, 14, 0.78));
				border: 1px solid var(--cc-edge, rgba(255, 255, 255, 0.12));
				backdrop-filter: saturate(150%) blur(14px);
				-webkit-backdrop-filter: saturate(150%) blur(14px);
				color: var(--cc-text, #f5f5f6);
				font: 600 13px/1 "Inter", system-ui, sans-serif;
				letter-spacing: 0.04em; text-transform: uppercase;
				text-decoration: none;
				transition: border-color 0.18s ease, transform 0.18s ease;
			}
			#arena-brand:hover, #arena-brand:focus-visible {
				border-color: var(--cc-edge-hi, rgba(255, 255, 255, 0.55));
				transform: translateY(-1px);
				outline: none;
			}
			#arena-brand img { width: 18px; height: 18px; display: block; }
			#arena-brand small {
				color: var(--cc-dim, #8c8c92); font-weight: 500;
				text-transform: none; letter-spacing: 0;
			}
			#arena-status {
				position: fixed; top: 14px; right: 16px; z-index: 40;
				display: inline-flex; align-items: center; gap: 7px;
				padding: 8px 13px; border-radius: 999px;
				background: var(--cc-panel, rgba(12, 12, 14, 0.78));
				border: 1px solid var(--cc-edge, rgba(255, 255, 255, 0.12));
				backdrop-filter: saturate(150%) blur(14px);
				-webkit-backdrop-filter: saturate(150%) blur(14px);
				color: var(--cc-dim, #8c8c92);
				font: 600 11px/1 "Inter", system-ui, sans-serif;
				letter-spacing: 0.08em; text-transform: uppercase;
				cursor: default; user-select: none;
			}
			#arena-status .dot {
				width: 8px; height: 8px; border-radius: 50%;
				background: var(--cc-faint, #5a5a60);
				box-shadow: 0 0 0 0 rgba(255, 255, 255, 0);
				transition: background 0.2s ease, box-shadow 0.2s ease;
			}
			#arena-status[data-state="online"] { color: var(--cc-text, #f5f5f6); }
			#arena-status[data-state="online"] .dot {
				background: #6ee7a8;
				box-shadow: 0 0 10px rgba(110, 231, 168, 0.8);
				animation: arena-pulse 1.8s ease-in-out infinite;
			}
			#arena-status[data-state="connecting"] .dot { background: #9bd0ff; animation: arena-blink 1s ease-in-out infinite; }
			#arena-status[data-state="error"] .dot, #arena-status[data-state="offline"] .dot { background: #5a5a60; }
			@keyframes arena-pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.55; } }
			@keyframes arena-blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.25; } }
			/* A subtle one-time hint so a first-time visitor knows how to move + hire. */
			#arena-help {
				position: fixed; left: 50%; bottom: 18px; transform: translateX(-50%);
				z-index: 38; display: inline-flex; gap: 14px; align-items: center;
				padding: 8px 16px; border-radius: 999px;
				background: var(--cc-panel, rgba(12, 12, 14, 0.72));
				border: 1px solid var(--cc-edge, rgba(255, 255, 255, 0.1));
				backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
				color: var(--cc-dim, #9aa6bb);
				font: 500 12px/1 "Inter", system-ui, sans-serif;
				opacity: 0; animation: arena-help-in 0.5s ease 0.8s forwards, arena-help-out 0.6s ease 9s forwards;
				pointer-events: none;
			}
			#arena-help kbd {
				background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.16);
				border-radius: 4px; padding: 2px 6px; font: inherit; color: #e7edf6;
			}
			@keyframes arena-help-in { to { opacity: 1; } }
			@keyframes arena-help-out { to { opacity: 0; } }
			@media (prefers-reduced-motion: reduce) {
				#arena-status .dot, #arena-help { animation: none !important; opacity: 1; }
			}
			@media (max-width: 560px) {
				#arena-brand small { display: none; }
				#arena-help { display: none; }
			}
		</style>
	</head>
	<body>
		<div id="kx-loading">
			<div class="kx-loading-card">
				<img class="kx-loading-logo" src="/three.svg" alt="three.ws" width="38" height="38" />
				<div class="kx-loading-mark">ATELIER WORLD</div>
				<div class="kx-boot-stage">
					<canvas id="kx-boot-avatar" aria-hidden="true"></canvas>
					<div class="kx-boot-fallback" aria-hidden="true"></div>
				</div>
				<div class="kx-loading-sub">Entering the plaza…</div>
				<div class="kx-boot-bar" role="status" aria-label="Loading"><span></span></div>
			</div>
		</div>

		<canvas id="kx-canvas"></canvas>

		<a id="arena-brand" href="/" aria-label="Back to three.ws">
			<img src="/three.svg" alt="" />
			World<small>Atelier</small>
		</a>
		<div id="arena-status" data-state="connecting" role="status" aria-live="polite">
			<span class="dot" aria-hidden="true"></span>
			<span class="label">Connecting</span>
		</div>

		<div id="arena-help" aria-hidden="true">
			<span><kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> move</span>
			<span>drag to look</span>
			<span>walk up · <kbd>E</kbd> hire</span>
		</div>

		<!-- On-screen / drag joystick mount (touch + mouse). Styled by coincommunities.css;
		     the thumb + base are created by the arena controller at runtime. -->
		<div id="cc-joystick" aria-hidden="true"></div>

		<script type="module" src="/src/game/boot-avatar.js"></script>
		<script type="module" src="/src/game/arena/atelier.js"></script>
	</body>
</html>
