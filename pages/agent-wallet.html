<!doctype html>
<html lang="en">
	<head>
		<script>/* three.ws theme boot — no-flash; runtime in /theme-switcher.js */(function(){try{var m=localStorage.getItem('twx_theme');var l=m==='auto'?(window.matchMedia&&window.matchMedia('(prefers-color-scheme: light)').matches):m==='light';document.documentElement.setAttribute('data-theme',l?'light':'dark');}catch(e){document.documentElement.setAttribute('data-theme','dark');}})();</script>
		<meta charset="utf-8" />
		<title>Agent wallet — three.ws</title>
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<meta name="theme-color" content="#000000" />
		<meta
			name="description"
			content="Manage a three.ws 3D AI agent's self-custodied Solana wallet — live balance, deposits, trading, sniping, x402 payments, and withdrawals, all in one place."
		/>
		<meta name="robots" content="noindex" />

		<meta property="og:type" content="website" />
		<meta property="og:title" content="Agent wallet — three.ws" />
		<meta
			property="og:description"
			content="Your 3D AI agent's own Solana wallet: balance, deposit, trade, snipe, pay, and withdraw."
		/>
		<meta property="og:image" content="https://three.ws/og-image.png" />
		<meta property="og:image:width" content="1200" />
		<meta property="og:image:height" content="630" />
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:image" content="https://three.ws/og-image.png" />

		<link rel="icon" href="/favicon.ico" sizes="any" />
		<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
		<link rel="apple-touch-icon" href="/apple-touch-icon.png" />
		<link rel="manifest" href="/manifest.webmanifest" />
		<link rel="stylesheet" href="/style.css" />
		<link rel="stylesheet" href="/nav.css" />
		<link rel="stylesheet" href="/footer.css" />
		<link rel="stylesheet" href="/fonts/fonts.css" />

		<style>
			.awh-wrap {
				max-width: 820px;
				margin: 0 auto;
				padding: calc(var(--space-md) * 2) var(--space-md) calc(var(--space-md) * 4);
			}
			.awh-crumb {
				font: var(--text-sm) var(--font-body);
				color: var(--ink-dim);
				margin: 0 0 var(--space-lg);
			}
			.awh-crumb a {
				color: inherit;
			}
			.awh-crumb a:hover {
				color: var(--ink);
			}

			/* Page-level loading / message states (the hub itself styles its tabs). */
			.awh-page-skel {
				display: flex;
				flex-direction: column;
				gap: var(--space-4, 16px);
				max-width: 760px;
				margin: 0 auto;
			}
			.awh-page-skel-row,
			.awh-page-skel-tabs,
			.awh-page-skel-card {
				background: var(--surface-2, rgba(255, 255, 255, 0.05));
				border-radius: var(--radius-lg, 14px);
				animation: awh-page-pulse 1.4s ease-in-out infinite;
			}
			.awh-page-skel-row {
				height: 52px;
				width: 70%;
			}
			.awh-page-skel-tabs {
				height: 38px;
				width: 100%;
				border-radius: var(--radius-md, 10px);
			}
			.awh-page-skel-card {
				height: 200px;
				width: 100%;
			}
			@keyframes awh-page-pulse {
				0%,
				100% {
					opacity: 0.5;
				}
				50% {
					opacity: 1;
				}
			}

			.awh-page-msg {
				max-width: 540px;
				margin: calc(var(--space-md) * 3) auto;
				text-align: center;
				border: 1px solid var(--stroke);
				border-radius: var(--radius-lg);
				background: var(--surface-1);
				padding: var(--space-xl) var(--space-lg);
			}
			.awh-page-msg h1 {
				font-family: var(--font-display);
				font-size: var(--text-lg);
				margin: 0 0 var(--space-sm);
				color: var(--ink-bright);
			}
			.awh-page-msg p {
				color: var(--ink-dim);
				font: var(--text-md) var(--font-body);
				line-height: var(--leading-normal);
				margin: 0 0 var(--space-lg);
			}
			.awh-page-msg-actions {
				display: flex;
				gap: var(--space-sm);
				justify-content: center;
				flex-wrap: wrap;
			}
			.awh-page-btn {
				appearance: none;
				font: var(--text-md) var(--font-body);
				color: var(--ink);
				background: var(--surface-2);
				border: 1px solid var(--stroke);
				border-radius: var(--radius-md);
				padding: 9px 16px;
				cursor: pointer;
				text-decoration: none;
				transition:
					background var(--duration-fast) var(--ease-standard),
					border-color var(--duration-fast) var(--ease-standard);
			}
			.awh-page-btn:hover {
				background: var(--surface-3);
				border-color: var(--stroke-strong);
			}
			.awh-page-btn:focus-visible {
				outline: var(--focus-ring-width) solid var(--focus-ring-color);
				outline-offset: var(--focus-ring-offset);
			}
			.awh-page-btn--primary {
				background: var(--accent);
				color: #0a0a0a;
				border-color: var(--accent);
				font-weight: 600;
			}
			@media (prefers-reduced-motion: reduce) {
				.awh-page-skel-row,
				.awh-page-skel-tabs,
				.awh-page-skel-card {
					animation: none;
				}
			}
		</style>
	</head>
	<body>
		<div id="nav-container"></div>

		<main class="awh-wrap">
			<p class="awh-crumb"><a href="/">Home</a> / <a href="/agents">Agents</a> / Wallet</p>
			<div id="awh-root"></div>
		</main>

		<script type="module" src="/src/agent-wallet.js"></script>
		<script src="/nav.js" defer></script>
		<script src="/brand.js" defer></script>
		<div id="footer-container"></div>
		<script src="/footer.js"></script>
	</body>
</html>
